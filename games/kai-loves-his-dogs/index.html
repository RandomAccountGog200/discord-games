<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Loves His Dogs</title>
    <style>
        :root {
            --bg: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            width: 95vw;
            max-width: 850px;
            aspect-ratio: 8/5;
            max-height: 90vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 0 60px rgba(255, 150, 80, 0.25),
                0 0 120px rgba(255, 180, 100, 0.12),
                0 8px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #5a3a2a;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 17px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            #game-container {
                width: 98vw;
                border-radius: 14px;
                border-width: 2px;
            }
            canvas {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('game-container');

            const GAME_WIDTH = 800;
            const GAME_HEIGHT = 500;
            const PLAY_AREA = { x: 50, y: 60, w: 700, h: 390 };

            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;

            // === Audio Context ===
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, type, duration, volume = 0.15, glideTo = null, glideStart = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    const startFreq = glideStart || freq;
                    osc.frequency.setValueAtTime(startFreq, t);
                    if (glideTo) {
                        osc.frequency.linearRampToValueAtTime(glideTo, t + duration * 0.6);
                    }
                    gain.gain.setValueAtTime(volume, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {
                    // Silently handle audio errors
                }
            }

            function playLoveSound() {
                playSound(520, 'sine', 0.15, 0.25, 880, 520);
                setTimeout(() => playSound(660, 'sine', 0.12, 0.2, 1040, 660), 100);
            }

            function playBarkSound() {
                playSound(180, 'triangle', 0.18, 0.12, 90, 220);
                setTimeout(() => playSound(160, 'sawtooth', 0.1, 0.1, 70, 200), 60);
            }

            function playGameOverSound() {
                playSound(440, 'sine', 0.15, 0.3, 330, 440);
                setTimeout(() => playSound(330, 'sine', 0.14, 0.25, 260, 330), 200);
                setTimeout(() => playSound(260, 'sine', 0.12, 0.4, 200, 260), 400);
            }

            // === Game State ===
            const state = {
                phase: 'playing', // 'playing' | 'gameover'
                score: 0,
                timer: 60,
                timerRemaining: 60,
                lastTime: 0,
                keys: {},
                mouseTarget: null,
                mouseActive: false,
                difficultyLevel: 1,
                shakeAmount: 0,
                instructionAlpha: 1,
                instructionTimer: 0,
                highScore: 0,
            };

            // === Player (Kai) ===
            const player = {
                x: GAME_WIDTH / 2,
                y: GAME_HEIGHT / 2 + 30,
                radius: 22,
                speed: 210,
                vx: 0,
                vy: 0,
                facingAngle: -Math.PI / 2,
                moving: false,
                sprintCooldown: 0,
            };

            // === Dogs ===
            const dogDefs = [
                { name: 'Buddy', color: '#D4A574', earColor: '#B8860B', spotColor: null, speed: 100, size: 1.0,
                    personality: 'friendly' },
                { name: 'Shadow', color: '#3D3D3D', earColor: '#2A2A2A', spotColor: null, speed: 120, size: 0.95,
                    personality: 'playful' },
                { name: 'Snowy', color: '#F8F6F0', earColor: '#E8E4DC', spotColor: '#F0E8D8', speed: 130, size: 0.85,
                    personality: 'skittish' },
                { name: 'Cocoa', color: '#8B5E3C', earColor: '#6B3F22', spotColor: '#A0724A', speed: 95, size: 1.05,
                    personality: 'friendly' },
                { name: 'Patches', color: '#FEFEFE', earColor: '#3D3D3D', spotColor: '#5A3A2A', speed: 115, size: 0.9,
                    personality: 'playful' },
            ];

            let dogs = [];

            class Dog {
                constructor(def, index) {
                    this.name = def.name;
                    this.color = def.color;
                    this.earColor = def.earColor;
                    this.spotColor = def.spotColor;
                    this.baseSpeed = def.speed;
                    this.speed = def.speed;
                    this.size = def.size;
                    this.personality = def.personality;
                    this.radius = 18 * this.size;
                    this.x = PLAY_AREA.x + 80 + Math.random() * (PLAY_AREA.w - 160);
                    this.y = PLAY_AREA.y + 80 + Math.random() * (PLAY_AREA.h - 160);
                    this.angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(this.angle) * this.speed;
                    this.vy = Math.sin(this.angle) * this.speed;
                    this.wanderTimer = 1 + Math.random() * 2;
                    this.loved = false;
                    this.loveTimer = 0;
                    this.respawnDelay = 0;
                    this.tailWag = 0;
                    this.tailWagSpeed = 8 + Math.random() * 6;
                    this.bounceOffset = 0;
                    this.eyeBlink = 0;
                    this.eyeBlinkTimer = 2 + Math.random() * 3;
                }

                update(dt) {
                    if (this.loved) {
                        this.loveTimer -= dt;
                        this.bounceOffset = Math.abs(Math.sin(this.loveTimer * 20)) * 15 * (this.loveTimer / 0.6);
                        if (this.loveTimer <= 0) {
                            this.respawn();
                        }
                        return;
                    }

                    if (this.respawnDelay > 0) {
                        this.respawnDelay -= dt;
                        if (this.respawnDelay <= 0) {
                            this.loved = false;
                            this.loveTimer = 0;
                            this.bounceOffset = 0;
                            this.appear();
                        }
                        return;
                    }

                    // Update speed based on difficulty
                    this.speed = this.baseSpeed * (1 + (state.difficultyLevel - 1) * 0.12);

                    // Wander behavior
                    this.wanderTimer -= dt;
                    if (this.wanderTimer <= 0) {
                        this.wanderTimer = 0.8 + Math.random() * 2.5;
                        // React to player proximity
                        const dx = this.x - player.x;
                        const dy = this.y - player.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 150) {
                            if (this.personality === 'skittish') {
                                // Run away
                                this.angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.5;
                            } else if (this.personality === 'friendly') {
                                // Come closer but stay a bit away
                                this.angle = Math.atan2(dy, dx) + Math.PI + (Math.random() - 0.5) * 1.2;
                            } else {
                                // Playful - run around
                                this.angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 3;
                            }
                        } else {
                            this.angle = Math.random() * Math.PI * 2;
                        }
                    }

                    const targetSpeed = this.speed;
                    const currentAngle = Math.atan2(this.vy, this.vx);
                    let angleDiff = this.angle - currentAngle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    const newAngle = currentAngle + angleDiff * Math.min(dt * 3, 1);
                    this.vx = Math.cos(newAngle) * targetSpeed;
                    this.vy = Math.sin(newAngle) * targetSpeed;

                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    // Bounce off play area
                    if (this.x - this.radius < PLAY_AREA.x) {
                        this.x = PLAY_AREA.x + this.radius;
                        this.vx = Math.abs(this.vx);
                        this.angle = Math.atan2(this.vy, this.vx);
                    }
                    if (this.x + this.radius > PLAY_AREA.x + PLAY_AREA.w) {
                        this.x = PLAY_AREA.x + PLAY_AREA.w - this.radius;
                        this.vx = -Math.abs(this.vx);
                        this.angle = Math.atan2(this.vy, this.vx);
                    }
                    if (this.y - this.radius < PLAY_AREA.y) {
                        this.y = PLAY_AREA.y + this.radius;
                        this.vy = Math.abs(this.vy);
                        this.angle = Math.atan2(this.vy, this.vx);
                    }
                    if (this.y + this.radius > PLAY_AREA.y + PLAY_AREA.h) {
                        this.y = PLAY_AREA.y + PLAY_AREA.h - this.radius;
                        this.vy = -Math.abs(this.vy);
                        this.angle = Math.atan2(this.vy, this.vx);
                    }

                    // Update tail wag
                    this.tailWag += dt * this.tailWagSpeed;
                    this.eyeBlinkTimer -= dt;
                    if (this.eyeBlinkTimer <= 0) {
                        this.eyeBlink = 0.15;
                        this.eyeBlinkTimer = 2 + Math.random() * 4;
                    }
                    if (this.eyeBlink > 0) this.eyeBlink -= dt;
                }

                getLove() {
                    this.loved = true;
                    this.loveTimer = 0.6;
                    this.bounceOffset = 0;
                    this.vx = 0;
                    this.vy = 0;
                }

                respawn() {
                    this.loved = false;
                    this.loveTimer = 0;
                    this.respawnDelay = 0.3;
                    this.bounceOffset = 0;
                }

                appear() {
                    // Place at random location away from player
                    let tries = 0;
                    do {
                        this.x = PLAY_AREA.x + 40 + Math.random() * (PLAY_AREA.w - 80);
                        this.y = PLAY_AREA.y + 40 + Math.random() * (PLAY_AREA.h - 80);
                        tries++;
                    } while (tries < 20 &&
                        Math.hypot(this.x - player.x, this.y - player.y) < 140);
                    this.angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(this.angle) * this.speed;
                    this.vy = Math.sin(this.angle) * this.speed;
                    this.wanderTimer = 0.5 + Math.random();
                }

                getFacingAngle() {
                    if (this.loved || this.respawnDelay > 0) return this.angle;
                    if (Math.abs(this.vx) < 1 && Math.abs(this.vy) < 1) return this.angle;
                    return Math.atan2(this.vy, this.vx);
                }
            }

            function spawnDogs() {
                dogs = [];
                const count = 4;
                const selectedDefs = [...dogDefs].sort(() => Math.random() - 0.5).slice(0, count);
                selectedDefs.forEach((def, i) => {
                    const dog = new Dog(def, i);
                    // Ensure initial distance from player
                    dog.x = PLAY_AREA.x + 60 + (PLAY_AREA.w - 120) * (i + 1) / (count + 1);
                    dog.y = PLAY_AREA.y + 80 + Math.random() * (PLAY_AREA.h - 160);
                    if (Math.hypot(dog.x - player.x, dog.y - player.y) < 120) {
                        dog.y = PLAY_AREA.y + PLAY_AREA.h - 80;
                    }
                    dogs.push(dog);
                });
            }

            // === Particles ===
            let particles = [];

            class Particle {
                constructor(x, y, type = 'heart') {
                    this.x = x;
                    this.y = y;
                    this.type = type;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 200;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 60 - Math.random() * 120;
                    this.life = 0.7 + Math.random() * 0.8;
                    this.maxLife = this.life;
                    this.size = 6 + Math.random() * 14;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 8;
                    this.color = type === 'heart' ?
                        ['#FF4088', '#FF5C8A', '#FF3366', '#FF6B9D', '#FF2860'][Math.floor(Math.random() * 5)] :
                        '#FFD700';
                }

                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += 40 * dt; // slight gravity
                    this.life -= dt;
                    this.rotation += this.rotationSpeed * dt;
                    this.size *= 0.995;
                }

                get alpha() {
                    return Math.max(0, this.life / this.maxLife);
                }

                get alive() {
                    return this.life > 0;
                }
            }

            function spawnLoveParticles(x, y, count = 14) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, 'heart'));
                }
                for (let i = 0; i < Math.floor(count / 3); i++) {
                    particles.push(new Particle(x, y, 'sparkle'));
                }
            }

            // === Drawing Functions ===
            function drawSky() {
                const skyGrad = ctx.createLinearGradient(0, 0, 0, PLAY_AREA.y + 30);
                skyGrad.addColorStop(0, '#87CEEB');
                skyGrad.addColorStop(0.7, '#B8E4F0');
                skyGrad.addColorStop(1, '#C8E8D0');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, GAME_WIDTH, PLAY_AREA.y + 30);

                // Clouds
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                drawCloud(120, 25, 45);
                drawCloud(350, 15, 35);
                drawCloud(580, 30, 50);
                drawCloud(700, 10, 28);

                // Sun
                const sunX = 680;
                const sunY = 40;
                const sunGrad = ctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, 50);
                sunGrad.addColorStop(0, '#FFFDE0');
                sunGrad.addColorStop(0.4, '#FFF9C4');
                sunGrad.addColorStop(1, 'rgba(255,245,180,0)');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 50, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFFEF5';
                ctx.beginPath();
                ctx.arc(sunX, sunY, 18, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawCloud(cx, cy, size) {
                ctx.beginPath();
                ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
                ctx.arc(cx + size * 0.4, cy - size * 0.15, size * 0.4, 0, Math.PI * 2);
                ctx.arc(cx + size * 0.7, cy + size * 0.05, size * 0.35, 0, Math.PI * 2);
                ctx.arc(cx - size * 0.3, cy + size * 0.1, size * 0.38, 0, Math.PI * 2);
                ctx.arc(cx + size * 0.25, cy + size * 0.2, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawGrass() {
                const grassGrad = ctx.createLinearGradient(0, PLAY_AREA.y, 0, GAME_HEIGHT);
                grassGrad.addColorStop(0, '#7CB342');
                grassGrad.addColorStop(0.3, '#6A9F33');
                grassGrad.addColorStop(0.7, '#5C8A28');
                grassGrad.addColorStop(1, '#4E7A20');
                ctx.fillStyle = grassGrad;
                ctx.fillRect(0, PLAY_AREA.y, GAME_WIDTH, GAME_HEIGHT - PLAY_AREA.y);

                // Grass texture - subtle strokes
                ctx.strokeStyle = 'rgba(100,160,40,0.25)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 60; i++) {
                    const gx = PLAY_AREA.x + Math.random() * PLAY_AREA.w;
                    const gy = PLAY_AREA.y + Math.random() * PLAY_AREA.h;
                    ctx.beginPath();
                    ctx.moveTo(gx, gy);
                    ctx.lineTo(gx + (Math.random() - 0.5) * 8, gy - 4 - Math.random() * 10);
                    ctx.stroke();
                }

                // Flowers
                const flowerColors = ['#FFF176', '#FFCC80', '#F48FB1', '#FFE082', '#EF9A9A', '#FFFFFF', '#FFECB3'];
                for (let i = 0; i < 25; i++) {
                    const fx = PLAY_AREA.x + 15 + Math.random() * (PLAY_AREA.w - 30);
                    const fy = PLAY_AREA.y + 15 + Math.random() * (PLAY_AREA.h - 30);
                    const fSize = 2.5 + Math.random() * 4;
                    const fColor = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                    ctx.fillStyle = fColor;
                    for (let p = 0; p < 5; p++) {
                        const pa = (p / 5) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.arc(fx + Math.cos(pa) * fSize, fy + Math.sin(pa) * fSize, fSize * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#FFD54F';
                    ctx.beginPath();
                    ctx.arc(fx, fy, fSize * 0.45, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawFence() {
                const fx = PLAY_AREA.x - 8;
                const fy = PLAY_AREA.y - 8;
                const fw = PLAY_AREA.w + 16;
                const fh = PLAY_AREA.h + 16;

                // Fence posts
                ctx.fillStyle = '#F5F0E8';
                ctx.strokeStyle = '#D5C8B8';
                ctx.lineWidth = 2;
                const postSpacing = 50;
                // Top rail
                for (let px = fx; px <= fx + fw; px += postSpacing) {
                    drawFencePost(px, fy, 12, fh);
                }
                // Bottom area posts (shorter)
                for (let px = fx; px <= fx + fw; px += postSpacing) {
                    drawFencePost(px, fy + fh - 30, 12, 38);
                }
                // Side posts
                for (let py = fy + postSpacing; py < fy + fh; py += postSpacing) {
                    drawFencePost(fx, py, 12, 30);
                    drawFencePost(fx + fw, py, 12, 30);
                }

                // Horizontal rails
                ctx.strokeStyle = '#E8DDD0';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(fx, fy + 10);
                ctx.lineTo(fx + fw, fy + 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(fx, fy + fh - 10);
                ctx.lineTo(fx + fw, fy + fh - 10);
                ctx.stroke();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#F0EAE2';
                ctx.beginPath();
                ctx.moveTo(fx, fy + 22);
                ctx.lineTo(fx + fw, fy + 22);
                ctx.stroke();
            }

            function drawFencePost(x, y, w, h) {
                ctx.fillStyle = '#F8F3EC';
                ctx.fillRect(x - w / 2, y, w, h);
                ctx.strokeStyle = '#C8BBA8';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(x - w / 2, y, w, h);
                // Pointed top
                ctx.fillStyle = '#F8F3EC';
                ctx.beginPath();
                ctx.moveTo(x - w / 2, y);
                ctx.lineTo(x, y - 8);
                ctx.lineTo(x + w / 2, y);
                ctx.fill();
                ctx.strokeStyle = '#C8BBA8';
                ctx.beginPath();
                ctx.moveTo(x - w / 2, y);
                ctx.lineTo(x, y - 8);
                ctx.lineTo(x + w / 2, y);
                ctx.stroke();
            }

            function drawPlayer() {
                ctx.save();
                ctx.translate(player.x, player.y);

                const angle = player.moving ? Math.atan2(player.vy, player.vx) : player.facingAngle;
                // Don't rotate the whole player, just adjust facing
                const facingRight = Math.cos(angle) >= 0;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(0, 8, 14, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs
                const legSpread = player.moving ? Math.sin(Date.now() / 120) * 5 : 0;
                ctx.fillStyle = '#3D5A80';
                ctx.fillRect(-6 - legSpread, 2, 6, 14);
                ctx.fillRect(2 + legSpread, 2, 6, 14);

                // Shoes
                ctx.fillStyle = '#2C3E50';
                ctx.fillRect(-8 - legSpread, 13, 8, 5);
                ctx.fillRect(2 + legSpread, 13, 8, 5);

                // Body
                const bodyGrad = ctx.createLinearGradient(0, -10, 0, 8);
                bodyGrad.addColorStop(0, '#5B8CC9');
                bodyGrad.addColorStop(1, '#3D6AA8');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.roundRect(-8, -12, 16, 18, 6);
                ctx.fill();
                ctx.strokeStyle = '#2C5078';
                ctx.lineWidth = 1.2;
                ctx.stroke();

                // Arms
                ctx.fillStyle = '#F5C6A0';
                const armWave = player.moving ? Math.sin(Date.now() / 100) * 3 : 0;
                ctx.beginPath();
                ctx.roundRect(-13, -10 + armWave, 6, 14, 3);
                ctx.fill();
                ctx.beginPath();
                ctx.roundRect(7, -10 - armWave, 6, 14, 3);
                ctx.fill();

                // Head
                ctx.fillStyle = '#FAD2B8';
                ctx.beginPath();
                ctx.arc(0, -18, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#E0B896';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Hair
                ctx.fillStyle = '#3D2B1F';
                ctx.beginPath();
                ctx.arc(0, -20, 10.5, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-11, -21, 22, 6);

                // Eyes
                const eyeX = facingRight ? 3 : -3;
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(eyeX, -20, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(eyeX + 0.5, -19.5, 1.8, 0, Math.PI * 2);
                ctx.fill();
                // Second eye
                const eye2X = facingRight ? -3 : 3;
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(eye2X, -20, 3.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(eye2X + 0.5, -19.5, 1.7, 0, Math.PI * 2);
                ctx.fill();

                // Smile
                ctx.strokeStyle = '#C47A5A';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.arc(0, -16, 4, 0.3, Math.PI - 0.3);
                ctx.stroke();

                // Blush
                ctx.fillStyle = 'rgba(255,150,150,0.35)';
                ctx.beginPath();
                ctx.arc(-5, -15, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5, -15, 2.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawDog(dog) {
                if (dog.respawnDelay > 0 && dog.respawnDelay < 0.25) {
                    // Fading in
                    const progress = 1 - (dog.respawnDelay / 0.25);
                    ctx.globalAlpha = Math.max(0, progress);
                }
                if (dog.loved && dog.loveTimer < 0.15) {
                    ctx.globalAlpha = Math.max(0, dog.loveTimer / 0.15);
                }

                ctx.save();
                const drawX = dog.x;
                const drawY = dog.y + dog.bounceOffset;
                ctx.translate(drawX, drawY);

                const facingAngle = dog.getFacingAngle();
                ctx.rotate(facingAngle);

                const s = dog.size;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.18)';
                ctx.beginPath();
                ctx.ellipse(0, 8 * s, 16 * s, 6 * s, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body
                const bodyGrad = ctx.createLinearGradient(0, -5 * s, 0, 5 * s);
                bodyGrad.addColorStop(0, dog.color);
                bodyGrad.addColorStop(1, adjustColor(dog.color, -20));
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.ellipse(0, 0, 16 * s, 9 * s, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = adjustColor(dog.color, -35);
                ctx.lineWidth = 1 * s;
                ctx.stroke();

                // Spots
                if (dog.spotColor) {
                    ctx.fillStyle = dog.spotColor;
                    ctx.beginPath();
                    ctx.arc(5 * s, -1 * s, 4 * s, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(-4 * s, 3 * s, 3 * s, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Legs
                const legBob = dog.loved ? 0 : Math.sin(Date.now() / 100 + dog.x) * 3 * s;
                ctx.fillStyle = adjustColor(dog.color, -15);
                const legW = 3.5 * s;
                const legH = 8 * s;
                ctx.fillRect(-9 * s, 5 * s, legW, legH + legBob * 0.5);
                ctx.fillRect(-3 * s, 5 * s, legW, legH - legBob * 0.5);
                ctx.fillRect(3 * s, 5 * s, legW, legH + legBob * 0.3);
                ctx.fillRect(9 * s - legW, 5 * s, legW, legH - legBob * 0.3);

                // Tail
                const tailWag = Math.sin(dog.tailWag) * 25;
                ctx.strokeStyle = dog.color;
                ctx.lineWidth = 3 * s;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-13 * s, -1 * s);
                const tailTipX = -16 * s + Math.cos(tailWag * Math.PI / 180) * 8 * s;
                const tailTipY = -6 * s + Math.sin(tailWag * Math.PI / 180) * 8 * s;
                ctx.lineTo(tailTipX, tailTipY);
                ctx.stroke();
                // Tail tip
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(tailTipX, tailTipY, 2.5 * s, 0, Math.PI * 2);
                ctx.fill();

                // Head
                ctx.fillStyle = dog.color;
                ctx.beginPath();
                ctx.arc(13 * s, -3 * s, 9 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = adjustColor(dog.color, -30);
                ctx.lineWidth = 1 * s;
                ctx.stroke();

                // Ears
                ctx.fillStyle = dog.earColor;
                ctx.beginPath();
                ctx.ellipse(8 * s, -10 * s, 4 * s, 7 * s, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(18 * s, -10 * s, 4 * s, 7 * s, 0.3, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                const blinkScale = dog.eyeBlink > 0 ? Math.max(0.1, 1 - dog.eyeBlink * 8) : 1;
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.ellipse(16 * s, -5 * s, 3 * s, 3.5 * s * blinkScale, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(16.5 * s, -5 * s, 1.6 * s, 0, Math.PI * 2);
                ctx.fill();
                // Eye highlight
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(17 * s, -6 * s, 0.6 * s, 0, Math.PI * 2);
                ctx.fill();

                // Nose
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(20 * s, -1 * s, 2.2 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(20.5 * s, -1.8 * s, 0.8 * s, 0, Math.PI * 2);
                ctx.fill();

                // Mouth/tongue
                ctx.fillStyle = '#E88';
                ctx.beginPath();
                ctx.ellipse(19 * s, 2 * s, 2 * s, 1.5 * s, 0.2, 0, Math.PI);
                ctx.fill();

                // Collar
                ctx.strokeStyle = '#FF5252';
                ctx.lineWidth = 2 * s;
                ctx.beginPath();
                ctx.arc(13 * s, 4 * s, 9.5 * s, -0.6, -2.4);
                ctx.stroke();
                // Tag
                ctx.fillStyle = '#FFD740';
                ctx.beginPath();
                ctx.arc(16 * s, 11 * s, 2 * s, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                ctx.globalAlpha = 1;
            }

            function adjustColor(hex, amount) {
                let r, g, b;
                if (hex.startsWith('#')) {
                    const num = parseInt(hex.slice(1), 16);
                    r = (num >> 16) & 0xFF;
                    g = (num >> 8) & 0xFF;
                    b = num & 0xFF;
                } else {
                    return hex;
                }
                r = Math.max(0, Math.min(255, r + amount));
                g = Math.max(0, Math.min(255, g + amount));
                b = Math.max(0, Math.min(255, b + amount));
                return `rgb(${r},${g},${b})`;
            }

            function drawHeart(ctx, x, y, size) {
                ctx.save();
                ctx.translate(x, y);
                const s = size;
                ctx.beginPath();
                ctx.moveTo(0, s * 0.3);
                ctx.bezierCurveTo(0, -s * 0.1, -s * 0.5, -s * 0.1, -s * 0.5, s * 0.3);
                ctx.bezierCurveTo(-s * 0.5, s * 0.75, 0, s * 1.05, 0, s * 1.05);
                ctx.bezierCurveTo(0, s * 1.05, s * 0.5, s * 0.75, s * 0.5, s * 0.3);
                ctx.bezierCurveTo(s * 0.5, -s * 0.1, 0, -s * 0.1, 0, s * 0.3);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    if (p.type === 'heart') {
                        ctx.fillStyle = p.color;
                        drawHeart(ctx, 0, 0, p.size);
                    } else {
                        ctx.fillStyle = p.color;
                        ctx.shadowColor = '#FFD700';
                        ctx.shadowBlur = 6;
                        const starSize = p.size * 0.5;
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
                            const innerA = a + Math.PI / 5;
                            ctx.lineTo(Math.cos(a) * starSize, Math.sin(a) * starSize);
                            ctx.lineTo(Math.cos(innerA) * starSize * 0.4, Math.sin(innerA) * starSize * 0.4);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                    ctx.restore();
                }
            }

            function drawUI() {
                // Score panel
                const panelW = 180;
                const panelH = 55;
                const panelX = GAME_WIDTH / 2 - panelW / 2;
                const panelY = 6;

                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 20);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 20);
                ctx.stroke();

                // Love icon
                ctx.fillStyle = '#FF4088';
                drawHeart(ctx, panelX + 28, panelY + 20, 11);

                // Score text
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 20px "Segoe UI", "Trebuchet MS", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`Loves: ${state.score}`, panelX + panelW / 2 + 8, panelY + 24);

                // Timer
                const timerX = GAME_WIDTH - 55;
                const timerY = panelY + panelH / 2;
                const timerRadius = 22;

                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.arc(timerX, timerY, timerRadius + 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(timerX, timerY, timerRadius + 3, 0, Math.PI * 2);
                ctx.stroke();

                // Timer ring
                const timerProgress = state.timerRemaining / state.timer;
                const timerColor = timerProgress > 0.3 ? '#4FC3F7' : timerProgress > 0.15 ? '#FFB74D' : '#FF5252';
                ctx.strokeStyle = timerColor;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(timerX, timerY, timerRadius, -Math.PI / 2, -Math.PI / 2 + timerProgress * Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 15px "Segoe UI", "Trebuchet MS", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(Math.ceil(Math.max(0, state.timerRemaining)), timerX, timerY + 5);

                // Instruction text
                if (state.instructionAlpha > 0.01) {
                    ctx.fillStyle = `rgba(255,255,255,${state.instructionAlpha})`;
                    ctx.font = 'bold 16px "Segoe UI", "Trebuchet MS", sans-serif';
                    ctx.textAlign = 'center';
                    const instY = PLAY_AREA.y + PLAY_AREA.h - 16;
                    ctx.fillText('Move with WASD / arrows or touch to catch dogs! ❤️', GAME_WIDTH / 2, instY);
                    ctx.fillStyle = `rgba(255,255,255,${state.instructionAlpha * 0.7})`;
                    ctx.font = '13px "Segoe UI", "Trebuchet MS", sans-serif';
                    ctx.fillText('Catch them to show your love!', GAME_WIDTH / 2, instY + 18);
                }
            }

            function drawGameOver() {
                // Overlay
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                // Panel
                const panelW = 360;
                const panelH = 240;
                const panelX = GAME_WIDTH / 2 - panelW / 2;
                const panelY = GAME_HEIGHT / 2 - panelH / 2;

                ctx.fillStyle = 'rgba(30,20,15,0.9)';
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 24);
                ctx.fill();
                ctx.strokeStyle = '#FF8A65';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 24);
                ctx.stroke();

                // Glow
                ctx.shadowColor = '#FF7043';
                ctx.shadowBlur = 25;
                ctx.strokeStyle = 'rgba(255,140,100,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 24);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Title
                ctx.fillStyle = '#FFCC80';
                ctx.font = 'bold 26px "Segoe UI", "Trebuchet MS", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText("Time's Up! 🐾", GAME_WIDTH / 2, panelY + 45);

                // Score
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 20px "Segoe UI", "Trebuchet MS", sans-serif';
                ctx.fillText(`Kai gave ${state.score} loves`, GAME_WIDTH / 2, panelY + 85);
                ctx.fillText('to his dogs!', GAME_WIDTH / 2, panelY + 112);

                // Rating
                let rating = '';
                if (state.score >= 25) rating = '🌟 The dogs are overjoyed! 🌟';
                else if (state.score >= 18) rating = '🐕 The dogs are so happy! 🐕';
                else if (state.score >= 12) rating = '🐶 Good job, the dogs are content!';
                else if (state.score >= 6) rating = '🐾 The dogs want more love!';
                else rating = '💔 The dogs miss you...';
                ctx.fillStyle = '#FFECB3';
                ctx.font = 'bold 17px "Segoe UI", "Trebuchet MS", sans-serif';
                ctx.fillText(rating, GAME_WIDTH / 2, panelY + 148);

                // High score
                if (state.score >= state.highScore && state.score > 0) {
                    ctx.fillStyle = '#FFD740';
                    ctx.font = 'bold 15px "Segoe UI", "Trebuchet MS", sans-serif';
                    ctx.fillText('🏆 New High Score! 🏆', GAME_WIDTH / 2, panelY + 172);
                } else {
                    ctx.fillStyle = '#CCC';
                    ctx.font = '14px "Segoe UI", "Trebuchet MS", sans-serif';
                    ctx.fillText(`Best: ${state.highScore} loves`, GAME_WIDTH / 2, panelY + 172);
                }

                // Restart button
                const btnX = GAME_WIDTH / 2 - 70;
                const btnY = panelY + panelH - 45;
                const btnW = 140;
                const btnH = 38;
                ctx.fillStyle = '#FF7043';
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, 19);
                ctx.fill();
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 17px "Segoe UI", "Trebuchet MS", sans-serif';
                ctx.fillText('Play Again ❤️', GAME_WIDTH / 2, btnY + 26);

                // Store button bounds for click detection
                state.restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
            }

            // === Game Loop ===
            function update(dt) {
                if (state.phase === 'gameover') return;

                // Clamp dt
                const clampedDt = Math.min(dt, 0.1);

                // Update timer
                state.timerRemaining -= clampedDt;
                if (state.timerRemaining <= 0) {
                    state.timerRemaining = 0;
                    endGame();
                    return;
                }

                // Update difficulty
                state.difficultyLevel = 1 + Math.floor((state.timer - state.timerRemaining) / 15);

                // Fade instructions
                if (state.instructionAlpha > 0 && (player.moving || state.score > 0 || state.timerRemaining < state.timer -
                        3)) {
                    state.instructionAlpha = Math.max(0, state.instructionAlpha - clampedDt * 0.7);
                }

                // Update player movement
                let moveX = 0;
                let moveY = 0;

                if (state.keys['w'] || state.keys['arrowup']) moveY = -1;
                if (state.keys['s'] || state.keys['arrowdown']) moveY = 1;
                if (state.keys['a'] || state.keys['arrowleft']) moveX = -1;
                if (state.keys['d'] || state.keys['arrowright']) moveX = 1;

                if (moveX !== 0 || moveY !== 0) {
                    const len = Math.sqrt(moveX * moveX + moveY * moveY);
                    moveX /= len;
                    moveY /= len;
                    player.vx = moveX * player.speed;
                    player.vy = moveY * player.speed;
                    player.moving = true;
                    player.facingAngle = Math.atan2(player.vy, player.vx);
                } else if (state.mouseActive && state.mouseTarget) {
                    const dx = state.mouseTarget.x - player.x;
                    const dy = state.mouseTarget.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 3) {
                        const speed = Math.min(player.speed, dist * 8);
                        player.vx = (dx / dist) * speed;
                        player.vy = (dy / dist) * speed;
                        player.moving = true;
                        player.facingAngle = Math.atan2(player.vy, player.vx);
                    } else {
                        player.vx = 0;
                        player.vy = 0;
                        player.moving = false;
                        state.mouseActive = false;
                    }
                } else {
                    player.vx *= 0.85;
                    player.vy *= 0.85;
                    if (Math.abs(player.vx) < 2 && Math.abs(player.vy) < 2) {
                        player.vx = 0;
                        player.vy = 0;
                        player.moving = false;
                    }
                }

                player.x += player.vx * clampedDt;
                player.y += player.vy * clampedDt;

                // Clamp player to play area
                player.x = Math.max(PLAY_AREA.x + player.radius, Math.min(PLAY_AREA.x + PLAY_AREA.w - player.radius, player
                    .x));
                player.y = Math.max(PLAY_AREA.y + player.radius, Math.min(PLAY_AREA.y + PLAY_AREA.h - player.radius, player
                    .y));

                // Update dogs
                for (const dog of dogs) {
                    dog.update(clampedDt);
                }

                // Check collisions with dogs
                for (const dog of dogs) {
                    if (dog.loved || dog.respawnDelay > 0) continue;
                    const dx = player.x - dog.x;
                    const dy = player.y - dog.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const collisionDist = player.radius + dog.radius - 4;
                    if (dist < collisionDist) {
                        // Love the dog!
                        dog.getLove();
                        state.score++;
                        spawnLoveParticles(dog.x, dog.y, 14);
                        playLoveSound();
                        playBarkSound();
                        state.shakeAmount = Math.max(state.shakeAmount, 4);

                        // Push player back slightly
                        const pushAngle = Math.atan2(dy, dx);
                        player.x += Math.cos(pushAngle) * 15;
                        player.y += Math.sin(pushAngle) * 15;
                    }
                }

                // Update particles
                for (const p of particles) {
                    p.update(clampedDt);
                }
                particles = particles.filter(p => p.alive);

                // Decay shake
                state.shakeAmount *= Math.exp(-clampedDt * 6);
                if (state.shakeAmount < 0.1) state.shakeAmount = 0;

                // Update sprint cooldown
                if (player.sprintCooldown > 0) player.sprintCooldown -= clampedDt;
            }

            function endGame() {
                state.phase = 'gameover';
                if (state.score > state.highScore) {
                    state.highScore = state.score;
                }
                playGameOverSound();
                player.vx = 0;
                player.vy = 0;
                player.moving = false;
                state.mouseActive = false;
            }

            function restartGame() {
                state.phase = 'playing';
                state.score = 0;
                state.timerRemaining = state.timer;
                state.difficultyLevel = 1;
                state.shakeAmount = 0;
                state.instructionAlpha = 1;
                state.mouseActive = false;
                state.mouseTarget = null;
                state.keys = {};
                player.x = GAME_WIDTH / 2;
                player.y = GAME_HEIGHT / 2 + 30;
                player.vx = 0;
                player.vy = 0;
                player.moving = false;
                player.facingAngle = -Math.PI / 2;
                particles = [];
                spawnDogs();
            }

            function render() {
                ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                // Screen shake
                let shakeX = 0;
                let shakeY = 0;
                if (state.shakeAmount > 0.05) {
                    shakeX = (Math.random() - 0.5) * state.shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * state.shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                drawSky();
                drawGrass();
                drawFence();

                // Draw dogs (sorted by Y for depth)
                const sortedDogs = [...dogs].sort((a, b) => a.y - b.y);
                for (const dog of sortedDogs) {
                    drawDog(dog);
                }

                drawPlayer();
                drawParticles();
                drawUI();

                ctx.restore();

                if (state.phase === 'gameover') {
                    drawGameOver();
                }
            }

            function gameLoop(timestamp) {
                if (!state.lastTime) state.lastTime = timestamp;
                let dt = (timestamp - state.lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                state.lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // === Event Handlers ===
            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = GAME_WIDTH / rect.width;
                const scaleY = GAME_HEIGHT / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY,
                };
            }

            function handleKeyDown(e) {
                initAudio();
                const key = e.key.toLowerCase();
                state.keys[key] = true;
                if (key === 'w' || key === 'arrowup' || key === 's' || key === 'arrowdown' ||
                    key === 'a' || key === 'arrowleft' || key === 'd' || key === 'arrowright') {
                    state.mouseActive = false;
                }
                if (key === ' ' || key === 'enter') {
                    if (state.phase === 'gameover') restartGame();
                }
            }

            function handleKeyUp(e) {
                const key = e.key.toLowerCase();
                state.keys[key] = false;
            }

            function handleMouseDown(e) {
                initAudio();
                if (state.phase === 'gameover') {
                    const pos = getCanvasPos(e);
                    const btn = state.restartBtn;
                    if (btn && pos.x >= btn.x && pos.x <= btn.x + btn.w &&
                        pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                        restartGame();
                    }
                    return;
                }
                const pos = getCanvasPos(e);
                state.mouseTarget = pos;
                state.mouseActive = true;
            }

            function handleMouseMove(e) {
                if (state.mouseActive && state.phase === 'playing') {
                    const pos = getCanvasPos(e);
                    state.mouseTarget = pos;
                }
            }

            function handleMouseUp(e) {
                // Keep target for a moment, then clear
                setTimeout(() => {
                    if (!Object.values(state.keys).some(v => v)) {
                        state.mouseActive = false;
                    }
                }, 100);
            }

            function handleTouchStart(e) {
                e.preventDefault();
                initAudio();
                if (state.phase === 'gameover') {
                    const pos = getCanvasPos(e.touches[0]);
                    const btn = state.restartBtn;
                    if (btn && pos.x >= btn.x && pos.x <= btn.x + btn.w &&
                        pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                        restartGame();
                    }
                    return;
                }
                const pos = getCanvasPos(e.touches[0]);
                state.mouseTarget = pos;
                state.mouseActive = true;
                state.instructionAlpha = Math.min(state.instructionAlpha, 0.4);
            }

            function handleTouchMove(e) {
                e.preventDefault();
                if (state.phase === 'playing' && state.mouseActive) {
                    const pos = getCanvasPos(e.touches[0]);
                    state.mouseTarget = pos;
                }
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                state.mouseActive = false;
            }

            function setupEvents() {
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                canvas.addEventListener('mousedown', handleMouseDown);
                canvas.addEventListener('mousemove', handleMouseMove);
                canvas.addEventListener('mouseup', handleMouseUp);
                canvas.addEventListener('mouseleave', handleMouseUp);
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
                canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

                // Prevent scrolling on the game container
                container.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            }

            // === Initialize ===
            function init() {
                state.timerRemaining = state.timer;
                state.phase = 'playing';
                state.score = 0;
                state.difficultyLevel = 1;
                state.shakeAmount = 0;
                state.instructionAlpha = 1;
                state.highScore = 0;
                player.x = GAME_WIDTH / 2;
                player.y = GAME_HEIGHT / 2 + 30;
                player.vx = 0;
                player.vy = 0;
                player.moving = false;
                player.facingAngle = -Math.PI / 2;
                particles = [];
                spawnDogs();
                setupEvents();
                state.lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }

            // Polyfill roundRect if needed
            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            init();
        })();
    </script>
</body>
