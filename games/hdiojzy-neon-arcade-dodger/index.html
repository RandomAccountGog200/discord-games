<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HDIOJZY - Neon Arcade Dodger</title>
    <style>
        :root {
            --bg: #0a0a14;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(180, 60, 255, 0.3), 0 0 120px rgba(60, 180, 255, 0.2), 0 0 200px rgba(255, 60, 180, 0.15);
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 400 / 700;
        }
        #ui-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.55);
            font-size: 13px;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.6s;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-hint">MOVE: ← → ／ TAP SIDES</div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const hint = document.getElementById('ui-hint');

            const W = 400;
            const H = 700;
            canvas.width = W;
            canvas.height = H;

            // --- AUDIO ENGINE ---
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;

            function ensureAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playBeep(freq, type, duration, vol = 0.08, glideTo = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* silent */ }
            }

            function sfxCollect() { playBeep(800, 'sine', 0.12, 0.1, 1200);
                playBeep(400, 'triangle', 0.08, 0.06); }

            function sfxHit() { playBeep(50, 'sawtooth', 0.3, 0.15, 20);
                playBeep(80, 'square', 0.25, 0.1); }

            function sfxCombo() { playBeep(1000, 'sine', 0.06, 0.06, 1600);
                playBeep(600, 'sine', 0.05, 0.04, 900); }

            function sfxGameOver() { playBeep(30, 'sawtooth', 0.6, 0.12, 15);
                playBeep(20, 'triangle', 0.5, 0.08); }

            function sfxRestart() { playBeep(500, 'sine', 0.1, 0.06, 900);
                playBeep(700, 'sine', 0.08, 0.04, 1100); }

            // --- GAME STATE ---
            const STATE = {
                MENU: 'menu',
                PLAYING: 'playing',
                GAMEOVER: 'gameover',
            };

            let gameState = STATE.MENU;
            let score = 0;
            let highScore = 0;
            let comboCount = 0;
            let comboTimer = 0;
            let maxCombo = 0;
            let difficulty = 1;
            let shakeAmount = 0;
            let shakeDecay = 0.85;
            let frameCount = 0;
            let spawnTimer = 0;
            let spawnInterval = 45;
            let gemSpawnTimer = 0;
            let gemSpawnInterval = 70;

            // --- PLAYER ---
            const player = {
                x: W / 2,
                y: H - 100,
                radius: 18,
                targetX: W / 2,
                speed: 0.15,
                trail: [],
                maxTrail: 28,
                glowPhase: 0,
            };

            // --- ENTITIES ---
            let enemies = [];
            let gems = [];
            let particles = [];
            let bgStars = [];

            // --- INPUT ---
            let keys = {};
            let touchLeft = false;
            let touchRight = false;
            let touchActive = false;
            let lastTouchX = null;

            function initBgStars() {
                bgStars = [];
                for (let i = 0; i < 70; i++) {
                    bgStars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 1.8 + 0.3,
                        twinkle: Math.random() * Math.PI * 2,
                        speed: Math.random() * 0.6 + 0.2,
                        hue: Math.random() * 60 + 230,
                    });
                }
            }

            function spawnEnemy() {
                const types = ['circle', 'diamond', 'hex', 'spike'];
                const type = types[Math.floor(Math.random() * types.length)];
                const r = 14 + Math.random() * 16;
                const x = r + Math.random() * (W - r * 2);
                const baseSpeed = 1.5 + difficulty * 0.7;
                const vy = baseSpeed + Math.random() * 2.5;
                const hue = Math.random() < 0.7 ? (Math.random() * 30) : (Math.random() * 20 + 340);
                enemies.push({
                    x,
                    y: -r - Math.random() * 60,
                    radius: r,
                    type,
                    vy,
                    hue,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.06,
                    pulse: Math.random() * Math.PI * 2,
                });
            }

            function spawnGem() {
                const r = 8 + Math.random() * 6;
                const x = r + Math.random() * (W - r * 2);
                const vy = 1.2 + Math.random() * 2;
                gems.push({
                    x,
                    y: -r - Math.random() * 40,
                    radius: r,
                    vy,
                    hue: 160 + Math.random() * 100,
                    sparkTimer: Math.random() * Math.PI * 2,
                    sparkSpeed: 0.08 + Math.random() * 0.12,
                });
            }

            function spawnParticles(x, y, count, hue, spread = 3, life = 25) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread + 1;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life,
                        maxLife: life,
                        hue: hue + (Math.random() - 0.5) * 40,
                        r: Math.random() * 2.5 + 1,
                    });
                }
            }

            function resetGame() {
                score = 0;
                comboCount = 0;
                comboTimer = 0;
                maxCombo = 0;
                difficulty = 1;
                shakeAmount = 0;
                frameCount = 0;
                spawnTimer = 0;
                spawnInterval = 45;
                gemSpawnTimer = 0;
                gemSpawnInterval = 70;
                enemies = [];
                gems = [];
                particles = [];
                player.x = W / 2;
                player.y = H - 100;
                player.targetX = W / 2;
                player.trail = [];
                initBgStars();
            }

            function restartFromGameOver() {
                sfxRestart();
                resetGame();
                gameState = STATE.PLAYING;
            }

            // --- UPDATE ---
            function update() {
                frameCount++;

                // Update background stars
                bgStars.forEach(s => {
                    s.twinkle += s.speed * 0.03;
                    s.y += s.speed * 0.15;
                    if (s.y > H + 5) { s.y = -5;
                        s.x = Math.random() * W; }
                });

                // Shake decay
                if (shakeAmount > 0.01) shakeAmount *= shakeDecay;
                else shakeAmount = 0;

                if (gameState === STATE.PLAYING) {
                    // Combo timer
                    if (comboTimer > 0) {
                        comboTimer--;
                        if (comboTimer <= 0) {
                            comboCount = 0;
                        }
                    }

                    // Difficulty scaling
                    difficulty = 1 + Math.floor(score / 300);
                    spawnInterval = Math.max(14, 45 - difficulty * 2.5);
                    gemSpawnInterval = Math.max(30, 70 - difficulty * 3);

                    // Player movement
                    if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) {
                        player.targetX -= 5.5;
                    }
                    if (keys['ArrowRight'] || keys['KeyD'] || touchRight) {
                        player.targetX += 5.5;
                    }
                    player.targetX = Math.max(player.radius, Math.min(W - player.radius, player.targetX));
                    player.x += (player.targetX - player.x) * player.speed;

                    // Player trail
                    player.trail.push({ x: player.x, y: player.y, life: 14, maxLife: 14 });
                    if (player.trail.length > player.maxTrail) player.trail.shift();
                    player.trail.forEach(t => t.life--);
                    player.trail = player.trail.filter(t => t.life > 0);

                    player.glowPhase += 0.05;

                    // Spawn enemies
                    spawnTimer++;
                    if (spawnTimer >= spawnInterval) {
                        spawnTimer = 0;
                        spawnEnemy();
                        if (difficulty > 3 && Math.random() < 0.35) spawnEnemy();
                    }

                    // Spawn gems
                    gemSpawnTimer++;
                    if (gemSpawnTimer >= gemSpawnInterval) {
                        gemSpawnTimer = 0;
                        spawnGem();
                    }

                    // Update enemies
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const e = enemies[i];
                        e.y += e.vy;
                        e.rotation += e.rotSpeed;
                        e.pulse += 0.04;
                        if (e.y > H + e.radius + 40) {
                            enemies.splice(i, 1);
                            continue;
                        }
                        // Collision with player
                        const dx = player.x - e.x;
                        const dy = player.y - e.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const collisionDist = player.radius + e.radius - 4;
                        if (dist < collisionDist) {
                            sfxHit();
                            shakeAmount = 14;
                            spawnParticles(player.x, player.y, 30, e.hue, 5, 30);
                            spawnParticles(e.x, e.y, 20, 0, 4, 22);
                            enemies.splice(i, 1);
                            comboCount = 0;
                            comboTimer = 0;
                            gameState = STATE.GAMEOVER;
                            if (score > highScore) highScore = score;
                            sfxGameOver();
                            break;
                        }
                    }

                    // Update gems
                    for (let i = gems.length - 1; i >= 0; i--) {
                        const g = gems[i];
                        g.y += g.vy;
                        g.sparkTimer += g.sparkSpeed;
                        if (g.y > H + g.radius + 40) {
                            gems.splice(i, 1);
                            continue;
                        }
                        const dx = player.x - g.x;
                        const dy = player.y - g.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const collisionDist = player.radius + g.radius + 4;
                        if (dist < collisionDist) {
                            comboCount++;
                            comboTimer = 55;
                            if (comboCount > maxCombo) maxCombo = comboCount;
                            const bonus = comboCount >= 10 ? 5 : comboCount >= 5 ? 3 : 1;
                            score += 10 * bonus;
                            sfxCollect();
                            if (comboCount > 1 && comboCount % 5 === 0) sfxCombo();
                            spawnParticles(g.x, g.y, 12, g.hue, 2.5, 18);
                            gems.splice(i, 1);
                        }
                    }

                    // Update particles
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life--;
                        if (p.life <= 0) particles.splice(i, 1);
                    }

                    // Hint fade
                    if (score > 50) {
                        hint.style.opacity = Math.max(0, parseFloat(hint.style.opacity || 1) - 0.008);
                    }
                } else if (gameState === STATE.GAMEOVER) {
                    // Update particles during game over
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life--;
                        if (p.life <= 0) particles.splice(i, 1);
                    }
                    if (shakeAmount > 0.01) shakeAmount *= shakeDecay;
                    else shakeAmount = 0;
                } else if (gameState === STATE.MENU) {
                    player.glowPhase += 0.04;
                    player.trail.push({ x: player.x, y: player.y, life: 14, maxLife: 14 });
                    if (player.trail.length > player.maxTrail) player.trail.shift();
                    player.trail.forEach(t => t.life--);
                    player.trail = player.trail.filter(t => t.life > 0);
                }
            }

            // --- DRAW ---
            function drawBgStars() {
                bgStars.forEach(s => {
                    const alpha = 0.35 + Math.sin(s.twinkle) * 0.35;
                    ctx.fillStyle = `hsla(${s.hue}, 80%, 70%, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawPlayer() {
                const px = player.x;
                const py = player.y;
                const r = player.radius;

                // Trail
                for (let i = 0; i < player.trail.length; i++) {
                    const t = player.trail[i];
                    const alpha = (t.life / t.maxLife) * 0.55;
                    const tr = r * (t.life / t.maxLife) * 0.75;
                    const gradient = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, tr);
                    gradient.addColorStop(0, `rgba(140,200,255,${alpha})`);
                    gradient.addColorStop(0.5, `rgba(100,140,255,${alpha * 0.5})`);
                    gradient.addColorStop(1, `rgba(60,30,180,0)`);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, tr, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Outer glow
                const glowGrad = ctx.createRadialGradient(px, py, r * 0.3, px, py, r * 2.4);
                glowGrad.addColorStop(0, 'rgba(180,220,255,0.7)');
                glowGrad.addColorStop(0.35, 'rgba(100,160,255,0.4)');
                glowGrad.addColorStop(0.7, 'rgba(40,80,220,0.1)');
                glowGrad.addColorStop(1, 'rgba(10,20,80,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(px, py, r * 2.4, 0, Math.PI * 2);
                ctx.fill();

                // Core
                const coreGrad = ctx.createRadialGradient(px - r * 0.2, py - r * 0.2, r * 0.1, px, py, r);
                coreGrad.addColorStop(0, '#ffffff');
                coreGrad.addColorStop(0.25, '#e0f0ff');
                coreGrad.addColorStop(0.55, '#60b0ff');
                coreGrad.addColorStop(0.85, '#2060dd');
                coreGrad.addColorStop(1, '#1030a0');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fill();

                // Bright center
                const brightGrad = ctx.createRadialGradient(px, py, 0, px, py, r * 0.5);
                brightGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
                brightGrad.addColorStop(0.5, 'rgba(200,230,255,0.5)');
                brightGrad.addColorStop(1, 'rgba(100,180,255,0)');
                ctx.fillStyle = brightGrad;
                ctx.beginPath();
                ctx.arc(px, py, r * 0.5, 0, Math.PI * 2);
                ctx.fill();

                // Ring
                ctx.strokeStyle = 'rgba(200,240,255,0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(px, py, r + 2 + Math.sin(player.glowPhase * 2) * 1.5, 0, Math.PI * 2);
                ctx.stroke();
            }

            function drawEnemy(e) {
                const alpha = Math.min(1, (e.y + e.radius) / 80);
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.rotation);
                const pulseScale = 1 + Math.sin(e.pulse) * 0.12;
                ctx.scale(pulseScale, pulseScale);

                const hue = e.hue;
                const glowGrad = ctx.createRadialGradient(0, 0, e.radius * 0.2, 0, 0, e.radius * 1.6);
                glowGrad.addColorStop(0, `hsla(${hue}, 90%, 55%, ${alpha})`);
                glowGrad.addColorStop(0.5, `hsla(${hue}, 80%, 35%, ${alpha * 0.5})`);
                glowGrad.addColorStop(1, `hsla(${hue}, 70%, 20%, 0)`);
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(0, 0, e.radius * 1.6, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = `hsla(${hue}, 80%, 50%, ${alpha})`;
                ctx.strokeStyle = `hsla(${hue}, 90%, 65%, ${alpha})`;
                ctx.lineWidth = 2;
                ctx.beginPath();

                if (e.type === 'circle') {
                    ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
                } else if (e.type === 'diamond') {
                    ctx.moveTo(0, -e.radius);
                    ctx.lineTo(e.radius * 0.7, 0);
                    ctx.lineTo(0, e.radius);
                    ctx.lineTo(-e.radius * 0.7, 0);
                    ctx.closePath();
                } else if (e.type === 'hex') {
                    for (let i = 0; i < 6; i++) {
                        const a = (Math.PI / 3) * i - Math.PI / 6;
                        const vx = Math.cos(a) * e.radius;
                        const vy = Math.sin(a) * e.radius;
                        if (i === 0) ctx.moveTo(vx, vy);
                        else ctx.lineTo(vx, vy);
                    }
                    ctx.closePath();
                } else if (e.type === 'spike') {
                    const spikes = 5;
                    for (let i = 0; i < spikes * 2; i++) {
                        const a = (Math.PI / spikes) * i - Math.PI / 2;
                        const r = i % 2 === 0 ? e.radius : e.radius * 0.45;
                        const vx = Math.cos(a) * r;
                        const vy = Math.sin(a) * r;
                        if (i === 0) ctx.moveTo(vx, vy);
                        else ctx.lineTo(vx, vy);
                    }
                    ctx.closePath();
                }
                ctx.fill();
                ctx.stroke();

                // Inner highlight
                const innerGrad = ctx.createRadialGradient(-e.radius * 0.2, -e.radius * 0.2, e.radius * 0.05, 0, 0, e
                    .radius * 0.55);
                innerGrad.addColorStop(0, `hsla(${hue}, 70%, 80%, ${alpha * 0.6})`);
                innerGrad.addColorStop(1, `hsla(${hue}, 70%, 40%, 0)`);
                ctx.fillStyle = innerGrad;
                ctx.beginPath();
                ctx.arc(0, 0, e.radius * 0.55, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawGem(g) {
                const alpha = Math.min(1, (g.y + g.radius) / 60);
                const hue = g.hue;
                const sparkAlpha = 0.5 + Math.sin(g.sparkTimer) * 0.5;

                // Glow
                const glowGrad = ctx.createRadialGradient(g.x, g.y, g.radius * 0.2, g.x, g.y, g.radius * 2);
                glowGrad.addColorStop(0, `hsla(${hue}, 90%, 65%, ${alpha * 0.7})`);
                glowGrad.addColorStop(0.6, `hsla(${hue}, 80%, 40%, ${alpha * 0.2})`);
                glowGrad.addColorStop(1, `hsla(${hue}, 70%, 30%, 0)`);
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.radius * 2, 0, Math.PI * 2);
                ctx.fill();

                // Sparkle
                ctx.fillStyle = `rgba(255,255,255,${sparkAlpha * alpha})`;
                ctx.beginPath();
                ctx.arc(g.x - g.radius * 0.3, g.y - g.radius * 0.35, g.radius * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Body
                const bodyGrad = ctx.createRadialGradient(g.x - g.radius * 0.2, g.y - g.radius * 0.25, g.radius * 0.1, g.x, g.y,
                    g.radius);
                bodyGrad.addColorStop(0, `hsla(${hue}, 70%, 85%, ${alpha})`);
                bodyGrad.addColorStop(0.4, `hsla(${hue}, 85%, 55%, ${alpha})`);
                bodyGrad.addColorStop(1, `hsla(${hue}, 70%, 30%, ${alpha * 0.8})`);
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                // Diamond shape
                ctx.moveTo(g.x, g.y - g.radius);
                ctx.lineTo(g.x + g.radius * 0.55, g.y);
                ctx.lineTo(g.x, g.y + g.radius * 0.7);
                ctx.lineTo(g.x - g.radius * 0.55, g.y);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = `hsla(${hue}, 80%, 75%, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            function drawParticles() {
                particles.forEach(p => {
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawHUD() {
                // Score
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = 'bold 22px "Segoe UI", "Courier New", monospace';
                ctx.textAlign = 'right';
                ctx.shadowColor = 'rgba(100,180,255,0.6)';
                ctx.shadowBlur = 12;
                ctx.fillText(`${score}`, W - 24, 44);
                ctx.shadowBlur = 0;

                // Combo
                if (comboCount >= 3 && gameState === STATE.PLAYING) {
                    const comboAlpha = Math.min(1, comboTimer / 20);
                    ctx.fillStyle = `rgba(255,220,100,${comboAlpha})`;
                    ctx.font = 'bold 16px "Segoe UI", "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(255,200,60,0.7)';
                    ctx.shadowBlur = 18;
                    ctx.fillText(`COMBO x${comboCount}`, W / 2, 80);
                    ctx.shadowBlur = 0;
                }

                // High score
                ctx.fillStyle = 'rgba(255,255,255,0.45)';
                ctx.font = '12px "Segoe UI", "Courier New", monospace';
                ctx.textAlign = 'right';
                ctx.fillText(`BEST: ${highScore}`, W - 24, 68);

                // Difficulty indicator
                if (difficulty > 1) {
                    ctx.fillStyle = 'rgba(255,150,100,0.55)';
                    ctx.font = '11px "Segoe UI", "Courier New", monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText(`LVL ${difficulty}`, 24, 44);
                }
            }

            function drawMenuOverlay() {
                // Title
                const titleY = H * 0.28;
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 52px "Segoe UI", "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(160,80,255,0.8)';
                ctx.shadowBlur = 30;
                ctx.fillText('HDIOJZY', W / 2, titleY);
                ctx.shadowColor = 'rgba(60,180,255,0.6)';
                ctx.shadowBlur = 18;
                ctx.fillText('HDIOJZY', W / 2, titleY);
                ctx.shadowBlur = 0;

                // Subtitle
                ctx.fillStyle = 'rgba(200,220,255,0.7)';
                ctx.font = 'italic 15px "Segoe UI", "Courier New", monospace';
                ctx.fillText('Neon Arcade Dodger', W / 2, titleY + 35);

                // Pulsing play prompt
                const pulse = 0.7 + Math.sin(frameCount * 0.04) * 0.3;
                ctx.fillStyle = `rgba(255,255,255,${pulse})`;
                ctx.font = 'bold 18px "Segoe UI", "Courier New", monospace';
                ctx.fillText('TAP OR PRESS SPACE', W / 2, H * 0.55);

                // Instructions
                ctx.fillStyle = 'rgba(180,200,240,0.6)';
                ctx.font = '14px "Segoe UI", "Courier New", monospace';
                ctx.fillText('← → or A/D to move', W / 2, H * 0.63);
                ctx.fillText('Dodge red shapes', W / 2, H * 0.68);
                ctx.fillText('Collect glowing gems', W / 2, H * 0.73);
                ctx.fillText('Build combos for bonus', W / 2, H * 0.78);

                if (highScore > 0) {
                    ctx.fillStyle = 'rgba(255,220,150,0.7)';
                    ctx.font = 'bold 15px "Segoe UI", "Courier New", monospace';
                    ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.86);
                }
            }

            function drawGameOverOverlay() {
                // Darken
                ctx.fillStyle = 'rgba(5,5,20,0.7)';
                ctx.fillRect(0, 0, W, H);

                const goY = H * 0.32;
                ctx.fillStyle = '#ff4466';
                ctx.font = 'bold 46px "Segoe UI", "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,60,80,0.7)';
                ctx.shadowBlur = 25;
                ctx.fillText('GAME OVER', W / 2, goY);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "Segoe UI", "Courier New", monospace';
                ctx.fillText(`SCORE: ${score}`, W / 2, goY + 50);

                if (maxCombo >= 3) {
                    ctx.fillStyle = 'rgba(255,200,100,0.85)';
                    ctx.font = '16px "Segoe UI", "Courier New", monospace';
                    ctx.fillText(`Max Combo: x${maxCombo}`, W / 2, goY + 80);
                }

                if (score >= highScore && score > 0) {
                    const pulse2 = 0.6 + Math.sin(frameCount * 0.06) * 0.4;
                    ctx.fillStyle = `rgba(255,255,100,${pulse2})`;
                    ctx.font = 'bold 17px "Segoe UI", "Courier New", monospace';
                    ctx.fillText('★ NEW BEST! ★', W / 2, goY + 108);
                }

                const pulse3 = 0.7 + Math.sin(frameCount * 0.04) * 0.3;
                ctx.fillStyle = `rgba(255,255,255,${pulse3})`;
                ctx.font = 'bold 18px "Segoe UI", "Courier New", monospace';
                ctx.fillText('TAP TO RETRY', W / 2, H * 0.62);
                ctx.fillText('OR PRESS SPACE', W / 2, H * 0.68);
            }

            function drawScanlines() {
                ctx.fillStyle = 'rgba(0,0,0,0.03)';
                for (let y = 0; y < H; y += 3) {
                    ctx.fillRect(0, y, W, 1);
                }
            }

            function drawVignette() {
                const vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.55, W / 2, H / 2, W * 0.95);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, W, H);
            }

            function render() {
                ctx.clearRect(0, 0, W, H);

                // Background
                const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
                bgGrad.addColorStop(0, '#06061a');
                bgGrad.addColorStop(0.5, '#0a0a22');
                bgGrad.addColorStop(1, '#0d0d28');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Apply shake
                let sx = 0,
                    sy = 0;
                if (shakeAmount > 0.3) {
                    sx = (Math.random() - 0.5) * shakeAmount;
                    sy = (Math.random() - 0.5) * shakeAmount;
                }

                ctx.save();
                ctx.translate(sx, sy);

                drawBgStars();

                // Draw gems
                gems.forEach(g => drawGem(g));

                // Draw enemies
                enemies.forEach(e => drawEnemy(e));

                // Draw player
                drawPlayer();

                // Draw particles
                drawParticles();

                ctx.restore();

                // Draw non-shaking overlays
                drawScanlines();
                drawVignette();
                drawHUD();

                if (gameState === STATE.MENU) {
                    drawMenuOverlay();
                } else if (gameState === STATE.GAMEOVER) {
                    drawGameOverOverlay();
                }
            }

            // --- GAME LOOP ---
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- EVENT HANDLERS ---
            function handleStart() {
                ensureAudio();
                if (gameState === STATE.MENU) {
                    resetGame();
                    gameState = STATE.PLAYING;
                    hint.style.opacity = '1';
                    sfxRestart();
                } else if (gameState === STATE.GAMEOVER) {
                    restartFromGameOver();
                    hint.style.opacity = '1';
                }
            }

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    handleStart();
                }
                if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'KeyA' || e.code === 'KeyD') {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                ensureAudio();
                if (gameState !== STATE.PLAYING) {
                    handleStart();
                    return;
                }
                touchActive = true;
                const touch = e.touches[0];
                lastTouchX = touch.clientX;
                updateTouchZones(touch.clientX);
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!touchActive) return;
                const touch = e.touches[0];
                lastTouchX = touch.clientX;
                updateTouchZones(touch.clientX);
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
                touchLeft = false;
                touchRight = false;
                lastTouchX = null;
            }, { passive: false });

            canvas.addEventListener('touchcancel', () => {
                touchActive = false;
                touchLeft = false;
                touchRight = false;
                lastTouchX = null;
            });

            function updateTouchZones(clientX) {
                const rect = canvas.getBoundingClientRect();
                const relX = (clientX - rect.left) / rect.width;
                touchLeft = relX < 0.38;
                touchRight = relX > 0.62;
                if (relX >= 0.38 && relX <= 0.62) {
                    touchLeft = false;
                    touchRight = false;
                }
            }

            canvas.addEventListener('click', (e) => {
                ensureAudio();
                if (gameState !== STATE.PLAYING) {
                    handleStart();
                }
            });

            // --- INIT ---
            initBgStars();
            hint.style.opacity = '1';
            if (gameState === STATE.MENU) {
                // Pre-populate some enemies for visual appeal in menu
                for (let i = 0; i < 4; i++) {
                    const e = {
                        x: 60 + i * 90 + Math.random() * 40,
                        y: 120 + Math.random() * 200,
                        radius: 14 + Math.random() * 14,
                        type: ['circle', 'diamond', 'hex', 'spike'][Math.floor(Math.random() * 4)],
                        vy: 0.3 + Math.random() * 0.5,
                        hue: Math.random() < 0.7 ? (Math.random() * 30) : (Math.random() * 20 + 340),
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.04,
                        pulse: Math.random() * Math.PI * 2,
                    };
                    enemies.push(e);
                }
                for (let i = 0; i < 5; i++) {
                    gems.push({
                        x: 50 + i * 70 + Math.random() * 30,
                        y: 250 + Math.random() * 250,
                        radius: 8 + Math.random() * 5,
                        vy: 0.2 + Math.random() * 0.4,
                        hue: 160 + Math.random() * 100,
                        sparkTimer: Math.random() * Math.PI * 2,
                        sparkSpeed: 0.08 + Math.random() * 0.12,
                    });
                }
            }

            gameLoop();
            console.log('🎮 HDIOJZY - Neon Arcade Dodger ready!');
            console.log('   Dodge red shapes, collect gems, build combos!');
            console.log('   Controls: Arrow Keys / A,D / Touch sides');
        })();
    </script>
</body>
</html>
