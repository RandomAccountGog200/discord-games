<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brainrot Pop - lalalala tiki yara</title>
    <style>
        :root {
            --bg: #0a0a1a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #060612;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(120, 40, 200, 0.3), 0 0 120px rgba(0, 180, 255, 0.15);
            max-width: 100vw;
            max-height: 100dvh;
            touch-action: manipulation;
        }
        #ui-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-hint">tap the bubbles • don't let them escape</div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const uiHint = document.getElementById('ui-hint');

            // --- Canvas sizing ---
            let W, H, scale;

            function resize() {
                const maxW = 800;
                const maxH = Math.min(window.innerHeight, 950);
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                W = Math.min(window.innerWidth, maxW);
                H = Math.min(window.innerHeight, maxH);
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                scale = dpr;
            }
            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', () => setTimeout(resize, 100));
            resize();

            // --- Audio ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'sine', vol = 0.25, delay = 0) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime + delay;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration + 0.01);
                } catch (e) {
                    // silent fail
                }
            }

            function sfxPop() { playTone(700, 0.08, 'sine', 0.2);
                playTone(950, 0.06, 'sine', 0.15, 0.03); }

            function sfxBigPop() { playTone(500, 0.1, 'triangle', 0.3);
                playTone(750, 0.08, 'sine', 0.25, 0.05);
                playTone(1000, 0.07, 'sine', 0.2, 0.1); }

            function sfxMiss() { playTone(120, 0.25, 'sawtooth', 0.15);
                playTone(80, 0.3, 'sawtooth', 0.12, 0.1); }

            function sfxCombo() { playTone(880, 0.05, 'square', 0.12);
                playTone(1100, 0.05, 'square', 0.12, 0.06); }

            function sfxGameOver() {
                playTone(300, 0.2, 'sawtooth', 0.2);
                playTone(200, 0.3, 'sawtooth', 0.18, 0.15);
                playTone(100, 0.4, 'sawtooth', 0.15, 0.3);
            }

            // --- Game state ---
            const GameState = { START: 'start', PLAYING: 'playing', GAMEOVER: 'gameover' };
            let gameState = GameState.START;
            let score = 0;
            let brainrot = 0; // 0-100
            let combo = 0;
            let comboTimer = 0;
            let maxCombo = 0;
            let difficulty = 0;
            let spawnTimer = 0;
            let spawnInterval = 1.3;
            let shakeAmount = 0;
            let highScore = parseInt(localStorage.getItem('brainrotHighScore') || '0');
            let gameTime = 0;
            let bubbles = [];
            let particles = [];
            let bgParticles = [];
            let floatingTexts = [];

            // --- Bubble types ---
            const bubbleTypes = [
                { text: 'lalalalala', color: '#ff3d8e', glow: '#ff69b4', points: 10, brainrotOnMiss: 8,
                radius: 46 },
                { text: 'tiki tiki', color: '#00e0ff', glow: '#40f0ff', points: 15, brainrotOnMiss: 9, radius: 44 },
                { text: 'yara yara', color: '#3dff6e', glow: '#70ff90', points: 20, brainrotOnMiss: 10, radius: 43 },
                { text: 'skibidi', color: '#e040ff', glow: '#e880ff', points: 12, brainrotOnMiss: 7, radius: 42 },
            ];
            const kaiType = { text: 'Kai Cenat', color: '#ffb800', glow: '#ffd740', points: 100, brainrotOnMiss: 22,
                radius: 58, isKai: true };

            // --- Classes ---
            class Bubble {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type;
                    this.radius = type.radius;
                    this.baseRadius = type.radius;
                    this.color = type.color;
                    this.glow = type.glow;
                    this.text = type.text;
                    this.isKai = type.isKai || false;
                    this.points = type.points;
                    this.brainrotOnMiss = type.brainrotOnMiss;
                    this.vy = -(1.2 + Math.random() * 1.8 + difficulty * 0.35); // rise speed
                    this.vx = (Math.random() - 0.5) * 0.6;
                    this.wobbleAmp = 10 + Math.random() * 25;
                    this.wobbleSpeed = 1.2 + Math.random() * 2.5;
                    this.wobbleOffset = Math.random() * Math.PI * 2;
                    this.alive = true;
                    this.scale = 0.01;
                    this.targetScale = 1;
                    this.sparkTimer = 0;
                    this.glowPhase = Math.random() * Math.PI * 2;
                }

                update(dt) {
                    // Smooth scale-in
                    this.scale += (this.targetScale - this.scale) * Math.min(dt * 12, 1);
                    this.radius = this.baseRadius * this.scale;

                    // Wobble motion
                    const wobX = Math.sin(gameTime * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmp;
                    this.x += this.vx * dt * 60 + wobX * dt * 0.8;
                    this.y += this.vy * dt * 60;

                    // Bounce off side walls
                    if (this.x - this.radius < 0) { this.x = this.radius;
                        this.vx = Math.abs(this.vx); }
                    if (this.x + this.radius > W) { this.x = W - this.radius;
                        this.vx = -Math.abs(this.vx); }

                    // Check if escaped (off top)
                    if (this.y + this.radius < -20) {
                        this.alive = false;
                        return 'escaped';
                    }
                    // If somehow below screen, remove
                    if (this.y - this.radius > H + 60) {
                        this.alive = false;
                        return 'escaped';
                    }

                    this.sparkTimer -= dt;
                    return null;
                }

                draw(ctx) {
                    ctx.save();
                    const r = this.radius;
                    const x = this.x;
                    const y = this.y;

                    // Outer glow
                    const glowIntensity = this.isKai ? 28 : 18;
                    const glowPulse = 1 + Math.sin(gameTime * 3 + this.glowPhase) * 0.25;
                    ctx.shadowColor = this.glow;
                    ctx.shadowBlur = glowIntensity * glowPulse * this.scale;

                    // Main bubble body - radial gradient
                    const grad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.3, r * 0.08, x, y, r);
                    if (this.isKai) {
                        grad.addColorStop(0, '#fffde0');
                        grad.addColorStop(0.3, '#ffe580');
                        grad.addColorStop(0.6, '#ffb800');
                        grad.addColorStop(1, '#b87000');
                    } else {
                        const lightCol = this.color;
                        grad.addColorStop(0, '#ffffff');
                        grad.addColorStop(0.2, lightCol);
                        grad.addColorStop(0.7, lightCol);
                        grad.addColorStop(1, 'rgba(0,0,0,0.4)');
                    }

                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';

                    // Subtle rim light
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                    ctx.lineWidth = 1.5 * this.scale;
                    ctx.stroke();

                    // Specular highlight
                    const hlX = x - r * 0.3;
                    const hlY = y - r * 0.35;
                    const hlR = r * 0.28;
                    const hlGrad = ctx.createRadialGradient(hlX, hlY, hlR * 0.1, hlX, hlY, hlR);
                    hlGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
                    hlGrad.addColorStop(0.6, 'rgba(255,255,255,0.15)');
                    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.beginPath();
                    ctx.arc(hlX, hlY, hlR, 0, Math.PI * 2);
                    ctx.fillStyle = hlGrad;
                    ctx.fill();

                    // Text
                    const fontSize = this.isKai ? Math.max(15, r * 0.32) : Math.max(13, r * 0.3);
                    ctx.fillStyle = this.isKai ? '#3d1c00' : 'rgba(0,0,0,0.7)';
                    ctx.font = `bold ${fontSize}px "Segoe UI", "Arial", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.text, x, y);

                    // Kai star
                    if (this.isKai) {
                        const starY = y - r * 0.55;
                        drawStar(ctx, x, starY, r * 0.2, '#fffde0', '#ffb800');
                    }

                    ctx.restore();
                }

                containsPoint(px, py) {
                    const dx = px - this.x;
                    const dy = py - this.y;
                    return Math.sqrt(dx * dx + dy * dy) <= this.radius + 4;
                }
            }

            function drawStar(ctx, cx, cy, size, fill, stroke) {
                const spikes = 5;
                const outerR = size;
                const innerR = size * 0.4;
                ctx.save();
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (Math.PI / 2 * 3) + (i * Math.PI / spikes);
                    const x = cx + Math.cos(angle) * r;
                    const y = cy - Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = fill;
                ctx.fill();
                ctx.strokeStyle = stroke;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            }

            class Particle {
                constructor(x, y, color, size, life) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.size = size;
                    this.life = life;
                    this.maxLife = life;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 280;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 60;
                    this.gravity = 150 + Math.random() * 200;
                }

                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += this.gravity * dt;
                    this.life -= dt;
                    return this.life <= 0;
                }

                draw(ctx) {
                    const alpha = Math.max(0, this.life / this.maxLife);
                    const size = this.size * alpha;
                    ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb',
                        'rgba');
                    if (this.color.startsWith('#')) {
                        const hex = this.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = size * 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';
                }
            }

            class FloatingText {
                constructor(x, y, text, color, life) {
                    this.x = x;
                    this.y = y;
                    this.text = text;
                    this.color = color;
                    this.life = life;
                    this.maxLife = life;
                    this.vy = -80;
                }

                update(dt) {
                    this.y += this.vy * dt;
                    this.life -= dt;
                    return this.life <= 0;
                }

                draw(ctx) {
                    const alpha = Math.max(0, this.life / this.maxLife);
                    const scale = 1 + (1 - alpha) * 0.4;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.color;
                    ctx.font = `bold ${16*scale}px "Segoe UI", "Arial", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 8;
                    ctx.fillText(this.text, this.x, this.y);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            }

            // --- Background particles ---
            function spawnBgParticle() {
                return {
                    x: Math.random() * W,
                    y: H + 10,
                    size: 1 + Math.random() * 2.5,
                    vy: -(8 + Math.random() * 25),
                    vx: (Math.random() - 0.5) * 6,
                    life: 4 + Math.random() * 8,
                    maxLife: 8,
                    color: `rgba(${120+Math.random()*80},${140+Math.random()*60},${200+Math.random()*55},0.4)`,
                };
            }

            for (let i = 0; i < 35; i++) {
                const p = spawnBgParticle();
                p.y = Math.random() * H;
                p.life = Math.random() * p.maxLife;
                bgParticles.push(p);
            }

            // --- Spawn bubble ---
            function spawnBubble() {
                const roll = Math.random();
                let type;
                if (roll < 0.06) {
                    type = kaiType;
                } else {
                    type = bubbleTypes[Math.floor(Math.random() * bubbleTypes.length)];
                }
                const margin = type.radius + 15;
                const x = margin + Math.random() * (W - margin * 2);
                const y = H + type.radius + 10;
                const bubble = new Bubble(x, y, type);
                bubbles.push(bubble);

                // Sparkle spawn effect for Kai
                if (type.isKai) {
                    for (let i = 0; i < 20; i++) {
                        particles.push(new Particle(x, y, '#ffd740', 3 + Math.random() * 5, 0.4 + Math.random() * 0.5));
                    }
                    playTone(400, 0.15, 'triangle', 0.2);
                    playTone(600, 0.1, 'sine', 0.2, 0.08);
                }
            }

            // --- Pop bubble ---
            function popBubble(bubble, px, py) {
                if (!bubble.alive) return;
                bubble.alive = false;

                // Points
                const basePoints = bubble.points;
                const comboBonus = Math.min(combo, 10) * 5;
                const earnedPoints = basePoints + comboBonus;
                score += earnedPoints;

                // Brainrot reduction
                const reduction = bubble.isKai ? 18 : 3 + Math.floor(Math.random() * 4);
                brainrot = Math.max(0, brainrot - reduction);

                // Combo
                combo++;
                comboTimer = 1.5;
                if (combo > maxCombo) maxCombo = combo;
                if (combo > 0 && combo % 5 === 0) sfxCombo();

                // Particles
                const count = bubble.isKai ? 40 : 18;
                for (let i = 0; i < count; i++) {
                    const size = bubble.isKai ? 2 + Math.random() * 7 : 1.5 + Math.random() * 4;
                    particles.push(new Particle(bubble.x, bubble.y, bubble.glow, size, 0.3 + Math.random() * 0.7));
                }

                // Floating text
                const txt = bubble.isKai ? `+${earnedPoints} ⭐` : `+${earnedPoints}`;
                floatingTexts.push(new FloatingText(bubble.x, bubble.y - 10, txt, bubble.glow, 1.2));
                if (combo >= 5) {
                    floatingTexts.push(new FloatingText(bubble.x, bubble.y + 18, `${combo}x COMBO!`, '#ffffff', 1.0));
                }

                // Sound
                if (bubble.isKai) sfxBigPop();
                else sfxPop();

                // Screen shake for big pops
                if (bubble.isKai) shakeAmount = Math.max(shakeAmount, 6);
                else shakeAmount = Math.max(shakeAmount, 1.5);
            }

            // --- Miss bubble (escaped) ---
            function missBubble(bubble) {
                brainrot = Math.min(100, brainrot + bubble.brainrotOnMiss);
                if (bubble.isKai) {
                    shakeAmount = Math.max(shakeAmount, 10);
                    sfxMiss();
                    floatingTexts.push(new FloatingText(bubble.x, Math.min(bubble.y + 40, H - 40), 'MISSED! 💀',
                        '#ff4444', 1.5));
                    for (let i = 0; i < 15; i++) {
                        particles.push(new Particle(bubble.x, bubble.y - 30, '#ff3333', 2 + Math.random() * 4,
                            0.5 + Math.random() * 0.6));
                    }
                } else {
                    shakeAmount = Math.max(shakeAmount, 3);
                    playTone(150, 0.15, 'sawtooth', 0.08);
                }
                if (brainrot >= 100) {
                    endGame();
                }
            }

            function endGame() {
                gameState = GameState.GAMEOVER;
                sfxGameOver();
                shakeAmount = 14;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('brainrotHighScore', highScore);
                }
                uiHint.style.opacity = '1';
                uiHint.textContent = 'tap to play again';
            }

            function resetGame() {
                score = 0;
                brainrot = 0;
                combo = 0;
                comboTimer = 0;
                maxCombo = 0;
                difficulty = 0;
                spawnTimer = 0;
                spawnInterval = 1.3;
                shakeAmount = 0;
                gameTime = 0;
                bubbles = [];
                particles = [];
                floatingTexts = [];
                gameState = GameState.PLAYING;
                uiHint.style.opacity = '0.5';
                uiHint.textContent = 'tap the bubbles • don\'t let them escape';
                // Spawn a couple initial bubbles
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => { if (gameState === GameState.PLAYING) spawnBubble(); }, i * 300);
                }
            }

            // --- Input handling ---
            function handleInput(ex, ey) {
                initAudio();

                if (gameState === GameState.START) {
                    resetGame();
                    return;
                }

                if (gameState === GameState.GAMEOVER) {
                    // Small delay to prevent accidental restart
                    if (gameTime > 0.5) {
                        resetGame();
                    }
                    return;
                }

                // Check bubbles (reverse order for top-most first)
                let hit = false;
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    const b = bubbles[i];
                    if (b.alive && b.containsPoint(ex, ey)) {
                        popBubble(b, ex, ey);
                        hit = true;
                        break;
                    }
                }
                if (!hit && gameState === GameState.PLAYING) {
                    // Tapped empty space - minor feedback
                    playTone(200, 0.04, 'sine', 0.05);
                }
            }

            canvas.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                handleInput(x, y);
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                for (const touch of e.changedTouches) {
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    handleInput(x, y);
                }
            }, { passive: false });

            // Prevent scrolling on canvas
            canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            canvas.addEventListener('touchend', (e) => e.preventDefault());
            canvas.addEventListener('touchcancel', (e) => e.preventDefault());

            // --- Game loop ---
            let lastTime = performance.now();
            let bgTime = 0;

            function gameLoop(timestamp) {
                requestAnimationFrame(gameLoop);
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2; // Cap to avoid huge jumps
                lastTime = timestamp;

                update(dt);
                render();
            }

            function update(dt) {
                gameTime += dt;
                bgTime += dt;

                // Update shake decay
                shakeAmount *= Math.exp(-dt * 8);
                if (shakeAmount < 0.05) shakeAmount = 0;

                // Update combo timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        combo = 0;
                        comboTimer = 0;
                    }
                }

                // Update difficulty (ramps over time)
                if (gameState === GameState.PLAYING) {
                    difficulty = Math.min(gameTime / 35, 1.0);
                    spawnInterval = 1.3 - difficulty * 0.75; // 1.3 down to 0.55

                    // Spawn timer
                    spawnTimer -= dt;
                    if (spawnTimer <= 0) {
                        spawnBubble();
                        spawnTimer = spawnInterval * (0.7 + Math.random() * 0.6);
                        // Occasionally spawn 2 at once
                        if (Math.random() < difficulty * 0.3) {
                            setTimeout(() => { if (gameState === GameState.PLAYING) spawnBubble(); }, 150 + Math.random() *
                                300);
                        }
                    }
                }

                // Update bubbles
                for (const b of bubbles) {
                    if (!b.alive) continue;
                    const result = b.update(dt);
                    if (result === 'escaped') {
                        missBubble(b);
                    }
                }

                // Clean dead bubbles
                bubbles = bubbles.filter(b => b.alive || b.scale > 0.01);
                // Actually, escaped bubbles are marked alive=false so filter them
                bubbles = bubbles.filter(b => b.alive);

                // Update particles
                for (const p of particles) {
                    const dead = p.update(dt);
                    if (dead) p.life = -1;
                }
                particles = particles.filter(p => p.life > 0);

                // Update floating texts
                for (const ft of floatingTexts) {
                    const dead = ft.update(dt);
                    if (dead) ft.life = -1;
                }
                floatingTexts = floatingTexts.filter(ft => ft.life > 0);

                // Update background particles
                for (const bp of bgParticles) {
                    bp.y += bp.vy * dt;
                    bp.x += bp.vx * dt;
                    bp.life -= dt;
                    if (bp.life <= 0 || bp.y < -20 || bp.x < -20 || bp.x > W + 20) {
                        Object.assign(bp, spawnBgParticle());
                    }
                }

                // Check game over from brainrot
                if (gameState === GameState.PLAYING && brainrot >= 100) {
                    endGame();
                }

                // Update gameTime for gameover state too (for restart delay)
                if (gameState === GameState.GAMEOVER) {
                    gameTime += dt;
                }
            }

            function render() {
                ctx.clearRect(0, 0, W, H);

                // Screen shake offset
                let sx = 0,
                    sy = 0;
                if (shakeAmount > 0.01) {
                    sx = (Math.random() - 0.5) * shakeAmount * 2;
                    sy = (Math.random() - 0.5) * shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(sx, sy);

                // Background
                const bgGrad = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, Math.max(W, H) * 0.8);
                const br = Math.min(100, brainrot);
                bgGrad.addColorStop(0, `rgb(${15+br*0.5},${12+br*0.3},${30+br*0.6})`);
                bgGrad.addColorStop(0.5, `rgb(${8+br*0.3},${7},${18+br*0.4})`);
                bgGrad.addColorStop(1, '#040412');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Subtle grid
                ctx.strokeStyle = 'rgba(255,255,255,0.015)';
                ctx.lineWidth = 0.5;
                const gridSize = 50;
                for (let gx = gridSize; gx < W; gx += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, H);
                    ctx.stroke();
                }
                for (let gy = gridSize; gy < H; gy += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(W, gy);
                    ctx.stroke();
                }

                // Background particles
                for (const bp of bgParticles) {
                    const alpha = Math.max(0, bp.life / bp.maxLife) * 0.5;
                    ctx.fillStyle = bp.color.replace('0.4', String(alpha));
                    ctx.beginPath();
                    ctx.arc(bp.x, bp.y, bp.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw bubbles
                for (const b of bubbles) {
                    if (b.alive || b.scale > 0.05) {
                        b.draw(ctx);
                    }
                }

                // Draw particles
                for (const p of particles) {
                    p.draw(ctx);
                }

                // Draw floating texts
                for (const ft of floatingTexts) {
                    ft.draw(ctx);
                }

                ctx.restore(); // Restore shake offset

                // --- UI Overlay (no shake) ---
                // Brainrot meter background
                const meterW = Math.min(W - 40, 340);
                const meterH = 22;
                const meterX = (W - meterW) / 2;
                const meterY = 18;

                // Meter background
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(meterX, meterY, meterW, meterH, 11);
                ctx.fill();
                ctx.stroke();

                // Meter fill
                const fillW = (brainrot / 100) * (meterW - 4);
                if (fillW > 2) {
                    const meterGrad = ctx.createLinearGradient(meterX, 0, meterX + meterW, 0);
                    meterGrad.addColorStop(0, '#3dff6e');
                    meterGrad.addColorStop(0.4, '#ffe040');
                    meterGrad.addColorStop(0.7, '#ff6e3d');
                    meterGrad.addColorStop(1, '#ff2040');
                    ctx.fillStyle = meterGrad;
                    ctx.beginPath();
                    ctx.roundRect(meterX + 2, meterY + 2, fillW, meterH - 4, 9);
                    ctx.fill();

                    // Glow on fill
                    ctx.shadowColor = brainrot > 70 ? '#ff4040' : brainrot > 40 ? '#ffe040' : '#40ff60';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Meter label
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 11px "Segoe UI", "Arial", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const brainrotLabel = brainrot >= 95 ? '💀 FULLY BRAINROTTED 💀' :
                    brainrot >= 70 ? '⚠ BRAINROT CRITICAL ⚠' :
                    brainrot >= 40 ? '🧠 Brainrot Building...' : '🧠 Brainrot Level';
                ctx.fillText(brainrotLabel, meterX + meterW / 2, meterY + meterH / 2);

                // Percentage
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = 'bold 10px "Segoe UI", "Arial", sans-serif';
                ctx.fillText(`${Math.round(brainrot)}%`, meterX + meterW / 2, meterY + meterH + 16);

                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "Segoe UI", "Arial", sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`⭐ ${Math.floor(score)}`, W - 20, meterY + meterH / 2);

                // Combo
                if (combo >= 3 && gameState === GameState.PLAYING) {
                    const comboAlpha = Math.min(1, comboTimer / 0.5);
                    ctx.fillStyle = `rgba(255,220,60,${comboAlpha})`;
                    ctx.font = `bold ${18+Math.min(combo,10)*1.5}px "Segoe UI", "Arial", sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.fillText(`${combo}x COMBO`, 20, meterY + meterH / 2);
                }

                // High score
                if (highScore > 0 && gameState === GameState.PLAYING) {
                    ctx.fillStyle = 'rgba(255,255,255,0.45)';
                    ctx.font = '10px "Segoe UI", "Arial", sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(`best: ${highScore}`, W - 20, meterY + meterH + 16);
                }

                // --- Start screen ---
                if (gameState === GameState.START) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillRect(0, 0, W, H);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 36px "Segoe UI", "Arial", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🧠 BRAINROT POP 🧠', W / 2, H / 2 - 60);

                    ctx.fillStyle = '#ffb800';
                    ctx.font = 'bold 18px "Segoe UI", "Arial", sans-serif';
                    ctx.fillText('lalalalala • tiki tiki • yara yara', W / 2, H / 2 - 10);

                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.font = '16px "Segoe UI", "Arial", sans-serif';
                    ctx.fillText('Pop the bubbles before they escape!', W / 2, H / 2 + 35);
                    ctx.fillText('Don\'t let the brainrot reach 100% 💀', W / 2, H / 2 + 58);

                    // Pulsing tap prompt
                    const pulse = 1 + Math.sin(Date.now() / 600) * 0.3;
                    ctx.fillStyle = `rgba(255,255,255,${0.7*pulse})`;
                    ctx.font = 'bold 20px "Segoe UI", "Arial", sans-serif';
                    ctx.fillText('👆 TAP TO START 👆', W / 2, H / 2 + 110);

                    // Draw a sample Kai Cenat bubble
                    const demoBubble = new Bubble(W / 2, H / 2 - 90, kaiType);
                    demoBubble.scale = 1;
                    demoBubble.targetScale = 1;
                    demoBubble.radius = demoBubble.baseRadius;
                    demoBubble.draw(ctx);
                }

                // --- Game over screen ---
                if (gameState === GameState.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, W, H);

                    // Glitchy text effect
                    ctx.fillStyle = '#ff3050';
                    ctx.font = 'bold 42px "Segoe UI", "Arial", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', W / 2 + (Math.random() - 0.5) * 4, H / 2 - 50);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 28px "Segoe UI", "Arial", sans-serif';
                    ctx.fillText('Fully Brainrotted! 💀', W / 2, H / 2);

                    ctx.fillStyle = '#ffb800';
                    ctx.font = 'bold 22px "Segoe UI", "Arial", sans-serif';
                    ctx.fillText(`Score: ${Math.floor(score)}`, W / 2, H / 2 + 50);

                    if (score >= highScore && highScore > 0) {
                        const pulse2 = 1 + Math.sin(Date.now() / 300) * 0.4;
                        ctx.fillStyle = `rgba(255,220,40,${0.8*pulse2})`;
                        ctx.font = 'bold 17px "Segoe UI", "Arial", sans-serif';
                        ctx.fillText('🏆 NEW HIGH SCORE! 🏆', W / 2, H / 2 + 78);
                    } else if (highScore > 0) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.font = '14px "Segoe UI", "Arial", sans-serif';
                        ctx.fillText(`Best: ${highScore}`, W / 2, H / 2 + 78);
                    }

                    ctx.fillStyle = `rgba(255,255,255,${0.6+Math.sin(Date.now()/500)*0.3})`;
                    ctx.font = 'bold 18px "Segoe UI", "Arial", sans-serif';
                    ctx.fillText('👆 Tap to play again 👆', W / 2, H / 2 + 120);
                }
            }

            // --- Initialize ---
            function init() {
                resize();
                // Seed some background particles
                bgParticles = [];
                for (let i = 0; i < 35; i++) {
                    const p = spawnBgParticle();
                    p.y = Math.random() * H;
                    p.life = Math.random() * p.maxLife;
                    bgParticles.push(p);
                }
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }

            // Polyfill roundRect if needed
            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            init();
            console.log('🧠 Brainrot Pop ready! lalalalala tiki tiki yara yara ~ Kai Cenat ⭐');
        })();
    </script>
</body>
</html>
