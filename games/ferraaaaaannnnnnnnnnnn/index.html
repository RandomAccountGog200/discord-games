<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FERRAAAAAANNNNNNNNNNNN</title>
    <style>
        :root {
            --bg: #1a0a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(255, 100, 30, 0.5), 0 0 120px rgba(255, 60, 20, 0.3);
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
            image-rendering: auto;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // Game resolution
            const GAME_W = 420;
            const GAME_H = 720;
            canvas.width = GAME_W;
            canvas.height = GAME_H;

            // Scale canvas display
            function resizeCanvas() {
                const maxW = Math.min(window.innerWidth - 10, 480);
                const maxH = Math.min(window.innerHeight - 10, 850);
                const scale = Math.min(maxW / GAME_W, maxH / GAME_H);
                canvas.style.width = (GAME_W * scale) + 'px';
                canvas.style.height = (GAME_H * scale) + 'px';
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

            // Audio engine
            let audioCtx = null;

            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playChargeSound(level) {
                try {
                    const ctx = getAudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180 + level * 500, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(200 + level * 700, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.06 + level * 0.12, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.08 + level * 0.14, ctx.currentTime + 0.1);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.16);
                } catch (e) {}
            }

            function playKickSound(power) {
                try {
                    const ctx = getAudioContext();
                    const bufferSize = ctx.sampleRate * 0.08;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const t = i / ctx.sampleRate;
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 50) * (0.6 + power * 0.4);
                    }
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.35 + power * 0.5, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(800 + power * 2000, ctx.currentTime);
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    source.start(ctx.currentTime);
                } catch (e) {}
            }

            function playGoalSound() {
                try {
                    const ctx = getAudioContext();
                    const now = ctx.currentTime;
                    [0, 0.12, 0.24, 0.38].forEach((delay, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(300 + i * 150, now + delay);
                        osc.frequency.linearRampToValueAtTime(500 + i * 200, now + delay + 0.2);
                        gain.gain.setValueAtTime(0.25, now + delay);
                        gain.gain.linearRampToValueAtTime(0, now + delay + 0.35);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now + delay);
                        osc.stop(now + delay + 0.35);
                    });
                    // Crowd noise burst
                    const bufSize = ctx.sampleRate * 0.5;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const d = buf.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) {
                        const t = i / ctx.sampleRate;
                        d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 6) * 0.5;
                    }
                    const src = ctx.createBufferSource();
                    src.buffer = buf;
                    const g = ctx.createGain();
                    g.gain.setValueAtTime(0.45, now);
                    g.gain.linearRampToValueAtTime(0, now + 0.5);
                    src.connect(g);
                    g.connect(ctx.destination);
                    src.start(now);
                } catch (e) {}
            }

            function playTackleSound() {
                try {
                    const ctx = getAudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(90, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(40, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.2);
                } catch (e) {}
            }

            function playWhistleSound() {
                try {
                    const ctx = getAudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(700, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(900, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.4);
                } catch (e) {}
            }

            // Input handling
            const keys = {};
            let mouseDown = false;
            let mouseX = 0;
            let mouseY = 0;
            let chargeZoneActive = false;
            let moveZoneActive = false;
            let moveTouchId = null;
            let chargeTouchId = null;
            let moveTouchX = 0;
            let moveTouchY = 0;
            let targetMoveX = null;
            let targetMoveY = null;

            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (!keys['charging']) {
                        keys['charging'] = true;
                        keys['chargeStart'] = performance.now();
                    }
                }
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key ===
                    'ArrowRight') {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', e => {
                keys[e.key] = false;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    keys['charging'] = false;
                    keys['chargeReleased'] = true;
                }
            });

            canvas.addEventListener('mousedown', e => {
                getAudioContext();
                mouseDown = true;
                const rect = canvas.getBoundingClientRect();
                const sx = GAME_W / rect.width;
                const sy = GAME_H / rect.height;
                mouseX = (e.clientX - rect.left) * sx;
                mouseY = (e.clientY - rect.top) * sy;
                if (mouseX > GAME_W * 0.55) {
                    chargeZoneActive = true;
                    keys['charging'] = true;
                    keys['chargeStart'] = performance.now();
                } else {
                    moveZoneActive = true;
                    targetMoveX = mouseX;
                    targetMoveY = mouseY;
                }
            });

            canvas.addEventListener('mousemove', e => {
                if (!mouseDown) return;
                const rect = canvas.getBoundingClientRect();
                const sx = GAME_W / rect.width;
                const sy = GAME_H / rect.height;
                mouseX = (e.clientX - rect.left) * sx;
                mouseY = (e.clientY - rect.top) * sy;
                if (moveZoneActive) {
                    targetMoveX = mouseX;
                    targetMoveY = mouseY;
                }
            });

            canvas.addEventListener('mouseup', () => {
                mouseDown = false;
                if (chargeZoneActive) {
                    keys['charging'] = false;
                    keys['chargeReleased'] = true;
                }
                chargeZoneActive = false;
                moveZoneActive = false;
                targetMoveX = null;
                targetMoveY = null;
            });

            canvas.addEventListener('mouseleave', () => {
                if (chargeZoneActive) {
                    keys['charging'] = false;
                    keys['chargeReleased'] = true;
                }
                mouseDown = false;
                chargeZoneActive = false;
                moveZoneActive = false;
                targetMoveX = null;
                targetMoveY = null;
            });

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                getAudioContext();
                const rect = canvas.getBoundingClientRect();
                const sx = GAME_W / rect.width;
                const sy = GAME_H / rect.height;
                for (const touch of e.changedTouches) {
                    const tx = (touch.clientX - rect.left) * sx;
                    const ty = (touch.clientY - rect.top) * sy;
                    if (tx > GAME_W * 0.55 && chargeTouchId === null) {
                        chargeTouchId = touch.identifier;
                        keys['charging'] = true;
                        keys['chargeStart'] = performance.now();
                        chargeZoneActive = true;
                    } else if (tx <= GAME_W * 0.55 && moveTouchId === null) {
                        moveTouchId = touch.identifier;
                        moveTouchX = tx;
                        moveTouchY = ty;
                        targetMoveX = tx;
                        targetMoveY = ty;
                        moveZoneActive = true;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const sx = GAME_W / rect.width;
                const sy = GAME_H / rect.height;
                for (const touch of e.changedTouches) {
                    const tx = (touch.clientX - rect.left) * sx;
                    const ty = (touch.clientY - rect.top) * sy;
                    if (touch.identifier === moveTouchId && moveZoneActive) {
                        moveTouchX = tx;
                        moveTouchY = ty;
                        targetMoveX = tx;
                        targetMoveY = ty;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (touch.identifier === chargeTouchId) {
                        chargeTouchId = null;
                        keys['charging'] = false;
                        keys['chargeReleased'] = true;
                        chargeZoneActive = false;
                    }
                    if (touch.identifier === moveTouchId) {
                        moveTouchId = null;
                        moveZoneActive = false;
                        targetMoveX = null;
                        targetMoveY = null;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchcancel', () => {
                if (chargeTouchId !== null) {
                    keys['charging'] = false;
                    keys['chargeReleased'] = true;
                }
                chargeTouchId = null;
                moveTouchId = null;
                chargeZoneActive = false;
                moveZoneActive = false;
                targetMoveX = null;
                targetMoveY = null;
            });

            // Game state
            const STATE = {
                PLAYING: 'playing',
                GAMEOVER: 'gameover',
                RESTART: 'restart'
            };

            let gameState = STATE.PLAYING;
            let score = 0;
            let lives = 3;
            let difficulty = 1;
            let screenShake = 0;
            let screenShakeX = 0;
            let screenShakeY = 0;
            let goalScored = false;
            let goalTimer = 0;
            let invincibleTimer = 0;
            let gameOverTimer = 0;
            let restartBlink = 0;
            let particles = [];
            let defenders = [];
            let defenderSpawnTimer = 0;
            let chargeLevel = 0;
            let chargeDisplay = 0;
            let shotBall = null;
            let goalkeeperX = GAME_W / 2;
            let goalkeeperTargetX = GAME_W / 2;
            let goalkeeperDive = null;
            let goalkeeperStun = 0;

            // Ferran (player)
            const player = {
                x: GAME_W / 2,
                y: 560,
                radius: 18,
                speed: 210,
                vx: 0,
                vy: 0,
                kitMain: '#c41230',
                kitShorts: '#1a3a8a',
                skinTone: '#e8c39e',
                hairColor: '#3d2b1f',
                number: 11
            };

            function resetPlayer() {
                player.x = GAME_W / 2;
                player.y = 560;
                player.vx = 0;
                player.vy = 0;
                invincibleTimer = 1.8;
                chargeLevel = 0;
                chargeDisplay = 0;
                keys['charging'] = false;
                keys['chargeReleased'] = false;
                chargeZoneActive = false;
                targetMoveX = null;
                targetMoveY = null;
                shotBall = null;
            }

            function spawnDefender() {
                const side = Math.random();
                let x, y;
                if (side < 0.3) {
                    x = -20;
                    y = 80 + Math.random() * 350;
                } else if (side < 0.6) {
                    x = GAME_W + 20;
                    y = 80 + Math.random() * 350;
                } else {
                    x = 40 + Math.random() * (GAME_W - 80);
                    y = -20;
                }
                const speed = 70 + Math.random() * 50 + difficulty * 18;
                const angle = Math.atan2(player.y - y, player.x - x) + (Math.random() - 0.5) * 0.7;
                defenders.push({
                    x,
                    y,
                    radius: 15 + Math.random() * 5,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    kitMain: ['#1a1a2e', '#2d2d44', '#111122', '#0d0d1a'][Math.floor(Math.random() * 4)],
                    kitShorts: '#1a1a1a',
                    skinTone: ['#d4a574', '#c4946a', '#e0b890'][Math.floor(Math.random() * 3)],
                    hairColor: ['#1a1a1a', '#3d2b1f', '#5c3d2e'][Math.floor(Math.random() * 3)],
                    number: Math.floor(Math.random() * 30) + 2,
                    stalled: 0
                });
            }

            function spawnParticles(x, y, count, color, speed, life) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = speed * (0.4 + Math.random() * 1.2);
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd,
                        life: life * (0.5 + Math.random()),
                        maxLife: life,
                        color,
                        radius: 1.5 + Math.random() * 3.5
                    });
                }
            }

            function fireShot() {
                if (shotBall) return;
                const power = Math.max(0.15, chargeLevel);
                const shotSpeed = 350 + power * 700;
                const goalMouthMin = GAME_W * 0.28;
                const goalMouthMax = GAME_W * 0.72;
                const targetX = goalMouthMin + Math.random() * (goalMouthMax - goalMouthMin);
                const dx = targetX - player.x;
                const dy = 30 - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const nx = dx / dist;
                const ny = dy / dist;
                shotBall = {
                    x: player.x,
                    y: player.y - player.radius,
                    vx: nx * shotSpeed,
                    vy: ny * shotSpeed,
                    targetX,
                    power,
                    trail: []
                };
                playKickSound(power);
                spawnParticles(player.x, player.y - player.radius, 20 + Math.floor(power * 30), '#ffffff', 150 + power *
                    300, 0.35 + power * 0.5);
                chargeLevel = 0;
                chargeDisplay = 0;
                keys['charging'] = false;
                keys['chargeReleased'] = false;
            }

            function onGoalScored() {
                score += 100;
                goalScored = true;
                goalTimer = 1.8;
                screenShake = 0.7;
                playGoalSound();
                spawnParticles(GAME_W / 2, 55, 60, '#ffdd00', 250, 1.2);
                spawnParticles(GAME_W / 2, 55, 40, '#ffffff', 200, 1.0);
                spawnParticles(GAME_W / 2, 55, 25, '#ff6600', 180, 0.9);
                if (score % 500 === 0) {
                    difficulty++;
                    lives = Math.min(lives + 1, 5);
                }
                // Clear defenders
                defenders = [];
                defenderSpawnTimer = 0;
                resetPlayer();
                shotBall = null;
            }

            function onTackle() {
                if (invincibleTimer > 0) return;
                lives--;
                screenShake = 0.4;
                playTackleSound();
                spawnParticles(player.x, player.y, 25, '#ff4444', 180, 0.5);
                if (lives <= 0) {
                    gameState = STATE.GAMEOVER;
                    gameOverTimer = 0;
                    playWhistleSound();
                    spawnParticles(player.x, player.y, 50, '#ff0000', 300, 1.5);
                    spawnParticles(player.x, player.y, 30, '#ff8800', 250, 1.2);
                } else {
                    resetPlayer();
                    shotBall = null;
                }
            }

            function resetGame() {
                score = 0;
                lives = 3;
                difficulty = 1;
                defenders = [];
                defenderSpawnTimer = 0;
                particles = [];
                shotBall = null;
                screenShake = 0;
                goalScored = false;
                goalTimer = 0;
                invincibleTimer = 0;
                gameOverTimer = 0;
                chargeLevel = 0;
                chargeDisplay = 0;
                goalkeeperX = GAME_W / 2;
                goalkeeperTargetX = GAME_W / 2;
                goalkeeperDive = null;
                goalkeeperStun = 0;
                resetPlayer();
                gameState = STATE.PLAYING;
                keys['charging'] = false;
                keys['chargeReleased'] = false;
                chargeZoneActive = false;
                targetMoveX = null;
                targetMoveY = null;
            }

            // Update
            function update(dt) {
                const dtClamped = Math.min(dt, 0.1);

                if (gameState === STATE.GAMEOVER) {
                    gameOverTimer += dtClamped;
                    restartBlink += dtClamped;
                    screenShake = Math.max(0, screenShake - dtClamped * 3);
                    // Update remaining particles
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx * dtClamped;
                        p.y += p.vy * dtClamped;
                        p.life -= dtClamped;
                        if (p.life <= 0) particles.splice(i, 1);
                    }
                    if (gameOverTimer > 2.5 && (keys[' '] || keys['Spacebar'] || keys['Enter'] || mouseDown || chargeZoneActive ||
                            moveZoneActive)) {
                        resetGame();
                    }
                    return;
                }

                // Update screen shake
                if (screenShake > 0) {
                    screenShakeX = (Math.random() - 0.5) * screenShake * 22;
                    screenShakeY = (Math.random() - 0.5) * screenShake * 22;
                    screenShake = Math.max(0, screenShake - dtClamped * 5);
                } else {
                    screenShakeX = 0;
                    screenShakeY = 0;
                }

                // Goal scored timer
                if (goalScored) {
                    goalTimer -= dtClamped;
                    if (goalTimer <= 0) {
                        goalScored = false;
                        goalTimer = 0;
                    }
                }

                // Invincibility
                if (invincibleTimer > 0) invincibleTimer -= dtClamped;

                // Goalkeeper stun
                if (goalkeeperStun > 0) goalkeeperStun -= dtClamped;

                // Update goalkeeper
                if (goalkeeperStun <= 0) {
                    if (goalkeeperDive) {
                        goalkeeperX += goalkeeperDive.speed * dtClamped;
                        if (Math.abs(goalkeeperX - goalkeeperDive.target) < 3) {
                            goalkeeperDive = null;
                            goalkeeperStun = 0.4;
                        }
                    } else if (shotBall && shotBall.y < 120) {
                        // Dive toward ball
                        const diveTarget = Math.max(GAME_W * 0.22, Math.min(GAME_W * 0.78, shotBall.targetX));
                        goalkeeperDive = {
                            target: diveTarget,
                            speed: (diveTarget > goalkeeperX ? 1 : -1) * (280 + Math.random() * 200)
                        };
                    } else {
                        // Patrol
                        if (Math.abs(goalkeeperX - goalkeeperTargetX) < 5) {
                            goalkeeperTargetX = GAME_W * 0.22 + Math.random() * GAME_W * 0.56;
                        }
                        const gkdx = goalkeeperTargetX - goalkeeperX;
                        goalkeeperX += Math.sign(gkdx) * Math.min(Math.abs(gkdx), 100 * dtClamped);
                    }
                }
                goalkeeperX = Math.max(GAME_W * 0.18, Math.min(GAME_W * 0.82, goalkeeperX));

                // Update shot ball
                if (shotBall) {
                    shotBall.x += shotBall.vx * dtClamped;
                    shotBall.y += shotBall.vy * dtClamped;
                    shotBall.trail.push({ x: shotBall.x, y: shotBall.y, life: 0.12 });
                    for (let i = shotBall.trail.length - 1; i >= 0; i--) {
                        shotBall.trail[i].life -= dtClamped;
                        if (shotBall.trail[i].life <= 0) shotBall.trail.splice(i, 1);
                    }
                    // Check if ball reached goal line
                    if (shotBall.y <= 35) {
                        const goalMouthMin = GAME_W * 0.24;
                        const goalMouthMax = GAME_W * 0.76;
                        const gkSaveZone = 38;
                        if (shotBall.x > goalMouthMin && shotBall.x < goalMouthMax) {
                            const gkDist = Math.abs(goalkeeperX - shotBall.x);
                            const saveChance = gkDist < gkSaveZone && shotBall.power < 0.75 && Math.random() <
                                (1 - shotBall.power) * 0.85;
                            if (saveChance && goalkeeperStun <= 0) {
                                // Saved!
                                spawnParticles(shotBall.x, 40, 15, '#ffffff', 120, 0.4);
                                spawnParticles(shotBall.x, 40, 8, '#88ccff', 100, 0.35);
                                playTackleSound();
                                shotBall = null;
                                goalkeeperDive = null;
                                goalkeeperStun = 0.35;
                            } else {
                                // GOAL!
                                onGoalScored();
                            }
                        } else {
                            // Missed the goal
                            spawnParticles(shotBall.x, 30, 10, '#ffffff', 80, 0.3);
                            shotBall = null;
                        }
                    }
                    // Check if ball went off screen
                    if (shotBall && (shotBall.y < -30 || shotBall.y > GAME_H + 30 || shotBall.x < -30 || shotBall.x > GAME_W +
                            30)) {
                        shotBall = null;
                    }
                }

                // Charge mechanic
                if (keys['charging'] && !shotBall && player.y < 250 && invincibleTimer < 1.0) {
                    const chargeDuration = (performance.now() - (keys['chargeStart'] || performance.now())) / 1000;
                    chargeLevel = Math.min(1, chargeDuration / 2.2);
                    chargeDisplay = chargeDisplay + (chargeLevel - chargeDisplay) * Math.min(1, dtClamped * 12);
                    if (chargeLevel > 0.1 && Math.random() < chargeLevel * 0.7) {
                        playChargeSound(chargeLevel);
                    }
                } else if (!keys['charging'] && !shotBall) {
                    if (keys['chargeReleased'] && chargeLevel > 0.08 && player.y < 250 && invincibleTimer < 1.0) {
                        fireShot();
                    }
                    chargeLevel = Math.max(0, chargeLevel - dtClamped * 3);
                    chargeDisplay = chargeDisplay + (chargeLevel - chargeDisplay) * Math.min(1, dtClamped * 10);
                    if (chargeLevel < 0.02) chargeLevel = 0;
                }
                keys['chargeReleased'] = false;
                if (!keys['charging'] && chargeLevel < 0.01) {
                    chargeLevel = 0;
                    chargeDisplay = 0;
                }

                // Player movement
                let moveX = 0;
                let moveY = 0;
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveX = -1;
                if (keys['ArrowRight'] || keys['d'] || keys['D']) moveX += 1;
                if (keys['ArrowUp'] || keys['w'] || keys['W']) moveY = -1;
                if (keys['ArrowDown'] || keys['s'] || keys['S']) moveY += 1;

                // Touch/mouse movement
                if (targetMoveX !== null && targetMoveY !== null) {
                    const dx = targetMoveX - player.x;
                    const dy = targetMoveY - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 8) {
                        moveX = dx / dist;
                        moveY = dy / dist;
                    }
                }

                // Normalize and apply movement
                const moveMag = Math.sqrt(moveX * moveX + moveY * moveY);
                if (moveMag > 1) {
                    moveX /= moveMag;
                    moveY /= moveMag;
                }
                const effectiveSpeed = player.speed * (keys['charging'] && chargeLevel > 0.1 ? 0.45 : 1);
                player.x += moveX * effectiveSpeed * dtClamped;
                player.y += moveY * effectiveSpeed * dtClamped;

                // Clamp player to pitch
                player.x = Math.max(player.radius + 5, Math.min(GAME_W - player.radius - 5, player.x));
                player.y = Math.max(player.radius + 5, Math.min(GAME_H - player.radius - 5, player.y));

                // Spawn defenders
                defenderSpawnTimer -= dtClamped;
                const spawnInterval = Math.max(0.6, 2.2 - difficulty * 0.25);
                if (defenderSpawnTimer <= 0 && defenders.length < 4 + difficulty) {
                    spawnDefender();
                    defenderSpawnTimer = spawnInterval * (0.7 + Math.random() * 0.6);
                }

                // Update defenders
                for (let i = defenders.length - 1; i >= 0; i--) {
                    const d = defenders[i];
                    // Move toward player with some randomness
                    const dx = player.x - d.x;
                    const dy = player.y - d.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const nx = dist > 0 ? dx / dist : 0;
                    const ny = dist > 0 ? dy / dist : 0;
                    const chaseSpeed = d.vx === 0 && d.vy === 0 ? 80 : Math.sqrt(d.vx * d.vx + d.vy * d.vy);
                    const targetVx = nx * chaseSpeed;
                    const targetVy = ny * chaseSpeed;
                    d.vx += (targetVx - d.vx) * Math.min(1, dtClamped * 3);
                    d.vy += (targetVy - d.vy) * Math.min(1, dtClamped * 3);
                    d.x += d.vx * dtClamped;
                    d.y += d.vy * dtClamped;

                    // Keep defenders on or near the pitch
                    if (d.x < -40 || d.x > GAME_W + 40 || d.y < -40 || d.y > GAME_H + 40) {
                        defenders.splice(i, 1);
                        continue;
                    }

                    // Check collision with player
                    const pdx = player.x - d.x;
                    const pdy = player.y - d.y;
                    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pdist < player.radius + d.radius && invincibleTimer <= 0) {
                        onTackle();
                        // Push defender back
                        d.vx = -d.vx * 1.5;
                        d.vy = -d.vy * 1.5;
                        d.x += d.vx * 0.3;
                        d.y += d.vy * 0.3;
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dtClamped;
                    p.y += p.vy * dtClamped;
                    p.life -= dtClamped;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Limit particles
                if (particles.length > 200) particles.splice(0, particles.length - 200);
            }

            // Render
            function drawPitch() {
                // Grass
                const grassGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
                grassGrad.addColorStop(0, '#3a8c3f');
                grassGrad.addColorStop(0.3, '#4a9c4f');
                grassGrad.addColorStop(0.6, '#358538');
                grassGrad.addColorStop(1, '#2d7530');
                ctx.fillStyle = grassGrad;
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                // Grass stripes
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                for (let i = 0; i < GAME_W; i += 28) {
                    if (Math.floor(i / 28) % 2 === 0) {
                        ctx.fillRect(i, 0, 28, GAME_H);
                    }
                }

                // Pitch outline
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 3;
                ctx.strokeRect(15, 15, GAME_W - 30, GAME_H - 30);

                // Center circle
                ctx.beginPath();
                ctx.arc(GAME_W / 2, GAME_H * 0.55, 70, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Center line
                ctx.beginPath();
                ctx.moveTo(15, GAME_H * 0.55);
                ctx.lineTo(GAME_W - 15, GAME_H * 0.55);
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Penalty area (top)
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 2.5;
                ctx.strokeRect(GAME_W * 0.15, 15, GAME_W * 0.7, 140);

                // Goal area (top)
                ctx.strokeStyle = 'rgba(255,255,255,0.55)';
                ctx.lineWidth = 2;
                ctx.strokeRect(GAME_W * 0.28, 15, GAME_W * 0.44, 60);

                // Penalty spot
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(GAME_W / 2, 140, 4, 0, Math.PI * 2);
                ctx.fill();

                // Goal posts
                const goalLeft = GAME_W * 0.24;
                const goalRight = GAME_W * 0.76;
                const goalY = 30;

                // Goal net
                ctx.fillStyle = 'rgba(220,220,220,0.25)';
                ctx.fillRect(goalLeft - 5, 8, goalRight - goalLeft + 10, 28);
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1;
                for (let gx = goalLeft; gx <= goalRight; gx += 12) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 10);
                    ctx.lineTo(gx, 34);
                    ctx.stroke();
                }
                for (let gy = 10; gy <= 34; gy += 10) {
                    ctx.beginPath();
                    ctx.moveTo(goalLeft, gy);
                    ctx.lineTo(goalRight, gy);
                    ctx.stroke();
                }

                // Posts
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(goalLeft - 5, goalY - 5, 10, 30);
                ctx.fillRect(goalRight - 5, goalY - 5, 10, 30);
                ctx.fillRect(goalLeft - 3, goalY - 5, goalRight - goalLeft + 6, 8);

                // Post glow
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(goalLeft - 4, goalY - 4, 8, 26);
                ctx.fillRect(goalRight - 4, goalY - 4, 8, 26);
                ctx.shadowBlur = 0;

                // Shooting zone indicator (subtle)
                ctx.fillStyle = 'rgba(255,200,50,0.06)';
                ctx.fillRect(20, 150, GAME_W - 40, 100);
                ctx.strokeStyle = 'rgba(255,200,50,0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 16]);
                ctx.strokeRect(20, 150, GAME_W - 40, 100);
                ctx.setLineDash([]);
            }

            function drawPlayerFigure(x, y, radius, kitMain, kitShorts, skinTone, hairColor, number, isStar) {
                ctx.save();
                ctx.translate(x, y);

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath();
                ctx.ellipse(0, radius * 0.6, radius * 0.7, radius * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();

                const scale = radius / 18;
                const s = scale;

                // Legs
                ctx.fillStyle = skinTone;
                ctx.fillRect(-5 * s, 4 * s, 4 * s, 10 * s);
                ctx.fillRect(1 * s, 4 * s, 4 * s, 10 * s);

                // Socks
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-5 * s, 10 * s, 4 * s, 5 * s);
                ctx.fillRect(1 * s, 10 * s, 4 * s, 5 * s);

                // Boots
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(-6 * s, 14 * s, 6 * s, 4 * s);
                ctx.fillRect(0 * s, 14 * s, 6 * s, 4 * s);
                ctx.fillRect(-7 * s, 15 * s, 4 * s, 3 * s);
                ctx.fillRect(3 * s, 15 * s, 4 * s, 3 * s);

                // Shorts
                ctx.fillStyle = kitShorts;
                ctx.fillRect(-6 * s, 1 * s, 12 * s, 7 * s);

                // Body/shirt
                ctx.fillStyle = kitMain;
                ctx.fillRect(-7 * s, -8 * s, 14 * s, 11 * s);

                // Number on shirt
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${7*s}px 'Arial Black', sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(number, 0, 0 * s);

                // Arms
                ctx.fillStyle = kitMain;
                ctx.fillRect(-10 * s, -7 * s, 4 * s, 9 * s);
                ctx.fillRect(6 * s, -7 * s, 4 * s, 9 * s);

                // Hands
                ctx.fillStyle = skinTone;
                ctx.fillRect(-11 * s, 0 * s, 5 * s, 3 * s);
                ctx.fillRect(6 * s, 0 * s, 5 * s, 3 * s);

                // Head
                ctx.fillStyle = skinTone;
                ctx.beginPath();
                ctx.arc(0, -12 * s, 7 * s, 0, Math.PI * 2);
                ctx.fill();

                // Hair
                ctx.fillStyle = hairColor;
                ctx.beginPath();
                ctx.arc(0, -13 * s, 7.5 * s, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-8 * s, -16 * s, 16 * s, 5 * s);

                // Eyes
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-2.5 * s, -13 * s, 2 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(2.5 * s, -13 * s, 2 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(-2.5 * s, -13 * s, 1 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(2.5 * s, -13 * s, 1 * s, 0, Math.PI * 2);
                ctx.fill();

                // Star glow for Ferran
                if (isStar) {
                    ctx.shadowColor = '#ffdd00';
                    ctx.shadowBlur = 12 + Math.sin(performance.now() * 0.005) * 6;
                    ctx.strokeStyle = 'rgba(255,220,50,0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, radius + 3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }

            function drawGoalkeeper(x, y) {
                ctx.save();
                ctx.translate(x, y);
                const s = 0.9;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath();
                ctx.ellipse(0, 12, 14, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs
                ctx.fillStyle = '#e8c39e';
                ctx.fillRect(-5, 3, 4, 9);
                ctx.fillRect(1, 3, 4, 9);

                // Socks
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(-5, 8, 4, 5);
                ctx.fillRect(1, 8, 4, 5);

                // Boots
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(-6, 12, 6, 4);
                ctx.fillRect(0, 12, 6, 4);

                // Shorts
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(-6, 0, 12, 6);

                // Jersey (goalkeeper - bright)
                ctx.fillStyle = '#33cc55';
                ctx.fillRect(-7, -8, 14, 10);

                // Number
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 7px 'Arial Black', sans-serif";
                ctx.textAlign = 'center';
                ctx.fillText('1', 0, -1);

                // Arms (extended for goalkeeping)
                ctx.fillStyle = '#33cc55';
                ctx.fillRect(-12, -6, 5, 8);
                ctx.fillRect(7, -6, 5, 8);

                // Gloves
                ctx.fillStyle = '#ffdd00';
                ctx.fillRect(-14, -7, 7, 5);
                ctx.fillRect(7, -7, 7, 5);

                // Head
                ctx.fillStyle = '#e8c39e';
                ctx.beginPath();
                ctx.arc(0, -11, 7, 0, Math.PI * 2);
                ctx.fill();

                // Cap
                ctx.fillStyle = '#33cc55';
                ctx.beginPath();
                ctx.arc(0, -12, 7.5, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-8, -14, 16, 3);
                ctx.fillRect(-3, -16, 6, 3);

                ctx.restore();
            }

            function render() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);

                ctx.save();
                ctx.translate(screenShakeX, screenShakeY);

                drawPitch();

                // Draw shooting zone glow when player is in it
                if (player.y < 250 && !shotBall && invincibleTimer < 1.0) {
                    const zoneAlpha = 0.08 + (keys['charging'] ? chargeLevel * 0.18 : 0);
                    ctx.fillStyle = `rgba(255,200,50,${zoneAlpha})`;
                    ctx.fillRect(20, 150, GAME_W - 40, 100);
                }

                // Draw defenders
                for (const d of defenders) {
                    drawPlayerFigure(d.x, d.y, d.radius, d.kitMain, d.kitShorts, d.skinTone, d.hairColor, d.number, false);
                }

                // Draw goalkeeper
                drawGoalkeeper(goalkeeperX, 42);

                // Draw Ferran (with invincibility flicker)
                if (invincibleTimer <= 0 || Math.floor(invincibleTimer * 15) % 2 === 0) {
                    drawPlayerFigure(player.x, player.y, player.radius, player.kitMain, player.kitShorts, player.skinTone,
                        player.hairColor, player.number, true);
                }

                // Draw charge indicator around Ferran
                if (chargeDisplay > 0.03 && !shotBall && invincibleTimer < 1.0) {
                    ctx.strokeStyle = `rgba(255,${200 - chargeDisplay * 150},${30 - chargeDisplay * 20},${0.4 + chargeDisplay * 0.6})`;
                    ctx.lineWidth = 3 + chargeDisplay * 5;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 8 + chargeDisplay * 12, 0, Math.PI * 2 * chargeDisplay);
                    ctx.stroke();

                    // Inner glow
                    ctx.shadowColor = `rgba(255,180,20,${chargeDisplay * 0.8})`;
                    ctx.shadowBlur = 15 + chargeDisplay * 30;
                    ctx.strokeStyle = `rgba(255,220,80,${chargeDisplay * 0.7})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Draw "FERRAAAAAANNNNNNNNNNNN" text during charge
                if (chargeDisplay > 0.04 && !shotBall && invincibleTimer < 1.0) {
                    const numAs = Math.floor(1 + chargeDisplay * 9);
                    const numNs = Math.floor(1 + chargeDisplay * 12);
                    const numExcl = Math.floor(chargeDisplay * 6);
                    let shoutText = 'FERR';
                    for (let i = 0; i < numAs; i++) shoutText += 'A';
                    shoutText += 'NN';
                    for (let i = 0; i < numNs; i++) shoutText += 'N';
                    for (let i = 0; i < numExcl; i++) shoutText += '!';

                    const fontSize = 14 + chargeDisplay * 38;
                    const textY = player.y - player.radius - 22 - chargeDisplay * 18;
                    const alpha = 0.5 + chargeDisplay * 0.5;
                    const hueShift = chargeDisplay * 30;

                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.font = `bold ${fontSize}px 'Arial Black', 'Impact', sans-serif`;

                    // Text shadow/glow
                    ctx.shadowColor = `rgba(255,${180-hueShift},${30},${alpha})`;
                    ctx.shadowBlur = 8 + chargeDisplay * 20;
                    ctx.fillStyle = `rgba(255,${220 - hueShift},${50 + hueShift},${alpha})`;
                    ctx.fillText(shoutText, player.x, textY);

                    // Second pass for brighter core
                    ctx.shadowBlur = 4 + chargeDisplay * 8;
                    ctx.fillStyle = `rgba(255,255,${200 - hueShift * 0.5},${alpha * 0.9})`;
                    ctx.fillText(shoutText, player.x, textY);
                    ctx.restore();

                    // Particles from text
                    if (chargeDisplay > 0.35 && Math.random() < chargeDisplay * 0.5) {
                        spawnParticles(player.x + (Math.random() - 0.5) * 60, textY - 10 + Math.random() * 20,
                            1, '#ffdd00', 40 + chargeDisplay * 80, 0.25);
                    }
                }

                // Draw shot ball
                if (shotBall) {
                    // Trail
                    for (const t of shotBall.trail) {
                        const alpha = t.life / 0.12;
                        ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, 3 + alpha * 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Ball
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(shotBall.x, shotBall.y, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Glow
                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = 12 + shotBall.power * 20;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(shotBall.x, shotBall.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    // Pentagon pattern
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.arc(shotBall.x, shotBall.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw particles
                for (const p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = p.color;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Goal scored overlay
                if (goalScored && goalTimer > 0) {
                    const alpha = Math.min(1, goalTimer / 0.4);
                    const scale = 1 + (1.8 - goalTimer) * 0.6;
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.font = `bold ${48*scale}px 'Arial Black', 'Impact', sans-serif`;
                    ctx.shadowColor = 'rgba(255,200,20,0.9)';
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = `rgba(255,255,50,${alpha})`;
                    ctx.fillText('GOOOOOOL!', GAME_W / 2, GAME_H / 2 - 30);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.fillText('GOOOOOOL!', GAME_W / 2, GAME_H / 2 - 30);
                    ctx.restore();
                }

                ctx.restore(); // End screen shake

                // UI (outside shake)
                // Score
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(5, GAME_H - 50, 130, 44);
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 2;
                ctx.strokeRect(5, GAME_H - 50, 130, 44);
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 15px 'Arial Black', sans-serif";
                ctx.textAlign = 'left';
                ctx.fillText('⚽ ' + score, 16, GAME_H - 20);

                // Lives
                ctx.textAlign = 'right';
                let heartsStr = '';
                for (let i = 0; i < lives; i++) heartsStr += '❤️ ';
                ctx.fillText(heartsStr.trim(), GAME_W - 16, GAME_H - 20);

                // Difficulty indicator
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = "bold 11px 'Arial', sans-serif";
                ctx.textAlign = 'center';
                ctx.fillText('Level ' + difficulty, GAME_W / 2, GAME_H - 24);

                // Charge meter bar (when charging)
                if (chargeDisplay > 0.02 && !shotBall) {
                    const barW = 180;
                    const barH = 10;
                    const barX = GAME_W / 2 - barW / 2;
                    const barY = GAME_H - 62;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
                    const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                    grad.addColorStop(0, '#ff4400');
                    grad.addColorStop(0.5, '#ffaa00');
                    grad.addColorStop(1, '#ffdd00');
                    ctx.fillStyle = grad;
                    ctx.fillRect(barX, barY, barW * chargeDisplay, barH);
                    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(barX, barY, barW, barH);
                }

                // Game over screen
                if (gameState === STATE.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, GAME_W, GAME_H);

                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#ff3333';
                    ctx.font = "bold 40px 'Arial Black', 'Impact', sans-serif";
                    ctx.shadowColor = 'rgba(255,0,0,0.6)';
                    ctx.shadowBlur = 20;
                    ctx.fillText('GAME OVER', GAME_W / 2, GAME_H / 2 - 30);
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = '#ffffff';
                    ctx.font = "bold 18px 'Arial Black', sans-serif";
                    ctx.fillText('Final Score: ' + score, GAME_W / 2, GAME_H / 2 + 20);

                    if (gameOverTimer > 2.5) {
                        const blink = Math.sin(restartBlink * 6) > 0;
                        if (blink) {
                            ctx.fillStyle = '#ffdd00';
                            ctx.font = "bold 16px 'Arial Black', sans-serif";
                            ctx.fillText('TAP OR PRESS SPACE TO RESTART', GAME_W / 2, GAME_H / 2 + 60);
                        }
                    }
                }

                // Mobile control hints
                const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                if (isTouchDevice && gameState === STATE.PLAYING) {
                    // Draw subtle zone indicators
                    ctx.fillStyle = 'rgba(255,255,255,0.04)';
                    ctx.fillRect(0, GAME_H - 80, GAME_W * 0.55, 75);
                    ctx.fillStyle = 'rgba(255,100,30,0.06)';
                    ctx.fillRect(GAME_W * 0.55, GAME_H - 80, GAME_W * 0.45, 75);

                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.font = "bold 11px 'Arial', sans-serif";
                    ctx.textAlign = 'center';
                    ctx.fillText('👆 DRAG TO MOVE', GAME_W * 0.27, GAME_H - 8);
                    ctx.fillText('💥 HOLD TO SHOUT', GAME_W * 0.77, GAME_H - 8);
                }

                // Keyboard hints (desktop)
                if (!isTouchDevice && gameState === STATE.PLAYING && score === 0 && invincibleTimer < 0.5 && chargeLevel <
                    0.05) {
                    ctx.fillStyle = 'rgba(255,255,255,0.55)';
                    ctx.font = "bold 12px 'Arial', sans-serif";
                    ctx.textAlign = 'center';
                    ctx.fillText('ARROWS: Move | SPACE: Charge & Shoot FERRAAAAAANNNNNNNNNNNN!', GAME_W / 2, GAME_H - 8);
                }
            }

            // Game loop
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.15) dt = 0.15;
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // Initialize
            function init() {
                resetGame();
                gameState = STATE.PLAYING;
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }

            // Handle canvas click for audio context and game restart
            canvas.addEventListener('click', () => {
                getAudioContext();
                if (gameState === STATE.GAMEOVER && gameOverTimer > 2.5) {
                    resetGame();
                }
            });

            init();

            console.log('⚽ FERRAAAAAANNNNNNNNNNNN - Ready! Score some goals!');
        })();
    </script>
</body>
