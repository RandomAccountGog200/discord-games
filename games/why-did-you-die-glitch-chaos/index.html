<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WHY DID YOU DIE?! - Glitch Chaos</title>
    <style>
        :root {
            --bg: #0a0a0a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 400 / 700;
            image-rendering: auto;
            box-shadow: 0 0 40px rgba(255, 0, 80, 0.3), 0 0 80px rgba(0, 200, 255, 0.2);
            border-radius: 4px;
        }
        #container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // Game resolution
            const GW = 400;
            const GH = 700;
            canvas.width = GW;
            canvas.height = GH;

            // Audio
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playNoise(duration, volume, freqLow, freqHigh, type = 'bandpass') {
                if (!audioCtx) return;
                try {
                    const sr = audioCtx.sampleRate;
                    const len = Math.floor(sr * duration);
                    const buffer = audioCtx.createBuffer(1, len, sr);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < len; i++) {
                        data[i] = (Math.random() * 2 - 1) * volume * Math.max(0, 1 - i / len);
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = type;
                    filter.frequency.value = freqLow + Math.random() * (freqHigh - freqLow);
                    filter.Q.value = 1 + Math.random() * 3;
                    const gain = audioCtx.createGain();
                    gain.gain.value = volume;
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    source.start();
                } catch (e) { /* ignore */ }
            }

            function playHitSound() { playNoise(0.15, 0.6, 200, 800, 'bandpass');
                playNoise(0.1, 0.4, 80, 200, 'lowpass'); }

            function playDeathSound() { playNoise(0.35, 0.7, 400, 100, 'bandpass');
                playNoise(0.25, 0.5, 60, 60, 'lowpass'); }

            function playDodgeSound() { playNoise(0.06, 0.2, 600, 1200, 'highpass'); }

            function playRestartSound() { playNoise(0.1, 0.3, 300, 600, 'bandpass');
                playNoise(0.08, 0.4, 1000, 2000, 'highpass'); }

            // Game state
            const STATE = { PLAYING: 'playing', INVULNERABLE: 'invulnerable', GAMEOVER: 'gameover' };
            let gameState = STATE.PLAYING;
            let player = {
                x: GW / 2 - 15,
                y: GH - 100,
                w: 30,
                h: 34,
                speed: 280,
                vx: 0,
                targetX: GW / 2 - 15,
            };
            let objects = [];
            let particles = [];
            let glitchSlices = [];
            let lives = 3;
            let deathCount = 0;
            let score = 0;
            let survivalTime = 0;
            let invulnTimer = 0;
            let invulnDuration = 1.8;
            let shakeIntensity = 0;
            let shakeDuration = 0;
            let difficulty = 1;
            let spawnTimer = 0;
            let spawnInterval = 1.2;
            let deathFlashAlpha = 0;
            let deathTextTimer = 0;
            let deathTextY = 0;
            let globalGlitchTimer = 0;
            let globalGlitchCooldown = 0;
            let bgDots = [];
            let scanlineOffset = 0;
            let frameCount = 0;

            // Generate background dots
            for (let i = 0; i < 60; i++) {
                bgDots.push({
                    x: Math.random() * GW,
                    y: Math.random() * GH,
                    size: 0.5 + Math.random() * 1.5,
                    speed: 20 + Math.random() * 50,
                    alpha: 0.1 + Math.random() * 0.3,
                    flicker: Math.random() * Math.PI * 2,
                });
            }

            // Input
            let keys = {};
            let touchActive = false;
            let touchX = GW / 2;
            let useTouchControl = false;

            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') {
                    e.preventDefault();
                }
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (gameState === STATE.GAMEOVER) restartGame();
                }
                initAudio();
            });
            window.addEventListener('keyup', e => { keys[e.key] = false; });

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                initAudio();
                useTouchControl = true;
                touchActive = true;
                const rect = canvas.getBoundingClientRect();
                const scaleX = GW / rect.width;
                touchX = (e.touches[0].clientX - rect.left) * scaleX;
                if (gameState === STATE.GAMEOVER) restartGame();
            }, { passive: false });

            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (!touchActive) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = GW / rect.width;
                touchX = (e.touches[0].clientX - rect.left) * scaleX;
            }, { passive: false });

            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                touchActive = false;
            }, { passive: false });

            canvas.addEventListener('mousedown', e => {
                initAudio();
                useTouchControl = false;
                const rect = canvas.getBoundingClientRect();
                const scaleX = GW / rect.width;
                touchX = (e.clientX - rect.left) * scaleX;
                touchActive = true;
                if (gameState === STATE.GAMEOVER) restartGame();
            });
            canvas.addEventListener('mousemove', e => {
                if (!touchActive) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = GW / rect.width;
                touchX = (e.clientX - rect.left) * scaleX;
            });
            canvas.addEventListener('mouseup', () => { touchActive = false; });
            canvas.addEventListener('mouseleave', () => { touchActive = false; });

            function restartGame() {
                playRestartSound();
                player.x = GW / 2 - 15;
                player.y = GH - 100;
                player.vx = 0;
                player.targetX = player.x;
                objects = [];
                particles = [];
                glitchSlices = [];
                lives = 3;
                deathCount = 0;
                score = 0;
                survivalTime = 0;
                invulnTimer = 0;
                shakeIntensity = 0;
                shakeDuration = 0;
                difficulty = 1;
                spawnTimer = 0;
                spawnInterval = 1.2;
                deathFlashAlpha = 0;
                deathTextTimer = 0;
                deathTextY = 0;
                globalGlitchTimer = 0;
                globalGlitchCooldown = 0;
                gameState = STATE.PLAYING;
            }

            function spawnObject() {
                const types = ['error', 'glitch', 'warning', 'debug', 'critical'];
                const weights = [35, 30, 20, 12, 3];
                const total = weights.reduce((a, b) => a + b, 0);
                let roll = Math.random() * total;
                let typeIdx = 0;
                let cumulative = 0;
                for (let i = 0; i < types.length; i++) {
                    cumulative += weights[i];
                    if (roll <= cumulative) { typeIdx = i; break; }
                }
                const type = types[typeIdx];
                const baseSpeed = 140 + difficulty * 18;
                let w, h, speed, color, text, subColor;

                switch (type) {
                    case 'error':
                        w = 30 + Math.random() * 20;
                        h = 20 + Math.random() * 15;
                        speed = baseSpeed + Math.random() * 80;
                        color = '#ff1744';
                        subColor = '#ff616f';
                        text = ['ERR', '404', 'NULL', 'FATAL', 'FAIL', '0xDEAD'][Math.floor(Math.random() * 6)];
                        break;
                    case 'glitch':
                        w = 16 + Math.random() * 18;
                        h = 16 + Math.random() * 18;
                        speed = baseSpeed + 40 + Math.random() * 120;
                        color = '#d500f9';
                        subColor = '#e040fb';
                        text = ['☠', '⚠', '⬡', '◈', '⎔', '⬢'][Math.floor(Math.random() * 6)];
                        break;
                    case 'warning':
                        w = 28 + Math.random() * 16;
                        h = 26 + Math.random() * 14;
                        speed = baseSpeed + Math.random() * 50;
                        color = '#ffea00';
                        subColor = '#ffab00';
                        text = ['WARN', '!!', 'ALERT', 'HALT'][Math.floor(Math.random() * 4)];
                        break;
                    case 'debug':
                        w = 35 + Math.random() * 25;
                        h = 16 + Math.random() * 12;
                        speed = baseSpeed + 20 + Math.random() * 90;
                        color = '#00e676';
                        subColor = '#69f0ae';
                        text = ['DEBUG', 'LOG:', 'TRACE', 'INFO:', 'DUMP'][Math.floor(Math.random() * 5)];
                        break;
                    case 'critical':
                        w = 44 + Math.random() * 20;
                        h = 28 + Math.random() * 16;
                        speed = baseSpeed - 20 + Math.random() * 40;
                        color = '#ff0000';
                        subColor = '#ff5252';
                        text = ['CRITICAL', 'KERNEL', 'PANIC', 'ABORT', 'SEGV'][Math.floor(Math.random() * 4)];
                        break;
                    default:
                        w = 30;
                        h = 20;
                        speed = baseSpeed + 60;
                        color = '#ff1744';
                        subColor = '#ff616f';
                        text = 'ERR';
                }

                const x = Math.random() * (GW - w - 10) + 5;
                objects.push({
                    x,
                    y: -h - Math.random() * 60,
                    w,
                    h,
                    speed,
                    color,
                    subColor,
                    text,
                    type,
                    rotation: (Math.random() - 0.5) * 0.3,
                    rotSpeed: (Math.random() - 0.5) * 0.04,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.02 + Math.random() * 0.06,
                    wobbleAmp: 3 + Math.random() * 12,
                    trail: [],
                    glitchOffset: 0,
                    glitchTimer: 0,
                });
            }

            function spawnParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 300;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - Math.random() * 150,
                        life: 0.3 + Math.random() * 0.7,
                        maxLife: 0.3 + Math.random() * 0.7,
                        color,
                        size: 1 + Math.random() * 4,
                    });
                }
            }

            function addGlitchSlice() {
                const sliceY = Math.random() * GH;
                const sliceH = 4 + Math.random() * 28;
                const offsetX = (Math.random() - 0.5) * 50;
                glitchSlices.push({
                    y: sliceY,
                    h: sliceH,
                    offsetX,
                    life: 0.06 + Math.random() * 0.12,
                    maxLife: 0.06 + Math.random() * 0.12,
                });
            }

            function hitPlayer(obj) {
                if (gameState === STATE.GAMEOVER) return;
                if (gameState === STATE.INVULNERABLE) return;

                deathCount++;
                lives--;
                playHitSound();
                shakeIntensity = 14;
                shakeDuration = 0.4;
                deathFlashAlpha = 0.9;
                deathTextTimer = 1.5;
                deathTextY = player.y - 40;
                spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff1744', 35);
                spawnParticles(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.color, 20);

                // Add multiple glitch slices
                for (let i = 0; i < 6; i++) addGlitchSlice();
                globalGlitchCooldown = 0.5;

                if (lives <= 0) {
                    gameState = STATE.GAMEOVER;
                    playDeathSound();
                    shakeIntensity = 22;
                    shakeDuration = 0.7;
                    deathFlashAlpha = 1;
                    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ffffff', 60);
                    for (let i = 0; i < 12; i++) addGlitchSlice();
                } else {
                    gameState = STATE.INVULNERABLE;
                    invulnTimer = invulnDuration;
                }
            }

            function update(dt) {
                if (gameState === STATE.GAMEOVER) {
                    // Still update particles and shake
                    if (shakeDuration > 0) {
                        shakeDuration -= dt;
                        shakeIntensity *= Math.pow(0.02, dt);
                        if (shakeDuration <= 0) shakeIntensity = 0;
                    }
                    if (deathFlashAlpha > 0) deathFlashAlpha = Math.max(0, deathFlashAlpha - dt * 2.5);
                    if (deathTextTimer > 0) deathTextTimer -= dt;
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.vy += 300 * dt;
                        p.life -= dt;
                        if (p.life <= 0) particles.splice(i, 1);
                    }
                    for (let i = glitchSlices.length - 1; i >= 0; i--) {
                        glitchSlices[i].life -= dt;
                        if (glitchSlices[i].life <= 0) glitchSlices.splice(i, 1);
                    }
                    return;
                }

                const effectiveDt = Math.min(dt, 0.1);
                survivalTime += effectiveDt;
                score = Math.floor(survivalTime * 10);
                difficulty = 1 + Math.floor(survivalTime / 12);

                // Update invulnerability
                if (gameState === STATE.INVULNERABLE) {
                    invulnTimer -= effectiveDt;
                    if (invulnTimer <= 0) {
                        gameState = STATE.PLAYING;
                        invulnTimer = 0;
                    }
                }

                // Update player movement
                let moveDir = 0;
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveDir = -1;
                if (keys['ArrowRight'] || keys['d'] || keys['D']) moveDir = 1;

                if (touchActive && useTouchControl) {
                    const targetX = touchX - player.w / 2;
                    const diff = targetX - player.x;
                    if (Math.abs(diff) > 2) {
                        moveDir = Math.sign(diff);
                        player.targetX = targetX;
                    } else {
                        moveDir = 0;
                        player.targetX = player.x;
                    }
                } else if (touchActive) {
                    const targetX = touchX - player.w / 2;
                    player.targetX = targetX;
                    const diff = targetX - player.x;
                    if (Math.abs(diff) > 2) moveDir = Math.sign(diff);
                    else moveDir = 0;
                } else if (!useTouchControl && moveDir === 0 && !keys['ArrowLeft'] && !keys['ArrowRight'] && !keys['a'] && !keys['d'] && !keys['A'] && !keys['D']) {
                    player.targetX = player.x;
                }

                if (moveDir !== 0) {
                    player.targetX = player.x + moveDir * player.speed * effectiveDt;
                    player.targetX = Math.max(5, Math.min(GW - player.w - 5, player.targetX));
                }
                if (touchActive && useTouchControl) {
                    player.targetX = Math.max(5, Math.min(GW - player.w - 5, touchX - player.w / 2));
                }
                player.x += (player.targetX - player.x) * Math.min(1, 18 * effectiveDt);
                player.x = Math.max(5, Math.min(GW - player.w - 5, player.x));
                player.vx = (player.targetX - player.x) * 10;

                // Update spawn timer
                spawnInterval = Math.max(0.18, 1.2 - difficulty * 0.08);
                spawnTimer += effectiveDt;
                while (spawnTimer >= spawnInterval) {
                    spawnTimer -= spawnInterval;
                    spawnObject();
                    if (Math.random() < 0.25 + difficulty * 0.03) spawnObject();
                }

                // Update objects
                for (let i = objects.length - 1; i >= 0; i--) {
                    const obj = objects[i];
                    obj.y += obj.speed * effectiveDt;
                    obj.wobble += obj.wobbleSpeed;
                    obj.rotation += obj.rotSpeed;
                    obj.glitchTimer += effectiveDt;
                    if (obj.glitchTimer > 0.04 + Math.random() * 0.08) {
                        obj.glitchTimer = 0;
                        obj.glitchOffset = (Math.random() - 0.5) * 8;
                    }
                    // Trail
                    if (frameCount % 2 === 0) {
                        obj.trail.push({ x: obj.x + obj.w / 2, y: obj.y + obj.h / 2, life: 0.15, color: obj.color });
                    }
                    for (let t = obj.trail.length - 1; t >= 0; t--) {
                        obj.trail[t].life -= effectiveDt;
                        if (obj.trail[t].life <= 0) obj.trail.splice(t, 1);
                    }

                    // Check collision with player
                    if (gameState !== STATE.INVULNERABLE && gameState !== STATE.GAMEOVER) {
                        const px = player.x + 4;
                        const py = player.y + 4;
                        const pw = player.w - 8;
                        const ph = player.h - 8;
                        const ox = obj.x + 3;
                        const oy = obj.y + 3;
                        const ow = obj.w - 6;
                        const oh = obj.h - 6;
                        if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
                            hitPlayer(obj);
                            objects.splice(i, 1);
                            continue;
                        }
                    }

                    // Check near miss
                    const nearMissDist = 25;
                    const pcx = player.x + player.w / 2;
                    const pcy = player.y + player.h / 2;
                    const ocx = obj.x + obj.w / 2;
                    const ocy = obj.y + obj.h / 2;
                    const dist = Math.hypot(pcx - ocx, pcy - ocy);
                    if (dist < nearMissDist && obj.y > player.y - 20 && !obj.nearMissTriggered && gameState !== STATE.GAMEOVER && gameState !== STATE.INVULNERABLE) {
                        obj.nearMissTriggered = true;
                        if (Math.random() < 0.3) playDodgeSound();
                    }

                    // Remove if off screen
                    if (obj.y > GH + 80) {
                        objects.splice(i, 1);
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * effectiveDt;
                    p.y += p.vy * effectiveDt;
                    p.vy += 250 * effectiveDt;
                    p.life -= effectiveDt;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Update glitch slices
                for (let i = glitchSlices.length - 1; i >= 0; i--) {
                    glitchSlices[i].life -= effectiveDt;
                    if (glitchSlices[i].life <= 0) glitchSlices.splice(i, 1);
                }

                // Update shake
                if (shakeDuration > 0) {
                    shakeDuration -= effectiveDt;
                    shakeIntensity *= Math.pow(0.015, effectiveDt);
                    if (shakeDuration <= 0) shakeIntensity = 0;
                }

                // Update death flash
                if (deathFlashAlpha > 0) deathFlashAlpha = Math.max(0, deathFlashAlpha - effectiveDt * 3);
                if (deathTextTimer > 0) deathTextTimer -= effectiveDt;

                // Global glitch
                globalGlitchCooldown -= effectiveDt;
                if (globalGlitchCooldown <= 0 && Math.random() < 0.04 + difficulty * 0.006) {
                    addGlitchSlice();
                    globalGlitchCooldown = 0.3 + Math.random() * 1.5;
                }

                // Update background dots
                for (const dot of bgDots) {
                    dot.y += dot.speed * effectiveDt;
                    if (dot.y > GH + 10) { dot.y = -10;
                        dot.x = Math.random() * GW; }
                    dot.flicker += effectiveDt * (3 + Math.random() * 8);
                }
                scanlineOffset = (scanlineOffset + effectiveDt * 40) % 4;
            }

            function drawPlayer() {
                if (gameState === STATE.GAMEOVER) return;
                const px = player.x;
                const py = player.y;
                const pw = player.w;
                const ph = player.h;

                // Check if blinking during invulnerability
                if (gameState === STATE.INVULNERABLE && Math.floor(invulnTimer * 12) % 2 === 0) {
                    ctx.globalAlpha = 0.35;
                }

                ctx.save();
                ctx.translate(px + pw / 2, py + ph / 2);

                // Glitch offset occasionally
                let gOffX = 0,
                    gOffY = 0;
                if (gameState === STATE.INVULNERABLE && Math.random() < 0.5) {
                    gOffX = (Math.random() - 0.5) * 6;
                    gOffY = (Math.random() - 0.5) * 4;
                }
                ctx.translate(gOffX, gOffY);

                // Body glow
                const glowGrad = ctx.createRadialGradient(0, 0, pw * 0.3, 0, 0, pw * 0.9);
                glowGrad.addColorStop(0, 'rgba(0,220,255,0.7)');
                glowGrad.addColorStop(0.6, 'rgba(0,150,220,0.3)');
                glowGrad.addColorStop(1, 'rgba(0,80,180,0)');
                ctx.fillStyle = glowGrad;
                ctx.fillRect(-pw * 0.9, -ph * 0.9, pw * 1.8, ph * 1.8);

                // Main body
                const bodyGrad = ctx.createLinearGradient(-pw / 2, -ph / 2, pw / 2, ph / 2);
                bodyGrad.addColorStop(0, '#00e5ff');
                bodyGrad.addColorStop(0.4, '#0091ea');
                bodyGrad.addColorStop(0.7, '#01579b');
                bodyGrad.addColorStop(1, '#003c8f');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.roundRect(-pw / 2, -ph / 2, pw, ph, 6);
                ctx.fill();
                ctx.strokeStyle = '#80deea';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner highlight
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.beginPath();
                ctx.roundRect(-pw / 2 + 3, -ph / 2 + 3, pw - 6, ph / 2 - 2, 4);
                ctx.fill();

                // Eyes
                const eyeY = -ph * 0.15;
                const eyeSpacing = pw * 0.22;
                // Left eye
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-eyeSpacing, eyeY, pw * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#111111';
                ctx.beginPath();
                ctx.arc(-eyeSpacing, eyeY, pw * 0.09, 0, Math.PI * 2);
                ctx.fill();
                // Right eye
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(eyeSpacing, eyeY, pw * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#111111';
                ctx.beginPath();
                ctx.arc(eyeSpacing, eyeY, pw * 0.09, 0, Math.PI * 2);
                ctx.fill();

                // Mouth
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.arc(0, ph * 0.2, pw * 0.2, 0.15, Math.PI - 0.15);
                ctx.stroke();

                // Antenna / glitch spike
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -ph / 2);
                ctx.lineTo((Math.sin(frameCount * 0.3) * 4), -ph / 2 - 12);
                ctx.stroke();
                ctx.fillStyle = '#80deea';
                ctx.beginPath();
                ctx.arc((Math.sin(frameCount * 0.3) * 4), -ph / 2 - 12, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                ctx.globalAlpha = 1;
            }

            function drawObject(obj) {
                ctx.save();
                const cx = obj.x + obj.w / 2;
                const cy = obj.y + obj.h / 2;
                ctx.translate(cx, cy);
                ctx.rotate(obj.rotation);
                const wobX = Math.sin(obj.wobble) * obj.wobbleAmp;
                const wobY = Math.cos(obj.wobble * 1.3) * obj.wobbleAmp * 0.5;
                ctx.translate(wobX + obj.glitchOffset, wobY);

                // Glow
                const glowGrad = ctx.createRadialGradient(0, 0, obj.w * 0.2, 0, 0, obj.w * 0.7);
                glowGrad.addColorStop(0, obj.subColor);
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.fillRect(-obj.w * 0.7, -obj.h * 0.7, obj.w * 1.4, obj.h * 1.4);

                // Main block
                const grad = ctx.createLinearGradient(-obj.w / 2, -obj.h / 2, obj.w / 2, obj.h / 2);
                grad.addColorStop(0, obj.subColor);
                grad.addColorStop(0.5, obj.color);
                grad.addColorStop(1, 'rgba(0,0,0,0.6)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(-obj.w / 2, -obj.h / 2, obj.w, obj.h, 3);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Text
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.max(9, obj.h*0.45)}px "Courier New", monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(obj.text, 0, 1);

                // Glitch line inside
                if (Math.random() < 0.3) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(-obj.w / 2, (Math.random() - 0.5) * obj.h, obj.w, 2);
                }

                ctx.restore();

                // Draw trail
                for (const t of obj.trail) {
                    const alpha = t.life / 0.15;
                    ctx.fillStyle = t.color.replace(')', `,${alpha*0.6})`).replace('rgb',
                        'rgba');
                    if (t.color.startsWith('#')) {
                        ctx.fillStyle = t.color + Math.floor(alpha * 0.5 * 255).toString(16).padStart(2, '0');
                    }
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2 * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawHUD() {
                // Hearts
                const heartSize = 14;
                const heartY = 18;
                for (let i = 0; i < 3; i++) {
                    const hx = 15 + i * (heartSize + 8);
                    ctx.fillStyle = i < lives ? '#ff1744' : '#333333';
                    ctx.font = `${heartSize}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('♥', hx, heartY);
                    if (i < lives) {
                        ctx.fillStyle = 'rgba(255,50,50,0.4)';
                        ctx.fillText('♥', hx + 1, heartY + 1);
                    }
                }

                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.textAlign = 'right';
                ctx.fillText(`SCORE: ${score}`, GW - 15, 18);

                // Death counter
                if (deathCount > 0) {
                    ctx.fillStyle = '#ff5252';
                    ctx.font = 'bold 12px "Courier New", monospace';
                    ctx.textAlign = 'right';
                    ctx.fillText(`DEATHS: ${deathCount}`, GW - 15, 38);
                }

                // Difficulty indicator
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '9px "Courier New", monospace';
                ctx.textAlign = 'left';
                ctx.fillText(`LVL: ${difficulty}`, 15, 40);

                // "WHY DID YOU DIE?!" death text
                if (deathTextTimer > 0 && gameState !== STATE.GAMEOVER) {
                    const alpha = Math.min(1, deathTextTimer / 0.4);
                    const scale = 1 + (1.5 - Math.min(1.5, deathTextTimer)) * 0.4;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#ff1744';
                    ctx.font = `bold ${28*scale}px "Courier New", monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const ty = deathTextY - (1.5 - deathTextTimer) * 60;
                    // Glitch offsets
                    ctx.fillText('WHY DID YOU DIE?!', GW / 2 + 3, ty + 2);
                    ctx.fillStyle = '#00e5ff';
                    ctx.fillText('WHY DID YOU DIE?!', GW / 2 - 2, ty - 1);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText('WHY DID YOU DIE?!', GW / 2, ty);
                    ctx.fillStyle = '#ff1744';
                    ctx.fillText(`x${deathCount}`, GW / 2, ty + 35);
                    ctx.restore();
                }
            }

            function drawScanlines() {
                ctx.fillStyle = 'rgba(0,0,0,0.04)';
                for (let y = scanlineOffset; y < GH; y += 3) {
                    ctx.fillRect(0, y, GW, 1);
                }
            }

            function drawBackground() {
                // Subtle grid
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x < GW; x += 30) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, GH);
                    ctx.stroke();
                }
                for (let y = 0; y < GH; y += 30) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(GW, y);
                    ctx.stroke();
                }

                // Background dots
                for (const dot of bgDots) {
                    const flickerAlpha = dot.alpha * (0.5 + 0.5 * Math.sin(dot.flicker));
                    ctx.fillStyle = `rgba(180,220,255,${flickerAlpha})`;
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function render() {
                ctx.clearRect(0, 0, GW, GH);

                // Background
                ctx.fillStyle = '#0d0d14';
                ctx.fillRect(0, 0, GW, GH);
                drawBackground();

                // Apply screen shake
                let shakeX = 0,
                    shakeY = 0;
                if (shakeIntensity > 0.3) {
                    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Draw objects
                for (const obj of objects) {
                    drawObject(obj);
                }

                // Draw player
                drawPlayer();

                // Draw particles
                for (const p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                    // Bright core
                    ctx.fillStyle = `rgba(255,255,255,${alpha*0.7})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();

                // Apply glitch slices (drawn after main content, affects everything)
                for (const slice of glitchSlices) {
                    const alpha = slice.life / slice.maxLife;
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(0, slice.y, GW, slice.h);
                    ctx.clip();
                    ctx.drawImage(canvas, slice.offsetX * alpha, 0);
                    ctx.restore();
                }

                // Death flash
                if (deathFlashAlpha > 0) {
                    ctx.fillStyle = `rgba(255,20,40,${deathFlashAlpha*0.5})`;
                    ctx.fillRect(0, 0, GW, GH);
                    // White flash center
                    const whiteAlpha = deathFlashAlpha * 0.6;
                    const grad = ctx.createRadialGradient(GW / 2, GH / 2, 30, GW / 2, GH / 2, GH);
                    grad.addColorStop(0, `rgba(255,255,255,${whiteAlpha})`);
                    grad.addColorStop(1, 'rgba(255,20,40,0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, GW, GH);
                }

                // Scanlines
                drawScanlines();

                // Vignette
                const vignetteGrad = ctx.createRadialGradient(GW / 2, GH / 2, GW * 0.5, GW / 2, GH / 2, GW * 0.9);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, GW, GH);

                // HUD
                drawHUD();

                // Game over overlay
                if (gameState === STATE.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.75)';
                    ctx.fillRect(0, 0, GW, GH);

                    // Glitchy game over text
                    const goY = GH / 2 - 70;
                    ctx.save();
                    ctx.fillStyle = '#ff1744';
                    ctx.font = 'bold 38px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('GAME OVER', GW / 2 + 4, goY + 3);
                    ctx.fillStyle = '#00e5ff';
                    ctx.fillText('GAME OVER', GW / 2 - 3, goY - 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText('GAME OVER', GW / 2, goY);
                    ctx.restore();

                    // WHY DID YOU DIE?!
                    ctx.fillStyle = '#ff5252';
                    ctx.font = 'bold 22px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('WHY DID YOU DIE?!', GW / 2, goY + 50);
                    ctx.fillText(`x${deathCount}`, GW / 2, goY + 78);

                    // Stats
                    ctx.fillStyle = '#cccccc';
                    ctx.font = 'bold 15px "Courier New", monospace';
                    ctx.fillText(`SCORE: ${score}`, GW / 2, goY + 115);
                    ctx.fillText(`SURVIVED: ${survivalTime.toFixed(1)}s`, GW / 2, goY + 138);
                    ctx.fillText(`LEVEL: ${difficulty}`, GW / 2, goY + 161);

                    // Restart prompt
                    const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.08);
                    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
                    ctx.font = 'bold 16px "Courier New", monospace';
                    ctx.fillText('[ CLICK / SPACE ]', GW / 2, goY + 205);
                    ctx.fillText('TO RESTART', GW / 2, goY + 228);

                    // Random glitch artifacts on game over screen
                    for (let i = 0; i < 5; i++) {
                        ctx.fillStyle = `rgba(${Math.random()>0.5?255:0},${Math.random()>0.5?200:0},${Math.random()>0.5?255:0},0.3)`;
                        ctx.fillRect(Math.random() * GW, Math.random() * GH, Math.random() * 60, Math.random() * 3);
                    }
                }
            }

            function gameLoop(timestamp) {
                if (!gameLoop.lastTimestamp) gameLoop.lastTimestamp = timestamp;
                let dt = (timestamp - gameLoop.lastTimestamp) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                gameLoop.lastTimestamp = timestamp;
                frameCount++;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }
            gameLoop.lastTimestamp = 0;

            // Initial spawn
            setTimeout(() => { if (gameState === STATE.PLAYING) spawnObject(); }, 800);
            setTimeout(() => { if (gameState === STATE.PLAYING) spawnObject(); }, 1400);
            setTimeout(() => { if (gameState === STATE.PLAYING) spawnObject(); }, 2000);

            // Start
            requestAnimationFrame(gameLoop);

            // Handle resize
            function handleResize() {
                const container = document.getElementById('container');
                const maxW = Math.min(window.innerWidth - 10, 500);
                const maxH = window.innerHeight - 10;
                const scale = Math.min(maxW / GW, maxH / GH);
                canvas.style.width = (GW * scale) + 'px';
                canvas.style.height = (GH * scale) + 'px';
            }
            window.addEventListener('resize', handleResize);
            handleResize();

            console.log('%c🜃 WHY DID YOU DIE?! %c🜃',
                'color:#ff1744;font-size:20px;', 'color:#00e5ff;font-size:16px;');
            console.log('%cDodge the glitchy errors! Use arrow keys or touch to move.',
                'color:#aaa;');
            console.log('%cLives: ♥♥♥ | Survive as long as you can!',
                'color:#ff5252;');
        })();
    </script>
</body>
</html>
