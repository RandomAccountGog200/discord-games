<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>This Is Not The End – 5-Minute Cinematic</title>
    <style>
        :root {
            --bg: #0a0a0a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            cursor: default;
        }
        #game-container {
            position: relative;
            width: 100vmin;
            height: 56.25vmin;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16/9;
            box-shadow: 0 0 60px rgba(255, 120, 20, 0.3), 0 0 120px rgba(0, 100, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }
        #click-to-start {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            text-shadow: 0 0 20px #ff8800;
            letter-spacing: 2px;
        }
        #replay-btn {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            border: 2px solid #ffcc00;
            color: #ffcc00;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 20;
            backdrop-filter: blur(5px);
            letter-spacing: 2px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="click-to-start">▶ CLICK TO WATCH</div>
        <button id="replay-btn">↺ REPLAY</button>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // DOM & CANVAS
            // ─────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('game-container');
            const clickOverlay = document.getElementById('click-to-start');
            const replayBtn = document.getElementById('replay-btn');

            const GAME_W = 960;
            const GAME_H = 540;
            canvas.width = GAME_W;
            canvas.height = GAME_H;

            function resizeCanvas() {
                const containerW = container.clientWidth;
                const containerH = container.clientHeight;
                const scale = Math.min(containerW / GAME_W, containerH / GAME_H);
                canvas.style.width = (GAME_W * scale) + 'px';
                canvas.style.height = (GAME_H * scale) + 'px';
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ─────────────────────────────────────
            // AUDIO SYSTEM
            // ─────────────────────────────────────
            let audioCtx = null;
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
            function playSound(freq, type, duration, vol = 0.15, glideTo = null, glideStart = 0.3) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glideTo !== null) {
                        osc.frequency.setValueAtTime(freq, t);
                        osc.frequency.linearRampToValueAtTime(glideTo, t + glideStart);
                    }
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* ignore */ }
            }
            function sfxWhoosh() { playSound(200, 'sawtooth', 0.15, 0.08, 80, 0.08); playSound(300, 'triangle', 0.2, 0.1, 100, 0.1); }
            function sfxPunch() { playSound(80, 'square', 0.12, 0.06); playSound(40, 'triangle', 0.25, 0.08); }
            function sfxKick() { playSound(50, 'square', 0.18, 0.08); playSound(30, 'sawtooth', 0.3, 0.1); }
            function sfxBlock() { playSound(600, 'triangle', 0.06, 0.04); playSound(800, 'sine', 0.04, 0.03); }
            function sfxSpecial() { playSound(100, 'sawtooth', 0.4, 0.3, 400, 0.25); playSound(60, 'square', 0.5, 0.35, 300, 0.3); playSound(200, 'triangle', 0.2, 0.5, 800, 0.4); }
            function sfxHitHeavy() { playSound(30, 'square', 0.5, 0.15); playSound(20, 'sawtooth', 0.6, 0.12); }
            function sfxPowerUp() { playSound(150, 'sine', 0.5, 0.6, 600, 0.5); playSound(200, 'triangle', 0.3, 0.7, 800, 0.6); playSound(100, 'sawtooth', 0.2, 1.0, 500, 0.8); }
            function sfxVictory() { playSound(400, 'sine', 0.3, 0.2, 600, 0.15); setTimeout(() => playSound(500, 'sine', 0.3, 0.2, 800, 0.15), 200); setTimeout(() => playSound(600, 'sine', 0.35, 0.4, 1000, 0.3), 400); setTimeout(() => playSound(800, 'triangle', 0.4, 0.6, 1200, 0.5), 650); }
            // simple beat loop for atmosphere
            let beatInterval = null;
            function startBackgroundBeat() {
                if (beatInterval) return;
                beatInterval = setInterval(() => {
                    if (!audioCtx || audioCtx.state !== 'running') return;
                    playSound(80, 'triangle', 0.05, 0.04);
                }, 500);
            }
            function stopBackgroundBeat() {
                if (beatInterval) { clearInterval(beatInterval); beatInterval = null; }
            }

            // ─────────────────────────────────────
            // CINEMATIC ENGINE
            // ─────────────────────────────────────
            let globalTimer = 0;      // total frames since cinematic start
            let gameState = 'intro';  // intro, phase1, down, revival, phase2, victory, end
            let stateTimer = 0;
            let screenShake = 0;
            let screenFlash = 0;
            let screenFlashColor = '#fff';
            let slowMo = 1.0;
            let slowMoTimer = 0;
            let letterboxAmount = 70;
            let targetLetterbox = 70;
            let choreoEvents = [];
            let choreoIndex = 0;

            // Camera
            let camera = { x: GAME_W/2, y: GAME_H/2, zoom: 1.0, targetX: GAME_W/2, targetY: GAME_H/2, targetZoom: 1.0 };

            // Dialogue
            let dialogueText = '';
            let dialogueSpeaker = '';
            let dialogueTimer = 0;
            let dialogueDuration = 0;

            function setDialogue(speaker, text, durationFrames) {
                dialogueSpeaker = speaker;
                dialogueText = text;
                dialogueTimer = 0;
                dialogueDuration = durationFrames;
            }
            function clearDialogue() {
                dialogueSpeaker = '';
                dialogueText = '';
                dialogueTimer = 0;
                dialogueDuration = 0;
            }

            // Particles (keep existing)
            let particles = [];
            function spawnParticles(x, y, count, color, speed = 3, life = 20, size = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = speed * (0.5 + Math.random());
                    particles.push({x,y,vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - Math.random()*4, life, maxLife: life, color, size: size*(0.5+Math.random()), gravity: true});
                }
            }
            function spawnSparks(x, y, count, color = '#ffdd00') {
                for (let i = 0; i < count; i++) {
                    const angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI;
                    const spd = 5 + Math.random()*8;
                    particles.push({x,y,vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life:8+Math.random()*15, maxLife:20, color, size:1+Math.random()*2.5, gravity:true, spark:true});
                }
            }
            function updateParticles() {
                for (let i = particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.life--;
                    if (p.life<=0) { particles.splice(i,1); continue; }
                    p.x += p.vx * slowMo;
                    p.y += p.vy * slowMo;
                    if (p.gravity) p.vy += 0.25 * slowMo;
                    p.vx *= 0.98;
                }
            }
            function drawParticles(ctx) {
                for (const p of particles) {
                    const alpha = p.life / p.maxLife;
                    const sz = p.size * alpha;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    if (p.spark) {
                        ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = sz*3;
                    } else {
                        ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = sz*2;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ─────────────────────────────────────
            // FIGHTER CLASS (modified for scripted control)
            // ─────────────────────────────────────
            class Fighter {
                constructor(name, x, y, colorBody, colorHead, colorAccent, facingRight=true) {
                    this.name = name;
                    this.x = x; this.y = y; this.baseY = y;
                    this.vx = 0; this.vy = 0;
                    this.width = 50; this.height = 100;
                    this.colorBody = colorBody; this.colorHead = colorHead; this.colorAccent = colorAccent;
                    this.facingRight = facingRight;
                    this.health = 100; this.maxHealth = 100;
                    this.state = 'idle';
                    this.animFrame = 0; this.animTimer = 0;
                    this.attackType = ''; this.attackStartup = 0; this.attackActive = 0; this.attackRecovery = 0;
                    this.blocking = false;
                    this.hitStun = 0;
                    this.knockedDown = false; this.knockdownTimer = 0;
                    this.invincible = 0;
                    this.specialReady = false; this.specialCharge = 0;
                    this.bobOffset = 0;
                    this.flashTimer = 0;
                    this.scale = 1.0;
                }
                reset(x, y, facingRight=true) {
                    this.x=x; this.y=y; this.baseY=y;
                    this.vx=0; this.vy=0;
                    this.state='idle'; this.animFrame=0; this.animTimer=0;
                    this.attackStartup=0; this.attackActive=0; this.attackRecovery=0;
                    this.blocking=false; this.hitStun=0; this.knockedDown=false; this.knockdownTimer=0;
                    this.invincible=0; this.specialCharge=0; this.flashTimer=0;
                    this.facingRight=facingRight; this.bobOffset=0;
                }
                // Scripted actions
                setMove(speed) { this.vx = speed; if (this.state==='idle'||this.state==='walk') this.state='walk'; }
                setBlock(on) { this.blocking = on; if (on) this.state='block'; else if (this.state==='block') this.state='idle'; }
                playAttack(type) { // start attack animation (no hit logic)
                    if (this.state==='hit'||this.state==='knockdown') return;
                    this.state = type; this.attackType = type;
                    this.attackStartup = type==='kick'? 12 : 8;
                    this.attackActive = type==='kick'? 10 : 7;
                    this.attackRecovery = type==='kick'? 16 : 12;
                    this.animFrame = 0;
                    this.blocking = false;
                }
                playSpecial() {
                    if (this.state==='hit'||this.state==='knockdown') return;
                    this.state='special'; this.attackType='special';
                    this.attackStartup=20; this.attackActive=15; this.attackRecovery=18;
                    this.animFrame=0; this.blocking=false;
                }
                takeHit(damage, knockbackX, knockbackY, isHeavy=false) {
                    if (this.invincible>0) return;
                    if (this.blocking) {
                        damage *= 0.2; knockbackX*=0.3; knockbackY*=0.3;
                        sfxBlock(); spawnSparks(this.x, this.y-this.height/2, 6, '#aaccff');
                    } else {
                        if (isHeavy) sfxHitHeavy(); else sfxPunch();
                        spawnParticles(this.x, this.y-this.height/2, 12, '#ff6644', 4, 18, 4);
                    }
                    this.health -= damage; if (this.health<0) this.health=0;
                    this.flashTimer=8;
                    this.vx += knockbackX; this.vy += knockbackY;
                    if (!this.blocking && damage>5) {
                        this.hitStun = isHeavy? 20 : 10;
                        this.state='hit';
                        if (this.attackStartup>0||this.attackActive>0||this.attackRecovery>0) {
                            this.attackStartup=0; this.attackActive=0; this.attackRecovery=0; this.attackType='';
                        }
                    }
                }
                startKnockdown() {
                    this.state='knockdown'; this.knockdownTimer=35;
                    this.attackStartup=0; this.attackActive=0; this.attackRecovery=0;
                    this.vy=-8; this.vx=-6*(this.facingRight?1:-1);
                }
                update() {
                    if (this.invincible>0) this.invincible--;
                    if (this.flashTimer>0) this.flashTimer--;
                    if (this.hitStun>0) {
                        this.hitStun--;
                        if (this.hitStun<=0 && this.state==='hit') this.state='idle';
                    }
                    if (this.knockedDown) {
                        this.knockdownTimer--;
                        if (this.knockdownTimer<=0) { this.knockedDown=false; this.state='idle'; this.y=this.baseY; this.invincible=30; }
                        return;
                    }
                    if (this.state==='knockdown') {
                        this.knockdownTimer--;
                        if (this.knockdownTimer<=0) { this.knockedDown=true; this.knockdownTimer=45; this.y=this.baseY+30; }
                        return;
                    }
                    if (this.attackStartup>0) { this.attackStartup--; }
                    else if (this.attackActive>0) { this.attackActive--; if (this.attackActive<=0 && this.attackRecovery>0) {} }
                    else if (this.attackRecovery>0) { this.attackRecovery--; if (this.attackRecovery<=0) { this.state='idle'; this.attackType=''; } }
                    this.bobOffset = Math.sin(globalTimer*0.12)*3;
                    if (this.state==='idle'||this.state==='walk') this.y = this.baseY + this.bobOffset;
                    if (this.state==='hit') this.y = this.baseY + this.bobOffset*0.5;
                    this.x += this.vx * slowMo;
                    this.vx *= 0.85; if (Math.abs(this.vx)<0.1) this.vx=0;
                    this.x = Math.max(70, Math.min(GAME_W-70, this.x));
                    if (this.blocking && this.state!=='block') this.state='block';
                    if (!this.blocking && this.state==='block') this.state='idle';
                }
                draw(ctx) {
                    ctx.save();
                    const flip = this.facingRight ? 1 : -1;
                    const sx = this.x, sy = this.y;
                    let bodyColor=this.colorBody, headColor=this.colorHead, accentColor=this.colorAccent;
                    if (this.flashTimer>0 && this.flashTimer%2===0) { bodyColor='#fff'; headColor='#fff'; accentColor='#ffdddd'; }
                    ctx.translate(sx, sy); ctx.scale(flip*this.scale, this.scale);
                    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(0,2,this.width/2+5,6,0,0,Math.PI*2); ctx.fill();
                    const bob = (this.state==='idle'||this.state==='walk')? this.bobOffset : 0;
                    const headY = -this.height+8+bob, bodyTopY=-this.height+28+bob, bodyBotY=-8+bob;
                    let armAngleR=0.3, armAngleL=-0.3, legSpread=0;
                    if (this.state==='punch'&&this.attackActive>0) armAngleR=-1.2;
                    else if (this.state==='punch'&&this.attackStartup>0) armAngleR=-0.6;
                    else if (this.state==='kick'&&this.attackActive>0) legSpread=0.8;
                    else if (this.state==='kick'&&this.attackStartup>0) legSpread=0.4;
                    else if (this.state==='block') { armAngleR=-1.5; armAngleL=1.5; }
                    else if (this.state==='special'&&this.attackActive>0) { armAngleR=-2.0; armAngleL=-1.8; }
                    else if (this.state==='hit') { armAngleR=0.8; armAngleL=-0.8; legSpread=0.2; }

                    if (this.state==='knockdown'||this.knockedDown) {
                        const ly=5;
                        ctx.fillStyle=bodyColor; ctx.fillRect(-28,ly-14,56,20);
                        ctx.fillStyle=headColor; ctx.beginPath(); ctx.arc(-20,ly-8,11,0,Math.PI*2); ctx.fill();
                        ctx.fillStyle=accentColor; ctx.fillRect(-28,ly-14,56,5);
                    } else {
                        ctx.fillStyle=bodyColor; const legW=14, legH=32, legTop=bodyBotY;
                        ctx.fillRect(-16-legSpread*10, legTop, legW, legH);
                        ctx.fillRect(2+legSpread*10, legTop, legW, legH);
                        ctx.fillStyle='#1a1a1a';
                        ctx.fillRect(-17-legSpread*10,legTop+legH-6,legW+2,8);
                        ctx.fillRect(1+legSpread*10,legTop+legH-6,legW+2,8);
                        const bodyW=36, bodyH=bodyBotY-bodyTopY;
                        ctx.fillStyle=bodyColor; ctx.beginPath(); ctx.roundRect(-bodyW/2,bodyTopY,bodyW,bodyH,6); ctx.fill();
                        ctx.fillStyle=accentColor; ctx.fillRect(-bodyW/2,bodyTopY+bodyH*0.3,bodyW,8);
                        ctx.fillStyle=bodyColor; const armW=12, armH=28, shoulderY=bodyTopY+5;
                        ctx.save(); ctx.translate(bodyW/2-4,shoulderY); ctx.rotate(armAngleR); ctx.fillRect(0,-armW/2,armH,armW); ctx.fillStyle=headColor; ctx.beginPath(); ctx.arc(armH,0,armW/2+2,0,Math.PI*2); ctx.fill(); ctx.restore();
                        ctx.save(); ctx.translate(-bodyW/2+4,shoulderY); ctx.rotate(armAngleL); ctx.fillStyle=bodyColor; ctx.fillRect(-armH,-armW/2,armH,armW); ctx.fillStyle=headColor; ctx.beginPath(); ctx.arc(-armH,0,armW/2+2,0,Math.PI*2); ctx.fill(); ctx.restore();
                        ctx.fillStyle=headColor; const headR=16; ctx.beginPath(); ctx.arc(0,headY,headR,0,Math.PI*2); ctx.fill();
                        ctx.fillStyle=this.colorAccent; ctx.beginPath(); ctx.arc(0,headY-4,headR+2,Math.PI,Math.PI*2); ctx.fill(); ctx.fillRect(-headR-1,headY-6,headR*2+2,8);
                        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(5,headY-2,5,0,Math.PI*2); ctx.fill();
                        ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(7,headY-1,2.5,0,Math.PI*2); ctx.fill();
                    }
                    if (this.specialCharge>0 && this.specialReady) {
                        ctx.strokeStyle='rgba(255,200,50,'+(0.5+Math.sin(globalTimer*0.2)*0.3)+')'; ctx.lineWidth=3; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=15;
                        ctx.beginPath(); ctx.arc(0,-this.height/2,this.width*0.8,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
                    }
                    if (this.state==='special'&&this.attackActive>0) {
                        ctx.fillStyle='rgba(255,200,50,0.3)'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=30;
                        ctx.beginPath(); ctx.arc(15*flip,-this.height/2,25,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
                    }
                    ctx.restore();
                }
            }

            // ─────────────────────────────────────
            // GLOBAL CHOREOGRAPHY SYSTEM
            // ─────────────────────────────────────
            function scheduleEvent(timeFromNow, callback) {
                choreoEvents.push({ time: globalTimer + timeFromNow, callback });
                choreoEvents.sort((a,b)=>a.time - b.time);
            }
            function processChoreo() {
                while (choreoIndex < choreoEvents.length && choreoEvents[choreoIndex].time <= globalTimer) {
                    choreoEvents[choreoIndex].callback();
                    choreoIndex++;
                }
            }

            // ─────────────────────────────────────
            // CREATE CHARACTERS
            // ─────────────────────────────────────
            let joe, george;
            let iphoneX = GAME_W/2, iphoneY = 75, iphoneGlow = 0;
            let iphoneVisible = true, iphoneClaimed = false;

            function resetGame() {
                joe = new Fighter('Joe', 200, GAME_H-80, '#2255cc', '#ffd5b8', '#44aaff', true);
                joe.maxHealth = 300; joe.health = 300; joe.scale=1.0; joe.specialReady=false; joe.specialCharge=0;
                george = new Fighter('George', GAME_W-200, GAME_H-80, '#8b1a1a', '#d4a080', '#cc3333', false);
                george.maxHealth = 1200; george.health = 1200; george.scale=1.15; george.specialReady=false;
                iphoneX=GAME_W/2; iphoneY=75; iphoneGlow=0; iphoneVisible=true; iphoneClaimed=false;
                particles=[]; screenShake=0; screenFlash=0; slowMo=1.0; slowMoTimer=0;
                letterboxAmount=70; targetLetterbox=70;
                globalTimer=0; stateTimer=0; gameState='intro';
                choreoEvents=[]; choreoIndex=0;
                clearDialogue();
                camera={x:GAME_W/2, y:GAME_H/2, zoom:1.0, targetX:GAME_W/2, targetY:GAME_H/2, targetZoom:1.0};
            }

            // ─────────────────────────────────────
            // CINEMATIC SEQUENCE BUILDER
            // ─────────────────────────────────────
            function buildCinematic() {
                choreoEvents = [];
                choreoIndex = 0;
                // Intro text sequence (manually timed via schedule)
                const introLines = [
                    { text:'THIS IS NOT THE END', size:48, color:'#ff4444', dur:150 },
                    { text:'A Cinematic Short Film', size:24, color:'#cccccc', dur:100 },
                    { text:'George took the iPhone 17 Pro Max...', size:22, color:'#ffaa44', dur:130 },
                    { text:'...from Joe\'s sister.', size:22, color:'#ffaa44', dur:120 },
                    { text:'Now Joe wants it back.', size:26, color:'#ffffff', dur:120 },
                    { text:'FIGHT!', size:56, color:'#ff3333', dur:90 },
                ];
                let introTimer = 0;
                introLines.forEach((line, i) => {
                    scheduleEvent(introTimer, () => {
                        // set intro display
                        window._introLine = line;
                        window._introAlpha = 0;
                        window._introFadeIn = true;
                        window._introFadeOut = false;
                    });
                    introTimer += line.dur;
                });
                scheduleEvent(introTimer, () => {
                    gameState = 'phase1';
                    stateTimer = 0;
                    targetLetterbox = 55;
                    window._introLine = null;
                    startBackgroundBeat();
                    // Phase 1 events are scheduled relative to now (globalTimer)
                    schedulePhase1();
                });

                function schedulePhase1() {
                    const base = globalTimer;
                    // Dialogue and actions
                    scheduleEvent(40, ()=> setDialogue('Joe','Give back the phone, George!', 120));
                    scheduleEvent(160, ()=> { george.playAttack('punch'); sfxWhoosh(); });
                    scheduleEvent(180, ()=> { joe.setBlock(true); });
                    scheduleEvent(200, ()=> { joe.takeHit(5, -3, -1); joe.setBlock(false); });
                    scheduleEvent(240, ()=> setDialogue('George','Make me, little brother.', 120));
                    scheduleEvent(360, ()=> { joe.setMove(4); george.setMove(-3); });
                    scheduleEvent(420, ()=> { joe.setMove(0); george.setMove(0); });
                    scheduleEvent(450, ()=> { joe.playAttack('kick'); sfxWhoosh(); });
                    scheduleEvent(470, ()=> { george.setBlock(true); });
                    scheduleEvent(490, ()=> { george.takeHit(8, -5, -2); george.setBlock(false); });
                    scheduleEvent(530, ()=> { george.playAttack('kick'); sfxWhoosh(); });
                    scheduleEvent(550, ()=> { joe.takeHit(20, -8, -5, true); screenShake=10; slowMoTimer=10; });
                    scheduleEvent(620, ()=> { joe.setMove(-2); george.setMove(3); });
                    scheduleEvent(680, ()=> { joe.setMove(0); george.setMove(0); });
                    scheduleEvent(720, ()=> setDialogue('Joe','You\'ll regret that...', 100));
                    scheduleEvent(820, ()=> { george.playAttack('punch'); sfxWhoosh(); joe.setBlock(true); });
                    scheduleEvent(835, ()=> { joe.takeHit(4, -2, -1); joe.setBlock(false); });
                    scheduleEvent(900, ()=> { joe.playAttack('punch'); sfxWhoosh(); george.takeHit(8, -4, -2); });
                    scheduleEvent(950, ()=> { george.playAttack('kick'); sfxWhoosh(); joe.takeHit(25, -10, -6, true); screenShake=12; slowMoTimer=12; });
                    scheduleEvent(1000, ()=> { joe.setMove(2); george.setMove(-2); });
                    scheduleEvent(1060, ()=> { joe.setMove(0); george.setMove(0); });
                    scheduleEvent(1100, ()=> setDialogue('George','Pathetic.', 80));
                    scheduleEvent(1180, ()=> { george.playAttack('punch'); sfxWhoosh(); joe.takeHit(12, -6, -3); });
                    scheduleEvent(1250, ()=> { joe.health = 5; joe.flashTimer=10; joe.vx=-5; joe.vy=-3; joe.state='hit'; screenShake=15; slowMoTimer=15; spawnParticles(joe.x,joe.y-50,25,'#ff0000',5,25,5); });
                    scheduleEvent(1280, ()=> {
                        joe.startKnockdown();
                        gameState='down'; stateTimer=0; targetLetterbox=90;
                        screenShake=20; screenFlash=20; screenFlashColor='#ff0000'; slowMoTimer=20;
                        sfxHitHeavy(); sfxHitHeavy();
                        setDialogue(' ',' ',0); clearDialogue();
                        stopBackgroundBeat();
                    });
                }

                // DOWN -> REVIVAL -> PHASE2 handled via game state updates in loop, but we'll schedule revival trigger
                // We'll use the gameState changes in update loop, but we can schedule the phase2 start after revival.
                // The down and revival are timer-based in update loop; we'll keep that but ensure timing.
                // We'll schedule a revival sequence after down.
                // We'll handle in update loop.
            }

            // ─────────────────────────────────────
            // UPDATE LOOP
            // ─────────────────────────────────────
            function update() {
                processChoreo();

                globalTimer++;
                stateTimer++;
                if (slowMoTimer>0) { slowMoTimer--; slowMo=0.35; } else { slowMo+=(1.0-slowMo)*0.2; if (slowMo>0.98) slowMo=1.0; }
                if (screenShake>0) screenShake*=0.85; if (screenShake<0.1) screenShake=0;
                if (screenFlash>0) screenFlash--;
                letterboxAmount += (targetLetterbox - letterboxAmount)*0.08;

                // Update dialogue timer
                if (dialogueDuration>0) {
                    dialogueTimer++;
                    if (dialogueTimer >= dialogueDuration) clearDialogue();
                }

                // Camera movement
                let targetCamX = GAME_W/2, targetCamY = GAME_H/2, targetZoom = 1.0;
                if (gameState==='phase1'||gameState==='phase2') {
                    const midX = (joe.x + george.x)/2;
                    const midY = (joe.y + george.y)/2 - 60;
                    const dist = Math.abs(joe.x - george.x);
                    targetZoom = Math.max(0.9, 1.0 - dist/800);
                    targetCamX = midX; targetCamY = midY;
                } else if (gameState==='down') {
                    targetCamX = joe.x; targetCamY = joe.y-40; targetZoom = 1.2;
                } else if (gameState==='revival') {
                    targetCamX = joe.x; targetCamY = joe.y-60; targetZoom = 1.15;
                } else if (gameState==='victory') {
                    targetCamX = joe.x+20; targetCamY = joe.y-50; targetZoom = 1.1;
                }
                camera.targetX = targetCamX; camera.targetY = targetCamY; camera.targetZoom = targetZoom;
                camera.x += (camera.targetX - camera.x)*0.1;
                camera.y += (camera.targetY - camera.y)*0.1;
                camera.zoom += (camera.targetZoom - camera.zoom)*0.1;

                // Update characters
                joe.update();
                george.update();

                // State transitions (down, revival, phase2, victory, end)
                if (gameState==='down') {
                    if (stateTimer > 150) {
                        gameState='revival'; stateTimer=0; targetLetterbox=50;
                        sfxPowerUp(); screenFlash=20; screenFlashColor='#ffcc00';
                    }
                } else if (gameState==='revival') {
                    stateTimer++;
                    screenFlash=Math.max(screenFlash,2); screenFlashColor='#ffdd88';
                    if (stateTimer > 130) {
                        gameState='phase2'; stateTimer=0; targetLetterbox=50;
                        joe.health = joe.maxHealth; joe.knockedDown=false; joe.knockdownTimer=0;
                        joe.state='idle'; joe.y=joe.baseY; joe.invincible=40;
                        joe.specialReady=true; joe.specialCharge=100;
                        screenFlash=25; screenFlashColor='#ffffff'; sfxPowerUp();
                        startBackgroundBeat();
                        schedulePhase2();
                    }
                } else if (gameState==='phase2') {
                    // automatic victory after certain time (or when George health low)
                    if (george.health <= 0 && !george.knockedDown && george.state!=='knockdown') {
                        george.startKnockdown();
                        gameState='victory'; stateTimer=0; targetLetterbox=70;
                        iphoneClaimed=true; sfxVictory(); screenFlash=20; screenFlashColor='#ffdd00'; slowMoTimer=20;
                        stopBackgroundBeat();
                    }
                } else if (gameState==='victory') {
                    stateTimer++;
                    if (stateTimer > 250) {
                        gameState='end';
                        replayBtn.style.display = 'block';
                    }
                }

                // Adapt George's facing towards Joe when idle
                if ((george.state==='idle'||george.state==='walk'||george.state==='block') && gameState!=='down' && gameState!=='revival') {
                    george.facingRight = joe.x > george.x;
                }
                if ((joe.state==='idle'||joe.state==='walk'||joe.state==='block') && gameState!=='down' && gameState!=='revival') {
                    joe.facingRight = george.x > joe.x;
                }

                updateParticles();
            }

            // Phase 2 scripted sequence
            function schedulePhase2() {
                const base = globalTimer;
                scheduleEvent(40, ()=> setDialogue('Joe','This is NOT the end!', 120));
                scheduleEvent(160, ()=> { joe.setMove(6); george.setMove(-4); });
                scheduleEvent(220, ()=> { joe.setMove(0); george.setMove(0); joe.playAttack('kick'); sfxWhoosh(); george.takeHit(40, -12, -6, true); screenShake=8; slowMoTimer=8; });
                scheduleEvent(300, ()=> setDialogue('George','Impossible!', 100));
                scheduleEvent(380, ()=> { george.playAttack('punch'); sfxWhoosh(); joe.setBlock(true); joe.takeHit(2, -1,0); joe.setBlock(false); });
                scheduleEvent(450, ()=> { joe.playAttack('punch'); sfxWhoosh(); george.takeHit(25, -6, -3); });
                scheduleEvent(520, ()=> { joe.setMove(-3); george.setMove(3); });
                scheduleEvent(580, ()=> { joe.setMove(0); george.setMove(0); joe.playSpecial(); sfxSpecial(); george.takeHit(120, -18, -12, true); screenShake=18; slowMoTimer=18; spawnSparks(george.x,george.y-50,30,'#ffaa00'); });
                scheduleEvent(650, ()=> { joe.specialReady=false; joe.specialCharge=0; });
                scheduleEvent(700, ()=> setDialogue('Joe','Give it back!', 100));
                scheduleEvent(780, ()=> { george.playAttack('kick'); sfxWhoosh(); joe.takeHit(15, -6, -3, true); });
                scheduleEvent(850, ()=> { joe.playAttack('kick'); sfxWhoosh(); george.takeHit(50, -14, -7, true); screenShake=12; slowMoTimer=12; });
                scheduleEvent(920, ()=> { george.health = 5; george.flashTimer=15; george.vx=-6; george.state='hit'; spawnParticles(george.x,george.y-50,25,'#ff0000',5,25,5); });
                scheduleEvent(960, ()=> { george.startKnockdown(); screenShake=20; slowMoTimer=20; sfxHitHeavy(); clearDialogue(); });
                // Victory state will be triggered by health check in update loop
            }

            // ─────────────────────────────────────
            // RENDER
            // ─────────────────────────────────────
            function drawBackground() {
                const grad = ctx.createLinearGradient(0,0,0,GAME_H);
                if (gameState==='phase2'||gameState==='victory') { grad.addColorStop(0,'#1a0a2e'); grad.addColorStop(0.5,'#2d1040'); grad.addColorStop(1,'#1a1a2e'); }
                else { grad.addColorStop(0,'#0a0a1a'); grad.addColorStop(0.5,'#151530'); grad.addColorStop(1,'#1a1a25'); }
                ctx.fillStyle=grad; ctx.fillRect(0,0,GAME_W,GAME_H);
                ctx.fillStyle='#0d0d18';
                for (let i=0;i<12;i++) { let bx=i*90-10,bh=80+Math.sin(i*1.7)*50+Math.cos(i*3.1)*30; ctx.fillRect(bx,GAME_H-80-bh,40+Math.sin(i)*20,bh); }
                ctx.fillStyle='#1a1a35';
                for (let i=0;i<12;i++) { let bx=i*90-5,bh=80+Math.sin(i*1.7)*50+Math.cos(i*3.1)*30; for (let wy=GAME_H-80-bh+10; wy<GAME_H-80; wy+=18) for (let wx=bx+5; wx<bx+35; wx+=12) if (Math.random()<0.6) ctx.fillRect(wx,wy,6,8); }
                const gnd=ctx.createLinearGradient(0,GAME_H-80,0,GAME_H); gnd.addColorStop(0,'#1a1a2a'); gnd.addColorStop(1,'#0a0a14');
                ctx.fillStyle=gnd; ctx.fillRect(0,GAME_H-80,GAME_W,80);
                ctx.strokeStyle='#333355'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,GAME_H-80); ctx.lineTo(GAME_W,GAME_H-80); ctx.stroke();
                if (iphoneVisible && !iphoneClaimed) {
                    iphoneGlow+=0.05; let ga=0.4+Math.sin(iphoneGlow)*0.2;
                    let grd=ctx.createRadialGradient(iphoneX,iphoneY,5,iphoneX,iphoneY,60);
                    grd.addColorStop(0,'rgba(255,220,150,'+ga+')'); grd.addColorStop(1,'rgba(255,150,50,0)');
                    ctx.fillStyle=grd; ctx.fillRect(iphoneX-60,iphoneY-60,120,120);
                    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.roundRect(iphoneX-14,iphoneY-22,28,44,6); ctx.fill();
                    ctx.strokeStyle='#888'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(iphoneX-14,iphoneY-22,28,44,6); ctx.stroke();
                    ctx.fillStyle='#001122'; ctx.fillRect(iphoneX-10,iphoneY-18,20,36);
                    ctx.fillStyle='rgba(100,200,255,0.5)'; ctx.fillRect(iphoneX-8,iphoneY-16,16,30);
                    ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(iphoneX,iphoneY-19,2.5,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle='#0a0aff'; ctx.beginPath(); ctx.arc(iphoneX,iphoneY-19,1.5,0,Math.PI*2); ctx.fill();
                }
            }

            function drawLetterbox() {
                ctx.fillStyle='#000'; ctx.fillRect(0,0,GAME_W,letterboxAmount); ctx.fillRect(0,GAME_H-letterboxAmount,GAME_W,letterboxAmount);
            }

            function drawDialogueBox() {
                if (!dialogueText) return;
                const boxY = GAME_H - letterboxAmount - 50;
                ctx.fillStyle='rgba(0,0,0,0.75)';
                ctx.fillRect(60, boxY-15, GAME_W-120, 55);
                ctx.strokeStyle='#ffcc00'; ctx.lineWidth=2; ctx.strokeRect(60, boxY-15, GAME_W-120, 55);
                ctx.fillStyle='#fff'; ctx.font='bold 16px "Segoe UI"'; ctx.textAlign='left';
                ctx.fillText(dialogueSpeaker+':', 80, boxY+10);
                ctx.font='15px "Segoe UI"'; ctx.fillText(dialogueText, 80, boxY+32);
            }

            function drawIntroLine() {
                if (!window._introLine) return;
                const l = window._introLine;
                let alpha = window._introAlpha || 0;
                if (window._introFadeIn) alpha = Math.min(1, alpha+0.04);
                else if (window._introFadeOut) alpha = Math.max(0, alpha-0.04);
                window._introAlpha = alpha;
                if (alpha<=0) return;
                let col = l.color;
                if (col.startsWith('#')) { let r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16); ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`; }
                else ctx.fillStyle = col.replace(')',', '+alpha+')');
                ctx.font = `bold ${l.size}px "Segoe UI"`; ctx.textAlign='center';
                ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=8;
                ctx.fillText(l.text, GAME_W/2, GAME_H/2-20);
                ctx.shadowBlur=0;

                // fade out trigger
                if (window._introFadeIn && alpha>=1) { window._introFadeIn=false; window._introFadeOut=true; }
            }

            function render() {
                ctx.clearRect(0,0,GAME_W,GAME_H);
                let shakeX=0,shakeY=0;
                if (screenShake>0.5) { shakeX=(Math.random()-0.5)*screenShake*2; shakeY=(Math.random()-0.5)*screenShake*2; }
                ctx.save();
                ctx.translate(shakeX, shakeY);
                // Apply camera transform
                const camScale = camera.zoom;
                ctx.translate(GAME_W/2, GAME_H/2);
                ctx.scale(camScale, camScale);
                ctx.translate(-camera.x, -camera.y);

                drawBackground();

                // Draw iPhone if claimed victory
                if (iphoneClaimed) {
                    let ix=joe.x+25, iy=joe.y-50;
                    let grd=ctx.createRadialGradient(ix,iy,3,ix,iy,35);
                    grd.addColorStop(0,'rgba(255,220,150,0.6)'); grd.addColorStop(1,'rgba(255,150,50,0)');
                    ctx.fillStyle=grd; ctx.fillRect(ix-35,iy-35,70,70);
                    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.roundRect(ix-10,iy-16,20,32,4); ctx.fill();
                    ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(ix-10,iy-16,20,32,4); ctx.stroke();
                    ctx.fillStyle='rgba(100,200,255,0.6)'; ctx.fillRect(ix-7,iy-13,14,22);
                }

                joe.draw(ctx);
                george.draw(ctx);
                drawParticles(ctx);

                if (screenFlash>0) {
                    let fa = screenFlash/20; ctx.fillStyle=`rgba(255,255,255,${fa})`; ctx.fillRect(-200,-200,GAME_W+400,GAME_H+400);
                }
                ctx.restore();

                drawLetterbox();
                drawDialogueBox();
                if (gameState==='intro') drawIntroLine();

                // End screen
                if (gameState==='end') {
                    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,GAME_W,GAME_H);
                    ctx.fillStyle='#ffcc00'; ctx.font='bold 48px "Segoe UI"'; ctx.textAlign='center';
                    ctx.shadowColor='#000'; ctx.shadowBlur=10;
                    ctx.fillText('THE END', GAME_W/2, GAME_H/2-20);
                    ctx.shadowBlur=0;
                }
            }

            // ─────────────────────────────────────
            // START / REPLAY
            // ─────────────────────────────────────
            function startCinematic() {
                initAudio();
                resetGame();
                buildCinematic();
                targetLetterbox = 70;
                letterboxAmount = 70;
                gameState = 'intro';
                globalTimer = 0;
                stateTimer = 0;
                window._introLine = null;
                replayBtn.style.display = 'none';
                stopBackgroundBeat();
            }

            clickOverlay.addEventListener('click', () => {
                clickOverlay.style.display = 'none';
                startCinematic();
            });

            replayBtn.addEventListener('click', () => {
                startCinematic();
            });

            // Game loop
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            resizeCanvas();
            gameLoop();
            console.log('🎬 5-Minute Cinematic Ready');
        })();
    </script>
</body>
