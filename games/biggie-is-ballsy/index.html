<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Biggie is Ballsy</title>
    <style>
        :root {
            --bg: #0a0a18;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function() {
            // === Canvas Setup ===
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            let W, H;

            function resize() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            resize();
            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', () => setTimeout(resize, 100));

            // === Audio System ===
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playSound(freq, type, duration, volume, freqEnd, glideTime) {
                try {
                    const ac = initAudio();
                    const t = ac.currentTime;
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (freqEnd !== undefined && glideTime !== undefined) {
                        osc.frequency.linearRampToValueAtTime(freqEnd, t + glideTime);
                    }
                    gain.gain.setValueAtTime(volume, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(t);
                    osc.stop(t + duration + 0.05);
                } catch (e) {
                    // Silently ignore audio errors
                }
            }

            function sfxBounce() { playSound(180, 'square', 0.08, 0.12, 80, 0.06);
            }

            function sfxDash() { playSound(200, 'sawtooth', 0.25, 0.15, 600, 0.2);
            }

            function sfxDeath() { playSound(300, 'sawtooth', 0.5, 0.25, 40, 0.4);
            }

            function sfxPowerUp() { playSound(500, 'sine', 0.3, 0.2, 900, 0.25);
            }

            function sfxHit() { playSound(60, 'triangle', 0.35, 0.3, 30, 0.3);
            }

            function sfxClick() { playSound(800, 'sine', 0.1, 0.1, 1000, 0.08);
            }

            // === Game Constants ===
            const PLAYER_RADIUS = 28;
            const PLAYER_SPEED = 280;
            const PLAYER_DASH_SPEED = 700;
            const PLAYER_DASH_DURATION = 0.22;
            const PLAYER_DASH_COOLDOWN = 2.5;
            const PLAYER_SHIELD_DURATION = 4.5;
            const INITIAL_ENEMY_COUNT = 6;
            const MAX_ENEMY_COUNT = 20;
            const ENEMY_SPAWN_INTERVAL = 9;
            const POWERUP_SPAWN_INTERVAL_MIN = 8;
            const POWERUP_SPAWN_INTERVAL_MAX = 16;
            const POWERUP_LIFETIME = 12;
            const ARENA_PADDING = 20;

            // === Game State ===
            let gameState = 'menu'; // 'menu' | 'playing' | 'gameover'
            let score = 0;
            let bestScore = 0;
            let survivalTime = 0;
            let shakeAmount = 0;
            let shakeDecay = 0.85;

            // Load best score
            try {
                const saved = localStorage.getItem('biggieIsBallsy_best');
                if (saved) bestScore = parseInt(saved) || 0;
            } catch (e) {}

            function saveBestScore() {
                try {
                    localStorage.setItem('biggieIsBallsy_best', bestScore.toString());
                } catch (e) {}
            }

            // === Player (Biggie) ===
            const player = {
                x: 0,
                y: 0,
                vx: 0,
                vy: 0,
                radius: PLAYER_RADIUS,
                targetX: 0,
                targetY: 0,
                isDashing: false,
                dashTimer: 0,
                dashCooldown: 0,
                shieldTimer: 0,
                hasShield: false,
                expression: 'normal', // 'normal' | 'dashing' | 'hurt'
                expressionTimer: 0,
                trail: [],
                alive: true,
            };

            function resetPlayer() {
                player.x = W / 2;
                player.y = H / 2;
                player.vx = 0;
                player.vy = 0;
                player.targetX = player.x;
                player.targetY = player.y;
                player.isDashing = false;
                player.dashTimer = 0;
                player.dashCooldown = 0;
                player.shieldTimer = 0;
                player.hasShield = false;
                player.expression = 'normal';
                player.expressionTimer = 0;
                player.trail = [];
                player.alive = true;
            }

            // === Enemies ===
            const ENEMY_COLORS = [
                '#ff4757', '#ff6b81', '#ff3838', '#ff6348', '#ff7f50',
                '#ff9f43', '#feca57', '#ffdd59', '#ffc312',
                '#2ed573', '#7bed9f', '#00d2d3', '#1e90ff',
                '#5352ed', '#a29bfe', '#e056a0', '#be2edd',
                '#ff6ec7', '#00b894', '#e17055',
            ];

            let enemies = [];

            function spawnEnemy(edgeSpawn = true) {
                const r = 14 + Math.random() * 24;
                let ex, ey;
                if (edgeSpawn) {
                    // Spawn from edges
                    const edge = Math.floor(Math.random() * 4);
                    const margin = r + ARENA_PADDING;
                    switch (edge) {
                        case 0:
                            ex = margin + Math.random() * (W - margin * 2);
                            ey = -r - Math.random() * 60;
                            break;
                        case 1:
                            ex = W + r + Math.random() * 60;
                            ey = margin + Math.random() * (H - margin * 2);
                            break;
                        case 2:
                            ex = margin + Math.random() * (W - margin * 2);
                            ey = H + r + Math.random() * 60;
                            break;
                        case 3:
                            ex = -r - Math.random() * 60;
                            ey = margin + Math.random() * (H - margin * 2);
                            break;
                    }
                } else {
                    ex = ARENA_PADDING + r + Math.random() * (W - ARENA_PADDING * 2 - r * 2);
                    ey = ARENA_PADDING + r + Math.random() * (H - ARENA_PADDING * 2 - r * 2);
                    // Make sure not too close to player
                    const dx = ex - player.x;
                    const dy = ey - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < player.radius + r + 60) {
                        ex = player.x + (dx / dist) * (player.radius + r + 70);
                        ey = player.y + (dy / dist) * (player.radius + r + 70);
                        ex = Math.max(ARENA_PADDING + r, Math.min(W - ARENA_PADDING - r, ex));
                        ey = Math.max(ARENA_PADDING + r, Math.min(H - ARENA_PADDING - r, ey));
                    }
                }
                const speed = 80 + Math.random() * 180;
                const angle = Math.random() * Math.PI * 2;
                const color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
                enemies.push({
                    x: ex,
                    y: ey,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: r,
                    color: color,
                    glowColor: color,
                });
            }

            function resetEnemies() {
                enemies = [];
                for (let i = 0; i < INITIAL_ENEMY_COUNT; i++) {
                    spawnEnemy(false);
                }
            }

            // === Particles ===
            let particles = [];

            function spawnParticles(x, y, count, color, speedRange, lifeRange, sizeRange) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
                    const life = lifeRange[0] + Math.random() * (lifeRange[1] - lifeRange[0]);
                    const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: life,
                        maxLife: life,
                        radius: size,
                        color: color,
                    });
                }
            }

            // === Power-ups ===
            let powerUps = [];

            function spawnPowerUp() {
                const x = ARENA_PADDING + 30 + Math.random() * (W - ARENA_PADDING * 2 - 60);
                const y = ARENA_PADDING + 30 + Math.random() * (H - ARENA_PADDING * 2 - 60);
                powerUps.push({
                    x: x,
                    y: y,
                    radius: 16,
                    life: POWERUP_LIFETIME,
                    pulse: 0,
                });
            }

            // === Input Handling ===
            const keys = {};
            let mouseX = W / 2;
            let mouseY = H / 2;
            let mouseDown = false;
            let activeTouchId = null;
            let lastTapTime = 0;
            let touchTargetX = null;
            let touchTargetY = null;

            function getDashButtonBounds() {
                const btnSize = 56;
                return {
                    x: W - btnSize - 24,
                    y: H - btnSize - 24,
                    w: btnSize,
                    h: btnSize,
                    cx: W - btnSize / 2 - 24,
                    cy: H - btnSize / 2 - 24,
                    radius: btnSize / 2,
                };
            }

            function isInDashButton(px, py) {
                const btn = getDashButtonBounds();
                const dx = px - btn.cx;
                const dy = py - btn.cy;
                return Math.sqrt(dx * dx + dy * dy) < btn.radius + 8;
            }

            function getRestartButtonBounds() {
                const bw = 200;
                const bh = 56;
                return {
                    x: W / 2 - bw / 2,
                    y: H / 2 + 60,
                    w: bw,
                    h: bh,
                };
            }

            function isInRestartButton(px, py) {
                const btn = getRestartButtonBounds();
                return px > btn.x && px < btn.x + btn.w && py > btn.y && py < btn.y + btn.h;
            }

            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('mousedown', (e) => {
                mouseDown = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (gameState === 'menu') {
                    startGame();
                    return;
                }
                if (gameState === 'gameover') {
                    if (isInRestartButton(mouseX, mouseY)) {
                        restartGame();
                    }
                    return;
                }
                if (gameState === 'playing') {
                    if (isInDashButton(mouseX, mouseY)) {
                        triggerDash();
                    }
                }
            });

            canvas.addEventListener('mouseup', () => { mouseDown = false; });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameState === 'menu') {
                    startGame();
                    return;
                }
                if (gameState === 'gameover') {
                    const touch = e.touches[0];
                    if (touch && isInRestartButton(touch.clientX, touch.clientY)) {
                        restartGame();
                    } else {
                        restartGame();
                    }
                    return;
                }
                for (const touch of e.changedTouches) {
                    if (activeTouchId === null) {
                        activeTouchId = touch.identifier;
                        const tx = touch.clientX;
                        const ty = touch.clientY;
                        if (isInDashButton(tx, ty)) {
                            triggerDash();
                            activeTouchId = null;
                            return;
                        }
                        touchTargetX = tx;
                        touchTargetY = ty;
                        // Double tap detection for dash
                        const now = Date.now();
                        if (now - lastTapTime < 300 && gameState === 'playing') {
                            triggerDash();
                            lastTapTime = 0;
                        } else {
                            lastTapTime = now;
                        }
                        break;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (const touch of e.touches) {
                    if (touch.identifier === activeTouchId) {
                        touchTargetX = touch.clientX;
                        touchTargetY = touch.clientY;
                        break;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                for (const touch of e.changedTouches) {
                    if (touch.identifier === activeTouchId) {
                        activeTouchId = null;
                        touchTargetX = null;
                        touchTargetY = null;
                        break;
                    }
                }
            });

            canvas.addEventListener('touchcancel', () => {
                activeTouchId = null;
                touchTargetX = null;
                touchTargetY = null;
            });

            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (gameState === 'menu') {
                        startGame();
                    } else if (gameState === 'gameover') {
                        restartGame();
                    } else if (gameState === 'playing') {
                        triggerDash();
                    }
                }
                if (e.key === 'Enter' && gameState === 'gameover') {
                    restartGame();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
            });

            function triggerDash() {
                if (player.dashCooldown > 0 || player.isDashing || !player.alive || gameState !== 'playing')
                    return;
                player.isDashing = true;
                player.dashTimer = PLAYER_DASH_DURATION;
                player.dashCooldown = PLAYER_DASH_COOLDOWN;
                player.expression = 'dashing';
                player.expressionTimer = 0.4;
                sfxDash();
                // Dash direction: toward mouse/touch or current movement
                let dx = mouseX - player.x;
                let dy = mouseY - player.y;
                if (touchTargetX !== null) {
                    dx = touchTargetX - player.x;
                    dy = touchTargetY - player.y;
                }
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 5) {
                    dx = player.vx || (Math.random() - 0.5) * 2;
                    dy = player.vy || (Math.random() - 0.5) * 2;
                }
                const norm = Math.sqrt(dx * dx + dy * dy) || 1;
                player.vx = (dx / norm) * PLAYER_DASH_SPEED;
                player.vy = (dy / norm) * PLAYER_DASH_SPEED;
                spawnParticles(player.x, player.y, 20, '#ffffff', [100, 300], [0.3, 0.7], [2, 6]);
                spawnParticles(player.x, player.y, 15, '#ffdd59', [60, 200], [0.2, 0.5], [3, 8]);
            }

            // === Game Flow ===
            function startGame() {
                sfxClick();
                gameState = 'playing';
                score = 0;
                survivalTime = 0;
                shakeAmount = 0;
                resetPlayer();
                resetEnemies();
                particles = [];
                powerUps = [];
                player.x = W / 2;
                player.y = H / 2;
                player.targetX = player.x;
                player.targetY = player.y;
                mouseX = player.x;
                mouseY = player.y;
                touchTargetX = null;
                touchTargetY = null;
                activeTouchId = null;
                enemies.forEach(e => {
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < player.radius + e.radius + 50) {
                        e.x += (dx / dist) * (player.radius + e.radius + 60);
                        e.y += (dy / dist) * (player.radius + e.radius + 60);
                        e.x = Math.max(ARENA_PADDING + e.radius, Math.min(W - ARENA_PADDING - e
                            .radius, e.x));
                        e.y = Math.max(ARENA_PADDING + e.radius, Math.min(H - ARENA_PADDING - e
                            .radius, e.y));
                    }
                });
            }

            function endGame() {
                gameState = 'gameover';
                player.alive = false;
                player.expression = 'hurt';
                player.expressionTimer = 1.5;
                shakeAmount = 18;
                sfxDeath();
                spawnParticles(player.x, player.y, 50, '#ff4757', [80, 350], [0.4, 1.2], [2, 10]);
                spawnParticles(player.x, player.y, 30, '#ffffff', [50, 250], [0.3, 0.8], [1, 5]);
                spawnParticles(player.x, player.y, 20, '#ffdd59', [40, 200], [0.3, 0.7], [3, 7]);
                score = Math.floor(survivalTime * 10) / 10;
                if (score > bestScore) {
                    bestScore = score;
                    saveBestScore();
                }
            }

            function restartGame() {
                sfxClick();
                startGame();
            }

            // === Update ===
            function update(dt) {
                if (gameState !== 'playing') {
                    // Still update particles
                    updateParticles(dt);
                    if (shakeAmount > 0.1) shakeAmount *= shakeDecay;
                    else shakeAmount = 0;
                    return;
                }

                const realDt = Math.min(dt, 0.1); // Cap to prevent huge jumps

                survivalTime += realDt;
                score = Math.floor(survivalTime * 10) / 10;

                // Update shake
                if (shakeAmount > 0.1) shakeAmount *= shakeDecay;
                else shakeAmount = 0;

                // Update player dash
                if (player.isDashing) {
                    player.dashTimer -= realDt;
                    if (player.dashTimer <= 0) {
                        player.isDashing = false;
                        player.dashTimer = 0;
                        player.vx *= 0.3;
                        player.vy *= 0.3;
                        if (player.expression === 'dashing') {
                            player.expression = 'normal';
                        }
                    }
                    // Trail during dash
                    player.trail.push({ x: player.x, y: player.y, life: 0.25, radius: player.radius *
                            0.7 });
                    if (player.trail.length > 12) player.trail.shift();
                } else {
                    // Decay trail
                    if (player.trail.length > 0) {
                        player.trail.forEach(t => t.life -= realDt);
                        player.trail = player.trail.filter(t => t.life > 0);
                    }
                }

                // Update dash cooldown
                if (player.dashCooldown > 0) {
                    player.dashCooldown -= realDt;
                    if (player.dashCooldown < 0) player.dashCooldown = 0;
                }

                // Update shield
                if (player.shieldTimer > 0) {
                    player.shieldTimer -= realDt;
                    if (player.shieldTimer <= 0) {
                        player.hasShield = false;
                        player.shieldTimer = 0;
                    }
                }

                // Update expression timer
                if (player.expressionTimer > 0) {
                    player.expressionTimer -= realDt;
                    if (player.expressionTimer <= 0 && player.expression !== 'normal') {
                        if (!player.isDashing && player.alive) {
                            player.expression = 'normal';
                        }
                    }
                }

                // Player movement
                let targetX = mouseX;
                let targetY = mouseY;
                if (touchTargetX !== null) {
                    targetX = touchTargetX;
                    targetY = touchTargetY;
                }

                // Keyboard input
                let kx = 0,
                    ky = 0;
                if (keys['w'] || keys['arrowup']) ky -= 1;
                if (keys['s'] || keys['arrowdown']) ky += 1;
                if (keys['a'] || keys['arrowleft']) kx -= 1;
                if (keys['d'] || keys['arrowright']) kx += 1;
                const kMag = Math.sqrt(kx * kx + ky * ky);
                if (kMag > 0) {
                    kx /= kMag;
                    ky /= kMag;
                    targetX = player.x + kx * 150;
                    targetY = player.y + ky * 150;
                }

                if (!player.isDashing) {
                    const dx = targetX - player.x;
                    const dy = targetY - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const speed = PLAYER_SPEED;
                    if (dist > 3) {
                        const moveSpeed = Math.min(speed, dist / realDt);
                        player.vx = (dx / dist) * moveSpeed;
                        player.vy = (dy / dist) * moveSpeed;
                    } else {
                        player.vx *= 0.85;
                        player.vy *= 0.85;
                        if (Math.abs(player.vx) < 2) player.vx = 0;
                        if (Math.abs(player.vy) < 2) player.vy = 0;
                    }
                }

                // Apply velocity
                player.x += player.vx * realDt;
                player.y += player.vy * realDt;

                // Clamp player to arena
                const pad = ARENA_PADDING + player.radius;
                if (player.x < pad) { player.x = pad;
                    player.vx *= -0.4; }
                if (player.x > W - pad) { player.x = W - pad;
                    player.vx *= -0.4; }
                if (player.y < pad) { player.y = pad;
                    player.vy *= -0.4; }
                if (player.y > H - pad) { player.y = H - pad;
                    player.vy *= -0.4; }

                // Update enemies
                enemies.forEach(enemy => {
                    enemy.x += enemy.vx * realDt;
                    enemy.y += enemy.vy * realDt;

                    // Bounce off arena walls
                    const epad = ARENA_PADDING + enemy.radius;
                    if (enemy.x < epad) {
                        enemy.x = epad;
                        enemy.vx = Math.abs(enemy.vx);
                        spawnParticles(enemy.x, enemy.y, 5, enemy.color, [30, 100], [0.15, 0.35], [1,
                            3]);
                        sfxBounce();
                    }
                    if (enemy.x > W - epad) {
                        enemy.x = W - epad;
                        enemy.vx = -Math.abs(enemy.vx);
                        spawnParticles(enemy.x, enemy.y, 5, enemy.color, [30, 100], [0.15, 0.35], [1,
                            3]);
                        sfxBounce();
                    }
                    if (enemy.y < epad) {
                        enemy.y = epad;
                        enemy.vy = Math.abs(enemy.vy);
                        spawnParticles(enemy.x, enemy.y, 5, enemy.color, [30, 100], [0.15, 0.35], [1,
                            3]);
                        sfxBounce();
                    }
                    if (enemy.y > H - epad) {
                        enemy.y = H - epad;
                        enemy.vy = -Math.abs(enemy.vy);
                        spawnParticles(enemy.x, enemy.y, 5, enemy.color, [30, 100], [0.15, 0.35], [1,
                            3]);
                        sfxBounce();
                    }

                    // Speed limit
                    const spd = Math.sqrt(enemy.vx * enemy.vx + enemy.vy * enemy.vy);
                    const maxSpd = 350;
                    if (spd > maxSpd) {
                        enemy.vx = (enemy.vx / spd) * maxSpd;
                        enemy.vy = (enemy.vy / spd) * maxSpd;
                    }
                });

                // Enemy-enemy collisions
                for (let i = 0; i < enemies.length; i++) {
                    for (let j = i + 1; j < enemies.length; j++) {
                        const a = enemies[i];
                        const b = enemies[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = a.radius + b.radius;
                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const overlap = minDist - dist;
                            a.x -= nx * overlap * 0.5;
                            a.y -= ny * overlap * 0.5;
                            b.x += nx * overlap * 0.5;
                            b.y += ny * overlap * 0.5;
                            const relVx = a.vx - b.vx;
                            const relVy = a.vy - b.vy;
                            const relVn = relVx * nx + relVy * ny;
                            if (relVn > 0) {
                                a.vx -= relVn * nx;
                                a.vy -= relVn * ny;
                                b.vx += relVn * nx;
                                b.vy += relVn * ny;
                            }
                        }
                    }
                }

                // Player-enemy collisions
                if (player.alive && !player.isDashing && !player.hasShield) {
                    for (const enemy of enemies) {
                        const dx = player.x - enemy.x;
                        const dy = player.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = player.radius + enemy.radius;
                        if (dist < minDist) {
                            // Collision!
                            sfxHit();
                            endGame();
                            break;
                        }
                    }
                }
                // If dashing, destroy enemies on contact
                if (player.alive && player.isDashing) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        const dx = player.x - enemy.x;
                        const dy = player.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = player.radius + enemy.radius;
                        if (dist < minDist) {
                            spawnParticles(enemy.x, enemy.y, 15, enemy.color, [80, 250], [0.3, 0.7], [2,
                                7]);
                            spawnParticles(enemy.x, enemy.y, 8, '#ffffff', [50, 180], [0.2, 0.5], [1, 4]);
                            sfxBounce();
                            enemies.splice(i, 1);
                        }
                    }
                }
                // Shielded collision - bump enemies away
                if (player.alive && player.hasShield && !player.isDashing) {
                    for (const enemy of enemies) {
                        const dx = player.x - enemy.x;
                        const dy = player.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = player.radius + enemy.radius;
                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const overlap = minDist - dist;
                            enemy.x -= nx * overlap;
                            enemy.y -= ny * overlap;
                            const pushSpeed = 250;
                            enemy.vx -= nx * pushSpeed;
                            enemy.vy -= ny * pushSpeed;
                            spawnParticles(enemy.x, enemy.y, 8, '#ffdd59', [40, 150], [0.2, 0.5], [1,
                            4]);
                            sfxBounce();
                        }
                    }
                }

                // Update power-ups
                powerUps.forEach(pu => {
                    pu.life -= realDt;
                    pu.pulse += realDt * 4;
                });
                powerUps = powerUps.filter(pu => pu.life > 0);

                // Player collects power-ups
                if (player.alive) {
                    for (let i = powerUps.length - 1; i >= 0; i--) {
                        const pu = powerUps[i];
                        const dx = player.x - pu.x;
                        const dy = player.y - pu.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < player.radius + pu.radius) {
                            // Collected!
                            player.hasShield = true;
                            player.shieldTimer = PLAYER_SHIELD_DURATION;
                            sfxPowerUp();
                            spawnParticles(pu.x, pu.y, 20, '#ffdd59', [60, 200], [0.3, 0.7], [2, 6]);
                            spawnParticles(pu.x, pu.y, 10, '#ffffff', [40, 150], [0.2, 0.5], [1, 3]);
                            powerUps.splice(i, 1);
                        }
                    }
                }

                // Spawn new enemies over time
                const enemySpawnRate = ENEMY_SPAWN_INTERVAL / (1 + survivalTime / 60);
                if (enemies.length < MAX_ENEMY_COUNT && Math.random() < realDt / Math.max(enemySpawnRate,
                        3)) {
                    spawnEnemy(true);
                }

                // Spawn power-ups
                if (powerUps.length < 2 && Math.random() < realDt / POWERUP_SPAWN_INTERVAL_MIN) {
                    if (Math.random() < 0.5) spawnPowerUp();
                }
                if (powerUps.length === 0 && Math.random() < realDt / POWERUP_SPAWN_INTERVAL_MAX) {
                    spawnPowerUp();
                }

                // Update particles
                updateParticles(realDt);

                // Clean up enemies that are very far off screen
                enemies = enemies.filter(e => {
                    return e.x > -200 && e.x < W + 200 && e.y > -200 && e.y < H + 200;
                });
                // Respawn if too few
                while (enemies.length < INITIAL_ENEMY_COUNT) {
                    spawnEnemy(true);
                }
            }

            function updateParticles(dt) {
                for (const p of particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    p.radius *= 0.995;
                }
                particles = particles.filter(p => p.life > 0);
            }

            // === Render ===
            function drawGrid() {
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 1;
                const spacing = 50;
                for (let x = spacing; x < W; x += spacing) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                    ctx.stroke();
                }
                for (let y = spacing; y < H; y += spacing) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                    ctx.stroke();
                }
            }

            function drawArenaBorder() {
                const pad = ARENA_PADDING;
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(100,150,255,0.4)';
                ctx.shadowBlur = 15;
                ctx.strokeRect(pad, pad, W - pad * 2, H - pad * 2);
                ctx.shadowBlur = 0;

                // Corner glows
                const corners = [
                    { x: pad, y: pad },
                    { x: W - pad, y: pad },
                    { x: pad, y: H - pad },
                    { x: W - pad, y: H - pad },
                ];
                corners.forEach(c => {
                    const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 30);
                    grad.addColorStop(0, 'rgba(100,150,255,0.25)');
                    grad.addColorStop(1, 'rgba(100,150,255,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, 30, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawPlayer() {
                if (!player.alive && gameState === 'gameover') {
                    // Draw dead Biggie
                    const x = player.x;
                    const y = player.y;
                    const r = player.radius;

                    // Body
                    const bodyGrad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
                    bodyGrad.addColorStop(0, '#ffe4c4');
                    bodyGrad.addColorStop(0.7, '#e8c9a0');
                    bodyGrad.addColorStop(1, '#c4986a');
                    ctx.fillStyle = bodyGrad;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // X eyes
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 3;
                    const eyeY = y - r * 0.25;
                    const eyeOffset = r * 0.35;
                    const eyeSize = r * 0.2;
                    // Left X
                    ctx.beginPath();
                    ctx.moveTo(x - eyeOffset - eyeSize, eyeY - eyeSize);
                    ctx.lineTo(x - eyeOffset + eyeSize, eyeY + eyeSize);
                    ctx.moveTo(x - eyeOffset + eyeSize, eyeY - eyeSize);
                    ctx.lineTo(x - eyeOffset - eyeSize, eyeY + eyeSize);
                    ctx.stroke();
                    // Right X
                    ctx.beginPath();
                    ctx.moveTo(x + eyeOffset - eyeSize, eyeY - eyeSize);
                    ctx.lineTo(x + eyeOffset + eyeSize, eyeY + eyeSize);
                    ctx.moveTo(x + eyeOffset + eyeSize, eyeY - eyeSize);
                    ctx.lineTo(x + eyeOffset - eyeSize, eyeY + eyeSize);
                    ctx.stroke();

                    // Sad mouth
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(x, y + r * 0.2, r * 0.25, Math.PI * 0.15, Math.PI * 0.85);
                    ctx.stroke();

                    return;
                }

                const x = player.x;
                const y = player.y;
                const r = player.radius;

                // Trail
                player.trail.forEach((t, i) => {
                    const alpha = (t.life / 0.25) * 0.4;
                    const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.radius);
                    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
                    grad.addColorStop(1, `rgba(200,180,255,0)`);
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Shield glow
                if (player.hasShield) {
                    const shieldGrad = ctx.createRadialGradient(x, y, r * 0.8, x, y, r * 1.6);
                    shieldGrad.addColorStop(0, 'rgba(255,215,0,0)');
                    shieldGrad.addColorStop(0.5, 'rgba(255,215,0,0.35)');
                    shieldGrad.addColorStop(1, 'rgba(255,215,0,0)');
                    ctx.fillStyle = shieldGrad;
                    ctx.beginPath();
                    ctx.arc(x, y, r * 1.6, 0, Math.PI * 2);
                    ctx.fill();

                    // Sparkle ring
                    ctx.strokeStyle = 'rgba(255,215,0,0.6)';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([8, 12]);
                    ctx.lineDashOffset = survivalTime * 120;
                    ctx.beginPath();
                    ctx.arc(x, y, r * 1.3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.lineDashOffset = 0;
                }

                // Body
                const bodyGrad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
                bodyGrad.addColorStop(0, '#fff8f0');
                bodyGrad.addColorStop(0.6, '#ffe4c4');
                bodyGrad.addColorStop(1, '#d4a574');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                // Subtle outline
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Highlight
                const hlGrad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.4, r * 0.05, x, y, r);
                hlGrad.addColorStop(0, 'rgba(255,255,255,0.45)');
                hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = hlGrad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                const eyeY = y - r * 0.22;
                const eyeOffsetX = r * 0.32;
                const eyeR = r * 0.22;
                const pupilR = r * 0.11;

                // Determine look direction
                let lookX = mouseX - x;
                let lookY = mouseY - y;
                if (touchTargetX !== null) {
                    lookX = touchTargetX - x;
                    lookY = touchTargetY - y;
                }
                const lookDist = Math.sqrt(lookX * lookX + lookY * lookY) || 1;
                const lookNx = lookX / lookDist;
                const lookNy = lookY / lookDist;
                const pupilMaxOffset = eyeR - pupilR - 2;

                function drawEye(ex, ey) {
                    // White
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Pupil
                    const px = ex + lookNx * pupilMaxOffset;
                    const py = ey + lookNy * pupilMaxOffset;
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.arc(px, py, pupilR, 0, Math.PI * 2);
                    ctx.fill();

                    // Pupil highlight
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(px - pupilR * 0.25, py - pupilR * 0.3, pupilR * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (player.expression === 'dashing') {
                    // Determined squint
                    const leftEx = x - eyeOffsetX;
                    const rightEx = x + eyeOffsetX;
                    // Draw as angled lines
                    ctx.fillStyle = '#1a1a1a';
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    // Left eye - angled down toward center
                    ctx.beginPath();
                    ctx.moveTo(leftEx - eyeR, eyeY - eyeR * 0.5);
                    ctx.lineTo(leftEx + eyeR, eyeY + eyeR * 0.3);
                    ctx.stroke();
                    // Right eye - angled down toward center
                    ctx.beginPath();
                    ctx.moveTo(rightEx + eyeR, eyeY - eyeR * 0.5);
                    ctx.lineTo(rightEx - eyeR, eyeY + eyeR * 0.3);
                    ctx.stroke();
                    ctx.lineWidth = 1;
                    ctx.lineCap = 'butt';

                    // Determined mouth
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y + r * 0.35, r * 0.3, Math.PI * 0.1, Math.PI * 0.9);
                    ctx.stroke();
                } else if (player.expression === 'hurt') {
                    drawEye(x - eyeOffsetX, eyeY);
                    drawEye(x + eyeOffsetX, eyeY);
                    // Worried mouth
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y + r * 0.45, r * 0.2, Math.PI * 0.0, Math.PI);
                    ctx.stroke();
                } else {
                    drawEye(x - eyeOffsetX, eyeY);
                    drawEye(x + eyeOffsetX, eyeY);
                    // Happy smile
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y + r * 0.1, r * 0.3, Math.PI * 0.2, Math.PI * 0.8);
                    ctx.stroke();
                }

                // Subtle blush
                const blushGrad = ctx.createRadialGradient(x - r * 0.55, y + r * 0.1, 0, x - r * 0.55, y +
                    r * 0.1, r * 0.25);
                blushGrad.addColorStop(0, 'rgba(255,150,150,0.35)');
                blushGrad.addColorStop(1, 'rgba(255,150,150,0)');
                ctx.fillStyle = blushGrad;
                ctx.beginPath();
                ctx.arc(x - r * 0.55, y + r * 0.1, r * 0.25, 0, Math.PI * 2);
                ctx.fill();
                const blushGrad2 = ctx.createRadialGradient(x + r * 0.55, y + r * 0.1, 0, x + r * 0.55, y +
                    r * 0.1, r * 0.25);
                blushGrad2.addColorStop(0, 'rgba(255,150,150,0.35)');
                blushGrad2.addColorStop(1, 'rgba(255,150,150,0)');
                ctx.fillStyle = blushGrad2;
                ctx.beginPath();
                ctx.arc(x + r * 0.55, y + r * 0.1, r * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawEnemies() {
                enemies.forEach(enemy => {
                    // Glow
                    const glowGrad = ctx.createRadialGradient(enemy.x, enemy.y, enemy.radius * 0.5,
                        enemy.x, enemy.y, enemy.radius * 1.6);
                    glowGrad.addColorStop(0, enemy.glowColor.replace(')', ',0.4)').replace('rgb',
                        'rgba'));
                    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.radius * 1.6, 0, Math.PI * 2);
                    ctx.fill();

                    // Body
                    const grad = ctx.createRadialGradient(enemy.x - enemy.radius * 0.3, enemy.y -
                        enemy.radius * 0.3, enemy.radius * 0.1,
                        enemy.x, enemy.y, enemy.radius);
                    grad.addColorStop(0, 'rgba(255,255,255,0.5)');
                    grad.addColorStop(0.5, enemy.color);
                    grad.addColorStop(1, 'rgba(0,0,0,0.35)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Outline
                    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });
            }

            function drawPowerUps() {
                powerUps.forEach(pu => {
                    const pulseScale = 1 + Math.sin(pu.pulse) * 0.15;
                    const r = pu.radius * pulseScale;

                    // Outer glow
                    const glowGrad = ctx.createRadialGradient(pu.x, pu.y, r * 0.3, pu.x, pu.y, r * 2);
                    glowGrad.addColorStop(0, 'rgba(255,215,0,0.6)');
                    glowGrad.addColorStop(1, 'rgba(255,215,0,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(pu.x, pu.y, r * 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Star shape
                    ctx.fillStyle = '#ffd700';
                    ctx.strokeStyle = '#fff8dc';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = 'rgba(255,215,0,0.7)';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    const spikes = 5;
                    const outerR = r;
                    const innerR = r * 0.45;
                    for (let i = 0; i < spikes * 2; i++) {
                        const angle = (i * Math.PI) / spikes - Math.PI / 2;
                        const radius = i % 2 === 0 ? outerR : innerR;
                        const sx = pu.x + Math.cos(angle) * radius;
                        const sy = pu.y + Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(sx, sy);
                        else ctx.lineTo(sx, sy);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // Inner bright spot
                    const innerGrad = ctx.createRadialGradient(pu.x, pu.y, 0, pu.x, pu.y, r * 0.5);
                    innerGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
                    innerGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = innerGrad;
                    ctx.beginPath();
                    ctx.arc(pu.x, pu.y, r * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawParticles() {
                particles.forEach(p => {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                    if (p.color.startsWith('#')) {
                        // Convert hex to rgba
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawDashButton() {
                const btn = getDashButtonBounds();
                const alpha = player.dashCooldown > 0 ? 0.4 : 0.75;
                const pulse = player.dashCooldown <= 0.05 ? 1 + Math.sin(survivalTime * 6) * 0.08 : 1;

                // Background
                const bgGrad = ctx.createRadialGradient(btn.cx, btn.cy, btn.radius * 0.2, btn.cx, btn.cy,
                    btn.radius * pulse);
                bgGrad.addColorStop(0, `rgba(100,140,255,${alpha})`);
                bgGrad.addColorStop(1, `rgba(50,70,180,${alpha * 0.8})`);
                ctx.fillStyle = bgGrad;
                ctx.beginPath();
                ctx.arc(btn.cx, btn.cy, btn.radius * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Lightning bolt icon
                const cx = btn.cx;
                const cy = btn.cy;
                const sz = btn.radius * 0.5;
                ctx.fillStyle = `rgba(255,255,255,${alpha + 0.15})`;
                ctx.beginPath();
                ctx.moveTo(cx - sz * 0.3, cy - sz);
                ctx.lineTo(cx - sz * 0.1, cy - sz * 0.15);
                ctx.lineTo(cx + sz * 0.05, cy - sz * 0.15);
                ctx.lineTo(cx - sz * 0.5, cy + sz);
                ctx.lineTo(cx - sz * 0.15, cy + sz * 0.1);
                ctx.lineTo(cx + sz * 0.4, cy + sz * 0.1);
                ctx.lineTo(cx + sz * 0.25, cy - sz);
                ctx.closePath();
                ctx.fill();

                // Cooldown overlay
                if (player.dashCooldown > 0) {
                    const cdFraction = player.dashCooldown / PLAYER_DASH_COOLDOWN;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath();
                    ctx.moveTo(btn.cx, btn.cy);
                    ctx.arc(btn.cx, btn.cy, btn.radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 -
                        cdFraction), false);
                    ctx.closePath();
                    ctx.fill();

                    // CD text
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.font = 'bold 13px system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(Math.ceil(player.dashCooldown) + 's', btn.cx, btn.cy);
                }
            }

            function drawHUD() {
                // Score
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = 'bold 22px system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(`Score: ${Math.floor(survivalTime * 10) / 10}s`, 20, 20);
                ctx.shadowBlur = 0;

                // Best score
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '14px system-ui, sans-serif';
                ctx.fillText(`Best: ${bestScore}s`, 20, 48);

                // Shield indicator
                if (player.hasShield) {
                    const shieldLeft = Math.ceil(player.shieldTimer * 10) / 10;
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 16px system-ui, sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(`🛡 Shield ${shieldLeft}s`, W - 20, 20);
                }

                // Enemy count
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '13px system-ui, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`Balls: ${enemies.length}`, W - 20, 44);
            }

            function drawMenu() {
                // Darken background
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);

                // Title
                const titleY = H * 0.32;
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.min(52, W * 0.09)}px system-ui, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(255,200,100,0.7)';
                ctx.shadowBlur = 20;
                ctx.fillText('Biggie is Ballsy', W / 2, titleY);
                ctx.shadowBlur = 0;

                // Subtitle
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `${Math.min(18, W * 0.035)}px system-ui, sans-serif`;
                ctx.fillText('Dodge the balls. Stay alive. Be ballsy!', W / 2, titleY + 50);

                // Instructions
                const instY = titleY + 110;
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = `${Math.min(15, W * 0.028)}px system-ui, sans-serif`;
                const instructions = [
                    '🖱 Mouse / Touch — Move Biggie',
                    '⌨ WASD / Arrows — Move Biggie',
                    '⚡ SPACE / Tap button — Dash (invincible burst)',
                    '⭐ Collect stars for temporary shield',
                ];
                instructions.forEach((inst, i) => {
                    ctx.fillText(inst, W / 2, instY + i * 28);
                });

                // Start button
                const btnY = instY + instructions.length * 28 + 40;
                const btnW = 200;
                const btnH = 54;
                const btnX = W / 2 - btnW / 2;
                const pulse = 1 + Math.sin(Date.now() / 800) * 0.06;

                ctx.fillStyle = 'rgba(255,180,60,0.9)';
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(255,150,30,0.6)';
                ctx.shadowBlur = 20;
                roundRect(btnX, btnY, btnW, btnH, btnH / 2, true, true);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#1a1a1a';
                ctx.font = 'bold 20px system-ui, sans-serif';
                ctx.fillText('▶  PLAY', W / 2, btnY + btnH / 2);

                // Pulsing ring
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(btnX - 4, btnY - 4, btnW + 8, btnH + 8, btnH / 2 + 4);
                ctx.stroke();
            }

            function drawGameOver() {
                // Darken
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, W, H);

                // Game Over text
                const goY = H * 0.3;
                ctx.fillStyle = '#ff4757';
                ctx.font = `bold ${Math.min(50, W * 0.085)}px system-ui, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(255,70,70,0.7)';
                ctx.shadowBlur = 25;
                ctx.fillText('GAME OVER', W / 2, goY);
                ctx.shadowBlur = 0;

                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.min(26, W * 0.05)}px system-ui, sans-serif`;
                ctx.fillText(`Score: ${score}s`, W / 2, goY + 50);

                // Best score
                if (score >= bestScore && score > 0) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = `bold ${Math.min(20, W * 0.038)}px system-ui, sans-serif`;
                    ctx.fillText('🏆 NEW BEST! 🏆', W / 2, goY + 82);
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = `${Math.min(18, W * 0.033)}px system-ui, sans-serif`;
                    ctx.fillText(`Best: ${bestScore}s`, W / 2, goY + 78);
                }

                // Restart button
                const btn = getRestartButtonBounds();
                const pulse = 1 + Math.sin(Date.now() / 800) * 0.05;
                ctx.fillStyle = 'rgba(80,200,120,0.9)';
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(80,200,120,0.5)';
                ctx.shadowBlur = 18;
                roundRect(btn.x, btn.y, btn.w, btn.h, btn.h / 2, true, true);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#1a1a1a';
                ctx.font = 'bold 19px system-ui, sans-serif';
                ctx.fillText('↻  Play Again', W / 2, btn.y + btn.h / 2);

                ctx.strokeStyle = 'rgba(255,255,255,0.45)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(btn.x - 3, btn.y - 3, btn.w + 6, btn.h + 6, btn.h / 2 + 3);
                ctx.stroke();
            }

            function roundRect(x, y, w, h, r, fill, stroke) {
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, r);
                if (fill) ctx.fill();
                if (stroke) ctx.stroke();
            }

            function render() {
                // Clear
                ctx.clearRect(0, 0, W, H);

                // Background
                const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
                bgGrad.addColorStop(0, '#111133');
                bgGrad.addColorStop(1, '#060612');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Apply screen shake
                let shakeX = 0,
                    shakeY = 0;
                if (shakeAmount > 0.3) {
                    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Grid
                drawGrid();

                // Arena border
                drawArenaBorder();

                // Particles (under everything)
                drawParticles();

                // Power-ups
                drawPowerUps();

                // Enemies
                drawEnemies();

                // Player
                if (player.alive || gameState === 'gameover') {
                    drawPlayer();
                }

                ctx.restore();

                // HUD (not affected by shake)
                if (gameState === 'playing') {
                    drawHUD();
                    drawDashButton();
                }

                // Overlays
                if (gameState === 'menu') {
                    drawMenu();
                } else if (gameState === 'gameover') {
                    drawGameOver();
                }
            }

            // === Game Loop ===
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2; // Cap to prevent physics explosion
                lastTime = timestamp;

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            // === Initialize ===
            function init() {
                resetPlayer();
                player.x = W / 2;
                player.y = H / 2;
                player.targetX = player.x;
                player.targetY = player.y;
                mouseX = player.x;
                mouseY = player.y;
                resetEnemies();
                particles = [];
                powerUps = [];
                gameState = 'menu';
                score = 0;
                survivalTime = 0;
                shakeAmount = 0;
            }

            init();

            // Handle resize during gameplay
            window.addEventListener('resize', () => {
                resize();
                // Clamp player to new bounds
                const pad = ARENA_PADDING + player.radius;
                player.x = Math.max(pad, Math.min(W - pad, player.x));
                player.y = Math.max(pad, Math.min(H - pad, player.y));
                player.targetX = player.x;
                player.targetY = player.y;
                // Clamp enemies
                enemies.forEach(e => {
                    const epad = ARENA_PADDING + e.radius;
                    e.x = Math.max(epad, Math.min(W - epad, e.x));
                    e.y = Math.max(epad, Math.min(H - epad, e.y));
                });
            });

            // Start the loop
            requestAnimationFrame(gameLoop);

            console.log('🎮 Biggie is Ballsy — Ready!');
            console.log('   Dodge the balls. Dash with SPACE or the button. Collect stars for shields.');
        })();
    </script>
</body>
</html>
