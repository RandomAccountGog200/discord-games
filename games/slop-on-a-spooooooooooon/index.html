<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SLOP ON A SPOOOOOOOOOOON</title>
    <style>
        :root {
            --bg: #1a0a02;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #2c1810;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: none;
        }
        #game-container {
            position: relative;
            width: 500px;
            height: 700px;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 500 / 700;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255, 140, 30, 0.35), 0 0 120px rgba(0, 0, 0, 0.6);
        }
        @media (max-width: 520px) {
            #game-container {
                width: 100vw;
                height: auto;
                aspect-ratio: 500 / 700;
                max-height: 100vh;
            }
            canvas {
                border-radius: 0;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            const GAME_W = 500;
            const GAME_H = 700;
            canvas.width = GAME_W;
            canvas.height = GAME_H;

            // --- Audio ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, type, duration, vol = 0.15, slideTo = null, noiseAmount = 0) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (slideTo) osc.frequency.linearRampToValueAtTime(slideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    if (noiseAmount > 0) {
                        const noise = audioCtx.createOscillator();
                        noise.type = 'sawtooth';
                        noise.frequency.setValueAtTime(freq * 3, t);
                        const noiseGain = audioCtx.createGain();
                        noiseGain.gain.setValueAtTime(vol * noiseAmount, t);
                        noiseGain.gain.exponentialRampToValueAtTime(0.001, t + duration * 0.6);
                        noise.connect(noiseGain);
                        noiseGain.connect(audioCtx.destination);
                        noise.start(t);
                        noise.stop(t + duration * 0.6);
                    }
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* ignore */ }
            }

            function sfxCatch() { playSound(180, 'sine', 0.25, 0.18, 60, 0.5);
                playSound(300, 'triangle', 0.15, 0.12, 100, 0.3); }

            function sfxWobble() { playSound(90, 'sine', 0.3, 0.08, 40, 0.6); }

            function sfxGameOver() { playSound(60, 'sawtooth', 0.6, 0.25, 20, 0.8);
                playSound(40, 'square', 0.7, 0.2, 15, 0.4); }

            function sfxClick() { playSound(600, 'sine', 0.08, 0.06, 900, 0); }

            // --- Game State ---
            const SPOON_PIVOT_Y = 490;
            const BOWL_LOCAL_Y = -48;
            const BOWL_RX = 58;
            const BOWL_RY = 22;
            const HANDLE_LENGTH = 155;
            const HANDLE_TOP_WIDTH = 13;
            const HANDLE_BOT_WIDTH = 7;
            const MAX_TILT = Math.PI / 3.2; // ~56 degrees
            const SPOON_MOVE_SPEED = 520;
            const SPOON_SMOOTH = 0.22;
            const TILT_SPRING = 0.13;
            const TILT_DAMPING = 0.82;
            const GRAVITY_FACTOR = 0.028;
            const SLOP_FALL_BASE_SPEED = 170;
            const SLOP_FALL_MAX_SPEED = 380;

            let spoonX = GAME_W / 2;
            let spoonTargetX = GAME_W / 2;
            let spoonAngle = 0;
            let spoonAngVel = 0;
            let slopOnSpoon = [];
            let fallingSlops = [];
            let particles = [];
            let score = 0;
            let highScore = 0;
            let gameOver = false;
            let gameOverTimer = 0;
            let spawnTimer = 0;
            let spawnInterval = 75;
            let difficulty = 1;
            let shakeAmount = 0;
            let lastWobbleSound = 0;
            let comboCount = 0;
            let comboTimer = 0;
            let titleBob = 0;
            let screenShakeX = 0;
            let screenShakeY = 0;

            // Load high score
            try { highScore = parseInt(localStorage.getItem('slopSpoonHighScore')) || 0; } catch (e) { highScore =
                0; }

            function resetGame() {
                spoonX = GAME_W / 2;
                spoonTargetX = GAME_W / 2;
                spoonAngle = 0;
                spoonAngVel = 0;
                slopOnSpoon = [];
                fallingSlops = [];
                particles = [];
                score = 0;
                gameOver = false;
                gameOverTimer = 0;
                spawnTimer = 0;
                spawnInterval = 75;
                difficulty = 1;
                shakeAmount = 0;
                lastWobbleSound = 0;
                comboCount = 0;
                comboTimer = 0;
                screenShakeX = 0;
                screenShakeY = 0;
            }

            // --- Input ---
            let inputActive = false;
            let inputX = GAME_W / 2;
            let useMouseInput = false;

            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = GAME_W / rect.width;
                return (e.clientX - rect.left) * scaleX;
            }

            canvas.addEventListener('mousemove', (e) => {
                initAudio();
                inputX = getCanvasPos(e);
                inputActive = true;
                useMouseInput = true;
            });
            canvas.addEventListener('mousedown', (e) => {
                initAudio();
                inputX = getCanvasPos(e);
                inputActive = true;
                useMouseInput = true;
                if (gameOver && gameOverTimer > 0.6) {
                    sfxClick();
                    resetGame();
                }
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                inputX = getCanvasPos(e.touches[0]);
                inputActive = true;
                useMouseInput = false;
                if (gameOver && gameOverTimer > 0.6) {
                    sfxClick();
                    resetGame();
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                inputX = getCanvasPos(e.touches[0]);
                inputActive = true;
            }, { passive: false });
            canvas.addEventListener('touchend', () => {
                inputActive = false;
            });
            canvas.addEventListener('mouseleave', () => {
                inputActive = false;
            });

            document.addEventListener('keydown', (e) => {
                initAudio();
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    inputActive = true;
                    useMouseInput = false;
                    spoonTargetX = Math.max(40, spoonTargetX - SPOON_MOVE_SPEED * 0.35);
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    inputActive = true;
                    useMouseInput = false;
                    spoonTargetX = Math.min(GAME_W - 40, spoonTargetX + SPOON_MOVE_SPEED * 0.35);
                }
                if (e.key === ' ' || e.key === 'Enter') {
                    if (gameOver && gameOverTimer > 0.6) {
                        sfxClick();
                        resetGame();
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    if (gameOver && gameOverTimer > 0.6) {
                        sfxClick();
                        resetGame();
                    }
                }
            });
            document.addEventListener('keyup', (e) => {
                if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' ||
                        e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') &&
                    !useMouseInput) {
                    inputActive = false;
                }
            });

            // --- Slop Colors ---
            const slopPalettes = [
                { main: '#5d8a3c', highlight: '#8bc34a', dark: '#3d5a1e', name: 'green' },
                { main: '#7a5c3a', highlight: '#b8956a', dark: '#4a3020', name: 'brown' },
                { main: '#6b8a3a', highlight: '#9acd4a', dark: '#3e5520', name: 'olive' },
                { main: '#8a6e3c', highlight: '#c4a35a', dark: '#5a3d1e', name: 'caramel' },
                { main: '#4a7a3c', highlight: '#6ab04c', dark: '#2d4a1e', name: 'forest' },
                { main: '#9a7a4c', highlight: '#d4a96a', dark: '#5a4028', name: 'mud' },
            ];

            function randomSlopColor() {
                return slopPalettes[Math.floor(Math.random() * slopPalettes.length)];
            }

            // --- Spawn Slop ---
            function spawnFallingSlop() {
                const palette = randomSlopColor();
                const size = 7 + Math.random() * 18;
                const x = 30 + Math.random() * (GAME_W - 60);
                const speed = SLOP_FALL_BASE_SPEED + Math.random() * (SLOP_FALL_MAX_SPEED - SLOP_FALL_BASE_SPEED) *
                    (difficulty / 10);
                fallingSlops.push({
                    x: x,
                    y: -20 - Math.random() * 60,
                    size: size,
                    speed: speed,
                    color: palette,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: (Math.random() - 0.5) * 3,
                    wobbleAmp: Math.random() * 25,
                    stretch: 0.8 + Math.random() * 0.6,
                    droplets: []
                });
            }

            // --- Particles ---
            function spawnParticles(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 40 + Math.random() * 200;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 60 - Math.random() * 100,
                        life: 0.35 + Math.random() * 0.6,
                        maxLife: 0.35 + Math.random() * 0.6,
                        size: 1.5 + Math.random() * 4.5,
                        color: color.highlight,
                        gravity: 180 + Math.random() * 300,
                    });
                }
                // Add a few bigger splat droplets
                for (let i = 0; i < count / 3; i++) {
                    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
                    const speed = 30 + Math.random() * 90;
                    particles.push({
                        x: x + (Math.random() - 0.5) * 30,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 20,
                        life: 0.5 + Math.random() * 0.7,
                        maxLife: 0.5 + Math.random() * 0.7,
                        size: 3 + Math.random() * 7,
                        color: color.main,
                        gravity: 250 + Math.random() * 200,
                    });
                }
            }

            // --- Update ---
            function update(dt) {
                if (dt > 0.1) dt = 0.1; // Cap delta time

                titleBob += dt * 2.5;

                if (gameOver) {
                    gameOverTimer += dt;
                    // Continue simulating some physics for dramatic effect
                    spoonAngVel += (spoonAngle > 0 ? -1 : 1) * 3 * dt;
                    spoonAngVel *= 0.9;
                    spoonAngle += spoonAngVel * dt;
                    if (Math.abs(spoonAngle) > MAX_TILT * 1.5) {
                        spoonAngle = Math.sign(spoonAngle) * MAX_TILT * 1.5;
                        spoonAngVel *= 0.5;
                    }
                    // Update particles
                    updateParticles(dt);
                    // Update falling slops still in air
                    for (let fs of fallingSlops) {
                        fs.y += fs.speed * dt;
                        fs.wobble += fs.wobbleSpeed * dt;
                        if (fs.y > GAME_H + 60) fs.y = GAME_H + 60;
                    }
                    // Shake decay
                    shakeAmount *= Math.exp(-6 * dt);
                    screenShakeX = (Math.random() - 0.5) * shakeAmount * 20;
                    screenShakeY = (Math.random() - 0.5) * shakeAmount * 20;
                    return;
                }

                // Update combo timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) comboCount = 0;
                }

                // Difficulty increases over time
                difficulty = 1 + Math.floor(score / 150);
                spawnInterval = Math.max(18, 75 - difficulty * 5);
                if (difficulty > 8) spawnInterval = Math.max(10, 22 - difficulty * 1.5);

                // Spawn falling slop
                spawnTimer += dt * 60;
                while (spawnTimer >= spawnInterval) {
                    spawnTimer -= spawnInterval;
                    spawnFallingSlop();
                    // Sometimes spawn double
                    if (difficulty > 4 && Math.random() < 0.35) spawnFallingSlop();
                    if (difficulty > 8 && Math.random() < 0.25) spawnFallingSlop();
                }

                // Update spoon position
                if (useMouseInput && inputActive) {
                    spoonTargetX = inputX;
                }
                if (!useMouseInput && inputActive) {
                    // Keyboard controls handled in keydown
                }
                if (!inputActive && !useMouseInput) {
                    // Spoon slowly drifts toward center when no input
                    spoonTargetX += (GAME_W / 2 - spoonTargetX) * 0.8 * dt;
                }
                spoonTargetX = Math.max(35, Math.min(GAME_W - 35, spoonTargetX));
                spoonX += (spoonTargetX - spoonX) * SPOON_SMOOTH;

                // Calculate center of mass of slop on spoon
                let totalWeight = 0;
                let weightedSumX = 0;
                for (let slop of slopOnSpoon) {
                    const w = slop.size * slop.size;
                    totalWeight += w;
                    weightedSumX += slop.localX * w;
                }
                const comX = totalWeight > 0 ? weightedSumX / totalWeight : 0;

                // Target tilt angle
                const targetAngle = (comX / (BOWL_RX * 0.7)) * MAX_TILT;
                const clampedTarget = Math.max(-MAX_TILT, Math.min(MAX_TILT, targetAngle));

                // Spring physics for tilt
                const springForce = (clampedTarget - spoonAngle) * TILT_SPRING;
                spoonAngVel += springForce * dt * 60;
                spoonAngVel *= TILT_DAMPING;
                spoonAngle += spoonAngVel * dt * 60;

                // Clamp angle
                if (Math.abs(spoonAngle) > MAX_TILT * 1.05) {
                    spoonAngle = Math.sign(spoonAngle) * MAX_TILT * 1.05;
                    spoonAngVel *= 0.3;
                }

                // Warning sound when tilting heavily
                if (Math.abs(spoonAngle) > MAX_TILT * 0.7 && performance.now() / 1000 - lastWobbleSound > 0.4) {
                    sfxWobble();
                    lastWobbleSound = performance.now() / 1000;
                    shakeAmount = Math.max(shakeAmount, Math.abs(spoonAngle) / MAX_TILT * 0.7);
                }

                // Check if slop pieces fall off due to extreme tilt
                const bowlWorldCX = spoonX;
                const bowlWorldCY = SPOON_PIVOT_Y + BOWL_LOCAL_Y * Math.cos(spoonAngle);
                for (let i = slopOnSpoon.length - 1; i >= 0; i--) {
                    const piece = slopOnSpoon[i];
                    const cosA = Math.cos(spoonAngle);
                    const sinA = Math.sin(spoonAngle);
                    const worldX = bowlWorldCX + piece.localX * cosA - piece.localY * sinA;
                    const worldY = bowlWorldCY + piece.localX * sinA + piece.localY * cosA;
                    const bowlEdgeX = bowlWorldCX + (BOWL_RX + 8) * cosA * (piece.localX > 0 ? 1 : -1);
                    const distFromCenter = Math.abs(worldX - bowlWorldCX);
                    const maxDist = BOWL_RX + 8;
                    if (distFromCenter > maxDist || worldY > bowlWorldCY + BOWL_RY + 15) {
                        // Piece falls off!
                        spawnParticles(worldX, worldY, piece.color, 20);
                        slopOnSpoon.splice(i, 1);
                        shakeAmount = 1;
                        // Trigger game over
                        gameOver = true;
                        gameOverTimer = 0;
                        sfxGameOver();
                        if (score > highScore) {
                            highScore = score;
                            try { localStorage.setItem('slopSpoonHighScore', highScore); } catch (e) {}
                        }
                        // Dump remaining slop
                        for (let j = slopOnSpoon.length - 1; j >= 0; j--) {
                            const p = slopOnSpoon[j];
                            const wx = bowlWorldCX + p.localX * cosA - p.localY * sinA;
                            const wy = bowlWorldCY + p.localX * sinA + p.localY * cosA;
                            spawnParticles(wx, wy, p.color, 8);
                        }
                        slopOnSpoon = [];
                        break;
                    }
                }

                // If game over triggered by tilt
                if (!gameOver && Math.abs(spoonAngle) > MAX_TILT * 1.02 && slopOnSpoon.length > 2) {
                    gameOver = true;
                    gameOverTimer = 0;
                    sfxGameOver();
                    shakeAmount = 1.2;
                    if (score > highScore) {
                        highScore = score;
                        try { localStorage.setItem('slopSpoonHighScore', highScore); } catch (e) {}
                    }
                    const cosA = Math.cos(spoonAngle);
                    const sinA = Math.sin(spoonAngle);
                    const bowlWCX = spoonX;
                    const bowlWCY = SPOON_PIVOT_Y + BOWL_LOCAL_Y * cosA;
                    for (let j = slopOnSpoon.length - 1; j >= 0; j--) {
                        const p = slopOnSpoon[j];
                        const wx = bowlWCX + p.localX * cosA - p.localY * sinA;
                        const wy = bowlWCY + p.localX * sinA + p.localY * cosA;
                        spawnParticles(wx, wy, p.color, 10);
                    }
                    slopOnSpoon = [];
                }

                // Update falling slops
                for (let i = fallingSlops.length - 1; i >= 0; i--) {
                    const fs = fallingSlops[i];
                    fs.y += fs.speed * dt;
                    fs.wobble += fs.wobbleSpeed * dt;
                    if (fs.y > GAME_H + 80) {
                        fallingSlops.splice(i, 1);
                        continue;
                    }
                    // Check collision with spoon bowl
                    const cosA = Math.cos(spoonAngle);
                    const sinA = Math.sin(spoonAngle);
                    const bowlWCX = spoonX;
                    const bowlWCY = SPOON_PIVOT_Y + BOWL_LOCAL_Y * cosA;
                    // Transform falling slop position to spoon local space
                    const dx = fs.x - bowlWCX;
                    const dy = fs.y - bowlWCY;
                    const localX = dx * cosA + dy * sinA;
                    const localY = -dx * sinA + dy * cosA;
                    // Check if within bowl ellipse (expanded a bit for catch zone)
                    const ellipseCheck = (localX * localX) / ((BOWL_RX + fs.size * 0.5) * (BOWL_RX + fs.size * 0.5)) +
                        (localY * localY) / ((BOWL_RY + fs.size * 0.3) * (BOWL_RY + fs.size * 0.3));
                    if (ellipseCheck < 1.0 && fs.y > bowlWCY - BOWL_RY - 10 && fs.y < bowlWCY + BOWL_RY + 15 && fs.speed >
                        0) {
                        // Caught!
                        const clampX = Math.max(-BOWL_RX + fs.size * 0.4, Math.min(BOWL_RX - fs.size * 0.4, localX));
                        const sitY = BOWL_RY * 0.55 - Math.abs(clampX) * (BOWL_RY / BOWL_RX) * 0.5;
                        slopOnSpoon.push({
                            localX: clampX,
                            localY: sitY - fs.size * 0.3,
                            size: fs.size,
                            color: fs.color,
                        });
                        const worldX = bowlWCX + clampX * cosA - (sitY - fs.size * 0.3) * sinA;
                        const worldY = bowlWCY + clampX * sinA + (sitY - fs.size * 0.3) * cosA;
                        spawnParticles(worldX, worldY, fs.color, 10 + Math.floor(fs.size));
                        sfxCatch();
                        comboCount++;
                        comboTimer = 1.5;
                        const bonusPoints = comboCount >= 5 ? Math.floor(comboCount / 2) * 10 : 0;
                        score += 10 + Math.floor(fs.size / 3) + bonusPoints;
                        fallingSlops.splice(i, 1);
                        // Slight shake on catch
                        shakeAmount = Math.max(shakeAmount, 0.15 + fs.size * 0.01);
                    }
                }

                // Update particles
                updateParticles(dt);

                // Decay shake
                shakeAmount *= Math.exp(-5 * dt);
                screenShakeX = (Math.random() - 0.5) * shakeAmount * 16;
                screenShakeY = (Math.random() - 0.5) * shakeAmount * 16;

                // Ensure spoon angle stays reasonable even with no slop
                if (slopOnSpoon.length === 0 && Math.abs(spoonAngle) < 0.02 && Math.abs(spoonAngVel) < 0.05) {
                    spoonAngle = 0;
                    spoonAngVel = 0;
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    p.vy += p.gravity * dt;
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                }
            }

            // --- Render ---
            function drawSpoon(cx, pivotY, angle) {
                ctx.save();
                ctx.translate(cx + screenShakeX, pivotY + screenShakeY);
                ctx.rotate(angle);

                // Shadow
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.35)';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 6;

                // Handle
                const handleGrad = ctx.createLinearGradient(-HANDLE_TOP_WIDTH / 2, 0, HANDLE_TOP_WIDTH / 2, 0);
                handleGrad.addColorStop(0, '#8b5e3c');
                handleGrad.addColorStop(0.3, '#c89460');
                handleGrad.addColorStop(0.5, '#e8c89e');
                handleGrad.addColorStop(0.7, '#c89460');
                handleGrad.addColorStop(1, '#6b3a20');

                ctx.beginPath();
                const hy = 5;
                const hEnd = HANDLE_LENGTH;
                const htw = HANDLE_TOP_WIDTH / 2;
                const hbw = HANDLE_BOT_WIDTH / 2;
                ctx.moveTo(-htw, hy);
                ctx.lineTo(-hbw, hEnd);
                ctx.quadraticCurveTo(0, hEnd + 8, hbw, hEnd);
                ctx.lineTo(htw, hy);
                ctx.quadraticCurveTo(0, hy - 4, -htw, hy);
                ctx.closePath();
                ctx.fillStyle = handleGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(60,25,10,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Handle highlight
                ctx.beginPath();
                ctx.moveTo(-htw * 0.4, hy + 10);
                ctx.quadraticCurveTo(-hbw * 0.3, hEnd * 0.5, -hbw * 0.2, hEnd - 15);
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(255,220,180,0.4)';
                ctx.stroke();

                ctx.restore(); // shadow

                // Bowl
                const bowlCY = BOWL_LOCAL_Y;
                const bowlGrad = ctx.createLinearGradient(0, bowlCY - BOWL_RY, 0, bowlCY + BOWL_RY);
                bowlGrad.addColorStop(0, '#e8d5c0');
                bowlGrad.addColorStop(0.2, '#f5ece0');
                bowlGrad.addColorStop(0.5, '#d4b896');
                bowlGrad.addColorStop(0.8, '#c4a078');
                bowlGrad.addColorStop(1, '#8b6040');

                ctx.beginPath();
                ctx.ellipse(0, bowlCY, BOWL_RX, BOWL_RY, 0, 0, Math.PI * 2);
                ctx.fillStyle = bowlGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(80,40,15,0.55)';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Inner bowl (darker for depth)
                const innerGrad = ctx.createRadialGradient(0, bowlCY - BOWL_RY * 0.2, BOWL_RX * 0.15, 0, bowlCY,
                    BOWL_RX * 0.85);
                innerGrad.addColorStop(0, 'rgba(255,240,220,0.5)');
                innerGrad.addColorStop(0.6, 'rgba(180,140,100,0.2)');
                innerGrad.addColorStop(1, 'rgba(60,30,10,0.5)');
                ctx.beginPath();
                ctx.ellipse(0, bowlCY, BOWL_RX - 5, BOWL_RY - 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = innerGrad;
                ctx.fill();

                // Bowl rim highlight
                ctx.beginPath();
                ctx.ellipse(0, bowlCY - BOWL_RY * 0.25, BOWL_RX * 0.75, BOWL_RY * 0.35, 0, Math.PI, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,250,0.25)';
                ctx.fill();

                // Draw slop on spoon (in local space)
                for (let slop of slopOnSpoon) {
                    drawSlopBlob(slop.localX, bowlCY + slop.localY, slop.size, slop.color, true);
                }

                ctx.restore();
            }

            function drawSlopBlob(cx, cy, size, palette, onSpoon = false) {
                ctx.save();
                ctx.translate(cx, cy);
                const s = size;

                // Main blob body - irregular shape
                const n = 6 + Math.floor(s / 3);
                const points = [];
                for (let i = 0; i < n; i++) {
                    const angle = (i / n) * Math.PI * 2;
                    const r = s * (0.7 + 0.3 * Math.sin(i * 3.7 + cx * 0.5) + 0.15 * Math.cos(i * 5.1 + cy * 0.4));
                    points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r * 0.75 });
                }

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.moveTo(points[0].x + 3, points[0].y + 3);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x + 3, points[i].y + 3);
                }
                ctx.closePath();
                ctx.fill();

                // Main fill
                const blobGrad = ctx.createRadialGradient(-s * 0.2, -s * 0.3, s * 0.1, 0, s * 0.15, s * 1.1);
                blobGrad.addColorStop(0, palette.highlight);
                blobGrad.addColorStop(0.4, palette.main);
                blobGrad.addColorStop(0.85, palette.dark);
                blobGrad.addColorStop(1, 'rgba(0,0,0,0.5)');

                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.closePath();
                ctx.fillStyle = blobGrad;
                ctx.fill();

                // Glossy highlight
                const glossGrad = ctx.createRadialGradient(-s * 0.25, -s * 0.35, s * 0.05, -s * 0.1, -s * 0.15, s *
                0.6);
                glossGrad.addColorStop(0, 'rgba(255,255,255,0.65)');
                glossGrad.addColorStop(0.5, 'rgba(255,255,255,0.15)');
                glossGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.closePath();
                ctx.fillStyle = glossGrad;
                ctx.fill();

                // Subtle outline
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.restore();
            }

            function drawFallingSlop(fs) {
                ctx.save();
                const wx = fs.x + Math.sin(fs.wobble) * fs.wobbleAmp;
                ctx.translate(wx, fs.y);
                ctx.scale(1, fs.stretch);
                drawSlopBlob(0, 0, fs.size, fs.color);
                ctx.restore();
            }

            function drawBackground() {
                // Kitchen-like warm background
                const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
                bgGrad.addColorStop(0, '#3a2010');
                bgGrad.addColorStop(0.3, '#4a2815');
                bgGrad.addColorStop(0.6, '#5c3820');
                bgGrad.addColorStop(1, '#2a1508');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                // Subtle wall texture lines
                ctx.strokeStyle = 'rgba(255,200,150,0.03)';
                ctx.lineWidth = 1;
                for (let i = 0; i < GAME_H; i += 18) {
                    ctx.beginPath();
                    ctx.moveTo(0, i + Math.sin(i * 0.3) * 5);
                    for (let x = 0; x < GAME_W; x += 40) {
                        ctx.lineTo(x, i + Math.sin(i * 0.3 + x * 0.02) * 5);
                    }
                    ctx.stroke();
                }

                // Counter/table surface at bottom
                const tableGrad = ctx.createLinearGradient(0, GAME_H - 80, 0, GAME_H);
                tableGrad.addColorStop(0, '#6b3a20');
                tableGrad.addColorStop(0.15, '#8b5a3a');
                tableGrad.addColorStop(0.3, '#7a4a2a');
                tableGrad.addColorStop(1, '#3a1a08');
                ctx.fillStyle = tableGrad;
                ctx.fillRect(0, GAME_H - 80, GAME_W, 80);

                // Table edge highlight
                ctx.strokeStyle = 'rgba(255,200,150,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, GAME_H - 80);
                ctx.lineTo(GAME_W, GAME_H - 80);
                ctx.stroke();

                // Subtle wood grain on table
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 6; i++) {
                    const y = GAME_H - 75 + i * 12;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    for (let x = 0; x < GAME_W; x += 5) {
                        ctx.lineTo(x, y + Math.sin(x * 0.04 + i) * 3);
                    }
                    ctx.stroke();
                }
            }

            function drawParticles() {
                for (let p of particles) {
                    const alpha = p.life / p.maxLife;
                    const size = p.size * alpha;
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    // Tiny highlight
                    if (size > 2) {
                        ctx.fillStyle = `rgba(255,255,255,${alpha*0.5})`;
                        ctx.beginPath();
                        ctx.arc(p.x - size * 0.25, p.y - size * 0.3, size * 0.35, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawUI() {
                // Score
                const scoreY = 55 + Math.sin(titleBob) * 5;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(GAME_W / 2 - 80, scoreY - 28, 160, 48);
                ctx.strokeStyle = 'rgba(255,200,150,0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(GAME_W / 2 - 80, scoreY - 28, 160, 48, 12);
                ctx.stroke();

                ctx.fillStyle = '#fff5e8';
                ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`🍲 ${score}`, GAME_W / 2, scoreY + 6);

                // Combo display
                if (comboCount >= 3 && comboTimer > 0 && !gameOver) {
                    const comboAlpha = Math.min(1, comboTimer / 0.5);
                    const comboScale = 1 + (comboCount * 0.06);
                    ctx.save();
                    ctx.globalAlpha = comboAlpha;
                    ctx.fillStyle = '#ffdd57';
                    ctx.font = `bold ${Math.floor(18*comboScale)}px "Segoe UI", Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(`COMBO x${comboCount}!`, GAME_W / 2, scoreY - 40);
                    ctx.globalAlpha = 1;
                    ctx.restore();
                }

                // High score
                ctx.fillStyle = 'rgba(255,220,180,0.7)';
                ctx.font = '13px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`Best: ${highScore}`, GAME_W - 20, 30);

                // Title
                const titleY = 22 + Math.sin(titleBob * 1.3) * 3;
                ctx.fillStyle = '#ffd89b';
                ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('SLOP ON A SPOOOOOOOOOOON', GAME_W / 2, titleY);

                // Instructions (brief, at top)
                if (!gameOver && score < 30) {
                    const instAlpha = score < 10 ? 0.9 : Math.max(0, 0.9 - (score - 10) / 25);
                    ctx.fillStyle = `rgba(255,240,220,${instAlpha})`;
                    ctx.font = '12px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Move mouse / drag / arrow keys to balance the spoon!', GAME_W / 2, 78);
                    ctx.fillText('Catch falling slop — keep it balanced!', GAME_W / 2, 96);
                }

                // Warning indicator when tilting
                if (!gameOver && Math.abs(spoonAngle) > MAX_TILT * 0.55) {
                    const warnAlpha = (Math.abs(spoonAngle) - MAX_TILT * 0.55) / (MAX_TILT * 0.45);
                    const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 1000 * 8);
                    ctx.fillStyle = `rgba(255,80,40,${warnAlpha*pulse})`;
                    ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    const arrowDir = spoonAngle > 0 ? '◀  TILTING!  ▶' : '◀  TILTING!  ▶';
                    ctx.fillText(arrowDir, GAME_W / 2, GAME_H - 100);
                }
            }

            function drawGameOver() {
                if (!gameOver) return;
                const alpha = Math.min(1, gameOverTimer / 0.5);
                // Darken
                ctx.fillStyle = `rgba(0,0,0,${alpha*0.7})`;
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                // Panel
                const panelY = GAME_H / 2 - 10 + Math.sin(gameOverTimer * 2) * Math.max(0, 8 - gameOverTimer * 12);
                ctx.fillStyle = `rgba(30,10,5,${alpha*0.9})`;
                ctx.beginPath();
                ctx.roundRect(GAME_W / 2 - 160, panelY - 80, 320, 200, 20);
                ctx.fill();
                ctx.strokeStyle = `rgba(255,180,100,${alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.fillStyle = `rgba(255,200,140,${alpha})`;
                ctx.font = 'bold 32px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('SLOP DROPPED!', GAME_W / 2, panelY - 30);

                ctx.fillStyle = `rgba(255,240,220,${alpha})`;
                ctx.font = '20px "Segoe UI", Arial, sans-serif';
                ctx.fillText(`Score: ${score}`, GAME_W / 2, panelY + 20);
                if (score >= highScore && score > 0) {
                    ctx.fillStyle = '#ffdd57';
                    ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                    ctx.fillText('★ NEW HIGH SCORE! ★', GAME_W / 2, panelY + 48);
                } else {
                    ctx.fillStyle = `rgba(255,220,180,${alpha})`;
                    ctx.font = '14px "Segoe UI", Arial, sans-serif';
                    ctx.fillText(`Best: ${highScore}`, GAME_W / 2, panelY + 48);
                }

                // Restart button
                const btnY = panelY + 80;
                const btnAlpha = Math.min(1, Math.max(0, (gameOverTimer - 0.5) / 0.3));
                ctx.fillStyle = `rgba(200,100,40,${btnAlpha*0.8})`;
                ctx.beginPath();
                ctx.roundRect(GAME_W / 2 - 80, btnY - 20, 160, 44, 22);
                ctx.fill();
                ctx.strokeStyle = `rgba(255,200,150,${btnAlpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = `rgba(255,240,220,${btnAlpha})`;
                ctx.font = 'bold 17px "Segoe UI", Arial, sans-serif';
                ctx.fillText('🔄  PLAY AGAIN', GAME_W / 2, btnY + 8);

                if (btnAlpha > 0.5) {
                    const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 1000 * 3);
                    ctx.fillStyle = `rgba(255,255,255,${pulse*btnAlpha})`;
                    ctx.font = '11px "Segoe UI", Arial, sans-serif';
                    ctx.fillText('Click, tap, or press SPACE', GAME_W / 2, btnY + 40);
                }
            }

            function render() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);
                drawBackground();

                // Draw falling slops
                for (let fs of fallingSlops) {
                    drawFallingSlop(fs);
                }

                // Draw spoon
                drawSpoon(spoonX, SPOON_PIVOT_Y, spoonAngle);

                // Draw particles
                drawParticles();

                // Draw UI
                drawUI();

                // Draw game over overlay
                drawGameOver();

                // Vignette
                const vignetteGrad = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_W * 0.55, GAME_W / 2, GAME_H /
                    2, GAME_W * 0.75);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, GAME_W, GAME_H);
            }

            // --- Game Loop ---
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.15) dt = 0.15;
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- Initialize ---
            function init() {
                resetGame();
                // Spawn a few initial slops to get things started
                for (let i = 0; i < 3; i++) {
                    const fs = {
                        x: 60 + Math.random() * (GAME_W - 120),
                        y: -30 - Math.random() * 100,
                        size: 8 + Math.random() * 14,
                        speed: SLOP_FALL_BASE_SPEED + Math.random() * 80,
                        color: randomSlopColor(),
                        wobble: Math.random() * Math.PI * 2,
                        wobbleSpeed: (Math.random() - 0.5) * 2.5,
                        wobbleAmp: Math.random() * 20,
                        stretch: 0.8 + Math.random() * 0.5,
                        droplets: []
                    };
                    fallingSlops.push(fs);
                }
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }

            // Handle resize
            function resize() {
                const container = document.getElementById('game-container');
                const maxW = Math.min(window.innerWidth, 500);
                const maxH = Math.min(window.innerHeight, 700);
                const scale = Math.min(maxW / GAME_W, maxH / GAME_H);
                container.style.width = (GAME_W * scale) + 'px';
                container.style.height = (GAME_H * scale) + 'px';
            }
            window.addEventListener('resize', resize);
            resize();

            init();

            console.log('🍲 SLOP ON A SPOOOOOOOOOOON is ready!');
            console.log('   Move your mouse or use arrow keys to balance the spoon.');
            console.log('   Catch the falling slop and keep it balanced!');
            console.log('   Don\'t let it spill!');
        })();
    </script>
</body>
</html>
