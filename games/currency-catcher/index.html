<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>$$$₽ - Currency Catcher</title>
    <style>
        :root {
            --bg: #0a0a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(255, 180, 30, 0.25), 0 0 120px rgba(180, 120, 255, 0.15), 0 8px 40px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            image-rendering: auto;
        }

        #container {
            position: relative;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            const VIRTUAL_WIDTH = 500;
            const VIRTUAL_HEIGHT = 750;
            canvas.width = VIRTUAL_WIDTH;
            canvas.height = VIRTUAL_HEIGHT;

            let scale = 1;
            let canvasOffsetX = 0;
            let canvasOffsetY = 0;

            function resizeCanvas() {
                const maxW = window.innerWidth * 0.95;
                const maxH = window.innerHeight * 0.94;
                const s = Math.min(maxW / VIRTUAL_WIDTH, maxH / VIRTUAL_HEIGHT);
                scale = s;
                canvas.style.width = (VIRTUAL_WIDTH * s) + 'px';
                canvas.style.height = (VIRTUAL_HEIGHT * s) + 'px';
                const rect = canvas.getBoundingClientRect();
                canvasOffsetX = rect.left;
                canvasOffsetY = rect.top;
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            resizeCanvas();

            // ─── AUDIO ENGINE ────────────────────────────
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTone(freq, duration, type = 'sine', vol = 0.15, glideTo = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* silent */ }
            }

            function sfxCatch(value) {
                if (value >= 10) {
                    playTone(660, 0.15, 'sine', 0.2);
                    setTimeout(() => playTone(880, 0.12, 'sine', 0.18), 80);
                    setTimeout(() => playTone(1100, 0.18, 'sine', 0.22), 150);
                } else if (value >= 3) {
                    playTone(520, 0.1, 'sine', 0.14);
                    setTimeout(() => playTone(700, 0.1, 'sine', 0.12), 60);
                } else {
                    playTone(440, 0.08, 'sine', 0.1);
                }
            }

            function sfxBomb() {
                playTone(80, 0.3, 'sawtooth', 0.25, 30);
                playTone(55, 0.4, 'triangle', 0.2, 20);
            }

            function sfxCombo() {
                playTone(600, 0.06, 'sine', 0.12);
                setTimeout(() => playTone(800, 0.06, 'sine', 0.14), 50);
                setTimeout(() => playTone(1000, 0.08, 'sine', 0.16), 90);
            }

            function sfxGameOver() {
                playTone(400, 0.2, 'sine', 0.18, 200);
                setTimeout(() => playTone(250, 0.3, 'sine', 0.15, 100), 200);
            }

            // ─── GAME STATE ──────────────────────────────
            let gameState = 'instructions'; // 'instructions' | 'playing' | 'gameover'
            let score = 0;
            let lives = 3;
            let combo = 0;
            let maxCombo = 0;
            let difficultyLevel = 1;
            let spawnTimer = 0;
            let spawnInterval = 0.9;
            let screenShake = 0;
            let screenShakeX = 0;
            let screenShakeY = 0;
            let gameTime = 0;
            let difficultyTimer = 0;

            const player = {
                x: VIRTUAL_WIDTH / 2,
                y: VIRTUAL_HEIGHT - 95,
                width: 90,
                height: 35,
                targetX: VIRTUAL_WIDTH / 2,
                speed: 420,
                catchWidth: 100,
                catchY: VIRTUAL_HEIGHT - 85,
            };

            let items = [];
            let particles = [];
            let floatingTexts = [];
            let bgStars = [];

            // ─── BACKGROUND STARS ────────────────────────
            for (let i = 0; i < 120; i++) {
                bgStars.push({
                    x: Math.random() * VIRTUAL_WIDTH,
                    y: Math.random() * VIRTUAL_HEIGHT,
                    r: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.03 + 0.008,
                    brightness: Math.random() * 0.6 + 0.4,
                });
            }

            // ─── ITEM TYPE DEFINITIONS ──────────────────
            const ITEM_TYPES = [
                { symbol: '$', value: 1, color: '#4ade80', glow: '#22c55e', name: 'Dollar', weight: 38 },
                { symbol: '€', value: 2, color: '#60a5fa', glow: '#3b82f6', name: 'Euro', weight: 24 },
                { symbol: '£', value: 3, color: '#c084fc', glow: '#a855f7', name: 'Pound', weight: 16 },
                { symbol: '¥', value: 5, color: '#fb923c', glow: '#f97316', name: 'Yen', weight: 11 },
                { symbol: '₽', value: 10, color: '#fbbf24', glow: '#f59e0b', name: 'Ruble', weight: 4,
                isRare: true },
                { symbol: '✕', value: -99, color: '#b91c1c', glow: '#ef4444', name: 'Bomb', weight: 7, isBad: true },
            ];

            const totalWeight = ITEM_TYPES.reduce((s, t) => s + t.weight, 0);

            function getRandomItemType() {
                let r = Math.random() * totalWeight;
                for (const t of ITEM_TYPES) {
                    r -= t.weight;
                    if (r <= 0) return t;
                }
                return ITEM_TYPES[0];
            }

            // ─── INPUT HANDLING ─────────────────────────
            const keys = {};
            let mouseActive = false;
            let mouseX = VIRTUAL_WIDTH / 2;
            let touchActive = false;

            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') {
                    e.preventDefault();
                }
                if (gameState === 'instructions') {
                    initAudio();
                    startGame();
                }
                if (gameState === 'gameover' && (e.key === ' ' || e.key === 'Enter' || e.key === 'r')) {
                    restartGame();
                }
            });

            window.addEventListener('keyup', e => {
                keys[e.key] = false;
            });

            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                const sx = (e.clientX - rect.left) / (rect.width / VIRTUAL_WIDTH);
                mouseX = Math.max(20, Math.min(VIRTUAL_WIDTH - 20, sx));
                mouseActive = true;
            });

            canvas.addEventListener('mouseenter', () => { mouseActive = true; });
            canvas.addEventListener('mouseleave', () => { mouseActive = false; });

            canvas.addEventListener('click', e => {
                initAudio();
                if (gameState === 'instructions') {
                    startGame();
                } else if (gameState === 'gameover') {
                    restartGame();
                }
            });

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                initAudio();
                touchActive = true;
                const rect = canvas.getBoundingClientRect();
                const sx = (e.touches[0].clientX - rect.left) / (rect.width / VIRTUAL_WIDTH);
                mouseX = Math.max(20, Math.min(VIRTUAL_WIDTH - 20, sx));
                if (gameState === 'instructions') {
                    startGame();
                } else if (gameState === 'gameover') {
                    restartGame();
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (touchActive) {
                    const rect = canvas.getBoundingClientRect();
                    const sx = (e.touches[0].clientX - rect.left) / (rect.width / VIRTUAL_WIDTH);
                    mouseX = Math.max(20, Math.min(VIRTUAL_WIDTH - 20, sx));
                }
            }, { passive: false });

            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                touchActive = false;
            }, { passive: false });

            // ─── GAME FLOW ──────────────────────────────
            function startGame() {
                gameState = 'playing';
                score = 0;
                lives = 3;
                combo = 0;
                maxCombo = 0;
                difficultyLevel = 1;
                spawnTimer = 0;
                spawnInterval = 0.9;
                gameTime = 0;
                difficultyTimer = 0;
                screenShake = 0;
                items = [];
                particles = [];
                floatingTexts = [];
                player.x = VIRTUAL_WIDTH / 2;
                player.targetX = VIRTUAL_WIDTH / 2;
                mouseActive = false;
                touchActive = false;
            }

            function restartGame() {
                startGame();
            }

            function endGame() {
                gameState = 'gameover';
                sfxGameOver();
                // spawn lots of particles
                for (let i = 0; i < 60; i++) {
                    particles.push(createParticle(
                        player.x, player.y - 10,
                        (Math.random() - 0.5) * 400,
                        (Math.random() - 1) * 300,
                        '#ff6b6b', 4 + Math.random() * 6,
                        1.2 + Math.random() * 1.5
                    ));
                }
                screenShake = 0.5;
            }

            // ─── PARTICLE SYSTEM ────────────────────────
            function createParticle(x, y, vx, vy, color, size, life) {
                return {
                    x,
                    y,
                    vx,
                    vy,
                    color,
                    size,
                    life,
                    maxLife: life,
                    alpha: 1,
                };
            }

            function spawnCatchParticles(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 280;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed - 100;
                    particles.push(createParticle(x, y, vx, vy, color, 2 + Math.random() * 5, 0.4 + Math.random() * 0.6));
                }
            }

            function spawnRubleParticles(x, y) {
                for (let i = 0; i < 35; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 100 + Math.random() * 350;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed - 150;
                    const goldShade = Math.random() < 0.5 ? '#fbbf24' : '#f59e0b';
                    particles.push(createParticle(x, y, vx, vy, goldShade, 3 + Math.random() * 7, 0.5 + Math.random() * 0.9));
                }
                // sparkle ring
                for (let i = 0; i < 20; i++) {
                    const angle = (i / 20) * Math.PI * 2;
                    const speed = 200;
                    particles.push(createParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed - 80, '#fffbe6', 1.5 +
                        Math.random() * 3, 0.3 + Math.random() * 0.4));
                }
            }

            // ─── SPAWN ITEMS ────────────────────────────
            function spawnItem() {
                const type = getRandomItemType();
                const x = 30 + Math.random() * (VIRTUAL_WIDTH - 60);
                const baseSpeed = 100 + difficultyLevel * 18;
                const speed = baseSpeed + Math.random() * 60;
                const swayAmp = 15 + Math.random() * 30;
                const swayFreq = 0.8 + Math.random() * 1.5;
                const radius = type.isRare ? 24 : type.isBad ? 18 : 19 + Math.random() * 5;

                items.push({
                    x,
                    y: -40 - Math.random() * 60,
                    speed,
                    swayAmp,
                    swayFreq,
                    swayOffset: Math.random() * Math.PI * 2,
                    radius,
                    type,
                    alive: true,
                    pulsePhase: Math.random() * Math.PI * 2,
                    sparkTimer: 0,
                });
            }

            // ─── UPDATE ──────────────────────────────────
            function update(dt) {
                if (gameState !== 'playing') {
                    // still update particles
                    updateParticles(dt);
                    updateFloatingTexts(dt);
                    if (screenShake > 0) {
                        screenShake -= dt;
                        if (screenShake < 0) screenShake = 0;
                        screenShakeX = (Math.random() - 0.5) * screenShake * 30;
                        screenShakeY = (Math.random() - 0.5) * screenShake * 30;
                    } else {
                        screenShakeX = 0;
                        screenShakeY = 0;
                    }
                    return;
                }

                const dtClamped = Math.min(dt, 0.1);
                gameTime += dtClamped;
                difficultyTimer += dtClamped;

                // increase difficulty
                if (difficultyTimer > 18) {
                    difficultyTimer = 0;
                    difficultyLevel++;
                    spawnInterval = Math.max(0.35, 0.9 - (difficultyLevel - 1) * 0.06);
                }

                // screen shake decay
                if (screenShake > 0) {
                    screenShake -= dtClamped;
                    if (screenShake < 0) screenShake = 0;
                    screenShakeX = (Math.random() - 0.5) * screenShake * 30;
                    screenShakeY = (Math.random() - 0.5) * screenShake * 30;
                } else {
                    screenShakeX = 0;
                    screenShakeY = 0;
                }

                // player movement
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    player.targetX -= player.speed * dtClamped;
                    mouseActive = false;
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    player.targetX += player.speed * dtClamped;
                    mouseActive = false;
                }
                if (mouseActive || touchActive) {
                    player.targetX = mouseX;
                }
                player.targetX = Math.max(30, Math.min(VIRTUAL_WIDTH - 30, player.targetX));
                const dx = player.targetX - player.x;
                const moveSpeed = (mouseActive || touchActive) ? 900 : player.speed;
                if (Math.abs(dx) < 1) {
                    player.x = player.targetX;
                } else {
                    player.x += Math.sign(dx) * Math.min(Math.abs(dx), moveSpeed * dtClamped);
                }

                // spawn items
                spawnTimer += dtClamped;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    spawnItem();
                    // occasional double spawn
                    if (Math.random() < 0.2 + difficultyLevel * 0.03) {
                        setTimeout(() => {
                            if (gameState === 'playing') spawnItem();
                        }, 120 + Math.random() * 200);
                    }
                }

                // update items
                for (const item of items) {
                    if (!item.alive) continue;
                    item.y += item.speed * dtClamped;
                    item.swayOffset += item.swayFreq * dtClamped;
                    item.pulsePhase += dtClamped * 3;
                    const swayX = Math.sin(item.swayOffset) * item.swayAmp;
                    item.displayX = item.x + swayX;
                    item.displayY = item.y;

                    // spark timer for rare items
                    if (item.type.isRare) {
                        item.sparkTimer += dtClamped;
                        if (item.sparkTimer > 0.08) {
                            item.sparkTimer = 0;
                            const sx = item.displayX + (Math.random() - 0.5) * 30;
                            const sy = item.displayY + (Math.random() - 0.5) * 30;
                            particles.push(createParticle(sx, sy, (Math.random() - 0.5) * 30, -40 - Math.random() * 60,
                                '#fffbe6', 1 + Math.random() * 2, 0.25 + Math.random() * 0.3));
                        }
                    }

                    // check if caught by player
                    const catchZoneTop = player.catchY - 18;
                    const catchZoneBottom = player.catchY + 20;
                    const catchZoneLeft = player.x - player.catchWidth / 2;
                    const catchZoneRight = player.x + player.catchWidth / 2;

                    if (item.displayY + item.radius > catchZoneTop &&
                        item.displayY - item.radius < catchZoneBottom &&
                        item.displayX > catchZoneLeft &&
                        item.displayX < catchZoneRight) {

                        if (item.type.isBad) {
                            // bomb hit
                            item.alive = false;
                            lives--;
                            combo = 0;
                            screenShake = 0.45;
                            sfxBomb();
                            spawnCatchParticles(item.displayX, item.displayY, '#ef4444', 30);
                            floatingTexts.push({
                                x: item.displayX,
                                y: item.displayY,
                                text: '💥 -1 LIFE',
                                color: '#ff4444',
                                life: 1.5,
                                maxLife: 1.5,
                                vy: -90,
                            });
                            if (lives <= 0) {
                                endGame();
                                return;
                            }
                        } else {
                            // caught currency
                            item.alive = false;
                            const baseValue = item.type.value;
                            const comboMultiplier = 1 + Math.floor(combo / 5) * 0.5;
                            const points = Math.round(baseValue * comboMultiplier);
                            score += points;
                            combo++;
                            if (combo > maxCombo) maxCombo = combo;

                            sfxCatch(item.type.value);
                            if (combo > 1 && combo % 5 === 0) sfxCombo();

                            if (item.type.isRare) {
                                spawnRubleParticles(item.displayX, item.displayY);
                                floatingTexts.push({
                                    x: item.displayX,
                                    y: item.displayY,
                                    text: '+' + points + ' ⭐RUBLE!',
                                    color: '#fbbf24',
                                    life: 2.0,
                                    maxLife: 2.0,
                                    vy: -110,
                                });
                            } else {
                                spawnCatchParticles(item.displayX, item.displayY, item.type.color, 18);
                                floatingTexts.push({
                                    x: item.displayX,
                                    y: item.displayY,
                                    text: '+' + points,
                                    color: item.type.color,
                                    life: 1.2,
                                    maxLife: 1.2,
                                    vy: -80,
                                });
                            }

                            if (combo > 1 && combo % 5 === 0) {
                                floatingTexts.push({
                                    x: player.x,
                                    y: player.y - 30,
                                    text: '🔥 COMBO x' + combo + '!',
                                    color: '#ff9500',
                                    life: 1.8,
                                    maxLife: 1.8,
                                    vy: -100,
                                });
                            }
                        }
                    }

                    // check if item fell off screen
                    if (item.displayY > VIRTUAL_HEIGHT + 50) {
                        if (!item.type.isBad && item.alive) {
                            // missed currency - reset combo
                            combo = 0;
                            floatingTexts.push({
                                x: item.displayX,
                                y: VIRTUAL_HEIGHT - 20,
                                text: 'miss!',
                                color: '#888888',
                                life: 0.8,
                                maxLife: 0.8,
                                vy: -50,
                            });
                        }
                        item.alive = false;
                    }
                }

                // cleanup
                items = items.filter(i => i.alive);

                // update particles
                updateParticles(dtClamped);

                // update floating texts
                updateFloatingTexts(dtClamped);

                // update bg stars
                for (const star of bgStars) {
                    star.twinkle += star.twinkleSpeed;
                    star.y += 6 * dtClamped;
                    if (star.y > VIRTUAL_HEIGHT + 10) {
                        star.y = -10;
                        star.x = Math.random() * VIRTUAL_WIDTH;
                    }
                }
            }

            function updateParticles(dt) {
                for (const p of particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 200 * dt;
                    p.life -= dt;
                    p.alpha = Math.max(0, p.life / p.maxLife);
                }
                particles = particles.filter(p => p.life > 0);
            }

            function updateFloatingTexts(dt) {
                for (const ft of floatingTexts) {
                    ft.y += ft.vy * dt;
                    ft.vy *= 0.98;
                    ft.life -= dt;
                }
                floatingTexts = floatingTexts.filter(ft => ft.life > 0);
            }

            // ─── DRAWING ─────────────────────────────────
            function drawBackground() {
                // gradient sky
                const grad = ctx.createLinearGradient(0, 0, 0, VIRTUAL_HEIGHT);
                grad.addColorStop(0, '#0b0b2e');
                grad.addColorStop(0.4, '#111142');
                grad.addColorStop(0.75, '#1a1040');
                grad.addColorStop(1, '#0d0d1f');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

                // stars
                for (const star of bgStars) {
                    const alpha = star.brightness * (0.55 + 0.45 * Math.sin(star.twinkle));
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                // subtle ground glow
                const groundGlow = ctx.createRadialGradient(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT - 20, 30, VIRTUAL_WIDTH / 2,
                    VIRTUAL_HEIGHT - 20, 280);
                groundGlow.addColorStop(0, 'rgba(255,180,60,0.12)');
                groundGlow.addColorStop(0.5, 'rgba(180,120,255,0.06)');
                groundGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = groundGlow;
                ctx.fillRect(0, VIRTUAL_HEIGHT - 300, VIRTUAL_WIDTH, 300);
            }

            function drawPlayerBasket() {
                const { x, y } = player;
                ctx.save();
                // outer glow
                const glowGrad = ctx.createRadialGradient(x, y, 5, x, y, 70);
                glowGrad.addColorStop(0, 'rgba(255,200,80,0.35)');
                glowGrad.addColorStop(0.6, 'rgba(255,150,40,0.1)');
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(x, y, 70, 0, Math.PI * 2);
                ctx.fill();

                // basket body
                const bx = x;
                const by = y;
                ctx.beginPath();
                // top rim - wide opening
                ctx.moveTo(bx - 48, by - 6);
                ctx.quadraticCurveTo(bx - 48, by - 16, bx - 36, by - 16);
                ctx.lineTo(bx + 36, by - 16);
                ctx.quadraticCurveTo(bx + 48, by - 16, bx + 48, by - 6);
                // right side
                ctx.quadraticCurveTo(bx + 48, by + 14, bx + 32, by + 22);
                // bottom
                ctx.quadraticCurveTo(bx, by + 28, bx - 32, by + 22);
                // left side
                ctx.quadraticCurveTo(bx - 48, by + 14, bx - 48, by - 6);
                ctx.closePath();

                // basket gradient
                const basketGrad = ctx.createLinearGradient(bx, by - 16, bx, by + 28);
                basketGrad.addColorStop(0, '#c8954a');
                basketGrad.addColorStop(0.3, '#a06b2f');
                basketGrad.addColorStop(0.7, '#6b3a1f');
                basketGrad.addColorStop(1, '#4a1f0d');
                ctx.fillStyle = basketGrad;
                ctx.fill();
                ctx.strokeStyle = '#e8c878';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // rim highlight
                ctx.beginPath();
                ctx.moveTo(bx - 44, by - 14);
                ctx.quadraticCurveTo(bx - 44, by - 20, bx - 34, by - 20);
                ctx.lineTo(bx + 34, by - 20);
                ctx.quadraticCurveTo(bx + 44, by - 20, bx + 44, by - 14);
                ctx.strokeStyle = '#f0d890';
                ctx.lineWidth = 3;
                ctx.stroke();

                // inner shadow
                const innerGrad = ctx.createLinearGradient(bx, by - 16, bx, by + 10);
                innerGrad.addColorStop(0, 'rgba(0,0,0,0.35)');
                innerGrad.addColorStop(1, 'rgba(0,0,0,0.05)');
                ctx.fillStyle = innerGrad;
                ctx.beginPath();
                ctx.moveTo(bx - 38, by - 10);
                ctx.quadraticCurveTo(bx - 38, by - 2, bx - 28, by + 6);
                ctx.quadraticCurveTo(bx, by + 14, bx + 28, by + 6);
                ctx.quadraticCurveTo(bx + 38, by - 2, bx + 38, by - 10);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            function drawItem(item) {
                if (!item.alive) return;
                const { displayX, displayY, radius, type } = item;
                const pulse = 1 + Math.sin(item.pulsePhase) * 0.08;

                ctx.save();
                const r = radius * pulse;

                // outer glow
                const glowGrad = ctx.createRadialGradient(displayX, displayY, r * 0.6, displayX, displayY, r * 2.2);
                glowGrad.addColorStop(0, type.glow);
                glowGrad.addColorStop(0.5, type.glow + '88');
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(displayX, displayY, r * 2.2, 0, Math.PI * 2);
                ctx.fill();

                // main circle
                const mainGrad = ctx.createRadialGradient(displayX - r * 0.2, displayY - r * 0.25, r * 0.1, displayX, displayY,
                r);
                mainGrad.addColorStop(0, '#ffffff');
                mainGrad.addColorStop(0.25, type.color);
                mainGrad.addColorStop(0.7, type.color + 'cc');
                mainGrad.addColorStop(1, 'rgba(0,0,0,0.35)');
                ctx.fillStyle = mainGrad;
                ctx.beginPath();
                ctx.arc(displayX, displayY, r, 0, Math.PI * 2);
                ctx.fill();

                // border
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // symbol
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${r*1.25}px "Segoe UI", "Arial", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 3;
                ctx.fillText(type.symbol, displayX, displayY + 1);
                ctx.shadowBlur = 0;

                // rare item extra sparkle ring
                if (type.isRare) {
                    ctx.strokeStyle = 'rgba(255,255,200,0.5)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 6]);
                    ctx.lineDashOffset = gameTime * 60;
                    ctx.beginPath();
                    ctx.arc(displayX, displayY, r + 6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // extra golden spikes
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 + gameTime * 1.5;
                        const sx = displayX + Math.cos(angle) * (r + 2);
                        const sy = displayY + Math.sin(angle) * (r + 2);
                        ctx.fillStyle = '#fffbe6';
                        ctx.beginPath();
                        ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                ctx.restore();
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.fillStyle = p.color.replace(')', `,${p.alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawFloatingTexts() {
                for (const ft of floatingTexts) {
                    const alpha = Math.max(0, ft.life / ft.maxLife);
                    const scale = 1 + (1 - alpha) * 0.3;
                    ctx.fillStyle = ft.color.replace(')', `,${alpha})`);
                    if (ft.color.startsWith('#')) {
                        const r = parseInt(ft.color.slice(1, 3), 16);
                        const g = parseInt(ft.color.slice(3, 5), 16);
                        const b = parseInt(ft.color.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.font = `bold ${16*scale}px "Segoe UI", "Arial", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0,0,0,0.6)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.shadowBlur = 0;
                }
            }

            function drawUI() {
                // score
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "Segoe UI", "Arial", sans-serif';
                ctx.textAlign = 'left';
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = 5;
                ctx.fillText('💰 ' + score.toLocaleString(), 20, 38);
                ctx.shadowBlur = 0;

                // combo
                if (combo > 1 && gameState === 'playing') {
                    const comboAlpha = 0.7 + 0.3 * Math.sin(gameTime * 6);
                    ctx.fillStyle = `rgba(255,149,0,${comboAlpha})`;
                    ctx.font = 'bold 16px "Segoe UI", "Arial", sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText('🔥 x' + combo, 20, 62);
                }

                // lives
                ctx.textAlign = 'right';
                ctx.font = '20px "Segoe UI", "Arial", sans-serif';
                let heartsStr = '';
                for (let i = 0; i < lives; i++) heartsStr += '❤️ ';
                for (let i = lives; i < 3; i++) heartsStr += '🖤 ';
                ctx.fillText(heartsStr.trim(), VIRTUAL_WIDTH - 20, 36);

                // difficulty indicator
                if (gameState === 'playing' && difficultyLevel > 1) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = '12px "Segoe UI", "Arial", sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText('Level ' + difficultyLevel, VIRTUAL_WIDTH - 20, 58);
                }
            }

            function drawInstructions() {
                // dark overlay
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

                // title
                ctx.fillStyle = '#fbbf24';
                ctx.font = 'bold 48px "Segoe UI", "Arial", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,180,50,0.7)';
                ctx.shadowBlur = 25;
                ctx.fillText('$$$₽', VIRTUAL_WIDTH / 2, 160);
                ctx.shadowBlur = 0;

                // subtitle
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Segoe UI", "Arial", sans-serif';
                ctx.fillText('Currency Catcher', VIRTUAL_WIDTH / 2, 200);

                // instructions
                ctx.fillStyle = '#cccccc';
                ctx.font = '15px "Segoe UI", "Arial", sans-serif';
                const lines = [
                    'Catch falling currency!',
                    '',
                    '💰  $ 1pt    € 2pt    £ 3pt',
                    '💰  ¥ 5pt    ₽ 10pt ⭐RARE!',
                    '',
                    '💣  Avoid the bombs!',
                    '',
                    '🖱️  Mouse / Touch to move',
                    '⌨️  Arrow keys or A/D',
                    '',
                    'Consecutive catches = COMBO bonus!',
                ];
                let ly = 250;
                for (const line of lines) {
                    if (line === '') {
                        ly += 10;
                        continue;
                    }
                    ctx.fillText(line, VIRTUAL_WIDTH / 2, ly);
                    ly += 26;
                }

                // start prompt
                const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 800);
                ctx.fillStyle = `rgba(255,255,255,${pulse})`;
                ctx.font = 'bold 20px "Segoe UI", "Arial", sans-serif';
                ctx.fillText('TAP or CLICK to START', VIRTUAL_WIDTH / 2, ly + 40);
            }

            function drawGameOver() {
                // dark overlay
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 42px "Segoe UI", "Arial", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,80,80,0.6)';
                ctx.shadowBlur = 20;
                ctx.fillText('GAME OVER', VIRTUAL_WIDTH / 2, 220);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 28px "Segoe UI", "Arial", sans-serif';
                ctx.fillText('Score: ' + score.toLocaleString(), VIRTUAL_WIDTH / 2, 280);

                ctx.fillStyle = '#ffd700';
                ctx.font = '18px "Segoe UI", "Arial", sans-serif';
                ctx.fillText('Max Combo: ' + maxCombo, VIRTUAL_WIDTH / 2, 320);

                ctx.fillStyle = '#aaaaaa';
                ctx.font = '15px "Segoe UI", "Arial", sans-serif';
                ctx.fillText('Reached Level ' + difficultyLevel, VIRTUAL_WIDTH / 2, 350);

                const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 700);
                ctx.fillStyle = `rgba(255,255,255,${pulse})`;
                ctx.font = 'bold 20px "Segoe UI", "Arial", sans-serif';
                ctx.fillText('TAP or CLICK to RETRY', VIRTUAL_WIDTH / 2, 420);
                ctx.fillText('or press SPACE / ENTER', VIRTUAL_WIDTH / 2, 450);
            }

            // ─── MAIN RENDER ────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
                drawBackground();

                // apply screen shake
                let sx = 0,
                    sy = 0;
                if (screenShake > 0) {
                    sx = screenShakeX;
                    sy = screenShakeY;
                }

                ctx.save();
                ctx.translate(sx, sy);

                // draw items
                for (const item of items) {
                    drawItem(item);
                }

                // draw particles
                drawParticles();

                // draw floating texts
                drawFloatingTexts();

                // draw player
                if (gameState === 'playing' || gameState === 'gameover') {
                    drawPlayerBasket();
                } else {
                    // draw player in instructions too
                    player.x = player.targetX;
                    drawPlayerBasket();
                }

                ctx.restore();

                // draw UI (not affected by shake)
                drawUI();

                // state overlays
                if (gameState === 'instructions') {
                    drawInstructions();
                } else if (gameState === 'gameover') {
                    drawGameOver();
                }
            }

            // ─── GAME LOOP ──────────────────────────────
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.15) dt = 0.15;
                lastTime = timestamp;

                update(dt);
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ─── INIT ────────────────────────────────────
            function init() {
                resizeCanvas();
                player.x = VIRTUAL_WIDTH / 2;
                player.targetX = VIRTUAL_WIDTH / 2;
                // pre-spawn a few items for visual appeal on instructions
                for (let i = 0; i < 5; i++) {
                    const type = ITEM_TYPES[Math.floor(Math.random() * 5)];
                    const item = {
                        x: 50 + Math.random() * (VIRTUAL_WIDTH - 100),
                        y: 100 + Math.random() * 450,
                        speed: 30 + Math.random() * 40,
                        swayAmp: 20 + Math.random() * 25,
                        swayFreq: 0.6 + Math.random() * 1.2,
                        swayOffset: Math.random() * Math.PI * 2,
                        radius: type.isRare ? 24 : 18 + Math.random() * 5,
                        type,
                        alive: true,
                        pulsePhase: Math.random() * Math.PI * 2,
                        sparkTimer: 0,
                        displayX: 0,
                        displayY: 0,
                    };
                    item.displayX = item.x;
                    item.displayY = item.y;
                    items.push(item);
                }
                requestAnimationFrame(gameLoop);
            }

            init();
        })();
    </script>
</body>
