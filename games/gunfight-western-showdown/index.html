<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GUNFIGHT - Western Showdown</title>
    <style>
        :root {
            --bg: #1a0a00;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Georgia', 'Times New Roman', serif;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            let W, H, dpr;
            let gameState = 'intro'; // 'intro' | 'playing' | 'gameover'
            let score = 0;
            let playerHealth = 5;
            let maxHealth = 5;
            let shakeAmount = 0;
            let flashAlpha = 0;
            let spawnTimer = 0;
            let spawnInterval = 2.0;
            let difficultyLevel = 1;
            let maxEnemies = 5;
            let enemiesKilledTotal = 0;
            let lastTime = 0;
            let dt = 0;
            let isMobile = false;
            let floatingTexts = [];
            let comboCount = 0;
            let comboTimer = 0;
            const COMBO_WINDOW = 0.8;

            // Input state
            let keys = {};
            let mouseX = 0;
            let mouseY = 0;
            let mouseDown = false;
            let mouseOnScreen = false;

            // Mobile joystick
            let joystickActive = false;
            let joystickTouchId = null;
            let joystickOrigin = { x: 0, y: 0 };
            let joystickCurrent = { x: 0, y: 0 };
            let joystickVector = { x: 0, y: 0 };

            // Mobile shoot
            let shootTouchActive = false;
            let shootTouchId = null;

            // Player
            let player = {
                x: 0,
                y: 0,
                vx: 0,
                vy: 0,
                radius: 22,
                speed: 220,
                angle: 0,
                shootCooldown: 0,
                shootRate: 0.28,
                invincibleTimer: 0,
            };

            // Game objects
            let enemies = [];
            let playerBullets = [];
            let enemyBullets = [];
            let particles = [];

            // Sound engine
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
            }

            function playSound(type) {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const gain = audioCtx.createGain();
                    gain.connect(audioCtx.destination);

                    if (type === 'gunshot') {
                        const bufferSize = Math.floor(audioCtx.sampleRate * 0.08);
                        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            const t = i / bufferSize;
                            data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 25) * 0.8;
                        }
                        const noise = audioCtx.createBufferSource();
                        noise.buffer = buffer;
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.frequency.value = 300;
                        filter.Q.value = 0.8;
                        noise.connect(filter);
                        filter.connect(gain);
                        gain.gain.setValueAtTime(0.7, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                        noise.start(now);
                        noise.stop(now + 0.1);

                        const osc = audioCtx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(120, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.06);
                        const oscGain = audioCtx.createGain();
                        oscGain.gain.setValueAtTime(0.5, now);
                        oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                        osc.connect(oscGain);
                        oscGain.connect(audioCtx.destination);
                        osc.start(now);
                        osc.stop(now + 0.06);
                    } else if (type === 'hit') {
                        const bufferSize = Math.floor(audioCtx.sampleRate * 0.05);
                        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            const t = i / bufferSize;
                            data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 30) * 0.5;
                        }
                        const noise = audioCtx.createBufferSource();
                        noise.buffer = buffer;
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'highpass';
                        filter.frequency.value = 800;
                        noise.connect(filter);
                        filter.connect(gain);
                        gain.gain.setValueAtTime(0.5, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                        noise.start(now);
                        noise.stop(now + 0.06);
                    } else if (type === 'death') {
                        const bufferSize = Math.floor(audioCtx.sampleRate * 0.15);
                        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            const t = i / bufferSize;
                            data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 12) * 0.6;
                        }
                        const noise = audioCtx.createBufferSource();
                        noise.buffer = buffer;
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 200;
                        noise.connect(filter);
                        filter.connect(gain);
                        gain.gain.setValueAtTime(0.6, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                        noise.start(now);
                        noise.stop(now + 0.18);
                    } else if (type === 'playerHit') {
                        const bufferSize = Math.floor(audioCtx.sampleRate * 0.12);
                        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            const t = i / bufferSize;
                            data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 18) * 0.7;
                        }
                        const noise = audioCtx.createBufferSource();
                        noise.buffer = buffer;
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 150;
                        noise.connect(filter);
                        filter.connect(gain);
                        gain.gain.setValueAtTime(0.8, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        noise.start(now);
                        noise.stop(now + 0.15);
                    }
                } catch (e) {
                    // Silently fail
                }
            }

            function resizeCanvas() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                if (player.x === 0 && player.y === 0) {
                    player.x = W / 2;
                    player.y = H / 2;
                }
            }

            function spawnEnemy() {
                let side = Math.floor(Math.random() * 4);
                let x, y;
                const margin = 40;
                switch (side) {
                    case 0:
                        x = -margin;
                        y = Math.random() * H;
                        break;
                    case 1:
                        x = W + margin;
                        y = Math.random() * H;
                        break;
                    case 2:
                        x = Math.random() * W;
                        y = -margin;
                        break;
                    case 3:
                        x = Math.random() * W;
                        y = H + margin;
                        break;
                }
                const baseSpeed = 70 + difficultyLevel * 12;
                const speed = baseSpeed + Math.random() * 40;
                enemies.push({
                    x: x,
                    y: y,
                    vx: 0,
                    vy: 0,
                    radius: 18,
                    speed: speed,
                    health: 1,
                    shootTimer: 1.0 + Math.random() * 2.5,
                    shootCooldown: 1.2 + Math.random() * 2.0 - difficultyLevel * 0.08,
                    angle: 0,
                    strafeAngle: Math.random() * Math.PI * 2,
                    strafeTimer: 0,
                    strafePeriod: 1.5 + Math.random() * 2,
                    preferredDist: 120 + Math.random() * 200,
                });
            }

            function spawnParticle(x, y, count, color, speed, life, size) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = speed * (0.4 + Math.random() * 0.6);
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd,
                        life: life * (0.5 + Math.random() * 0.5),
                        maxLife: life,
                        color: color,
                        size: size * (0.5 + Math.random() * 0.5),
                    });
                }
            }

            function spawnMuzzleFlash(x, y, angle) {
                for (let i = 0; i < 8; i++) {
                    const a = angle + (Math.random() - 0.5) * 0.6;
                    const spd = 200 + Math.random() * 300;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(a) * spd,
                        vy: Math.sin(a) * spd,
                        life: 0.06 + Math.random() * 0.06,
                        maxLife: 0.1,
                        color: '#ffff88',
                        size: 2.5 + Math.random() * 3,
                    });
                }
                for (let i = 0; i < 5; i++) {
                    const a = angle + (Math.random() - 0.5) * 0.4;
                    const spd = 80 + Math.random() * 150;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(a) * spd,
                        vy: Math.sin(a) * spd,
                        life: 0.1 + Math.random() * 0.08,
                        maxLife: 0.15,
                        color: '#ffaa33',
                        size: 3 + Math.random() * 4,
                    });
                }
            }

            function addFloatingText(x, y, text, color) {
                floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    life: 1.0,
                    maxLife: 1.0,
                    color: color,
                });
            }

            function resetGame() {
                score = 0;
                playerHealth = maxHealth;
                player.x = W / 2;
                player.y = H / 2;
                player.vx = 0;
                player.vy = 0;
                player.angle = 0;
                player.shootCooldown = 0;
                player.invincibleTimer = 0;
                enemies = [];
                playerBullets = [];
                enemyBullets = [];
                particles = [];
                floatingTexts = [];
                shakeAmount = 0;
                flashAlpha = 0;
                spawnTimer = 0;
                spawnInterval = 2.0;
                difficultyLevel = 1;
                maxEnemies = 5;
                enemiesKilledTotal = 0;
                comboCount = 0;
                comboTimer = 0;
                joystickActive = false;
                joystickTouchId = null;
                joystickVector = { x: 0, y: 0 };
                shootTouchActive = false;
                shootTouchId = null;
            }

            function startGame() {
                initAudio();
                resetGame();
                gameState = 'playing';
                player.x = W / 2;
                player.y = H / 2;
            }

            function playerShoot() {
                if (player.shootCooldown > 0) return;
                player.shootCooldown = player.shootRate;
                const gunTipDist = player.radius + 6;
                const bx = player.x + Math.cos(player.angle) * gunTipDist;
                const by = player.y + Math.sin(player.angle) * gunTipDist;
                const bulletSpeed = 550;
                playerBullets.push({
                    x: bx,
                    y: by,
                    vx: Math.cos(player.angle) * bulletSpeed,
                    vy: Math.sin(player.angle) * bulletSpeed,
                    radius: 3.5,
                    life: 1.5,
                    trail: [],
                });
                spawnMuzzleFlash(bx, by, player.angle);
                playSound('gunshot');
                shakeAmount = Math.max(shakeAmount, 1.2);
            }

            function enemyShoot(enemy) {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const angle = Math.atan2(dy, dx);
                const gunTipDist = enemy.radius + 5;
                const bx = enemy.x + Math.cos(angle) * gunTipDist;
                const by = enemy.y + Math.sin(angle) * gunTipDist;
                const bulletSpeed = 300 + difficultyLevel * 8;
                const spread = (Math.random() - 0.5) * 0.35;
                const finalAngle = angle + spread;
                enemyBullets.push({
                    x: bx,
                    y: by,
                    vx: Math.cos(finalAngle) * bulletSpeed,
                    vy: Math.sin(finalAngle) * bulletSpeed,
                    radius: 3,
                    life: 2.5,
                    trail: [],
                });
                spawnMuzzleFlash(bx, by, finalAngle);
                playSound('gunshot');
            }

            function update(dt) {
                if (gameState !== 'playing') return;

                // Update difficulty
                difficultyLevel = 1 + Math.floor(enemiesKilledTotal / 8);
                maxEnemies = Math.min(5 + difficultyLevel * 2, 22);
                spawnInterval = Math.max(0.4, 2.0 - difficultyLevel * 0.12);

                // Spawn enemies
                spawnTimer += dt;
                if (spawnTimer >= spawnInterval && enemies.length < maxEnemies) {
                    spawnTimer = 0;
                    spawnEnemy();
                    if (difficultyLevel >= 4 && Math.random() < 0.35) {
                        spawnEnemy();
                    }
                    if (difficultyLevel >= 8 && Math.random() < 0.25) {
                        spawnEnemy();
                    }
                }

                // Update player
                let moveX = 0;
                let moveY = 0;
                if (keys['KeyW'] || keys['ArrowUp']) moveY = -1;
                if (keys['KeyS'] || keys['ArrowDown']) moveY = 1;
                if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
                if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;

                if (joystickActive) {
                    moveX = joystickVector.x;
                    moveY = joystickVector.y;
                }

                const moveMag = Math.sqrt(moveX * moveX + moveY * moveY);
                if (moveMag > 1) {
                    moveX /= moveMag;
                    moveY /= moveMag;
                }

                player.vx = moveX * player.speed;
                player.vy = moveY * player.speed;
                player.x += player.vx * dt;
                player.y += player.vy * dt;

                // Clamp player to screen
                player.x = Math.max(player.radius, Math.min(W - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(H - player.radius, player.y));

                // Player facing direction
                if (isMobile) {
                    let nearestEnemy = null;
                    let nearestDist = 350;
                    for (const enemy of enemies) {
                        const dx = enemy.x - player.x;
                        const dy = enemy.y - player.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < nearestDist) {
                            nearestDist = dist;
                            nearestEnemy = enemy;
                        }
                    }
                    if (nearestEnemy) {
                        player.angle = Math.atan2(nearestEnemy.y - player.y, nearestEnemy.x - player.x);
                    } else if (moveMag > 0.15) {
                        player.angle = Math.atan2(moveY, moveX);
                    }
                } else if (mouseOnScreen) {
                    player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
                } else if (moveMag > 0.15) {
                    player.angle = Math.atan2(moveY, moveX);
                }

                // Player shooting
                if (player.shootCooldown > 0) player.shootCooldown -= dt;
                if (player.invincibleTimer > 0) player.invincibleTimer -= dt;

                if ((mouseDown && !isMobile) || (shootTouchActive && isMobile)) {
                    if (player.shootCooldown <= 0) {
                        playerShoot();
                    }
                }

                // Update enemies
                for (const enemy of enemies) {
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    enemy.angle = Math.atan2(dy, dx);

                    // AI movement
                    let targetX = player.x;
                    let targetY = player.y;
                    if (dist < enemy.preferredDist * 0.6) {
                        targetX = enemy.x - (dx / dist) * enemy.preferredDist;
                        targetY = enemy.y - (dy / dist) * enemy.preferredDist;
                    }

                    enemy.strafeTimer += dt;
                    if (enemy.strafeTimer >= enemy.strafePeriod) {
                        enemy.strafeTimer = 0;
                        enemy.strafeAngle = Math.random() * Math.PI * 2;
                        enemy.strafePeriod = 1.2 + Math.random() * 2.5;
                    }

                    const strafeX = Math.cos(enemy.strafeAngle) * enemy.speed * 0.4;
                    const strafeY = Math.sin(enemy.strafeAngle) * enemy.speed * 0.4;

                    const moveDx = targetX - enemy.x;
                    const moveDy = targetY - enemy.y;
                    const moveDist = Math.sqrt(moveDx * moveDx + moveDy * moveDy) || 1;
                    const moveSpeed = enemy.speed * Math.min(1, moveDist / 60);

                    enemy.vx = (moveDx / moveDist) * moveSpeed + strafeX;
                    enemy.vy = (moveDy / moveDist) * moveSpeed + strafeY;

                    enemy.x += enemy.vx * dt;
                    enemy.y += enemy.vy * dt;

                    enemy.x = Math.max(enemy.radius, Math.min(W - enemy.radius, enemy.x));
                    enemy.y = Math.max(enemy.radius, Math.min(H - enemy.radius, enemy.y));

                    // Enemy shooting
                    if (dist < 500) {
                        enemy.shootTimer -= dt;
                        if (enemy.shootTimer <= 0 && dist > 30) {
                            enemyShoot(enemy);
                            enemy.shootTimer = enemy.shootCooldown * (0.7 + Math.random() * 0.6);
                        }
                    }
                }

                // Update player bullets
                for (const bullet of playerBullets) {
                    bullet.trail.push({ x: bullet.x, y: bullet.y, life: 0.15 });
                    if (bullet.trail.length > 8) bullet.trail.shift();
                    bullet.x += bullet.vx * dt;
                    bullet.y += bullet.vy * dt;
                    bullet.life -= dt;
                }

                // Update enemy bullets
                for (const bullet of enemyBullets) {
                    bullet.trail.push({ x: bullet.x, y: bullet.y, life: 0.12 });
                    if (bullet.trail.length > 6) bullet.trail.shift();
                    bullet.x += bullet.vx * dt;
                    bullet.y += bullet.vy * dt;
                    bullet.life -= dt;
                }

                // Update bullet trails
                for (const bullet of playerBullets) {
                    for (const t of bullet.trail) t.life -= dt;
                    bullet.trail = bullet.trail.filter(t => t.life > 0);
                }
                for (const bullet of enemyBullets) {
                    for (const t of bullet.trail) t.life -= dt;
                    bullet.trail = bullet.trail.filter(t => t.life > 0);
                }

                // Collision: player bullets vs enemies
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const bullet = playerBullets[i];
                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const enemy = enemies[j];
                        const dx = bullet.x - enemy.x;
                        const dy = bullet.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < bullet.radius + enemy.radius) {
                            enemy.health--;
                            if (enemy.health <= 0) {
                                spawnParticle(enemy.x, enemy.y, 20, '#cc3322', 250, 0.4, 4);
                                spawnParticle(enemy.x, enemy.y, 12, '#ff8844', 180, 0.3, 3);
                                spawnParticle(enemy.x, enemy.y, 6, '#ffcc00', 120, 0.5, 2);
                                enemies.splice(j, 1);
                                score++;
                                enemiesKilledTotal++;
                                playSound('death');
                                shakeAmount = Math.max(shakeAmount, 2.5);
                                comboCount++;
                                comboTimer = COMBO_WINDOW;
                                if (comboCount >= 5) {
                                    addFloatingText(enemy.x, enemy.y, 'GUNSLINGER! x' + comboCount, '#ffdd00');
                                } else if (comboCount >= 3) {
                                    addFloatingText(enemy.x, enemy.y, 'TRIPLE!', '#ff9900');
                                } else {
                                    addFloatingText(enemy.x, enemy.y, '+' + score, '#ffffff');
                                }
                            } else {
                                spawnParticle(bullet.x, bullet.y, 8, '#ff6633', 150, 0.2, 2.5);
                                playSound('hit');
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (hit) {
                        playerBullets.splice(i, 1);
                    }
                }

                // Collision: enemy bullets vs player
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const bullet = enemyBullets[i];
                    const dx = bullet.x - player.x;
                    const dy = bullet.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bullet.radius + player.radius && player.invincibleTimer <= 0) {
                        playerHealth--;
                        player.invincibleTimer = 1.2;
                        shakeAmount = Math.max(shakeAmount, 6);
                        flashAlpha = 0.7;
                        playSound('playerHit');
                        spawnParticle(player.x, player.y, 15, '#ff3333', 200, 0.35, 3.5);
                        enemyBullets.splice(i, 1);
                        if (playerHealth <= 0) {
                            gameState = 'gameover';
                            spawnParticle(player.x, player.y, 40, '#ff0000', 300, 0.6, 5);
                            spawnParticle(player.x, player.y, 25, '#ff6600', 250, 0.5, 4);
                            spawnParticle(player.x, player.y, 15, '#ffff00', 200, 0.7, 3);
                            shakeAmount = 10;
                            flashAlpha = 1;
                        }
                    }
                }

                // Remove off-screen or expired bullets
                playerBullets = playerBullets.filter(b =>
                    b.life > 0 && b.x > -50 && b.x < W + 50 && b.y > -50 && b.y < H + 50
                );
                enemyBullets = enemyBullets.filter(b =>
                    b.life > 0 && b.x > -80 && b.x < W + 80 && b.y > -80 && b.y < H + 80
                );

                // Update particles
                for (const p of particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    p.vx *= 0.94;
                    p.vy *= 0.94;
                }
                particles = particles.filter(p => p.life > 0);
                if (particles.length > 300) {
                    particles = particles.slice(-250);
                }

                // Update floating texts
                for (const ft of floatingTexts) {
                    ft.y -= 60 * dt;
                    ft.life -= dt;
                }
                floatingTexts = floatingTexts.filter(ft => ft.life > 0);

                // Update combo timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) comboCount = 0;
                }

                // Decay effects
                shakeAmount *= Math.exp(-8 * dt);
                if (shakeAmount < 0.05) shakeAmount = 0;
                flashAlpha *= Math.exp(-6 * dt);
                if (flashAlpha < 0.005) flashAlpha = 0;

                // Dust particles when player moves
                if (moveMag > 0.3 && Math.random() < 0.5) {
                    const dustX = player.x + (Math.random() - 0.5) * 20;
                    const dustY = player.y + player.radius + Math.random() * 6;
                    particles.push({
                        x: dustX,
                        y: dustY,
                        vx: (Math.random() - 0.5) * 20,
                        vy: -20 - Math.random() * 40,
                        life: 0.5 + Math.random() * 0.4,
                        maxLife: 0.7,
                        color: '#c8a882',
                        size: 1.5 + Math.random() * 2.5,
                    });
                }
            }

            function drawBackground() {
                // Sandy ground
                const gradient = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, Math.max(W, H));
                gradient.addColorStop(0, '#d4b896');
                gradient.addColorStop(0.5, '#c4a47a');
                gradient.addColorStop(1, '#8b6914');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, W, H);

                // Ground texture dots
                ctx.fillStyle = 'rgba(139,105,20,0.08)';
                const dotSeed = 42;
                for (let i = 0; i < 200; i++) {
                    const px = ((i * 137 + dotSeed) % W);
                    const py = ((i * 251 + dotSeed * 3) % H);
                    ctx.beginPath();
                    ctx.arc(px, py, 1.5 + (i % 3), 0, Math.PI * 2);
                    ctx.fill();
                }

                // Boardwalk at bottom
                ctx.fillStyle = '#6b4226';
                ctx.fillRect(0, H - 28, W, 28);
                ctx.fillStyle = '#7d5030';
                for (let i = 0; i < W; i += 50) {
                    ctx.fillRect(i, H - 28, 45, 28);
                }
                ctx.strokeStyle = '#4a2a14';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < W; i += 50) {
                    ctx.strokeRect(i, H - 28, 45, 28);
                }
                ctx.strokeStyle = '#5a3820';
                ctx.beginPath();
                ctx.moveTo(0, H - 28);
                ctx.lineTo(W, H - 28);
                ctx.stroke();

                // Some barrels
                const barrelPositions = [
                    { x: W * 0.08, y: H - 42 },
                    { x: W * 0.22, y: H - 44 },
                    { x: W * 0.75, y: H - 40 },
                    { x: W * 0.9, y: H - 43 },
                ];
                for (const bp of barrelPositions) {
                    ctx.fillStyle = '#5c3a1e';
                    ctx.beginPath();
                    ctx.ellipse(bp.x, bp.y, 16, 22, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#7a4e2a';
                    ctx.beginPath();
                    ctx.ellipse(bp.x, bp.y - 5, 16, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#3a2010';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(bp.x, bp.y, 16, 22, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(bp.x - 14, bp.y - 8);
                    ctx.lineTo(bp.x + 14, bp.y - 8);
                    ctx.moveTo(bp.x - 14, bp.y + 6);
                    ctx.lineTo(bp.x + 14, bp.y + 6);
                    ctx.stroke();
                }

                // Hitching posts
                const postPositions = [
                    { x: W * 0.15, y: H - 50 },
                    { x: W * 0.55, y: H - 48 },
                ];
                for (const pp of postPositions) {
                    ctx.fillStyle = '#5a3820';
                    ctx.fillRect(pp.x - 3, pp.y - 35, 6, 50);
                    ctx.fillStyle = '#6b4226';
                    ctx.fillRect(pp.x - 2, pp.y - 33, 4, 46);
                    ctx.fillStyle = '#4a2a14';
                    ctx.beginPath();
                    ctx.arc(pp.x, pp.y - 36, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawCharacter(x, y, angle, radius, isPlayer, invincible) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);

                const flicker = invincible && Math.floor(Date.now() / 60) % 2 === 0;
                const alpha = flicker ? 0.4 : 1;

                ctx.globalAlpha = alpha;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, radius * 0.7, radius * 0.8, radius * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();

                if (isPlayer) {
                    // Body - duster coat
                    ctx.fillStyle = '#8B7355';
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#5a3e28';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Coat detail
                    ctx.fillStyle = '#a0845c';
                    ctx.beginPath();
                    ctx.arc(0, -2, radius * 0.7, 0, Math.PI * 2);
                    ctx.fill();

                    // Sheriff star
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    const starSize = radius * 0.3;
                    for (let i = 0; i < 5; i++) {
                        const sa = (i * Math.PI * 2) / 5 - Math.PI / 2;
                        const sx = Math.cos(sa) * starSize;
                        const sy = Math.sin(sa) * starSize;
                        if (i === 0) ctx.moveTo(sx, sy);
                        else ctx.lineTo(sx, sy);
                        const innerSA = sa + Math.PI / 5;
                        ctx.lineTo(Math.cos(innerSA) * starSize * 0.4, Math.sin(innerSA) * starSize * 0.4);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#b8960a';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Hat brim
                    ctx.fillStyle = '#3d2b1f';
                    ctx.beginPath();
                    ctx.ellipse(0, -radius * 0.55, radius * 1.3, radius * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#1a1008';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Hat crown
                    ctx.fillStyle = '#4a3525';
                    ctx.beginPath();
                    ctx.ellipse(0, -radius * 0.75, radius * 0.65, radius * 0.45, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#1a1008';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Gun arm
                    ctx.fillStyle = '#7a5c3e';
                    ctx.fillRect(radius * 0.5, -radius * 0.25, radius * 1.1, radius * 0.5);
                    ctx.fillStyle = '#555';
                    ctx.fillRect(radius * 1.0, -radius * 0.15, radius * 0.9, radius * 0.22);
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(radius * 1.0, -radius * 0.15, radius * 0.9, radius * 0.22);

                    // Gun barrel highlight
                    ctx.fillStyle = '#777';
                    ctx.fillRect(radius * 1.05, -radius * 0.08, radius * 0.8, radius * 0.08);

                } else {
                    // Enemy body
                    ctx.fillStyle = '#3a3028';
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#1a1008';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Dark vest
                    ctx.fillStyle = '#2a2018';
                    ctx.beginPath();
                    ctx.arc(0, -1, radius * 0.7, 0, Math.PI * 2);
                    ctx.fill();

                    // Red bandana
                    ctx.fillStyle = '#cc2222';
                    ctx.beginPath();
                    ctx.arc(0, radius * 0.2, radius * 0.55, Math.PI * 0.3, Math.PI * 0.7);
                    ctx.fill();
                    ctx.fillStyle = '#aa1111';
                    ctx.beginPath();
                    ctx.arc(0, radius * 0.35, radius * 0.3, Math.PI * 0.2, Math.PI * 0.8);
                    ctx.fill();

                    // Dark hat
                    ctx.fillStyle = '#1a1008';
                    ctx.beginPath();
                    ctx.ellipse(0, -radius * 0.5, radius * 1.2, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#2a1a0d';
                    ctx.beginPath();
                    ctx.ellipse(0, -radius * 0.7, radius * 0.6, radius * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#0a0502';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(0, -radius * 0.5, radius * 1.2, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // Gun
                    ctx.fillStyle = '#444';
                    ctx.fillRect(radius * 0.5, -radius * 0.12, radius * 0.9, radius * 0.2);
                    ctx.fillStyle = '#333';
                    ctx.fillRect(radius * 0.55, -radius * 0.06, radius * 0.8, radius * 0.07);
                }

                ctx.globalAlpha = 1;
                ctx.restore();
            }

            function drawBulletTrail(bullet, color) {
                if (bullet.trail.length < 2) return;
                for (let i = 1; i < bullet.trail.length; i++) {
                    const t = bullet.trail[i];
                    const prev = bullet.trail[i - 1];
                    const alpha = (i / bullet.trail.length) * 0.7;
                    ctx.strokeStyle = color.replace('1)', alpha + ')').replace('rgb',
                        'rgba');
                    ctx.lineWidth = bullet.radius * (i / bullet.trail.length) * 1.8;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(t.x, t.y);
                    ctx.stroke();
                }
                ctx.lineCap = 'butt';
            }

            function render() {
                ctx.clearRect(0, 0, W, H);

                // Apply screen shake
                let shakeX = 0;
                let shakeY = 0;
                if (shakeAmount > 0.1) {
                    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                drawBackground();

                // Draw particles (background layer)
                for (const p of particles) {
                    if (p.color === '#c8a882') {
                        const alpha = p.life / p.maxLife;
                        ctx.fillStyle = `rgba(200,168,130,${alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Draw enemy bullets
                for (const bullet of enemyBullets) {
                    drawBulletTrail(bullet, 'rgb(255,100,60)');
                }
                for (const bullet of enemyBullets) {
                    const glow = ctx.createRadialGradient(bullet.x, bullet.y, 0, bullet.x, bullet.y, bullet.radius * 3);
                    glow.addColorStop(0, 'rgba(255,150,80,0.8)');
                    glow.addColorStop(0.5, 'rgba(255,60,30,0.3)');
                    glow.addColorStop(1, 'rgba(255,30,10,0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius * 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff5533';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw player bullets
                for (const bullet of playerBullets) {
                    drawBulletTrail(bullet, 'rgb(255,220,80)');
                }
                for (const bullet of playerBullets) {
                    const glow = ctx.createRadialGradient(bullet.x, bullet.y, 0, bullet.x, bullet.y, bullet.radius * 3);
                    glow.addColorStop(0, 'rgba(255,240,150,0.9)');
                    glow.addColorStop(0.5, 'rgba(255,200,60,0.3)');
                    glow.addColorStop(1, 'rgba(255,150,20,0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius * 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffe880';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw enemies
                for (const enemy of enemies) {
                    drawCharacter(enemy.x, enemy.y, enemy.angle, enemy.radius, false, false);
                }

                // Draw player
                if (gameState === 'playing') {
                    drawCharacter(player.x, player.y, player.angle, player.radius, true,
                        player.invincibleTimer > 0);
                }

                // Draw particles (foreground)
                for (const p of particles) {
                    if (p.color !== '#c8a882') {
                        const alpha = p.life / p.maxLife;
                        ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                        if (p.color.startsWith('#')) {
                            const hex = p.color;
                            const r = parseInt(hex.slice(1, 3), 16);
                            const g = parseInt(hex.slice(3, 5), 16);
                            const b = parseInt(hex.slice(5, 7), 16);
                            ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                        }
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * (0.6 + alpha * 0.4), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Draw floating texts
                for (const ft of floatingTexts) {
                    const alpha = ft.life / ft.maxLife;
                    const scale = 1 + (1 - alpha) * 0.5;
                    ctx.save();
                    ctx.translate(ft.x, ft.y);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.5})`;
                    ctx.font = 'bold 22px Georgia, serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, 2, 2);
                    ctx.fillStyle = ft.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                    if (ft.color.startsWith('#')) {
                        const r = parseInt(ft.color.slice(1, 3), 16);
                        const g = parseInt(ft.color.slice(3, 5), 16);
                        const b = parseInt(ft.color.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.fillText(ft.text, 0, 0);
                    ctx.restore();
                }

                ctx.restore();

                // Screen flash (not affected by shake)
                if (flashAlpha > 0.01) {
                    ctx.fillStyle = `rgba(255,30,10,${flashAlpha})`;
                    ctx.fillRect(0, 0, W, H);
                }

                // Vignette
                const vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.5, W / 2, H / 2, Math.max(
                    W, H) * 0.75);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, W, H);

                // UI
                if (gameState === 'playing') {
                    // Score
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(W / 2 - 70, 8, 140, 38);
                    ctx.strokeStyle = '#8b6914';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(W / 2 - 70, 8, 140, 38);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 20px Georgia, serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('☠ ' + score, W / 2, 34);

                    // Health hearts
                    for (let i = 0; i < maxHealth; i++) {
                        const hx = 20 + i * 32;
                        const hy = 22;
                        if (i < playerHealth) {
                            ctx.fillStyle = '#ff2222';
                            ctx.font = '22px Georgia, serif';
                            ctx.fillText('❤', hx, hy);
                        } else {
                            ctx.fillStyle = '#555';
                            ctx.font = '22px Georgia, serif';
                            ctx.fillText('❤', hx, hy);
                        }
                    }

                    // Difficulty indicator
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(W - 75, 8, 65, 22);
                    ctx.fillStyle = '#ccc';
                    ctx.font = '12px Georgia, serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('WAVE ' + difficultyLevel, W - 42, 24);

                    // Mobile controls
                    if (isMobile) {
                        // Joystick base
                        const joyBaseX = 90;
                        const joyBaseY = H - 100;
                        if (joystickActive) {
                            joyBaseX_current = joystickOrigin.x;
                            joyBaseY_current = joystickOrigin.y;
                        } else {
                            joyBaseX_current = joyBaseX;
                            joyBaseY_current = joyBaseY;
                        }
                        const joyBaseX_current = joystickActive ? joystickOrigin.x : joyBaseX;
                        const joyBaseY_current = joystickActive ? joystickOrigin.y : joyBaseY;

                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(joyBaseX_current, joyBaseY_current, 55, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();

                        // Joystick thumb
                        const thumbX = joyBaseX_current + joystickVector.x * 45;
                        const thumbY = joyBaseY_current + joystickVector.y * 45;
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.beginPath();
                        ctx.arc(thumbX, thumbY, 22, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();

                        // Shoot button
                        const shootBtnX = W - 80;
                        const shootBtnY = H - 100;
                        ctx.fillStyle = shootTouchActive ? 'rgba(255,80,30,0.45)' : 'rgba(255,255,255,0.18)';
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.arc(shootBtnX, shootBtnY, 40, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();

                        // Crosshair inside shoot button
                        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(shootBtnX - 14, shootBtnY);
                        ctx.lineTo(shootBtnX + 14, shootBtnY);
                        ctx.moveTo(shootBtnX, shootBtnY - 14);
                        ctx.lineTo(shootBtnX, shootBtnY + 14);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(shootBtnX, shootBtnY, 10, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                // Intro screen
                if (gameState === 'intro') {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, W, H);

                    // Title
                    ctx.fillStyle = '#ffd700';
                    ctx.font = `bold ${Math.min(W*0.09, 56)}px Georgia, serif`;
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = 20;
                    ctx.fillText('GUNFIGHT', W / 2, H * 0.3);
                    ctx.shadowBlur = 0;

                    // Subtitle
                    ctx.fillStyle = '#e8d5b0';
                    ctx.font = `${Math.min(W*0.035, 22)}px Georgia, serif`;
                    ctx.fillText('Western Showdown', W / 2, H * 0.3 + 50);

                    // Decorative line
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(W / 2 - 120, H * 0.3 + 70);
                    ctx.lineTo(W / 2 + 120, H * 0.3 + 70);
                    ctx.stroke();

                    // Instructions
                    const instrY = H * 0.52;
                    ctx.fillStyle = '#ddd';
                    ctx.font = `${Math.min(W*0.028, 18)}px Georgia, serif`;
                    if (isMobile) {
                        ctx.fillText('🎮 Left side: Move', W / 2, instrY);
                        ctx.fillText('🔫 Right side: Shoot', W / 2, instrY + 35);
                    } else {
                        ctx.fillText('🖱 WASD/Arrows: Move', W / 2, instrY);
                        ctx.fillText('🖱 Mouse: Aim & Shoot', W / 2, instrY + 35);
                    }
                    ctx.fillText('Survive the outlaw onslaught!', W / 2, instrY + 70);

                    // Start prompt
                    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 600);
                    ctx.fillStyle = `rgba(255,215,0,${pulse})`;
                    ctx.font = `bold ${Math.min(W*0.04, 26)}px Georgia, serif`;
                    ctx.fillText('TAP OR CLICK TO START', W / 2, H * 0.78);
                }

                // Game over screen
                if (gameState === 'gameover') {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);

                    // Wanted poster frame
                    const posterW = Math.min(380, W * 0.8);
                    const posterH = Math.min(320, H * 0.55);
                    const posterX = W / 2 - posterW / 2;
                    const posterY = H / 2 - posterH / 2;

                    ctx.fillStyle = '#f4e4c1';
                    ctx.fillRect(posterX, posterY, posterW, posterH);
                    ctx.strokeStyle = '#3d2b1f';
                    ctx.lineWidth = 6;
                    ctx.strokeRect(posterX, posterY, posterW, posterH);
                    ctx.strokeStyle = '#8b6914';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(posterX + 10, posterY + 10, posterW - 20, posterH - 20);

                    // WANTED text
                    ctx.fillStyle = '#3d1a0a';
                    ctx.font = `bold ${Math.min(posterW*0.14, 40)}px Georgia, serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('WANTED', W / 2, posterY + 55);

                    // Decorative line
                    ctx.strokeStyle = '#3d1a0a';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(posterX + 40, posterY + 68);
                    ctx.lineTo(posterX + posterW - 40, posterY + 68);
                    ctx.stroke();

                    // Score
                    ctx.fillStyle = '#1a0800';
                    ctx.font = `bold ${Math.min(posterW*0.1, 30)}px Georgia, serif`;
                    ctx.fillText('OUTLAWS DEFEATED', W / 2, posterY + 110);
                    ctx.fillStyle = '#8b0000';
                    ctx.font = `bold ${Math.min(posterW*0.22, 60)}px Georgia, serif`;
                    ctx.fillText(score, W / 2, posterY + 175);

                    // Stats
                    ctx.fillStyle = '#3d1a0a';
                    ctx.font = `${Math.min(posterW*0.06, 18)}px Georgia, serif`;
                    ctx.fillText('Wave: ' + difficultyLevel, W / 2, posterY + 215);

                    // Restart
                    const pulse2 = 0.7 + 0.3 * Math.sin(Date.now() / 500);
                    ctx.fillStyle = `rgba(139,0,0,${pulse2})`;
                    ctx.font = `bold ${Math.min(posterW*0.08, 24)}px Georgia, serif`;
                    ctx.fillText('PLAY AGAIN', W / 2, posterY + 270);
                }

                // Crosshair on desktop
                if (gameState === 'playing' && !isMobile && mouseOnScreen) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 1.5;
                    const cx = mouseX;
                    const cy = mouseY;
                    const cs = 14;
                    ctx.beginPath();
                    ctx.moveTo(cx - cs, cy);
                    ctx.lineTo(cx - cs / 3, cy);
                    ctx.moveTo(cx + cs / 3, cy);
                    ctx.lineTo(cx + cs, cy);
                    ctx.moveTo(cx, cy - cs);
                    ctx.lineTo(cx, cy - cs / 3);
                    ctx.moveTo(cx, cy + cs / 3);
                    ctx.lineTo(cx, cy + cs);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(cx, cy, cs * 0.55, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            function gameLoop(timestamp) {
                if (lastTime === 0) lastTime = timestamp;
                dt = Math.min((timestamp - lastTime) / 1000, 0.1);
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // Event handlers
            function handleMouseDown(e) {
                initAudio();
                if (gameState === 'intro') {
                    startGame();
                    return;
                }
                if (gameState === 'gameover') {
                    startGame();
                    return;
                }
                if (!isMobile) {
                    mouseDown = true;
                }
            }

            function handleMouseUp(e) {
                mouseDown = false;
            }

            function handleMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mouseOnScreen = true;
            }

            function handleMouseLeave(e) {
                mouseOnScreen = false;
                mouseDown = false;
            }

            function handleMouseEnter(e) {
                mouseOnScreen = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
            }

            function handleKeyDown(e) {
                initAudio();
                if (gameState === 'intro') {
                    startGame();
                    return;
                }
                if (gameState === 'gameover') {
                    startGame();
                    return;
                }
                keys[e.code] = true;
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (!isMobile && gameState === 'playing') {
                        mouseDown = true;
                    }
                }
            }

            function handleKeyUp(e) {
                keys[e.code] = false;
                if (e.code === 'Space') {
                    mouseDown = false;
                }
            }

            function handleTouchStart(e) {
                e.preventDefault();
                initAudio();
                isMobile = true;

                if (gameState === 'intro') {
                    startGame();
                    return;
                }
                if (gameState === 'gameover') {
                    startGame();
                    return;
                }

                for (const touch of e.changedTouches) {
                    const tx = touch.clientX;
                    const ty = touch.clientY;

                    if (tx < W * 0.45 && !joystickActive) {
                        joystickActive = true;
                        joystickTouchId = touch.identifier;
                        joystickOrigin.x = tx;
                        joystickOrigin.y = ty;
                        joystickCurrent.x = tx;
                        joystickCurrent.y = ty;
                        joystickVector = { x: 0, y: 0 };
                    } else if (tx >= W * 0.45 && !shootTouchActive) {
                        shootTouchActive = true;
                        shootTouchId = touch.identifier;
                    }
                }
            }

            function handleTouchMove(e) {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (touch.identifier === joystickTouchId && joystickActive) {
                        joystickCurrent.x = touch.clientX;
                        joystickCurrent.y = touch.clientY;
                        const dx = joystickCurrent.x - joystickOrigin.x;
                        const dy = joystickCurrent.y - joystickOrigin.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = 45;
                        if (dist > maxDist) {
                            joystickVector.x = dx / dist;
                            joystickVector.y = dy / dist;
                        } else if (dist > 8) {
                            joystickVector.x = dx / maxDist;
                            joystickVector.y = dy / maxDist;
                        } else {
                            joystickVector.x = 0;
                            joystickVector.y = 0;
                        }
                    }
                    if (touch.identifier === shootTouchId && shootTouchActive) {
                        // Keep shooting active
                    }
                }
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (touch.identifier === joystickTouchId) {
                        joystickActive = false;
                        joystickTouchId = null;
                        joystickVector = { x: 0, y: 0 };
                    }
                    if (touch.identifier === shootTouchId) {
                        shootTouchActive = false;
                        shootTouchId = null;
                    }
                }
            }

            function handleTouchCancel(e) {
                handleTouchEnd(e);
            }

            function handleResize() {
                resizeCanvas();
            }

            function handleContextMenu(e) {
                e.preventDefault();
            }

            // Initialize
            function init() {
                resizeCanvas();
                player.x = W / 2;
                player.y = H / 2;

                canvas.addEventListener('mousedown', handleMouseDown);
                canvas.addEventListener('mouseup', handleMouseUp);
                canvas.addEventListener('mousemove', handleMouseMove);
                canvas.addEventListener('mouseleave', handleMouseLeave);
                canvas.addEventListener('mouseenter', handleMouseEnter);
                canvas.addEventListener('contextmenu', handleContextMenu);
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
                canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });
                window.addEventListener('resize', handleResize);
                window.addEventListener('orientationchange', () => {
                    setTimeout(resizeCanvas, 200);
                });

                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }

            init();
        })();
    </script>
</body>
