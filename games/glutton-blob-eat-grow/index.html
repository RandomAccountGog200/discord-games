<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍽️ Glutton Blob - Eat & Grow!</title>
    <style>
        :root {
            --bg: #0a0a1a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.04em;
            pointer-events: none;
            transition: transform 0.15s ease;
        }
        #score-display.bump {
            transform: translateX(-50%) scale(1.25);
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
            transition: opacity 0.5s ease;
        }
        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 20;
        }
        #game-over-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        #game-over-overlay .go-box {
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: clamp(30px, 6vw, 50px) clamp(24px, 5vw, 44px);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 80px rgba(255, 60, 60, 0.3);
        }
        #game-over-overlay h2 {
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            color: #ff5e5e;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 80, 80, 0.7);
            letter-spacing: 0.03em;
        }
        #game-over-overlay .final-score {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
            margin: 8px 0;
        }
        #game-over-overlay .sub-text {
            font-size: clamp(0.8rem, 1.6vw, 1rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }
        #restart-btn {
            pointer-events: all;
            cursor: pointer;
            background: linear-gradient(135deg, #ff5e5e, #e8345e);
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 700;
            border-radius: 50px;
            letter-spacing: 0.04em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 8px 30px rgba(255, 60, 60, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #restart-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 40px rgba(255, 60, 60, 0.7);
        }
        #restart-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 16px rgba(255, 60, 60, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="score-display">🍽️ 0</div>
        <div id="instructions">Move your mouse or touch to eat food &amp; grow!<br>Avoid bigger blobs — eat smaller ones!</div>
        <div id="game-over-overlay">
            <div class="go-box">
                <h2>💀 You Were Eaten!</h2>
                <div class="final-score" id="final-score">0</div>
                <div class="sub-text">points of delicious mass</div>
                <button id="restart-btn">🔄 Play Again</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score-display');
            const instructionsEl = document.getElementById('instructions');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const finalScoreEl = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');

            // ─────────────────────────────────────
            // CANVAS SETUP
            // ─────────────────────────────────────
            let W, H;

            function resizeCanvas() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * Math.min(window.devicePixelRatio || 1, 2);
                canvas.height = H * Math.min(window.devicePixelRatio || 1, 2);
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(Math.min(window.devicePixelRatio || 1, 2), Math.min(window.devicePixelRatio || 1, 2));
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ─────────────────────────────────────
            // AUDIO SYSTEM (lazy init)
            // ─────────────────────────────────────
            let audioCtx = null;

            function getAudioCtx() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playSound(freq, type, duration, vol = 0.15, glideTo = null) {
                try {
                    const ctx = getAudioCtx();
                    const t = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {
                    // silent fail
                }
            }

            function sfxEatFood() { playSound(700, 'sine', 0.08, 0.12);
                playSound(900, 'sine', 0.06, 0.08); }

            function sfxEatEnemy() { playSound(200, 'sawtooth', 0.22, 0.2);
                playSound(80, 'triangle', 0.25, 0.18); }

            function sfxGameOver() { playSound(400, 'sawtooth', 0.5, 0.2, 80); }

            function sfxGrowthBump() { playSound(50, 'sine', 0.1, 0.06); }

            // ─────────────────────────────────────
            // GAME STATE
            // ─────────────────────────────────────
            let gameState = 'playing'; // 'playing' | 'gameover'
            let score = 0;
            let player = null;
            let foods = [];
            let enemies = [];
            let particles = [];
            let pointerX = null;
            let pointerY = null;
            let growthBump = 0; // visual bump when eating
            let screenShake = 0;
            let shakeX = 0;
            let shakeY = 0;
            let spawnTimer = 0;
            let enemySpawnTimer = 0;
            let time = 0;
            let gridDots = [];

            // Pre-generate grid dot positions for background
            function generateGridDots() {
                gridDots = [];
                const spacing = 50;
                for (let x = spacing; x < W + spacing; x += spacing) {
                    for (let y = spacing; y < H + spacing; y += spacing) {
                        gridDots.push({ x, y, baseX: x, baseY: y });
                    }
                }
            }
            generateGridDots();
            window.addEventListener('resize', generateGridDots);

            // ─────────────────────────────────────
            // PLAYER
            // ─────────────────────────────────────
            function createPlayer() {
                return {
                    x: W / 2,
                    y: H / 2,
                    radius: 22,
                    color: '#00d4aa',
                    colorDark: '#008866',
                    glowColor: 'rgba(0,212,170,0.6)',
                    targetX: W / 2,
                    targetY: H / 2,
                    vx: 0,
                    vy: 0,
                };
            }

            // ─────────────────────────────────────
            // FOOD
            // ─────────────────────────────────────
            const FOOD_COLORS = [
                '#ffdd57', '#ff6b9d', '#51cf66', '#ff8c42',
                '#a29bfe', '#fd79a8', '#00cec9', '#fdcb6e',
                '#e056a0', '#55efc4', '#fab1a0', '#81ecec',
                '#ffeaa7', '#dfe6e9', '#ff7675', '#74b9ff',
            ];

            function createFood(x, y) {
                const color = FOOD_COLORS[Math.floor(Math.random() * FOOD_COLORS.length)];
                return {
                    x: x !== undefined ? x : Math.random() * (W - 60) + 30,
                    y: y !== undefined ? y : Math.random() * (H - 60) + 30,
                    radius: 4 + Math.random() * 6,
                    color,
                    pulseOffset: Math.random() * Math.PI * 2,
                    sparkTimer: Math.random() * 2,
                };
            }

            function spawnFoods(count) {
                for (let i = 0; i < count; i++) {
                    foods.push(createFood());
                }
            }

            // ─────────────────────────────────────
            // ENEMIES
            // ─────────────────────────────────────
            const ENEMY_COLORS = [
                { main: '#e74c3c', dark: '#8b1a1a', glow: 'rgba(231,76,60,0.5)' },
                { main: '#e67e22', dark: '#8b4513', glow: 'rgba(230,126,34,0.5)' },
                { main: '#c0392b', dark: '#6b1010', glow: 'rgba(192,57,43,0.5)' },
                { main: '#d35400', dark: '#7a2e00', glow: 'rgba(211,84,0,0.5)' },
                { main: '#9b59b6', dark: '#4a1d5e', glow: 'rgba(155,89,182,0.5)' },
                { main: '#e91e63', dark: '#7a0f30', glow: 'rgba(233,30,99,0.5)' },
                { main: '#f44336', dark: '#8b0000', glow: 'rgba(244,67,54,0.5)' },
                { main: '#ff5722', dark: '#992d00', glow: 'rgba(255,87,34,0.5)' },
            ];

            function createEnemy(radiusOverride = null) {
                const palette = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
                const radius = radiusOverride || (14 + Math.random() * 40);
                const angle = Math.random() * Math.PI * 2;
                const dist = 80 + Math.random() * Math.min(W, H) * 0.35;
                const x = W / 2 + Math.cos(angle) * dist;
                const y = H / 2 + Math.sin(angle) * dist;
                return {
                    x: Math.max(40, Math.min(W - 40, x)),
                    y: Math.max(40, Math.min(H - 40, y)),
                    radius,
                    color: palette.main,
                    colorDark: palette.dark,
                    glowColor: palette.glow,
                    vx: 0,
                    vy: 0,
                    targetX: Math.random() * (W - 80) + 40,
                    targetY: Math.random() * (H - 80) + 40,
                    aiTimer: 1 + Math.random() * 3,
                    wanderTimer: 0,
                    name: '',
                };
            }

            function spawnEnemies(count) {
                for (let i = 0; i < count; i++) {
                    enemies.push(createEnemy());
                }
            }

            // ─────────────────────────────────────
            // PARTICLES
            // ─────────────────────────────────────
            function spawnParticles(x, y, count, color, speedMult = 1) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = (2 + Math.random() * 6) * speedMult;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 2 + Math.random() * 5,
                        color,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                    });
                }
            }

            // ─────────────────────────────────────
            // SCREEN FLASH
            // ─────────────────────────────────────
            let flashAlpha = 0;
            let flashColor = '#ffffff';

            function triggerFlash(alpha, color = '#ffffff') {
                flashAlpha = Math.max(flashAlpha, alpha);
                flashColor = color;
            }

            // ─────────────────────────────────────
            // INIT / RESET GAME
            // ─────────────────────────────────────
            function resetGame() {
                gameState = 'playing';
                score = 0;
                player = createPlayer();
                foods = [];
                enemies = [];
                particles = [];
                pointerX = W / 2;
                pointerY = H / 2;
                player.targetX = pointerX;
                player.targetY = pointerY;
                growthBump = 0;
                screenShake = 0;
                shakeX = 0;
                shakeY = 0;
                spawnTimer = 0;
                enemySpawnTimer = 0;
                time = 0;
                flashAlpha = 0;
                spawnFoods(55);
                spawnEnemies(7);
                gameOverOverlay.classList.remove('active');
                instructionsEl.style.opacity = '1';
                updateScoreDisplay();
            }

            function gameOver() {
                if (gameState !== 'playing') return;
                gameState = 'gameover';
                sfxGameOver();
                spawnParticles(player.x, player.y, 40, player.color, 1.5);
                triggerFlash(0.7, '#ff4444');
                screenShake = 20;
                finalScoreEl.textContent = Math.floor(score);
                gameOverOverlay.classList.add('active');
                instructionsEl.style.opacity = '0';
            }

            function updateScoreDisplay() {
                const s = Math.floor(score);
                scoreDisplay.textContent = '🍽️ ' + s;
            }

            function bumpScoreDisplay() {
                scoreDisplay.classList.add('bump');
                setTimeout(() => scoreDisplay.classList.remove('bump'), 150);
            }

            // ─────────────────────────────────────
            // EATING LOGIC
            // ─────────────────────────────────────
            function getArea(radius) { return Math.PI * radius * radius; }

            function getRadiusFromArea(area) { return Math.sqrt(area / Math.PI); }

            function canEat(eaterRadius, preyRadius) {
                return eaterRadius > preyRadius * 1.08;
            }

            function attemptEat(eater, prey, eaterIsPlayer) {
                const dx = eater.x - prey.x;
                const dy = eater.y - prey.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < eater.radius * 0.75 && canEat(eater.radius, prey.radius)) {
                    // Eat!
                    const preyArea = getArea(prey.radius);
                    const eaterArea = getArea(eater.radius);
                    const newArea = eaterArea + preyArea;
                    eater.radius = getRadiusFromArea(newArea);
                    if (eaterIsPlayer) {
                        score += Math.floor(preyArea);
                        growthBump = Math.max(growthBump, prey.radius * 0.5);
                        updateScoreDisplay();
                        bumpScoreDisplay();
                        sfxEatEnemy();
                        spawnParticles(prey.x, prey.y, 20, prey.color, 1.3);
                        triggerFlash(0.25, prey.color);
                        screenShake = Math.max(screenShake, prey.radius * 0.3);
                    }
                    return true;
                }
                return false;
            }

            function attemptEatFood(blob, foodItem, isPlayer) {
                const dx = blob.x - foodItem.x;
                const dy = blob.y - foodItem.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < blob.radius - foodItem.radius * 0.3) {
                    // Eat food
                    const foodArea = getArea(foodItem.radius);
                    const blobArea = getArea(blob.radius);
                    blob.radius = getRadiusFromArea(blobArea + foodArea);
                    if (isPlayer) {
                        score += Math.floor(foodArea);
                        growthBump = Math.max(growthBump, foodItem.radius * 0.6);
                        updateScoreDisplay();
                        sfxEatFood();
                        spawnParticles(foodItem.x, foodItem.y, 6, foodItem.color, 0.7);
                    } else {
                        spawnParticles(foodItem.x, foodItem.y, 3, foodItem.color, 0.4);
                    }
                    return true;
                }
                return false;
            }

            // ─────────────────────────────────────
            // ENEMY AI
            // ─────────────────────────────────────
            function updateEnemyAI(enemy, dt) {
                enemy.aiTimer -= dt;
                if (enemy.aiTimer <= 0) {
                    enemy.aiTimer = 0.5 + Math.random() * 1.5;
                    // Decide behavior
                    let closestThreat = null;
                    let closestThreatDist = enemy.radius * 6;
                    let closestPrey = null;
                    let closestPreyDist = enemy.radius * 5;
                    let closestFood = null;
                    let closestFoodDist = enemy.radius * 3;

                    // Check player
                    const dp = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (canEat(player.radius, enemy.radius) && dp < closestThreatDist) {
                        closestThreat = player;
                        closestThreatDist = dp;
                    }
                    if (canEat(enemy.radius, player.radius) && dp < closestPreyDist) {
                        closestPrey = player;
                        closestPreyDist = dp;
                    }

                    // Check other enemies
                    for (const other of enemies) {
                        if (other === enemy) continue;
                        const de = Math.hypot(enemy.x - other.x, enemy.y - other.y);
                        if (canEat(other.radius, enemy.radius) && de < closestThreatDist) {
                            closestThreat = other;
                            closestThreatDist = de;
                        }
                        if (canEat(enemy.radius, other.radius) && de < closestPreyDist) {
                            closestPrey = other;
                            closestPreyDist = de;
                        }
                    }

                    // Check nearby food
                    for (const f of foods) {
                        const df = Math.hypot(enemy.x - f.x, enemy.y - f.y);
                        if (df < closestFoodDist) {
                            closestFood = f;
                            closestFoodDist = df;
                        }
                    }

                    // Prioritize: flee > chase prey > eat food > wander
                    if (closestThreat && closestThreatDist < enemy.radius * 5) {
                        // Flee
                        const ax = enemy.x - closestThreat.x;
                        const ay = enemy.y - closestThreat.y;
                        const ad = Math.hypot(ax, ay) || 1;
                        enemy.targetX = enemy.x + (ax / ad) * enemy.radius * 8;
                        enemy.targetY = enemy.y + (ay / ad) * enemy.radius * 8;
                    } else if (closestPrey && closestPreyDist < enemy.radius * 4) {
                        // Chase prey
                        enemy.targetX = closestPrey.x;
                        enemy.targetY = closestPrey.y;
                    } else if (closestFood && closestFoodDist < enemy.radius * 2.5) {
                        // Go for food
                        enemy.targetX = closestFood.x;
                        enemy.targetY = closestFood.y;
                    } else {
                        // Wander
                        enemy.targetX = 40 + Math.random() * (W - 80);
                        enemy.targetY = 40 + Math.random() * (H - 80);
                    }

                    // Clamp targets
                    enemy.targetX = Math.max(40, Math.min(W - 40, enemy.targetX));
                    enemy.targetY = Math.max(40, Math.min(H - 40, enemy.targetY));
                }

                // Move toward target
                const baseSpeed = 180;
                const speed = baseSpeed * (18 / Math.max(enemy.radius, 10));
                const clampedSpeed = Math.max(40, Math.min(speed, 250));
                const tdx = enemy.targetX - enemy.x;
                const tdy = enemy.targetY - enemy.y;
                const tdist = Math.hypot(tdx, tdy);
                if (tdist > 5) {
                    const nx = tdx / tdist;
                    const ny = tdy / tdist;
                    enemy.vx += (nx * clampedSpeed - enemy.vx) * Math.min(dt * 4, 1);
                    enemy.vy += (ny * clampedSpeed - enemy.vy) * Math.min(dt * 4, 1);
                }

                // Apply friction
                enemy.vx *= 0.94;
                enemy.vy *= 0.94;
                enemy.x += enemy.vx * dt;
                enemy.y += enemy.vy * dt;

                // Boundary avoidance
                const margin = enemy.radius + 10;
                if (enemy.x < margin) enemy.vx += (margin - enemy.x) * dt * 8;
                if (enemy.x > W - margin) enemy.vx -= (enemy.x - (W - margin)) * dt * 8;
                if (enemy.y < margin) enemy.vy += (margin - enemy.y) * dt * 8;
                if (enemy.y > H - margin) enemy.vy -= (enemy.y - (H - margin)) * dt * 8;

                // Clamp position
                enemy.x = Math.max(margin, Math.min(W - margin, enemy.x));
                enemy.y = Math.max(margin, Math.min(H - margin, enemy.y));
            }

            // ─────────────────────────────────────
            // MAIN UPDATE
            // ─────────────────────────────────────
            function update(dt) {
                if (gameState !== 'playing') {
                    // Still update particles
                    updateParticles(dt);
                    flashAlpha = Math.max(0, flashAlpha - dt * 2);
                    screenShake = Math.max(0, screenShake - dt * 30);
                    return;
                }

                // Cap dt
                const cappedDt = Math.min(dt, 0.1);
                time += cappedDt;

                // Update player movement
                if (pointerX !== null && pointerY !== null) {
                    player.targetX = pointerX;
                    player.targetY = pointerY;
                }
                const basePlayerSpeed = 220;
                const playerSpeed = basePlayerSpeed * (22 / Math.max(player.radius, 8));
                const clampedPlayerSpeed = Math.max(50, Math.min(playerSpeed, 300));
                const pdx = player.targetX - player.x;
                const pdy = player.targetY - player.y;
                const pdist = Math.hypot(pdx, pdy);
                if (pdist > 2) {
                    const pnx = pdx / pdist;
                    const pny = pdy / pdist;
                    player.vx += (pnx * clampedPlayerSpeed - player.vx) * Math.min(cappedDt * 5, 1);
                    player.vy += (pny * clampedPlayerSpeed - player.vy) * Math.min(cappedDt * 5, 1);
                }
                player.vx *= 0.9;
                player.vy *= 0.9;
                player.x += player.vx * cappedDt;
                player.y += player.vy * cappedDt;

                // Player boundary
                const pmargin = player.radius + 8;
                if (player.x < pmargin) { player.x = pmargin;
                    player.vx *= -0.3; }
                if (player.x > W - pmargin) { player.x = W - pmargin;
                    player.vx *= -0.3; }
                if (player.y < pmargin) { player.y = pmargin;
                    player.vy *= -0.3; }
                if (player.y > H - pmargin) { player.y = H - pmargin;
                    player.vy *= -0.3; }

                // Decay growth bump
                growthBump = Math.max(0, growthBump - cappedDt * 30);

                // Decay screen shake
                screenShake = Math.max(0, screenShake - cappedDt * 25);
                shakeX = (Math.random() - 0.5) * screenShake * 2;
                shakeY = (Math.random() - 0.5) * screenShake * 2;

                // Decay flash
                flashAlpha = Math.max(0, flashAlpha - cappedDt * 3);

                // Update enemies
                for (const enemy of enemies) {
                    updateEnemyAI(enemy, cappedDt);
                }

                // Enemy vs enemy eating
                for (let i = enemies.length - 1; i >= 0; i--) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        if (i === j) continue;
                        if (i >= enemies.length || j >= enemies.length) continue;
                        const eater = enemies[i];
                        const prey = enemies[j];
                        if (!canEat(eater.radius, prey.radius)) continue;
                        const edx = eater.x - prey.x;
                        const edy = eater.y - prey.y;
                        const edist = Math.sqrt(edx * edx + edy * edy);
                        if (edist < eater.radius * 0.7) {
                            const preyArea = getArea(prey.radius);
                            const eaterArea = getArea(eater.radius);
                            eater.radius = getRadiusFromArea(eaterArea + preyArea);
                            spawnParticles(prey.x, prey.y, 15, prey.color, 1);
                            enemies.splice(j, 1);
                            if (i > j) i--;
                            break;
                        }
                    }
                }

                // Player vs enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    const edx = player.x - enemy.x;
                    const edy = player.y - enemy.y;
                    const edist = Math.sqrt(edx * edx + edy * edy);
                    if (canEat(player.radius, enemy.radius) && edist < player.radius * 0.7) {
                        // Player eats enemy
                        const enemyArea = getArea(enemy.radius);
                        const playerArea = getArea(player.radius);
                        player.radius = getRadiusFromArea(playerArea + enemyArea);
                        score += Math.floor(enemyArea);
                        growthBump = Math.max(growthBump, enemy.radius * 0.5);
                        updateScoreDisplay();
                        bumpScoreDisplay();
                        sfxEatEnemy();
                        spawnParticles(enemy.x, enemy.y, 25, enemy.color, 1.5);
                        triggerFlash(0.3, enemy.color);
                        screenShake = Math.max(screenShake, enemy.radius * 0.35);
                        enemies.splice(i, 1);
                    } else if (canEat(enemy.radius, player.radius) && edist < enemy.radius * 0.7) {
                        // Enemy eats player
                        gameOver();
                        return;
                    }
                }

                // Player vs food
                for (let i = foods.length - 1; i >= 0; i--) {
                    if (attemptEatFood(player, foods[i], true)) {
                        foods.splice(i, 1);
                    }
                }

                // Enemies vs food
                for (const enemy of enemies) {
                    for (let i = foods.length - 1; i >= 0; i--) {
                        if (attemptEatFood(enemy, foods[i], false)) {
                            foods.splice(i, 1);
                        }
                    }
                }

                // Maintain food count
                const targetFood = 45;
                while (foods.length < targetFood) {
                    foods.push(createFood());
                }
                if (foods.length > 65) {
                    foods.splice(0, foods.length - 65);
                }

                // Spawn enemies periodically
                enemySpawnTimer += cappedDt;
                const spawnInterval = 8 + Math.random() * 10;
                if (enemySpawnTimer > spawnInterval && enemies.length < 9) {
                    enemySpawnTimer = 0;
                    const newRadius = 12 + Math.random() * Math.max(player.radius * 1.1, 35);
                    enemies.push(createEnemy(newRadius));
                }
                // Ensure minimum enemies
                if (enemies.length < 2) {
                    enemies.push(createEnemy(15 + Math.random() * 25));
                }

                // Update particles
                updateParticles(cappedDt);

                // Fade instructions after player grows a bit
                if (player.radius > 30 && instructionsEl.style.opacity !== '0') {
                    instructionsEl.style.opacity = '0';
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                    p.life -= p.decay;
                    p.radius *= 0.995;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            // ─────────────────────────────────────
            // RENDER
            // ─────────────────────────────────────
            function drawBackground() {
                // Base gradient
                const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
                bgGrad.addColorStop(0, '#111133');
                bgGrad.addColorStop(0.5, '#0c0c24');
                bgGrad.addColorStop(1, '#050510');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Grid dots
                const timeOffset = time * 3;
                for (const dot of gridDots) {
                    if (dot.baseX > W || dot.baseY > H) continue;
                    const dx = dot.baseX - W / 2;
                    const dy = dot.baseY - H / 2;
                    const wobbleX = Math.sin(timeOffset + dy * 0.01) * 1.5;
                    const wobbleY = Math.cos(timeOffset + dx * 0.01) * 1.5;
                    const sx = dot.baseX + wobbleX;
                    const sy = dot.baseY + wobbleY;
                    const alpha = 0.15 + Math.sin(timeOffset * 0.7 + dot.baseX * 0.03 + dot.baseY * 0.03) * 0.08;
                    ctx.fillStyle = `rgba(100,140,200,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawBlob(x, y, radius, colorMain, colorDark, glowColor, vx, vy, isPlayer, bumpAmount) {
                const r = radius + bumpAmount;

                ctx.save();
                // Glow
                const glowGrad = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2.2);
                glowGrad.addColorStop(0, glowColor);
                glowGrad.addColorStop(0.5, glowColor.replace('0.5', '0.2').replace('0.6', '0.2'));
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(x, y, r * 2.2, 0, Math.PI * 2);
                ctx.fill();

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(x + 3, y + 4, r, 0, Math.PI * 2);
                ctx.fill();

                // Main body gradient
                const bodyGrad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.3, r * 0.05, x, y, r);
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.15, colorMain);
                bodyGrad.addColorStop(0.7, colorMain);
                bodyGrad.addColorStop(1, colorDark);
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                // Subtle inner ring
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = r * 0.06;
                ctx.beginPath();
                ctx.arc(x, y, r * 0.85, 0, Math.PI * 2);
                ctx.stroke();

                // Face
                const speed = Math.hypot(vx, vy);
                const lookX = speed > 5 ? vx / speed : 0;
                const lookY = speed > 5 ? vy / speed : -0.3;
                const eyeOffsetX = lookX * r * 0.18;
                const eyeOffsetY = lookY * r * 0.12;
                const eyeSpacing = r * 0.32;
                const eyeY = y - r * 0.12;
                const eyeRadius = r * 0.17;

                // Eye whites
                for (const side of [-1, 1]) {
                    const ex = x + side * eyeSpacing + eyeOffsetX;
                    const ey = eyeY + eyeOffsetY;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(ex, ey, eyeRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                    ctx.lineWidth = eyeRadius * 0.2;
                    ctx.stroke();
                    // Pupil
                    const px = ex + lookX * eyeRadius * 0.45;
                    const py = ey + lookY * eyeRadius * 0.4;
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(px, py, eyeRadius * 0.55, 0, Math.PI * 2);
                    ctx.fill();
                    // Pupil highlight
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(px - eyeRadius * 0.15, py - eyeRadius * 0.2, eyeRadius * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Mouth
                const mouthY = y + r * 0.22;
                ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                ctx.lineWidth = r * 0.05;
                ctx.lineCap = 'round';
                ctx.beginPath();
                if (isPlayer) {
                    // Happy smile
                    ctx.arc(x, mouthY, r * 0.22, 0.15 * Math.PI, 0.85 * Math.PI);
                } else {
                    // Grumpy/neutral
                    ctx.arc(x, mouthY + r * 0.08, r * 0.18, -0.7 * Math.PI, -0.3 * Math.PI);
                }
                ctx.stroke();

                ctx.restore();
            }

            function drawFood(food) {
                const pulse = 1 + Math.sin(time * 4 + food.pulseOffset) * 0.15;
                const r = food.radius * pulse;

                ctx.save();
                // Glow
                const glowGrad = ctx.createRadialGradient(food.x, food.y, r * 0.3, food.x, food.y, r * 2.5);
                glowGrad.addColorStop(0, food.color.replace(')', ',0.7)').replace('rgb',
                    'rgba'));
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(food.x, food.y, r * 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Body
                const bodyGrad = ctx.createRadialGradient(food.x - r * 0.2, food.y - r * 0.25, r * 0.05, food.x, food.y, r);
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.3, food.color);
                bodyGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(food.x, food.y, r, 0, Math.PI * 2);
                ctx.fill();

                // Tiny sparkle
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath();
                ctx.arc(food.x - r * 0.25, food.y - r * 0.3, r * 0.25, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawParticles() {
                for (const p of particles) {
                    const alpha = p.life;
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                    if (p.color.startsWith('#')) {
                        ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                    }
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            function drawFlash() {
                if (flashAlpha > 0.01) {
                    ctx.fillStyle = flashColor.replace(')', `,${flashAlpha})`).replace('rgb', 'rgba');
                    if (flashColor.startsWith('#')) {
                        const r = parseInt(flashColor.slice(1, 3), 16);
                        const g = parseInt(flashColor.slice(3, 5), 16);
                        const b = parseInt(flashColor.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${flashAlpha})`;
                    }
                    ctx.fillRect(0, 0, W, H);
                }
            }

            function render() {
                ctx.clearRect(0, 0, W, H);

                const sx = shakeX;
                const sy = shakeY;

                ctx.save();
                ctx.translate(sx, sy);

                drawBackground();
                drawParticles();

                // Draw foods
                for (const food of foods) {
                    drawFood(food);
                }

                // Draw enemies
                for (const enemy of enemies) {
                    drawBlob(enemy.x, enemy.y, enemy.radius, enemy.color, enemy.colorDark, enemy.glowColor,
                        enemy.vx, enemy.vy, false, 0);
                }

                // Draw player
                if (player && gameState === 'playing') {
                    drawBlob(player.x, player.y, player.radius, player.color, player.colorDark, player.glowColor,
                        player.vx, player.vy, true, growthBump);
                }

                ctx.restore();

                // Flash overlay (not affected by shake)
                drawFlash();

                // Cursor indicator
                if (gameState === 'playing' && pointerX !== null && pointerY !== null && player) {
                    const cdx = pointerX - player.x;
                    const cdy = pointerY - player.y;
                    const cdist = Math.hypot(cdx, cdy);
                    if (cdist > player.radius + 20) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.beginPath();
                        ctx.arc(pointerX, pointerY, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([4, 8]);
                        ctx.beginPath();
                        ctx.moveTo(player.x, player.y);
                        ctx.lineTo(pointerX, pointerY);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }

            // ─────────────────────────────────────
            // GAME LOOP
            // ─────────────────────────────────────
            let lastTime = performance.now();
            let animationId;

            function gameLoop(timestamp) {
                const dt = Math.min((timestamp - lastTime) / 1000, 0.15);
                lastTime = timestamp;

                update(dt);
                render();

                animationId = requestAnimationFrame(gameLoop);
            }

            // ─────────────────────────────────────
            // EVENT HANDLERS
            // ─────────────────────────────────────
            canvas.addEventListener('mousemove', (e) => {
                pointerX = e.clientX;
                pointerY = e.clientY;
                if (gameState === 'playing') {
                    instructionsEl.style.opacity = '0';
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                pointerX = e.touches[0].clientX;
                pointerY = e.touches[0].clientY;
                if (gameState === 'playing') {
                    instructionsEl.style.opacity = '0';
                }
            }, { passive: false });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                pointerX = e.touches[0].clientX;
                pointerY = e.touches[0].clientY;
                if (gameState === 'playing') {
                    instructionsEl.style.opacity = '0';
                }
            }, { passive: false });

            canvas.addEventListener('click', () => {
                // Initialize audio context on user interaction
                getAudioCtx();
            });

            restartBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetGame();
                getAudioCtx();
            });

            restartBtn.addEventListener('touchend', (e) => {
                e.stopPropagation();
                e.preventDefault();
                resetGame();
                getAudioCtx();
            });

            // Handle window losing focus
            window.addEventListener('blur', () => {
                if (player) {
                    player.vx = 0;
                    player.vy = 0;
                }
            });

            // ─────────────────────────────────────
            // START
            // ─────────────────────────────────────
            resetGame();
            pointerX = W / 2;
            pointerY = H / 2;
            player.targetX = pointerX;
            player.targetY = pointerY;
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);

            console.log('🍽️ Glutton Blob ready! Move your mouse/touch to eat and grow.');
            console.log('   Eat food and smaller blobs. Avoid bigger blobs!');
        })();
    </script>
</body>
