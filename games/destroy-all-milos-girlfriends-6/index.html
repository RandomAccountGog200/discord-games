<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Destroy All Milos Girlfriends 6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(255, 80, 150, 0.5), 0 0 120px rgba(255, 100, 180, 0.3);
            max-width: 100vw;
            max-height: 100vh;
            width: 420px;
            height: 680px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            const W = 420;
            const H = 680;
            canvas.width = W;
            canvas.height = H;

            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, duration, type = 'square', vol = 0.15, glideTo = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {}
            }

            function sfxHit() { playSound(600, 0.08, 'square', 0.2, 200);
                playSound(900, 0.06, 'square', 0.15, 400); }

            function sfxGoldenHit() { playSound(1000, 0.12, 'sine', 0.25, 1800);
                playSound(1400, 0.1, 'sine', 0.2, 2000);
                playSound(1800, 0.08, 'triangle', 0.18, 2200); }

            function sfxMiloHit() { playSound(150, 0.3, 'sawtooth', 0.25, 60);
                playSound(80, 0.4, 'triangle', 0.2, 40); }

            function sfxCombo() { playSound(500, 0.05, 'square', 0.12, 700);
                playSound(700, 0.05, 'square', 0.12, 900); }

            function sfxMiss() { playSound(120, 0.1, 'triangle', 0.08, 80); }

            function sfxSpawn() { playSound(300, 0.06, 'sine', 0.06, 500); }

            function sfxGameOver() {
                playSound(200, 0.3, 'sawtooth', 0.2, 80);
                setTimeout(() => playSound(150, 0.4, 'triangle', 0.18, 50), 200);
            }

            function sfxStart() { playSound(400, 0.1, 'sine', 0.15, 800);
                playSound(600, 0.1, 'sine', 0.15, 1000);
                playSound(900, 0.15, 'triangle', 0.18, 1200); }

            // Game State
            const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
            let gameState = STATE.TITLE;
            let score = 0;
            let highScore = parseInt(localStorage.getItem('miloGf6HighScore')) || 0;
            let timeLeft = 60;
            let comboCtr = 0;
            let comboTimer = 0;
            let comboTimerMax = 1.4;
            let spawnTimer = 0;
            let spawnInterval = 1.1;
            let shakeAmount = 0;
            let shakeDecay = 0.85;
            let flashAlpha = 0;

            // Holes
            const holePositions = [];
            const cols = [75, 210, 345];
            const rows = [185, 315, 445];
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    holePositions.push({ x: cols[c], y: rows[r], occupied: false });
                }
            }

            // Active girlfriends
            let girlfriends = [];
            // Particles
            let particles = [];
            // Floating texts
            let floatingTexts = [];
            // Ripple effects
            let ripples = [];

            // Button areas
            let startBtn = { x: W / 2 - 80, y: 420, w: 160, h: 55 };
            let restartBtn = { x: W / 2 - 80, y: 440, w: 160, h: 55 };

            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (cx - rect.left) * scaleX,
                    y: (cy - rect.top) * scaleY
                };
            }

            function createParticles(x, y, color, count, spread = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * spread;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - Math.random() * 4,
                        life: 0.35 + Math.random() * 0.5,
                        maxLife: 0.35 + Math.random() * 0.5,
                        color: color,
                        size: 2 + Math.random() * 5,
                        shape: Math.random() < 0.3 ? 'star' : (Math.random() < 0.5 ? 'heart' : 'circle')
                    });
                }
                if (particles.length > 220) particles.splice(0, particles.length - 220);
            }

            function addFloatingText(x, y, text, color = '#fff', size = 22) {
                floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    life: 1.0,
                    maxLife: 1.0,
                    color: color,
                    size: size,
                    vy: -2.5
                });
                if (floatingTexts.length > 30) floatingTexts.shift();
            }

            function addRipple(x, y) {
                ripples.push({ x, y, radius: 5, maxRadius: 35, life: 0.4, maxLife: 0.4 });
                if (ripples.length > 15) ripples.shift();
            }

            function spawnGirlfriend() {
                const emptyHoles = holePositions.map((h, i) => ({ ...h, idx: i })).filter(h => !h.occupied);
                if (emptyHoles.length === 0) return;

                const hole = emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
                holePositions[hole.idx].occupied = true;

                const rand = Math.random();
                let type, points, lifetime, hairColor, eyeStyle, mouthStyle, outfitColor, name;
                if (rand < 0.06) {
                    type = 'milo';
                    points = -180;
                    lifetime = 1.4;
                    hairColor = '#5a7a9a';
                    eyeStyle = 'sad';
                    mouthStyle = 'frown';
                    outfitColor = '#3b5f8a';
                    name = 'Milo';
                } else if (rand < 0.12) {
                    type = 'golden';
                    points = 500;
                    lifetime = 0.9;
                    hairColor = '#ffd700';
                    eyeStyle = 'sparkle';
                    mouthStyle = 'smirk';
                    outfitColor = '#ffe44d';
                    name = 'Goldie';
                } else if (rand < 0.25) {
                    type = 'crazy';
                    points = 200;
                    lifetime = 0.6;
                    hairColor = '#ff2daa';
                    eyeStyle = 'wild';
                    mouthStyle = 'crazy';
                    outfitColor = '#ff5599';
                    name = 'Crazy';
                } else if (rand < 0.45) {
                    type = 'fast';
                    points = 150;
                    lifetime = 0.85;
                    hairColor = '#ff6b35';
                    eyeStyle = 'sly';
                    mouthStyle = 'smirk';
                    outfitColor = '#ff8855';
                    name = 'Fasty';
                } else {
                    type = 'normal';
                    points = 100;
                    lifetime = 1.6;
                    const hairs = ['#f4c27a', '#8b5e3c', '#e8a850', '#c49a6c', '#d4a574', '#f0d080'];
                    hairColor = hairs[Math.floor(Math.random() * hairs.length)];
                    eyeStyle = 'normal';
                    mouthStyle = Math.random() < 0.5 ? 'smile' : 'kiss';
                    outfitColor = ['#ff7799', '#ff5577', '#ff8899', '#ee6688', '#ff99aa'][Math.floor(Math.random() * 5)];
                    name = ['Bella', 'Luna', 'Sasha', 'Mia', 'Chloe', 'Zara'][Math.floor(Math.random() * 6)];
                }

                girlfriends.push({
                    holeIndex: hole.idx,
                    type: type,
                    points: points,
                    lifetime: lifetime,
                    timeRemaining: lifetime,
                    state: 'rising',
                    stateTimer: 0,
                    riseDuration: 0.14,
                    sinkDuration: 0.14,
                    hitDuration: 0.25,
                    yOffset: -60,
                    hairColor: hairColor,
                    eyeStyle: eyeStyle,
                    mouthStyle: mouthStyle,
                    outfitColor: outfitColor,
                    name: name,
                    bobPhase: Math.random() * Math.PI * 2,
                    hitFlash: 0,
                });
                sfxSpawn();
            }

            function handleHit(gf) {
                if (gf.state === 'hit' || gf.state === 'sinking') return;
                gf.state = 'hit';
                gf.stateTimer = 0;
                gf.hitFlash = 1;
                const hole = holePositions[gf.holeIndex];
                const hx = hole.x;
                const hy = hole.y - 45;

                if (gf.type === 'milo') {
                    score += gf.points;
                    if (score < 0) score = 0;
                    createParticles(hx, hy, '#3b5f8a', 18, 4);
                    addFloatingText(hx, hy - 20, '' + gf.points, '#ff4444', 24);
                    sfxMiloHit();
                    comboCtr = 0;
                    comboTimer = 0;
                    shakeAmount = Math.max(shakeAmount, 4);
                } else {
                    const mult = Math.min(comboCtr + 1, 6);
                    const earned = gf.points * mult;
                    score += earned;
                    createParticles(hx, hy, gf.type === 'golden' ? '#ffd700' : gf.hairColor, gf.type === 'golden' ? 25 : 15,
                        gf.type === 'golden' ? 5 : 3);
                    if (gf.type === 'golden') {
                        createParticles(hx, hy, '#fffbe6', 15, 4);
                        sfxGoldenHit();
                        addFloatingText(hx, hy - 30, '+' + earned, '#ffd700', 28);
                        flashAlpha = 0.5;
                        shakeAmount = Math.max(shakeAmount, 5);
                    } else {
                        sfxHit();
                        addFloatingText(hx, hy - 20, '+' + earned, '#ffffff', 20);
                        shakeAmount = Math.max(shakeAmount, 2);
                    }
                    if (mult >= 3 && comboCtr >= 2) {
                        sfxCombo();
                        addFloatingText(hx, hy - 45, 'COMBO x' + mult + '!', '#ffff44', 18);
                        shakeAmount = Math.max(shakeAmount, 3);
                        flashAlpha = Math.max(flashAlpha, 0.25);
                    }
                    comboCtr++;
                    comboTimer = comboTimerMax;
                }
                holePositions[gf.holeIndex].occupied = false;
            }

            function resetGame() {
                score = 0;
                timeLeft = 60;
                comboCtr = 0;
                comboTimer = 0;
                spawnTimer = 0.3;
                spawnInterval = 1.15;
                girlfriends = [];
                particles = [];
                floatingTexts = [];
                ripples = [];
                shakeAmount = 0;
                flashAlpha = 0;
                holePositions.forEach(h => h.occupied = false);
            }

            function startGame() {
                initAudio();
                resetGame();
                gameState = STATE.PLAYING;
                sfxStart();
            }

            // Input handling
            function onInput(e) {
                e.preventDefault();
                initAudio();
                const pos = getCanvasPos(e);

                if (gameState === STATE.TITLE) {
                    if (pos.x >= startBtn.x && pos.x <= startBtn.x + startBtn.w &&
                        pos.y >= startBtn.y && pos.y <= startBtn.y + startBtn.h) {
                        startGame();
                    }
                    return;
                }

                if (gameState === STATE.GAMEOVER) {
                    if (pos.x >= restartBtn.x && pos.x <= restartBtn.x + restartBtn.w &&
                        pos.y >= restartBtn.y && pos.y <= restartBtn.y + restartBtn.h) {
                        startGame();
                    }
                    return;
                }

                if (gameState === STATE.PLAYING) {
                    // Check if tapped on any active girlfriend
                    let hitSomething = false;
                    for (let i = girlfriends.length - 1; i >= 0; i--) {
                        const gf = girlfriends[i];
                        if (gf.state !== 'active') continue;
                        const hole = holePositions[gf.holeIndex];
                        const hx = hole.x;
                        const hy = hole.y - 50 + gf.yOffset;
                        const dist = Math.hypot(pos.x - hx, pos.y - hy);
                        if (dist < 48) {
                            handleHit(gf);
                            hitSomething = true;
                            addRipple(pos.x, pos.y);
                            break;
                        }
                    }
                    if (!hitSomething) {
                        sfxMiss();
                        addRipple(pos.x, pos.y);
                    }
                }
            }

            canvas.addEventListener('mousedown', onInput);
            canvas.addEventListener('touchstart', onInput, { passive: false });
            canvas.addEventListener('click', function(e) { e.preventDefault(); });

            // Update
            function update(dt) {
                if (gameState !== STATE.PLAYING) return;

                dt = Math.min(dt, 0.1);

                // Timer
                timeLeft -= dt;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    gameState = STATE.GAMEOVER;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('miloGf6HighScore', highScore);
                    }
                    sfxGameOver();
                    return;
                }

                // Spawn logic
                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    spawnGirlfriend();
                    const remainingFrac = timeLeft / 60;
                    if (remainingFrac > 0.6) spawnInterval = 0.9 + Math.random() * 0.8;
                    else if (remainingFrac > 0.3) spawnInterval = 0.55 + Math.random() * 0.7;
                    else if (remainingFrac > 0.1) spawnInterval = 0.3 + Math.random() * 0.5;
                    else spawnInterval = 0.2 + Math.random() * 0.35;
                    if (Math.random() < 0.08 && remainingFrac < 0.5) spawnInterval *= 0.4;
                    spawnTimer = spawnInterval;
                }

                // Combo timer
                if (comboCtr > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        comboCtr = 0;
                        comboTimer = 0;
                    }
                }

                // Shake decay
                if (shakeAmount > 0.01) shakeAmount *= shakeDecay;
                else shakeAmount = 0;

                // Flash decay
                if (flashAlpha > 0.005) flashAlpha *= 0.9;
                else flashAlpha = 0;

                // Update girlfriends
                for (let i = girlfriends.length - 1; i >= 0; i--) {
                    const gf = girlfriends[i];
                    gf.stateTimer += dt;
                    gf.bobPhase += dt * 8;
                    if (gf.hitFlash > 0) gf.hitFlash -= dt * 5;

                    if (gf.state === 'rising') {
                        const prog = Math.min(gf.stateTimer / gf.riseDuration, 1);
                        gf.yOffset = -60 + prog * 60;
                        if (prog >= 1) {
                            gf.state = 'active';
                            gf.stateTimer = 0;
                            gf.yOffset = 0;
                        }
                    } else if (gf.state === 'active') {
                        gf.timeRemaining -= dt;
                        gf.yOffset = Math.sin(gf.bobPhase) * 4;
                        if (gf.timeRemaining <= 0) {
                            gf.state = 'sinking';
                            gf.stateTimer = 0;
                            holePositions[gf.holeIndex].occupied = false;
                            if (gf.type !== 'milo' && gf.type !== 'golden') {
                                comboCtr = Math.max(0, comboCtr - 1);
                                comboTimer = comboCtr > 0 ? comboTimerMax : 0;
                            }
                        }
                    } else if (gf.state === 'sinking') {
                        const prog = Math.min(gf.stateTimer / gf.sinkDuration, 1);
                        gf.yOffset = -prog * 60;
                        if (prog >= 1) {
                            girlfriends.splice(i, 1);
                        }
                    } else if (gf.state === 'hit') {
                        const prog = Math.min(gf.stateTimer / gf.hitDuration, 1);
                        gf.yOffset = -prog * 55;
                        if (prog >= 1) {
                            girlfriends.splice(i, 1);
                        }
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= dt;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Update floating texts
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.y += ft.vy;
                    ft.life -= dt;
                    if (ft.life <= 0) floatingTexts.splice(i, 1);
                }

                // Update ripples
                for (let i = ripples.length - 1; i >= 0; i--) {
                    const r = ripples[i];
                    r.radius += (r.maxRadius - r.radius) * 8 * dt;
                    r.life -= dt;
                    if (r.life <= 0) ripples.splice(i, 1);
                }
            }

            // Drawing functions
            function drawHole(ctx, x, y) {
                // Hole shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.ellipse(x, y + 3, 34, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                // Hole rim
                const rimGrad = ctx.createLinearGradient(x, y - 8, x, y + 8);
                rimGrad.addColorStop(0, '#8b6914');
                rimGrad.addColorStop(0.4, '#c49a3c');
                rimGrad.addColorStop(0.6, '#6b4f10');
                rimGrad.addColorStop(1, '#3d2b06');
                ctx.fillStyle = rimGrad;
                ctx.beginPath();
                ctx.ellipse(x, y, 36, 11, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#f0d080';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Hole interior
                const innerGrad = ctx.createRadialGradient(x, y - 1, 3, x, y, 28);
                innerGrad.addColorStop(0, '#0a0502');
                innerGrad.addColorStop(0.7, '#1a0e06');
                innerGrad.addColorStop(1, '#2a180a');
                ctx.fillStyle = innerGrad;
                ctx.beginPath();
                ctx.ellipse(x, y, 30, 8, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawGirlfriend(ctx, gf) {
                const hole = holePositions[gf.holeIndex];
                const hx = hole.x;
                const hy = hole.y;
                const baseY = hy - 48 + gf.yOffset;
                const squish = gf.state === 'hit' ? 1 - Math.min(gf.stateTimer / gf.hitDuration, 1) * 0.5 : 1;
                const flash = gf.hitFlash > 0 ? gf.hitFlash : 0;

                ctx.save();
                ctx.translate(hx, baseY + 30);
                ctx.scale(1, squish);
                ctx.translate(0, -30);

                // Body glow for golden
                if (gf.type === 'golden' && gf.state === 'active') {
                    const glowGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, 45);
                    glowGrad.addColorStop(0, 'rgba(255,215,0,0.6)');
                    glowGrad.addColorStop(0.6, 'rgba(255,215,0,0.2)');
                    glowGrad.addColorStop(1, 'rgba(255,215,0,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 45, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Body/shoulders
                const bodyGrad = ctx.createLinearGradient(0, -25, 0, 20);
                bodyGrad.addColorStop(0, gf.outfitColor);
                bodyGrad.addColorStop(1, shadeColor(gf.outfitColor, -30));
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(-20, 5);
                ctx.quadraticCurveTo(-24, -15, -16, -28);
                ctx.quadraticCurveTo(-10, -32, 0, -30);
                ctx.quadraticCurveTo(10, -32, 16, -28);
                ctx.quadraticCurveTo(24, -15, 20, 5);
                ctx.quadraticCurveTo(14, 18, 0, 20);
                ctx.quadraticCurveTo(-14, 18, -20, 5);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Neck
                ctx.fillStyle = shadeColor(gf.outfitColor, -15);
                ctx.fillRect(-5, -25, 10, 10);

                // Head
                const headGrad = ctx.createRadialGradient(-2, -35, 3, 0, -33, 20);
                headGrad.addColorStop(0, '#ffe4c9');
                headGrad.addColorStop(0.7, '#f5c5a3');
                headGrad.addColorStop(1, '#d4a084');
                ctx.fillStyle = headGrad;
                ctx.beginPath();
                ctx.arc(0, -33, 19, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Hair
                ctx.fillStyle = gf.hairColor;
                ctx.beginPath();
                if (gf.type === 'crazy') {
                    // Wild spiky hair
                    for (let a = -Math.PI; a < 0; a += 0.35) {
                        const spikeLen = 18 + Math.random() * 10;
                        const sx = Math.cos(a) * 19;
                        const sy = Math.sin(a) * 19 - 33;
                        const ex = sx + Math.cos(a) * spikeLen + (Math.random() - 0.5) * 10;
                        const ey = sy + Math.sin(a) * spikeLen - Math.random() * 8;
                        ctx.moveTo(sx, sy);
                        ctx.lineTo(ex, ey);
                    }
                } else if (gf.type === 'milo') {
                    ctx.arc(0, -33, 20, Math.PI, 0);
                    ctx.fill();
                    ctx.fillRect(-21, -38, 42, 15);
                } else {
                    ctx.arc(0, -34, 20, Math.PI, 0.1);
                    ctx.fill();
                    // Side hair
                    ctx.fillRect(-20, -38, 6, 22);
                    ctx.fillRect(14, -38, 6, 22);
                }
                ctx.fill();

                // Hair highlight
                if (gf.type === 'golden') {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.arc(-3, -40, 8, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Eyes
                if (gf.state === 'hit') {
                    // X eyes
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    [
                        [-7, -36],
                        [7, -36]
                    ].forEach(([ex, ey]) => {
                        ctx.beginPath();
                        ctx.moveTo(ex - 4, ey - 4);
                        ctx.lineTo(ex + 4, ey + 4);
                        ctx.moveTo(ex + 4, ey - 4);
                        ctx.lineTo(ex - 4, ey + 4);
                        ctx.stroke();
                    });
                    // Tongue out
                    ctx.fillStyle = '#ff7777';
                    ctx.beginPath();
                    ctx.arc(0, -22, 5, 0, Math.PI);
                    ctx.fill();
                } else if (gf.type === 'milo') {
                    // Sad eyes
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-7, -36, 5.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, -36, 5.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#3a5a7a';
                    ctx.beginPath();
                    ctx.arc(-7, -34, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, -34, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    // Tear
                    ctx.fillStyle = 'rgba(150,200,255,0.7)';
                    ctx.beginPath();
                    ctx.arc(-10, -31, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // Mustache
                    ctx.strokeStyle = '#4a3a2a';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-8, -25);
                    ctx.quadraticCurveTo(-4, -23, 0, -25);
                    ctx.quadraticCurveTo(4, -23, 8, -25);
                    ctx.stroke();
                } else {
                    // Normal cute eyes
                    [
                        [-7, -36],
                        [7, -36]
                    ].forEach(([ex, ey]) => {
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(ex, ey, 5.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = gf.eyeStyle === 'wild' ? '#ff2266' : '#3a2a1a';
                        ctx.beginPath();
                        ctx.arc(ex, ey - 1, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(ex - 1, ey - 2, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    // Eyelashes
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 1;
                    [
                        [-7, -36],
                        [7, -36]
                    ].forEach(([ex, ey]) => {
                        ctx.beginPath();
                        ctx.arc(ex, ey, 5.5, Math.PI, 0);
                        ctx.stroke();
                    });
                }

                // Eyebrows
                if (gf.state !== 'hit') {
                    ctx.strokeStyle = '#3a2a1a';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    if (gf.type === 'milo') {
                        ctx.beginPath();
                        ctx.moveTo(-11, -42);
                        ctx.quadraticCurveTo(-7, -40, -3, -42);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(3, -42);
                        ctx.quadraticCurveTo(7, -40, 11, -42);
                        ctx.stroke();
                    } else if (gf.eyeStyle === 'sly') {
                        ctx.beginPath();
                        ctx.moveTo(-10, -43);
                        ctx.lineTo(-4, -40);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(4, -40);
                        ctx.lineTo(10, -43);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(-11, -42);
                        ctx.quadraticCurveTo(-7, -44, -3, -42);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(3, -42);
                        ctx.quadraticCurveTo(7, -44, 11, -42);
                        ctx.stroke();
                    }
                }

                // Mouth
                if (gf.state !== 'hit') {
                    if (gf.mouthStyle === 'smile') {
                        ctx.strokeStyle = '#cc5577';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, -25, 5, 0.2, Math.PI - 0.2);
                        ctx.stroke();
                    } else if (gf.mouthStyle === 'kiss') {
                        ctx.fillStyle = '#ff7799';
                        ctx.beginPath();
                        ctx.arc(0, -24, 4, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (gf.mouthStyle === 'smirk') {
                        ctx.strokeStyle = '#cc5577';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(-4, -24);
                        ctx.quadraticCurveTo(2, -21, 7, -26);
                        ctx.stroke();
                    } else if (gf.mouthStyle === 'frown') {
                        ctx.strokeStyle = '#886644';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, -20, 4, Math.PI + 0.3, -0.3);
                        ctx.stroke();
                    } else if (gf.mouthStyle === 'crazy') {
                        ctx.fillStyle = '#ff3366';
                        ctx.beginPath();
                        ctx.arc(0, -23, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(-1, -24, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Blush
                if (gf.state !== 'hit' && gf.type !== 'milo') {
                    ctx.fillStyle = 'rgba(255,150,150,0.35)';
                    ctx.beginPath();
                    ctx.arc(-10, -30, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(10, -30, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Name tag
                if (gf.state === 'active' && gf.type !== 'normal') {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    const tagW = ctx.measureText(gf.name).width + 12;
                    ctx.fillRect(-tagW / 2, 15, tagW, 16);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 10px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(gf.name, 0, 27);
                }

                // Flash overlay
                if (flash > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,' + flash + ')';
                    ctx.beginPath();
                    ctx.arc(0, -30, 25, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            function shadeColor(color, percent) {
                const num = parseInt(color.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.max(0, Math.min(255, (num >> 16) + amt));
                const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF00) + amt));
                const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
                return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color.replace(')', ', ' + alpha + ')').replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
                    }
                    ctx.globalAlpha = alpha;
                    if (p.shape === 'star') {
                        drawStar(ctx, p.x, p.y, p.size);
                    } else if (p.shape === 'heart') {
                        drawHeart(ctx, p.x, p.y, p.size);
                    } else {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
            }

            function drawStar(ctx, x, y, size) {
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
                    const outerX = x + Math.cos(angle) * size;
                    const outerY = y + Math.sin(angle) * size;
                    const innerAngle = angle + Math.PI / 5;
                    const innerX = x + Math.cos(innerAngle) * size * 0.4;
                    const innerY = y + Math.sin(innerAngle) * size * 0.4;
                    if (i === 0) ctx.moveTo(outerX, outerY);
                    else ctx.lineTo(outerX, outerY);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();
            }

            function drawHeart(ctx, x, y, size) {
                ctx.beginPath();
                ctx.moveTo(x, y + size * 0.5);
                ctx.bezierCurveTo(x - size, y - size * 0.3, x - size * 0.6, y - size, x, y - size * 0.3);
                ctx.bezierCurveTo(x + size * 0.6, y - size, x + size, y - size * 0.3, x, y + size * 0.5);
                ctx.fill();
            }

            function drawFloatingTexts(ctx) {
                for (const ft of floatingTexts) {
                    const alpha = Math.min(1, ft.life / (ft.maxLife * 0.3));
                    const scale = 1 + (1 - ft.life / ft.maxLife) * 0.4;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = ft.color;
                    ctx.font = 'bold ' + ft.size + 'px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 4;
                    ctx.scale(scale, scale);
                    ctx.fillText(ft.text, ft.x / scale, ft.y / scale);
                    ctx.restore();
                }
            }

            function drawRipples(ctx) {
                for (const r of ripples) {
                    const alpha = r.life / r.maxLife;
                    ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
                    ctx.lineWidth = 2 * alpha;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            function drawUI(ctx) {
                // Score
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px "Segoe UI", sans-serif';
                ctx.textAlign = 'left';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 3;
                ctx.fillText('Score: ' + score, 20, 35);
                ctx.shadowBlur = 0;

                // High score
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 12px "Segoe UI", sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('Best: ' + highScore, W - 20, 30);

                // Timer
                const timerColor = timeLeft <= 10 ? (Math.sin(Date.now() / 200) > 0 ? '#ff3333' : '#ffaaaa') : '#fff';
                ctx.fillStyle = timerColor;
                ctx.font = 'bold 28px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                const secs = Math.ceil(timeLeft);
                ctx.fillText('⏱ ' + secs + 's', W / 2, 40);

                // Combo
                if (comboCtr >= 2 && comboTimer > 0) {
                    const comboAlpha = Math.min(1, comboTimer / 0.3);
                    const comboPulse = 1 + Math.sin(Date.now() / 150) * 0.15;
                    ctx.save();
                    ctx.globalAlpha = comboAlpha;
                    ctx.fillStyle = '#ffff44';
                    ctx.font = 'bold ' + Math.round(20 * comboPulse) + 'px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(255,200,0,0.8)';
                    ctx.shadowBlur = 10;
                    ctx.fillText('COMBO x' + Math.min(comboCtr + 1, 6) + '!', W / 2, 72);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }

                // Flash overlay
                if (flashAlpha > 0.01) {
                    ctx.fillStyle = 'rgba(255,255,200,' + flashAlpha + ')';
                    ctx.fillRect(0, 0, W, H);
                }

                // Instructions
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '12px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Tap girlfriends to destroy! Avoid Milo! 🚫', W / 2, H - 16);
            }

            function drawBackground(ctx) {
                // Sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
                skyGrad.addColorStop(0, '#87ceeb');
                skyGrad.addColorStop(0.5, '#b8e4f0');
                skyGrad.addColorStop(0.75, '#e8f4c8');
                skyGrad.addColorStop(1, '#7cb342');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, H);

                // Ground
                const groundGrad = ctx.createLinearGradient(0, 140, 0, H);
                groundGrad.addColorStop(0, '#8bc34a');
                groundGrad.addColorStop(0.3, '#6d9b3a');
                groundGrad.addColorStop(1, '#4a7a20');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, 145, W, H - 145);

                // Ground texture dots
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                for (let i = 0; i < 80; i++) {
                    const gx = (i * 53 + 17) % W;
                    const gy = 155 + (i * 37) % (H - 160);
                    ctx.beginPath();
                    ctx.arc(gx, gy, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Grass tufts near holes
                for (const hole of holePositions) {
                    ctx.strokeStyle = '#5a8a2a';
                    ctx.lineWidth = 2;
                    for (let t = 0; t < 5; t++) {
                        const tx = hole.x - 25 + t * 11 + Math.sin(t * 2.3) * 4;
                        const ty = hole.y - 2;
                        ctx.beginPath();
                        ctx.moveTo(tx, ty);
                        ctx.quadraticCurveTo(tx + 2, ty - 10, tx + 5, ty - 4);
                        ctx.stroke();
                    }
                }
            }

            function drawTitleScreen(ctx) {
                drawBackground(ctx);
                for (const hole of holePositions) {
                    drawHole(ctx, hole.x, hole.y);
                }

                // Title
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 34px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,50,120,0.8)';
                ctx.shadowBlur = 18;
                ctx.fillText('Destroy All', W / 2, 140);
                ctx.fillText("Milo's Girlfriends", W / 2, 182);
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(255,180,0,0.7)';
                ctx.fillText('6', W / 2, 230);
                ctx.shadowBlur = 0;

                // Subtitle
                ctx.fillStyle = '#ffe0f0';
                ctx.font = 'italic 16px "Segoe UI", sans-serif';
                ctx.fillText('The Ultimate Whackdown!', W / 2, 270);

                // Decorative hearts
                for (let i = 0; i < 12; i++) {
                    const hx = 30 + i * 32;
                    const hy = 300 + Math.sin(i * 1.8 + Date.now() / 2000) * 15;
                    ctx.fillStyle = ['#ff7799', '#ff5599', '#ff3377', '#ff99bb'][i % 4];
                    drawHeart(ctx, hx, hy, 7 + Math.abs(Math.sin(i + Date.now() / 1500)) * 4);
                }

                // Start button
                const btnGrad = ctx.createLinearGradient(startBtn.x, startBtn.y, startBtn.x, startBtn.y + startBtn.h);
                btnGrad.addColorStop(0, '#ff5588');
                btnGrad.addColorStop(0.5, '#ff3366');
                btnGrad.addColorStop(1, '#cc1155');
                ctx.fillStyle = btnGrad;
                ctx.shadowColor = 'rgba(255,50,100,0.6)';
                ctx.shadowBlur = 20;
                roundRect(ctx, startBtn.x, startBtn.y, startBtn.w, startBtn.h, 28);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                roundRect(ctx, startBtn.x, startBtn.y, startBtn.w, startBtn.h, 28);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px "Segoe UI", sans-serif';
                ctx.fillText('🔥 START 🔥', W / 2, startBtn.y + 37);

                // High score
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 14px "Segoe UI", sans-serif';
                ctx.fillText('High Score: ' + highScore, W / 2, 510);

                // Version
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.fillText('Season 6 - Now with more girlfriends!', W / 2, 540);
            }

            function drawGameOverScreen(ctx) {
                drawBackground(ctx);
                for (const hole of holePositions) {
                    drawHole(ctx, hole.x, hole.y);
                }
                drawParticles(ctx);
                drawFloatingTexts(ctx);
                drawRipples(ctx);
                drawUI(ctx);
                for (const gf of girlfriends) {
                    drawGirlfriend(ctx, gf);
                }

                // Overlay
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, W, H);

                // Game Over box
                const boxX = 40;
                const boxY = 220;
                const boxW = W - 80;
                const boxH = 260;
                ctx.fillStyle = 'rgba(30,10,30,0.9)';
                ctx.strokeStyle = '#ff5588';
                ctx.lineWidth = 4;
                roundRect(ctx, boxX, boxY, boxW, boxH, 20);
                ctx.fill();
                ctx.stroke();
                ctx.shadowColor = 'rgba(255,80,150,0.5)';
                ctx.shadowBlur = 30;
                roundRect(ctx, boxX, boxY, boxW, boxH, 20);
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ff4466';
                ctx.font = 'bold 32px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', W / 2, boxY + 50);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillText('Final Score: ' + score, W / 2, boxY + 90);

                if (score >= highScore && score > 0) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 18px "Segoe UI", sans-serif';
                    ctx.fillText('🏆 NEW HIGH SCORE! 🏆', W / 2, boxY + 120);
                } else {
                    ctx.fillStyle = '#ccc';
                    ctx.font = '14px "Segoe UI", sans-serif';
                    ctx.fillText('High Score: ' + highScore, W / 2, boxY + 120);
                }

                ctx.fillStyle = '#ffe0e0';
                ctx.font = '13px "Segoe UI", sans-serif';
                ctx.fillText("Milo's girlfriends: " + (score > 0 ? 'Destroyed!' : 'Safe... for now'),
                    W / 2, boxY + 150);

                // Restart button
                const btnGrad = ctx.createLinearGradient(restartBtn.x, restartBtn.y, restartBtn.x, restartBtn.y + restartBtn
                    .h);
                btnGrad.addColorStop(0, '#ff5588');
                btnGrad.addColorStop(1, '#cc1155');
                ctx.fillStyle = btnGrad;
                roundRect(ctx, restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h, 25);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                roundRect(ctx, restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h, 25);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillText('🔄 Play Again', W / 2, restartBtn.y + 36);
            }

            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            function draw(ctx) {
                ctx.clearRect(0, 0, W, H);

                // Screen shake
                let sx = 0,
                    sy = 0;
                if (shakeAmount > 0.02) {
                    sx = (Math.random() - 0.5) * shakeAmount * 2;
                    sy = (Math.random() - 0.5) * shakeAmount * 2;
                }
                ctx.save();
                ctx.translate(sx, sy);

                if (gameState === STATE.TITLE) {
                    drawTitleScreen(ctx);
                } else if (gameState === STATE.PLAYING) {
                    drawBackground(ctx);
                    for (const hole of holePositions) {
                        drawHole(ctx, hole.x, hole.y);
                    }
                    for (const gf of girlfriends) {
                        drawGirlfriend(ctx, gf);
                    }
                    drawParticles(ctx);
                    drawFloatingTexts(ctx);
                    drawRipples(ctx);
                    drawUI(ctx);
                } else if (gameState === STATE.GAMEOVER) {
                    drawGameOverScreen(ctx);
                }

                ctx.restore();
            }

            // Game loop
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.15) dt = 0.15;
                lastTime = timestamp;

                update(dt);
                draw(ctx);
                requestAnimationFrame(gameLoop);
            }

            // Initial draw
            draw(ctx);
            requestAnimationFrame(gameLoop);

            console.log('🎮 Destroy All Milos Girlfriends 6 - Ready!');
            console.log('👆 Tap/click girlfriends to destroy them!');
            console.log('🚫 Avoid hitting Milo - he costs points!');
            console.log('⭐ Golden girlfriends give 500pts!');
            console.log('🔥 Build combos for score multipliers!');
        })();
    </script>
</body>
</html>
