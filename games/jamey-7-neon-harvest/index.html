<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>Jamey 7 · Neon Harvest</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 12px;
      margin: 0;
    }
    .game-wrapper {
      background: linear-gradient(145deg, #111c2e 0%, #0b1322 100%);
      border-radius: 2.5rem;
      padding: 1.2rem;
      box-shadow: 0 25px 50px -8px rgba(0, 180, 255, 0.25), inset 0 2px 6px rgba(255, 255, 255, 0.08);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 600px;
      border-radius: 2rem;
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.3);
      background: radial-gradient(circle at 20% 20%, #1a2940, #0a0f18);
      touch-action: none;  /* prevent pull-to-refresh on mobile */
    }
    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      padding: 0 0.5rem;
      color: #b3f0ff;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px #00a6ff;
    }
    .score-box {
      background: rgba(0, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1.5rem;
      border-radius: 3rem;
      border: 1px solid #2dd4ff;
      box-shadow: 0 0 18px #00b7ff66;
      font-size: 1.4rem;
    }
    .restart-btn {
      background: #0e1a2b;
      border: 2px solid #3cc5ff;
      color: #e0f7ff;
      font-weight: bold;
      font-size: 1rem;
      padding: 0.5rem 1.4rem;
      border-radius: 3rem;
      cursor: pointer;
      background: rgba(10, 30, 50, 0.8);
      backdrop-filter: blur(8px);
      transition: all 0.25s;
      box-shadow: 0 0 12px #0099ff;
      letter-spacing: 0.4px;
    }
    .restart-btn:hover {
      background: #1e3b5a;
      border-color: #7fd6ff;
      box-shadow: 0 0 22px #3cb0ff;
      transform: scale(1.02);
    }
    @media (max-width: 500px) {
      .info-panel {
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="500" height="700" aria-label="Jamey 7 neon harvest game canvas"></canvas>
    <div class="info-panel">
      <div class="score-box" id="scoreDisplay">🌟 0</div>
      <button class="restart-btn" id="restartButton">↺ Restart</button>
    </div>
  </div>
  <div style="color:#7aa9c4; margin-top: 0.5rem; font-size: 0.8rem; text-align: center; max-width: 500px;">
    <span style="opacity:0.9;">⬆️⬇️ or touch drag · collect glowing orbs · avoid red spikes</span>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');

    // ----- AUDIO ENGINE (Web Audio API) -----
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        console.warn('Web Audio not supported');
      }
    }

    function playSound(freq, type = 'sine', duration = 0.12, volume = 0.15, glide = 0) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (glide) osc.frequency.linearRampToValueAtTime(freq + glide, now + duration);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function sfxCollect() {
      playSound(780, 'sine', 0.1, 0.18, 200);
      setTimeout(() => playSound(1050, 'sine', 0.08, 0.12, 0), 60);
    }
    function sfxHit() {
      playSound(90, 'triangle', 0.25, 0.25, -20);
      playSound(140, 'sawtooth', 0.15, 0.15, 0);
    }
    function sfxRestart() {
      playSound(440, 'sine', 0.08, 0.1);
      setTimeout(() => playSound(660, 'sine', 0.1, 0.12), 70);
    }

    // ----- GAME STATE -----
    const PLAYER_RADIUS = 18;
    const ORB_RADIUS = 12;
    const SPIKE_SIZE = 22; // half-width for spike triangle

    let player = {
      x: 250,
      y: 600,
      radius: PLAYER_RADIUS,
    };

    let orbs = [];
    let spikes = [];
    let score = 0;
    let gameOver = false;
    let gameActive = true;

    // Difficulty & spawn
    let frameCounter = 0;
    let orbSpawnTimer = 0;
    let spikeSpawnTimer = 0;
    const ORB_SPAWN_DELAY = 32;       // frames between orb spawns
    const SPIKE_SPAWN_DELAY = 48;     // frames between spike spawns

    // Particle system for pretty effects
    let particles = [];

    // ----- INPUT HANDLING (keyboard + touch) -----
    let keys = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false,
    };

    // Touch handling
    let touchActive = false;
    let touchTargetY = null;   // we use direct Y mapping for vertical movement
    // Horizontal movement can be done via relative touch, but for simplicity we use keyboard arrows + touch drag Y.

    function handleKeyDown(e) {
      if (e.key in keys) {
        e.preventDefault();
        keys[e.key] = true;
      }
      // Prevent arrow scrolling
      if (e.key.startsWith('Arrow')) {
        e.preventDefault();
      }
    }

    function handleKeyUp(e) {
      if (e.key in keys) {
        e.preventDefault();
        keys[e.key] = false;
      }
      if (e.key.startsWith('Arrow')) {
        e.preventDefault();
      }
    }

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;   // canvas physical vs CSS
      const scaleY = canvas.height / rect.height;
      let clientX, clientY;

      if (e.touches) {
        if (e.touches.length === 0) return null;
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
      };
    }

    function onTouchStart(e) {
      e.preventDefault();
      initAudio();
      const coords = getCanvasCoords(e);
      if (!coords || gameOver || !gameActive) return;
      touchActive = true;
      touchTargetY = coords.y;
      // Also allow quick horizontal adjustment? We'll use relative X from touch.
      // Store touch X for potential horizontal movement.
      if (e.touches && e.touches.length > 0) {
        // We'll track the latest touch Y in move.
      }
    }

    function onTouchMove(e) {
      e.preventDefault();
      if (!touchActive || gameOver || !gameActive) return;
      const coords = getCanvasCoords(e);
      if (coords) {
        touchTargetY = coords.y;
        // Optional: use X difference for horizontal movement
        if (coords.x < player.x - 15) keys.ArrowLeft = true;
        else if (coords.x > player.x + 15) keys.ArrowRight = true;
        else {
          keys.ArrowLeft = false;
          keys.ArrowRight = false;
        }
      }
    }

    function onTouchEnd(e) {
      e.preventDefault();
      touchActive = false;
      touchTargetY = null;
      keys.ArrowLeft = false;
      keys.ArrowRight = false;
      // don't reset vertical keys, but we stop touch vertical control.
    }

    // Mouse click also triggers audio init and restart if needed (handled separately)
    function onMouseDown(e) {
      initAudio();
    }

    // ----- GAME MECHANICS -----
    function spawnOrb() {
      let x = Math.random() * (canvas.width - 40) + 20;
      let y = -ORB_RADIUS - Math.random() * 30;
      orbs.push({
        x: x,
        y: y,
        radius: ORB_RADIUS,
        speed: 2.8 + Math.random() * 2.2,
        color: `hsl(${Math.random() * 60 + 180}, 90%, 70%)`, // cyan/teal range
      });
    }

    function spawnSpike() {
      let x = Math.random() * (canvas.width - 50) + 25;
      let y = -SPIKE_SIZE - Math.random() * 25;
      spikes.push({
        x: x,
        y: y,
        size: SPIKE_SIZE,
        speed: 3.0 + Math.random() * 2.5,
      });
    }

    function createParticles(x, y, color, count = 8) {
      for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = 1.5 + Math.random() * 3.5;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.7 + Math.random() * 0.5,
          maxLife: 0.7 + Math.random() * 0.5,
          color: color,
          size: 2 + Math.random() * 4,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.016;
        if (p.life <= 0 || p.y > canvas.height + 20 || p.x < -20 || p.x > canvas.width + 20) {
          particles.splice(i, 1);
        }
      }
    }

    function resetGame() {
      player.x = 250;
      player.y = 600;
      orbs = [];
      spikes = [];
      particles = [];
      score = 0;
      gameOver = false;
      gameActive = true;
      frameCounter = 0;
      orbSpawnTimer = 0;
      spikeSpawnTimer = 0;
      touchActive = false;
      touchTargetY = null;
      keys.ArrowUp = false;
      keys.ArrowDown = false;
      keys.ArrowLeft = false;
      keys.ArrowRight = false;
      updateScoreDisplay();
      sfxRestart();
    }

    function gameOverSequence() {
      if (!gameActive || gameOver) return;
      gameOver = true;
      gameActive = false;
      sfxHit();
      createParticles(player.x, player.y, '#ff5e7e', 18);
      createParticles(player.x, player.y, '#ffb347', 12);
    }

    function checkCollisions() {
      // Player vs orbs
      for (let i = orbs.length - 1; i >= 0; i--) {
        let o = orbs[i];
        let dx = player.x - o.x;
        let dy = player.y - o.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < player.radius + o.radius) {
          // collect orb
          score += 10;
          updateScoreDisplay();
          sfxCollect();
          createParticles(o.x, o.y, o.color, 7);
          orbs.splice(i, 1);
        }
      }

      // Player vs spikes (triangles approximated as circle collision with radius ~ size*0.8)
      for (let i = spikes.length - 1; i >= 0; i--) {
        let s = spikes[i];
        let dx = player.x - s.x;
        let dy = player.y - (s.y + 4); // offset slightly because spike tip is at y+size
        let dist = Math.sqrt(dx * dx + dy * dy);
        let collisionThreshold = player.radius + s.size * 0.7;
        if (dist < collisionThreshold) {
          gameOverSequence();
          break;
        }
      }
    }

    function updatePlayerPosition() {
      if (!gameActive || gameOver) return;

      const MOVE_SPEED = 5.2;
      let moveX = 0;
      let moveY = 0;

      // Keyboard horizontal
      if (keys.ArrowLeft) moveX -= 1;
      if (keys.ArrowRight) moveX += 1;
      // Keyboard vertical
      if (keys.ArrowUp) moveY -= 1;
      if (keys.ArrowDown) moveY += 1;

      // Touch vertical control (touchTargetY overrides vertical keys if touch active)
      if (touchActive && touchTargetY !== null) {
        const diffY = touchTargetY - player.y;
        if (Math.abs(diffY) > 2) {
          moveY = Math.sign(diffY) * 1; // normalized direction
        } else {
          moveY = 0;
        }
      }

      // Normalize diagonal speed
      if (moveX !== 0 || moveY !== 0) {
        let len = Math.sqrt(moveX * moveX + moveY * moveY);
        moveX = (moveX / len) * MOVE_SPEED;
        moveY = (moveY / len) * MOVE_SPEED;
      }

      player.x += moveX;
      player.y += moveY;

      // Boundary clamping
      player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
      player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
    }

    function updateSprites() {
      // Move orbs
      for (let o of orbs) {
        o.y += o.speed;
      }
      // Remove off-screen orbs (bottom)
      orbs = orbs.filter(o => o.y < canvas.height + o.radius + 20);

      // Move spikes
      for (let s of spikes) {
        s.y += s.speed;
      }
      spikes = spikes.filter(s => s.y < canvas.height + s.size + 25);
    }

    function updateSpawners() {
      if (!gameActive || gameOver) return;
      orbSpawnTimer--;
      if (orbSpawnTimer <= 0) {
        spawnOrb();
        orbSpawnTimer = ORB_SPAWN_DELAY + Math.floor(Math.random() * 15);
      }
      spikeSpawnTimer--;
      if (spikeSpawnTimer <= 0) {
        spawnSpike();
        spikeSpawnTimer = SPIKE_SPAWN_DELAY + Math.floor(Math.random() * 20);
      }
    }

    function updateScoreDisplay() {
      scoreSpan.innerHTML = `🌟 ${score}`;
    }

    // ----- RENDERING (beautiful neon style) -----
    function drawBackground() {
      // subtle grid and glow
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // radial gradient behind player
      let grad = ctx.createRadialGradient(player.x, player.y, 30, player.x, player.y, 280);
      grad.addColorStop(0, 'rgba(20, 180, 255, 0.08)');
      grad.addColorStop(0.9, 'rgba(10, 20, 40, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // grid lines
      ctx.strokeStyle = 'rgba(70, 160, 255, 0.12)';
      ctx.lineWidth = 0.8;
      for (let i = 0; i < canvas.width; i += 45) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j < canvas.height; j += 45) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(canvas.width, j);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      ctx.save();
      let px = player.x, py = player.y;
      
      // Outer glow
      ctx.shadowColor = '#2ad4ff';
      ctx.shadowBlur = 22;
      // Main body gradient
      let grad = ctx.createRadialGradient(px-4, py-4, 4, px, py, player.radius+2);
      grad.addColorStop(0, '#e0f7ff');
      grad.addColorStop(0.5, '#3cc5ff');
      grad.addColorStop(1, '#005f99');
      ctx.beginPath();
      ctx.arc(px, py, player.radius, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      
      // Inner bright core
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(px-2, py-3, 8, 0, Math.PI*2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      
      // Eyes
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
      ctx.fillStyle = '#0a0f1a';
      ctx.beginPath();
      ctx.arc(px-7, py-5, 3.2, 0, Math.PI, true);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px+7, py-5, 3.2, 0, Math.PI, true);
      ctx.fill();
      
      // tiny highlight
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(px-8, py-8, 1.2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px+6, py-8, 1.2, 0, Math.PI*2);
      ctx.fill();
      
      ctx.restore();
    }

    function drawOrbs() {
      for (let o of orbs) {
        ctx.save();
        ctx.shadowColor = o.color;
        ctx.shadowBlur = 16;
        let grad = ctx.createRadialGradient(o.x-3, o.y-3, 2, o.x, o.y, o.radius);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.4, o.color);
        grad.addColorStop(1, '#003355');
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.radius, 0, 2*Math.PI);
        ctx.fillStyle = grad;
        ctx.fill();
        // sparkle
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(o.x-3, o.y-4, 2.5, 0, Math.PI*2);
        ctx.fillStyle = '#ffffffdd';
        ctx.fill();
        ctx.restore();
      }
    }

    function drawSpikes() {
      for (let s of spikes) {
        ctx.save();
        ctx.shadowColor = '#ff3366';
        ctx.shadowBlur = 14;
        let spikeHeight = s.size;
        let halfWidth = s.size * 0.7;
        // triangle pointing down
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - spikeHeight * 0.5);
        ctx.lineTo(s.x - halfWidth, s.y + spikeHeight * 0.7);
        ctx.lineTo(s.x + halfWidth, s.y + spikeHeight * 0.7);
        ctx.closePath();
        let grad = ctx.createLinearGradient(s.x, s.y - 6, s.x, s.y + 10);
        grad.addColorStop(0, '#ff4d6d');
        grad.addColorStop(1, '#990022');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = '#ffb3c6';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // evil eye
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(s.x, s.y - 2, 2.2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#0a0000';
        ctx.arc(s.x, s.y - 2, 1.1, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.5 + p.life/p.maxLife*0.5), 0, 2*Math.PI);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawUIOverlay() {
      if (gameOver) {
        ctx.save();
        ctx.font = 'bold 34px "Segoe UI", "Poppins", sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ff3366';
        ctx.shadowBlur = 20;
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
        ctx.font = '18px "Segoe UI"';
        ctx.fillText('tap restart', canvas.width/2, canvas.height/2 + 48);
        ctx.restore();
      } else if (!gameActive && !gameOver) {
        // just in case
      }
      
      // instruction hint (fades slightly)
      if (!gameOver && gameActive) {
        ctx.save();
        ctx.font = 'italic 13px "Segoe UI"';
        ctx.fillStyle = '#b8e2ff';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#0088cc';
        ctx.textAlign = 'center';
        ctx.fillText('⬆️⬇️ arrows / touch drag', canvas.width/2, 30);
        ctx.restore();
      }
    }

    function render() {
      drawBackground();
      drawOrbs();
      drawSpikes();
      drawParticles();
      drawPlayer();
      drawUIOverlay();
    }

    // ----- GAME LOOP -----
    function gameLoop() {
      if (gameActive && !gameOver) {
        updatePlayerPosition();
        updateSprites();
        updateSpawners();
        checkCollisions();
      }
      updateParticles();
      render();
      requestAnimationFrame(gameLoop);
    }

    // ----- RESTART BUTTON -----
    document.getElementById('restartButton').addEventListener('click', (e) => {
      e.preventDefault();
      initAudio();
      resetGame();
    });

    // ----- EVENT LISTENERS -----
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd);
    canvas.addEventListener('touchcancel', onTouchEnd);
    canvas.addEventListener('mousedown', onMouseDown);

    // Prevent context menu on canvas
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // Initialize audio on first user interaction (already covered)
    window.addEventListener('click', initAudio, { once: true });
    window.addEventListener('keydown', initAudio, { once: true });

    // Start game
    resetGame();
    gameLoop();
  })();
</script>
</body>
</html>
