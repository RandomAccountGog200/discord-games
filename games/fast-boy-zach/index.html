<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fast Boy Zach</title>
    <style>
        :root {
            --bg: #1a1a2e;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            max-height: 95vh;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 140, 50, 0.25), 0 0 120px rgba(255, 100, 30, 0.12),
                0 10px 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 16px;
        }
        @media (max-width: 600px) {
            #game-container {
                border-radius: 0;
                max-height: 100vh;
                aspect-ratio: auto;
                height: 100vh;
                width: 100vw;
                max-width: 100vw;
            }
            canvas {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // Game resolution
            const GAME_W = 800;
            const GAME_H = 450;
            canvas.width = GAME_W;
            canvas.height = GAME_H;

            // Audio
            let audioCtx = null;

            function ensureAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playBeep(freq, duration, type = 'square', vol = 0.08) {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.6, audioCtx.currentTime + duration);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + duration);
                } catch (e) { /* ignore */ }
            }

            function playJumpSound() {
                playBeep(380, 0.12, 'square', 0.07);
                setTimeout(() => playBeep(520, 0.08, 'square', 0.05), 60);
            }

            function playDoubleJumpSound() {
                playBeep(600, 0.1, 'square', 0.06);
                setTimeout(() => playBeep(800, 0.08, 'triangle', 0.05), 50);
            }

            function playCoinSound() {
                playBeep(880, 0.06, 'triangle', 0.09);
                setTimeout(() => playBeep(1100, 0.07, 'triangle', 0.08), 70);
                setTimeout(() => playBeep(1400, 0.05, 'sine', 0.06), 130);
            }

            function playDeathSound() {
                playBeep(150, 0.3, 'sawtooth', 0.1);
                setTimeout(() => playBeep(80, 0.4, 'sawtooth', 0.08), 150);
            }

            // Game state
            const GROUND_Y = 370;
            const PLAYER_X = 120;
            const GRAVITY = 1450;
            const JUMP_VEL = -560;
            const DOUBLE_JUMP_VEL = -440;

            let gameState = 'waiting'; // 'waiting' | 'playing' | 'dead'
            let gameSpeed = 320;
            let distanceTraveled = 0;
            let score = 0;
            let coinsCollected = 0;
            let highScore = parseInt(localStorage.getItem('fastBoyZachHighScore')) || 0;
            let playerY = GROUND_Y;
            let playerVY = 0;
            let isOnGround = true;
            let hasDoubleJump = true;
            let playerRotation = 0;
            let targetRotation = 0;
            let runFrame = 0;
            let obstacles = [];
            let coins = [];
            let particles = [];
            let floatTexts = [];
            let screenShake = 0;
            let shakeX = 0;
            let shakeY = 0;
            let spawnTimer = 0;
            let nextSpawnDistance = 400;
            let speedIncreaseTimer = 0;
            let instructionAlpha = 1;
            let deathFlash = 0;
            let gameStartDelay = 0;
            let groundScrollOffset = 0;

            // Cloud data
            let clouds = [];
            for (let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * GAME_W,
                    y: 25 + Math.random() * 120,
                    w: 50 + Math.random() * 90,
                    h: 20 + Math.random() * 30,
                    speed: 0.15 + Math.random() * 0.35,
                    opacity: 0.5 + Math.random() * 0.4,
                });
            }

            // Mountain/hill data
            let mountains = [];
            for (let i = 0; i < 14; i++) {
                mountains.push({
                    x: i * 70 - 20 + Math.random() * 30,
                    h: 70 + Math.random() * 80,
                    w: 80 + Math.random() * 100,
                    layer: Math.random() < 0.5 ? 0 : 1,
                });
            }

            // Ground bushes
            let bushes = [];
            for (let i = 0; i < 20; i++) {
                bushes.push({
                    x: i * 55 + Math.random() * 30,
                    size: 8 + Math.random() * 20,
                });
            }

            function resetGame() {
                gameSpeed = 320;
                distanceTraveled = 0;
                score = 0;
                coinsCollected = 0;
                playerY = GROUND_Y;
                playerVY = 0;
                isOnGround = true;
                hasDoubleJump = true;
                playerRotation = 0;
                targetRotation = 0;
                runFrame = 0;
                obstacles = [];
                coins = [];
                particles = [];
                floatTexts = [];
                screenShake = 0;
                shakeX = 0;
                shakeY = 0;
                spawnTimer = 0;
                nextSpawnDistance = 400;
                speedIncreaseTimer = 0;
                instructionAlpha = 1;
                deathFlash = 0;
                gameStartDelay = 0.6;
                groundScrollOffset = 0;
                gameState = 'playing';
            }

            function killPlayer() {
                if (gameState !== 'playing') return;
                gameState = 'dead';
                screenShake = 0.5;
                deathFlash = 0.4;
                playDeathSound();
                const finalScore = Math.floor(score);
                if (finalScore > highScore) {
                    highScore = finalScore;
                    localStorage.setItem('fastBoyZachHighScore', highScore);
                }
                // Death particles
                for (let i = 0; i < 35; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 120 + Math.random() * 350;
                    particles.push({
                        x: PLAYER_X,
                        y: playerY - 25,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 100,
                        life: 0.5 + Math.random() * 0.7,
                        maxLife: 0.7 + Math.random() * 0.5,
                        color: ['#E74C3C', '#FF6B6B', '#FF8C42', '#FFD700'][Math.floor(Math.random() *
                            4)],
                        size: 3 + Math.random() * 7,
                    });
                }
            }

            function jump() {
                if (gameState === 'waiting') {
                    resetGame();
                    gameState = 'playing';
                    gameStartDelay = 0.4;
                    playerVY = JUMP_VEL;
                    isOnGround = false;
                    hasDoubleJump = true;
                    playJumpSound();
                    return;
                }
                if (gameState === 'dead') {
                    resetGame();
                    gameState = 'playing';
                    gameStartDelay = 0.4;
                    return;
                }
                if (gameState === 'playing' && isOnGround) {
                    playerVY = JUMP_VEL;
                    isOnGround = false;
                    hasDoubleJump = true;
                    targetRotation = 0;
                    playJumpSound();
                    // Dust on jump
                    for (let i = 0; i < 8; i++) {
                        particles.push({
                            x: PLAYER_X + (Math.random() - 0.5) * 20,
                            y: GROUND_Y,
                            vx: (Math.random() - 0.5) * 60,
                            vy: -30 - Math.random() * 80,
                            life: 0.25 + Math.random() * 0.3,
                            maxLife: 0.35,
                            color: '#C8B89A',
                            size: 2 + Math.random() * 3,
                        });
                    }
                } else if (gameState === 'playing' && !isOnGround && hasDoubleJump) {
                    playerVY = DOUBLE_JUMP_VEL;
                    hasDoubleJump = false;
                    targetRotation = Math.PI * 1.1;
                    playDoubleJumpSound();
                    // Spin particles
                    for (let i = 0; i < 12; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const spd = 60 + Math.random() * 140;
                        particles.push({
                            x: PLAYER_X,
                            y: playerY - 20,
                            vx: Math.cos(angle) * spd,
                            vy: Math.sin(angle) * spd,
                            life: 0.3 + Math.random() * 0.4,
                            maxLife: 0.5,
                            color: '#FFFFFF',
                            size: 2 + Math.random() * 4,
                        });
                    }
                }
                if (gameState === 'playing') {
                    instructionAlpha = Math.max(0, instructionAlpha - 0.4);
                }
            }

            // Input
            function handleInput(e) {
                e.preventDefault();
                ensureAudio();
                jump();
            }

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                    e.preventDefault();
                    ensureAudio();
                    jump();
                }
            });

            canvas.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                ensureAudio();
                jump();
            });

            document.addEventListener('touchstart', (e) => {
                if (e.target === canvas || e.target.closest('#game-container')) {
                    e.preventDefault();
                    ensureAudio();
                    jump();
                }
            }, { passive: false });

            // Prevent scrolling on game area
            document.getElementById('game-container').addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });

            function spawnObstacle() {
                const types = ['small', 'medium', 'tall'];
                const weights = gameSpeed < 450 ? [0.55, 0.35, 0.10] :
                    gameSpeed < 600 ? [0.40, 0.40, 0.20] : [0.30, 0.40, 0.30];
                const rand = Math.random();
                let type;
                if (rand < weights[0]) type = 'small';
                else if (rand < weights[0] + weights[1]) type = 'medium';
                else type = 'tall';

                let h, w;
                switch (type) {
                    case 'small':
                        h = 35 + Math.random() * 20;
                        w = 28 + Math.random() * 16;
                        break;
                    case 'medium':
                        h = 58 + Math.random() * 22;
                        w = 30 + Math.random() * 18;
                        break;
                    case 'tall':
                        h = 100 + Math.random() * 20;
                        w = 32 + Math.random() * 16;
                        break;
                }

                obstacles.push({
                    x: GAME_W + 30 + Math.random() * 80,
                    y: GROUND_Y - h,
                    w: w,
                    h: h,
                    type: type,
                    passed: false,
                });
            }

            function spawnCoinCluster(centerX, baseY) {
                const count = 1 + Math.floor(Math.random() * 4);
                const pattern = Math.random();
                for (let i = 0; i < count; i++) {
                    let cx, cy;
                    if (pattern < 0.4) {
                        // Arc
                        const spread = count > 1 ? (i / (count - 1) - 0.5) * 2 : 0;
                        cx = centerX + spread * 50;
                        cy = baseY - 40 - Math.abs(spread) * 50;
                    } else if (pattern < 0.7) {
                        // Vertical stack
                        cx = centerX + (Math.random() - 0.5) * 30;
                        cy = baseY - 30 - i * 35;
                    } else {
                        // Horizontal line at height
                        cx = centerX + (i - count / 2) * 40 + (Math.random() - 0.5) * 30;
                        cy = baseY - 25 - Math.random() * 80;
                    }
                    cy = Math.max(50, Math.min(GROUND_Y - 15, cy));
                    coins.push({
                        x: cx,
                        y: cy,
                        r: 10,
                        sparkle: Math.random() * Math.PI * 2,
                        collected: false,
                    });
                }
            }

            function addFloatText(x, y, text, color) {
                floatTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    life: 0.7,
                    maxLife: 0.7,
                    color: color,
                });
            }

            // Game loop
            let lastTime = performance.now();

            function update(dt) {
                // Clamp dt
                if (dt > 0.1) dt = 0.1;
                if (dt <= 0) dt = 0.016;

                if (gameState === 'waiting') {
                    // Animate Zach idly
                    runFrame += dt * 6;
                    // Gentle bounce
                    playerY = GROUND_Y + Math.sin(performance.now() / 1000 * 3) * 3;
                    return;
                }

                if (gameState === 'dead') {
                    // Update particles and shake
                    screenShake = Math.max(0, screenShake - dt * 2);
                    deathFlash = Math.max(0, deathFlash - dt * 2.5);
                    shakeX = (Math.random() - 0.5) * screenShake * 30;
                    shakeY = (Math.random() - 0.5) * screenShake * 30;
                    updateParticles(dt);
                    updateFloatTexts(dt);
                    return;
                }

                // Playing state
                if (gameStartDelay > 0) {
                    gameStartDelay -= dt;
                    if (gameStartDelay < 0) gameStartDelay = 0;
                }

                const effectiveSpeed = gameStartDelay > 0 ?
                    gameSpeed * (1 - gameStartDelay / 0.4) * 0.3 + gameSpeed * 0.7 * (gameStartDelay / 0.4) :
                    gameSpeed;

                // Increase speed over time
                speedIncreaseTimer += dt;
                if (speedIncreaseTimer > 4.0) {
                    speedIncreaseTimer -= 4.0;
                    gameSpeed += 22;
                    if (gameSpeed > 820) gameSpeed = 820;
                }

                // Move world
                const moveAmount = effectiveSpeed * dt;
                if (gameStartDelay <= 0) {
                    distanceTraveled += moveAmount;
                    score = Math.floor(distanceTraveled / 8) + coinsCollected * 8;
                    groundScrollOffset = (groundScrollOffset + moveAmount) % 60;
                }

                // Update player physics
                if (!isOnGround) {
                    playerVY += GRAVITY * dt;
                    playerY += playerVY * dt;
                    if (playerY >= GROUND_Y) {
                        playerY = GROUND_Y;
                        playerVY = 0;
                        isOnGround = true;
                        hasDoubleJump = true;
                        targetRotation = 0;
                        // Landing particles
                        if (gameStartDelay <= 0) {
                            for (let i = 0; i < 6; i++) {
                                particles.push({
                                    x: PLAYER_X + (Math.random() - 0.5) * 22,
                                    y: GROUND_Y,
                                    vx: (Math.random() - 0.5) * 40,
                                    vy: -20 - Math.random() * 50,
                                    life: 0.2 + Math.random() * 0.25,
                                    maxLife: 0.3,
                                    color: '#C8B89A',
                                    size: 2 + Math.random() * 3,
                                });
                            }
                        }
                    }
                } else {
                    playerY = GROUND_Y;
                    playerVY = 0;
                }

                // Smooth rotation
                if (isOnGround) {
                    targetRotation = 0;
                }
                const rotSpeed = 14;
                if (Math.abs(playerRotation - targetRotation) < 0.02) {
                    playerRotation = targetRotation;
                } else {
                    playerRotation += (targetRotation - playerRotation) * Math.min(rotSpeed * dt, 0.5);
                }
                if (isOnGround && Math.abs(playerRotation) < 0.03) {
                    playerRotation = 0;
                }

                // Running animation
                if (isOnGround && gameStartDelay <= 0) {
                    runFrame += moveAmount / 35;
                }

                // Spawn obstacles
                spawnTimer += moveAmount;
                if (spawnTimer >= nextSpawnDistance) {
                    spawnTimer -= nextSpawnDistance;
                    spawnObstacle();
                    const minGap = gameSpeed < 500 ? 280 : gameSpeed < 650 ? 230 : 190;
                    nextSpawnDistance = minGap + Math.random() * 180;
                    // Spawn coins between obstacles
                    const coinX = GAME_W + 80 + Math.random() * (nextSpawnDistance * 0.5);
                    const coinBaseY = GROUND_Y - 10 - Math.random() * 90;
                    if (Math.random() < 0.8) {
                        spawnCoinCluster(coinX, coinBaseY);
                    }
                }

                // Move obstacles
                for (let obs of obstacles) {
                    obs.x -= moveAmount;
                    if (!obs.passed && obs.x + obs.w < PLAYER_X - 15 && gameStartDelay <= 0) {
                        obs.passed = true;
                        score += 1;
                    }
                }
                // Remove off-screen obstacles
                obstacles = obstacles.filter(o => o.x + o.w > -60);

                // Move coins
                for (let coin of coins) {
                    coin.x -= moveAmount;
                    coin.sparkle += dt * 5;
                }
                coins = coins.filter(c => c.x + c.r > -30 && !c.collected);

                // Collision detection
                const playerHitbox = {
                    x: PLAYER_X - 13,
                    y: playerY - 48,
                    w: 26,
                    h: 48,
                };

                if (gameStartDelay <= 0) {
                    for (let obs of obstacles) {
                        const obsHitbox = {
                            x: obs.x + 3,
                            y: obs.y + 3,
                            w: obs.w - 6,
                            h: obs.h - 6,
                        };
                        if (
                            playerHitbox.x < obsHitbox.x + obsHitbox.w &&
                            playerHitbox.x + playerHitbox.w > obsHitbox.x &&
                            playerHitbox.y < obsHitbox.y + obsHitbox.h &&
                            playerHitbox.y + playerHitbox.h > obsHitbox.y
                        ) {
                            killPlayer();
                            break;
                        }
                    }
                }

                // Coin collection
                if (gameStartDelay <= 0) {
                    for (let coin of coins) {
                        if (coin.collected) continue;
                        const dx = PLAYER_X - coin.x;
                        const dy = (playerY - 25) - coin.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < coin.r + 18) {
                            coin.collected = true;
                            coinsCollected++;
                            score += 8;
                            playCoinSound();
                            addFloatText(coin.x, coin.y, '+8', '#FFD700');
                            // Coin particles
                            for (let i = 0; i < 10; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const spd = 70 + Math.random() * 200;
                                particles.push({
                                    x: coin.x,
                                    y: coin.y,
                                    vx: Math.cos(angle) * spd,
                                    vy: Math.sin(angle) * spd - 40,
                                    life: 0.3 + Math.random() * 0.5,
                                    maxLife: 0.55,
                                    color: Math.random() < 0.5 ? '#FFD700' : '#FFF8DC',
                                    size: 2 + Math.random() * 5,
                                });
                            }
                        }
                    }
                }

                // Update particles
                updateParticles(dt);
                updateFloatTexts(dt);

                // Update instruction alpha
                if (gameStartDelay <= 0 && instructionAlpha > 0 && distanceTraveled > 600) {
                    instructionAlpha = Math.max(0, instructionAlpha - dt * 0.7);
                }

                // Screen shake decay
                if (screenShake > 0 && gameState === 'playing') {
                    screenShake = Math.max(0, screenShake - dt * 3);
                    shakeX = (Math.random() - 0.5) * screenShake * 18;
                    shakeY = (Math.random() - 0.5) * screenShake * 18;
                } else if (gameState === 'playing') {
                    shakeX = 0;
                    shakeY = 0;
                }

                // Cloud movement
                for (let cloud of clouds) {
                    cloud.x -= cloud.speed * dt * 40;
                    if (cloud.x + cloud.w < -20) {
                        cloud.x = GAME_W + 20;
                        cloud.y = 25 + Math.random() * 120;
                    }
                }

                // Bush scroll
                for (let bush of bushes) {
                    bush.x -= moveAmount * 0.75;
                    if (bush.x < -30) bush.x += GAME_W + 80;
                }

                // Mountain scroll
                for (let m of mountains) {
                    const scrollRate = m.layer === 0 ? 0.2 : 0.45;
                    m.x -= moveAmount * scrollRate;
                    if (m.x + m.w < -40) m.x += GAME_W + 120;
                }
            }

            function updateParticles(dt) {
                for (let p of particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 180 * dt;
                    p.life -= dt;
                    if (p.life < 0) p.life = 0;
                }
                particles = particles.filter(p => p.life > 0);
            }

            function updateFloatTexts(dt) {
                for (let ft of floatTexts) {
                    ft.y -= 70 * dt;
                    ft.life -= dt;
                }
                floatTexts = floatTexts.filter(ft => ft.life > 0);
            }

            function drawSky() {
                const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
                grad.addColorStop(0, '#4A90D9');
                grad.addColorStop(0.45, '#87CEEB');
                grad.addColorStop(0.85, '#C9E8F5');
                grad.addColorStop(1, '#E8F4F8');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, GAME_W, GROUND_Y);

                // Sun
                const sunX = 630;
                const sunY = 75;
                const sunGrad = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 90);
                sunGrad.addColorStop(0, 'rgba(255,255,220,1)');
                sunGrad.addColorStop(0.3, 'rgba(255,240,200,0.8)');
                sunGrad.addColorStop(0.6, 'rgba(255,200,150,0.2)');
                sunGrad.addColorStop(1, 'rgba(255,150,100,0)');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 90, 0, Math.PI * 2);
                ctx.fill();

                // Sun core
                const coreGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 28);
                coreGrad.addColorStop(0, '#FFFEF5');
                coreGrad.addColorStop(0.5, '#FFF8DC');
                coreGrad.addColorStop(1, 'rgba(255,220,150,0)');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 28, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawClouds() {
                for (let cloud of clouds) {
                    ctx.fillStyle = `rgba(255,255,255,${cloud.opacity})`;
                    ctx.beginPath();
                    const cx = cloud.x;
                    const cy = cloud.y;
                    const w = cloud.w;
                    const h = cloud.h;
                    ctx.ellipse(cx, cy, w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx - w * 0.25, cy + h * 0.1, w * 0.35, h * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx + w * 0.28, cy + h * 0.05, w * 0.38, h * 0.42, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx + w * 0.05, cy - h * 0.2, w * 0.3, h * 0.35, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawMountains() {
                // Far mountains (layer 0)
                for (let m of mountains) {
                    if (m.layer !== 0) continue;
                    const grad = ctx.createLinearGradient(m.x, GROUND_Y - m.h, m.x, GROUND_Y);
                    grad.addColorStop(0, '#8B9DC3');
                    grad.addColorStop(0.6, '#A8B9D4');
                    grad.addColorStop(1, '#C5D0E0');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(m.x - m.w * 0.4, GROUND_Y);
                    ctx.lineTo(m.x + m.w * 0.15, GROUND_Y - m.h);
                    ctx.lineTo(m.x + m.w * 0.55, GROUND_Y);
                    ctx.closePath();
                    ctx.fill();
                }
                // Near hills (layer 1)
                for (let m of mountains) {
                    if (m.layer !== 1) continue;
                    const grad = ctx.createLinearGradient(m.x, GROUND_Y - m.h, m.x, GROUND_Y);
                    grad.addColorStop(0, '#6BA368');
                    grad.addColorStop(1, '#8BC47E');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(m.x - m.w * 0.35, GROUND_Y);
                    ctx.quadraticCurveTo(m.x + m.w * 0.1, GROUND_Y - m.h, m.x + m.w * 0.5, GROUND_Y);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            function drawGround() {
                // Dirt
                const dirtGrad = ctx.createLinearGradient(0, GROUND_Y, 0, GAME_H);
                dirtGrad.addColorStop(0, '#A0784C');
                dirtGrad.addColorStop(0.03, '#8B6914');
                dirtGrad.addColorStop(0.3, '#7D5A1E');
                dirtGrad.addColorStop(1, '#5C3D10');
                ctx.fillStyle = dirtGrad;
                ctx.fillRect(0, GROUND_Y, GAME_W, GAME_H - GROUND_Y);

                // Grass strip
                const grassGrad = ctx.createLinearGradient(0, GROUND_Y - 6, 0, GROUND_Y + 8);
                grassGrad.addColorStop(0, '#5DA04E');
                grassGrad.addColorStop(0.5, '#4A8C3B');
                grassGrad.addColorStop(1, '#3D6B2E');
                ctx.fillStyle = grassGrad;
                ctx.fillRect(0, GROUND_Y - 4, GAME_W, 10);

                // Grass tufts on top
                ctx.fillStyle = '#6DB85E';
                const tuftOffset = groundScrollOffset;
                for (let i = -1; i < GAME_W / 14 + 2; i++) {
                    const tx = i * 14 - (tuftOffset % 14);
                    const th = 4 + Math.sin(i * 2.7) * 3;
                    ctx.beginPath();
                    ctx.moveTo(tx, GROUND_Y - 4);
                    ctx.lineTo(tx - 3, GROUND_Y - 4 - th);
                    ctx.lineTo(tx + 3, GROUND_Y - 4 - th + 1);
                    ctx.closePath();
                    ctx.fill();
                }

                // Bushes
                for (let bush of bushes) {
                    if (bush.x < -20 || bush.x > GAME_W + 20) continue;
                    const bx = bush.x;
                    const by = GROUND_Y - 2;
                    const s = bush.size;
                    ctx.fillStyle = '#5B9E4B';
                    ctx.beginPath();
                    ctx.arc(bx, by - s * 0.4, s * 0.55, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(bx - s * 0.3, by - s * 0.25, s * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(bx + s * 0.35, by - s * 0.2, s * 0.38, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#6DB85E';
                    ctx.beginPath();
                    ctx.arc(bx, by - s * 0.5, s * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawZach(x, y, frame, rot) {
                ctx.save();
                const footY = y;
                const centerX = x;
                const centerY = y - 27;

                ctx.translate(centerX, centerY);
                ctx.rotate(rot);
                ctx.translate(-centerX, -centerY);

                const legSwing = Math.sin(frame * Math.PI * 2) * 14;
                const armSwing = Math.sin(frame * Math.PI * 2 + Math.PI) * 12;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(x, footY + 1, 12, 3, 0, 0, Math.PI * 2);
                ctx.fill();

                // Back leg
                ctx.fillStyle = '#2C3E50';
                ctx.beginPath();
                ctx.moveTo(x - 4, footY - 18);
                ctx.lineTo(x - 4 - legSwing * 0.6, footY + 2);
                ctx.lineTo(x + 2 - legSwing * 0.6, footY + 2);
                ctx.lineTo(x + 2, footY - 18);
                ctx.closePath();
                ctx.fill();

                // Back shoe
                ctx.fillStyle = '#E74C3C';
                ctx.fillRect(x - 6 - legSwing * 0.6, footY - 2, 10, 5);
                ctx.fillStyle = '#C0392B';
                ctx.fillRect(x - 6 - legSwing * 0.6, footY + 1, 10, 3);

                // Front leg
                ctx.fillStyle = '#34495E';
                ctx.beginPath();
                ctx.moveTo(x - 2, footY - 18);
                ctx.lineTo(x - 2 + legSwing * 0.6, footY + 2);
                ctx.lineTo(x + 4 + legSwing * 0.6, footY + 2);
                ctx.lineTo(x + 4, footY - 18);
                ctx.closePath();
                ctx.fill();

                // Front shoe
                ctx.fillStyle = '#E74C3C';
                ctx.fillRect(x - 4 + legSwing * 0.6, footY - 2, 10, 5);
                ctx.fillStyle = '#C0392B';
                ctx.fillRect(x - 4 + legSwing * 0.6, footY + 1, 10, 3);

                // Body (shirt)
                const bodyTop = footY - 44;
                const bodyGrad = ctx.createLinearGradient(x, bodyTop, x, footY - 18);
                bodyGrad.addColorStop(0, '#3498DB');
                bodyGrad.addColorStop(1, '#2471A3');
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(x - 9, bodyTop, 18, 26);

                // Shirt stripe
                ctx.fillStyle = '#5DADE2';
                ctx.fillRect(x - 9, bodyTop + 6, 18, 3);

                // Back arm
                ctx.fillStyle = '#F5D6B4';
                ctx.save();
                ctx.translate(x - 7, bodyTop + 5);
                ctx.rotate(-0.3 - armSwing * 0.04);
                ctx.fillRect(-2, -1, 5, 18);
                ctx.restore();

                // Front arm
                ctx.fillStyle = '#F5D6B4';
                ctx.save();
                ctx.translate(x + 3, bodyTop + 5);
                ctx.rotate(0.3 + armSwing * 0.04);
                ctx.fillRect(-2, -1, 5, 18);
                ctx.restore();

                // Head
                ctx.fillStyle = '#F5D6B4';
                ctx.beginPath();
                ctx.arc(x, bodyTop - 3, 11, 0, Math.PI * 2);
                ctx.fill();

                // Hair
                ctx.fillStyle = '#3D2B1F';
                ctx.beginPath();
                ctx.arc(x, bodyTop - 6, 11, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(x - 11, bodyTop - 7, 22, 5);

                // Cap
                ctx.fillStyle = '#E74C3C';
                ctx.beginPath();
                ctx.ellipse(x + 1, bodyTop - 8, 12, 5, 0, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(x - 11, bodyTop - 10, 24, 5);
                // Cap brim
                ctx.fillStyle = '#C0392B';
                ctx.fillRect(x + 3, bodyTop - 7, 14, 3);
                ctx.beginPath();
                ctx.arc(x + 15, bodyTop - 5, 6, -0.4, 0.8);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(x + 5, bodyTop - 6, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(x + 6, bodyTop - 5.5, 2, 0, Math.PI * 2);
                ctx.fill();
                // Eye shine
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(x + 7, bodyTop - 6.5, 0.8, 0, Math.PI * 2);
                ctx.fill();

                // Smile
                ctx.strokeStyle = '#C0956B';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(x + 4, bodyTop - 1, 3, 0.2, Math.PI - 0.2);
                ctx.stroke();

                // Cheek blush
                ctx.fillStyle = 'rgba(255,150,150,0.35)';
                ctx.beginPath();
                ctx.arc(x + 1, bodyTop + 1, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawObstacle(obs) {
                const x = obs.x;
                const y = obs.y;
                const w = obs.w;
                const h = obs.h;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.fillRect(x - 2, y + h - 2, w + 4, 6);
                ctx.beginPath();
                ctx.ellipse(x + w / 2, y + h + 2, w / 2 + 3, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Main body
                const bodyGrad = ctx.createLinearGradient(x, y, x + w, y);
                bodyGrad.addColorStop(0, '#B8733A');
                bodyGrad.addColorStop(0.3, '#D4945C');
                bodyGrad.addColorStop(0.7, '#A0623A');
                bodyGrad.addColorStop(1, '#7A4220');
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(x, y, w, h);

                // Border
                ctx.strokeStyle = '#5C2D10';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // Cross planks
                ctx.strokeStyle = '#8B5A30';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x + 2, y + 2);
                ctx.lineTo(x + w - 2, y + h - 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + w - 2, y + 2);
                ctx.lineTo(x + 2, y + h - 2);
                ctx.stroke();

                // Nail dots
                ctx.fillStyle = '#3A1A08';
                ctx.beginPath();
                ctx.arc(x + 5, y + 5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + w - 5, y + 5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 5, y + h - 5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + w - 5, y + h - 5, 2, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(x + 3, y + 3, w - 6, h * 0.3);

                // Type indicator - warning stripes on tall ones
                if (obs.type === 'tall') {
                    ctx.fillStyle = 'rgba(255,200,50,0.7)';
                    const stripeH = 8;
                    for (let sy = y + h * 0.25; sy < y + h * 0.75; sy += stripeH * 2) {
                        ctx.fillRect(x - 1, sy, w + 2, stripeH);
                    }
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    for (let sy = y + h * 0.25 + stripeH; sy < y + h * 0.75; sy += stripeH * 2) {
                        ctx.fillRect(x - 1, sy, w + 2, stripeH);
                    }
                }
            }

            function drawCoin(coin) {
                const x = coin.x;
                const y = coin.y;
                const r = coin.r;
                const shine = Math.sin(coin.sparkle) * 0.3 + 0.7;

                // Glow
                const glowGrad = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 1.8);
                glowGrad.addColorStop(0, 'rgba(255,215,0,0.5)');
                glowGrad.addColorStop(1, 'rgba(255,215,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(x, y, r * 1.8, 0, Math.PI * 2);
                ctx.fill();

                // Coin body
                const coinGrad = ctx.createLinearGradient(x - r, y - r, x + r, y + r);
                coinGrad.addColorStop(0, '#FFF8DC');
                coinGrad.addColorStop(0.25, '#FFD700');
                coinGrad.addColorStop(0.6, '#DAA520');
                coinGrad.addColorStop(1, '#B8860B');
                ctx.fillStyle = coinGrad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                // Border
                ctx.strokeStyle = '#B8860B';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Shine spot
                ctx.fillStyle = `rgba(255,255,255,${shine})`;
                ctx.beginPath();
                ctx.arc(x - r * 0.25, y - r * 0.3, r * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Dollar sign
                ctx.fillStyle = '#B8860B';
                ctx.font = 'bold 10px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', x, y + 1);
            }

            function drawParticles() {
                for (let p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawFloatTexts() {
                for (let ft of floatTexts) {
                    const alpha = ft.life / ft.maxLife;
                    const scale = 1 + (1 - alpha) * 0.4;
                    ctx.fillStyle = `rgba(${ft.color === '#FFD700' ? '255,215,0' : '255,255,255'},${alpha})`;
                    ctx.font = `bold ${Math.round(16 * scale)}px system-ui`;
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            function drawUI() {
                // Score
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 22px system-ui';
                ctx.textAlign = 'left';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(`Score: ${Math.floor(score)}`, 18, 36);
                ctx.shadowBlur = 0;

                // High score
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = '13px system-ui';
                ctx.textAlign = 'right';
                ctx.fillText(`Best: ${highScore}`, GAME_W - 18, 26);

                // Speed indicator
                const speedPercent = Math.round((gameSpeed - 320) / (820 - 320) * 100);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '11px system-ui';
                ctx.textAlign = 'right';
                ctx.fillText(`Speed: ${speedPercent}%`, GAME_W - 18, 44);

                // Coins collected
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 15px system-ui';
                ctx.textAlign = 'left';
                ctx.fillText(`🪙 ${coinsCollected}`, 18, 58);
            }

            function drawInstructions() {
                if (instructionAlpha <= 0.01) return;
                const alpha = Math.min(1, instructionAlpha);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.font = 'bold 16px system-ui';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 3;
                const msg = isMobileLike() ? 'TAP TO JUMP  •  DOUBLE TAP FOR SPIN' :
                    'PRESS SPACE TO JUMP  •  DOUBLE JUMP FOR SPIN';
                ctx.fillText(msg, GAME_W / 2, GAME_H - 25);
                ctx.shadowBlur = 0;
            }

            function isMobileLike() {
                return window.innerWidth < 700 || 'ontouchstart' in window;
            }

            function drawWaitingScreen() {
                // Title
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 40px system-ui';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 8;
                ctx.fillText('FAST BOY ZACH', GAME_W / 2, 140);
                ctx.shadowBlur = 0;

                // Subtitle
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 18px system-ui';
                ctx.fillText('🏃‍♂️ The Ultimate Runner! 💨', GAME_W / 2, 175);

                // Start instruction
                const pulse = Math.sin(performance.now() / 1000 * 2.5) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255,255,255,${pulse})`;
                ctx.font = 'bold 20px system-ui';
                const startMsg = isMobileLike() ? 'TAP TO START' : 'PRESS SPACE TO START';
                ctx.fillText(startMsg, GAME_W / 2, 280);

                // High score
                if (highScore > 0) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 16px system-ui';
                    ctx.fillText(`🏆 High Score: ${highScore}`, GAME_W / 2, 315);
                }
            }

            function drawDeathOverlay() {
                // Dark overlay
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                // Game Over
                ctx.fillStyle = '#FF4444';
                ctx.font = 'bold 42px system-ui';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = 10;
                ctx.fillText('GAME OVER', GAME_W / 2, 155);
                ctx.shadowBlur = 0;

                // Score
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 24px system-ui';
                ctx.fillText(`Score: ${Math.floor(score)}`, GAME_W / 2, 200);

                // High score
                if (Math.floor(score) >= highScore && highScore > 0) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 20px system-ui';
                    ctx.fillText('🏆 NEW HIGH SCORE! 🏆', GAME_W / 2, 235);
                } else if (highScore > 0) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 16px system-ui';
                    ctx.fillText(`Best: ${highScore}`, GAME_W / 2, 235);
                }

                // Coins
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 18px system-ui';
                ctx.fillText(`🪙 Coins: ${coinsCollected}`, GAME_W / 2, 270);

                // Restart
                const pulse = Math.sin(performance.now() / 1000 * 2.5) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255,255,255,${pulse})`;
                ctx.font = 'bold 19px system-ui';
                const restartMsg = isMobileLike() ? 'TAP TO PLAY AGAIN' : 'PRESS SPACE TO PLAY AGAIN';
                ctx.fillText(restartMsg, GAME_W / 2, 330);
            }

            function drawDeathFlashOverlay() {
                if (deathFlash > 0) {
                    ctx.fillStyle = `rgba(255,60,30,${deathFlash * 0.6})`;
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                }
            }

            function render() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);

                // Apply screen shake
                ctx.save();
                if (screenShake > 0.001) {
                    ctx.translate(shakeX, shakeY);
                }

                drawSky();
                drawClouds();
                drawMountains();
                drawGround();

                // Draw coins
                for (let coin of coins) {
                    if (!coin.collected) drawCoin(coin);
                }

                // Draw obstacles
                for (let obs of obstacles) {
                    drawObstacle(obs);
                }

                // Draw particles behind player
                drawParticles();
                drawFloatTexts();

                // Draw Zach
                if (gameState !== 'dead') {
                    drawZach(PLAYER_X, playerY, runFrame, playerRotation);
                } else {
                    // Draw Zach fallen
                    ctx.save();
                    const cx = PLAYER_X;
                    const cy = GROUND_Y - 20;
                    ctx.translate(cx, cy);
                    ctx.rotate(Math.PI * 0.45);
                    ctx.translate(-cx, -cy);
                    drawZach(PLAYER_X, GROUND_Y, runFrame, Math.PI * 0.3);
                    ctx.restore();
                }

                ctx.restore(); // End screen shake

                // Death flash (not affected by shake)
                drawDeathFlashOverlay();

                // UI
                if (gameState === 'playing') {
                    drawUI();
                    drawInstructions();
                } else if (gameState === 'waiting') {
                    drawUI();
                    drawWaitingScreen();
                } else if (gameState === 'dead') {
                    drawUI();
                    drawDeathOverlay();
                }
            }

            function gameLoop(timestamp) {
                const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
                lastTime = timestamp;

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            // Initialize
            function init() {
                playerY = GROUND_Y;
                playerVY = 0;
                isOnGround = true;
                hasDoubleJump = true;
                gameState = 'waiting';
                gameSpeed = 320;
                distanceTraveled = 0;
                score = 0;
                coinsCollected = 0;
                obstacles = [];
                coins = [];
                particles = [];
                floatTexts = [];
                screenShake = 0;
                shakeX = 0;
                shakeY = 0;
                instructionAlpha = 1;
                deathFlash = 0;
                gameStartDelay = 0;
                groundScrollOffset = 0;
                lastTime = performance.now();
            }

            init();
            requestAnimationFrame(gameLoop);

            // Handle resize
            window.addEventListener('resize', () => {
                // Canvas internal resolution stays the same, CSS handles scaling
            });

            console.log('🏃‍♂️ Fast Boy Zach is ready!');
            console.log('   Press SPACE or TAP to jump & run!');
        })();
    </script>
</body>
</html>
