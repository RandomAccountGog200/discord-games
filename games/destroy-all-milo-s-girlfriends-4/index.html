<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Destroy All Milo's Girlfriends 4</title>
    <style>
        :root {
            --bg: #0a0a1a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: none;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(255, 50, 120, 0.35), 0 0 120px rgba(100, 50, 255, 0.25);
            max-width: 100vw;
            max-height: 100vh;
            image-rendering: auto;
        }
        #container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // Internal resolution
            const W = 700;
            const H = 550;
            canvas.width = W;
            canvas.height = H;

            // Scale canvas to fit
            function resize() {
                const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.95;
                canvas.style.width = (W * scale) + 'px';
                canvas.style.height = (H * scale) + 'px';
            }
            window.addEventListener('resize', resize);
            resize();

            // ──────────────────────────────────────
            // AUDIO ENGINE
            // ──────────────────────────────────────
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playBeep(freq, duration, type = 'square', vol = 0.08) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {}
            }

            function playShoot() { playBeep(800, 0.1, 'square', 0.06);
                playBeep(1200, 0.06, 'triangle', 0.04); }

            function playHit() { playBeep(60, 0.2, 'sawtooth', 0.1);
                playBeep(200, 0.12, 'square', 0.06); }

            function playExplosion() { playBeep(40, 0.35, 'sawtooth', 0.12);
                playBeep(100, 0.2, 'triangle', 0.07); }

            function playWaveClear() {
                playBeep(400, 0.15, 'square', 0.07);
                setTimeout(() => playBeep(550, 0.15, 'square', 0.07), 120);
                setTimeout(() => playBeep(700, 0.2, 'triangle', 0.08), 240);
            }

            function playGameOver() {
                playBeep(200, 0.3, 'sawtooth', 0.1);
                setTimeout(() => playBeep(120, 0.4, 'sawtooth', 0.1), 250);
                setTimeout(() => playBeep(60, 0.6, 'triangle', 0.12), 500);
            }

            function playPowerUp() {
                playBeep(600, 0.08, 'square', 0.05);
                setTimeout(() => playBeep(900, 0.08, 'square', 0.05), 70);
                setTimeout(() => playBeep(1200, 0.1, 'triangle', 0.06), 140);
            }

            // ──────────────────────────────────────
            // GAME STATE
            // ──────────────────────────────────────
            const STATE = {
                MENU: 'menu',
                PLAYING: 'playing',
                WAVE_TRANSITION: 'waveTransition',
                GAME_OVER: 'gameOver',
            };

            let gameState = STATE.MENU;
            let score = 0;
            let lives = 3;
            let wave = 1;
            let comboCount = 0;
            let comboTimer = 0;
            let maxCombo = 1;
            let shakeAmount = 0;
            let waveTransitionTimer = 0;
            let powerUpActive = null;
            let powerUpTimer = 0;
            let gameTime = 0;
            let highScore = parseInt(localStorage.getItem('milogf4_highscore') || '0');

            // ──────────────────────────────────────
            // STARS
            // ──────────────────────────────────────
            class Star {
                constructor() {
                    this.reset(true);
                }
                reset(init = false) {
                    this.x = Math.random() * W;
                    this.y = init ? Math.random() * H : -5;
                    this.size = Math.random() * 2.2 + 0.6;
                    this.speed = this.size * 1.2 + 0.3;
                    this.brightness = Math.random() * 0.6 + 0.4;
                    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
                    this.twinkleOffset = Math.random() * Math.PI * 2;
                }
                update() {
                    this.y += this.speed;
                    if (this.y > H + 5) this.reset();
                }
                draw(ctx) {
                    const alpha = this.brightness + Math.sin(gameTime * this.twinkleSpeed + this
                        .twinkleOffset) * 0.3;
                    ctx.fillStyle = `rgba(255,255,255,${Math.max(0.15, alpha)})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (this.size > 1.6) {
                        ctx.fillStyle = `rgba(200,200,255,${Math.max(0, alpha - 0.25)})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            const stars = [];
            for (let i = 0; i < 120; i++) stars.push(new Star());

            // ──────────────────────────────────────
            // PLAYER
            // ──────────────────────────────────────
            class Player {
                constructor() {
                    this.width = 44;
                    this.height = 50;
                    this.x = W / 2;
                    this.y = H - 70;
                    this.speed = 420;
                    this.targetX = this.x;
                    this.shootCooldown = 0;
                    this.shootRate = 0.28;
                    this.baseShootRate = 0.28;
                    this.invincible = 0;
                    this.shieldActive = false;
                    this.multiShot = false;
                }
                update(dt) {
                    // Movement
                    const dx = this.targetX - this.x;
                    const moveSpeed = this.speed * dt;
                    if (Math.abs(dx) < moveSpeed) {
                        this.x = this.targetX;
                    } else {
                        this.x += Math.sign(dx) * moveSpeed;
                    }
                    this.x = Math.max(this.width / 2, Math.min(W - this.width / 2, this.x));

                    // Shooting
                    if (this.shootCooldown > 0) this.shootCooldown -= dt;
                    if (this.invincible > 0) this.invincible -= dt;
                }
                canShoot() {
                    if (this.shootCooldown <= 0) {
                        this.shootCooldown = this.shootRate;
                        return true;
                    }
                    return false;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);

                    // Glow
                    const glowGrad = ctx.createRadialGradient(0, 10, 5, 0, 10, 55);
                    glowGrad.addColorStop(0, 'rgba(100,180,255,0.5)');
                    glowGrad.addColorStop(1, 'rgba(100,180,255,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(0, 10, 55, 0, Math.PI * 2);
                    ctx.fill();

                    // Shield
                    if (this.shieldActive || this.invincible > 0) {
                        ctx.strokeStyle = 'rgba(100,220,255,0.7)';
                        ctx.lineWidth = 3;
                        ctx.shadowColor = 'rgba(100,220,255,0.8)';
                        ctx.shadowBlur = 18;
                        ctx.beginPath();
                        ctx.arc(0, 2, 32, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.lineWidth = 1;
                    }

                    // Body - jacket
                    ctx.fillStyle = '#2c3e50';
                    ctx.beginPath();
                    ctx.roundRect(-15, 4, 30, 24, 6);
                    ctx.fill();
                    ctx.fillStyle = '#34495e';
                    ctx.beginPath();
                    ctx.roundRect(-13, 6, 26, 20, 5);
                    ctx.fill();

                    // Jacket collar
                    ctx.fillStyle = '#1a252f';
                    ctx.beginPath();
                    ctx.moveTo(-8, 4);
                    ctx.lineTo(0, 16);
                    ctx.lineTo(8, 4);
                    ctx.closePath();
                    ctx.fill();

                    // Head
                    ctx.fillStyle = '#f5c6a0';
                    ctx.beginPath();
                    ctx.arc(0, -4, 13, 0, Math.PI * 2);
                    ctx.fill();

                    // Hair
                    ctx.fillStyle = '#2c1810';
                    ctx.beginPath();
                    ctx.arc(0, -8, 14.5, Math.PI, 0);
                    ctx.fill();
                    ctx.fillRect(-15, -10, 30, 10);

                    // Spiky hair bits
                    ctx.fillStyle = '#1a0f08';
                    ctx.beginPath();
                    ctx.moveTo(-10, -18);
                    ctx.lineTo(-6, -6);
                    ctx.lineTo(-2, -16);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(2, -19);
                    ctx.lineTo(6, -6);
                    ctx.lineTo(10, -17);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-4, -20);
                    ctx.lineTo(0, -7);
                    ctx.lineTo(4, -19);
                    ctx.fill();

                    // Sunglasses
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.roundRect(-11, -8, 10, 7, 3);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.roundRect(1, -8, 10, 7, 3);
                    ctx.fill();
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-8, -6, 17, 2);

                    // Cool glint on shades
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.arc(-5, -7, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, -7, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Legs
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(-8, 28, 7, 14);
                    ctx.fillRect(1, 28, 7, 14);

                    // Shoes
                    ctx.fillStyle = '#222';
                    ctx.fillRect(-10, 40, 10, 6);
                    ctx.fillRect(0, 40, 10, 6);

                    ctx.restore();
                }
            }

            const player = new Player();

            // ──────────────────────────────────────
            // PROJECTILES
            // ──────────────────────────────────────
            class Projectile {
                constructor(x, y, vx, vy, type = 'player') {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.type = type; // 'player' or 'enemy'
                    this.radius = type === 'player' ? 5 : 7;
                    this.alive = true;
                    this.trail = [];
                }
                update(dt) {
                    this.trail.push({ x: this.x, y: this.y, life: 0.12 });
                    if (this.trail.length > 8) this.trail.shift();
                    for (let t of this.trail) t.life -= dt;

                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    if (this.y < -20 || this.y > H + 20 || this.x < -20 || this.x > W + 20) {
                        this.alive = false;
                    }
                }
                draw(ctx) {
                    // Trail
                    for (let i = 0; i < this.trail.length; i++) {
                        const t = this.trail[i];
                        const alpha = Math.max(0, t.life / 0.12) * 0.5;
                        const r = this.radius * (0.3 + (i / this.trail.length) * 0.7);
                        if (this.type === 'player') {
                            ctx.fillStyle = `rgba(150,200,255,${alpha})`;
                        } else {
                            ctx.fillStyle = `rgba(255,100,150,${alpha})`;
                        }
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (this.type === 'player') {
                        // Energy blast
                        const grad = ctx.createRadialGradient(this.x, this.y, 1, this.x, this.y, this.radius);
                        grad.addColorStop(0, 'rgba(255,255,255,1)');
                        grad.addColorStop(0.4, 'rgba(180,220,255,0.9)');
                        grad.addColorStop(1, 'rgba(80,150,255,0)');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius * 2.2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // Heart projectile
                        drawHeart(ctx, this.x, this.y, this.radius, '#ff4477', '#ff8899');
                        ctx.fillStyle = 'rgba(255,150,180,0.3)';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius * 1.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawHeart(ctx, x, y, size, color1, color2) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(size / 8, size / 8);
                ctx.fillStyle = color1;
                ctx.beginPath();
                ctx.moveTo(0, 3);
                ctx.bezierCurveTo(-4, -3, -8, 1, -4, 5);
                ctx.lineTo(0, 8);
                ctx.lineTo(4, 5);
                ctx.bezierCurveTo(8, 1, 4, -3, 0, 3);
                ctx.fill();
                ctx.fillStyle = color2;
                ctx.beginPath();
                ctx.moveTo(0, 3.5);
                ctx.bezierCurveTo(-3, -1.5, -6, 1.5, -3, 4.5);
                ctx.lineTo(0, 7);
                ctx.lineTo(3, 4.5);
                ctx.bezierCurveTo(6, 1.5, 3, -1.5, 0, 3.5);
                ctx.fill();
                ctx.restore();
            }

            const projectiles = [];

            // ──────────────────────────────────────
            // ENEMIES
            // ──────────────────────────────────────
            class Enemy {
                constructor(x, y, type = 0) {
                    this.x = x;
                    this.y = y;
                    this.type = type; // 0-5 different girlfriend types
                    this.width = 32;
                    this.height = 38;
                    this.alive = true;
                    this.hp = 1;
                    this.maxHp = 1;
                    this.flashTimer = 0;
                    this.wobbleOffset = Math.random() * Math.PI * 2;
                    this.diving = false;
                    this.diveSpeed = 0;
                    this.diveTargetX = x;
                    this.shootTimer = Math.random() * 3 + 1;
                    this.baseShootInterval = 2.5 + Math.random() * 4;
                }
                update(dt, formationVx, formationVy) {
                    if (this.flashTimer > 0) this.flashTimer -= dt;
                    if (this.diving) {
                        this.y += this.diveSpeed * dt;
                        this.x += (this.diveTargetX - this.x) * 3 * dt;
                        if (this.y > H + 60) this.alive = false;
                    } else {
                        this.x += formationVx * dt;
                        this.y += formationVy * dt;
                    }
                    this.shootTimer -= dt;
                }
                canShoot() {
                    if (!this.diving && this.shootTimer <= 0) {
                        this.shootTimer = this.baseShootInterval + Math.random() * 2;
                        return true;
                    }
                    return false;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);

                    const flashOn = this.flashTimer > 0 && Math.floor(this.flashTimer * 30) % 2 === 0;
                    const wobble = Math.sin(gameTime * 5 + this.wobbleOffset) * 2;

                    // Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(0, this.height / 2 + 3, 14, 5, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Body dress
                    const dressColors = ['#ff6b9d', '#ff8c69', '#ff4081', '#e040fb', '#ff5252', '#ffab40'];
                    const hairColors = ['#fce4a8', '#e8c47a', '#c67a3d', '#2c1810', '#f0c0d0', '#ffcc80'];
                    const dressColor = flashOn ? '#fff' : dressColors[this.type % dressColors.length];
                    const hairColor = hairColors[this.type % hairColors.length];

                    // Dress
                    ctx.fillStyle = dressColor;
                    ctx.beginPath();
                    ctx.moveTo(-10, 2);
                    ctx.lineTo(0, 4);
                    ctx.lineTo(10, 2);
                    ctx.lineTo(13, 16);
                    ctx.lineTo(8, 20);
                    ctx.lineTo(0, 16);
                    ctx.lineTo(-8, 20);
                    ctx.lineTo(-13, 16);
                    ctx.closePath();
                    ctx.fill();

                    // Dress highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    ctx.moveTo(-6, 4);
                    ctx.lineTo(0, 6);
                    ctx.lineTo(6, 4);
                    ctx.lineTo(8, 12);
                    ctx.lineTo(0, 9);
                    ctx.lineTo(-8, 12);
                    ctx.closePath();
                    ctx.fill();

                    // Head
                    ctx.fillStyle = '#fdd9b5';
                    ctx.beginPath();
                    ctx.arc(0, -4, 11, 0, Math.PI * 2);
                    ctx.fill();

                    // Hair
                    ctx.fillStyle = hairColor;
                    ctx.beginPath();
                    ctx.arc(0, -6, 12.5, Math.PI, 0);
                    ctx.fill();
                    ctx.fillRect(-13, -8, 26, 10);

                    // Hair sides
                    ctx.beginPath();
                    ctx.arc(-11, 1, 6, 0, Math.PI * 1.5);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(11, 1, 6, -Math.PI * 0.5, Math.PI);
                    ctx.fill();

                    // Bow or accessory
                    if (this.type % 3 === 0) {
                        ctx.fillStyle = '#ff4081';
                        ctx.beginPath();
                        ctx.arc(-3, -14, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(3, -14, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ff80ab';
                        ctx.beginPath();
                        ctx.arc(0, -13, 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (this.type % 3 === 1) {
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.arc(0, -15, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-4, -5, 4.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(4, -5, 4.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(-3, -4.5, 2.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(5, -4.5, 2.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-2, -5.5, 0.8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(6, -5.5, 0.8, 0, Math.PI * 2);
                    ctx.fill();

                    // Eyelashes
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.arc(-4, -5, 4.5, Math.PI * 0.7, Math.PI * 1.3);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(4, -5, 4.5, Math.PI * 0.7, Math.PI * 1.3);
                    ctx.stroke();
                    ctx.lineWidth = 1;

                    // Lips
                    ctx.fillStyle = '#e57373';
                    ctx.beginPath();
                    ctx.arc(0, 1, 3.5, 0, Math.PI);
                    ctx.fill();

                    // Blush
                    ctx.fillStyle = 'rgba(255,150,150,0.35)';
                    ctx.beginPath();
                    ctx.arc(-7, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(7, 0, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // Little floating heart
                    const heartBob = Math.sin(gameTime * 6 + this.wobbleOffset) * 3;
                    drawHeart(ctx, 14, -10 + heartBob, 6, 'rgba(255,100,150,0.7)', 'rgba(255,150,180,0.4)');

                    ctx.restore();
                }
                hit() {
                    this.hp--;
                    this.flashTimer = 0.15;
                    if (this.hp <= 0) {
                        this.alive = false;
                        return true;
                    }
                    return false;
                }
            }

            const enemies = [];

            // ──────────────────────────────────────
            // PARTICLES
            // ──────────────────────────────────────
            class Particle {
                constructor(x, y, color, size, life) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 280;
                    this.vy = (Math.random() - 0.5) * 280;
                    this.color = color;
                    this.size = size;
                    this.life = life;
                    this.maxLife = life;
                    this.alive = true;
                    this.shape = Math.random() < 0.4 ? 'heart' : 'circle';
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += 200 * dt;
                    this.life -= dt;
                    if (this.life <= 0) this.alive = false;
                }
                draw(ctx) {
                    const alpha = this.life / this.maxLife;
                    const s = this.size * (0.4 + alpha * 0.6);
                    if (this.shape === 'heart') {
                        drawHeart(ctx, this.x, this.y, s * 1.5, this.color,
                            this.color.replace('1)', `${alpha*0.6})`).replace('rgb',
                                'rgba'));
                    } else {
                        ctx.fillStyle = this.color.replace('1)', `${alpha})`).replace('rgb', 'rgba');
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            const particles = [];

            function spawnExplosion(x, y, count = 20, colors = ['rgb(255,100,150,1)', 'rgb(255,200,100,1)',
                'rgb(255,150,200,1)', 'rgb(255,255,200,1)'
            ]) {
                for (let i = 0; i < count; i++) {
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const size = Math.random() * 4 + 2;
                    const life = Math.random() * 0.6 + 0.3;
                    particles.push(new Particle(x, y, color, size, life));
                }
            }

            // ──────────────────────────────────────
            // POWER-UPS
            // ──────────────────────────────────────
            class PowerUp {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type; // 'rapid', 'shield', 'multi'
                    this.width = 22;
                    this.height = 22;
                    this.alive = true;
                    this.vy = 100;
                    this.bobOffset = Math.random() * Math.PI * 2;
                }
                update(dt) {
                    this.y += this.vy * dt;
                    if (this.y > H + 40) this.alive = false;
                }
                draw(ctx) {
                    const bob = Math.sin(gameTime * 7 + this.bobOffset) * 4;
                    ctx.save();
                    ctx.translate(this.x, this.y + bob);

                    // Glow
                    let glowColor = 'rgba(100,255,200,0.5)';
                    if (this.type === 'rapid') glowColor = 'rgba(255,200,50,0.5)';
                    if (this.type === 'shield') glowColor = 'rgba(100,200,255,0.5)';
                    if (this.type === 'multi') glowColor = 'rgba(255,100,255,0.5)';

                    const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 20);
                    glow.addColorStop(0, glowColor);
                    glow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(0, 0, 20, 0, Math.PI * 2);
                    ctx.fill();

                    // Icon background
                    ctx.fillStyle = '#fff';
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(-11, -11, 22, 22, 6);
                    ctx.fill();
                    ctx.stroke();
                    ctx.lineWidth = 1;

                    // Icon
                    ctx.fillStyle = '#222';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    if (this.type === 'rapid') ctx.fillText('⚡', 0, 0);
                    if (this.type === 'shield') ctx.fillText('🛡', 0, 0);
                    if (this.type === 'multi') ctx.fillText('✨', 0, 0);

                    ctx.restore();
                }
            }

            const powerUps = [];

            // ──────────────────────────────────────
            // FORMATION STATE
            // ──────────────────────────────────────
            let formationX = 0;
            let formationVx = 80;
            let formationVy = 0;
            let formationDropAmount = 18;

            function getFormationBounds() {
                const alive = enemies.filter(e => e.alive && !e.diving);
                if (alive.length === 0) return { minX: 0, maxX: 0, minY: 0, maxY: 0, width: 0 };
                let minX = Infinity,
                    maxX = -Infinity,
                    minY = Infinity,
                    maxY = -Infinity;
                for (const e of alive) {
                    if (e.x < minX) minX = e.x;
                    if (e.x > maxX) maxX = e.x;
                    if (e.y < minY) minY = e.y;
                    if (e.y > maxY) maxY = e.y;
                }
                return { minX, maxX, minY, maxY, width: maxX - minX };
            }

            function spawnWave(waveNum) {
                enemies.length = 0;
                const cols = Math.min(5 + waveNum, 11);
                const rows = Math.min(3 + Math.floor(waveNum / 2), 7);
                const spacingX = 50;
                const spacingY = 44;
                const startX = W / 2 - ((cols - 1) * spacingX) / 2;
                const startY = 60 + waveNum * 6;

                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        const x = startX + col * spacingX;
                        const y = startY + row * spacingY;
                        const type = (row * cols + col) % 6;
                        const enemy = new Enemy(x, y, type);
                        if (row === rows - 1 && Math.random() < 0.3) {
                            enemy.hp = 2;
                            enemy.maxHp = 2;
                        }
                        enemy.baseShootInterval = 2.5 + Math.random() * 3 - waveNum * 0.15;
                        enemy.baseShootInterval = Math.max(1.2, enemy.baseShootInterval);
                        enemies.push(enemy);
                    }
                }
                formationVx = 80 + waveNum * 15;
                formationDropAmount = 16 + waveNum * 2;
                formationX = 0;
                formationVy = 0;
            }

            // ──────────────────────────────────────
            // GAME FUNCTIONS
            // ──────────────────────────────────────
            function resetGame() {
                score = 0;
                lives = 3;
                wave = 1;
                comboCount = 0;
                comboTimer = 0;
                maxCombo = 1;
                shakeAmount = 0;
                powerUpActive = null;
                powerUpTimer = 0;
                gameTime = 0;
                player.x = W / 2;
                player.targetX = W / 2;
                player.y = H - 70;
                player.invincible = 0;
                player.shieldActive = false;
                player.multiShot = false;
                player.shootRate = player.baseShootRate;
                player.shootCooldown = 0;
                projectiles.length = 0;
                particles.length = 0;
                powerUps.length = 0;
                enemies.length = 0;
                spawnWave(wave);
                gameState = STATE.PLAYING;
            }

            function playerHit() {
                if (player.invincible > 0 || player.shieldActive) {
                    if (player.shieldActive) {
                        player.shieldActive = false;
                        spawnExplosion(player.x, player.y, 15, ['rgb(100,200,255,1)', 'rgb(200,240,255,1)']);
                        playBeep(300, 0.2, 'triangle', 0.08);
                    }
                    return;
                }
                lives--;
                player.invincible = 1.8;
                player.shieldActive = false;
                player.multiShot = false;
                player.shootRate = player.baseShootRate;
                powerUpActive = null;
                powerUpTimer = 0;
                shakeAmount = 12;
                comboCount = 0;
                comboTimer = 0;
                spawnExplosion(player.x, player.y, 30, ['rgb(255,60,60,1)', 'rgb(255,150,50,1)', 'rgb(255,200,200,1)']);
                playHit();
                if (lives <= 0) {
                    gameOver();
                }
            }

            function gameOver() {
                gameState = STATE.GAME_OVER;
                playGameOver();
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('milogf4_highscore', highScore);
                }
                spawnExplosion(player.x, player.y, 50, ['rgb(255,50,50,1)', 'rgb(255,150,30,1)', 'rgb(255,200,50,1)',
                    'rgb(255,100,100,1)'
                ]);
            }

            function activatePowerUp(type) {
                powerUpActive = type;
                powerUpTimer = 8;
                if (type === 'rapid') {
                    player.shootRate = 0.1;
                } else if (type === 'shield') {
                    player.shieldActive = true;
                } else if (type === 'multi') {
                    player.multiShot = true;
                }
                playPowerUp();
            }

            function deactivatePowerUp() {
                if (powerUpActive === 'rapid') player.shootRate = player.baseShootRate;
                if (powerUpActive === 'multi') player.multiShot = false;
                powerUpActive = null;
                powerUpTimer = 0;
            }

            // ──────────────────────────────────────
            // UPDATE
            // ──────────────────────────────────────
            function update(dt) {
                if (gameState !== STATE.PLAYING && gameState !== STATE.WAVE_TRANSITION) {
                    // Still update particles and stars
                    for (const star of stars) star.update();
                    for (const p of particles) p.update(dt);
                    particles.filter(p => p.alive);
                    for (let i = particles.length - 1; i >= 0; i--) {
                        if (!particles[i].alive) particles.splice(i, 1);
                    }
                    if (shakeAmount > 0) shakeAmount *= Math.pow(0.02, dt);
                    if (shakeAmount < 0.1) shakeAmount = 0;
                    gameTime += dt;
                    return;
                }

                const effectiveDt = Math.min(dt, 0.1);
                gameTime += effectiveDt;

                // Update stars
                for (const star of stars) star.update();

                // Update player
                player.update(effectiveDt);

                // Auto-shoot
                if (player.canShoot() && gameState === STATE.PLAYING) {
                    const px = player.x;
                    const py = player.y - 22;
                    projectiles.push(new Projectile(px, py, 0, -650, 'player'));
                    if (player.multiShot) {
                        projectiles.push(new Projectile(px - 10, py - 4, -60, -620, 'player'));
                        projectiles.push(new Projectile(px + 10, py - 4, 60, -620, 'player'));
                    }
                    playShoot();
                }

                // Update projectiles
                for (const p of projectiles) p.update(effectiveDt);
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    if (!projectiles[i].alive) projectiles.splice(i, 1);
                }

                // Update enemies & formation
                const bounds = getFormationBounds();
                const aliveEnemies = enemies.filter(e => e.alive);
                const nonDiving = aliveEnemies.filter(e => !e.diving);

                if (nonDiving.length > 0 && gameState === STATE.PLAYING) {
                    const b = getFormationBounds();
                    if (b.maxX + formationVx * effectiveDt > W - 30) {
                        formationVx = -Math.abs(formationVx);
                        formationVy = formationDropAmount;
                    } else if (b.minX + formationVx * effectiveDt < 30) {
                        formationVx = Math.abs(formationVx);
                        formationVy = formationDropAmount;
                    } else {
                        formationVy = 0;
                    }

                    // Check if formation is too low
                    if (b.maxY > H - 100) {
                        playerHit();
                        formationVy = 0;
                        // Push formation back up slightly
                        for (const e of nonDiving) e.y -= 40;
                    }
                } else {
                    formationVy = 0;
                }

                for (const e of enemies) {
                    e.update(effectiveDt, formationVx, formationVy);

                    // Enemy shooting
                    if (e.canShoot() && e.alive && !e.diving && gameState === STATE.PLAYING) {
                        const heartVx = (Math.random() - 0.5) * 100;
                        const heartVy = 200 + Math.random() * 180;
                        projectiles.push(new Projectile(e.x, e.y + 16, heartVx, heartVy, 'enemy'));
                    }

                    // Random dive
                    if (!e.diving && e.alive && Math.random() < 0.0003 * (1 + wave * 0.3) && gameState === STATE
                        .PLAYING) {
                        e.diving = true;
                        e.diveSpeed = 250 + Math.random() * 300;
                        e.diveTargetX = player.x + (Math.random() - 0.5) * 200;
                    }
                }

                // Clean up dead enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (!enemies[i].alive) enemies.splice(i, 1);
                }

                // Collision: player projectiles vs enemies
                for (const p of projectiles) {
                    if (p.type !== 'player' || !p.alive) continue;
                    for (const e of enemies) {
                        if (!e.alive || e.flashTimer > 0.1) continue;
                        const dx = p.x - e.x;
                        const dy = p.y - e.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < p.radius + 20) {
                            p.alive = false;
                            const killed = e.hit();
                            if (killed) {
                                spawnExplosion(e.x, e.y, 18, ['rgb(255,100,150,1)', 'rgb(255,200,150,1)',
                                    'rgb(255,150,200,1)', 'rgb(255,255,180,1)'
                                ]);
                                score += 100 * Math.min(maxCombo, 8);
                                comboCount++;
                                comboTimer = 1.2;
                                if (comboCount > maxCombo) maxCombo = comboCount;
                                playExplosion();
                                shakeAmount = Math.max(shakeAmount, 3);

                                // Chance to drop power-up
                                if (Math.random() < 0.08 && !powerUpActive) {
                                    const types = ['rapid', 'shield', 'multi'];
                                    const type = types[Math.floor(Math.random() * types.length)];
                                    powerUps.push(new PowerUp(e.x, e.y, type));
                                }
                            } else {
                                spawnExplosion(e.x, e.y, 6, ['rgb(255,200,200,1)', 'rgb(255,255,200,1)']);
                                playBeep(200, 0.08, 'square', 0.04);
                            }
                            break;
                        }
                    }
                }

                // Collision: enemy projectiles vs player
                for (const p of projectiles) {
                    if (p.type !== 'enemy' || !p.alive) continue;
                    const dx = p.x - player.x;
                    const dy = p.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < p.radius + 18) {
                        p.alive = false;
                        playerHit();
                        if (gameState === STATE.GAME_OVER) return;
                    }
                }

                // Collision: diving enemies vs player
                for (const e of enemies) {
                    if (!e.alive || !e.diving) continue;
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 28) {
                        e.alive = false;
                        spawnExplosion(e.x, e.y, 20, ['rgb(255,80,80,1)', 'rgb(255,150,50,1)']);
                        playerHit();
                        if (gameState === STATE.GAME_OVER) return;
                    }
                }

                // Update power-ups
                for (const pu of powerUps) pu.update(effectiveDt);
                for (let i = powerUps.length - 1; i >= 0; i--) {
                    if (!powerUps[i].alive) powerUps.splice(i, 1);
                }

                // Player collects power-ups
                for (const pu of powerUps) {
                    if (!pu.alive) continue;
                    const dx = pu.x - player.x;
                    const dy = pu.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 28) {
                        pu.alive = false;
                        activatePowerUp(pu.type);
                    }
                }

                // Power-up timer
                if (powerUpActive && powerUpTimer > 0) {
                    powerUpTimer -= effectiveDt;
                    if (powerUpTimer <= 0) deactivatePowerUp();
                }

                // Combo timer
                if (comboTimer > 0) {
                    comboTimer -= effectiveDt;
                    if (comboTimer <= 0) {
                        comboCount = 0;
                        maxCombo = Math.max(1, maxCombo);
                    }
                }

                // Update particles
                for (const p of particles) p.update(effectiveDt);
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (!particles[i].alive) particles.splice(i, 1);
                }

                // Shake decay
                if (shakeAmount > 0) shakeAmount *= Math.pow(0.015, effectiveDt);
                if (shakeAmount < 0.05) shakeAmount = 0;

                // Check wave clear
                if (enemies.filter(e => e.alive).length === 0 && gameState === STATE.PLAYING) {
                    gameState = STATE.WAVE_TRANSITION;
                    waveTransitionTimer = 1.8;
                    score += 500 * wave;
                    playWaveClear();
                    spawnExplosion(W / 2, H / 2, 40, ['rgb(255,200,50,1)', 'rgb(255,150,200,1)', 'rgb(200,200,255,1)',
                        'rgb(255,255,150,1)'
                    ]);
                    deactivatePowerUp();
                }

                // Wave transition
                if (gameState === STATE.WAVE_TRANSITION) {
                    waveTransitionTimer -= effectiveDt;
                    if (waveTransitionTimer <= 0) {
                        wave++;
                        spawnWave(wave);
                        player.invincible = 1.5;
                        projectiles.length = 0;
                        powerUps.length = 0;
                        deactivatePowerUp();
                        gameState = STATE.PLAYING;
                    }
                }

                // Clean arrays
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    if (!projectiles[i].alive) projectiles.splice(i, 1);
                }
            }

            // ──────────────────────────────────────
            // DRAW
            // ──────────────────────────────────────
            function draw(ctx) {
                // Background
                const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
                bgGrad.addColorStop(0, '#0a0a2e');
                bgGrad.addColorStop(0.5, '#0d0d35');
                bgGrad.addColorStop(1, '#0a0a1f');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Apply shake
                ctx.save();
                if (shakeAmount > 0) {
                    const sx = (Math.random() - 0.5) * shakeAmount * 2;
                    const sy = (Math.random() - 0.5) * shakeAmount * 2;
                    ctx.translate(sx, sy);
                }

                // Stars
                for (const star of stars) star.draw(ctx);

                // Grid lines (subtle)
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 1;
                for (let x = 0; x < W; x += 50) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                    ctx.stroke();
                }
                for (let y = 0; y < H; y += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                    ctx.stroke();
                }

                // Power-ups
                for (const pu of powerUps) pu.draw(ctx);

                // Enemies
                for (const e of enemies) {
                    if (e.alive) e.draw(ctx);
                }

                // Projectiles
                for (const p of projectiles) p.draw(ctx);

                // Player
                if (gameState !== STATE.GAME_OVER) {
                    player.draw(ctx);
                }

                // Particles
                for (const p of particles) p.draw(ctx);

                ctx.restore();

                // ── UI ──
                // Score
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`SCORE: ${score.toLocaleString()}`, 20, 32);

                // High score
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '11px "Segoe UI", Arial, sans-serif';
                ctx.fillText(`BEST: ${highScore.toLocaleString()}`, 20, 48);

                // Wave
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`WAVE ${wave}`, W - 20, 32);

                // Lives
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ff6688';
                ctx.font = '18px "Segoe UI", Arial, sans-serif';
                let livesStr = '';
                for (let i = 0; i < lives; i++) livesStr += '❤️ ';
                ctx.fillText(livesStr.trim(), W - 20, 54);

                // Combo
                if (comboCount > 3 && comboTimer > 0) {
                    const comboAlpha = Math.min(1, comboTimer / 0.5);
                    ctx.fillStyle = `rgba(255,200,50,${comboAlpha})`;
                    ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${comboCount}x COMBO!`, W / 2, 100);
                }

                // Power-up indicator
                if (powerUpActive && powerUpTimer > 0) {
                    const puAlpha = Math.min(1, powerUpTimer / 1);
                    ctx.fillStyle = `rgba(255,255,100,${puAlpha})`;
                    ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    const puName = powerUpActive === 'rapid' ? '⚡ RAPID FIRE' : powerUpActive === 'shield' ?
                        '🛡 SHIELD' : '✨ MULTI-SHOT';
                    ctx.fillText(`${puName} ${Math.ceil(powerUpTimer)}s`, W / 2, 80);
                }

                // Wave transition
                if (gameState === STATE.WAVE_TRANSITION) {
                    ctx.fillStyle = 'rgba(255,200,50,0.9)';
                    ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`WAVE ${wave} CLEAR!`, W / 2, H / 2 - 10);
                    ctx.fillStyle = '#fff';
                    ctx.font = '18px "Segoe UI", Arial, sans-serif';
                    ctx.fillText(`WAVE ${wave + 1} INCOMING...`, W / 2, H / 2 + 30);
                }

                // Game Over
                if (gameState === STATE.GAME_OVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);

                    ctx.fillStyle = '#ff4466';
                    ctx.font = 'bold 42px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
                    ctx.fillText(`FINAL SCORE: ${score.toLocaleString()}`, W / 2, H / 2 + 10);

                    if (score >= highScore && score > 0) {
                        ctx.fillStyle = '#ffd700';
                        ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
                        ctx.fillText('🏆 NEW HIGH SCORE! 🏆', W / 2, H / 2 + 38);
                    }

                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.font = '17px "Segoe UI", Arial, sans-serif';
                    ctx.fillText('TAP or PRESS SPACE TO RESTART', W / 2, H / 2 + 72);
                }

                // Menu
                if (gameState === STATE.MENU) {
                    ctx.fillStyle = 'rgba(0,0,0,0.65)';
                    ctx.fillRect(0, 0, W, H);

                    // Title glow
                    const titleGlow = ctx.createRadialGradient(W / 2, H / 2 - 80, 20, W / 2, H / 2 - 80, 300);
                    titleGlow.addColorStop(0, 'rgba(255,80,150,0.4)');
                    titleGlow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = titleGlow;
                    ctx.fillRect(0, 0, W, H);

                    ctx.fillStyle = '#ff4488';
                    ctx.font = 'bold 38px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(255,50,120,0.8)';
                    ctx.shadowBlur = 30;
                    ctx.fillText('DESTROY ALL', W / 2, H / 2 - 85);
                    ctx.fillText("MILO'S GIRLFRIENDS 4", W / 2, H / 2 - 40);
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                    ctx.fillText('🎯 Shoot the girlfriends! 💔', W / 2, H / 2 + 20);
                    ctx.fillText('Dodge their hearts! ❤️', W / 2, H / 2 + 44);

                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = '14px "Segoe UI", Arial, sans-serif';
                    ctx.fillText('🖱 Desktop: Arrow Keys to move | Auto-shoot', W / 2, H / 2 + 76);
                    ctx.fillText('📱 Mobile: Touch & drag to move | Auto-shoot', W / 2, H / 2 + 96);

                    ctx.fillStyle = '#ffcc00';
                    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
                    const pulse = Math.sin(Date.now() / 600) * 0.3 + 0.7;
                    ctx.fillStyle = `rgba(255,200,60,${pulse})`;
                    ctx.fillText('TAP TO START!', W / 2, H / 2 + 140);
                }
            }

            // ──────────────────────────────────────
            // GAME LOOP
            // ──────────────────────────────────────
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                lastTime = timestamp;

                update(dt);
                draw(ctx);

                requestAnimationFrame(gameLoop);
            }

            // ──────────────────────────────────────
            // INPUT HANDLERS
            // ──────────────────────────────────────
            const keys = {};
            let mouseDown = false;
            let touchActive = false;
            let touchX = 0;

            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                }
                if (e.key === ' ' || e.key === 'Spacebar') {
                    initAudio();
                    if (gameState === STATE.MENU) resetGame();
                    if (gameState === STATE.GAME_OVER) resetGame();
                }
                if ((e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') && gameState === STATE.PLAYING) {
                    player.targetX -= 30;
                }
                if ((e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') && gameState === STATE.PLAYING) {
                    player.targetX += 30;
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            canvas.addEventListener('mousedown', (e) => {
                initAudio();
                mouseDown = true;
                if (gameState === STATE.MENU) resetGame();
                if (gameState === STATE.GAME_OVER) resetGame();
                updateMouseTarget(e);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (mouseDown) updateMouseTarget(e);
            });

            canvas.addEventListener('mouseup', () => { mouseDown = false; });
            canvas.addEventListener('mouseleave', () => { mouseDown = false; });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                touchActive = true;
                if (gameState === STATE.MENU) resetGame();
                if (gameState === STATE.GAME_OVER) resetGame();
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                touchX = (e.touches[0].clientX - rect.left) * scaleX;
                player.targetX = touchX;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (touchActive) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = W / rect.width;
                    touchX = (e.touches[0].clientX - rect.left) * scaleX;
                    player.targetX = touchX;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
            });

            function updateMouseTarget(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const mx = (e.clientX - rect.left) * scaleX;
                player.targetX = mx;
            }

            // Continuous keyboard movement
            function processKeyboardInput() {
                if (gameState !== STATE.PLAYING) return;
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    player.targetX -= player.speed * 0.025;
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    player.targetX += player.speed * 0.025;
                }
                if (keys[' '] || keys['Spacebar']) {
                    if (gameState === STATE.GAME_OVER) resetGame();
                    if (gameState === STATE.MENU) resetGame();
                }
            }

            // Process keyboard every frame via interval
            setInterval(processKeyboardInput, 16);

            // ──────────────────────────────────────
            // INITIAL SETUP
            // ──────────────────────────────────────
            spawnWave(1);
            gameState = STATE.MENU;

            // Draw initial frame
            draw(ctx);

            // Start game loop
            requestAnimationFrame(gameLoop);

            console.log('🎮 Destroy All Milo\'s Girlfriends 4 - Ready!');
            console.log('💡 Click/Tap to start | Arrow keys or touch-drag to move | Auto-shoot enabled');
            console.log('💔 Destroy all the girlfriends! Dodge their hearts!');
        })();
    </script>
</body>
</html>
