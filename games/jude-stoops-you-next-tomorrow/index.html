<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jude Stoops You Next Tomorrow</title>
    <style>
        :root {
            --bg: #0a0a0f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: clamp(18px, 3vw, 28px);
            font-weight: bold;
            text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
            letter-spacing: 2px;
            pointer-events: none;
        }
        #lives-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff4466;
            font-size: clamp(18px, 3vw, 28px);
            font-weight: bold;
            text-shadow: 0 0 15px #ff4466, 0 0 30px #ff4466;
            letter-spacing: 2px;
            pointer-events: none;
        }
        #message-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: clamp(14px, 2.5vw, 22px);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 20px #ffffff, 0 0 40px #ffaa00;
            letter-spacing: 1px;
        }
        #message-display.visible {
            opacity: 1;
        }
        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff3355, #880022);
            border: 3px solid #ff6688;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            pointer-events: all;
            text-shadow: 0 0 10px #fff;
            box-shadow: 0 0 25px #ff3355, 0 0 50px #ff335588, inset 0 0 15px #ff8899;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #shoot-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 40px #ff3355, 0 0 70px #ff3355aa, inset 0 0 25px #ffaabb;
        }
        #shoot-btn.desktop-only {
            display: none;
        }
        @media (hover: hover) and (pointer: fine) {
            #shoot-btn {
                display: none;
            }
        }
        @media (hover: none) and (pointer: coarse) {
            #shoot-btn {
                display: flex;
            }
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #8888aa;
            font-size: clamp(11px, 1.8vw, 15px);
            text-align: center;
            pointer-events: none;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #8888aa44;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="score-display">SCORE: 0</div>
        <div id="lives-display">DAYS LEFT: 3</div>
        <div id="message-display"></div>
        <button id="shoot-btn">FIRE</button>
        <div id="instructions">MOVE MOUSE TO AIM | CLICK TO SHOOT<br>DON'T SHOOT JUDE WHILE STOOPING!</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score-display');
            const livesDisplay = document.getElementById('lives-display');
            const messageDisplay = document.getElementById('message-display');
            const shootBtn = document.getElementById('shoot-btn');
            const instructionsEl = document.getElementById('instructions');

            let W, H, cx, cy;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                cx = W / 2;
                cy = H / 2;
            }
            resize();
            window.addEventListener('resize', resize);

            // Audio system
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, type, duration, vol = 0.15, slide = 0, slideTarget = 0) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (slide) osc.frequency.linearRampToValueAtTime(slideTarget, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {}
            }

            function sfxShoot() { playSound(800, 'square', 0.1, 0.08, -400, 200);
                playSound(150, 'sawtooth', 0.06, 0.05); }

            function sfxHit() { playSound(200, 'sawtooth', 0.25, 0.2, 600, 1200);
                playSound(60, 'triangle', 0.2, 0.3); }

            function sfxStoopPenalty() { playSound(40, 'sine', 0.5, 0.35, -20, 10);
                playSound(300, 'square', 0.2, 0.25, -200, 80); }

            function sfxTimeWarp() { playSound(1000, 'sine', 0.4, 0.25, -800, 100);
                playSound(200, 'triangle', 0.3, 0.4, 100, 600); }

            function sfxGameOver() { playSound(30, 'sawtooth', 0.5, 0.8, -15, 5);
                playSound(400, 'square', 0.15, 0.6, -300, 80); }

            // Game state
            const STATE = {
                PLAYING: 'playing',
                STUNNED: 'stunned',
                GAME_OVER: 'gameOver',
            };

            let gameState = STATE.PLAYING;
            let score = 0;
            let lives = 3;
            let stunTimer = 0;
            let stunDuration = 1.5; // seconds
            let dayTheme = 0; // 0-3, changes on stoop penalty
            let difficulty = 1;
            let judesToSpawn = 1;
            let shootCooldown = 0;
            const SHOOT_COOLDOWN = 0.35; // seconds

            // Color themes for "days"
            const dayThemes = [
                { bg: '#0a0a14', grid: '#1a1a3a', player: '#00ffcc', judeVuln: '#ff8844', judeStoop: '#ff2244',
                    bullet: '#ffff66', name: 'NIGHT' },
                { bg: '#0f0808', grid: '#2a1010', player: '#ff9966', judeVuln: '#cc44ff', judeStoop: '#ff0066',
                    bullet: '#ffcc44', name: 'TOMORROW' },
                { bg: '#050f08', grid: '#0a2a15', player: '#66ff88', judeVuln: '#ff6644', judeStoop: '#ff0044',
                    bullet: '#aaff44', name: 'NEXT DAY' },
                { bg: '#0a0a0a', grid: '#1a1a1a', player: '#cccccc', judeVuln: '#888888', judeStoop: '#444444',
                    bullet: '#ffffff', name: 'THE END' },
            ];

            function getTheme() { return dayThemes[Math.min(dayTheme, 3)]; }

            // Input
            let mouseX = cx;
            let mouseY = cy;
            let mouseDown = false;
            let touchActive = false;
            let touchX = cx;
            let touchY = cy;

            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (!touchActive) {
                    touchX = mouseX;
                    touchY = mouseY;
                }
            });
            canvas.addEventListener('mousedown', (e) => {
                initAudio();
                mouseDown = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
                touchX = mouseX;
                touchY = mouseY;
                tryShoot();
            });
            canvas.addEventListener('mouseup', () => { mouseDown = false; });
            canvas.addEventListener('mouseleave', () => { mouseDown = false; });

            canvas.addEventListener('touchstart', (e) => {
                initAudio();
                e.preventDefault();
                touchActive = true;
                if (e.touches.length > 0) {
                    touchX = e.touches[0].clientX;
                    touchY = e.touches[0].clientY;
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    touchX = e.touches[0].clientX;
                    touchY = e.touches[0].clientY;
                }
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
            }, { passive: false });

            shootBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                initAudio();
                tryShoot();
            });
            shootBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                initAudio();
                tryShoot();
            });

            function getAimX() { return touchActive ? touchX : mouseX; }

            function getAimY() { return touchActive ? touchY : mouseY; }

            function tryShoot() {
                if (gameState === STATE.GAME_OVER) {
                    restartGame();
                    return;
                }
                if (gameState === STATE.STUNNED) return;
                if (shootCooldown > 0) return;
                shootCooldown = SHOOT_COOLDOWN;
                const aimX = getAimX();
                const aimY = getAimY();
                const dx = aimX - cx;
                const dy = aimY - cy;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const dirX = dx / dist;
                const dirY = dy / dist;
                bullets.push(new Bullet(cx + dirX * 30, cy + dirY * 30, dirX, dirY));
                sfxShoot();
            }

            // Game objects
            class Bullet {
                constructor(x, y, dx, dy) {
                    this.x = x;
                    this.y = y;
                    this.dx = dx;
                    this.dy = dy;
                    this.speed = 700;
                    this.radius = 4;
                    this.alive = true;
                    this.trail = [];
                }
                update(dt) {
                    this.trail.push({ x: this.x, y: this.y, life: 0.12 });
                    this.x += this.dx * this.speed * dt;
                    this.y += this.dy * this.speed * dt;
                    for (let i = this.trail.length - 1; i >= 0; i--) {
                        this.trail[i].life -= dt;
                        if (this.trail[i].life <= 0) this.trail.splice(i, 1);
                    }
                    if (this.x < -50 || this.x > W + 50 || this.y < -50 || this.y > H + 50) {
                        this.alive = false;
                    }
                }
                draw(ctx) {
                    const theme = getTheme();
                    for (const t of this.trail) {
                        const alpha = t.life / 0.12;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, this.radius * 0.7, 0, Math.PI * 2);
                        ctx.fillStyle = theme.bullet.replace(')', `,${alpha * 0.6})`).replace('rgb',
                            'rgba').replace('#', 'rgba(');
                        if (theme.bullet.startsWith('#')) {
                            const r = parseInt(theme.bullet.slice(1, 3), 16);
                            const g = parseInt(theme.bullet.slice(3, 5), 16);
                            const b = parseInt(theme.bullet.slice(5, 7), 16);
                            ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.6})`;
                        }
                        ctx.fill();
                    }
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = theme.bullet;
                    ctx.fill();
                    ctx.shadowColor = theme.bullet;
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            class Jude {
                constructor() {
                    this.reset();
                }
                reset() {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.min(W, H) * 0.35 + Math.random() * Math.min(W, H) * 0.2;
                    this.x = cx + Math.cos(angle) * dist;
                    this.y = cy + Math.sin(angle) * dist;
                    this.x = Math.max(60, Math.min(W - 60, this.x));
                    this.y = Math.max(60, Math.min(H - 60, this.y));
                    this.targetX = this.x;
                    this.targetY = this.y;
                    this.speed = 80 + Math.random() * 120 + difficulty * 25;
                    this.stoopState = 'standing'; // 'standing' | 'warning' | 'stooping' | 'rising'
                    this.stateTimer = 1 + Math.random() * 2;
                    this.stoopDuration = 0.7 + Math.random() * 1.0;
                    this.warningDuration = 0.25;
                    this.riseDuration = 0.2;
                    this.radius = 22;
                    this.bobOffset = 0;
                    this.bobSpeed = 2 + Math.random() * 3;
                    this.alive = true;
                    this.eyeGlow = 0;
                }
                update(dt) {
                    this.bobOffset = Math.sin(performance.now() * 0.001 * this.bobSpeed) * 4;
                    this.eyeGlow = 0.6 + Math.sin(performance.now() * 0.005) * 0.4;

                    // State machine
                    this.stateTimer -= dt;
                    if (this.stoopState === 'standing' && this.stateTimer <= 0) {
                        this.stoopState = 'warning';
                        this.stateTimer = this.warningDuration;
                    } else if (this.stoopState === 'warning' && this.stateTimer <= 0) {
                        this.stoopState = 'stooping';
                        this.stateTimer = this.stoopDuration;
                    } else if (this.stoopState === 'stooping' && this.stateTimer <= 0) {
                        this.stoopState = 'rising';
                        this.stateTimer = this.riseDuration;
                    } else if (this.stoopState === 'rising' && this.stateTimer <= 0) {
                        this.stoopState = 'standing';
                        this.stateTimer = 1.0 + Math.random() * 2.5 - difficulty * 0.15;
                        this.stateTimer = Math.max(0.4, this.stateTimer);
                    }

                    // Movement
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 10) {
                        this.targetX = 60 + Math.random() * (W - 120);
                        this.targetY = 60 + Math.random() * (H - 120);
                        // Don't get too close to player
                        const pdx = this.targetX - cx;
                        const pdy = this.targetY - cy;
                        const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                        if (pdist < 150) {
                            const ang = Math.atan2(pdy, pdx);
                            this.targetX = cx + Math.cos(ang) * 180;
                            this.targetY = cy + Math.sin(ang) * 180;
                            this.targetX = Math.max(60, Math.min(W - 60, this.targetX));
                            this.targetY = Math.max(60, Math.min(H - 60, this.targetY));
                        }
                    }
                    const moveSpeed = this.stoopState === 'stooping' ? this.speed * 0.2 : this.speed;
                    if (dist > 1) {
                        this.x += (dx / dist) * moveSpeed * dt;
                        this.y += (dy / dist) * moveSpeed * dt;
                    }
                }
                draw(ctx) {
                    const theme = getTheme();
                    const isStoop = this.stoopState === 'stooping';
                    const isWarning = this.stoopState === 'warning';
                    const bodyColor = isStoop ? theme.judeStoop : (isWarning ? '#ffaa00' : theme.judeVuln);
                    const bodyY = this.y + this.bobOffset;
                    const stoopScale = isStoop ? 0.55 : (this.stoopState === 'rising' ? 0.75 : 1.0);
                    const stoopYOffset = (1 - stoopScale) * 25;

                    ctx.save();
                    ctx.translate(this.x, bodyY + stoopYOffset);
                    ctx.scale(1, stoopScale);

                    // Shadow/glow
                    ctx.shadowColor = bodyColor;
                    ctx.shadowBlur = isStoop ? 30 : (isWarning ? 20 : 12);

                    // Body (cloak)
                    ctx.beginPath();
                    ctx.moveTo(-15, 20);
                    ctx.lineTo(-18, -5);
                    ctx.quadraticCurveTo(-20, -25, 0, -28);
                    ctx.quadraticCurveTo(20, -25, 18, -5);
                    ctx.lineTo(15, 20);
                    ctx.closePath();
                    const bodyGrad = ctx.createLinearGradient(0, -28, 0, 20);
                    bodyGrad.addColorStop(0, bodyColor);
                    bodyGrad.addColorStop(0.6, '#111122');
                    bodyGrad.addColorStop(1, '#0a0a15');
                    ctx.fillStyle = bodyGrad;
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Hood outline
                    ctx.strokeStyle = bodyColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Eyes
                    const eyeY = -16;
                    const eyeSpacing = 7;
                    const eyeGlowAlpha = this.eyeGlow;
                    for (let ex = -eyeSpacing; ex <= eyeSpacing; ex += eyeSpacing * 2) {
                        ctx.beginPath();
                        ctx.arc(ex, eyeY, 4, 0, Math.PI * 2);
                        const eyeGrad = ctx.createRadialGradient(ex, eyeY, 1, ex, eyeY, 5);
                        eyeGrad.addColorStop(0, '#ffffff');
                        eyeGrad.addColorStop(0.4, bodyColor);
                        eyeGrad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = eyeGrad;
                        ctx.fill();
                        ctx.shadowColor = bodyColor;
                        ctx.shadowBlur = 10 * eyeGlowAlpha;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }

                    // Stoop shield effect
                    if (isStoop) {
                        ctx.beginPath();
                        ctx.arc(0, -5, 28, 0, Math.PI * 2);
                        ctx.strokeStyle = theme.judeStoop;
                        ctx.lineWidth = 3;
                        ctx.setLineDash([8, 4]);
                        ctx.shadowColor = theme.judeStoop;
                        ctx.shadowBlur = 25;
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.shadowBlur = 0;

                        // Inner shield glow
                        const shieldGrad = ctx.createRadialGradient(0, -5, 18, 0, -5, 30);
                        shieldGrad.addColorStop(0, 'rgba(255,30,60,0)');
                        shieldGrad.addColorStop(0.7, 'rgba(255,30,60,0.25)');
                        shieldGrad.addColorStop(1, 'rgba(255,30,60,0)');
                        ctx.fillStyle = shieldGrad;
                        ctx.fill();
                    }

                    // Warning flash
                    if (isWarning) {
                        const flashAlpha = 0.4 + Math.sin(performance.now() * 0.03) * 0.3;
                        ctx.beginPath();
                        ctx.arc(0, -5, 26, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255,170,0,${flashAlpha})`;
                        ctx.lineWidth = 2;
                        ctx.setLineDash([3, 6]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }

                    ctx.restore();
                }
                getHitRadius() { return this.radius; }
                isVulnerable() {
                    return this.stoopState === 'standing' || this.stoopState === 'warning' || this.stoopState ===
                        'rising';
                }
                isStooping() { return this.stoopState === 'stooping'; }
            }

            class Particle {
                constructor(x, y, color, life, speed, size) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.life = life;
                    this.maxLife = life;
                    this.speed = speed;
                    this.size = size;
                    const angle = Math.random() * Math.PI * 2;
                    this.dx = Math.cos(angle) * speed;
                    this.dy = Math.sin(angle) * speed;
                    this.alive = true;
                }
                update(dt) {
                    this.life -= dt;
                    this.x += this.dx * dt;
                    this.y += this.dy * dt;
                    this.dx *= 0.96;
                    this.dy *= 0.96;
                    if (this.life <= 0) this.alive = false;
                }
                draw(ctx) {
                    const alpha = this.life / this.maxLife;
                    const r = parseInt(this.color.slice(1, 3), 16) || 255;
                    const g = parseInt(this.color.slice(3, 5), 16) || 100;
                    const b = parseInt(this.color.slice(5, 7), 16) || 50;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    ctx.fill();
                    ctx.shadowColor = `rgba(${r},${g},${b},${alpha})`;
                    ctx.shadowBlur = 6 * alpha;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            let bullets = [];
            let judes = [];
            let particles = [];
            let screenShake = 0;
            let flashAlpha = 0;
            let messageText = '';
            let messageTimer = 0;

            function spawnJudes(count) {
                for (let i = 0; i < count; i++) {
                    judes.push(new Jude());
                }
            }

            function spawnParticles(x, y, color, count, lifeRange, speedRange, sizeRange) {
                for (let i = 0; i < count; i++) {
                    const life = lifeRange[0] + Math.random() * (lifeRange[1] - lifeRange[0]);
                    const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
                    const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
                    particles.push(new Particle(x, y, color, life, speed, size));
                }
            }

            function showMessage(text, duration = 1.5) {
                messageText = text;
                messageTimer = duration;
                messageDisplay.textContent = text;
                messageDisplay.classList.add('visible');
            }

            function hideMessage() {
                messageDisplay.classList.remove('visible');
                messageText = '';
                messageTimer = 0;
            }

            function applyStoopPenalty() {
                if (gameState === STATE.GAME_OVER) return;
                lives--;
                dayTheme = Math.min(3, dayTheme + 1);
                screenShake = 0.6;
                flashAlpha = 0.9;
                gameState = STATE.STUNNED;
                stunTimer = stunDuration;
                sfxStoopPenalty();
                sfxTimeWarp();
                const theme = getTheme();
                showMessage('JUDE STOOPS YOU!\nNEXT ' + theme.name + '...', 2.0);
                spawnParticles(cx, cy, '#ff2244', 60, [0.3, 1.2], [100, 400], [2, 8]);
                livesDisplay.textContent = 'DAYS LEFT: ' + lives;
                if (lives <= 0) {
                    setTimeout(() => {
                        gameState = STATE.GAME_OVER;
                        sfxGameOver();
                        showMessage('GAME OVER\nSCORE: ' + score + '\nTAP OR CLICK TO RESTART', 99);
                        instructionsEl.textContent = 'CLICK OR TAP TO PLAY AGAIN';
                    }, 1800);
                }
            }

            function hitJude(jude) {
                if (jude.isStooping()) {
                    // Penalty!
                    applyStoopPenalty();
                    jude.reset();
                    // Move jude away
                    const ang = Math.random() * Math.PI * 2;
                    jude.x = cx + Math.cos(ang) * 250;
                    jude.y = cy + Math.sin(ang) * 250;
                    jude.targetX = jude.x;
                    jude.targetY = jude.y;
                } else if (jude.isVulnerable()) {
                    // Success!
                    score += 100;
                    sfxHit();
                    spawnParticles(jude.x, jude.y, '#ffaa00', 40, [0.2, 0.8], [80, 300], [1.5, 5]);
                    spawnParticles(jude.x, jude.y, '#ffff88', 20, [0.1, 0.5], [50, 200], [1, 3]);
                    screenShake = 0.15;
                    flashAlpha = 0.2;
                    scoreDisplay.textContent = 'SCORE: ' + score;
                    jude.alive = false;
                    difficulty = Math.floor(score / 300) + 1;
                    judesToSpawn = Math.min(5, 1 + Math.floor(score / 400));
                }
            }

            function restartGame() {
                score = 0;
                lives = 3;
                dayTheme = 0;
                difficulty = 1;
                judesToSpawn = 1;
                stunTimer = 0;
                shootCooldown = 0;
                gameState = STATE.PLAYING;
                bullets = [];
                judes = [];
                particles = [];
                screenShake = 0;
                flashAlpha = 0;
                hideMessage();
                scoreDisplay.textContent = 'SCORE: 0';
                livesDisplay.textContent = 'DAYS LEFT: 3';
                instructionsEl.textContent = 'MOVE MOUSE TO AIM | CLICK TO SHOOT\nDON\'T SHOOT JUDE WHILE STOOPING!';
                spawnJudes(judesToSpawn);
            }

            // Initialize
            spawnJudes(judesToSpawn);

            // Game loop
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;
                if (dt > 0.2) dt = 0.2; // Cap to prevent jumps
                if (dt <= 0) dt = 0.016;

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            function update(dt) {
                // Update shoot cooldown
                if (shootCooldown > 0) shootCooldown -= dt;

                // Update stun
                if (gameState === STATE.STUNNED) {
                    stunTimer -= dt;
                    if (stunTimer <= 0 && lives > 0) {
                        gameState = STATE.PLAYING;
                        hideMessage();
                    }
                }

                // Update screen shake
                if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 1.5);
                if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 2.5);

                // Update message timer
                if (messageTimer > 0 && gameState !== STATE.GAME_OVER) {
                    messageTimer -= dt;
                    if (messageTimer <= 0) hideMessage();
                }

                // Update bullets
                for (const bullet of bullets) bullet.update(dt);
                bullets = bullets.filter(b => b.alive);

                // Update judes
                for (const jude of judes) jude.update(dt);

                // Check bullet-jude collisions
                if (gameState === STATE.PLAYING || gameState === STATE.STUNNED) {
                    for (const bullet of bullets) {
                        if (!bullet.alive) continue;
                        for (const jude of judes) {
                            if (!jude.alive) continue;
                            const dx = bullet.x - jude.x;
                            const dy = bullet.y - (jude.y + jude.bobOffset);
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const hitRadius = jude.getHitRadius() + bullet.radius;
                            if (dist < hitRadius) {
                                bullet.alive = false;
                                if (gameState === STATE.PLAYING) {
                                    hitJude(jude);
                                }
                                break;
                            }
                        }
                    }
                }

                // Remove dead judes and respawn
                const deadCount = judes.filter(j => !j.alive).length;
                judes = judes.filter(j => j.alive);
                const currentJudes = judes.length;
                const targetJudes = Math.max(judesToSpawn, currentJudes);
                if (currentJudes < targetJudes) {
                    spawnJudes(targetJudes - currentJudes);
                }

                // Update particles
                for (const p of particles) p.update(dt);
                particles = particles.filter(p => p.alive);

                // Update instructions visibility
                if (gameState === STATE.GAME_OVER) {
                    instructionsEl.style.opacity = '0.7';
                } else {
                    instructionsEl.style.opacity = '1';
                }
            }

            function render() {
                const theme = getTheme();
                ctx.clearRect(0, 0, W, H);

                // Background
                ctx.fillStyle = theme.bg;
                ctx.fillRect(0, 0, W, H);

                // Grid
                const gridSize = 50;
                ctx.strokeStyle = theme.grid;
                ctx.lineWidth = 0.5;
                ctx.globalAlpha = 0.4;
                for (let x = gridSize; x < W; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                    ctx.stroke();
                }
                for (let y = gridSize; y < H; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;

                // Subtle radial glow at center
                const centerGlow = ctx.createRadialGradient(cx, cy, 50, cx, cy, Math.max(W, H) * 0.7);
                centerGlow.addColorStop(0, 'rgba(0,255,200,0.04)');
                centerGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = centerGlow;
                ctx.fillRect(0, 0, W, H);

                // Apply screen shake
                let shakeX = 0,
                    shakeY = 0;
                if (screenShake > 0) {
                    shakeX = (Math.random() - 0.5) * screenShake * 30;
                    shakeY = (Math.random() - 0.5) * screenShake * 30;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Draw judes
                for (const jude of judes) {
                    if (jude.alive) jude.draw(ctx);
                }

                // Draw bullets
                for (const bullet of bullets) {
                    if (bullet.alive) bullet.draw(ctx);
                }

                // Draw particles
                for (const p of particles) {
                    if (p.alive) p.draw(ctx);
                }

                // Draw player
                const aimX = getAimX();
                const aimY = getAimY();
                const pdx = aimX - cx;
                const pdy = aimY - cy;
                const angle = Math.atan2(pdy, pdx);
                const playerColor = theme.player;
                const isStunned = gameState === STATE.STUNNED;

                // Player body
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle);

                // Body glow
                ctx.shadowColor = playerColor;
                ctx.shadowBlur = 20;

                // Body
                const bodyGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 18);
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.3, playerColor);
                bodyGrad.addColorStop(1, '#0a0a18');
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fillStyle = bodyGrad;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Gun barrel
                ctx.fillStyle = '#ccccdd';
                ctx.fillRect(8, -3, 22, 6);
                ctx.fillStyle = '#888899';
                ctx.fillRect(26, -2, 6, 4);
                ctx.strokeStyle = playerColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(8, -3, 22, 6);
                ctx.shadowColor = playerColor;
                ctx.shadowBlur = 8;
                ctx.strokeRect(8, -3, 22, 6);
                ctx.shadowBlur = 0;

                // Gun tip glow
                ctx.beginPath();
                ctx.arc(30, 0, 4, 0, Math.PI * 2);
                ctx.fillStyle = playerColor;
                ctx.fill();
                ctx.shadowColor = playerColor;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Stunned indicator
                if (isStunned) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 25, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ff4466';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 4]);
                    ctx.shadowColor = '#ff4466';
                    ctx.shadowBlur = 20;
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.shadowBlur = 0;
                }

                ctx.restore();

                // Crosshair at aim point
                const chX = aimX;
                const chY = aimY;
                const chSize = 10;
                ctx.strokeStyle = playerColor;
                ctx.lineWidth = 2;
                ctx.shadowColor = playerColor;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(chX, chY, chSize, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(chX - chSize - 5, chY);
                ctx.lineTo(chX - 3, chY);
                ctx.moveTo(chX + 3, chY);
                ctx.lineTo(chX + chSize + 5, chY);
                ctx.moveTo(chX, chY - chSize - 5);
                ctx.lineTo(chX, chY - 3);
                ctx.moveTo(chX, chY + 3);
                ctx.lineTo(chX, chY + chSize + 5);
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.restore();

                // Flash overlay
                if (flashAlpha > 0) {
                    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
                    ctx.fillRect(0, 0, W, H);
                }

                // Vignette
                const vignetteGrad = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.45, cx, cy, Math.max(W, H) * 0.75);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, W, H);

                // Game over overlay
                if (gameState === STATE.GAME_OVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${Math.min(48, W/8)}px 'Courier New', monospace`;
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#ff4466';
                    ctx.shadowBlur = 30;
                    ctx.fillText('GAME OVER', cx, cy - 40);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffcc88';
                    ctx.font = `${Math.min(24, W/14)}px 'Courier New', monospace`;
                    ctx.fillText('SCORE: ' + score, cx, cy + 10);
                    ctx.fillStyle = '#aaaacc';
                    ctx.font = `${Math.min(18, W/18)}px 'Courier New', monospace`;
                    ctx.fillText('TAP OR CLICK TO RESTART', cx, cy + 50);
                    ctx.textAlign = 'start';
                }
            }

            // Update shoot button visibility based on device
            function updateShootButton() {
                const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                if (isMobile) {
                    shootBtn.style.display = 'flex';
                } else {
                    shootBtn.style.display = 'none';
                }
            }
            updateShootButton();
            window.addEventListener('resize', updateShootButton);

            // Handle click on canvas for restart
            canvas.addEventListener('click', (e) => {
                if (gameState === STATE.GAME_OVER) {
                    initAudio();
                    restartGame();
                }
            });
            canvas.addEventListener('touchstart', (e) => {
                if (gameState === STATE.GAME_OVER && e.target === canvas) {
                    initAudio();
                    restartGame();
                }
            });

            // Start game loop
            requestAnimationFrame(gameLoop);

            console.log('🔫 Jude Stoops You Next Tomorrow - Ready');
            console.log('  Shoot Jude when vulnerable (standing)');
            console.log('  DON\'T shoot when stooping (shield up)!');
            console.log('  Each stoop penalty sends you to NEXT TOMORROW');
            console.log('  3 days left... make them count.');
        })();
    </script>
</body>
</html>
