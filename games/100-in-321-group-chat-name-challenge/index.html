<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>100 IN 321 - Group Chat Name Challenge</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #141420;
            --primary: #00e5a0;
            --primary-glow: #00ffb8;
            --secondary: #ff5e8c;
            --text: #e0e0e0;
            --text-dim: #8888a0;
            --slot-empty: #1e1e30;
            --slot-border: #2a2a44;
            --slot-filled: #00e5a0;
            --slot-filled-glow: #00ffb8;
            --timer-warn: #ffb347;
            --timer-danger: #ff5e5e;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 2;
        }

        #title-area {
            text-align: center;
        }

        #game-title {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary-glow), #00c8ff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 18px rgba(0, 229, 160, 0.5));
            margin: 0;
            line-height: 1.2;
        }

        #game-subtitle {
            font-size: clamp(0.7rem, 1.8vw, 0.85rem);
            color: var(--text-dim);
            letter-spacing: 1px;
            font-weight: 500;
            margin-top: 2px;
        }

        #phone-mockup {
            background: var(--surface);
            border-radius: 28px;
            padding: 18px 16px 14px;
            width: 100%;
            max-width: 400px;
            box-shadow:
                0 0 0 3px #1a1a2e,
                0 0 0 6px #111122,
                0 0 0 9px #0d0d1a,
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(0, 229, 160, 0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #phone-notch {
            width: 50%;
            max-width: 140px;
            height: 6px;
            background: #1a1a30;
            border-radius: 0 0 10px 10px;
            margin: -6px auto 6px;
        }

        #chat-header {
            width: 100%;
            background: linear-gradient(180deg, #1a1a35 0%, #16162a 100%);
            border-radius: 16px;
            padding: 12px 14px;
            text-align: center;
            border: 1px solid #222240;
            position: relative;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #chat-name-display {
            font-size: clamp(0.85rem, 2vw, 1rem);
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-all;
            line-height: 1.3;
            transition: all 0.1s ease;
            max-width: 100%;
            text-align: center;
            min-height: 1.2em;
        }

        #chat-name-display.placeholder {
            color: #555570;
            font-style: italic;
            font-weight: 400;
        }

        #char-counter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 1px;
        }
        #char-count {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
            transition: color 0.3s;
        }
        #char-count.near-full {
            color: var(--gold);
            animation: pulse-count 0.5s ease-in-out infinite;
        }
        #char-count.full {
            color: var(--primary-glow);
            animation: pulse-full 0.3s ease-in-out infinite;
        }
        @keyframes pulse-count {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        @keyframes pulse-full {
            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.15);
                filter: brightness(1.6);
            }
        }

        #timer-display {
            font-size: clamp(1.6rem, 4.5vw, 2.4rem);
            font-weight: 900;
            letter-spacing: 2px;
            color: #ffffff;
            transition: color 0.4s;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        #timer-display.warning {
            color: var(--timer-warn);
            text-shadow: 0 0 30px rgba(255, 179, 71, 0.6);
            animation: timer-shake 0.3s ease-in-out infinite;
        }
        #timer-display.danger {
            color: var(--timer-danger);
            text-shadow: 0 0 30px rgba(255, 94, 94, 0.7);
            animation: timer-shake 0.15s ease-in-out infinite;
        }
        @keyframes timer-shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-3px);
            }
            75% {
                transform: translateX(3px);
            }
        }

        #slots-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 3px;
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1;
            padding: 6px;
            background: #0d0d1c;
            border-radius: 16px;
            border: 1px solid #1a1a30;
        }

        .slot-dot {
            aspect-ratio: 1;
            border-radius: 50%;
            background: var(--slot-empty);
            border: 2px solid var(--slot-border);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            cursor: default;
        }
        .slot-dot.filled {
            background: var(--slot-filled);
            border-color: var(--slot-filled-glow);
            box-shadow:
                0 0 8px rgba(0, 229, 160, 0.7),
                0 0 20px rgba(0, 229, 160, 0.35),
                inset 0 0 6px rgba(255, 255, 255, 0.3);
            animation: slot-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .slot-dot.just-filled {
            animation: slot-burst 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slot-pop {
            0% {
                transform: scale(0.3);
                background: #ffffff;
                box-shadow: 0 0 30px #ffffff;
            }
            60% {
                transform: scale(1.4);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes slot-burst {
            0% {
                transform: scale(0.2);
                background: #ffffff;
                box-shadow: 0 0 40px #ffffff, 0 0 80px #ffffff;
            }
            50% {
                transform: scale(1.5);
                background: var(--primary-glow);
                box-shadow: 0 0 20px rgba(0, 229, 160, 0.9), 0 0 50px rgba(0, 229, 160, 0.5);
            }
            100% {
                transform: scale(1);
                background: var(--slot-filled);
                box-shadow: 0 0 8px rgba(0, 229, 160, 0.7), 0 0 20px rgba(0, 229, 160, 0.35), inset 0 0 6px rgba(255, 255, 255, 0.3);
            }
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        #overlay-content {
            background: var(--surface);
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 100px rgba(0, 229, 160, 0.15);
            border: 2px solid #222240;
            max-width: 380px;
            width: 90%;
        }
        #overlay-content h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        #overlay-content .result-score {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary-glow);
            text-shadow: 0 0 40px rgba(0, 229, 160, 0.6);
            margin: 8px 0;
        }
        #overlay-content .result-detail {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin: 4px 0;
            letter-spacing: 0.5px;
        }
        #overlay-content button {
            margin-top: 16px;
            padding: 14px 36px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), #00c8a0);
            color: #000;
            box-shadow: 0 8px 30px rgba(0, 229, 160, 0.4);
            transition: all 0.2s;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        #overlay-content button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 229, 160, 0.6);
        }
        #overlay-content button:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }

        #countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
        }
        #countdown-overlay.active {
            opacity: 1;
        }
        #countdown-number {
            font-size: clamp(5rem, 16vw, 10rem);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.8), 0 0 120px rgba(0, 229, 160, 0.6);
            animation: countdown-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 2px;
        }
        @keyframes countdown-pop {
            0% {
                transform: scale(2.5);
                opacity: 0;
            }
            30% {
                transform: scale(0.9);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
        }

        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-fly 0.7s ease-out forwards;
        }
        @keyframes particle-fly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        #hidden-input {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 36px;
            opacity: 0.01;
            font-size: 16px;
            z-index: 1;
            border: none;
            outline: none;
            background: transparent;
            color: transparent;
            caret-color: transparent;
            -webkit-user-select: text;
            user-select: text;
            pointer-events: auto;
        }

        #tap-hint {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #555570;
            letter-spacing: 1px;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
        }

        @media (max-width: 380px) {
            #slots-grid {
                max-width: 280px;
                gap: 2px;
                padding: 4px;
                border-radius: 12px;
            }
            .slot-dot {
                border-width: 1.5px;
            }
            #phone-mockup {
                padding: 12px 10px 10px;
                border-radius: 22px;
            }
            #chat-header {
                padding: 10px 12px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="title-area">
            <h1 id="game-title">100 IN 321</h1>
            <p id="game-subtitle">THE LONGEST GROUP CHAT NAME</p>
        </div>

        <div id="phone-mockup">
            <div id="phone-notch"></div>
            <div id="chat-header">
                <span id="chat-name-display" class="placeholder">Group Chat Name</span>
            </div>
            <div id="char-counter-row">
                <span id="char-count">0</span><span>/ 100</span>
            </div>
            <div id="timer-display">32.1</div>
            <div id="slots-grid"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-content">
            <h2 id="overlay-title">🏆 READY?</h2>
            <p id="overlay-msg" style="color:#aaa;margin:6px 0;">Type 100 characters in 32.1 seconds!<br>Click START when ready.</p>
            <div id="overlay-score" class="result-score" style="display:none;"></div>
            <div id="overlay-detail" class="result-detail" style="display:none;"></div>
            <button id="overlay-btn">START</button>
        </div>
    </div>

    <div id="countdown-overlay">
        <span id="countdown-number"></span>
    </div>

    <div id="particles-container"></div>

    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="100">

    <div id="tap-hint"></div>

    <script>
        (function() {
            // DOM elements
            const slotsGrid = document.getElementById('slots-grid');
            const chatNameDisplay = document.getElementById('chat-name-display');
            const charCountEl = document.getElementById('char-count');
            const timerDisplay = document.getElementById('timer-display');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlay-title');
            const overlayMsg = document.getElementById('overlay-msg');
            const overlayScore = document.getElementById('overlay-score');
            const overlayDetail = document.getElementById('overlay-detail');
            const overlayBtn = document.getElementById('overlay-btn');
            const countdownOverlay = document.getElementById('countdown-overlay');
            const countdownNumber = document.getElementById('countdown-number');
            const particlesContainer = document.getElementById('particles-container');
            const hiddenInput = document.getElementById('hidden-input');
            const tapHint = document.getElementById('tap-hint');

            // Audio context
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playSound(freq, duration, type = 'sine', vol = 0.08, decay = true) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    if (decay) {
                        gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    } else {
                        gain.gain.setValueAtTime(vol, t);
                        gain.gain.setValueAtTime(0, t + duration);
                    }
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {
                    // Silently fail
                }
            }

            function playTypingSound() {
                playSound(800 + Math.random() * 400, 0.06, 'sine', 0.05);
                playSound(200 + Math.random() * 100, 0.04, 'triangle', 0.03);
            }

            function playCountdownBeep(num) {
                if (num === 'GO!') {
                    playSound(1200, 0.3, 'sine', 0.12, false);
                    playSound(1600, 0.25, 'sine', 0.08, false);
                } else {
                    playSound(600, 0.25, 'square', 0.07);
                }
            }

            function playVictorySound() {
                const notes = [523, 659, 784, 1047, 784, 1047];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        playSound(freq, 0.2, 'sine', 0.1, false);
                    }, i * 100);
                });
            }

            function playGameOverSound() {
                playSound(200, 0.5, 'sawtooth', 0.06);
                setTimeout(() => playSound(150, 0.5, 'sawtooth', 0.05), 200);
                setTimeout(() => playSound(100, 0.6, 'triangle', 0.04), 400);
            }

            function playTickSound() {
                playSound(1000, 0.03, 'sine', 0.04);
            }

            // Game state
            const TOTAL_SLOTS = 100;
            const GAME_DURATION = 32.1; // seconds
            let gameState = 'idle'; // idle | countdown | playing | victory | gameover
            let currentName = '';
            let timerRemaining = GAME_DURATION;
            let timerInterval = null;
            let animFrameId = null;
            let gameStartTime = 0;
            let lastSecondTick = 0;

            // Build slot dots
            const slotDots = [];
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                const dot = document.createElement('div');
                dot.className = 'slot-dot';
                dot.dataset.index = i;
                slotsGrid.appendChild(dot);
                slotDots.push(dot);
            }

            function updateDisplay() {
                const len = currentName.length;
                // Update chat name display
                if (len === 0) {
                    chatNameDisplay.textContent = 'Group Chat Name';
                    chatNameDisplay.classList.add('placeholder');
                } else {
                    chatNameDisplay.textContent = currentName;
                    chatNameDisplay.classList.remove('placeholder');
                }
                // Update counter
                charCountEl.textContent = len;
                charCountEl.classList.remove('near-full', 'full');
                if (len >= 90 && len < TOTAL_SLOTS) {
                    charCountEl.classList.add('near-full');
                } else if (len >= TOTAL_SLOTS) {
                    charCountEl.classList.add('full');
                }
                // Update slots
                for (let i = 0; i < TOTAL_SLOTS; i++) {
                    if (i < len) {
                        if (!slotDots[i].classList.contains('filled')) {
                            slotDots[i].classList.add('filled', 'just-filled');
                            setTimeout(() => {
                                slotDots[i].classList.remove('just-filled');
                            }, 450);
                        }
                    } else {
                        slotDots[i].classList.remove('filled', 'just-filled');
                    }
                }
                // Update timer display
                updateTimerDisplay();
            }

            function updateTimerDisplay() {
                const display = timerRemaining.toFixed(1);
                timerDisplay.textContent = display;
                timerDisplay.classList.remove('warning', 'danger');
                if (timerRemaining <= 5 && timerRemaining > 2) {
                    timerDisplay.classList.add('warning');
                } else if (timerRemaining <= 2) {
                    timerDisplay.classList.add('danger');
                }
            }

            function spawnParticles(x, y, count = 10) {
                const colors = ['#00e5a0', '#00ffb8', '#00c8ff', '#ffffff', '#7effd4', '#ffd700'];
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = 2 + Math.random() * 5;
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 15 + Math.random() * 50;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance;
                    particle.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                left: ${x}px;
                top: ${y}px;
                --dx: ${dx}px;
                --dy: ${dy}px;
                box-shadow: 0 0 ${size*3}px currentColor;
              `;
                    particlesContainer.appendChild(particle);
                    setTimeout(() => {
                        if (particle.parentNode) particle.parentNode.removeChild(particle);
                    }, 750);
                }
            }

            function spawnParticleAtSlot(index) {
                if (index < 0 || index >= TOTAL_SLOTS) return;
                const dot = slotDots[index];
                const rect = dot.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnParticles(cx, cy, 14);
            }

            function resetGame() {
                currentName = '';
                timerRemaining = GAME_DURATION;
                gameState = 'idle';
                if (timerInterval) clearInterval(timerInterval);
                if (animFrameId) cancelAnimationFrame(animFrameId);
                timerInterval = null;
                animFrameId = null;
                hiddenInput.value = '';
                hiddenInput.blur();
                updateDisplay();
                timerDisplay.textContent = GAME_DURATION.toFixed(1);
                timerDisplay.classList.remove('warning', 'danger');
                charCountEl.classList.remove('near-full', 'full');
                updateDisplay();
                overlay.classList.add('active');
                overlayTitle.textContent = '🏆 READY?';
                overlayMsg.style.display = '';
                overlayMsg.textContent = 'Type 100 characters in 32.1 seconds!\nClick START when ready.';
                overlayScore.style.display = 'none';
                overlayDetail.style.display = 'none';
                overlayBtn.textContent = 'START';
                overlayBtn.style.display = '';
                countdownOverlay.classList.remove('active');
                tapHint.textContent = '';
                document.body.style.cursor = 'default';
            }

            function startCountdown() {
                initAudio();
                gameState = 'countdown';
                overlay.classList.remove('active');
                hiddenInput.value = '';
                currentName = '';
                updateDisplay();
                hiddenInput.focus();
                tapHint.textContent = 'Get ready...';

                const countdownSteps = ['3', '2', '1', 'GO!'];
                let step = 0;

                function showStep() {
                    if (step >= countdownSteps.length) {
                        // Countdown complete, start game
                        countdownOverlay.classList.remove('active');
                        startPlaying();
                        return;
                    }
                    countdownOverlay.classList.add('active');
                    countdownNumber.textContent = countdownSteps[step];
                    countdownNumber.style.animation = 'none';
                    void countdownNumber.offsetWidth;
                    countdownNumber.style.animation = 'countdown-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    playCountdownBeep(countdownSteps[step]);
                    step++;
                    setTimeout(showStep, 750);
                }
                showStep();
            }

            function startPlaying() {
                gameState = 'playing';
                currentName = '';
                timerRemaining = GAME_DURATION;
                gameStartTime = performance.now();
                lastSecondTick = Math.floor(timerRemaining);
                hiddenInput.value = '';
                hiddenInput.focus();
                updateDisplay();
                tapHint.textContent = 'TYPE! ⌨️';
                document.body.style.cursor = 'text';

                // Use requestAnimationFrame for smooth timer
                function tick(now) {
                    if (gameState !== 'playing') return;
                    const elapsed = (now - gameStartTime) / 1000;
                    timerRemaining = Math.max(0, GAME_DURATION - elapsed);
                    updateTimerDisplay();

                    const currentSecond = Math.floor(timerRemaining);
                    if (currentSecond < lastSecondTick && timerRemaining > 0) {
                        playTickSound();
                        lastSecondTick = currentSecond;
                    }

                    if (timerRemaining <= 0) {
                        endGame('gameover');
                        return;
                    }
                    if (currentName.length >= TOTAL_SLOTS) {
                        endGame('victory');
                        return;
                    }
                    animFrameId = requestAnimationFrame(tick);
                }
                animFrameId = requestAnimationFrame(tick);

                // Also set a backup interval for the timer display
                timerInterval = setInterval(() => {
                    if (gameState !== 'playing') {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        return;
                    }
                    updateTimerDisplay();
                }, 100);
            }

            function endGame(result) {
                gameState = result;
                if (animFrameId) cancelAnimationFrame(animFrameId);
                if (timerInterval) clearInterval(timerInterval);
                animFrameId = null;
                timerInterval = null;
                hiddenInput.blur();
                tapHint.textContent = '';
                document.body.style.cursor = 'default';

                const charsTyped = currentName.length;
                const timeUsed = GAME_DURATION - timerRemaining;
                let score = 0;
                let title = '';
                let detail = '';

                if (result === 'victory') {
                    const timeBonus = Math.floor(timerRemaining * 15);
                    score = charsTyped * 10 + timeBonus;
                    title = '🎉 PERFECT!';
                    detail = `All 100 characters in ${timeUsed.toFixed(1)}s!\nTime bonus: +${timeBonus}\nTotal score: ${score}`;
                    playVictorySound();
                    // Spawn celebration particles
                    for (let i = 0; i < 8; i++) {
                        setTimeout(() => {
                            const cx = window.innerWidth / 2 + (Math.random() - 0.5) * 300;
                            const cy = window.innerHeight / 2 + (Math.random() - 0.5) * 200;
                            spawnParticles(cx, cy, 25);
                        }, i * 120);
                    }
                } else {
                    score = charsTyped * 8;
                    title = '⏰ TIME\'S UP!';
                    detail = `You typed ${charsTyped}/100 characters.\nScore: ${score}`;
                    playGameOverSound();
                }

                overlayTitle.textContent = title;
                overlayMsg.style.display = 'none';
                overlayScore.style.display = '';
                overlayScore.textContent = score;
                overlayDetail.style.display = '';
                overlayDetail.textContent = detail.replace(/\n/g, ' · ');
                overlayBtn.textContent = 'PLAY AGAIN';
                overlayBtn.style.display = '';
                overlay.classList.add('active');
                timerDisplay.textContent = timerRemaining.toFixed(1);
                timerDisplay.classList.remove('warning', 'danger');
                updateDisplay();
            }

            // Hidden input event handling
            hiddenInput.addEventListener('input', function(e) {
                if (gameState !== 'playing') {
                    hiddenInput.value = '';
                    return;
                }
                const newValue = hiddenInput.value;
                if (newValue.length > TOTAL_SLOTS) {
                    hiddenInput.value = newValue.substring(0, TOTAL_SLOTS);
                    return;
                }
                const oldLen = currentName.length;
                currentName = newValue;
                const newLen = currentName.length;

                if (newLen > oldLen) {
                    // Characters added
                    playTypingSound();
                    if (newLen > 0) {
                        spawnParticleAtSlot(newLen - 1);
                    }
                } else if (newLen < oldLen) {
                    // Characters removed (backspace)
                    playSound(300, 0.04, 'triangle', 0.03);
                }
                updateDisplay();

                if (newLen >= TOTAL_SLOTS) {
                    endGame('victory');
                }
            });

            // Prevent paste
            hiddenInput.addEventListener('paste', function(e) {
                if (gameState === 'playing') {
                    e.preventDefault();
                    // Allow paste but handle it
                    const pasted = (e.clipboardData || window.clipboardData).getData('text');
                    const combined = currentName + pasted;
                    const truncated = combined.substring(0, TOTAL_SLOTS);
                    currentName = truncated;
                    hiddenInput.value = truncated;
                    updateDisplay();
                    if (currentName.length >= TOTAL_SLOTS) {
                        endGame('victory');
                    }
                } else {
                    e.preventDefault();
                }
            });

            // Keep input focused during gameplay
            document.addEventListener('click', function(e) {
                if (gameState === 'playing' && document.activeElement !== hiddenInput) {
                    hiddenInput.focus();
                }
            });

            document.addEventListener('touchstart', function(e) {
                if (gameState === 'playing' && document.activeElement !== hiddenInput) {
                    // Don't immediately focus on touch to avoid keyboard flashing
                    setTimeout(() => {
                        if (gameState === 'playing' && document.activeElement !== hiddenInput) {
                            hiddenInput.focus();
                        }
                    }, 50);
                }
            }, { passive: true });

            // Overlay button
            overlayBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                initAudio();
                if (gameState === 'idle' || gameState === 'victory' || gameState === 'gameover') {
                    startCountdown();
                }
            });

            // Also allow clicking overlay background
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay && (gameState === 'idle' || gameState === 'victory' ||
                        gameState === 'gameover')) {
                    initAudio();
                    startCountdown();
                }
            });

            // Keyboard shortcut: press Enter or Space to start
            document.addEventListener('keydown', function(e) {
                if ((e.key === 'Enter' || e.key === ' ') &&
                    (gameState === 'idle' || gameState === 'victory' || gameState === 'gameover') &&
                    overlay.classList.contains('active')) {
                    e.preventDefault();
                    initAudio();
                    startCountdown();
                }
            });

            // Initialize
            function init() {
                resetGame();
                updateDisplay();
                timerDisplay.textContent = GAME_DURATION.toFixed(1);
                overlay.classList.add('active');
                // Build initial slot dots are already built
            }

            init();

            // Handle window resize for particles
            window.addEventListener('resize', () => {
                // Nothing needed, particles use fixed positions
            });

            // Log for debugging
            console.log('🎮 100 IN 321 - Group Chat Name Challenge');
            console.log('   Type 100 characters in 32.1 seconds!');
            console.log('   Click START or press Enter/Space to begin.');
            console.log('   On mobile, tap START and use your keyboard.');
        })();
    </script>
</body>
</html>
