<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pickle Chomp!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a0a2e;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
        }
        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(100, 200, 80, 0.3), 0 0 80px rgba(100, 200, 80, 0.15);
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // --- Canvas sizing ---
            function resizeCanvas() {
                const maxW = Math.min(window.innerWidth, 600);
                const maxH = Math.min(window.innerHeight, 900);
                const ratio = Math.min(maxW / 480, maxH / 800);
                canvas.width = Math.floor(480 * ratio);
                canvas.height = Math.floor(800 * ratio);
                canvas.style.width = canvas.width + 'px';
                canvas.style.height = canvas.height + 'px';
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                // Reclamp player position on resize
                playerX = Math.min(Math.max(playerX, charHalfWidth), canvas.width - charHalfWidth);
            });

            const W = () => canvas.width;
            const H = () => canvas.height;

            // --- Audio engine ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, type, duration, vol = 0.15, slide = 0, slideTarget = 0) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (slide && slideTarget) {
                        osc.frequency.linearRampToValueAtTime(slideTarget, t + duration);
                    }
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {
                    // Ignore audio errors
                }
            }

            function sfxCatch() { playSound(600, 'square', 0.08, 0.12, 600, 1200);
                playSound(200, 'triangle', 0.1, 0.15); }

            function sfxGolden() {
                playSound(800, 'sine', 0.1, 0.15, 800, 1600);
                playSound(1000, 'sine', 0.08, 0.12);
                setTimeout(() => playSound(1200, 'sine', 0.06, 0.1), 60);
            }

            function sfxMiss() { playSound(80, 'sawtooth', 0.2, 0.18, 80, 40);
                playSound(50, 'triangle', 0.25, 0.25); }

            function sfxGameOver() {
                playSound(300, 'sawtooth', 0.3, 0.25, 300, 80);
                setTimeout(() => playSound(200, 'sawtooth', 0.3, 0.3, 200, 50), 200);
                setTimeout(() => playSound(100, 'sawtooth', 0.35, 0.4, 100, 30), 400);
            }

            // --- Game state ---
            let gameState = 'start'; // 'start' | 'playing' | 'gameover'
            let score = 0;
            let lives = 3;
            let playerX = 0;
            let playerY = 0;
            let charHalfWidth = 0;
            let charScale = 1;
            let targetPlayerX = 0;
            let chompAnim = 0; // 0=open, 1=closed
            let chompTimer = 0;
            let shakeAmount = 0;
            let shakeTimer = 0;
            let pickles = [];
            let particles = [];
            let spawnTimer = 0;
            let spawnInterval = 90; // frames between spawns (~1.5s at 60fps)
            let fallSpeed = 2.5;
            let difficultyLevel = 0;
            let eyeTrackX = 0;
            let eyeTrackY = 0;
            let expressionTimer = 0;
            let expressionType = 'neutral'; // 'neutral' | 'happy' | 'sad'
            let floatingTexts = [];
            let frameCount = 0;
            let groundY = 0;

            // --- Input handling ---
            let mouseX = 0;
            let useMouseControl = false;
            let keysDown = {};

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
                useMouseControl = true;
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
                useMouseControl = true;
            }, { passive: false });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
                useMouseControl = true;
                handleClick();
            }, { passive: false });

            canvas.addEventListener('click', (e) => {
                initAudio();
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
                useMouseControl = true;
                handleClick();
            });

            window.addEventListener('keydown', (e) => {
                initAudio();
                keysDown[e.key] = true;
                useMouseControl = false;
                if (e.key === ' ' || e.key === 'Enter') handleClick();
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keysDown[e.key] = false;
            });

            function handleClick() {
                if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'gameover') {
                    restartGame();
                }
            }

            function startGame() {
                gameState = 'playing';
                score = 0;
                lives = 3;
                pickles = [];
                particles = [];
                floatingTexts = [];
                chompAnim = 0;
                chompTimer = 0;
                shakeAmount = 0;
                shakeTimer = 0;
                spawnTimer = 0;
                spawnInterval = 90;
                fallSpeed = 2.5;
                difficultyLevel = 0;
                expressionType = 'neutral';
                expressionTimer = 0;
                playerX = canvas.width / 2;
                targetPlayerX = playerX;
                updateCharacterMetrics();
            }

            function restartGame() {
                startGame();
            }

            function updateCharacterMetrics() {
                charScale = Math.min(canvas.width / 480, canvas.height / 800);
                charHalfWidth = 55 * charScale;
                playerY = canvas.height - 90 * charScale;
                groundY = canvas.height - 20 * charScale;
                if (playerX < charHalfWidth) playerX = charHalfWidth;
                if (playerX > canvas.width - charHalfWidth) playerX = canvas.width - charHalfWidth;
                targetPlayerX = playerX;
            }

            // --- Particle system ---
            function spawnParticles(x, y, count, color, spread = 3, life = 25, size = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread + 1;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - Math.random() * 4,
                        life: life + Math.random() * 15,
                        maxLife: life + 15,
                        color: color,
                        size: size * (0.5 + Math.random()),
                        gravity: 0.15 + Math.random() * 0.2,
                    });
                }
            }

            function spawnFloatingText(x, y, text, color = '#fff') {
                floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    life: 45,
                    maxLife: 45,
                    color: color,
                    vy: -3 - Math.random() * 2,
                });
            }

            // --- Pickle spawning ---
            function spawnPickle() {
                const isGolden = Math.random() < 0.12;
                const w = 22 * charScale;
                const h = 48 * charScale;
                const x = w + Math.random() * (canvas.width - w * 2);
                pickles.push({
                    x: x,
                    y: -h - Math.random() * 100,
                    width: w,
                    height: h,
                    speed: fallSpeed + Math.random() * 1.5,
                    rotation: (Math.random() - 0.5) * 0.6,
                    rotSpeed: (Math.random() - 0.5) * 0.04,
                    isGolden: isGolden,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.02 + Math.random() * 0.03,
                    wobbleAmp: 0.5 + Math.random() * 1.5,
                });
            }

            // --- Main update ---
            function update() {
                if (gameState !== 'playing') return;

                frameCount++;
                updateCharacterMetrics();

                // Player input
                const moveSpeed = 7 * charScale;
                if (useMouseControl) {
                    targetPlayerX = mouseX;
                } else {
                    if (keysDown['ArrowLeft'] || keysDown['a']) targetPlayerX -= moveSpeed;
                    if (keysDown['ArrowRight'] || keysDown['d']) targetPlayerX += moveSpeed;
                }
                targetPlayerX = Math.max(charHalfWidth, Math.min(canvas.width - charHalfWidth, targetPlayerX));
                playerX += (targetPlayerX - playerX) * 0.35;

                // Chomp animation
                if (chompTimer > 0) {
                    chompTimer--;
                    if (chompTimer < 4) chompAnim = Math.max(0, chompTimer / 4);
                    else if (chompTimer < 8) chompAnim = 1;
                    else chompAnim = Math.max(0, 1 - (chompTimer - 8) / 6);
                    if (chompTimer <= 0) chompAnim = 0;
                }

                // Shake
                if (shakeTimer > 0) {
                    shakeTimer--;
                    shakeAmount *= 0.85;
                    if (shakeTimer <= 0) shakeAmount = 0;
                }

                // Expression timer
                if (expressionTimer > 0) {
                    expressionTimer--;
                    if (expressionTimer <= 0) expressionType = 'neutral';
                }

                // Spawn pickles
                spawnTimer++;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    spawnPickle();
                    // Occasionally spawn double
                    if (difficultyLevel > 10 && Math.random() < 0.3) {
                        setTimeout(() => { if (gameState === 'playing') spawnPickle(); }, 150);
                    }
                }

                // Update pickles
                const catchZoneY = playerY - 50 * charScale;
                const catchZoneHalfW = charHalfWidth * 0.85;
                const catchZoneTop = catchZoneY - 25 * charScale;
                const catchZoneBottom = catchZoneY + 30 * charScale;

                for (let i = pickles.length - 1; i >= 0; i--) {
                    const p = pickles[i];
                    p.y += p.speed;
                    p.wobble += p.wobbleSpeed;
                    p.x += Math.sin(p.wobble) * p.wobbleAmp;
                    p.rotation += p.rotSpeed;

                    // Check if caught
                    const px = p.x;
                    const py = p.y;
                    const inCatchX = px > playerX - catchZoneHalfW && px < playerX + catchZoneHalfW;
                    const inCatchY = py > catchZoneTop && py < catchZoneBottom;

                    if (inCatchX && inCatchY && chompAnim < 0.7) {
                        // Caught!
                        if (p.isGolden) {
                            score += 3;
                            spawnParticles(px, py, 25, '#ffd700', 5, 30, 4);
                            spawnParticles(px, py, 15, '#fff8c0', 3, 20, 2);
                            spawnFloatingText(px, py - 10, '+3', '#ffd700');
                            sfxGolden();
                            expressionType = 'happy';
                            expressionTimer = 30;
                        } else {
                            score++;
                            spawnParticles(px, py, 15, '#7ec850', 3.5, 25, 3);
                            spawnParticles(px, py, 8, '#a0e870', 2, 18, 2);
                            spawnFloatingText(px, py - 10, '+1', '#c8ff90');
                            sfxCatch();
                            expressionType = 'happy';
                            expressionTimer = 20;
                        }
                        chompAnim = 1;
                        chompTimer = 14;
                        pickles.splice(i, 1);

                        // Increase difficulty
                        difficultyLevel++;
                        spawnInterval = Math.max(22, 90 - difficultyLevel * 1.2);
                        fallSpeed = Math.min(8, 2.5 + difficultyLevel * 0.08);
                        continue;
                    }

                    // Check if missed (below ground)
                    if (p.y > groundY + 20) {
                        if (!p.isGolden) {
                            lives--;
                            sfxMiss();
                            shakeAmount = 8 * charScale;
                            shakeTimer = 18;
                            expressionType = 'sad';
                            expressionTimer = 25;
                            spawnParticles(p.x, groundY, 10, '#5a3a20', 2, 20, 3);
                            spawnFloatingText(p.x, groundY, '✗', '#ff6666');
                        } else {
                            // Golden pickle missed - no penalty but sad
                            spawnParticles(p.x, groundY, 8, '#b8960a', 2, 18, 2);
                        }
                        pickles.splice(i, 1);

                        if (lives <= 0) {
                            gameOver();
                        }
                        continue;
                    }

                    // Clamp to screen sides
                    if (p.x < p.width / 2) p.x = p.width / 2;
                    if (p.x > canvas.width - p.width / 2) p.x = canvas.width - p.width / 2;
                }

                // Eye tracking - find nearest pickle
                let nearestDist = Infinity;
                let nearestPickle = null;
                for (const p of pickles) {
                    const dx = p.x - playerX;
                    const dy = p.y - (playerY - 60 * charScale);
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < nearestDist && p.y < playerY - 30 * charScale) {
                        nearestDist = dist;
                        nearestPickle = p;
                    }
                }
                if (nearestPickle && nearestDist < 400 * charScale) {
                    const dx = nearestPickle.x - playerX;
                    const dy = nearestPickle.y - (playerY - 60 * charScale);
                    const maxDist = 35 * charScale;
                    const clampDist = Math.min(maxDist, Math.sqrt(dx * dx + dy * dy));
                    const angle = Math.atan2(dy, dx);
                    eyeTrackX = Math.cos(angle) * Math.min(clampDist, maxDist);
                    eyeTrackY = Math.sin(angle) * Math.min(clampDist, maxDist) * 0.5 - 5 * charScale;
                } else {
                    eyeTrackX += (0 - eyeTrackX) * 0.1;
                    eyeTrackY += (-8 * charScale - eyeTrackY) * 0.1;
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const pt = particles[i];
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.vy += pt.gravity;
                    pt.life--;
                    if (pt.life <= 0) particles.splice(i, 1);
                }

                // Update floating texts
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.y += ft.vy;
                    ft.life--;
                    if (ft.life <= 0) floatingTexts.splice(i, 1);
                }

                // Update pickle speeds for existing pickles
                for (const p of pickles) {
                    p.speed = fallSpeed + Math.random() * 0.3;
                }
            }

            function gameOver() {
                gameState = 'gameover';
                sfxGameOver();
                spawnParticles(playerX, playerY - 30 * charScale, 40, '#ff4444', 6, 35, 5);
                spawnParticles(playerX, playerY - 30 * charScale, 30, '#ff8844', 4, 30, 4);
                shakeAmount = 15 * charScale;
                shakeTimer = 25;
            }

            // --- Drawing functions ---
            function drawBackground() {
                // Sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#87CEEB');
                skyGrad.addColorStop(0.4, '#b8e4f0');
                skyGrad.addColorStop(0.7, '#e8f4e8');
                skyGrad.addColorStop(0.85, '#d4e8c0');
                skyGrad.addColorStop(1, '#8ab860');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Clouds
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                const cloudPositions = [
                    { x: 0.1, y: 0.08, s: 1 },
                    { x: 0.35, y: 0.15, s: 0.7 },
                    { x: 0.7, y: 0.06, s: 1.2 },
                    { x: 0.85, y: 0.18, s: 0.6 },
                    { x: 0.55, y: 0.22, s: 0.8 },
                ];
                for (const c of cloudPositions) {
                    const cx = canvas.width * c.x;
                    const cy = canvas.height * c.y;
                    const cs = charScale * c.s;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 30 * cs, 0, Math.PI * 2);
                    ctx.arc(cx + 25 * cs, cy - 10 * cs, 22 * cs, 0, Math.PI * 2);
                    ctx.arc(cx + 50 * cs, cy, 28 * cs, 0, Math.PI * 2);
                    ctx.arc(cx + 20 * cs, cy + 5 * cs, 20 * cs, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Ground
                const groundGrad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
                groundGrad.addColorStop(0, '#8ab860');
                groundGrad.addColorStop(0.3, '#6d9a3e');
                groundGrad.addColorStop(1, '#4a7028');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

                // Grass tufts
                ctx.fillStyle = '#7ec850';
                for (let i = 0; i < canvas.width; i += 18 * charScale) {
                    const gx = i + Math.sin(i * 0.3 + frameCount * 0.02) * 5;
                    const gy = groundY;
                    ctx.beginPath();
                    ctx.moveTo(gx, gy);
                    ctx.quadraticCurveTo(gx - 6 * charScale, gy - 12 * charScale, gx - 2 * charScale, gy - 18 * charScale);
                    ctx.quadraticCurveTo(gx + 2 * charScale, gy - 8 * charScale, gx + 4 * charScale, gy);
                    ctx.fill();
                }

                // Ground highlight line
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 2 * charScale;
                ctx.beginPath();
                ctx.moveTo(0, groundY);
                ctx.lineTo(canvas.width, groundY);
                ctx.stroke();
            }

            function drawPickle(p) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);

                const hw = p.width / 2;
                const hh = p.height / 2;

                if (p.isGolden) {
                    // Golden pickle with glow
                    ctx.shadowColor = 'rgba(255,215,0,0.7)';
                    ctx.shadowBlur = 12 * charScale;

                    const grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
                    grad.addColorStop(0, '#ffe866');
                    grad.addColorStop(0.3, '#ffd700');
                    grad.addColorStop(0.6, '#e6b800');
                    grad.addColorStop(1, '#c89800');
                    ctx.fillStyle = grad;
                } else {
                    // Regular green pickle
                    ctx.shadowColor = 'rgba(60,140,40,0.4)';
                    ctx.shadowBlur = 5 * charScale;

                    const grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
                    grad.addColorStop(0, '#a8e860');
                    grad.addColorStop(0.3, '#7ec830');
                    grad.addColorStop(0.6, '#5da820');
                    grad.addColorStop(1, '#3d7010');
                    ctx.fillStyle = grad;
                }

                // Pickle body (rounded rectangle)
                const radius = hw * 0.8;
                ctx.beginPath();
                ctx.moveTo(-hw + radius, -hh);
                ctx.lineTo(hw - radius, -hh);
                ctx.arcTo(hw, -hh, hw, -hh + radius, radius);
                ctx.lineTo(hw, hh - radius);
                ctx.arcTo(hw, hh, hw - radius, hh, radius);
                ctx.lineTo(-hw + radius, hh);
                ctx.arcTo(-hw, hh, -hw, hh - radius, radius);
                ctx.lineTo(-hw, -hh + radius);
                ctx.arcTo(-hw, -hh, -hw + radius, -hh, radius);
                ctx.closePath();
                ctx.fill();

                // Bumps on pickle
                if (!p.isGolden) {
                    ctx.fillStyle = 'rgba(0,0,0,0.12)';
                    for (let b = 0; b < 5; b++) {
                        const bx = -hw + hw * 0.3 + b * hw * 0.3;
                        const by = -hh + hh * 0.2 + (b % 2) * hh * 0.5;
                        ctx.beginPath();
                        ctx.arc(bx, by, hw * 0.18, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Lighter bumps
                    ctx.fillStyle = 'rgba(255,255,255,0.18)';
                    for (let b = 0; b < 4; b++) {
                        const bx = -hw + hw * 0.35 + b * hw * 0.32;
                        const by = -hh + hh * 0.35 + (b % 3) * hh * 0.4;
                        ctx.beginPath();
                        ctx.arc(bx, by, hw * 0.12, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // Sparkle spots on golden
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    for (let b = 0; b < 3; b++) {
                        const bx = -hw + hw * 0.35 + b * hw * 0.4;
                        const by = -hh + hh * 0.3 + (b % 2) * hh * 0.45;
                        ctx.beginPath();
                        ctx.arc(bx, by, hw * 0.15, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Stem
                ctx.fillStyle = p.isGolden ? '#b8960a' : '#3d6010';
                ctx.beginPath();
                ctx.moveTo(-hw * 0.25, -hh);
                ctx.quadraticCurveTo(-hw * 0.1, -hh - hh * 0.22, hw * 0.15, -hh - hh * 0.15);
                ctx.quadraticCurveTo(hw * 0.2, -hh - hh * 0.05, hw * 0.1, -hh);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();

                // Golden sparkle trail
                if (p.isGolden && frameCount % 3 === 0 && gameState === 'playing') {
                    spawnParticles(p.x + (Math.random() - 0.5) * p.width,
                        p.y + p.height / 2,
                        1, '#ffd700', 0.5, 8, 1.5);
                }
            }

            function drawCharacter() {
                const cx = playerX;
                const cy = playerY;
                const s = charScale;

                ctx.save();
                ctx.translate(cx, cy);

                // --- Face/head shape ---
                // Skin-colored rounded shape
                const faceGrad = ctx.createRadialGradient(0, 10 * s, 10 * s, 0, -5 * s, 70 * s);
                faceGrad.addColorStop(0, '#ffd5b8');
                faceGrad.addColorStop(0.6, '#f0b890');
                faceGrad.addColorStop(1, '#d4946a');
                ctx.fillStyle = faceGrad;

                ctx.beginPath();
                ctx.ellipse(0, -5 * s, 52 * s, 58 * s, 0, 0, Math.PI * 2);
                ctx.fill();

                // Slight cheek blush
                ctx.fillStyle = 'rgba(255,150,140,0.3)';
                ctx.beginPath();
                ctx.ellipse(-28 * s, 10 * s, 14 * s, 10 * s, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(28 * s, 10 * s, 14 * s, 10 * s, -0.2, 0, Math.PI * 2);
                ctx.fill();

                // --- Mouth (big open mouth at top of face, facing upward) ---
                const mouthCY = -25 * s;
                const mouthOpenAmount = 1 - chompAnim;
                const mouthHW = 32 * s;
                const mouthHH = 22 * s * mouthOpenAmount + 4 * s;

                // Mouth interior (dark)
                const innerGrad = ctx.createRadialGradient(0, mouthCY, 5 * s, 0, mouthCY, mouthHH + 8 * s);
                innerGrad.addColorStop(0, '#3a1010');
                innerGrad.addColorStop(0.7, '#1a0505');
                innerGrad.addColorStop(1, '#0a0000');
                ctx.fillStyle = innerGrad;
                ctx.beginPath();
                ctx.ellipse(0, mouthCY, mouthHW, mouthHH, 0, 0, Math.PI * 2);
                ctx.fill();

                // Tongue
                const tongueY = mouthCY + mouthHH - 6 * s * mouthOpenAmount;
                ctx.fillStyle = '#e86070';
                ctx.beginPath();
                ctx.ellipse(0, tongueY, mouthHW * 0.6, mouthHH * 0.45 * mouthOpenAmount, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#f07080';
                ctx.beginPath();
                ctx.ellipse(0, tongueY - 2 * s, mouthHW * 0.35, mouthHH * 0.25 * mouthOpenAmount, 0, 0, Math.PI * 2);
                ctx.fill();

                // Upper teeth
                const teethY = mouthCY - mouthHH + 2 * s;
                const teethCount = 6;
                const teethW = mouthHW * 1.6 / teethCount;
                ctx.fillStyle = '#ffffff';
                for (let t = 0; t < teethCount; t++) {
                    const tx = -mouthHW * 0.75 + t * teethW + teethW * 0.1;
                    const toothH = 9 * s * mouthOpenAmount;
                    ctx.beginPath();
                    ctx.roundRect(tx, teethY - toothH, teethW * 0.7, toothH + 2 * s, teethW * 0.25);
                    ctx.fill();
                }
                // Lower teeth (smaller)
                const lowerTeethY = mouthCY + mouthHH - 4 * s;
                ctx.fillStyle = '#f8f8f8';
                for (let t = 0; t < teethCount - 1; t++) {
                    const tx = -mouthHW * 0.6 + t * teethW + teethW * 0.2;
                    const toothH = 5 * s * mouthOpenAmount;
                    ctx.beginPath();
                    ctx.roundRect(tx, lowerTeethY, teethW * 0.55, toothH, teethW * 0.2);
                    ctx.fill();
                }

                // Lips
                ctx.strokeStyle = '#c45540';
                ctx.lineWidth = 5 * s;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.ellipse(0, mouthCY, mouthHW + 4 * s, mouthHH + 3 * s, 0, 0, Math.PI * 2);
                ctx.stroke();

                // Upper lip highlight
                ctx.strokeStyle = '#e87868';
                ctx.lineWidth = 3 * s;
                ctx.beginPath();
                ctx.ellipse(0, mouthCY, mouthHW + 2 * s, mouthHH + 1 * s, 0, Math.PI * 1.1, Math.PI * 1.9);
                ctx.stroke();

                // --- Eyes (below the mouth on the face) ---
                const eyeY = mouthCY + mouthHH + 18 * s;
                const eyeSpread = 18 * s;

                // Left eye
                drawEye(-eyeSpread, eyeY, s);
                // Right eye
                drawEye(eyeSpread, eyeY, s);

                // --- Eyebrows ---
                ctx.strokeStyle = '#5a3020';
                ctx.lineWidth = 3 * s;
                ctx.lineCap = 'round';
                const browY = eyeY - 16 * s;

                if (expressionType === 'sad') {
                    // Sad brows
                    ctx.beginPath();
                    ctx.moveTo(-eyeSpread - 10 * s, browY + 4 * s);
                    ctx.quadraticCurveTo(-eyeSpread, browY - 2 * s, -eyeSpread + 10 * s, browY + 2 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(eyeSpread - 10 * s, browY + 2 * s);
                    ctx.quadraticCurveTo(eyeSpread, browY - 2 * s, eyeSpread + 10 * s, browY + 4 * s);
                    ctx.stroke();
                } else if (expressionType === 'happy') {
                    // Happy brows (raised)
                    ctx.beginPath();
                    ctx.moveTo(-eyeSpread - 10 * s, browY - 3 * s);
                    ctx.quadraticCurveTo(-eyeSpread, browY - 8 * s, -eyeSpread + 10 * s, browY - 3 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(eyeSpread - 10 * s, browY - 3 * s);
                    ctx.quadraticCurveTo(eyeSpread, browY - 8 * s, eyeSpread + 10 * s, browY - 3 * s);
                    ctx.stroke();
                } else {
                    // Neutral
                    ctx.beginPath();
                    ctx.moveTo(-eyeSpread - 10 * s, browY);
                    ctx.quadraticCurveTo(-eyeSpread, browY - 5 * s, -eyeSpread + 10 * s, browY);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(eyeSpread - 10 * s, browY);
                    ctx.quadraticCurveTo(eyeSpread, browY - 5 * s, eyeSpread + 10 * s, browY);
                    ctx.stroke();
                }

                ctx.restore();
            }

            function drawEye(ex, ey, s) {
                // Eye white
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(ex, ey, 12 * s, 14 * s, 0, 0, Math.PI * 2);
                ctx.fill();

                // Iris
                ctx.fillStyle = '#3a2010';
                ctx.beginPath();
                ctx.ellipse(ex, ey, 7 * s, 9 * s, 0, 0, Math.PI * 2);
                ctx.fill();

                // Pupil (tracks pickles)
                const px = ex + eyeTrackX * 0.5;
                const py = ey + eyeTrackY * 0.7;
                const pupilDist = Math.sqrt((px - ex) ** 2 + (py - ey) ** 2);
                const maxPupilDist = 5 * s;
                let pfx = px;
                let pfy = py;
                if (pupilDist > maxPupilDist) {
                    const angle = Math.atan2(py - ey, px - ex);
                    pfx = ex + Math.cos(angle) * maxPupilDist;
                    pfy = ey + Math.sin(angle) * maxPupilDist;
                }
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(pfx, pfy, 4 * s, 0, Math.PI * 2);
                ctx.fill();

                // Eye shine
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(pfx - 2 * s, pfy - 3 * s, 2.5 * s, 0, Math.PI * 2);
                ctx.fill();

                // Eye outline
                ctx.strokeStyle = '#3a2010';
                ctx.lineWidth = 1.5 * s;
                ctx.beginPath();
                ctx.ellipse(ex, ey, 12 * s, 14 * s, 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            function drawParticles() {
                for (const pt of particles) {
                    const alpha = pt.life / pt.maxLife;
                    ctx.fillStyle = pt.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (pt.color.startsWith('#')) {
                        const hex = pt.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawFloatingTexts() {
                for (const ft of floatingTexts) {
                    const alpha = ft.life / ft.maxLife;
                    const scale = 1 + (1 - alpha) * 0.5;
                    ctx.fillStyle = ft.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (ft.color.startsWith('#')) {
                        const hex = ft.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.font = `bold ${18*charScale*scale}px 'Segoe UI', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            function drawUI() {
                const s = charScale;

                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${22*s}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 4 * s;
                ctx.fillText(`Score: ${score}`, canvas.width / 2, 35 * s);
                ctx.shadowBlur = 0;

                // Lives
                const heartSize = 14 * s;
                const startX = canvas.width - 20 * s - lives * (heartSize * 2.2);
                const heartY = 28 * s;
                for (let i = 0; i < lives; i++) {
                    drawHeart(startX + i * heartSize * 2.2, heartY, heartSize);
                }
                // Draw lost lives as outlines
                for (let i = lives; i < 3; i++) {
                    drawHeartOutline(startX + i * heartSize * 2.2, heartY, heartSize);
                }

                // Difficulty indicator (subtle)
                if (difficultyLevel > 5) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = `${10*s}px 'Segoe UI', sans-serif`;
                    ctx.textAlign = 'right';
                    ctx.fillText(`Speed: ${Math.floor(fallSpeed*10)/10}`, canvas.width - 15 * s, 55 * s);
                }
            }

            function drawHeart(x, y, size) {
                ctx.fillStyle = '#ff4466';
                ctx.beginPath();
                const topY = y - size * 0.35;
                const bottomY = y + size * 0.7;
                ctx.moveTo(x, bottomY);
                ctx.bezierCurveTo(x - size, y + size * 0.1, x - size, topY, x, topY);
                ctx.bezierCurveTo(x + size, topY, x + size, y + size * 0.1, x, bottomY);
                ctx.fill();
                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(x - size * 0.25, topY + size * 0.2, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawHeartOutline(x, y, size) {
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 1.5 * charScale;
                ctx.beginPath();
                const topY = y - size * 0.35;
                const bottomY = y + size * 0.7;
                ctx.moveTo(x, bottomY);
                ctx.bezierCurveTo(x - size, y + size * 0.1, x - size, topY, x, topY);
                ctx.bezierCurveTo(x + size, topY, x + size, y + size * 0.1, x, bottomY);
                ctx.stroke();
            }

            function drawStartScreen() {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const s = charScale;

                // Dim overlay
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Title card
                ctx.fillStyle = 'rgba(30,15,10,0.85)';
                ctx.beginPath();
                ctx.roundRect(cx - 160 * s, cy - 140 * s, 320 * s, 280 * s, 20 * s);
                ctx.fill();
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3 * s;
                ctx.stroke();

                // Title
                ctx.fillStyle = '#ffd700';
                ctx.font = `bold ${36*s}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('🥒 Pickle', cx, cy - 80 * s);
                ctx.fillText('Chomp! 🥒', cx, cy - 40 * s);

                // Subtitle
                ctx.fillStyle = '#ffffff';
                ctx.font = `${15*s}px 'Segoe UI', sans-serif`;
                ctx.fillText('Catch the falling pickles', cx, cy + 15 * s);
                ctx.fillText('in your hungry mouth!', cx, cy + 38 * s);

                // Instructions
                ctx.fillStyle = '#ccc';
                ctx.font = `${12*s}px 'Segoe UI', sans-serif`;
                ctx.fillText('🖱️ Mouse / touch to move', cx, cy + 72 * s);
                ctx.fillText('⌨️ Arrow keys also work', cx, cy + 92 * s);
                ctx.fillText('⭐ Golden pickles = +3 points!', cx, cy + 112 * s);

                // Start button
                const btnY = cy + 125 * s;
                const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(100,200,60,${0.7+pulse*0.3})`;
                ctx.beginPath();
                ctx.roundRect(cx - 70 * s, btnY - 22 * s, 140 * s, 44 * s, 22 * s);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2 * s;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${18*s}px 'Segoe UI', sans-serif`;
                ctx.fillText('START', cx, btnY + 6 * s);
            }

            function drawGameOverScreen() {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const s = charScale;

                // Dim overlay
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Card
                ctx.fillStyle = 'rgba(30,10,10,0.9)';
                ctx.beginPath();
                ctx.roundRect(cx - 150 * s, cy - 130 * s, 300 * s, 260 * s, 20 * s);
                ctx.fill();
                ctx.strokeStyle = '#ff6644';
                ctx.lineWidth = 3 * s;
                ctx.stroke();

                ctx.fillStyle = '#ff4444';
                ctx.font = `bold ${34*s}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', cx, cy - 70 * s);

                ctx.fillStyle = '#fff';
                ctx.font = `${20*s}px 'Segoe UI', sans-serif`;
                ctx.fillText(`Final Score: ${score}`, cx, cy - 25 * s);

                // Funny message
                let msg = 'Not enough pickles!';
                if (score >= 30) msg = 'Pickle master! 🏆';
                else if (score >= 20) msg = 'Pickle pro! 👏';
                else if (score >= 10) msg = 'Getting tastier! 😋';
                else if (score >= 5) msg = 'More pickles please! 🥒';
                ctx.fillStyle = '#ffcc88';
                ctx.font = `${14*s}px 'Segoe UI', sans-serif`;
                ctx.fillText(msg, cx, cy + 5 * s);

                // Restart button
                const btnY = cy + 50 * s;
                const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255,120,80,${0.7+pulse*0.3})`;
                ctx.beginPath();
                ctx.roundRect(cx - 60 * s, btnY - 20 * s, 120 * s, 40 * s, 20 * s);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2 * s;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${16*s}px 'Segoe UI', sans-serif`;
                ctx.fillText('RESTART', cx, btnY + 6 * s);

                ctx.fillStyle = '#ccc';
                ctx.font = `${11*s}px 'Segoe UI', sans-serif`;
                ctx.fillText('Click, tap, or press Enter', cx, btnY + 40 * s);
            }

            // --- Main render ---
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Apply screen shake
                let shakeX = 0;
                let shakeY = 0;
                if (shakeAmount > 0.5) {
                    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                drawBackground();

                // Draw pickles
                for (const p of pickles) {
                    drawPickle(p);
                }

                // Draw character
                drawCharacter();

                // Draw particles
                drawParticles();

                // Draw floating texts
                drawFloatingTexts();

                ctx.restore();

                // UI (not affected by shake)
                drawUI();

                // Overlay screens
                if (gameState === 'start') drawStartScreen();
                if (gameState === 'gameover') drawGameOverScreen();
            }

            // --- Game loop ---
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- Initialize ---
            function init() {
                updateCharacterMetrics();
                playerX = canvas.width / 2;
                targetPlayerX = playerX;
                eyeTrackX = 0;
                eyeTrackY = -8 * charScale;
                groundY = canvas.height - 20 * charScale;
                playerY = canvas.height - 90 * charScale;
                gameState = 'start';
                score = 0;
                lives = 3;
                pickles = [];
                particles = [];
                floatingTexts = [];
                chompAnim = 0;
                chompTimer = 0;
                shakeAmount = 0;
                shakeTimer = 0;
                spawnTimer = 0;
                spawnInterval = 90;
                fallSpeed = 2.5;
                difficultyLevel = 0;
                expressionType = 'neutral';
                expressionTimer = 0;
            }

            init();
            gameLoop();

            // Handle window resize
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCharacterMetrics();
                playerX = Math.min(Math.max(playerX, charHalfWidth), canvas.width - charHalfWidth);
                targetPlayerX = playerX;
                groundY = canvas.height - 20 * charScale;
                playerY = canvas.height - 90 * charScale;
            });

            console.log('🥒 Pickle Chomp! Ready to catch some pickles!');
        })();
    </script>
</body>
