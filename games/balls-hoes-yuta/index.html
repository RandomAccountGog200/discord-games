<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Balls Hoes Yuta - Multiplayer</title>
    <style>
        :root {
            --bg: #0a0a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(100, 60, 255, 0.4), 0 0 80px rgba(255, 80, 140, 0.25);
            width: 100%;
            height: auto;
            max-height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a18 100%);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Responsive canvas sizing
            const MAX_WIDTH = 500;
            const MAX_HEIGHT = 800;
            let scale = 1;

            function resizeCanvas() {
                const container = document.getElementById('gameContainer');
                const containerWidth = Math.min(window.innerWidth, MAX_WIDTH);
                const containerHeight = Math.min(window.innerHeight, MAX_HEIGHT);
                scale = Math.min(containerWidth / MAX_WIDTH, containerHeight / MAX_HEIGHT);
                canvas.width = MAX_WIDTH;
                canvas.height = MAX_HEIGHT;
                canvas.style.width = (MAX_WIDTH * scale) + 'px';
                canvas.style.height = (MAX_HEIGHT * scale) + 'px';
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Audio engine
            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

            function playSound(freq, type, duration, vol = 0.15, slide = 0) {
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + duration);
                } catch (e) { /* silent */ }
            }

            function sfxCatch() { playSound(600, 'sine', 0.12, 0.2, 400); }

            function sfxHit() { playSound(80, 'sawtooth', 0.25, 0.15, -30); }

            function sfxGameOver() { playSound(40, 'triangle', 0.5, 0.1, -20);
                setTimeout(() => playSound(30, 'triangle', 0.6, 0.1, -15), 150); }

            function sfxPowerUp() { playSound(900, 'sine', 0.08, 0.3, 600);
                playSound(1200, 'sine', 0.06, 0.25, 400); }

            // Game state
            const STATE = {
                MENU: 'menu',
                PLAYING: 'playing',
                GAMEOVER: 'gameover',
            };

            let gameState = STATE.MENU;
            let gameMode = 'single'; // 'single' or 'multi'
            let highScore = parseInt(localStorage.getItem('ballsHoesYutaHighScore')) || 0;
            let shakeAmount = 0;
            let screenFlash = 0;

            // Player(s)
            let players = [];
            // Balls, particles, floatingTexts, stars
            let balls = [];
            let particles = [];
            let floatingTexts = [];
            let powerUps = [];
            let stars = [];

            // Spawn stars for background
            function initStars() {
                stars = [];
                for (let i = 0; i < 80; i++) {
                    stars.push({
                        x: Math.random() * MAX_WIDTH,
                        y: Math.random() * MAX_HEIGHT,
                        size: Math.random() * 2 + 0.5,
                        twinkle: Math.random() * Math.PI * 2,
                        speed: Math.random() * 0.02 + 0.005,
                        brightness: Math.random() * 0.6 + 0.4,
                    });
                }
            }
            initStars();

            // Input handling
            const keys = {};
            let mouseDown = false;
            let mouseX = MAX_WIDTH / 2;
            let touchActive = false;
            // Multiplayer touch: separate halves
            let touchLeftActive = false;
            let touchLeftX = 0;
            let touchRightActive = false;
            let touchRightX = 0;

            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (gameState === STATE.MENU) {
                    if (e.key === '1') startGame('single');
                    if (e.key === '2') startGame('multi');
                }
                if (gameState === STATE.GAMEOVER && (e.key === ' ' || e.key === 'Enter' || e.key === 'r')) {
                    restartGame();
                }
                e.preventDefault();
            });

            window.addEventListener('keyup', e => {
                keys[e.key] = false;
                e.preventDefault();
            });

            canvas.addEventListener('mousedown', e => {
                mouseDown = true;
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) / scale;
                if (gameState === STATE.MENU) {
                    // For simplicity, single click starts single player mode
                    startGame('single');
                }
                if (gameState === STATE.GAMEOVER) restartGame();
            });

            canvas.addEventListener('mousemove', e => {
                if (mouseDown) {
                    const rect = canvas.getBoundingClientRect();
                    mouseX = (e.clientX - rect.left) / scale;
                }
            });

            canvas.addEventListener('mouseup', () => { mouseDown = false; });

            function handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                if (gameState === STATE.MENU) {
                    // Determine which half tapped
                    const x = (e.touches[0].clientX - rect.left) / scale;
                    if (x < MAX_WIDTH / 2) startGame('single');
                    else startGame('multi');
                    return;
                }
                if (gameState === STATE.GAMEOVER) {
                    restartGame();
                    return;
                }
                // Update touch states for all active touches
                updateTouches(e.touches, rect);
            }

            function handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                updateTouches(e.touches, rect);
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                updateTouches(e.touches, rect);
            }

            function updateTouches(touchList, rect) {
                touchLeftActive = false;
                touchRightActive = false;
                for (let i = 0; i < touchList.length; i++) {
                    const tx = (touchList[i].clientX - rect.left) / scale;
                    if (tx < MAX_WIDTH / 2) {
                        touchLeftActive = true;
                        touchLeftX = tx;
                    } else {
                        touchRightActive = true;
                        touchRightX = tx;
                    }
                }
            }

            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

            function startGame(mode) {
                gameMode = mode;
                gameState = STATE.PLAYING;
                shakeAmount = 0;
                screenFlash = 0;
                balls = [];
                particles = [];
                floatingTexts = [];
                powerUps = [];

                if (mode === 'single') {
                    players = [{
                        x: MAX_WIDTH / 2,
                        y: MAX_HEIGHT - 100,
                        width: 70,
                        height: 80,
                        speed: 420,
                        targetX: MAX_WIDTH / 2,
                        bobOffset: 0,
                        eyeBlink: 0,
                        trail: [],
                        score: 0,
                        lives: 3,
                        comboCount: 0,
                        comboTimer: 0,
                        color: '#ff9944',
                        hatColor: '#4444cc',
                    }];
                } else {
                    // Two players
                    players = [{
                        x: MAX_WIDTH * 0.3,
                        y: MAX_HEIGHT - 100,
                        width: 60,
                        height: 70,
                        speed: 400,
                        targetX: MAX_WIDTH * 0.3,
                        bobOffset: 0,
                        eyeBlink: 0,
                        trail: [],
                        score: 0,
                        lives: 3,
                        comboCount: 0,
                        comboTimer: 0,
                        color: '#ff9944',
                        hatColor: '#e04040',
                    }, {
                        x: MAX_WIDTH * 0.7,
                        y: MAX_HEIGHT - 100,
                        width: 60,
                        height: 70,
                        speed: 400,
                        targetX: MAX_WIDTH * 0.7,
                        bobOffset: 0,
                        eyeBlink: 0,
                        trail: [],
                        score: 0,
                        lives: 3,
                        comboCount: 0,
                        comboTimer: 0,
                        color: '#44aaff',
                        hatColor: '#40a0e0',
                    }];
                }

                // Reset touch states
                touchLeftActive = false;
                touchRightActive = false;
                mouseDown = false;

                // Spawn initial balls
                for (let i = 0; i < 4; i++) spawnBall();
            }

            function restartGame() {
                startGame(gameMode);
            }

            function gameOver() {
                gameState = STATE.GAMEOVER;
                sfxGameOver();
                shakeAmount = 20;
                screenFlash = 1;

                if (gameMode === 'single') {
                    const p = players[0];
                    if (p.score > highScore) {
                        highScore = p.score;
                        localStorage.setItem('ballsHoesYutaHighScore', highScore);
                    }
                } else {
                    // Multiplayer: show winner
                    const p1 = players[0];
                    const p2 = players[1];
                    if (p1.score > highScore) {
                        highScore = p1.score;
                        localStorage.setItem('ballsHoesYutaHighScore', highScore);
                    }
                    if (p2.score > highScore) {
                        highScore = p2.score;
                        localStorage.setItem('ballsHoesYutaHighScore', highScore);
                    }
                }

                // Spawn explosion particles for each player
                for (let p of players) {
                    for (let i = 0; i < 20; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 200 + 80;
                        particles.push({
                            x: p.x,
                            y: p.y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 100,
                            life: 1,
                            decay: Math.random() * 0.8 + 0.5,
                            color: p === players[0] ? '#ff6644' : '#4488ff',
                            size: Math.random() * 5 + 3,
                        });
                    }
                }
            }

            function spawnBall() {
                if (gameState !== STATE.PLAYING) return;
                const isGolden = Math.random() < 0.55;
                const isPowerUp = Math.random() < 0.08;
                const x = Math.random() * (MAX_WIDTH - 80) + 40;
                const ball = {
                    x: x,
                    y: -40,
                    radius: isPowerUp ? 16 : (Math.random() * 12 + 10),
                    vy: Math.random() * 180 + 140,
                    vx: (Math.random() - 0.5) * 60,
                    type: isPowerUp ? 'powerup' : (isGolden ? 'golden' : 'red'),
                    glow: 0,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 8,
                };
                balls.push(ball);
            }

            function spawnParticles(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 250 + 80;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 50,
                        life: 1,
                        decay: Math.random() * 1.5 + 0.6,
                        color: color,
                        size: Math.random() * 4 + 2,
                    });
                }
            }

            function spawnFloatingText(x, y, text, color = '#ffdd44') {
                floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    life: 1,
                    vy: -120,
                    color: color,
                });
            }

            // Update
            function update(dt) {
                if (gameState !== STATE.PLAYING && gameState !== STATE.GAMEOVER) return;
                if (gameState === STATE.GAMEOVER) {
                    shakeAmount *= 0.88;
                    screenFlash *= 0.85;
                    for (let p of particles) {
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.vy += 300 * dt;
                        p.life -= p.decay * dt;
                    }
                    particles = particles.filter(p => p.life > 0);
                    return;
                }

                const effectiveDt = Math.min(dt, 0.1);

                // Player movement
                for (let i = 0; i < players.length; i++) {
                    const p = players[i];
                    if (gameMode === 'single') {
                        // Single player controls
                        if (keys['ArrowLeft'] || keys['a'] || keys['A']) p.targetX -= p.speed * effectiveDt;
                        if (keys['ArrowRight'] || keys['d'] || keys['D']) p.targetX += p.speed * effectiveDt;
                        if (mouseDown || touchActive) {
                            p.targetX = mouseX;
                        }
                    } else {
                        // Multiplayer: player 1 (index 0) uses arrows, player 2 (index 1) uses A/D
                        if (i === 0) {
                            if (keys['ArrowLeft']) p.targetX -= p.speed * effectiveDt;
                            if (keys['ArrowRight']) p.targetX += p.speed * effectiveDt;
                            if (touchLeftActive) p.targetX = touchLeftX;
                        } else {
                            if (keys['a'] || keys['A']) p.targetX -= p.speed * effectiveDt;
                            if (keys['d'] || keys['D']) p.targetX += p.speed * effectiveDt;
                            if (touchRightActive) p.targetX = touchRightX;
                        }
                    }
                    p.targetX = Math.max(p.width / 2, Math.min(MAX_WIDTH - p.width / 2, p.targetX));
                    p.x += (p.targetX - p.x) * Math.min(12 * effectiveDt, 1);
                    p.bobOffset = Math.sin(Date.now() * 0.006 + i) * 5;
                    p.eyeBlink = Math.sin(Date.now() * 0.003 + i) * 0.5 + 0.5;

                    // Trail
                    p.trail.push({ x: p.x, y: p.y, life: 0.5 });
                    for (let t of p.trail) t.life -= effectiveDt * 2;
                    p.trail = p.trail.filter(t => t.life > 0);

                    // Combo timer
                    if (p.comboTimer > 0) {
                        p.comboTimer -= effectiveDt;
                        if (p.comboTimer <= 0) p.comboCount = 0;
                    }
                }

                // Update balls
                for (let ball of balls) {
                    ball.y += ball.vy * effectiveDt;
                    ball.x += ball.vx * effectiveDt;
                    ball.rotation += ball.rotSpeed * effectiveDt;
                    ball.glow = Math.sin(Date.now() * 0.01 + ball.x) * 0.3 + 0.7;

                    // Bounce off walls
                    if (ball.x - ball.radius < 0) {
                        ball.x = ball.radius;
                        ball.vx = Math.abs(ball.vx);
                    }
                    if (ball.x + ball.radius > MAX_WIDTH) {
                        ball.x = MAX_WIDTH - ball.radius;
                        ball.vx = -Math.abs(ball.vx);
                    }

                    // Collision with players
                    for (let p of players) {
                        const dx = ball.x - p.x;
                        const dy = ball.y - (p.y + p.bobOffset);
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const collisionDist = ball.radius + p.width * 0.35;

                        if (dist < collisionDist && ball.y < p.y + 20 && ball.y > p.y - 60) {
                            if (ball.type === 'golden') {
                                p.comboCount++;
                                p.comboTimer = 2.5;
                                const points = 10 + p.comboCount * 5;
                                p.score += points;
                                sfxCatch();
                                spawnParticles(ball.x, ball.y, '#ffdd44', 15);
                                if (p.comboCount > 1) {
                                    spawnFloatingText(ball.x, ball.y - 15, '+' + points + ' x' + p.comboCount, '#ffdd44');
                                } else {
                                    spawnFloatingText(ball.x, ball.y - 15, '+' + points, '#ffdd44');
                                }
                                if (p.comboCount >= 5 && p.comboCount % 5 === 0) {
                                    sfxPowerUp();
                                    spawnParticles(ball.x, ball.y, '#ff44ff', 25);
                                    spawnFloatingText(ball.x, ball.y - 30, '🔥 COMBO!', '#ff44ff');
                                }
                                ball.y = MAX_HEIGHT + 100;
                            } else if (ball.type === 'red') {
                                p.lives--;
                                p.comboCount = 0;
                                p.comboTimer = 0;
                                sfxHit();
                                shakeAmount = 12;
                                screenFlash = 0.6;
                                spawnParticles(ball.x, ball.y, '#ff3355', 20);
                                spawnFloatingText(ball.x, ball.y - 15, '💥 OOF!', '#ff3355');
                                ball.y = MAX_HEIGHT + 100;
                                if (p.lives <= 0) {
                                    gameOver();
                                    return;
                                }
                            } else if (ball.type === 'powerup') {
                                sfxPowerUp();
                                p.score += 50;
                                p.lives = Math.min(p.lives + 1, 5);
                                spawnParticles(ball.x, ball.y, '#44ffcc', 25);
                                spawnFloatingText(ball.x, ball.y - 15, '+50 ⭐ +1UP', '#44ffcc');
                                screenFlash = 0.3;
                                ball.y = MAX_HEIGHT + 100;
                            }
                            // Only one player can catch the ball
                            break;
                        }
                    }
                }

                // Remove off-screen balls
                balls = balls.filter(b => b.y < MAX_HEIGHT + 200);

                // Update particles
                for (let p of particles) {
                    p.x += p.vx * effectiveDt;
                    p.y += p.vy * effectiveDt;
                    p.vy += 250 * effectiveDt;
                    p.life -= p.decay * effectiveDt;
                }
                particles = particles.filter(p => p.life > 0);

                // Update floating texts
                for (let ft of floatingTexts) {
                    ft.y += ft.vy * effectiveDt;
                    ft.life -= 1.2 * effectiveDt;
                }
                floatingTexts = floatingTexts.filter(ft => ft.life > 0);

                // Shake decay
                shakeAmount *= 0.85;
                screenFlash *= 0.82;

                // Spawn new balls (more in multiplayer)
                const spawnRate = gameMode === 'multi' ? 0.04 : 0.025;
                const maxBalls = gameMode === 'multi' ? 20 : 15;
                if (Math.random() < spawnRate && balls.length < maxBalls) {
                    spawnBall();
                }
                if (balls.length < 3) spawnBall();
            }

            // Render
            function drawStars() {
                for (let star of stars) {
                    star.twinkle += star.speed;
                    const alpha = (Math.sin(star.twinkle) * 0.5 + 0.5) * star.brightness;
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawPlayer(p, index) {
                const px = p.x;
                const py = p.y + p.bobOffset;

                // Trail
                for (let i = p.trail.length - 1; i >= 0; i--) {
                    const t = p.trail[i];
                    const alpha = t.life * 0.35;
                    const size = p.width * 0.3 * t.life;
                    ctx.fillStyle = `rgba(100,180,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(px, py + 25, p.width * 0.35, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body
                const bodyGrad = ctx.createRadialGradient(px, py - 12, 4, px, py, p.width * 0.5);
                bodyGrad.addColorStop(0, '#ffcc88');
                bodyGrad.addColorStop(0.6, p.color);
                bodyGrad.addColorStop(1, '#884422');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(px, py - 5, p.width * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#884422';
                ctx.lineWidth = 2.2;
                ctx.stroke();

                // Eyes
                const eyeY = py - 14;
                const eyeOffsetX = p.width * 0.12;
                const blinkHeight = p.eyeBlink < 0.15 ? 2 : 8;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(px - eyeOffsetX, eyeY, 8, blinkHeight, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(px + eyeOffsetX, eyeY, 8, blinkHeight, 0, 0, Math.PI * 2);
                ctx.fill();
                if (blinkHeight > 3) {
                    ctx.fillStyle = '#111122';
                    ctx.beginPath();
                    ctx.arc(px - eyeOffsetX, eyeY, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(px + eyeOffsetX, eyeY, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(px - eyeOffsetX - 2, eyeY - 2, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(px + eyeOffsetX - 2, eyeY - 2, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Mouth
                ctx.strokeStyle = '#553311';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.arc(px, py + 4, 7, 0.1, Math.PI - 0.1);
                ctx.stroke();

                // Cheeks
                ctx.fillStyle = 'rgba(255,150,150,0.5)';
                ctx.beginPath();
                ctx.arc(px - 16, py + 2, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px + 16, py + 2, 6, 0, Math.PI * 2);
                ctx.fill();

                // Hat
                ctx.fillStyle = p.hatColor;
                ctx.beginPath();
                ctx.arc(px, py - 25, p.width * 0.3, Math.PI, 0);
                ctx.fill();
                ctx.fillStyle = '#222266';
                ctx.fillRect(px - p.width * 0.3, py - 25, p.width * 0.6, 8);
                ctx.fillStyle = '#5555ee';
                ctx.beginPath();
                ctx.arc(px, py - 29, 5, 0, Math.PI * 2);
                ctx.fill();

                // Glow
                const glowGrad = ctx.createRadialGradient(px, py, p.width * 0.25, px, py, p.width * 0.65);
                glowGrad.addColorStop(0, 'rgba(255,200,150,0.3)');
                glowGrad.addColorStop(1, 'rgba(255,100,50,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(px, py, p.width * 0.65, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawBall(ball) {
                ctx.save();
                ctx.translate(ball.x, ball.y);
                ctx.rotate(ball.rotation);

                const glowGrad = ctx.createRadialGradient(0, 0, ball.radius * 0.4, 0, 0, ball.radius * 2.2);
                if (ball.type === 'golden') {
                    glowGrad.addColorStop(0, 'rgba(255,220,80,0.6)');
                    glowGrad.addColorStop(0.5, 'rgba(255,180,30,0.3)');
                    glowGrad.addColorStop(1, 'rgba(255,140,0,0)');
                } else if (ball.type === 'red') {
                    glowGrad.addColorStop(0, 'rgba(255,60,60,0.6)');
                    glowGrad.addColorStop(0.5, 'rgba(255,20,20,0.3)');
                    glowGrad.addColorStop(1, 'rgba(180,0,0,0)');
                } else {
                    glowGrad.addColorStop(0, 'rgba(100,255,200,0.7)');
                    glowGrad.addColorStop(0.5, 'rgba(50,220,180,0.35)');
                    glowGrad.addColorStop(1, 'rgba(0,180,140,0)');
                }
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(0, 0, ball.radius * 2.2, 0, Math.PI * 2);
                ctx.fill();

                const bodyGrad = ctx.createRadialGradient(-ball.radius * 0.25, -ball.radius * 0.3, ball.radius * 0.15, 0, 0, ball.radius);
                if (ball.type === 'golden') {
                    bodyGrad.addColorStop(0, '#fffde0');
                    bodyGrad.addColorStop(0.3, '#ffd740');
                    bodyGrad.addColorStop(0.7, '#ff8f00');
                    bodyGrad.addColorStop(1, '#c56000');
                } else if (ball.type === 'red') {
                    bodyGrad.addColorStop(0, '#ff8888');
                    bodyGrad.addColorStop(0.3, '#ff3333');
                    bodyGrad.addColorStop(0.7, '#cc0000');
                    bodyGrad.addColorStop(1, '#660000');
                } else {
                    bodyGrad.addColorStop(0, '#ccffee');
                    bodyGrad.addColorStop(0.3, '#44ffcc');
                    bodyGrad.addColorStop(0.7, '#00cc88');
                    bodyGrad.addColorStop(1, '#006644');
                }
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(-ball.radius * 0.25, -ball.radius * 0.3, ball.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                if (ball.type === 'powerup') {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${ball.radius*1.2}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⭐', 0, 1);
                }

                if (ball.type === 'red') {
                    ctx.strokeStyle = '#880000';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        const innerR = ball.radius * 0.85;
                        const outerR = ball.radius * 1.25;
                        ctx.beginPath();
                        ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
                        ctx.lineTo(Math.cos(angle + 0.25) * outerR, Math.sin(angle + 0.25) * outerR);
                        ctx.lineTo(Math.cos(angle + 0.5) * innerR, Math.sin(angle + 0.5) * innerR);
                        ctx.fillStyle = '#ff4444';
                        ctx.fill();
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }

            function drawUI() {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, MAX_WIDTH, 60);

                if (gameMode === 'single') {
                    const p = players[0];
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 20px "Segoe UI"';
                    ctx.textAlign = 'left';
                    ctx.fillText(`⭐ ${p.score}`, 14, 30);
                    ctx.textAlign = 'right';
                    ctx.fillText(`🏆 ${highScore}`, MAX_WIDTH - 14, 30);
                    ctx.textAlign = 'center';
                    let hearts = '';
                    for (let i = 0; i < p.lives; i++) hearts += '❤️ ';
                    ctx.fillText(hearts.trim(), MAX_WIDTH / 2, 30);
                    if (p.comboCount >= 3) {
                        const alpha = Math.min(1, p.comboTimer / 0.5);
                        ctx.fillStyle = `rgba(255,200,50,${alpha})`;
                        ctx.font = 'bold 14px "Segoe UI"';
                        ctx.fillText(`🔥 ${p.comboCount}x COMBO!`, MAX_WIDTH / 2, 48);
                    }
                } else {
                    // Multiplayer UI: two scores
                    const p1 = players[0];
                    const p2 = players[1];
                    ctx.fillStyle = p1.hatColor;
                    ctx.font = 'bold 18px "Segoe UI"';
                    ctx.textAlign = 'left';
                    ctx.fillText(`P1 ⭐ ${p1.score}`, 14, 25);
                    ctx.fillStyle = '#ffffff';
                    let hearts1 = '';
                    for (let i = 0; i < p1.lives; i++) hearts1 += '❤️ ';
                    ctx.fillText(hearts1.trim(), 14, 50);

                    ctx.fillStyle = p2.hatColor;
                    ctx.textAlign = 'right';
                    ctx.fillText(`P2 ⭐ ${p2.score}`, MAX_WIDTH - 14, 25);
                    ctx.fillStyle = '#ffffff';
                    let hearts2 = '';
                    for (let i = 0; i < p2.lives; i++) hearts2 += '❤️ ';
                    ctx.fillText(hearts2.trim(), MAX_WIDTH - 14, 50);

                    if (p1.comboCount >= 3) {
                        const alpha = Math.min(1, p1.comboTimer / 0.5);
                        ctx.fillStyle = `rgba(255,200,50,${alpha})`;
                        ctx.font = 'bold 12px "Segoe UI"';
                        ctx.textAlign = 'left';
                        ctx.fillText(`🔥 ${p1.comboCount}x`, 14, 65);
                    }
                    if (p2.comboCount >= 3) {
                        const alpha = Math.min(1, p2.comboTimer / 0.5);
                        ctx.fillStyle = `rgba(255,200,50,${alpha})`;
                        ctx.font = 'bold 12px "Segoe UI"';
                        ctx.textAlign = 'right';
                        ctx.fillText(`🔥 ${p2.comboCount}x`, MAX_WIDTH - 14, 65);
                    }
                }
            }

            function drawMenu() {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, MAX_WIDTH, MAX_HEIGHT);

                const titleGrad = ctx.createLinearGradient(0, MAX_HEIGHT / 2 - 80, 0, MAX_HEIGHT / 2 - 20);
                titleGrad.addColorStop(0, '#ffdd44');
                titleGrad.addColorStop(0.5, '#ff9944');
                titleGrad.addColorStop(1, '#ff5588');
                ctx.fillStyle = titleGrad;
                ctx.font = 'bold 42px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,150,50,0.7)';
                ctx.shadowBlur = 25;
                ctx.fillText('BALLS HOES', MAX_WIDTH / 2, MAX_HEIGHT / 2 - 70);
                ctx.fillText('YUTA', MAX_WIDTH / 2, MAX_HEIGHT / 2 - 20);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = '18px "Segoe UI"';
                ctx.fillText('Catch golden balls!', MAX_WIDTH / 2, MAX_HEIGHT / 2 + 30);
                ctx.fillText('Dodge the red ones!', MAX_WIDTH / 2, MAX_HEIGHT / 2 + 55);

                // Mode selection
                const pulse = Math.sin(Date.now() * 0.003) * 0.4 + 0.6;
                ctx.fillStyle = `rgba(255,255,255,${0.7+pulse*0.3})`;
                ctx.font = 'bold 20px "Segoe UI"';
                ctx.fillText('1 PLAYER', MAX_WIDTH / 4, MAX_HEIGHT / 2 + 120);
                ctx.fillText('2 PLAYERS', MAX_WIDTH * 3 / 4, MAX_HEIGHT / 2 + 120);

                ctx.fillStyle = '#cccccc';
                ctx.font = '13px "Segoe UI"';
                ctx.fillText('Tap left / Press 1', MAX_WIDTH / 4, MAX_HEIGHT / 2 + 150);
                ctx.fillText('Tap right / Press 2', MAX_WIDTH * 3 / 4, MAX_HEIGHT / 2 + 150);

                if (highScore > 0) {
                    ctx.fillStyle = '#ffdd88';
                    ctx.font = '16px "Segoe UI"';
                    ctx.fillText(`Best: ${highScore}`, MAX_WIDTH / 2, MAX_HEIGHT / 2 + 185);
                }
            }

            function drawGameOver() {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, MAX_WIDTH, MAX_HEIGHT);

                ctx.fillStyle = '#ff4466';
                ctx.font = 'bold 40px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,50,50,0.8)';
                ctx.shadowBlur = 20;
                ctx.fillText('GAME OVER', MAX_WIDTH / 2, MAX_HEIGHT / 2 - 30);
                ctx.shadowBlur = 0;

                if (gameMode === 'single') {
                    const p = players[0];
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '22px "Segoe UI"';
                    ctx.fillText(`Score: ${p.score}`, MAX_WIDTH / 2, MAX_HEIGHT / 2 + 25);
                    if (p.score >= highScore && p.score > 0) {
                        ctx.fillStyle = '#ffdd44';
                        ctx.font = 'bold 20px "Segoe UI"';
                        ctx.fillText('🏆 NEW HIGH SCORE! 🏆', MAX_WIDTH / 2, MAX_HEIGHT / 2 + 55);
                    } else {
                        ctx.fillStyle = '#cccccc';
                        ctx.font = '18px "Segoe UI"';
                        ctx.fillText(`Best: ${highScore}`, MAX_WIDTH / 2, MAX_HEIGHT / 2 + 55);
                    }
                } else {
                    const p1 = players[0];
                    const p2 = players[1];
                    let winnerText = '';
                    if (p1.lives <= 0 && p2.lives <= 0) winnerText = 'DRAW!';
                    else if (p1.lives <= 0) winnerText = 'PLAYER 2 WINS!';
                    else winnerText = 'PLAYER 1 WINS!';

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '22px "Segoe UI"';
                    ctx.fillText(`P1: ${p1.score}  |  P2: ${p2.score}`, MAX_WIDTH / 2, MAX_HEIGHT / 2 + 25);
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 24px "Segoe UI"';
                    ctx.fillText(winnerText, MAX_WIDTH / 2, MAX_HEIGHT / 2 + 60);
                }

                const pulse = Math.sin(Date.now() * 0.003) * 0.4 + 0.6;
                ctx.fillStyle = `rgba(255,255,255,${0.7+pulse*0.3})`;
                ctx.font = 'bold 20px "Segoe UI"';
                ctx.fillText('TAP or PRESS R to RESTART', MAX_WIDTH / 2, MAX_HEIGHT / 2 + 105);
            }

            function render() {
                ctx.clearRect(0, 0, MAX_WIDTH, MAX_HEIGHT);
                const shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                const shakeY = (Math.random() - 0.5) * shakeAmount * 2;

                ctx.save();
                ctx.translate(shakeX, shakeY);

                const bgGrad = ctx.createRadialGradient(MAX_WIDTH / 2, MAX_HEIGHT / 2, 100, MAX_WIDTH / 2, MAX_HEIGHT / 2, MAX_HEIGHT);
                bgGrad.addColorStop(0, '#1a1a44');
                bgGrad.addColorStop(0.5, '#0f0f28');
                bgGrad.addColorStop(1, '#050510');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(-20, -20, MAX_WIDTH + 40, MAX_HEIGHT + 40);

                drawStars();

                for (let ball of balls) drawBall(ball);

                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                for (let ft of floatingTexts) {
                    ctx.globalAlpha = ft.life;
                    ctx.fillStyle = ft.color;
                    ctx.font = 'bold 18px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
                ctx.globalAlpha = 1;

                for (let p of players) drawPlayer(p);

                drawUI();

                ctx.restore();

                if (screenFlash > 0.01) {
                    ctx.fillStyle = `rgba(255,255,255,${screenFlash*0.4})`;
                    ctx.fillRect(0, 0, MAX_WIDTH, MAX_HEIGHT);
                }

                if (gameState === STATE.MENU) drawMenu();
                else if (gameState === STATE.GAMEOVER) drawGameOver();
            }

            // Game loop
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // Menu animation (background balls)
            function spawnMenuBalls() {
                if (gameState === STATE.MENU && balls.length < 6) {
                    const x = Math.random() * (MAX_WIDTH - 80) + 40;
                    balls.push({
                        x: x,
                        y: -40,
                        radius: Math.random() * 12 + 10,
                        vy: Math.random() * 100 + 60,
                        vx: (Math.random() - 0.5) * 40,
                        type: Math.random() < 0.6 ? 'golden' : 'red',
                        glow: 0,
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 6,
                    });
                }
                balls = balls.filter(b => b.y < MAX_HEIGHT + 200);
                for (let b of balls) {
                    b.y += b.vy * 0.016;
                    b.x += b.vx * 0.016;
                    b.rotation += b.rotSpeed * 0.016;
                }
            }

            function menuLoop() {
                if (gameState === STATE.MENU) spawnMenuBalls();
                if (gameState === STATE.MENU || gameState === STATE.GAMEOVER) render();
                requestAnimationFrame(() => menuLoop());
            }

            resizeCanvas();
            requestAnimationFrame(gameLoop);
            requestAnimationFrame(menuLoop);

            document.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }, { once: true });
            document.addEventListener('touchstart', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }, { once: true });

            console.log('🎮 Balls Hoes Yuta - Multiplayer Ready!');
            console.log('   Single Player: Tap left half / Press 1');
            console.log('   Two Players: Tap right half / Press 2');
            console.log('   In 2P: P1 uses Arrows/left touch, P2 uses A/D/right touch');
        })();
    </script>
</body>
</html>
