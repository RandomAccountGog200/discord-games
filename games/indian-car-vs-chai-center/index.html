<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Indian Car vs Chai Center</title>
    <style>
        :root {
            --bg: #1a0a00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background: radial-gradient(ellipse at center, #2d1a08 0%, #0d0500 100%);
        }

        #game-container {
            position: relative;
            width: 420px;
            height: 700px;
            max-width: 98vw;
            max-height: 98vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(255, 140, 20, 0.25),
                0 0 80px rgba(255, 100, 0, 0.12),
                0 8px 32px rgba(0, 0, 0, 0.5);
            border: 3px solid #5a3010;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 17px;
        }

        @media (max-width: 440px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                max-width: 100vw;
                max-height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            canvas {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Logical canvas size
            const W = 420;
            const H = 700;
            canvas.width = W;
            canvas.height = H;

            // Game constants
            const ROAD_LEFT = 70;
            const ROAD_RIGHT = 350;
            const ROAD_WIDTH = ROAD_RIGHT - ROAD_LEFT;
            const LANE_WIDTH = ROAD_WIDTH / 3;
            const CAR_WIDTH = 48;
            const CAR_HEIGHT = 88;
            const CAR_Y = 560;

            // --- AUDIO ENGINE ---
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;

            function ensureAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playBeep(freq, duration, type = 'square', vol = 0.08, rampDown = true) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    if (rampDown) {
                        gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    } else {
                        gain.gain.setValueAtTime(vol, t);
                        gain.gain.setValueAtTime(0, t + duration);
                    }
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration + 0.05);
                } catch (e) {
                    // Silently fail
                }
            }

            function playHorn() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    [220, 280, 220].forEach((f, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(f, t + i * 0.08);
                        gain.gain.setValueAtTime(0.06, t + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.1);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(t + i * 0.08);
                        osc.stop(t + i * 0.08 + 0.15);
                    });
                } catch (e) {}
            }

            function playCrash() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const bufferSize = 2048;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 400);
                    }
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.15, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(800, t);
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    noise.start(t);
                    noise.stop(t + 0.6);
                } catch (e) {}
            }

            function playCollect() {
                playBeep(880, 0.08, 'sine', 0.07);
                setTimeout(() => playBeep(1100, 0.1, 'sine', 0.07), 60);
            }

            function playEngine() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(55, t);
                    osc.frequency.linearRampToValueAtTime(58, t + 0.15);
                    osc.frequency.linearRampToValueAtTime(55, t + 0.3);
                    gain.gain.setValueAtTime(0.015, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.4);
                } catch (e) {}
            }

            // --- GAME STATE ---
            const STATE = { MENU: 'menu', PLAYING: 'playing', GAMEOVER: 'gameover' };
            let gameState = STATE.MENU;
            let score = 0;
            let highScore = 0;
            let lives = 3;
            let invincibleTimer = 0;
            let shakeAmount = 0;
            let roadOffset = 0;
            let difficulty = 1;
            let spawnTimer = 0;
            let spawnInterval = 90; // frames between spawns
            let chaiSpawnTimer = 0;
            let frameCount = 0;

            // Load high score
            try {
                const saved = localStorage.getItem('indianCarHighScore');
                if (saved) highScore = parseInt(saved) || 0;
            } catch (e) {}

            // --- PLAYER CAR ---
            const car = {
                x: W / 2,
                y: CAR_Y,
                width: CAR_WIDTH,
                height: CAR_HEIGHT,
                targetX: W / 2,
                speed: 380, // pixels per second
                hornCooldown: 0,
            };

            // --- ARRAYS ---
            let obstacles = [];
            let collectibles = [];
            let particles = [];
            let floatingTexts = [];

            // --- INPUT ---
            const keys = {};
            let touchActive = false;
            let touchX = 0;

            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    handleAction();
                }
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                ensureAudio();
                touchActive = true;
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                touchX = (e.touches[0].clientX - rect.left) * scaleX;
                if (gameState === STATE.MENU) startGame();
                if (gameState === STATE.GAMEOVER) restartGame();
                if (gameState === STATE.PLAYING) {
                    car.targetX = Math.max(ROAD_LEFT + CAR_WIDTH / 2, Math.min(ROAD_RIGHT - CAR_WIDTH / 2,
                        touchX));
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!touchActive) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                touchX = (e.touches[0].clientX - rect.left) * scaleX;
                if (gameState === STATE.PLAYING) {
                    car.targetX = Math.max(ROAD_LEFT + CAR_WIDTH / 2, Math.min(ROAD_RIGHT - CAR_WIDTH / 2,
                        touchX));
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
            });

            canvas.addEventListener('click', (e) => {
                ensureAudio();
                if (gameState === STATE.MENU) startGame();
                if (gameState === STATE.GAMEOVER) restartGame();
            });

            function handleAction() {
                ensureAudio();
                if (gameState === STATE.MENU) startGame();
                if (gameState === STATE.GAMEOVER) restartGame();
                if (gameState === STATE.PLAYING && car.hornCooldown <= 0) {
                    playHorn();
                    car.hornCooldown = 25;
                    // Spawn horn particles
                    for (let i = 0; i < 8; i++) {
                        particles.push({
                            x: car.x + (Math.random() - 0.5) * 30,
                            y: car.y - 30,
                            vx: (Math.random() - 0.5) * 120,
                            vy: -Math.random() * 250 - 80,
                            life: 0.6 + Math.random() * 0.3,
                            maxLife: 0.9,
                            color: '#ffcc66',
                            size: 2 + Math.random() * 4,
                        });
                    }
                    // Push nearby cows
                    obstacles.forEach(obs => {
                        if (obs.type === 'cow') {
                            const dx = obs.x - car.x;
                            const dy = obs.y - car.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 160) {
                                const pushX = (dx / dist) * 180;
                                obs.x += pushX;
                                obs.x = Math.max(ROAD_LEFT + 20, Math.min(ROAD_RIGHT - 20, obs.x));
                                obs.vx = pushX * 0.3;
                            }
                        }
                    });
                }
            }

            // --- OBSTACLE TYPES ---
            function createObstacle(type) {
                const laneIndex = Math.floor(Math.random() * 3);
                const laneCenter = ROAD_LEFT + LANE_WIDTH * laneIndex + LANE_WIDTH / 2;
                const x = laneCenter + (Math.random() - 0.5) * LANE_WIDTH * 0.7;
                const y = -60 - Math.random() * 100;
                const baseSpeed = 150 + difficulty * 25;

                const obs = {
                    type: type,
                    x: Math.max(ROAD_LEFT + 25, Math.min(ROAD_RIGHT - 25, x)),
                    y: y,
                    width: 40,
                    height: 40,
                    speed: baseSpeed + Math.random() * 60,
                    vx: 0,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.02,
                    steamTimer: Math.random() * Math.PI * 2,
                };

                switch (type) {
                    case 'chai_stall':
                        obs.width = 55;
                        obs.height = 50;
                        obs.speed = baseSpeed * 0.7;
                        break;
                    case 'cow':
                        obs.width = 50;
                        obs.height = 65;
                        obs.speed = baseSpeed * 0.5;
                        obs.rotSpeed = 0;
                        break;
                    case 'auto_rickshaw':
                        obs.width = 38;
                        obs.height = 55;
                        obs.speed = baseSpeed * 0.9;
                        break;
                    case 'pothole':
                        obs.width = 44;
                        obs.height = 36;
                        obs.speed = baseSpeed * 0.4;
                        obs.irregular = [];
                        for (let i = 0; i < 8; i++) {
                            obs.irregular.push(0.7 + Math.random() * 0.3);
                        }
                        break;
                }
                return obs;
            }

            // --- PARTICLE SYSTEM ---
            function spawnDustParticles(x, y, count) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: x + (Math.random() - 0.5) * 35,
                        y: y + CAR_HEIGHT / 2 + Math.random() * 10,
                        vx: (Math.random() - 0.5) * 40,
                        vy: Math.random() * 30 + 10,
                        life: 0.4 + Math.random() * 0.5,
                        maxLife: 0.9,
                        color: Math.random() < 0.5 ? '#c8a882' : '#d4b896',
                        size: 1.5 + Math.random() * 3.5,
                    });
                }
            }

            function spawnCollectParticles(x, y) {
                for (let i = 0; i < 12; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 180;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 60,
                        life: 0.3 + Math.random() * 0.4,
                        maxLife: 0.7,
                        color: Math.random() < 0.5 ? '#ffdd88' : '#ffeebb',
                        size: 2 + Math.random() * 5,
                    });
                }
            }

            function spawnCrashParticles(x, y) {
                for (let i = 0; i < 25; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 100 + Math.random() * 300;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 0.5 + Math.random() * 0.7,
                        maxLife: 1.2,
                        color: ['#ff6633', '#ff9933', '#ffcc00', '#ffffff'][Math.floor(Math.random() * 4)],
                        size: 2 + Math.random() * 6,
                    });
                }
            }

            function addFloatingText(x, y, text, color) {
                floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    color: color,
                    life: 0.8,
                    maxLife: 0.8,
                    vy: -100,
                });
            }

            // --- GAME LOGIC ---
            function startGame() {
                ensureAudio();
                gameState = STATE.PLAYING;
                score = 0;
                lives = 3;
                difficulty = 1;
                invincibleTimer = 0;
                shakeAmount = 0;
                roadOffset = 0;
                spawnTimer = 0;
                spawnInterval = 90;
                chaiSpawnTimer = 0;
                frameCount = 0;
                car.x = W / 2;
                car.y = CAR_Y;
                car.targetX = W / 2;
                car.hornCooldown = 0;
                obstacles = [];
                collectibles = [];
                particles = [];
                floatingTexts = [];
                playEngine();
            }

            function restartGame() {
                startGame();
            }

            function loseLife() {
                lives--;
                invincibleTimer = 1.8;
                shakeAmount = 12;
                playCrash();
                spawnCrashParticles(car.x, car.y);
                if (lives <= 0) {
                    gameOver();
                }
            }

            function gameOver() {
                gameState = STATE.GAMEOVER;
                if (score > highScore) {
                    highScore = score;
                    try {
                        localStorage.setItem('indianCarHighScore', highScore);
                    } catch (e) {}
                }
                playCrash();
                spawnCrashParticles(car.x, car.y);
                shakeAmount = 20;
            }

            // --- UPDATE ---
            function update(dt) {
                if (gameState !== STATE.PLAYING && gameState !== STATE.GAMEOVER) {
                    // Update particles even in menu
                    updateParticles(dt);
                    updateFloatingTexts(dt);
                    if (shakeAmount > 0) shakeAmount *= Math.pow(0.02, dt);
                    if (shakeAmount < 0.1) shakeAmount = 0;
                    return;
                }

                // Clamp dt
                const clampedDt = Math.min(dt, 0.1);

                if (gameState === STATE.GAMEOVER) {
                    updateParticles(clampedDt);
                    updateFloatingTexts(clampedDt);
                    if (shakeAmount > 0) shakeAmount *= Math.pow(0.015, clampedDt);
                    if (shakeAmount < 0.05) shakeAmount = 0;
                    return;
                }

                // --- PLAYING STATE ---
                frameCount++;
                roadOffset += (180 + difficulty * 18) * clampedDt;
                if (roadOffset > 10000) roadOffset -= 10000;

                // Update car position
                if (touchActive) {
                    car.targetX = Math.max(ROAD_LEFT + CAR_WIDTH / 2, Math.min(ROAD_RIGHT - CAR_WIDTH / 2, touchX));
                } else {
                    const moveSpeed = car.speed * clampedDt;
                    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                        car.targetX -= moveSpeed;
                    }
                    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                        car.targetX += moveSpeed;
                    }
                }
                car.targetX = Math.max(ROAD_LEFT + CAR_WIDTH / 2, Math.min(ROAD_RIGHT - CAR_WIDTH / 2, car.targetX));

                // Smooth car movement
                const dx = car.targetX - car.x;
                const smoothSpeed = 12;
                car.x += dx * Math.min(smoothSpeed * clampedDt, 1);
                if (Math.abs(dx) < 0.3) car.x = car.targetX;

                // Dust from car
                if (Math.abs(car.x - car.targetX) > 1.5 || frameCount % 3 === 0) {
                    spawnDustParticles(car.x, car.y, 1);
                }

                // Update invincibility
                if (invincibleTimer > 0) invincibleTimer -= clampedDt;

                // Update horn cooldown
                if (car.hornCooldown > 0) car.hornCooldown -= clampedDt * 60;

                // Update score
                score += Math.floor(30 * clampedDt);
                difficulty = 1 + Math.floor(score / 400);

                // Spawn obstacles
                spawnTimer += clampedDt * 60;
                spawnInterval = Math.max(25, 90 - difficulty * 4);
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    const types = ['chai_stall', 'chai_stall', 'cow', 'auto_rickshaw', 'pothole', 'chai_stall', 'cow',
                        'auto_rickshaw'
                    ];
                    const type = types[Math.floor(Math.random() * types.length)];
                    obstacles.push(createObstacle(type));
                }

                // Spawn chai cup collectibles
                chaiSpawnTimer += clampedDt * 60;
                if (chaiSpawnTimer > 120 + Math.random() * 200) {
                    chaiSpawnTimer = 0;
                    const cx = ROAD_LEFT + Math.random() * ROAD_WIDTH;
                    collectibles.push({
                        x: Math.max(ROAD_LEFT + 15, Math.min(ROAD_RIGHT - 15, cx)),
                        y: -40,
                        width: 22,
                        height: 22,
                        speed: 160 + difficulty * 20 + Math.random() * 50,
                        bobOffset: Math.random() * Math.PI * 2,
                    });
                }

                // Update obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.y += obs.speed * clampedDt;
                    if (obs.vx && Math.abs(obs.vx) > 1) {
                        obs.x += obs.vx * clampedDt;
                        obs.vx *= Math.pow(0.03, clampedDt);
                        if (Math.abs(obs.vx) < 2) obs.vx = 0;
                        obs.x = Math.max(ROAD_LEFT + 15, Math.min(ROAD_RIGHT - 15, obs.x));
                    }
                    obs.steamTimer += clampedDt * 3;
                    if (obs.y > H + 120) {
                        obstacles.splice(i, 1);
                    }
                }

                // Update collectibles
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const col = collectibles[i];
                    col.y += col.speed * clampedDt;
                    col.bobOffset += clampedDt * 8;
                    if (col.y > H + 60) {
                        collectibles.splice(i, 1);
                    }
                }

                // Collision detection (obstacles)
                if (invincibleTimer <= 0) {
                    const carLeft = car.x - CAR_WIDTH / 2 + 6;
                    const carRight = car.x + CAR_WIDTH / 2 - 6;
                    const carTop = car.y - CAR_HEIGHT / 2 + 8;
                    const carBottom = car.y + CAR_HEIGHT / 2 - 8;

                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        const obs = obstacles[i];
                        const obsLeft = obs.x - obs.width / 2 + 4;
                        const obsRight = obs.x + obs.width / 2 - 4;
                        const obsTop = obs.y - obs.height / 2 + 4;
                        const obsBottom = obs.y + obs.height / 2 - 4;

                        if (
                            carLeft < obsRight &&
                            carRight > obsLeft &&
                            carTop < obsBottom &&
                            carBottom > obsTop
                        ) {
                            // Collision!
                            obstacles.splice(i, 1);
                            loseLife();
                            break;
                        }
                    }
                }

                // Collision detection (collectibles)
                const carLeftC = car.x - CAR_WIDTH / 2;
                const carRightC = car.x + CAR_WIDTH / 2;
                const carTopC = car.y - CAR_HEIGHT / 2;
                const carBottomC = car.y + CAR_HEIGHT / 2;

                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const col = collectibles[i];
                    const colLeft = col.x - col.width / 2;
                    const colRight = col.x + col.width / 2;
                    const colTop = col.y - col.height / 2;
                    const colBottom = col.y + col.height / 2;

                    if (
                        carLeftC < colRight &&
                        carRightC > colLeft &&
                        carTopC < colBottom &&
                        carBottomC > colTop
                    ) {
                        // Collected!
                        score += 50;
                        playCollect();
                        spawnCollectParticles(col.x, col.y);
                        addFloatingText(col.x, col.y - 20, '+50', '#ffdd66');
                        collectibles.splice(i, 1);
                    }
                }

                // Update particles
                updateParticles(clampedDt);
                updateFloatingTexts(clampedDt);

                // Update shake
                if (shakeAmount > 0) shakeAmount *= Math.pow(0.02, clampedDt);
                if (shakeAmount < 0.05) shakeAmount = 0;

                // Occasional engine sound
                if (frameCount % 180 === 0 && Math.random() < 0.4) {
                    playEngine();
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 40 * dt; // slight gravity
                    p.size *= Math.pow(0.02, dt);
                }
            }

            function updateFloatingTexts(dt) {
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.life -= dt;
                    if (ft.life <= 0) {
                        floatingTexts.splice(i, 1);
                        continue;
                    }
                    ft.y += ft.vy * dt;
                }
            }

            // --- DRAWING ---
            function drawRoad() {
                // Roadside grass/dirt
                const grassGrad = ctx.createLinearGradient(0, 0, ROAD_LEFT, 0);
                grassGrad.addColorStop(0, '#3d5a1e');
                grassGrad.addColorStop(0.5, '#5a7a2e');
                grassGrad.addColorStop(1, '#8b7355');
                ctx.fillStyle = grassGrad;
                ctx.fillRect(0, 0, ROAD_LEFT, H);

                const grassGrad2 = ctx.createLinearGradient(ROAD_RIGHT, 0, W, 0);
                grassGrad2.addColorStop(0, '#8b7355');
                grassGrad2.addColorStop(0.4, '#5a7a2e');
                grassGrad2.addColorStop(1, '#3d5a1e');
                ctx.fillStyle = grassGrad2;
                ctx.fillRect(ROAD_RIGHT, 0, W - ROAD_RIGHT, H);

                // Road surface
                const roadGrad = ctx.createLinearGradient(ROAD_LEFT, 0, ROAD_RIGHT, 0);
                roadGrad.addColorStop(0, '#4a4a4a');
                roadGrad.addColorStop(0.15, '#5c5c5c');
                roadGrad.addColorStop(0.5, '#636363');
                roadGrad.addColorStop(0.85, '#5c5c5c');
                roadGrad.addColorStop(1, '#484848');
                ctx.fillStyle = roadGrad;
                ctx.fillRect(ROAD_LEFT, 0, ROAD_WIDTH, H);

                // Road edge lines
                ctx.strokeStyle = '#e8d5a0';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(ROAD_LEFT, 0);
                ctx.lineTo(ROAD_LEFT, H);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(ROAD_RIGHT, 0);
                ctx.lineTo(ROAD_RIGHT, H);
                ctx.stroke();

                // Lane markings (dashed)
                const dashLength = 40;
                const gapLength = 30;
                const totalDash = dashLength + gapLength;
                const offsetY = roadOffset % totalDash;

                ctx.strokeStyle = '#e8d5a0';
                ctx.lineWidth = 2;
                ctx.setLineDash([dashLength, gapLength]);
                ctx.lineDashOffset = -offsetY;

                for (let lane = 1; lane < 3; lane++) {
                    const laneX = ROAD_LEFT + LANE_WIDTH * lane;
                    ctx.beginPath();
                    ctx.moveTo(laneX, -10);
                    ctx.lineTo(laneX, H + 10);
                    ctx.stroke();
                }
                ctx.setLineDash([]);

                // Subtle road texture
                ctx.fillStyle = 'rgba(0,0,0,0.03)';
                for (let i = 0; i < 20; i++) {
                    const rx = ROAD_LEFT + 5 + Math.random() * (ROAD_WIDTH - 10);
                    const ry = (Math.random() * H + roadOffset * 0.5) % H;
                    ctx.fillRect(rx, ry, 3 + Math.random() * 6, 1.5);
                }
            }

            function drawCar(x, y, alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(x, y);

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath();
                ctx.roundRect(-CAR_WIDTH / 2 + 2, -CAR_HEIGHT / 2 + 2, CAR_WIDTH, CAR_HEIGHT, 10);
                ctx.fill();

                // Main body - cream/white (Ambassador taxi style)
                const bodyGrad = ctx.createLinearGradient(-CAR_WIDTH / 2, 0, CAR_WIDTH / 2, 0);
                bodyGrad.addColorStop(0, '#f2ede0');
                bodyGrad.addColorStop(0.5, '#faf7f0');
                bodyGrad.addColorStop(1, '#e8e0d0');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.roundRect(-CAR_WIDTH / 2, -CAR_HEIGHT / 2, CAR_WIDTH, CAR_HEIGHT, 10);
                ctx.fill();
                ctx.strokeStyle = '#c0b898';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Roof section (slightly darker, yellowish - taxi roof)
                const roofGrad = ctx.createLinearGradient(-CAR_WIDTH / 2, 0, CAR_WIDTH / 2, 0);
                roofGrad.addColorStop(0, '#e8d8a0');
                roofGrad.addColorStop(0.5, '#f0e4b8');
                roofGrad.addColorStop(1, '#dcc890');
                ctx.fillStyle = roofGrad;
                ctx.beginPath();
                ctx.roundRect(-CAR_WIDTH / 2 + 6, -CAR_HEIGHT / 2 + 10, CAR_WIDTH - 12, CAR_HEIGHT - 20, 6);
                ctx.fill();
                ctx.strokeStyle = '#c8b070';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Windshield (front)
                ctx.fillStyle = '#b8d8f0';
                ctx.beginPath();
                ctx.roundRect(-CAR_WIDTH / 2 + 9, -CAR_HEIGHT / 2 + 6, CAR_WIDTH - 18, 14, 3);
                ctx.fill();
                ctx.strokeStyle = '#8899aa';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Rear window
                ctx.fillStyle = '#a8c8e0';
                ctx.beginPath();
                ctx.roundRect(-CAR_WIDTH / 2 + 10, CAR_HEIGHT / 2 - 20, CAR_WIDTH - 20, 12, 3);
                ctx.fill();
                ctx.strokeStyle = '#8899aa';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Headlights (front)
                ctx.fillStyle = '#ffffcc';
                ctx.shadowColor = '#ffff88';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(-CAR_WIDTH / 2 + 16, -CAR_HEIGHT / 2 + 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(CAR_WIDTH / 2 - 16, -CAR_HEIGHT / 2 + 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Taillights (rear)
                ctx.fillStyle = '#ff3333';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(-CAR_WIDTH / 2 + 14, CAR_HEIGHT / 2 - 4, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(CAR_WIDTH / 2 - 14, CAR_HEIGHT / 2 - 4, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Taxi sign on roof
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(-7, -CAR_HEIGHT / 2 - 4, 14, 8);
                ctx.fillStyle = '#ff9900';
                ctx.fillRect(-6, -CAR_HEIGHT / 2 - 3, 12, 2);
                ctx.fillStyle = '#222';
                ctx.font = 'bold 6px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('TAXI', 0, -CAR_HEIGHT / 2 + 2);

                // Wheels
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(-CAR_WIDTH / 2 - 2, -CAR_HEIGHT / 2 + 18, 7, 16);
                ctx.fillRect(CAR_WIDTH / 2 - 5, -CAR_HEIGHT / 2 + 18, 7, 16);
                ctx.fillRect(-CAR_WIDTH / 2 - 2, CAR_HEIGHT / 2 - 34, 7, 16);
                ctx.fillRect(CAR_WIDTH / 2 - 5, CAR_HEIGHT / 2 - 34, 7, 16);

                // Wheel hub detail
                ctx.fillStyle = '#444';
                ctx.fillRect(-CAR_WIDTH / 2, -CAR_HEIGHT / 2 + 21, 3, 10);
                ctx.fillRect(CAR_WIDTH / 2 - 3, -CAR_HEIGHT / 2 + 21, 3, 10);
                ctx.fillRect(-CAR_WIDTH / 2, CAR_HEIGHT / 2 - 31, 3, 10);
                ctx.fillRect(CAR_WIDTH / 2 - 3, CAR_HEIGHT / 2 - 31, 3, 10);

                ctx.restore();
            }

            function drawChaiStall(x, y) {
                ctx.save();
                ctx.translate(x, y);

                // Stall base
                const stallGrad = ctx.createLinearGradient(0, -25, 0, 25);
                stallGrad.addColorStop(0, '#c4956b');
                stallGrad.addColorStop(0.5, '#a07050');
                stallGrad.addColorStop(1, '#7a4e35');
                ctx.fillStyle = stallGrad;
                ctx.fillRect(-22, -18, 44, 36);
                ctx.strokeStyle = '#5a3020';
                ctx.lineWidth = 2;
                ctx.strokeRect(-22, -18, 44, 36);

                // Roof/shade
                ctx.fillStyle = '#8b6040';
                ctx.fillRect(-28, -24, 56, 8);
                ctx.strokeStyle = '#5a3020';
                ctx.lineWidth = 2;
                ctx.strokeRect(-28, -24, 56, 8);

                // Small support poles
                ctx.fillStyle = '#6b4030';
                ctx.fillRect(-26, -24, 3, 28);
                ctx.fillRect(23, -24, 3, 28);

                // Kettle/urn (large silver circle)
                const kettleGrad = ctx.createRadialGradient(0, -6, 2, 0, -6, 16);
                kettleGrad.addColorStop(0, '#f0f0f0');
                kettleGrad.addColorStop(0.5, '#d0d0d0');
                kettleGrad.addColorStop(1, '#909090');
                ctx.fillStyle = kettleGrad;
                ctx.beginPath();
                ctx.arc(0, -4, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Kettle handle
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, -4, 12, -Math.PI * 0.7, Math.PI * 0.7);
                ctx.stroke();

                // Kettle spout
                ctx.fillStyle = '#999';
                ctx.beginPath();
                ctx.moveTo(14, -8);
                ctx.lineTo(22, -16);
                ctx.lineTo(20, -14);
                ctx.lineTo(13, -6);
                ctx.fill();

                // Small cups
                ctx.fillStyle = '#e8d8c0';
                for (let i = -1; i <= 1; i++) {
                    ctx.beginPath();
                    ctx.arc(i * 11 + 3, 14, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#b89870';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                ctx.restore();
            }

            function drawCow(x, y) {

            function drawAutoRickshaw(x, y) {
                ctx.save();
                ctx.translate(x, y);

                // Main body
                const bodyGrad = ctx.createLinearGradient(0, -22, 0, 22);
                bodyGrad.addColorStop(0, '#ffcc00');
                bodyGrad.addColorStop(1, '#cc9900');
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(-16, -20, 32, 40);
                ctx.strokeStyle = '#997700';
                ctx.lineWidth = 2;
                ctx.strokeRect(-16, -20, 32, 40);

                // Canopy
                ctx.fillStyle = '#228833';
                ctx.beginPath();
                ctx.moveTo(-14, -20);
                ctx.lineTo(-10, -32);
                ctx.lineTo(10, -32);
                ctx.lineTo(14, -20);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#116622';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Front wheel
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(0, 22, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Rear wheels
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-12, 18, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 18, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawPothole(x, y, irregular) {
                ctx.save();
                ctx.translate(x, y);

                // Draw irregular pothole
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                const segments = irregular || [0.8, 0.9, 1.0, 0.85, 0.75, 0.9, 1.0, 0.8];
                for (let i = 0; i < segments.length; i++) {
                    const angle = (i / segments.length) * Math.PI * 2;
                    const r = 20 * segments[i];
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#0d0d0d';
                ctx.beginPath();
                const innerSegments = segments.map(s => s * 0.55);
                for (let i = 0; i < innerSegments.length; i++) {
                    const angle = (i / innerSegments.length) * Math.PI * 2;
                    const r = 20 * innerSegments[i];
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            function drawChaiCup(x, y, bobOffset) {
                ctx.save();
                ctx.translate(x, y + Math.sin(bobOffset) * 5);

                // Glow
                const glowGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 16);
                glowGrad.addColorStop(0, 'rgba(255,200,100,0.5)');
                glowGrad.addColorStop(1, 'rgba(255,150,50,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(0, 0, 16, 0, Math.PI * 2);
                ctx.fill();

                // Cup
                ctx.fillStyle = '#e8d5b8';
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#b89860';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner tea
                ctx.fillStyle = '#c88040';
                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fill();

                // Steam
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                for (let i = 0; i < 2; i++) {
                    const sx = (i - 0.5) * 6;
                    const sy = -8 - Math.sin(bobOffset * 2 + i) * 4;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Star sparkle
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 7px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('★', 0, -10);

                ctx.restore();
            }

            function drawParticles() {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.3, p.size), 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawFloatingTexts() {
                for (const ft of floatingTexts) {
                    const alpha = Math.max(0, ft.life / ft.maxLife);
                    ctx.fillStyle = ft.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                    if (ft.color.startsWith('#')) {
                        const hex = ft.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            function drawSteamFromStalls() {
                for (const obs of obstacles) {
                    if (obs.type === 'chai_stall') {
                        const steamX = obs.x;
                        const steamY = obs.y - 20;
                        const steamCount = 2;
                        for (let i = 0; i < steamCount; i++) {
                            const sx = steamX + (i - 0.5) * 14;
                            const sy = steamY - Math.sin(obs.steamTimer + i * 2) * 8 - 4;
                            const alpha = 0.3 + Math.abs(Math.cos(obs.steamTimer + i)) * 0.4;
                            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                            ctx.beginPath();
                            ctx.arc(sx, sy, 3 + Math.sin(obs.steamTimer + i) * 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }

            function drawHUD() {

                // Lives
                ctx.fillStyle = 'rgba(0,0,0,0.55)';

                    }
                    ctx.beginPath();
                    ctx.arc(W - 70 + i * 22, 48, 7, 0, Math.PI * 2);
                    ctx.fill();

                // High score
                ctx.fillStyle = 'rgba(0,0,0,0.4)';

            function drawGameOver() {

                ctx.fillStyle = 'rgba(30,10,0,0.9)';

                ctx.fillStyle = '#ccbbaa';

            // --- MAIN RENDER ---
            function render() {
                ctx.clearRect(0, 0, W, H);

                // Apply screen shake
                let shakeX = 0;
                let shakeY = 0;
                if (shakeAmount > 0.1) {
                    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Draw road
                drawRoad();

                // Draw steam from chai stalls (behind obstacles)
                drawSteamFromStalls();

                // Draw obstacles
                for (const obs of obstacles) {
                    switch (obs.type) {
                        case 'chai_stall':
                            drawChaiStall(obs.x, obs.y);
                            break;
                        case 'cow':
                            drawCow(obs.x, obs.y);
                            break;
                        case 'auto_rickshaw':
                            drawAutoRickshaw(obs.x, obs.y);
                            break;
                        case 'pothole':
                            drawPothole(obs.x, obs.y, obs.irregular);
                            break;
                    }
                }

                // Draw collectibles
                for (const col of collectibles) {
                    drawChaiCup(col.x, col.y, col.bobOffset);
                }

                // Draw particles
                drawParticles();
                drawFloatingTexts();

                // Draw car (with invincibility flashing)
                if (gameState === STATE.PLAYING || gameState === STATE.GAMEOVER) {
                    if (invincibleTimer > 0 && Math.floor(invincibleTimer * 20) % 2 === 0) {
                        drawCar(car.x, car.y, 0.4);
                    } else {
                        drawCar(car.x, car.y, 1);
                    }
                }

                ctx.restore();

                // HUD (not affected by shake)
                if (gameState === STATE.PLAYING) {
                    drawHUD();
                }

                // Overlay states
                if (gameState === STATE.MENU) {
                    drawMenu();
                } else if (gameState === STATE.GAMEOVER) {
                    drawGameOver();
                }
            }

            // --- GAME LOOP ---
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2; // Cap to prevent huge jumps
                lastTime = timestamp;

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            // --- INITIALIZE ---
            function init() {
                // Draw initial state
                roadOffset = 0;
                car.x = W / 2;
                car.targetX = W / 2;
                obstacles = [];
                collectibles = [];
                particles = [];
                floatingTexts = [];
                gameState = STATE.MENU;
                score = 0;
                lives = 3;
                invincibleTimer = 0;
                shakeAmount = 0;
                difficulty = 1;
                spawnTimer = 0;
                chaiSpawnTimer = 0;
                frameCount = 0;
                car.hornCooldown = 0;
                render();
            }
