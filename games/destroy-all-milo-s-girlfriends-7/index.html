<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Destroy All Milo's Girlfriends 7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 80, 180, 0.4), 0 0 80px rgba(180, 60, 255, 0.3);
            max-height: 100vh;
            max-width: 100vw;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // Internal resolution
            const GAME_W = 480;
            const GAME_H = 780;
            let scale = 1;
            let offsetX = 0;
            let offsetY = 0;

            function resize() {
                const maxW = Math.min(window.innerWidth - 20, 480);
                const maxH = Math.min(window.innerHeight - 20, 780);
                const ratio = GAME_W / GAME_H;
                let w, h;
                if (maxW / maxH > ratio) {
                    h = maxH;
                    w = h * ratio;
                } else {
                    w = maxW;
                    h = w / ratio;
                }
                canvas.width = GAME_W;
                canvas.height = GAME_H;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                scale = GAME_W / w;
                offsetX = 0;
                offsetY = 0;
            }
            resize();
            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', () => setTimeout(resize, 100));

            // Audio
            let audioCtx = null;

            function getAudioCtx() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playSound(freq, duration, type = 'square', vol = 0.08, glide = 0) {
                try {
                    const ac = getAudioCtx();
                    const t = ac.currentTime;
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glide) osc.frequency.linearRampToValueAtTime(freq + glide, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* silent */ }
            }

            function sfxShoot() { playSound(900, 0.06, 'square', 0.06); }

            function sfxHit() { playSound(180, 0.1, 'sawtooth', 0.07); }

            function sfxExplosion() { playSound(50, 0.25, 'sawtooth', 0.1, -30);
                playSound(200, 0.15, 'triangle', 0.06); }

            function sfxPlayerHit() { playSound(80, 0.2, 'sawtooth', 0.12);
                playSound(40, 0.3, 'triangle', 0.08); }

            function sfxWin() {
                playSound(523, 0.15, 'triangle', 0.09);
                setTimeout(() => playSound(659, 0.15, 'triangle', 0.09), 150);
                setTimeout(() => playSound(784, 0.2, 'triangle', 0.1), 300);
                setTimeout(() => playSound(1047, 0.35, 'triangle', 0.12), 450);
            }

            function sfxLose() {
                playSound(300, 0.2, 'sawtooth', 0.08);
                setTimeout(() => playSound(200, 0.2, 'sawtooth', 0.08), 200);
                setTimeout(() => playSound(100, 0.4, 'sawtooth', 0.1), 400);
            }

            // Game State
            const STATE = { TITLE: 'title', PLAYING: 'playing', WIN: 'win', GAMEOVER: 'gameover' };
            let gameState = STATE.TITLE;
            let score = 0;
            let lives = 3;
            let enemiesDestroyed = 0;
            const TOTAL_ENEMIES = 7;
            let player = null;
            let enemies = [];
            let bullets = [];
            let enemyBullets = [];
            let particles = [];
            let stars = [];
            let waveActive = false;
            let waveTimer = 0;
            let currentWave = 0;
            let shakeAmount = 0;
            let shakeDuration = 0;
            let flashAlpha = 0;
            let autoFireCooldown = 0;
            let manualFireCooldown = 0;
            const AUTO_FIRE_RATE = 0.38;
            const MANUAL_FIRE_RATE = 0.22;
            let keys = {};
            let touchLeft = false;
            let touchRight = false;
            let touchFire = false;

            // Initialize stars
            function initStars() {
                stars = [];
                for (let i = 0; i < 100; i++) {
                    stars.push({
                        x: Math.random() * GAME_W,
                        y: Math.random() * GAME_H,
                        r: Math.random() * 1.8 + 0.4,
                        twinkle: Math.random() * Math.PI * 2,
                        speed: Math.random() * 0.03 + 0.01,
                        brightness: Math.random() * 0.6 + 0.4
                    });
                }
            }
            initStars();

            // Wave definitions - total 7 enemies
            const waveDefs = [
                { count: 1, hp: 3, speed: 0.6, color: '#ff6b9d', hairColor: '#ff2d78', name: 'Pink', pattern: 'sine',
                    bombRate: 2.5 },
                { count: 1, hp: 3, speed: 0.8, color: '#ffb347', hairColor: '#ffcc00', name: 'Blonde', pattern: 'bounce',
                    bombRate: 2.0 },
                { count: 1, hp: 4, speed: 1.1, color: '#ff4444', hairColor: '#cc0000', name: 'Red', pattern: 'sineFast',
                    bombRate: 1.7 },
                { count: 1, hp: 5, speed: 0.9, color: '#7b68ee', hairColor: '#4a3fcf', name: 'Blue', pattern: 'chase',
                    bombRate: 1.4 },
                { count: 1, hp: 5, speed: 1.0, color: '#bb44ff', hairColor: '#8a2be2', name: 'Purple', pattern: 'zigzag',
                    bombRate: 1.3 },
                { count: 1, hp: 5, speed: 1.3, color: '#44dd88', hairColor: '#1a8a4a', name: 'Green', pattern: 'erratic',
                    bombRate: 1.0 },
                { count: 1, hp: 7, speed: 1.4, color: '#ff69b4', hairColor: '#ff1493', name: 'Rainbow Boss',
                    pattern: 'boss', bombRate: 0.7 },
            ];

            // Player
            class Player {
                constructor() {
                    this.w = 40;
                    this.h = 50;
                    this.x = GAME_W / 2 - this.w / 2;
                    this.y = GAME_H - 140;
                    this.speed = 320;
                    this.invincible = 0;
                }
                update(dt) {
                    let move = 0;
                    if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) move = -1;
                    if (keys['ArrowRight'] || keys['KeyD'] || touchRight) move += 1;
                    this.x += move * this.speed * dt;
                    this.x = Math.max(10, Math.min(GAME_W - this.w - 10, this.x));
                    if (this.invincible > 0) this.invincible -= dt;
                }
                draw(ctx) {
                    if (this.invincible > 0 && Math.floor(this.invincible * 20) % 2 === 0) return;
                    const cx = this.x + this.w / 2;
                    const cy = this.y + this.h / 2;
                    // Body
                    ctx.fillStyle = '#3a3a5c';
                    ctx.fillRect(this.x + 8, this.y + 22, 24, 26);
                    // Jacket
                    ctx.fillStyle = '#2c3e50';
                    ctx.fillRect(this.x + 6, this.y + 20, 28, 20);
                    // Head
                    ctx.fillStyle = '#ffd5b8';
                    ctx.beginPath();
                    ctx.arc(cx, this.y + 14, 13, 0, Math.PI * 2);
                    ctx.fill();
                    // Hair
                    ctx.fillStyle = '#3d1c00';
                    ctx.beginPath();
                    ctx.arc(cx, this.y + 8, 14, Math.PI, Math.PI * 2);
                    ctx.fill();
                    ctx.fillRect(cx - 13, this.y + 5, 26, 10);
                    // Sunglasses
                    ctx.fillStyle = '#111';
                    ctx.fillRect(cx - 9, this.y + 9, 7, 5);
                    ctx.fillRect(cx + 2, this.y + 9, 7, 5);
                    ctx.fillRect(cx - 3, this.y + 10, 6, 3);
                    // Cape
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(cx, this.y + 18);
                    ctx.lineTo(cx - 16, this.y + 40);
                    ctx.lineTo(cx + 16, this.y + 40);
                    ctx.closePath();
                    ctx.fill();
                    // Weapon glow
                    ctx.fillStyle = '#00ffff';
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(cx - 2, this.y - 2, 4, 10);
                    ctx.shadowBlur = 0;
                    // Health bar
                    if (this.invincible > 0) {
                        ctx.fillStyle = 'rgba(255,255,100,0.7)';
                        ctx.fillRect(this.x, this.y - 12, this.w, 4);
                    }
                }
                shoot() {
                    const cx = this.x + this.w / 2;
                    bullets.push(new Bullet(cx - 3, this.y - 8, 0, -650, '#00ffff', 6, 2.5));
                    bullets.push(new Bullet(cx + 3, this.y - 8, 0, -650, '#55ffff', 6, 2.5));
                }
            }

            // Bullet
            class Bullet {
                constructor(x, y, vx, vy, color, w, h) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.w = w || 5;
                    this.h = h || 12;
                    this.alive = true;
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    if (this.y < -20 || this.y > GAME_H + 20 || this.x < -20 || this.x > GAME_W + 20) this.alive = false;
                }
                draw(ctx) {
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 8;
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                    ctx.shadowBlur = 0;
                    // Trail
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.h + 8);
                    grad.addColorStop(0, this.color);
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.fillRect(this.x - 1, this.y + this.h, this.w + 2, 10);
                }
            }

            // Enemy Bullet (heart bomb)
            class EnemyBullet {
                constructor(x, y, vx, vy) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.alive = true;
                    this.r = 7;
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    if (this.y > GAME_H + 30 || this.x < -30 || this.x > GAME_W + 30) this.alive = false;
                }
                draw(ctx) {
                    // Heart shape
                    const s = this.r;
                    ctx.fillStyle = '#ff3366';
                    ctx.shadowColor = '#ff3366';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    const cx = this.x;
                    const cy = this.y;
                    ctx.moveTo(cx, cy + s * 0.6);
                    ctx.bezierCurveTo(cx - s, cy - s * 0.3, cx - s * 0.5, cy - s, cx, cy - s * 0.3);
                    ctx.bezierCurveTo(cx + s * 0.5, cy - s, cx + s, cy - s * 0.3, cx, cy + s * 0.6);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Enemy
            class Enemy {
                constructor(waveDef, index) {
                    this.w = 42;
                    this.h = 50;
                    this.x = 60 + Math.random() * (GAME_W - 120);
                    this.y = 60 + Math.random() * 120;
                    this.hp = waveDef.hp;
                    this.maxHp = waveDef.hp;
                    this.speed = waveDef.speed * 100;
                    this.color = waveDef.color;
                    this.hairColor = waveDef.hairColor;
                    this.name = waveDef.name;
                    this.pattern = waveDef.pattern;
                    this.bombRate = waveDef.bombRate;
                    this.bombTimer = Math.random() * this.bombRate;
                    this.alive = true;
                    this.t = Math.random() * Math.PI * 2;
                    this.amplitude = 80 + Math.random() * 60;
                    this.baseX = this.x;
                    this.targetX = this.x;
                    this.zigTimer = 0;
                    this.zigDir = 1;
                }
                update(dt, playerRef) {
                    this.t += dt;
                    this.bombTimer -= dt;
                    const spd = this.speed * dt;
                    switch (this.pattern) {
                        case 'sine':
                            this.x = this.baseX + Math.sin(this.t * 1.5) * this.amplitude;
                            this.y += Math.sin(this.t * 0.7) * spd * 0.4;
                            this.y = Math.max(30, Math.min(300, this.y));
                            break;
                        case 'sineFast':
                            this.x = this.baseX + Math.sin(this.t * 2.5) * this.amplitude * 1.2;
                            this.y += Math.cos(this.t * 1.2) * spd * 0.5;
                            this.y = Math.max(30, Math.min(320, this.y));
                            break;
                        case 'bounce':
                            this.x += Math.cos(this.t * 1.8) * spd * 1.3;
                            this.y += Math.sin(this.t * 2.2) * spd * 0.5;
                            this.x = Math.max(30, Math.min(GAME_W - 30, this.x));
                            this.y = Math.max(30, Math.min(280, this.y));
                            break;
                        case 'chase':
                            if (playerRef) {
                                const dx = playerRef.x + playerRef.w / 2 - this.x;
                                this.x += Math.sign(dx) * spd * 1.1;
                            }
                            this.y += Math.sin(this.t * 2) * spd * 0.5;
                            this.y = Math.max(30, Math.min(300, this.y));
                            this.x = Math.max(30, Math.min(GAME_W - 30, this.x));
                            break;
                        case 'zigzag':
                            this.zigTimer += dt;
                            if (this.zigTimer > 0.6) { this.zigTimer = 0;
                                this.zigDir *= -1; }
                            this.x += this.zigDir * spd * 1.6;
                            this.y += spd * 0.3;
                            this.y = Math.max(30, Math.min(280, this.y));
                            this.x = Math.max(30, Math.min(GAME_W - 30, this.x));
                            if (this.x <= 30 || this.x >= GAME_W - 30) this.zigDir *= -1;
                            break;
                        case 'erratic':
                            this.x += (Math.sin(this.t * 3.7) + Math.cos(this.t * 2.1)) * spd * 1.2;
                            this.y += Math.cos(this.t * 2.8) * spd * 0.6;
                            this.x = Math.max(30, Math.min(GAME_W - 30, this.x));
                            this.y = Math.max(30, Math.min(310, this.y));
                            break;
                        case 'boss':
                            this.x = this.baseX + Math.sin(this.t * 1.3) * this.amplitude * 1.5;
                            this.y = 50 + Math.sin(this.t * 0.8) * 100;
                            this.y = Math.max(30, Math.min(250, this.y));
                            break;
                        default:
                            this.x += Math.sin(this.t) * spd;
                            this.y = Math.max(30, Math.min(280, this.y));
                    }
                    // Drop bombs
                    if (this.bombTimer <= 0 && playerRef) {
                        this.bombTimer = this.bombRate + Math.random() * 0.6;
                        const px = playerRef.x + playerRef.w / 2;
                        const py = playerRef.y + playerRef.h / 2;
                        const dx = px - this.x;
                        const dy = py - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        const spd2 = 160 + Math.random() * 80;
                        enemyBullets.push(new EnemyBullet(this.x, this.y + this.h / 2, (dx / dist) * spd2, (dy / dist) *
                            spd2));
                        if (this.pattern === 'boss') {
                            enemyBullets.push(new EnemyBullet(this.x, this.y + this.h / 2, (dx / dist) * spd2 * 0.7 + 50, (
                                dy / dist) * spd2 * 0.7));
                            enemyBullets.push(new EnemyBullet(this.x, this.y + this.h / 2, (dx / dist) * spd2 * 0.7 - 50, (
                                dy / dist) * spd2 * 0.7));
                        }
                    }
                }
                draw(ctx) {
                    const cx = this.x;
                    const cy = this.y;
                    // Body/dress
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(cx - 16, cy + 22);
                    ctx.lineTo(cx + 16, cy + 22);
                    ctx.lineTo(cx + 20, cy + this.h);
                    ctx.lineTo(cx - 20, cy + this.h);
                    ctx.closePath();
                    ctx.fill();
                    // Upper body
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(cx, cy + 10, 15, 0, Math.PI * 2);
                    ctx.fill();
                    // Head
                    ctx.fillStyle = '#ffe4c4';
                    ctx.beginPath();
                    ctx.arc(cx, cy - 4, 13, 0, Math.PI * 2);
                    ctx.fill();
                    // Hair
                    ctx.fillStyle = this.hairColor;
                    ctx.beginPath();
                    ctx.arc(cx, cy - 10, 15, Math.PI, Math.PI * 2);
                    ctx.fill();
                    ctx.fillRect(cx - 15, cy - 12, 30, 14);
                    // Side hair strands
                    ctx.fillRect(cx - 14, cy - 6, 6, 18);
                    ctx.fillRect(cx + 8, cy - 6, 6, 18);
                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(cx - 5, cy - 6, 4.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(cx + 5, cy - 6, 4.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(cx - 4, cy - 5, 2.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(cx + 6, cy - 5, 2.2, 0, Math.PI * 2);
                    ctx.fill();
                    // Mouth
                    ctx.strokeStyle = '#c44';
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.arc(cx, cy + 2, 3.5, 0.2, Math.PI - 0.2);
                    ctx.stroke();
                    ctx.lineWidth = 1;
                    // Health bar
                    if (this.hp < this.maxHp) {
                        const barW = this.w;
                        const barH = 6;
                        const barY = this.y - 20;
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.fillRect(cx - barW / 2, barY, barW, barH);
                        const hpRatio = this.hp / this.maxHp;
                        const hpColor = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff0' : '#f33';
                        ctx.fillStyle = hpColor;
                        ctx.fillRect(cx - barW / 2, barY, barW * hpRatio, barH);
                    }
                    // Glow
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 8;
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 20, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.lineWidth = 1;
                }
                hit(damage) {
                    this.hp -= damage;
                    if (this.hp <= 0) {
                        this.alive = false;
                        enemiesDestroyed++;
                        score += this.maxHp * 100;
                        sfxExplosion();
                        spawnExplosionParticles(this.x, this.y + this.h / 2, this.color);
                        shakeAmount = 8;
                        shakeDuration = 0.3;
                        flashAlpha = 0.4;
                    } else {
                        sfxHit();
                        spawnHitParticles(this.x, this.y + this.h / 2, this.color);
                        shakeAmount = 3;
                        shakeDuration = 0.1;
                    }
                }
            }

            // Particles
            class Particle {
                constructor(x, y, vx, vy, color, life, size) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.life = life;
                    this.maxLife = life;
                    this.size = size || 3;
                    this.alive = true;
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += 120 * dt;
                    this.life -= dt;
                    if (this.life <= 0) this.alive = false;
                }
                draw(ctx) {
                    const alpha = this.life / this.maxLife;
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.size;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
            }

            function spawnExplosionParticles(x, y, color) {
                for (let i = 0; i < 35; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 300;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed - 100;
                    const life = 0.3 + Math.random() * 0.7;
                    particles.push(new Particle(x, y, vx, vy, color, life, 2 + Math.random() * 5));
                }
                // White sparkles
                for (let i = 0; i < 15; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 50 + Math.random() * 200;
                    particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed - 80, '#fff', 0.2 + Math
                        .random() * 0.4, 1 + Math.random() * 3));
                }
            }

            function spawnHitParticles(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 40 + Math.random() * 150;
                    particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed - 60, color, 0.2 + Math
                        .random() * 0.3, 1.5 + Math.random() * 3));
                }
            }

            // Spawn wave
            function spawnWave() {
                if (currentWave >= waveDefs.length) return;
                const def = waveDefs[currentWave];
                enemies = [];
                for (let i = 0; i < def.count; i++) {
                    enemies.push(new Enemy(def, i));
                }
                waveActive = true;
                waveTimer = 0;
            }

            // Reset game
            function resetGame() {
                score = 0;
                lives = 3;
                enemiesDestroyed = 0;
                currentWave = 0;
                player = new Player();
                enemies = [];
                bullets = [];
                enemyBullets = [];
                particles = [];
                waveActive = false;
                waveTimer = 1.2;
                shakeAmount = 0;
                shakeDuration = 0;
                flashAlpha = 0;
                autoFireCooldown = 0;
                manualFireCooldown = 0;
                gameState = STATE.PLAYING;
            }

            // Initialize player
            player = new Player();

            // Input handling
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (gameState === STATE.PLAYING && manualFireCooldown <= 0 && player) {
                        player.shoot();
                        manualFireCooldown = MANUAL_FIRE_RATE;
                        sfxShoot();
                    }
                }
                if (e.code === 'KeyR' && (gameState === STATE.GAMEOVER || gameState === STATE.WIN)) {
                    resetGame();
                }
                if (e.code === 'Enter' && gameState === STATE.TITLE) {
                    resetGame();
                }
            });
            window.addEventListener('keyup', e => { keys[e.code] = false; });

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                if (gameState === STATE.TITLE) { resetGame(); return; }
                if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) { resetGame(); return; }
                handleTouch(e);
            }, { passive: false });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                handleTouch(e);
            }, { passive: false });
            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                touchLeft = false;
                touchRight = false;
                touchFire = false;
            });
            canvas.addEventListener('touchcancel', () => {
                touchLeft = false;
                touchRight = false;
                touchFire = false;
            });

            function handleTouch(e) {
                touchLeft = false;
                touchRight = false;
                touchFire = false;
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.touches.length; i++) {
                    const tx = (e.touches[i].clientX - rect.left) * scale;
                    const ty = (e.touches[i].clientY - rect.top) * scale;
                    // Bottom third: movement controls
                    if (ty > GAME_H * 0.65) {
                        if (tx < GAME_W / 3) touchLeft = true;
                        else if (tx > GAME_W * 2 / 3) touchRight = true;
                        else touchFire = true;
                    } else if (ty > GAME_H * 0.35) {
                        // Middle area: also allow fire
                        touchFire = true;
                        if (tx < GAME_W / 3) touchLeft = true;
                        else if (tx > GAME_W * 2 / 3) touchRight = true;
                    } else {
                        // Top area: tap to fire at position
                        touchFire = true;
                    }
                }
            }

            canvas.addEventListener('click', e => {
                if (gameState === STATE.TITLE) { resetGame(); return; }
                if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) { resetGame(); return; }
                if (gameState === STATE.PLAYING && manualFireCooldown <= 0 && player) {
                    player.shoot();
                    manualFireCooldown = MANUAL_FIRE_RATE;
                    sfxShoot();
                }
            });

            // Game loop
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;
                if (dt > 0.1) dt = 0.1;
                if (dt <= 0) dt = 0.016;

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            function update(dt) {
                // Update stars
                stars.forEach(s => {
                    s.twinkle += s.speed;
                    s.y += s.speed * 8;
                    if (s.y > GAME_H + 5) { s.y = -5;
                        s.x = Math.random() * GAME_W; }
                });

                // Update shake
                if (shakeDuration > 0) {
                    shakeDuration -= dt;
                    shakeAmount *= 0.85;
                    if (shakeDuration <= 0) shakeAmount = 0;
                }
                if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 3);

                // Update particles
                particles.forEach(p => p.update(dt));
                particles = particles.filter(p => p.alive);

                if (gameState === STATE.TITLE) return;
                if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) {
                    particles.forEach(p => p.update(dt));
                    particles = particles.filter(p => p.alive);
                    return;
                }

                // Update player
                if (player) {
                    player.update(dt);
                    if (player.invincible > 0) player.invincible -= dt;
                }

                // Auto fire
                autoFireCooldown -= dt;
                if (autoFireCooldown <= 0 && player && gameState === STATE.PLAYING) {
                    autoFireCooldown = AUTO_FIRE_RATE;
                    player.shoot();
                    sfxShoot();
                }
                manualFireCooldown -= dt;

                // Fire on touch
                if (touchFire && manualFireCooldown <= 0 && player && gameState === STATE.PLAYING) {
                    player.shoot();
                    manualFireCooldown = MANUAL_FIRE_RATE;
                    sfxShoot();
                }

                // Update bullets
                bullets.forEach(b => b.update(dt));
                bullets = bullets.filter(b => b.alive);
                enemyBullets.forEach(b => b.update(dt));
                enemyBullets = enemyBullets.filter(b => b.alive);

                // Wave management
                if (!waveActive && enemies.length === 0 && enemiesDestroyed < TOTAL_ENEMIES && gameState === STATE
                    .PLAYING) {
                    waveTimer -= dt;
                    if (waveTimer <= 0 && currentWave < waveDefs.length) {
                        spawnWave();
                    }
                }

                // Check if all enemies destroyed for current wave
                if (waveActive && enemies.length === 0 && gameState === STATE.PLAYING) {
                    waveActive = false;
                    currentWave++;
                    waveTimer = 1.5;
                    if (enemiesDestroyed >= TOTAL_ENEMIES) {
                        gameState = STATE.WIN;
                        sfxWin();
                        spawnExplosionParticles(GAME_W / 2, GAME_H / 2, '#ffdd00');
                        spawnExplosionParticles(GAME_W / 2, GAME_H / 2, '#ff69b4');
                    }
                }

                // Update enemies
                enemies.forEach(en => en.update(dt, player));

                // Collision: bullets vs enemies
                for (let b of bullets) {
                    if (!b.alive) continue;
                    for (let en of enemies) {
                        if (!en.alive) continue;
                        const ex = en.x;
                        const ey = en.y;
                        const ew = en.w;
                        const eh = en.h;
                        if (b.x + b.w > ex - ew / 2 && b.x < ex + ew / 2 && b.y + b.h > ey - eh / 3 && b.y < ey + eh) {
                            b.alive = false;
                            en.hit(1);
                            break;
                        }
                    }
                }

                // Collision: enemy bullets vs player
                if (player && player.invincible <= 0) {
                    for (let eb of enemyBullets) {
                        if (!eb.alive) continue;
                        const px = player.x;
                        const py = player.y;
                        const pw = player.w;
                        const ph = player.h;
                        const dx = eb.x - (px + pw / 2);
                        const dy = eb.y - (py + ph / 2);
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < eb.r + pw * 0.35) {
                            eb.alive = false;
                            lives--;
                            player.invincible = 1.5;
                            sfxPlayerHit();
                            spawnExplosionParticles(eb.x, eb.y, '#ff3366');
                            shakeAmount = 10;
                            shakeDuration = 0.4;
                            flashAlpha = 0.6;
                            if (lives <= 0) {
                                gameState = STATE.GAMEOVER;
                                sfxLose();
                                spawnExplosionParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff0000');
                            }
                            break;
                        }
                    }
                }

                // Remove dead enemies
                enemies = enemies.filter(en => en.alive);
            }

            function render() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);

                // Apply shake
                let shakeX = 0;
                let shakeY = 0;
                if (shakeAmount > 0.3) {
                    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
                }
                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Background gradient
                const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
                bgGrad.addColorStop(0, '#0a0a2e');
                bgGrad.addColorStop(0.5, '#1a1a3e');
                bgGrad.addColorStop(1, '#0d0d28');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(-10, -10, GAME_W + 20, GAME_H + 20);

                // Stars
                stars.forEach(s => {
                    const alpha = s.brightness * (0.5 + 0.5 * Math.sin(s.twinkle));
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Ground line
                ctx.strokeStyle = 'rgba(100,200,255,0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([20, 15]);
                ctx.beginPath();
                ctx.moveTo(0, GAME_H - 110);
                ctx.lineTo(GAME_W, GAME_H - 110);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.lineWidth = 1;

                // Draw enemies
                enemies.forEach(en => en.draw(ctx));

                // Draw bullets
                bullets.forEach(b => b.draw(ctx));
                enemyBullets.forEach(b => b.draw(ctx));

                // Draw player
                if (player && gameState !== STATE.GAMEOVER) player.draw(ctx);

                // Draw particles
                particles.forEach(p => p.draw(ctx));

                ctx.restore();

                // Flash effect
                if (flashAlpha > 0) {
                    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                }

                // UI
                drawUI();

                // Overlay for title/gameover/win
                if (gameState === STATE.TITLE) drawTitleScreen();
                if (gameState === STATE.GAMEOVER) drawGameOverScreen();
                if (gameState === STATE.WIN) drawWinScreen();
            }

            function drawUI() {
                // Score
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`Score: ${score}`, 15, 30);

                // Lives
                ctx.textAlign = 'right';
                ctx.fillText('Lives: ', GAME_W - 80, 30);
                for (let i = 0; i < lives; i++) {
                    ctx.fillStyle = '#ff4466';
                    ctx.beginPath();
                    const hx = GAME_W - 50 + i * 22;
                    const hy = 24;
                    const s = 8;
                    ctx.moveTo(hx, hy + s * 0.6);
                    ctx.bezierCurveTo(hx - s, hy - s * 0.3, hx - s * 0.5, hy - s, hx, hy - s * 0.3);
                    ctx.bezierCurveTo(hx + s * 0.5, hy - s, hx + s, hy - s * 0.3, hx, hy + s * 0.6);
                    ctx.fill();
                }

                // Progress
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                ctx.fillText(`Destroyed: ${enemiesDestroyed}/${TOTAL_ENEMIES}`, GAME_W / 2, 30);
                const progBarW = 200;
                const progBarH = 8;
                const progBarX = GAME_W / 2 - progBarW / 2;
                const progBarY = 40;
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(progBarX, progBarY, progBarW, progBarH);
                ctx.fillStyle = '#ff69b4';
                ctx.fillRect(progBarX, progBarY, progBarW * (enemiesDestroyed / TOTAL_ENEMIES), progBarH);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.strokeRect(progBarX, progBarY, progBarW, progBarH);

                // Wave indicator
                if (waveActive && enemies.length > 0 && gameState === STATE.PLAYING) {
                    const en = enemies[0];
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${en.name}`, GAME_W / 2, 70);
                }

                // Touch control hints on mobile
                if ('ontouchstart' in window && gameState === STATE.PLAYING) {
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.font = '11px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('◄ MOVE ►', GAME_W / 2, GAME_H - 20);
                    ctx.fillText('TAP TO SHOOT', GAME_W / 2, GAME_H - 40);
                }
            }

            function drawTitleScreen() {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                // Title
                ctx.fillStyle = '#ff69b4';
                ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff69b4';
                ctx.shadowBlur = 20;
                ctx.fillText('Destroy All', GAME_W / 2, 200);
                ctx.fillText("Milo's Girlfriends", GAME_W / 2, 250);
                ctx.shadowBlur = 0;

                // Subtitle
                ctx.fillStyle = '#ffdd57';
                ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
                ctx.fillText('PART 7', GAME_W / 2, 290);

                // Instructions
                ctx.fillStyle = '#fff';
                ctx.font = '16px "Segoe UI", Arial, sans-serif';
                ctx.fillText('⬅ ➡  or  A/D  to Move', GAME_W / 2, 380);
                ctx.fillText('Auto-shoot + Tap/Space to blast!', GAME_W / 2, 410);
                ctx.fillText('Dodge the heart bombs! 💕', GAME_W / 2, 440);
                ctx.fillText('Destroy all 7 girlfriends to win', GAME_W / 2, 470);

                // Start prompt
                const pulse = Math.sin(performance.now() / 500) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255,255,100,${0.7 + pulse * 0.3})`;
                ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
                ctx.fillText('TAP or PRESS ENTER to START', GAME_W / 2, 540);

                // Draw some sample enemies
                const demoColors = ['#ff6b9d', '#ffb347', '#ff4444', '#7b68ee', '#bb44ff', '#44dd88', '#ff69b4'];
                for (let i = 0; i < 7; i++) {
                    const dx = 80 + i * 50;
                    const dy = 600 + Math.sin(i * 1.2) * 25;
                    ctx.fillStyle = demoColors[i];
                    ctx.beginPath();
                    ctx.arc(dx, dy - 4, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = demoColors[i];
                    ctx.beginPath();
                    ctx.moveTo(dx - 8, dy + 8);
                    ctx.lineTo(dx + 8, dy + 8);
                    ctx.lineTo(dx + 10, dy + 20);
                    ctx.lineTo(dx - 10, dy + 20);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            function drawGameOverScreen() {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                ctx.fillStyle = '#ff3344';
                ctx.font = 'bold 40px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 25;
                ctx.fillText('GAME OVER', GAME_W / 2, 300);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '20px "Segoe UI", Arial, sans-serif';
                ctx.fillText(`Score: ${score}`, GAME_W / 2, 350);
                ctx.fillText(`Girlfriends Destroyed: ${enemiesDestroyed}/${TOTAL_ENEMIES}`, GAME_W / 2, 385);
                const pulse = Math.sin(performance.now() / 500) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255,255,150,${0.7 + pulse * 0.3})`;
                ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
                ctx.fillText('TAP or PRESS R to RESTART', GAME_W / 2, 450);
            }

            function drawWinScreen() {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, GAME_W, GAME_H);
                ctx.fillStyle = '#ffdd00';
                ctx.font = 'bold 42px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ffdd00';
                ctx.shadowBlur = 30;
                ctx.fillText('🎉 YOU WIN! 🎉', GAME_W / 2, 280);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '22px "Segoe UI", Arial, sans-serif';
                ctx.fillText('All 7 Girlfriends Destroyed!', GAME_W / 2, 330);
                ctx.fillText(`Score: ${score}`, GAME_W / 2, 370);
                ctx.fillText('Milo is free... for now! 😎', GAME_W / 2, 410);
                const pulse = Math.sin(performance.now() / 500) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(150,255,200,${0.7 + pulse * 0.3})`;
                ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
                ctx.fillText('TAP or PRESS R to PLAY AGAIN', GAME_W / 2, 480);

                // Celebration particles
                if (Math.random() < 0.5) {
                    const cx = GAME_W / 2 + (Math.random() - 0.5) * 300;
                    const cy = 200 + Math.random() * 200;
                    spawnExplosionParticles(cx, cy, ['#ffdd00', '#ff69b4', '#00ffcc', '#ff8800'][Math.floor(Math.random() *
                        4)]);
                }
            }

            // Start
            resetGame();
            gameState = STATE.TITLE;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);

            console.log('🔥 Destroy All Milo\'s Girlfriends 7 - Ready!');
            console.log('Controls: Arrow Keys/A,D to move | Space/Tap to shoot | R to restart');
            console.log('Destroy all 7 girlfriends! Dodge the heart bombs!');
        })();
    </script>
</body>
