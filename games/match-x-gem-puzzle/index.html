<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Match X - Gem Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(100, 80, 255, 0.3), 0 0 120px rgba(80, 60, 220, 0.15);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // --- Canvas Setup ---
            const W = 500;
            const H = 640;
            canvas.width = W;
            canvas.height = H;

            // --- Game Constants ---
            const ROWS = 8;
            const COLS = 8;
            const CELL_SIZE = 55;
            const GRID_X = 30;
            const GRID_Y = 148;
            const GEM_RADIUS = 21;
            const GEM_COLORS = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#c855f7'];
            const GEM_GLOW = ['#ff6b81', '#5dfc8e', '#5bb8ff', '#ffbe4d', '#d885fb'];
            const GEM_LIGHT = ['#ff9aa8', '#7effb0', '#7dbfff', '#ffca70', '#e0a0ff'];
            const GEM_DARK = ['#c0392b', '#1e8449', '#1a5276', '#d68910', '#7d3c98'];
            const SWAP_DURATION = 180;
            const REMOVE_DURATION = 300;
            const FALL_DURATION = 280;
            const SWAP_BACK_DURATION = 200;
            const GAME_TIME = 60;

            // --- Audio ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'sine', vol = 0.25, freqEnd = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* ignore */ }
            }

            function sfxSelect() { playTone(700, 60, 'sine', 0.2);
                playTone(900, 50, 'sine', 0.15, 1100); }

            function sfxSwap() { playTone(350, 100, 'sine', 0.2, 500); }

            function sfxMatch(n = 1) {
                const base = 500 + n * 120;
                playTone(base, 140, 'sine', 0.28, base * 1.6);
                setTimeout(() => playTone(base * 1.3, 100, 'sine', 0.2, base * 1.8), 60);
            }

            function sfxInvalid() { playTone(150, 150, 'triangle', 0.2, 80); }

            function sfxGameOver() {
                playTone(400, 200, 'sine', 0.3, 200);
                setTimeout(() => playTone(300, 250, 'sine', 0.25, 100), 180);
                setTimeout(() => playTone(200, 350, 'sine', 0.2, 60), 350);
            }

            // --- Particle System ---
            let particles = [];

            function spawnParticles(x, y, color, count = 18) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 7;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 2,
                        life: 0.5 + Math.random() * 0.7,
                        maxLife: 0.5 + Math.random() * 0.7,
                        size: 2 + Math.random() * 5,
                        color,
                        glow: true
                    });
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt * 60;
                    p.y += p.vy * dt * 60;
                    p.vy += 0.15 * dt * 60;
                    p.life -= dt;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    const size = p.size * alpha;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    if (p.glow) {
                        ctx.shadowColor = p.color;
                        ctx.shadowBlur = size * 3;
                    }
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- Floating Text ---
            let floatingTexts = [];

            function spawnFloatingText(x, y, text, color = '#fff') {
                floatingTexts.push({ x, y, text, color, life: 1.2, maxLife: 1.2, vy: -3 });
            }

            function updateFloatingTexts(dt) {
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.y += ft.vy * dt * 60;
                    ft.life -= dt;
                    if (ft.life <= 0) floatingTexts.splice(i, 1);
                }
            }

            function drawFloatingTexts(ctx) {
                for (const ft of floatingTexts) {
                    const alpha = Math.max(0, ft.life / ft.maxLife);
                    const scale = 1 + (1 - alpha) * 0.5;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = ft.color;
                    ctx.font = `bold ${Math.round(22*scale)}px "Segoe UI", system-ui, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 6;
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.restore();
                }
            }

            // --- Board Logic ---
            function createBoard() {
                const board = [];
                for (let r = 0; r < ROWS; r++) {
                    board[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        board[r][c] = Math.floor(Math.random() * 5);
                    }
                }
                return board;
            }

            function findMatches(board) {
                const matched = new Set();
                // Horizontal
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS - 2; c++) {
                        const t = board[r][c];
                        if (t === -1) continue;
                        if (board[r][c + 1] === t && board[r][c + 2] === t) {
                            let end = c + 2;
                            while (end + 1 < COLS && board[r][end + 1] === t) end++;
                            for (let i = c; i <= end; i++) matched.add(`${r},${i}`);
                            c = end;
                        }
                    }
                }
                // Vertical
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS - 2; r++) {
                        const t = board[r][c];
                        if (t === -1) continue;
                        if (board[r + 1][c] === t && board[r + 2][c] === t) {
                            let end = r + 2;
                            while (end + 1 < ROWS && board[end + 1][c] === t) end++;
                            for (let i = r; i <= end; i++) matched.add(`${i},${c}`);
                            r = end;
                        }
                    }
                }
                return matched;
            }

            function removeInitialMatches(board) {
                let matches = findMatches(board);
                let iterations = 0;
                while (matches.size > 0 && iterations < 100) {
                    for (const key of matches) {
                        const [r, c] = key.split(',').map(Number);
                        board[r][c] = Math.floor(Math.random() * 5);
                    }
                    matches = findMatches(board);
                    iterations++;
                }
                return board;
            }

            function applyGravity(board) {
                const moves = [];
                for (let c = 0; c < COLS; c++) {
                    let writeRow = ROWS - 1;
                    const colMoves = [];
                    // Compact existing gems
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== -1) {
                            if (r !== writeRow) {
                                colMoves.push({ fromR: r, toR: writeRow, type: board[r][c], isNew: false });
                                board[writeRow][c] = board[r][c];
                                board[r][c] = -1;
                            } else {
                                colMoves.push({ fromR: r, toR: writeRow, type: board[r][c], isNew: false });
                            }
                            writeRow--;
                        }
                    }
                    // Fill empty spaces at top
                    const emptyCount = writeRow + 1;
                    for (let i = writeRow; i >= 0; i--) {
                        const newType = Math.floor(Math.random() * 5);
                        board[i][c] = newType;
                        const startR = i - emptyCount;
                        colMoves.push({ fromR: startR, toR: i, type: newType, isNew: true });
                    }
                    moves.push({ col: c, moves: colMoves });
                }
                return moves;
            }

            function hasValidMoves(board) {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (c + 1 < COLS) {
                            [board[r][c], board[r][c + 1]] = [board[r][c + 1], board[r][c]];
                            if (findMatches(board).size > 0) {
                                [board[r][c], board[r][c + 1]] = [board[r][c + 1], board[r][c]];
                                return true;
                            }
                            [board[r][c], board[r][c + 1]] = [board[r][c + 1], board[r][c]];
                        }
                        if (r + 1 < ROWS) {
                            [board[r][c], board[r + 1][c]] = [board[r + 1][c], board[r][c]];
                            if (findMatches(board).size > 0) {
                                [board[r][c], board[r + 1][c]] = [board[r + 1][c], board[r][c]];
                                return true;
                            }
                            [board[r][c], board[r + 1][c]] = [board[r + 1][c], board[r][c]];
                        }
                    }
                }
                return false;
            }

            function getCellCenter(r, c) {
                return {
                    x: GRID_X + c * CELL_SIZE + CELL_SIZE / 2,
                    y: GRID_Y + r * CELL_SIZE + CELL_SIZE / 2
                };
            }

            function getGridFromPos(px, py) {
                const col = Math.floor((px - GRID_X) / CELL_SIZE);
                const row = Math.floor((py - GRID_Y) / CELL_SIZE);
                if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                    return { row, col };
                }
                return null;
            }

            // --- Game State ---
            let board, visualStates, phase, phaseTimer, phaseData;
            let selectedCell, score, timer, gameOver, cascadeLevel;
            let timePulse = 0;

            function initVisualStates() {
                const vs = [];
                for (let r = 0; r < ROWS; r++) {
                    vs[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        vs[r][c] = {
                            offsetX: 0,
                            offsetY: 0,
                            targetOffsetX: 0,
                            targetOffsetY: 0,
                            scale: 1,
                            targetScale: 1,
                            opacity: 1,
                            targetOpacity: 1,
                            fallFromR: null,
                        };
                    }
                }
                return vs;
            }

            function resetVisualOffsets() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const v = visualStates[r][c];
                        v.offsetX = 0;
                        v.offsetY = 0;
                        v.targetOffsetX = 0;
                        v.targetOffsetY = 0;
                        v.scale = 1;
                        v.targetScale = 1;
                        v.opacity = 1;
                        v.targetOpacity = 1;
                        v.fallFromR = null;
                    }
                }
            }

            function initGame() {
                board = createBoard();
                board = removeInitialMatches(board);
                if (!hasValidMoves(board)) {
                    board = createBoard();
                    board = removeInitialMatches(board);
                }
                visualStates = initVisualStates();
                phase = 'idle';
                phaseTimer = 0;
                phaseData = null;
                selectedCell = null;
                score = 0;
                timer = GAME_TIME;
                gameOver = false;
                cascadeLevel = 0;
                particles = [];
                floatingTexts = [];
                timePulse = 0;
            }

            function getGemVisualPos(r, c) {
                const center = getCellCenter(r, c);
                const vs = visualStates[r][c];
                return {
                    x: center.x + vs.offsetX,
                    y: center.y + vs.offsetY,
                    scale: vs.scale,
                    opacity: vs.opacity,
                };
            }

            // --- Rendering ---
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#1a1a3e');
                grad.addColorStop(0.5, '#0f0f28');
                grad.addColorStop(1, '#0a0a1c');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // Subtle stars
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                const starSeed = 12345;
                for (let i = 0; i < 60; i++) {
                    const sx = ((i * 7919 + starSeed) % W);
                    const sy = ((i * 6271 + starSeed) % H);
                    const sr = 1 + ((i * 3571) % 3);
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawGridBackground() {
                // Grid shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.roundRect(GRID_X - 4, GRID_Y - 4, COLS * CELL_SIZE + 8, ROWS * CELL_SIZE + 8, 14);
                ctx.fill();

                // Grid background
                const gridGrad = ctx.createLinearGradient(GRID_X, GRID_Y, GRID_X, GRID_Y + ROWS * CELL_SIZE);
                gridGrad.addColorStop(0, '#1c1c3a');
                gridGrad.addColorStop(1, '#14142d');
                ctx.fillStyle = gridGrad;
                ctx.beginPath();
                ctx.roundRect(GRID_X, GRID_Y, COLS * CELL_SIZE, ROWS * CELL_SIZE, 12);
                ctx.fill();

                // Cell backgrounds
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cx = GRID_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const cy = GRID_Y + r * CELL_SIZE + CELL_SIZE / 2;
                        ctx.fillStyle = 'rgba(255,255,255,0.03)';
                        ctx.beginPath();
                        ctx.roundRect(cx - GEM_RADIUS - 2, cy - GEM_RADIUS - 2, (GEM_RADIUS + 2) * 2, (GEM_RADIUS + 2) *
                            2, 8);
                        ctx.fill();
                    }
                }
            }

            function drawGem(r, c, typeOverride) {
                const type = typeOverride !== undefined ? typeOverride : board[r][c];
                if (type === -1) return;
                const pos = getGemVisualPos(r, c);
                if (pos.opacity <= 0.01 && pos.scale <= 0.01) return;

                ctx.save();
                ctx.globalAlpha = pos.opacity;
                ctx.translate(pos.x, pos.y);
                ctx.scale(pos.scale, pos.scale);

                const color = GEM_COLORS[type];
                const lightColor = GEM_LIGHT[type];
                const darkColor = GEM_DARK[type];
                const glowColor = GEM_GLOW[type];

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath();
                ctx.arc(2, 3, GEM_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // Main gem body
                const grad = ctx.createRadialGradient(-GEM_RADIUS * 0.3, -GEM_RADIUS * 0.35, GEM_RADIUS * 0.1,
                    GEM_RADIUS * 0.15, GEM_RADIUS * 0.2, GEM_RADIUS * 1.1);
                grad.addColorStop(0, lightColor);
                grad.addColorStop(0.5, color);
                grad.addColorStop(1, darkColor);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, GEM_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // Inner glow
                const innerGlow = ctx.createRadialGradient(0, 0, GEM_RADIUS * 0.4, 0, 0, GEM_RADIUS);
                innerGlow.addColorStop(0, 'rgba(255,255,255,0.25)');
                innerGlow.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = innerGlow;
                ctx.beginPath();
                ctx.arc(0, 0, GEM_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // Shine highlight
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.ellipse(-GEM_RADIUS * 0.35, -GEM_RADIUS * 0.4, GEM_RADIUS * 0.35, GEM_RADIUS * 0.25, -0.4, 0, Math.PI *
                    2);
                ctx.fill();

                // Small bright spot
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(-GEM_RADIUS * 0.3, -GEM_RADIUS * 0.45, GEM_RADIUS * 0.12, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawSelectionIndicator() {
                if (!selectedCell || phase !== 'idle') return;
                const { row, col } = selectedCell;
                const center = getCellCenter(row, col);
                const pulse = Math.sin(timePulse * 5) * 0.3 + 0.7;
                const alpha = 0.6 + pulse * 0.4;

                ctx.save();
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 3 + pulse;
                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                ctx.shadowBlur = 12 + pulse * 8;
                ctx.beginPath();
                ctx.arc(center.x, center.y, GEM_RADIUS + 5, 0, Math.PI * 2);
                ctx.stroke();

                // Inner ring
                ctx.strokeStyle = `rgba(255,255,255,${alpha*0.5})`;
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(center.x, center.y, GEM_RADIUS + 10, 0, Math.PI * 2);
                ctx.setLineDash([6, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            function drawUI() {
                // Title
                ctx.save();
                const titleGrad = ctx.createLinearGradient(W / 2 - 80, 20, W / 2 + 80, 70);
                titleGrad.addColorStop(0, '#ffd700');
                titleGrad.addColorStop(0.5, '#fff8dc');
                titleGrad.addColorStop(1, '#ffb800');
                ctx.fillStyle = titleGrad;
                ctx.font = 'bold 44px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,180,0,0.6)';
                ctx.shadowBlur = 20;
                ctx.fillText('MATCH X', W / 2, 58);
                ctx.shadowBlur = 0;
                ctx.restore();

                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`SCORE: ${score}`, 30, 100);

                // Timer
                const timerColor = timer <= 10 ? '#ff4757' : '#ffffff';
                const timerPulse = timer <= 10 ? Math.sin(timePulse * 8) * 0.3 + 0.7 : 1;
                ctx.fillStyle = timerColor;
                ctx.globalAlpha = timerPulse;
                ctx.textAlign = 'right';
                const timeStr = Math.ceil(timer).toString();
                ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
                ctx.fillText(`TIME: ${timeStr}s`, W - 30, 100);
                ctx.globalAlpha = 1;

                // Timer bar
                const barWidth = COLS * CELL_SIZE;
                const barX = GRID_X;
                const barY = GRID_Y - 10;
                const barH = 5;
                const frac = Math.max(0, timer / GAME_TIME);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.beginPath();
                ctx.roundRect(barX, barY, barWidth, barH, 3);
                ctx.fill();
                const barGrad = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
                barGrad.addColorStop(0, '#ff6b81');
                barGrad.addColorStop(0.5, '#ffa502');
                barGrad.addColorStop(1, '#2ed573');
                ctx.fillStyle = barGrad;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barWidth * frac, barH, 3);
                ctx.fill();
            }

            function drawGameOver() {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,255,255,0.5)';
                ctx.shadowBlur = 15;
                ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
                ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 10);

                // Restart button
                const btnX = W / 2 - 90;
                const btnY = H / 2 + 50;
                const btnW = 180;
                const btnH = 50;
                const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                btnGrad.addColorStop(0, '#6c5ce7');
                btnGrad.addColorStop(1, '#4834d4');
                ctx.fillStyle = btnGrad;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, 25);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
                ctx.fillText('PLAY AGAIN', W / 2, btnY + 33);

                // Store button bounds for click detection
                gameOverButtonBounds = { x: btnX, y: btnY, w: btnW, h: btnH };
            }
            let gameOverButtonBounds = null;

            function render() {
                ctx.clearRect(0, 0, W, H);
                drawBackground();
                drawGridBackground();

                // Draw all gems
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] !== -1) {
                            drawGem(r, c);
                        }
                    }
                }

                drawSelectionIndicator();
                drawParticles(ctx);
                drawFloatingTexts(ctx);
                drawUI();

                if (gameOver) {
                    drawGameOver();
                }
            }

            // --- Game Logic ---
            function startSwap(r1, c1, r2, c2) {
                phase = 'swapping';
                phaseTimer = SWAP_DURATION / 1000;
                phaseData = { r1, c1, r2, c2 };
                // Set target offsets
                const dx = (c2 - c1) * CELL_SIZE;
                const dy = (r2 - r1) * CELL_SIZE;
                visualStates[r1][c1].targetOffsetX = dx;
                visualStates[r1][c1].targetOffsetY = dy;
                visualStates[r2][c2].targetOffsetX = -dx;
                visualStates[r2][c2].targetOffsetY = -dy;
                sfxSwap();
            }

            function completeSwap() {
                const { r1, c1, r2, c2 } = phaseData;
                // Snap offsets
                visualStates[r1][c1].offsetX = visualStates[r1][c1].targetOffsetX;
                visualStates[r1][c1].offsetY = visualStates[r1][c1].targetOffsetY;
                visualStates[r2][c2].offsetX = visualStates[r2][c2].targetOffsetX;
                visualStates[r2][c2].offsetY = visualStates[r2][c2].targetOffsetY;

                // Swap board
                [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];

                // Reset offsets for swapped cells
                visualStates[r1][c1].offsetX = 0;
                visualStates[r1][c1].offsetY = 0;
                visualStates[r1][c1].targetOffsetX = 0;
                visualStates[r1][c1].targetOffsetY = 0;
                visualStates[r2][c2].offsetX = 0;
                visualStates[r2][c2].offsetY = 0;
                visualStates[r2][c2].targetOffsetX = 0;
                visualStates[r2][c2].targetOffsetY = 0;

                const matches = findMatches(board);
                if (matches.size > 0) {
                    startRemoving(matches);
                } else {
                    // Swap back
                    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
                    startSwapBack(r1, c1, r2, c2);
                }
            }

            function startSwapBack(r1, c1, r2, c2) {
                phase = 'swapping_back';
                phaseTimer = SWAP_BACK_DURATION / 1000;
                phaseData = { r1, c1, r2, c2 };
                const dx = (c2 - c1) * CELL_SIZE;
                const dy = (r2 - r1) * CELL_SIZE;
                visualStates[r1][c1].targetOffsetX = dx;
                visualStates[r1][c1].targetOffsetY = dy;
                visualStates[r2][c2].targetOffsetX = -dx;
                visualStates[r2][c2].targetOffsetY = -dy;
                visualStates[r1][c1].offsetX = 0;
                visualStates[r1][c1].offsetY = 0;
                visualStates[r2][c2].offsetX = 0;
                visualStates[r2][c2].offsetY = 0;
                sfxInvalid();
            }

            function completeSwapBack() {
                const { r1, c1, r2, c2 } = phaseData;
                visualStates[r1][c1].offsetX = 0;
                visualStates[r1][c1].offsetY = 0;
                visualStates[r1][c1].targetOffsetX = 0;
                visualStates[r1][c1].targetOffsetY = 0;
                visualStates[r2][c2].offsetX = 0;
                visualStates[r2][c2].offsetY = 0;
                visualStates[r2][c2].targetOffsetX = 0;
                visualStates[r2][c2].targetOffsetY = 0;
                phase = 'idle';
                phaseData = null;
                cascadeLevel = 0;
            }

            function startRemoving(matches) {
                phase = 'removing';
                phaseTimer = REMOVE_DURATION / 1000;
                phaseData = { matches };
                cascadeLevel++;
                const matchCount = matches.size;
                const baseScore = matchCount === 3 ? 30 : matchCount === 4 ? 60 : matchCount === 5 ? 100 : 100 + (
                    matchCount - 5) * 20;
                const bonus = cascadeLevel > 1 ? cascadeLevel : 1;
                score += baseScore * bonus;

                // Spawn particles and floating text
                const avgX = [];
                const avgY = [];
                for (const key of matches) {
                    const [r, c] = key.split(',').map(Number);
                    const center = getCellCenter(r, c);
                    avgX.push(center.x);
                    avgY.push(center.y);
                    spawnParticles(center.x, center.y, GEM_GLOW[board[r][c]], 14 + matchCount);
                    visualStates[r][c].targetScale = 0;
                    visualStates[r][c].targetOpacity = 0;
                }
                const cx = avgX.reduce((a, b) => a + b, 0) / avgX.length;
                const cy = avgY.reduce((a, b) => a + b, 0) / avgY.length;
                const comboText = cascadeLevel > 1 ? `COMBO x${cascadeLevel}!` : matchCount >= 5 ? 'AMAZING!' : matchCount >=
                    4 ? 'GREAT!' : 'NICE!';
                spawnFloatingText(cx, cy - 15, `+${baseScore*bonus}`, '#ffd700');
                if (cascadeLevel > 1 || matchCount >= 4) {
                    spawnFloatingText(cx, cy - 40, comboText, '#ff6bff');
                }
                sfxMatch(cascadeLevel);
            }

            function completeRemoving() {
                const { matches } = phaseData;
                // Remove matched gems from board
                for (const key of matches) {
                    const [r, c] = key.split(',').map(Number);
                    board[r][c] = -1;
                    visualStates[r][c].scale = 0;
                    visualStates[r][c].opacity = 0;
                    visualStates[r][c].targetScale = 0;
                    visualStates[r][c].targetOpacity = 0;
                }
                // Apply gravity
                const gravityData = applyGravity(board);
                startFalling(gravityData);
            }

            function startFalling(gravityData) {
                phase = 'falling';
                phaseTimer = FALL_DURATION / 1000;
                phaseData = { gravityData };
                // Set up fall animations
                for (const colData of gravityData) {
                    const c = colData.col;
                    for (const move of colData.moves) {
                        const { fromR, toR, isNew } = move;
                        const vs = visualStates[toR][c];
                        const startOffsetY = (fromR - toR) * CELL_SIZE;
                        vs.offsetY = startOffsetY;
                        vs.targetOffsetY = 0;
                        vs.fallFromR = fromR;
                        vs.scale = 1;
                        vs.targetScale = 1;
                        vs.opacity = 1;
                        vs.targetOpacity = 1;
                        if (isNew) {
                            vs.offsetY = startOffsetY;
                            vs.targetOffsetY = 0;
                        }
                    }
                }
            }

            function completeFalling() {
                // Snap all offsets to 0
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        visualStates[r][c].offsetY = 0;
                        visualStates[r][c].targetOffsetY = 0;
                        visualStates[r][c].fallFromR = null;
                    }
                }
                // Check for new matches
                const newMatches = findMatches(board);
                if (newMatches.size > 0) {
                    startRemoving(newMatches);
                } else {
                    phase = 'idle';
                    phaseData = null;
                    cascadeLevel = 0;
                    // Check for valid moves
                    if (!hasValidMoves(board)) {
                        board = createBoard();
                        board = removeInitialMatches(board);
                        resetVisualOffsets();
                        spawnFloatingText(W / 2, GRID_Y + ROWS * CELL_SIZE / 2, 'SHUFFLED!', '#ffd700');
                    }
                }
            }

            function handleClick(px, py) {
                initAudio();

                if (gameOver) {
                    if (gameOverButtonBounds) {
                        const b = gameOverButtonBounds;
                        if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
                            initGame();
                        }
                    }
                    return;
                }

                if (phase !== 'idle') return;

                const gridPos = getGridFromPos(px, py);
                if (!gridPos) return;
                const { row, col } = gridPos;
                if (board[row][col] === -1) return;

                if (!selectedCell) {
                    selectedCell = { row, col };
                    sfxSelect();
                } else if (selectedCell.row === row && selectedCell.col === col) {
                    selectedCell = null;
                } else if (
                    Math.abs(selectedCell.row - row) + Math.abs(selectedCell.col - col) === 1
                ) {
                    const sr = selectedCell.row;
                    const sc = selectedCell.col;
                    selectedCell = null;
                    startSwap(sr, sc, row, col);
                } else {
                    selectedCell = { row, col };
                    sfxSelect();
                }
            }

            // --- Event Listeners ---
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                const px = (e.clientX - rect.left) * scaleX;
                const py = (e.clientY - rect.top) * scaleY;
                handleClick(px, py);
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                const touch = e.touches[0];
                const px = (touch.clientX - rect.left) * scaleX;
                const py = (touch.clientY - rect.top) * scaleY;
                handleClick(px, py);
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });

            // --- Game Loop ---
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.1) dt = 0.1; // Cap to avoid jumps
                lastTime = timestamp;

                timePulse += dt;

                if (!gameOver) {
                    // Update timer
                    timer -= dt;
                    if (timer <= 0) {
                        timer = 0;
                        gameOver = true;
                        phase = 'idle';
                        selectedCell = null;
                        sfxGameOver();
                    }
                }

                // Update phase animations
                if (phase !== 'idle' && !gameOver) {
                    phaseTimer -= dt;
                    const totalDuration = phase === 'swapping' ? SWAP_DURATION / 1000 :
                        phase === 'removing' ? REMOVE_DURATION / 1000 :
                        phase === 'falling' ? FALL_DURATION / 1000 :
                        phase === 'swapping_back' ? SWAP_BACK_DURATION / 1000 : 0.3;
                    const progress = Math.min(1, Math.max(0, 1 - phaseTimer / totalDuration));

                    if (phase === 'swapping' || phase === 'swapping_back') {
                        const { r1, c1, r2, c2 } = phaseData;
                        const dx = (c2 - c1) * CELL_SIZE;
                        const dy = (r2 - r1) * CELL_SIZE;
                        if (phase === 'swapping') {
                            visualStates[r1][c1].offsetX = dx * progress;
                            visualStates[r1][c1].offsetY = dy * progress;
                            visualStates[r2][c2].offsetX = -dx * progress;
                            visualStates[r2][c2].offsetY = -dy * progress;
                        } else {
                            visualStates[r1][c1].offsetX = dx * (1 - progress);
                            visualStates[r1][c1].offsetY = dy * (1 - progress);
                            visualStates[r2][c2].offsetX = -dx * (1 - progress);
                            visualStates[r2][c2].offsetY = -dy * (1 - progress);
                        }
                    } else if (phase === 'removing') {
                        for (const key of phaseData.matches) {
                            const [r, c] = key.split(',').map(Number);
                            const vs = visualStates[r][c];
                            vs.scale = 1 - progress;
                            vs.opacity = 1 - progress;
                        }
                    } else if (phase === 'falling') {
                        for (const colData of phaseData.gravityData) {
                            const c = colData.col;
                            for (const move of colData.moves) {
                                const { toR, fromR } = move;
                                const vs = visualStates[toR][c];
                                const startOffsetY = (fromR - toR) * CELL_SIZE;
                                vs.offsetY = startOffsetY * (1 - progress);
                            }
                        }
                    }

                    // Check phase completion
                    if (phaseTimer <= 0) {
                        if (phase === 'swapping') completeSwap();
                        else if (phase === 'removing') completeRemoving();
                        else if (phase === 'falling') completeFalling();
                        else if (phase === 'swapping_back') completeSwapBack();
                    }
                }

                // Update particles and floating texts
                updateParticles(dt);
                updateFloatingTexts(dt);

                // Render
                render();

                requestAnimationFrame(gameLoop);
            }

            // --- Initialize ---
            initGame();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);

            console.log('🎮 Match X ready! Match gems to score points. 60 seconds on the clock!');
        })();
    </script>
