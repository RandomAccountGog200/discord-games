<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Big Needy Blob</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            cursor: default;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // ---- Canvas Sizing ----
            function resizeCanvas() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                return { w, h };
            }
            let { w: W, h: H } = resizeCanvas();
            window.addEventListener('resize', () => {
                const dim = resizeCanvas();
                W = dim.w;
                H = dim.h;
                // Reposition blob and basket on resize
                blob.x = W / 2;
                blob.y = H * 0.28;
                blob.baseRadius = Math.min(W, H) * 0.11;
                basket.x = W / 2;
                basket.y = H * 0.82;
                basket.targetX = W / 2;
                basket.width = Math.min(W, H) * 0.2;
                basket.height = basket.width * 0.5;
                if (state === 'menu' || state === 'gameover') {
                    basket.x = W / 2;
                    basket.targetX = W / 2;
                }
            });

            // ---- Audio ----
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'sine', volume = 0.12, detune = 0) {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);
                if (detune) osc.detune.setValueAtTime(detune, now);
                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + duration);
            }

            function sfxCatchGood() {
                playTone(600, 0.15, 'sine', 0.13);
                setTimeout(() => playTone(900, 0.12, 'sine', 0.1), 100);
            }

            function sfxCatchBad() {
                playTone(150, 0.3, 'sawtooth', 0.15);
                playTone(100, 0.35, 'triangle', 0.12);
            }

            function sfxCatchPowerup() {
                playTone(500, 0.1, 'sine', 0.12);
                setTimeout(() => playTone(700, 0.1, 'sine', 0.12), 80);
                setTimeout(() => playTone(1000, 0.15, 'sine', 0.14), 160);
            }

            function sfxMissGood() {
                playTone(300, 0.2, 'triangle', 0.08);
                setTimeout(() => playTone(200, 0.25, 'triangle', 0.07), 150);
            }

            function sfxGameOver() {
                playTone(250, 0.4, 'sawtooth', 0.18);
                setTimeout(() => playTone(150, 0.5, 'triangle', 0.16), 300);
                setTimeout(() => playTone(80, 0.7, 'sine', 0.14), 600);
            }

            function sfxClick() {
                playTone(800, 0.08, 'sine', 0.1);
            }

            // ---- Game State ----
            let state = 'menu'; // 'menu' | 'playing' | 'gameover'
            let score = 0;
            let highScore = 0;
            let combo = 0;
            let comboTimer = 0;
            let maxCombo = 0;
            let timeSurvived = 0;
            let level = 1;
            let shakeMagnitude = 0;
            let shakeDecay = 8;

            // Load high score
            try {
                const saved = localStorage.getItem('bigNeedyBlob_highScore');
                if (saved) highScore = parseInt(saved, 10) || 0;
            } catch (e) {}

            // ---- Blob ----
            const blob = {
                x: W / 2,
                y: H * 0.28,
                baseRadius: Math.min(W, H) * 0.11,
                hunger: 100,
                happiness: 100,
                eyeX: 0,
                eyeY: 0,
                bouncePhase: 0,
                eatAnim: 0,
                hurtAnim: 0,
                blinkTimer: 3 + Math.random() * 3,
                blinkFrame: 0,
                squish: 1.0,
            };

            // ---- Basket ----
            const basket = {
                x: W / 2,
                y: H * 0.82,
                targetX: W / 2,
                width: Math.min(W, H) * 0.2,
                height: Math.min(W, H) * 0.1,
                glowIntensity: 0,
            };

            // ---- Arrays ----
            let items = [];
            let particles = [];
            let floatingTexts = [];
            let feedParticles = [];

            // ---- Spawning ----
            let spawnTimer = 0;
            let spawnIntervalBase = 1.7;
            let itemSpeedBase = 200;

            // ---- Keyboard ----
            let keysPressed = { left: false, right: false };
            const KEY_MOVE_SPEED = 500;

            // ---- Helper Functions ----
            function rand(min, max) {
                return min + Math.random() * (max - min);
            }

            function randInt(min, max) {
                return Math.floor(rand(min, max + 1));
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            function dist(x1, y1, x2, y2) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                return Math.sqrt(dx * dx + dy * dy);
            }

            // ---- Reset Game ----
            function resetGame() {
                score = 0;
                combo = 0;
                comboTimer = 0;
                maxCombo = 0;
                timeSurvived = 0;
                level = 1;
                shakeMagnitude = 0;
                blob.hunger = 100;
                blob.happiness = 100;
                blob.eatAnim = 0;
                blob.hurtAnim = 0;
                blob.blinkTimer = 2 + Math.random() * 3;
                blob.blinkFrame = 0;
                blob.squish = 1.0;
                blob.x = W / 2;
                blob.y = H * 0.28;
                blob.baseRadius = Math.min(W, H) * 0.11;
                basket.x = W / 2;
                basket.targetX = W / 2;
                basket.glowIntensity = 0;
                items = [];
                particles = [];
                floatingTexts = [];
                feedParticles = [];
                spawnTimer = 0.8;
                spawnIntervalBase = 1.7;
                itemSpeedBase = 200;
            }

            // ---- Spawn Item ----
            function spawnItem() {
                const roll = Math.random();
                let type;
                if (roll < 0.38) type = 'food';
                else if (roll < 0.72) type = 'toy';
                else if (roll < 0.92) type = 'bad';
                else type = 'powerup';

                const x = rand(W * 0.1, W * 0.9);
                const speed = itemSpeedBase * rand(0.85, 1.25) * (1 + (level - 1) * 0.12);
                const radius = Math.min(W, H) * 0.04;

                let emoji;
                switch (type) {
                    case 'food':
                        emoji = ['🍔', '🍕', '🍩', '🍎', '🌮', '🧁', '🍗'][randInt(0, 6)];
                        break;
                    case 'toy':
                        emoji = ['⭐', '🎾', '🧸', '🎈', '🪀', '🎯', '💎'][randInt(0, 6)];
                        break;
                    case 'bad':
                        emoji = ['💣', '💀', '👾', '☠️', '🔥', '🦠'][randInt(0, 5)];
                        break;
                    case 'powerup':
                        emoji = ['❤️', '💖', '✨', '🌟'][randInt(0, 3)];
                        break;
                }

                items.push({
                    type,
                    emoji,
                    x,
                    y: -radius * 2,
                    radius,
                    speed,
                    wobbleAmp: rand(0, 25),
                    wobbleFreq: rand(2, 5),
                    wobblePhase: rand(0, Math.PI * 2),
                    rotation: 0,
                    rotSpeed: rand(-3, 3),
                });
            }

            // ---- Create Particles ----
            function burstParticles(x, y, count, color, spread = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = rand(0, Math.PI * 2);
                    const speed = rand(spread * 0.5, spread * 2);
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - rand(50, 200),
                        life: rand(0.4, 0.9),
                        maxLife: 0.9,
                        color,
                        radius: rand(3, 7),
                    });
                }
            }

            function createFeedParticle(startX, startY, targetX, targetY, emoji) {
                feedParticles.push({
                    x: startX,
                    y: startY,
                    startX,
                    startY,
                    targetX,
                    targetY,
                    progress: 0,
                    duration: rand(0.35, 0.55),
                    emoji,
                });
            }

            function addFloatingText(x, y, text, color) {
                floatingTexts.push({
                    x,
                    y,
                    text,
                    color,
                    life: 1.0,
                    vy: -80 - rand(0, 40),
                });
            }

            // ---- Update ----
            function update(dt) {
                if (state !== 'playing') {
                    // Still animate blob bounce in menu
                    blob.bouncePhase += dt * 3;
                    blob.squish = 1.0 + Math.sin(blob.bouncePhase) * 0.06;
                    blob.blinkTimer -= dt;
                    if (blob.blinkTimer <= 0) {
                        blob.blinkFrame = 0.08;
                        blob.blinkTimer = 2.5 + Math.random() * 4;
                    }
                    if (blob.blinkFrame > 0) blob.blinkFrame -= dt;
                    return;
                }

                // Clamp dt
                if (dt > 0.15) dt = 0.15;
                if (dt <= 0) return;

                timeSurvived += dt;

                // Level up every 25 seconds
                const newLevel = Math.floor(timeSurvived / 25) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    spawnIntervalBase = Math.max(0.6, 1.7 - (level - 1) * 0.13);
                    itemSpeedBase = 200 + (level - 1) * 18;
                    burstParticles(blob.x, blob.y, 25, '#ffff88', 5);
                    addFloatingText(blob.x, blob.y - 50, 'LEVEL ' + level, '#ffdd57');
                }

                // Hunger & happiness decay
                const hungerDecay = (1.5 + (level - 1) * 0.25) * dt;
                const happinessDecay = (1.0 + (level - 1) * 0.18) * dt;
                blob.hunger = clamp(blob.hunger - hungerDecay, 0, 100);
                blob.happiness = clamp(blob.happiness - happinessDecay, 0, 100);

                // Update basket position
                if (keysPressed.left) basket.targetX -= KEY_MOVE_SPEED * dt;
                if (keysPressed.right) basket.targetX += KEY_MOVE_SPEED * dt;
                basket.targetX = clamp(basket.targetX, basket.width / 2, W - basket.width / 2);
                basket.x = lerp(basket.x, basket.targetX, 1 - Math.exp(-25 * dt));
                basket.glowIntensity = lerp(basket.glowIntensity, 0.3, 1 - Math.exp(-3 * dt));

                // Update blob eye tracking
                blob.eyeX = lerp(blob.eyeX, (basket.x - blob.x) * 0.03, 1 - Math.exp(-8 * dt));
                blob.eyeY = lerp(blob.eyeY, (basket.y - blob.y) * 0.025 + 5, 1 - Math.exp(-8 * dt));

                // Blob animations
                blob.eatAnim = Math.max(0, blob.eatAnim - dt);
                blob.hurtAnim = Math.max(0, blob.hurtAnim - dt);
                blob.squish = lerp(blob.squish, 1.0, 1 - Math.exp(-10 * dt));
                blob.blinkTimer -= dt;
                if (blob.blinkTimer <= 0) {
                    blob.blinkFrame = 0.08;
                    blob.blinkTimer = 2.5 + Math.random() * 4;
                }
                if (blob.blinkFrame > 0) blob.blinkFrame -= dt;

                // Shake decay
                shakeMagnitude = Math.max(0, shakeMagnitude - shakeDecay * dt);

                // Combo timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        combo = 0;
                    }
                }

                // Spawn items
                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    spawnItem();
                    spawnTimer = spawnIntervalBase * rand(0.7, 1.4);
                    // Occasionally spawn double at higher levels
                    if (level >= 3 && Math.random() < 0.25) {
                        setTimeout(() => {
                            if (state === 'playing') spawnItem();
                        }, rand(150, 400));
                    }
                }

                // Update items
                for (let i = items.length - 1; i >= 0; i--) {
                    const item = items[i];
                    item.y += item.speed * dt;
                    item.wobblePhase += item.wobbleFreq * dt;
                    item.x += Math.sin(item.wobblePhase) * item.wobbleAmp * dt;
                    item.rotation += item.rotSpeed * dt;
                    item.x = clamp(item.x, item.radius, W - item.radius);

                    // Check collision with basket
                    const bx = basket.x;
                    const by = basket.y;
                    const bw = basket.width;
                    const bh = basket.height;
                    const catchMargin = item.radius + bh * 0.4;

                    if (item.y + item.radius > by - bh / 2 &&
                        item.y - item.radius < by + bh / 2 + catchMargin &&
                        Math.abs(item.x - bx) < bw / 2 + item.radius * 0.7) {

                        // Caught!
                        handleItemCatch(item);
                        items.splice(i, 1);
                        continue;
                    }

                    // Missed (off screen bottom)
                    if (item.y > H + item.radius * 3) {
                        if (item.type === 'food' || item.type === 'toy') {
                            blob.happiness = clamp(blob.happiness - 5, 0, 100);
                            sfxMissGood();
                            addFloatingText(item.x, H - 30, '😢 -5', '#ff9999');
                            combo = 0;
                            comboTimer = 0;
                        } else if (item.type === 'bad') {
                            // Relieved! Small happiness boost
                            blob.happiness = clamp(blob.happiness + 3, 0, 100);
                            addFloatingText(item.x, H - 30, '😅 +3', '#aaddaa');
                        }
                        items.splice(i, 1);
                        continue;
                    }

                    // Off screen sides (rare due to clamp, but clean up)
                    if (item.x < -50 || item.x > W + 50 || item.y < -100) {
                        items.splice(i, 1);
                    }
                }

                // Update feed particles
                for (let i = feedParticles.length - 1; i >= 0; i--) {
                    const fp = feedParticles[i];
                    fp.progress += dt / fp.duration;
                    if (fp.progress >= 1) {
                        // Apply effect
                        if (fp.emoji) {
                            // Trigger blob eat animation
                            blob.eatAnim = 0.35;
                            blob.squish = 1.25;
                            burstParticles(fp.targetX, fp.targetY, 8, '#ffffff', 1.5);
                        }
                        feedParticles.splice(i, 1);
                        continue;
                    }
                    const t = fp.progress;
                    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    fp.x = lerp(fp.startX, fp.targetX, ease);
                    fp.y = lerp(fp.startY, fp.targetY, ease) - Math.sin(t * Math.PI) * 60;
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 120 * dt; // gravity
                    p.life -= dt;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                // Update floating texts
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.y += ft.vy * dt;
                    ft.vy *= 0.99;
                    ft.life -= dt * 1.2;
                    if (ft.life <= 0) {
                        floatingTexts.splice(i, 1);
                    }
                }

                // Check game over
                if (blob.hunger <= 0 || blob.happiness <= 0) {
                    state = 'gameover';
                    sfxGameOver();
                    shakeMagnitude = 20;
                    blob.hurtAnim = 1.5;
                    if (score > highScore) {
                        highScore = score;
                        try { localStorage.setItem('bigNeedyBlob_highScore', highScore); } catch (e) {}
                    }
                    burstParticles(blob.x, blob.y, 35, '#ff4444', 6);
                }
            }

            function handleItemCatch(item) {
                const bx = basket.x;
                const by = basket.y;
                basket.glowIntensity = 1.5;

                switch (item.type) {
                    case 'food':
                        blob.hunger = clamp(blob.hunger + rand(18, 28), 0, 100);
                        combo++;
                        comboTimer = 2.5;
                        if (combo > maxCombo) maxCombo = combo;
                        const foodScore = Math.floor(10 * (1 + Math.min(combo - 1, 5) * 0.2));
                        score += foodScore;
                        sfxCatchGood();
                        burstParticles(bx, by - 15, 10, '#ffbb33', 2.5);
                        addFloatingText(bx, by - 25, '+' + foodScore, '#ffbb33');
                        if (combo > 1 && combo % 5 === 0) {
                            addFloatingText(bx, by - 50, '🔥 x' + combo, '#ff8800');
                        }
                        createFeedParticle(bx, by - 15, blob.x, blob.y - blob.baseRadius * 0.8, item.emoji);
                        break;

                    case 'toy':
                        blob.happiness = clamp(blob.happiness + rand(18, 28), 0, 100);
                        combo++;
                        comboTimer = 2.5;
                        if (combo > maxCombo) maxCombo = combo;
                        const toyScore = Math.floor(10 * (1 + Math.min(combo - 1, 5) * 0.2));
                        score += toyScore;
                        sfxCatchGood();
                        burstParticles(bx, by - 15, 10, '#66ccff', 2.5);
                        addFloatingText(bx, by - 25, '+' + toyScore, '#66ccff');
                        if (combo > 1 && combo % 5 === 0) {
                            addFloatingText(bx, by - 50, '✨ x' + combo, '#66aaff');
                        }
                        createFeedParticle(bx, by - 15, blob.x, blob.y - blob.baseRadius * 0.8, item.emoji);
                        break;

                    case 'bad':
                        blob.hunger = clamp(blob.hunger - rand(22, 32), 0, 100);
                        blob.happiness = clamp(blob.happiness - rand(22, 32), 0, 100);
                        score = Math.max(0, score - 20);
                        combo = 0;
                        comboTimer = 0;
                        blob.hurtAnim = 0.5;
                        blob.squish = 0.7;
                        shakeMagnitude = 12;
                        sfxCatchBad();
                        burstParticles(bx, by, 18, '#ff3333', 4);
                        addFloatingText(bx, by - 25, '-20 💥', '#ff4444');
                        break;

                    case 'powerup':
                        blob.hunger = clamp(blob.hunger + rand(30, 45), 0, 100);
                        blob.happiness = clamp(blob.happiness + rand(30, 45), 0, 100);
                        score += 50;
                        combo += 2;
                        comboTimer = 3;
                        if (combo > maxCombo) maxCombo = combo;
                        sfxCatchPowerup();
                        burstParticles(bx, by - 15, 20, '#ffddff', 4);
                        burstParticles(bx, by - 15, 12, '#ffffaa', 3);
                        addFloatingText(bx, by - 30, '+50 💖', '#ff88cc');
                        createFeedParticle(bx, by - 15, blob.x, blob.y - blob.baseRadius * 0.8, '❤️');
                        break;
                }
            }

            // ---- Drawing ----
            function drawBackground() {
                // Sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
                skyGrad.addColorStop(0, '#1a0533');
                skyGrad.addColorStop(0.4, '#2d1b69');
                skyGrad.addColorStop(0.7, '#1e3a5f');
                skyGrad.addColorStop(1, '#0d1b2a');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, H);

                // Stars
                const starCount = Math.floor(W * H / 3000);
                for (let i = 0; i < starCount; i++) {
                    const sx = (i * 137.5 + 42) % W;
                    const sy = (i * 97.3 + 17) % (H * 0.7);
                    const twinkle = 0.4 + 0.6 * Math.sin(timeSurvived * 3 + i * 12.7);
                    ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.7})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, rand(0.6, 1.6), 0, Math.PI * 2);
                    ctx.fill();
                }

                // Ground glow
                const groundGrad = ctx.createRadialGradient(W / 2, H * 0.82, W * 0.05, W / 2, H * 0.82, W * 0.6);
                groundGrad.addColorStop(0, 'rgba(100,80,180,0.15)');
                groundGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, H * 0.5, W, H * 0.5);
            }

            function drawBlob() {
                const bx = blob.x;
                const by = blob.y;
                const r = blob.baseRadius * blob.squish;
                const hurt = blob.hurtAnim;
                const eat = blob.eatAnim;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.ellipse(bx, by + r * 0.85, r * 0.8, r * 0.15, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body glow
                const bodyGlow = ctx.createRadialGradient(bx, by - r * 0.3, r * 0.3, bx, by, r * 1.4);
                bodyGlow.addColorStop(0, 'rgba(255,180,220,0.5)');
                bodyGlow.addColorStop(0.6, 'rgba(255,100,170,0.2)');
                bodyGlow.addColorStop(1, 'rgba(255,50,120,0)');
                ctx.fillStyle = bodyGlow;
                ctx.beginPath();
                ctx.arc(bx, by, r * 1.4, 0, Math.PI * 2);
                ctx.fill();

                // Main body
                const bodyGrad = ctx.createRadialGradient(bx - r * 0.25, by - r * 0.35, r * 0.1, bx, by, r);
                bodyGrad.addColorStop(0, '#ffc8e0');
                bodyGrad.addColorStop(0.35, '#ff8ec4');
                bodyGrad.addColorStop(0.75, '#e855a0');
                bodyGrad.addColorStop(1, '#c73a7a');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(bx, by, r, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                const hlGrad = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.4, r * 0.05, bx, by, r);
                hlGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
                hlGrad.addColorStop(0.5, 'rgba(255,255,255,0.1)');
                hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = hlGrad;
                ctx.beginPath();
                ctx.arc(bx, by, r, 0, Math.PI * 2);
                ctx.fill();

                // Ears / bumps
                for (const side of [-1, 1]) {
                    const earX = bx + side * r * 0.7;
                    const earY = by - r * 0.85;
                    const earR = r * 0.22;
                    const earGrad = ctx.createRadialGradient(earX - earR * 0.2, earY - earR * 0.3, earR * 0.1, earX, earY, earR);
                    earGrad.addColorStop(0, '#ffd0e8');
                    earGrad.addColorStop(1, '#d05090');
                    ctx.fillStyle = earGrad;
                    ctx.beginPath();
                    ctx.arc(earX, earY, earR, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Cheeks (blush)
                for (const side of [-1, 1]) {
                    const cheekX = bx + side * r * 0.55;
                    const cheekY = by + r * 0.2;
                    const cheekR = r * 0.18;
                    ctx.fillStyle = 'rgba(255,100,130,0.4)';
                    ctx.beginPath();
                    ctx.arc(cheekX, cheekY, cheekR, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Eyes
                const eyeSpacing = r * 0.32;
                const eyeY = by - r * 0.15;
                const eyeRX = r * 0.2;
                const eyeRY = r * 0.26;

                for (const side of [-1, 1]) {
                    const eyeX = bx + side * eyeSpacing;
                    const lookX = clamp(blob.eyeX, -eyeRX * 0.4, eyeRX * 0.4);
                    const lookY = clamp(blob.eyeY, -eyeRY * 0.35, eyeRY * 0.35);

                    // Eye white
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.ellipse(eyeX, eyeY, eyeRX, eyeRY, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Blink
                    if (blob.blinkFrame > 0) {
                        ctx.fillStyle = '#c73a7a';
                        ctx.fillRect(eyeX - eyeRX - 1, eyeY - 2, eyeRX * 2 + 2, 4);
                    } else {
                        // Pupil
                        const pupilX = eyeX + lookX;
                        const pupilY = eyeY + lookY;
                        const pupilR = eyeRX * 0.55;
                        ctx.fillStyle = '#1a0a2e';
                        ctx.beginPath();
                        ctx.arc(pupilX, pupilY, pupilR, 0, Math.PI * 2);
                        ctx.fill();

                        // Catchlight
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(pupilX - pupilR * 0.3, pupilY - pupilR * 0.4, pupilR * 0.35, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Eye outline
                    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(eyeX, eyeY, eyeRX, eyeRY, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Eyebrows (express emotion)
                const browY = eyeY - eyeRY - r * 0.08;
                ctx.strokeStyle = 'rgba(60,0,30,0.5)';
                ctx.lineWidth = r * 0.06;
                ctx.lineCap = 'round';
                for (const side of [-1, 1]) {
                    const browX = bx + side * eyeSpacing;
                    ctx.beginPath();
                    if (blob.happiness < 25 || hurt > 0.3) {
                        // Angry/sad brows (angled down toward center)
                        ctx.moveTo(browX - side * eyeRX * 0.8, browY - eyeRY * 0.2);
                        ctx.lineTo(browX + side * eyeRX * 0.6, browY + eyeRY * 0.25);
                    } else if (blob.hunger < 25) {
                        // Worried brows
                        ctx.moveTo(browX - side * eyeRX * 0.7, browY + eyeRY * 0.1);
                        ctx.lineTo(browX + side * eyeRX * 0.5, browY - eyeRY * 0.15);
                    } else {
                        // Happy/neutral brows
                        ctx.moveTo(browX - eyeRX * 0.7, browY);
                        ctx.lineTo(browX + eyeRX * 0.7, browY - eyeRY * 0.05);
                    }
                    ctx.stroke();
                }

                // Mouth
                const mouthY = by + r * 0.25;
                ctx.strokeStyle = 'rgba(60,0,30,0.55)';
                ctx.lineWidth = r * 0.07;
                ctx.lineCap = 'round';
                ctx.beginPath();

                if (eat > 0.1) {
                    // Open mouth (eating)
                    const openR = r * 0.2;
                    ctx.fillStyle = 'rgba(30,0,15,0.7)';
                    ctx.beginPath();
                    ctx.arc(bx, mouthY + openR * 0.3, openR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(60,0,30,0.5)';
                    ctx.beginPath();
                    ctx.arc(bx, mouthY + openR * 0.3, openR, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (blob.happiness < 15 || blob.hunger < 15) {
                    // Sad mouth
                    ctx.arc(bx, mouthY + r * 0.3, r * 0.22, Math.PI * 0.15, Math.PI * 0.85);
                    ctx.stroke();
                } else if (blob.happiness > 60 && blob.hunger > 50) {
                    // Happy smile
                    ctx.arc(bx, mouthY, r * 0.22, 0.1 * Math.PI, 0.9 * Math.PI);
                    ctx.stroke();
                } else {
                    // Neutral slight smile
                    ctx.arc(bx, mouthY + r * 0.05, r * 0.18, 0.2 * Math.PI, 0.8 * Math.PI);
                    ctx.stroke();
                }

                // If hurt, add a small bandage or red mark
                if (hurt > 0.1) {
                    const hurtAlpha = Math.min(1, hurt * 2);
                    ctx.fillStyle = `rgba(255,60,60,${hurtAlpha * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(bx + r * 0.3, by - r * 0.6, r * 0.12, 0, Math.PI * 2);
                    ctx.fill();
                    // X eyes effect
                    for (const side of [-1, 1]) {
                        const hx = bx + side * eyeSpacing;
                        ctx.strokeStyle = `rgba(255,50,50,${hurtAlpha})`;
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(hx - 6, eyeY - 6);
                        ctx.lineTo(hx + 6, eyeY + 6);
                        ctx.moveTo(hx + 6, eyeY - 6);
                        ctx.lineTo(hx - 6, eyeY + 6);
                        ctx.stroke();
                    }
                }
            }

            function drawBasket() {
                const bx = basket.x;
                const by = basket.y;
                const bw = basket.width;
                const bh = basket.height;
                const glowAlpha = 0.2 + basket.glowIntensity * 0.35;

                // Glow
                const glowGrad = ctx.createRadialGradient(bx, by, bh * 0.3, bx, by, bw * 0.9);
                glowGrad.addColorStop(0, `rgba(255,210,100,${glowAlpha})`);
                glowGrad.addColorStop(1, 'rgba(255,150,30,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.roundRect(bx - bw / 2 - 15, by - bh / 2 - 10, bw + 30, bh + 20, bh);
                ctx.fill();

                // Basket body
                const basketGrad = ctx.createLinearGradient(bx, by - bh / 2, bx, by + bh / 2);
                basketGrad.addColorStop(0, '#ffcc55');
                basketGrad.addColorStop(0.5, '#f0a020');
                basketGrad.addColorStop(1, '#c07810');
                ctx.fillStyle = basketGrad;
                ctx.beginPath();
                ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, bh / 2);
                ctx.fill();

                // Rim highlight
                ctx.strokeStyle = 'rgba(255,230,180,0.9)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, bh / 2);
                ctx.stroke();

                // Inner shadow
                const innerGrad = ctx.createLinearGradient(bx, by - bh / 2, bx, by);
                innerGrad.addColorStop(0, 'rgba(0,0,0,0.15)');
                innerGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = innerGrad;
                ctx.beginPath();
                ctx.roundRect(bx - bw / 2 + 3, by - bh / 2 + 3, bw - 6, bh - 3, bh / 2);
                ctx.fill();

                // Center indicator dot
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(bx, by - bh * 0.15, bh * 0.22, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawItems() {
                const fontSize = Math.min(W, H) * 0.055;
                ctx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                for (const item of items) {
                    // Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillText(item.emoji, item.x + 2, item.y + 2);

                    // Item emoji
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(item.emoji, item.x, item.y);

                    // Type indicator glow
                    if (item.type === 'bad') {
                        const glowGrad = ctx.createRadialGradient(item.x, item.y, item.radius * 0.5, item.x, item.y,
                            item.radius * 1.5);
                        glowGrad.addColorStop(0, 'rgba(255,50,50,0.25)');
                        glowGrad.addColorStop(1, 'rgba(255,0,0,0)');
                        ctx.fillStyle = glowGrad;
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius * 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (item.type === 'powerup') {
                        const glowGrad = ctx.createRadialGradient(item.x, item.y, item.radius * 0.5, item.x, item.y,
                            item.radius * 2);
                        glowGrad.addColorStop(0, 'rgba(255,220,255,0.4)');
                        glowGrad.addColorStop(1, 'rgba(255,150,255,0)');
                        ctx.fillStyle = glowGrad;
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawFeedParticles() {
                const fontSize = Math.min(W, H) * 0.05;
                ctx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                for (const fp of feedParticles) {
                    const alpha = fp.progress < 0.2 ? fp.progress / 0.2 :
                        fp.progress > 0.8 ? (1 - fp.progress) / 0.2 :
                        1;
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.fillText(fp.emoji, fp.x, fp.y);
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    const alpha = clamp(p.life / p.maxLife, 0, 1);
                    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawFloatingTexts() {
                const fontSize = Math.min(W, H) * 0.04;
                ctx.font = `bold ${fontSize}px "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                for (const ft of floatingTexts) {
                    const alpha = clamp(ft.life, 0, 1);
                    ctx.fillStyle = ft.color.replace(')', `,${alpha})`);
                    if (ft.color.startsWith('#')) {
                        const hex = ft.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            function drawMeters() {
                const barWidth = Math.min(W * 0.38, 180);
                const barHeight = Math.min(H * 0.025, 20);
                const barX1 = W * 0.04;
                const barX2 = W * 0.96 - barWidth;
                const barY = H * 0.03;
                const cornerR = barHeight / 2;

                // Hunger meter (left)
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.roundRect(barX1 - 2, barY - 2, barWidth + 4, barHeight + 4, cornerR + 2);
                ctx.fill();

                const hungerFrac = blob.hunger / 100;
                const hungerGrad = ctx.createLinearGradient(barX1, 0, barX1 + barWidth, 0);
                hungerGrad.addColorStop(0, '#ff4444');
                hungerGrad.addColorStop(0.4, '#ffaa33');
                hungerGrad.addColorStop(0.7, '#ffdd44');
                hungerGrad.addColorStop(1, '#66dd44');
                ctx.fillStyle = hungerGrad;
                ctx.beginPath();
                ctx.roundRect(barX1, barY, barWidth * hungerFrac, barHeight, cornerR);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${barHeight*0.7}px "Segoe UI", sans-serif`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText('🍔', barX1 - barHeight * 1.5, barY + barHeight / 2);

                // Happiness meter (right)
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.roundRect(barX2 - 2, barY - 2, barWidth + 4, barHeight + 4, cornerR + 2);
                ctx.fill();

                const happyFrac = blob.happiness / 100;
                const happyGrad = ctx.createLinearGradient(barX2, 0, barX2 + barWidth, 0);
                happyGrad.addColorStop(0, '#cc44aa');
                happyGrad.addColorStop(0.5, '#ee66bb');
                happyGrad.addColorStop(1, '#ff88dd');
                ctx.fillStyle = happyGrad;
                ctx.beginPath();
                ctx.roundRect(barX2, barY, barWidth * happyFrac, barHeight, cornerR);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'right';
                ctx.fillText('💖', barX2 + barWidth + barHeight * 1.5, barY + barHeight / 2);

                // Score in center
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.min(W*0.045,22)}px "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('⭐ ' + score, W / 2, barY + barHeight / 2);

                // Level indicator
                ctx.fillStyle = '#ffccaa';
                ctx.font = `${Math.min(W*0.03,14)}px "Segoe UI", sans-serif`;
                ctx.fillText('Lv.' + level, W / 2, barY + barHeight + barHeight * 0.9);
            }

            function drawGameOverlay() {
                // Dim background
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);

                // Game over panel
                const panelW = Math.min(W * 0.8, 350);
                const panelH = Math.min(H * 0.35, 260);
                const panelX = W / 2 - panelW / 2;
                const panelY = H / 2 - panelH / 2;

                ctx.fillStyle = 'rgba(30,10,50,0.9)';
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 20);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,150,200,0.6)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 20);
                ctx.stroke();

                // Title
                ctx.fillStyle = '#ff88cc';
                ctx.font = `bold ${Math.min(W*0.06,28)}px "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over', W / 2, panelY + panelH * 0.2);

                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = `${Math.min(W*0.04,18)}px "Segoe UI", sans-serif`;
                ctx.fillText('Score: ' + score, W / 2, panelY + panelH * 0.42);
                ctx.fillText('Best: ' + highScore, W / 2, panelY + panelH * 0.55);
                ctx.fillText('Max Combo: ' + maxCombo + 'x', W / 2, panelY + panelH * 0.66);

                // Restart button
                const btnW = panelW * 0.55;
                const btnH = panelH * 0.18;
                const btnX = W / 2 - btnW / 2;
                const btnY = panelY + panelH * 0.78;
                const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                btnGrad.addColorStop(0, '#ff88cc');
                btnGrad.addColorStop(1, '#cc5599');
                ctx.fillStyle = btnGrad;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, btnH / 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.min(W*0.04,17)}px "Segoe UI", sans-serif`;
                ctx.fillText('🔄 Play Again', W / 2, btnY + btnH / 2);

                // Store button bounds for click detection
                canvas._restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
            }

            function drawMenuOverlay() {
                // Title
                const titleY = H * 0.12;
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.min(W*0.08,40)}px "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Big Needy Blob', W / 2, titleY);

                ctx.fillStyle = '#ffbbdd';
                ctx.font = `${Math.min(W*0.04,18)}px "Segoe UI", sans-serif`;
                ctx.fillText('The Hungry Monster', W / 2, titleY + Math.min(W * 0.07, 36));

                // Instructions
                const instrY = H * 0.62;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                const instrW = Math.min(W * 0.85, 380);
                const instrH = Math.min(H * 0.18, 130);
                ctx.beginPath();
                ctx.roundRect(W / 2 - instrW / 2, instrY - instrH / 2, instrW, instrH, 16);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = `${Math.min(W*0.035,16)}px "Segoe UI", sans-serif`;
                const lines = [
                    '🍔 Catch FOOD to feed the blob',
                    '⭐ Catch TOYS to keep it happy',
                    '💣 Avoid BOMBS and bad stuff!',
                    '👉 Move with mouse / touch / arrows',
                ];
                lines.forEach((line, i) => {
                    ctx.fillText(line, W / 2, instrY - instrH * 0.28 + i * Math.min(W * 0.04, 22));
                });

                // Start button
                const btnW = Math.min(W * 0.5, 220);
                const btnH = Math.min(H * 0.07, 50);
                const btnX = W / 2 - btnW / 2;
                const btnY = H * 0.78;
                const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                btnGrad.addColorStop(0, '#66dd88');
                btnGrad.addColorStop(1, '#33aa55');
                ctx.fillStyle = btnGrad;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, btnH / 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${Math.min(W*0.045,22)}px "Segoe UI", sans-serif`;
                ctx.fillText('▶  Tap to Play!', W / 2, btnY + btnH / 2);

                canvas._startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
            }

            // ---- Main Draw ----
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Apply shake
                let shakeX = 0;
                let shakeY = 0;
                if (shakeMagnitude > 0.1) {
                    shakeX = (Math.random() - 0.5) * shakeMagnitude * 2;
                    shakeY = (Math.random() - 0.5) * shakeMagnitude * 2;
                }
                ctx.save();
                ctx.translate(shakeX, shakeY);

                drawBackground();
                drawItems();
                drawFeedParticles();
                drawBlob();
                drawBasket();
                drawParticles();
                drawFloatingTexts();
                drawMeters();

                ctx.restore();

                // Overlays (not affected by shake)
                if (state === 'menu') {
                    drawMenuOverlay();
                } else if (state === 'gameover') {
                    drawGameOverlay();
                }

                // Combo display
                if (state === 'playing' && combo >= 3 && comboTimer > 0) {
                    const comboAlpha = Math.min(1, comboTimer / 1.5);
                    ctx.fillStyle = `rgba(255,200,50,${comboAlpha})`;
                    ctx.font = `bold ${Math.min(W*0.06,28)}px "Segoe UI", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('COMBO x' + combo, W / 2, H * 0.15);
                }
            }

            // ---- Game Loop ----
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                lastTime = timestamp;

                update(dt);
                draw();

                requestAnimationFrame(gameLoop);
            }

            // ---- Event Handlers ----
            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top,
                };
            }

            function handlePointerMove(x, y) {
                if (state === 'playing') {
                    basket.targetX = clamp(x, basket.width / 2, W - basket.width / 2);
                }
            }

            function handleClick(x, y) {
                initAudio();
                sfxClick();

                if (state === 'menu') {
                    // Check start button
                    const btn = canvas._startBtn;
                    if (btn && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                        state = 'playing';
                        resetGame();
                        lastTime = performance.now();
                    } else if (!btn || y > H * 0.5) {
                        // Tap anywhere to start
                        state = 'playing';
                        resetGame();
                        lastTime = performance.now();
                    }
                } else if (state === 'gameover') {
                    const btn = canvas._restartBtn;
                    if (btn && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                        state = 'playing';
                        resetGame();
                        lastTime = performance.now();
                    } else if (!btn || (x > W * 0.2 && x < W * 0.8 && y > H * 0.4 && y < H * 0.85)) {
                        state = 'playing';
                        resetGame();
                        lastTime = performance.now();
                    }
                } else if (state === 'playing') {
                    // Tap during play: could be used for powerup later, or just move basket
                    basket.targetX = clamp(x, basket.width / 2, W - basket.width / 2);
                }
            }

            canvas.addEventListener('mousemove', (e) => {
                const pos = getCanvasPos(e);
                handlePointerMove(pos.x, pos.y);
            });

            canvas.addEventListener('mousedown', (e) => {
                const pos = getCanvasPos(e);
                handleClick(pos.x, pos.y);
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const pos = getCanvasPos(e.touches[0]);
                handlePointerMove(pos.x, pos.y);
            }, { passive: false });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const pos = getCanvasPos(e.touches[0]);
                handlePointerMove(pos.x, pos.y);
                handleClick(pos.x, pos.y);
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                initAudio();
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    keysPressed.left = true;
                    e.preventDefault();
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    keysPressed.right = true;
                    e.preventDefault();
                }
                if (e.key === ' ' || e.key === 'Enter') {
                    if (state === 'menu') {
                        state = 'playing';
                        resetGame();
                        lastTime = performance.now();
                        sfxClick();
                    } else if (state === 'gameover') {
                        state = 'playing';
                        resetGame();
                        lastTime = performance.now();
                        sfxClick();
                    }
                    e.preventDefault();
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    keysPressed.left = false;
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    keysPressed.right = false;
                }
            });

            // Prevent scrolling on mobile
            document.addEventListener('gesturestart', (e) => e.preventDefault());
            document.addEventListener('gesturechange', (e) => e.preventDefault());
            document.addEventListener('gestureend', (e) => e.preventDefault());

            // ---- Initialize and Start ----
            resetGame();
            state = 'menu';
            blob.hunger = 100;
            blob.happiness = 100;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);

            console.log('🟣 Big Needy Blob ready!');
            console.log('   Feed the blob, keep it happy, avoid bombs!');
            console.log('   Mouse/Touch to move basket, Arrow keys also work.');
        })();
    </script>
</body>
</html>
