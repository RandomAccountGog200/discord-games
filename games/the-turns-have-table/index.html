<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THE TURNS HAVE TABLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            cursor: none;
        }
        #ui-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // --- Audio System ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(freq, duration, type = 'square', vol = 0.08, slide = 0) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {}
            }

            function playFlipSound() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(60, t);
                    osc.frequency.linearRampToValueAtTime(300, t + 0.15);
                    osc.frequency.linearRampToValueAtTime(40, t + 0.4);
                    gain.gain.setValueAtTime(0.15, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.4);
                } catch (e) {}
            }

            function playDeathSound() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, t);
                    osc.frequency.linearRampToValueAtTime(20, t + 0.6);
                    gain.gain.setValueAtTime(0.2, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.7);
                } catch (e) {}
            }

            function playNearMiss() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, t);
                    osc.frequency.linearRampToValueAtTime(1200, t + 0.08);
                    gain.gain.setValueAtTime(0.04, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.1);
                } catch (e) {}
            }

            function playSpawnSound() {
                playSound(40, 0.25, 'triangle', 0.06, -10);
            }

            // --- Resize ---
            function resize() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                return { w, h };
            }
            let screen = resize();
            window.addEventListener('resize', () => { screen = resize(); });

            // --- Game State ---
            const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
            let gameState = STATE.TITLE;
            let score = 0;
            let survivalTime = 0;
            let tablesFlipped = 0;
            let difficulty = 1;
            let shakeAmount = 0;
            let titleAlpha = 1;
            let titlePulse = 0;

            // --- Player ---
            const player = {
                x: screen.w / 2,
                y: screen.h / 2,
                radius: Math.min(screen.w, screen.h) * 0.035,
                speed: Math.min(screen.w, screen.h) * 0.35,
                vx: 0,
                vy: 0,
                flipCooldown: 0,
                flipCooldownMax: 1.8,
                trail: [],
                glowPhase: 0,
            };

            // --- Tables ---
            let tables = [];
            const tableSpawnRate = { current: 1.4, min: 0.35, decrease: 0.008 };

            // --- Particles ---
            let particles = [];
            const MAX_PARTICLES = 250;

            // --- Floating Texts ---
            let floatingTexts = [];

            // --- Shockwaves ---
            let shockwaves = [];

            // --- Input ---
            const keys = {};
            let mouseDown = false;
            let mouseX = 0,
                mouseY = 0;

            // Virtual joystick
            let joystickActive = false;
            let joystickId = null;
            let joystickOrigin = { x: 0, y: 0 };
            let joystickPos = { x: 0, y: 0 };
            const joystickRadius = 55;
            const joystickKnobRadius = 22;
            let joystickBaseX = 0;
            let joystickBaseY = 0;

            // Flip button (mobile)
            let flipButtonActive = false;
            let flipButtonId = null;
            let flipButtonX = 0;
            let flipButtonY = 0;
            const flipButtonRadius = 40;

            function updateJoystickPosition() {
                joystickBaseX = 85;
                joystickBaseY = screen.h - 95;
                flipButtonX = screen.w - 80;
                flipButtonY = screen.h - 95;
            }
            updateJoystickPosition();

            // --- Helper Functions ---
            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function dist(a, b, c, d) { return Math.sqrt((a - c) ** 2 + (b - d) ** 2); }

            function lerp(a, b, t) { return a + (b - a) * t; }

            function randRange(min, max) { return min + Math.random() * (max - min); }

            function randInt(min, max) { return Math.floor(randRange(min, max + 1)); }

            // --- Point in Rotated Rectangle ---
            function pointInRotatedRect(px, py, rx, ry, rw, rh, angle) {
                const cos = Math.cos(-angle);
                const sin = Math.sin(-angle);
                const dx = px - rx;
                const dy = py - ry;
                const localX = dx * cos - dy * sin;
                const localY = dx * sin + dy * cos;
                const halfW = rw / 2;
                const halfH = rh / 2;
                const closestX = clamp(localX, -halfW, halfW);
                const closestY = clamp(localY, -halfH, halfH);
                const distX = localX - closestX;
                const distY = localY - closestY;
                return Math.sqrt(distX * distX + distY * distY);
            }

            // --- Spawn Table ---
            function spawnTable(targetPlayer = false) {
                const minDim = Math.min(screen.w, screen.h);
                const w = randRange(minDim * 0.06, minDim * 0.16);
                const h = randRange(minDim * 0.03, minDim * 0.08);
                const edge = randInt(0, 3);
                let x, y, vx, vy;
                const speed = randRange(minDim * 0.12, minDim * 0.28) * (0.7 + difficulty * 0.3);
                const margin = Math.max(w, h) + 20;

                const px = player.x;
                const py = player.y;

                switch (edge) {
                    case 0:
                        x = -margin;
                        y = randRange(0, screen.h);
                        vx = speed;
                        vy = randRange(-speed * 0.5, speed * 0.5);
                        break;
                    case 1:
                        x = screen.w + margin;
                        y = randRange(0, screen.h);
                        vx = -speed;
                        vy = randRange(-speed * 0.5, speed * 0.5);
                        break;
                    case 2:
                        x = randRange(0, screen.w);
                        y = -margin;
                        vy = speed;
                        vx = randRange(-speed * 0.5, speed * 0.5);
                        break;
                    case 3:
                        x = randRange(0, screen.w);
                        y = screen.h + margin;
                        vy = -speed;
                        vx = randRange(-speed * 0.5, speed * 0.5);
                        break;
                }

                if (targetPlayer && Math.random() < 0.35) {
                    const angleToPlayer = Math.atan2(py - y, px - x);
                    const spd = Math.sqrt(vx * vx + vy * vy);
                    vx = Math.cos(angleToPlayer) * spd;
                    vy = Math.sin(angleToPlayer) * spd;
                }

                const rotSpeed = randRange(-4, 4) * (0.6 + difficulty * 0.5);
                const woodHue = randRange(25, 42);
                const woodSat = randRange(55, 85);
                const woodLight = randRange(28, 50);

                tables.push({
                    x,
                    y,
                    w,
                    h,
                    vx,
                    vy,
                    angle: randRange(0, Math.PI * 2),
                    rotSpeed,
                    woodHue,
                    woodSat,
                    woodLight,
                    alive: true,
                    wobbleAmp: randRange(0, 0.03),
                    wobbleSpeed: randRange(2, 6),
                    wobbleOffset: randRange(0, Math.PI * 2),
                });

                if (Math.random() < 0.3) playSpawnSound();
            }

            // --- Spawn Particles ---
            function spawnParticles(x, y, count, color, speed = 3, life = 0.6) {
                for (let i = 0; i < count; i++) {
                    const angle = randRange(0, Math.PI * 2);
                    const spd = randRange(speed * 0.3, speed);
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd,
                        life,
                        maxLife: life,
                        color,
                        size: randRange(2, 8),
                        rotation: randRange(0, Math.PI * 2),
                        rotSpeed: randRange(-12, 12),
                    });
                }
                if (particles.length > MAX_PARTICLES) {
                    particles.splice(0, particles.length - MAX_PARTICLES);
                }
            }

            // --- Spawn Floating Text ---
            function spawnFloatingText(x, y, text, color = '#ffffff', size = 18, life = 1.2) {
                floatingTexts.push({
                    x,
                    y,
                    text,
                    color,
                    size,
                    life,
                    maxLife: life,
                    vy: -randRange(40, 90),
                });
                if (floatingTexts.length > 25) floatingTexts.shift();
            }

            // --- Trigger Flip ---
            function triggerFlip() {
                if (player.flipCooldown > 0) return;
                player.flipCooldown = player.flipCooldownMax;
                playFlipSound();
                const flipRadius = Math.min(screen.w, screen.h) * 0.22;
                shockwaves.push({
                    x: player.x,
                    y: player.y,
                    radius: 0,
                    maxRadius: flipRadius,
                    speed: flipRadius / 0.25,
                    alpha: 1,
                });
                spawnParticles(player.x, player.y, 35, '#ffcc66', 7, 0.7);
                spawnParticles(player.x, player.y, 20, '#ffffff', 5, 0.4);
                shakeAmount = Math.max(shakeAmount, 8);
                let flippedCount = 0;
                for (let t of tables) {
                    if (!t.alive) continue;
                    const d = dist(player.x, player.y, t.x, t.y);
                    if (d < flipRadius + Math.max(t.w, t.h) / 2) {
                        t.alive = false;
                        flippedCount++;
                        spawnParticles(t.x, t.y, 18, '#d4956b', 6, 0.8);
                        spawnParticles(t.x, t.y, 8, '#fde8c8', 3, 0.5);
                        spawnFloatingText(t.x, t.y, 'FLIPPED!', '#ffdd88', 16, 0.9);
                    }
                }
                if (flippedCount > 0) {
                    tablesFlipped += flippedCount;
                    score += flippedCount * 10;
                    if (flippedCount >= 3) {
                        spawnFloatingText(player.x, player.y - 30, 'MULTI-FLIP!', '#ffaa00', 22, 1.5);
                    }
                }
            }

            // --- Reset Game ---
            function resetGame() {
                player.x = screen.w / 2;
                player.y = screen.h / 2;
                player.vx = 0;
                player.vy = 0;
                player.flipCooldown = 0;
                player.trail = [];
                player.glowPhase = 0;
                tables = [];
                particles = [];
                floatingTexts = [];
                shockwaves = [];
                score = 0;
                survivalTime = 0;
                tablesFlipped = 0;
                difficulty = 1;
                shakeAmount = 0;
                tableSpawnRate.current = 1.4;
                joystickActive = false;
                joystickId = null;
                joystickPos = { x: 0, y: 0 };
                flipButtonActive = false;
                flipButtonId = null;
                updateJoystickPosition();
            }

            // --- Start Game ---
            function startGame() {
                initAudio();
                resetGame();
                gameState = STATE.PLAYING;
                player.x = screen.w / 2;
                player.y = screen.h / 2;
                // Spawn initial tables
                for (let i = 0; i < 3; i++) spawnTable();
            }

            // --- Event Listeners ---
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (gameState === STATE.TITLE) startGame();
                    else if (gameState === STATE.PLAYING) triggerFlip();
                    else if (gameState === STATE.GAMEOVER) startGame();
                }
                if (e.key === 'Enter' || e.key === 'Return') {
                    if (gameState === STATE.TITLE) startGame();
                    else if (gameState === STATE.GAMEOVER) startGame();
                }
            });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            canvas.addEventListener('mousedown', (e) => {
                initAudio();
                mouseDown = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (gameState === STATE.TITLE) { startGame();
                    return; }
                if (gameState === STATE.GAMEOVER) { startGame();
                    return; }
                if (gameState === STATE.PLAYING) {
                    const rect = canvas.getBoundingClientRect();
                    const cx = e.clientX - rect.left;
                    const cy = e.clientY - rect.top;
                    // Check if click is on flip button area (right side)
                    const dfb = dist(cx, cy, flipButtonX, flipButtonY);
                    if (dfb < flipButtonRadius + 15) {
                        triggerFlip();
                        return;
                    }
                    // Otherwise treat as joystick start
                    if (cx < screen.w * 0.55 || cy > screen.h * 0.4) {
                        joystickActive = true;
                        joystickOrigin = { x: cx, y: cy };
                        joystickBaseX = cx;
                        joystickBaseY = cy;
                        joystickPos = { x: 0, y: 0 };
                    }
                }
            });
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (joystickActive && gameState === STATE.PLAYING) {
                    const rect = canvas.getBoundingClientRect();
                    const cx = e.clientX - rect.left;
                    const cy = e.clientY - rect.top;
                    const dx = cx - joystickOrigin.x;
                    const dy = cy - joystickOrigin.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    const maxD = joystickRadius;
                    if (d > maxD) {
                        joystickPos = { x: (dx / d) * maxD, y: (dy / d) * maxD };
                    } else {
                        joystickPos = { x: dx, y: dy };
                    }
                }
            });
            canvas.addEventListener('mouseup', () => {
                mouseDown = false;
                joystickActive = false;
                joystickPos = { x: 0, y: 0 };
            });
            canvas.addEventListener('mouseleave', () => {
                mouseDown = false;
                joystickActive = false;
                joystickPos = { x: 0, y: 0 };
            });

            // Touch events
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                if (gameState === STATE.TITLE) { startGame();
                    return; }
                if (gameState === STATE.GAMEOVER) { startGame();
                    return; }
                if (gameState !== STATE.PLAYING) return;
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    const cx = touch.clientX - rect.left;
                    const cy = touch.clientY - rect.top;
                    const dfb = dist(cx, cy, flipButtonX, flipButtonY);
                    if (dfb < flipButtonRadius + 20 && flipButtonId === null) {
                        flipButtonActive = true;
                        flipButtonId = touch.identifier;
                        triggerFlip();
                        continue;
                    }
                    if (joystickId === null && (cx < screen.w * 0.55 || cy > screen.h * 0.35)) {
                        joystickActive = true;
                        joystickId = touch.identifier;
                        joystickOrigin = { x: cx, y: cy };
                        joystickBaseX = cx;
                        joystickBaseY = cy;
                        joystickPos = { x: 0, y: 0 };
                    }
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (gameState !== STATE.PLAYING) return;
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === joystickId && joystickActive) {
                        const cx = touch.clientX - rect.left;
                        const cy = touch.clientY - rect.top;
                        const dx = cx - joystickOrigin.x;
                        const dy = cy - joystickOrigin.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        const maxD = joystickRadius;
                        if (d > maxD) {
                            joystickPos = { x: (dx / d) * maxD, y: (dy / d) * maxD };
                        } else {
                            joystickPos = { x: dx, y: dy };
                        }
                    }
                }
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === joystickId) {
                        joystickActive = false;
                        joystickId = null;
                        joystickPos = { x: 0, y: 0 };
                    }
                    if (touch.identifier === flipButtonId) {
                        flipButtonActive = false;
                        flipButtonId = null;
                    }
                }
            }, { passive: false });
            canvas.addEventListener('touchcancel', () => {
                joystickActive = false;
                joystickId = null;
                joystickPos = { x: 0, y: 0 };
                flipButtonActive = false;
                flipButtonId = null;
            });

            // --- Update ---
            function update(dt) {
                if (gameState !== STATE.PLAYING) return;
                dt = Math.min(dt, 0.1);
                survivalTime += dt;
                score = Math.floor(survivalTime) + tablesFlipped * 10;
                difficulty = 1 + Math.floor(survivalTime / 12);
                tableSpawnRate.current = Math.max(tableSpawnRate.min, 1.4 - difficulty * tableSpawnRate
            .decrease);

                // Player input
                let inputX = 0;
                let inputY = 0;
                if (keys['w'] || keys['arrowup']) inputY = -1;
                if (keys['s'] || keys['arrowdown']) inputY = 1;
                if (keys['a'] || keys['arrowleft']) inputX = -1;
                if (keys['d'] || keys['arrowright']) inputX = 1;

                if (joystickActive) {
                    const jx = joystickPos.x / joystickRadius;
                    const jy = joystickPos.y / joystickRadius;
                    const jmag = Math.sqrt(jx * jx + jy * jy);
                    if (jmag > 0.01) {
                        inputX = jx;
                        inputY = jy;
                    }
                }

                const inputMag = Math.sqrt(inputX * inputX + inputY * inputY);
                if (inputMag > 1) { inputX /= inputMag;
                    inputY /= inputMag; }

                player.vx = inputX * player.speed;
                player.vy = inputY * player.speed;
                player.x += player.vx * dt;
                player.y += player.vy * dt;
                player.x = clamp(player.x, player.radius, screen.w - player.radius);
                player.y = clamp(player.y, player.radius, screen.h - player.radius);
                player.flipCooldown = Math.max(0, player.flipCooldown - dt);
                player.glowPhase += dt * 4;

                // Trail
                if (inputMag > 0.1 && player.trail.length < 40) {
                    player.trail.push({ x: player.x, y: player.y, life: 0.35, maxLife: 0.35 });
                }
                for (let i = player.trail.length - 1; i >= 0; i--) {
                    player.trail[i].life -= dt;
                    if (player.trail[i].life <= 0) player.trail.splice(i, 1);
                }

                // Update tables
                for (let t of tables) {
                    if (!t.alive) continue;
                    t.x += t.vx * dt;
                    t.y += t.vy * dt;
                    t.angle += t.rotSpeed * dt;
                    t.angle += Math.sin(t.wobbleOffset + survivalTime * t.wobbleSpeed) * t.wobbleAmp * dt;
                    // Remove if far off screen
                    const margin = Math.max(t.w, t.h) + 60;
                    if (t.x < -margin || t.x > screen.w + margin || t.y < -margin || t.y > screen.h + margin) {
                        t.alive = false;
                    }
                }

                // Spawn tables
                if (Math.random() < dt / tableSpawnRate.current) {
                    spawnTable(true);
                }
                // Occasionally spawn extra tables at higher difficulty
                if (difficulty >= 3 && Math.random() < dt / (tableSpawnRate.current * 2.5)) {
                    spawnTable(true);
                }
                if (difficulty >= 6 && Math.random() < dt / (tableSpawnRate.current * 3)) {
                    spawnTable(true);
                }

                // Clean dead tables
                tables = tables.filter(t => t.alive);

                // Collision detection
                for (let t of tables) {
                    if (!t.alive) continue;
                    const penetration = pointInRotatedRect(player.x, player.y, t.x, t.y, t.w, t.h, t.angle);
                    const nearMissDist = player.radius + 15;
                    if (penetration < player.radius) {
                        // Collision!
                        gameOver();
                        return;
                    } else if (penetration < nearMissDist && Math.random() < dt * 8) {
                        playNearMiss();
                        if (Math.random() < 0.25) {
                            spawnFloatingText(player.x, player.y - 15, 'AAAH!', '#ff6666', 13, 0.7);
                        }
                    }
                }

                // Update shockwaves
                for (let sw of shockwaves) {
                    sw.radius += sw.speed * dt;
                    sw.alpha -= dt / 0.3;
                }
                shockwaves = shockwaves.filter(sw => sw.alpha > 0 && sw.radius < sw.maxRadius * 1.1);

                // Update particles
                for (let p of particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    p.rotation += p.rotSpeed * dt;
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                }
                particles = particles.filter(p => p.life > 0);

                // Update floating texts
                for (let ft of floatingTexts) {
                    ft.y += ft.vy * dt;
                    ft.life -= dt;
                    ft.vy *= 0.97;
                }
                floatingTexts = floatingTexts.filter(ft => ft.life > 0);

                // Decay shake
                shakeAmount *= Math.exp(-8 * dt);
                if (shakeAmount < 0.1) shakeAmount = 0;
            }

            function gameOver() {
                gameState = STATE.GAMEOVER;
                playDeathSound();
                shakeAmount = 20;
                spawnParticles(player.x, player.y, 60, '#ff4444', 9, 1.2);
                spawnParticles(player.x, player.y, 40, '#ffaa00', 7, 0.9);
                spawnParticles(player.x, player.y, 20, '#ffffff', 4, 0.6);
                spawnFloatingText(player.x, player.y - 20, 'TABLE TURNED!', '#ff4444', 26, 2);
                spawnFloatingText(player.x, player.y + 15, 'AAAAAAHHHHHH!', '#ff8888', 18, 1.8);
                // Destroy all tables with animation
                for (let t of tables) {
                    if (t.alive) {
                        spawnParticles(t.x, t.y, 12, '#d4956b', 5, 0.7);
                    }
                    t.alive = false;
                }
                tables = [];
                shockwaves = [];
            }

            // --- Render ---
            function drawTable(x, y, w, h, angle, woodHue, woodSat, woodLight) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.fillRect(-w / 2 + 2, -h / 2 + 2, w, h);

                // Tabletop base
                const baseColor = `hsl(${woodHue}, ${woodSat}%, ${woodLight}%)`;
                const lightColor = `hsl(${woodHue}, ${woodSat}%, ${woodLight + 18}%)`;
                const darkColor = `hsl(${woodHue}, ${woodSat}%, ${woodLight - 12}%)`;

                // Main fill with gradient
                const grad = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
                grad.addColorStop(0, lightColor);
                grad.addColorStop(0.5, baseColor);
                grad.addColorStop(1, darkColor);
                ctx.fillStyle = grad;
                const borderRadius = Math.min(w, h) * 0.1;
                roundRect(-w / 2, -h / 2, w, h, borderRadius);
                ctx.fill();

                // Border/edge
                ctx.strokeStyle = `hsl(${woodHue}, ${woodSat - 10}%, ${woodLight - 18}%)`;
                ctx.lineWidth = Math.min(w, h) * 0.08;
                roundRect(-w / 2, -h / 2, w, h, borderRadius);
                ctx.stroke();

                // Wood grain lines
                ctx.strokeStyle = `hsla(${woodHue}, ${woodSat - 20}%, ${woodLight - 8}%, 0.3)`;
                ctx.lineWidth = 1;
                const grainCount = Math.floor(w / 18);
                for (let i = 1; i < grainCount; i++) {
                    const gx = -w / 2 + (w / grainCount) * i;
                    ctx.beginPath();
                    ctx.moveTo(gx, -h / 2 + 4);
                    ctx.quadraticCurveTo(gx + randRange(-3, 3), 0, gx, h / 2 - 4);
                    ctx.stroke();
                }

                // Subtle highlight on top edge
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(-w / 2 + 4, -h / 2 + 1, w - 8, h * 0.3);

                ctx.restore();
            }

            function roundRect(x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            function render() {
                ctx.clearRect(0, 0, screen.w, screen.h);

                // Shake offset
                let shakeX = 0,
                    shakeY = 0;
                if (shakeAmount > 0.1) {
                    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Background - dark floor
                const bgGrad = ctx.createRadialGradient(screen.w / 2, screen.h / 2, screen.w * 0.1, screen.w / 2, screen.h /
                    2, screen.w * 1.2);
                bgGrad.addColorStop(0, '#1a1a2e');
                bgGrad.addColorStop(0.6, '#111122');
                bgGrad.addColorStop(1, '#080812');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, screen.w, screen.h);

                // Grid floor
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 1;
                const gridSize = Math.min(screen.w, screen.h) / 20;
                for (let gx = gridSize; gx < screen.w; gx += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, screen.h);
                    ctx.stroke();
                }
                for (let gy = gridSize; gy < screen.h; gy += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(screen.w, gy);
                    ctx.stroke();
                }

                // Subtle radial grid
                ctx.strokeStyle = 'rgba(255,255,255,0.015)';
                ctx.lineWidth = 2;
                for (let r = gridSize * 3; r < screen.w; r += gridSize * 4) {
                    ctx.beginPath();
                    ctx.arc(screen.w / 2, screen.h / 2, r, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // --- Draw tables ---
                for (let t of tables) {
                    if (!t.alive) continue;
                    drawTable(t.x, t.y, t.w, t.h, t.angle, t.woodHue, t.woodSat, t.woodLight);
                }

                // --- Draw shockwaves ---
                for (let sw of shockwaves) {
                    ctx.save();
                    ctx.globalAlpha = sw.alpha;
                    ctx.strokeStyle = '#ffdd88';
                    ctx.lineWidth = 5;
                    ctx.shadowColor = '#ffaa00';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(sw.x, sw.y, sw.radius * 0.85, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                // --- Draw player trail ---
                for (let i = 0; i < player.trail.length; i++) {
                    const tr = player.trail[i];
                    const alpha = tr.life / tr.maxLife;
                    const r = player.radius * (0.3 + alpha * 0.5);
                    ctx.fillStyle = `rgba(100,200,255,${alpha * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(tr.x, tr.y, r, 0, Math.PI * 2);
                    ctx.fill();
                }

                // --- Draw player ---
                // Outer glow
                const glowGrad = ctx.createRadialGradient(player.x, player.y, player.radius * 0.5, player.x, player.y,
                    player.radius * 2.2);
                const glowAlpha = 0.6 + Math.sin(player.glowPhase) * 0.2;
                glowGrad.addColorStop(0, `rgba(130,210,255,${glowAlpha})`);
                glowGrad.addColorStop(0.5, `rgba(60,150,240,${glowAlpha * 0.5})`);
                glowGrad.addColorStop(1, 'rgba(30,80,180,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius * 2.2, 0, Math.PI * 2);
                ctx.fill();

                // Player body
                const bodyGrad = ctx.createRadialGradient(player.x - player.radius * 0.2, player.y - player.radius * 0.2,
                    player.radius * 0.1, player.x, player.y, player.radius);
                bodyGrad.addColorStop(0, '#e8f8ff');
                bodyGrad.addColorStop(0.4, '#4db8f0');
                bodyGrad.addColorStop(1, '#1a5faa');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Player highlight
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(player.x - player.radius * 0.25, player.y - player.radius * 0.3, player.radius * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Flip cooldown indicator ring
                if (player.flipCooldown > 0 && gameState === STATE.PLAYING) {
                    const cdRatio = player.flipCooldown / player.flipCooldownMax;
                    ctx.strokeStyle = 'rgba(255,200,100,0.7)';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 8, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 - cdRatio));
                    ctx.stroke();
                } else if (player.flipCooldown <= 0 && gameState === STATE.PLAYING) {
                    // Ready indicator
                    const readyPulse = 0.5 + Math.sin(player.glowPhase * 1.5) * 0.5;
                    ctx.strokeStyle = `rgba(255,220,80,${0.5 + readyPulse * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 3]);
                    ctx.lineDashOffset = player.glowPhase * 15;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // --- Draw particles ---
                for (let p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                }

                // --- Draw floating texts ---
                for (let ft of floatingTexts) {
                    const alpha = ft.life / ft.maxLife;
                    ctx.fillStyle = ft.color.replace(')', `,${alpha})`).replace('rgb',
                        'rgba').replace('#ff', 'rgba(255,').replace('#fde', 'rgba(253,');
                    if (ft.color.startsWith('#')) {
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = ft.color;
                    }
                    ctx.font = `bold ${ft.size}px "Segoe UI", "Arial Black", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();

                // --- UI (not affected by shake) ---
                if (gameState === STATE.PLAYING) {
                    // Score
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 22px "Segoe UI", "Arial Black", sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(`SCORE: ${score}`, screen.w - 25, 40);
                    ctx.fillStyle = '#cccccc';
                    ctx.font = '14px "Segoe UI", sans-serif';
                    ctx.fillText(`TABLES FLIPPED: ${tablesFlipped}`, screen.w - 25, 62);
                    ctx.fillText(`DIFFICULTY: ${difficulty}`, screen.w - 25, 80);

                    // Flip ready indicator text
                    if (player.flipCooldown <= 0) {
                        ctx.fillStyle = '#ffdd66';
                        ctx.font = 'bold 13px "Segoe UI", sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('FLIP READY! [SPACE]', player.x, player.y - player.radius - 20);
                    }

                    // Mobile flip button
                    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                    if (isMobile || screen.w < 768) {
                        // Draw flip button
                        const fbReady = player.flipCooldown <= 0;
                        ctx.save();
                        ctx.fillStyle = fbReady ? 'rgba(255,180,40,0.75)' : 'rgba(100,100,100,0.5)';
                        ctx.strokeStyle = fbReady ? '#ffcc66' : '#666666';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.arc(flipButtonX, flipButtonY, flipButtonRadius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 16px "Segoe UI", "Arial Black", sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('FLIP', flipButtonX, flipButtonY + 6);
                        if (!fbReady) {
                            const cdRatio = player.flipCooldown / player.flipCooldownMax;
                            ctx.strokeStyle = '#ffaa00';
                            ctx.lineWidth = 5;
                            ctx.beginPath();
                            ctx.arc(flipButtonX, flipButtonY, flipButtonRadius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (
                                1 - cdRatio));
                            ctx.stroke();
                        }
                        ctx.restore();
                    }

                    // Virtual joystick (mobile)
                    if (isMobile || screen.w < 768) {
                        if (joystickActive) {
                            ctx.save();
                            ctx.fillStyle = 'rgba(255,255,255,0.1)';
                            ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                            ctx.lineWidth = 3;
                            ctx.beginPath();
                            ctx.arc(joystickOrigin.x, joystickOrigin.y, joystickRadius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.stroke();
                            // Knob
                            const kx = joystickOrigin.x + joystickPos.x;
                            const ky = joystickOrigin.y + joystickPos.y;
                            ctx.fillStyle = 'rgba(255,255,255,0.55)';
                            ctx.beginPath();
                            ctx.arc(kx, ky, joystickKnobRadius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                            ctx.restore();
                        } else if (!joystickActive && joystickId === null) {
                            // Show ghost joystick hint
                            const jbx = 85;
                            const jby = screen.h - 95;
                            ctx.save();
                            ctx.fillStyle = 'rgba(255,255,255,0.05)';
                            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([8, 6]);
                            ctx.beginPath();
                            ctx.arc(jbx, jby, joystickRadius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.beginPath();
                            ctx.arc(jbx, jby, joystickKnobRadius * 0.7, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.restore();
                        }
                    }
                }

                // --- Title Screen ---
                if (gameState === STATE.TITLE) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, screen.w, screen.h);

                    titlePulse += 0.03;
                    const pulseScale = 1 + Math.sin(titlePulse) * 0.04;

                    ctx.save();
                    ctx.translate(screen.w / 2, screen.h / 2 - 40);
                    ctx.scale(pulseScale, pulseScale);

                    // Title glow
                    ctx.fillStyle = 'rgba(255,150,30,0.3)';
                    ctx.font = `bold ${Math.min(screen.w*0.07,48)}px "Arial Black", "Segoe UI", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('THE TURNS', 3, -48);
                    ctx.fillText('HAVE TABLE', 3, 10);

                    ctx.fillStyle = '#ffcc44';
                    ctx.fillText('THE TURNS', 0, -50);
                    ctx.fillText('HAVE TABLE', 0, 8);

                    ctx.restore();

                    ctx.fillStyle = '#ff8866';
                    ctx.font = `bold ${Math.min(screen.w*0.04,26)}px "Arial Black", sans-serif`;
                    ctx.textAlign = 'center';
                    const aahAlpha = 0.5 + Math.sin(titlePulse * 1.7) * 0.5;
                    ctx.fillStyle = `rgba(255,130,100,${aahAlpha})`;
                    ctx.fillText('AAAAAAHHHHHHHHHHHHHHHHHHHH!', screen.w / 2, screen.h / 2 + 50);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${Math.min(screen.w*0.025,18)}px "Segoe UI", sans-serif`;
                    ctx.fillText('Dodge the turning tables!', screen.w / 2, screen.h / 2 + 90);
                    ctx.fillText('Press SPACE to flip tables near you', screen.w / 2, screen.h / 2 + 115);

                    const tapAlpha2 = 0.5 + Math.sin(titlePulse * 2) * 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${tapAlpha2})`;
                    ctx.font = `bold ${Math.min(screen.w*0.03,20)}px "Segoe UI", sans-serif`;
                    ctx.fillText('CLICK • TAP • PRESS SPACE', screen.w / 2, screen.h / 2 + 165);
                }

                // --- Game Over Screen ---
                if (gameState === STATE.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.65)';
                    ctx.fillRect(0, 0, screen.w, screen.h);

                    ctx.fillStyle = '#ff3333';
                    ctx.font = `bold ${Math.min(screen.w*0.07,50)}px "Arial Black", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('TABLE TURNED!', screen.w / 2, screen.h / 2 - 30);

                    ctx.fillStyle = '#ffaa66';
                    ctx.font = `bold ${Math.min(screen.w*0.04,28)}px "Arial Black", sans-serif`;
                    ctx.fillText('AAAAAAHHHHHHHH!', screen.w / 2, screen.h / 2 + 20);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${Math.min(screen.w*0.03,22)}px "Segoe UI", sans-serif`;
                    ctx.fillText(`Score: ${score}  |  Tables Flipped: ${tablesFlipped}  |  Difficulty: ${difficulty}`,
                        screen.w / 2, screen.h / 2 + 60);

                    const tapAlpha = 0.5 + Math.sin(Date.now() / 1000 * 2.5) * 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${tapAlpha})`;
                    ctx.font = `bold ${Math.min(screen.w*0.028,19)}px "Segoe UI", sans-serif`;
                    ctx.fillText('CLICK • TAP • SPACE to play again', screen.w / 2, screen.h / 2 + 110);
                }
            }

            // --- Game Loop ---
            let lastTime = performance.now();
            let spawnTimer = 0;

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- Initial Setup ---
            updateJoystickPosition();
            // Spawn some ambient tables on title screen
            for (let i = 0; i < 5; i++) {
                const minDim = Math.min(screen.w, screen.h);
                const w = randRange(minDim * 0.06, minDim * 0.14);
                const h = randRange(minDim * 0.03, minDim * 0.07);
                tables.push({
                    x: randRange(0, screen.w),
                    y: randRange(0, screen.h),
                    w,
                    h,
                    vx: randRange(-40, 40),
                    vy: randRange(-40, 40),
                    angle: randRange(0, Math.PI * 2),
                    rotSpeed: randRange(-1.5, 1.5),
                    woodHue: randRange(25, 42),
                    woodSat: randRange(55, 85),
                    woodLight: randRange(28, 50),
                    alive: true,
                    wobbleAmp: randRange(0, 0.02),
                    wobbleSpeed: randRange(2, 5),
                    wobbleOffset: randRange(0, Math.PI * 2),
                });
            }
            // Start with title state
            gameState = STATE.TITLE;

            requestAnimationFrame(gameLoop);

            // --- Handle window resize during gameplay ---
            window.addEventListener('resize', () => {
                screen = resize();
                player.radius = Math.min(screen.w, screen.h) * 0.035;
                player.speed = Math.min(screen.w, screen.h) * 0.35;
                player.x = clamp(player.x, player.radius, screen.w - player.radius);
                player.y = clamp(player.y, player.radius, screen.h - player.radius);
                updateJoystickPosition();
            });

            console.log('🪑 THE TURNS HAVE TABLE - Ready! Click or press SPACE to start.');
            console.log('   Dodge spinning tables. Press SPACE to flip them!');
        })();
    </script>
</body>
</html>
