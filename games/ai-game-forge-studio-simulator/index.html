<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Game Forge - Studio Simulator</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #141428;
            --accent: #00e5ff;
            --accent2: #b347ea;
            --gold: #ffd740;
            --text: #d0d0e8;
            --dim: #6a6a8a;
            --success: #69f0ae;
            --danger: #ff5252;
            --card-bg: #1a1a30;
            --border: #2a2a45;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 100vh;
            background: radial-gradient(ellipse at 50% 30%, #1a1a3a 0%, #0a0a18 70%);
            overflow: hidden;
            border-left: 1px solid #1a1a40;
            border-right: 1px solid #1a1a40;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 800px) {
            #game-container {
                border-radius: 20px;
                max-height: 95vh;
                box-shadow: 0 0 80px rgba(0, 229, 255, 0.08), 0 0 40px rgba(179, 71, 234, 0.06);
            }
        }

        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #ui-layer {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 12px 16px;
            gap: 8px;
        }

        /* Header */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #title-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: conic-gradient(var(--accent), var(--accent2), var(--accent));
            animation: logo-spin 8s linear infinite;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        @keyframes logo-spin {
            to {
                transform: rotate(360deg);
            }
        }
        #game-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--accent);
        }
        #stats {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .stat-badge {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        .stat-badge .icon {
            font-size: 1.1em;
        }
        #coins-badge {
            border-color: #ffd74055;
            color: var(--gold);
        }
        #level-badge {
            border-color: #b347ea55;
            color: #c77dff;
        }

        /* AI Status Bar */
        #ai-status-bar {
            flex-shrink: 0;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
        }
        #ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a1a35;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 229, 255, 0.9);
            }
        }
        #ai-message {
            color: #a0b0d0;
            font-size: 0.85em;
            flex: 1;
            font-style: italic;
            transition: opacity 0.3s;
        }
        #ai-thinking-dots {
            display: none;
            gap: 3px;
            align-items: center;
        }
        #ai-thinking-dots .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: dot-bounce 0.6s ease-in-out infinite;
        }
        #ai-thinking-dots .dot:nth-child(2) {
            animation-delay: 0.15s;
        }
        #ai-thinking-dots .dot:nth-child(3) {
            animation-delay: 0.3s;
        }
        @keyframes dot-bounce {
            0%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Main area */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        #selection-panels {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 4px;
        }
        .panel-label {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--dim);
            margin-bottom: 4px;
            font-weight: 700;
            padding-left: 4px;
        }
        .card-row {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .card-row::-webkit-scrollbar {
            display: none;
        }
        .card {
            flex-shrink: 0;
            width: 90px;
            min-height: 70px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            font-size: 0.75em;
            color: var(--text);
        }
        .card:hover {
            border-color: #555;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .card:active {
            transform: scale(0.95);
        }
        .card.selected {
            border-color: var(--accent) !important;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.35);
            background: #1a2a40;
            animation: selected-glow 1.5s ease-in-out infinite;
        }
        @keyframes selected-glow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 28px rgba(0, 229, 255, 0.6);
            }
        }
        .card .card-icon {
            font-size: 1.8em;
        }
        .card .card-name {
            font-weight: 600;
            font-size: 0.75em;
            line-height: 1.1;
        }
        .card.locked {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.6);
        }
        .card .lock-icon {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 0.7em;
            color: #888;
        }

        /* Forge Button */
        #forge-btn {
            flex-shrink: 0;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            background: linear-gradient(135deg, #00b8d4, #7c3aed);
            color: #fff;
            text-transform: uppercase;
            transition: all 0.25s;
            box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }
        #forge-btn:hover {
            box-shadow: 0 8px 36px rgba(124, 58, 237, 0.6);
            transform: translateY(-2px);
        }
        #forge-btn:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        #forge-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        #forge-btn .btn-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% {
                left: -60%;
            }
            100% {
                left: 160%;
            }
        }

        /* Modal overlay */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        #modal {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            animation: popIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        #modal h2 {
            color: #fff;
            margin-bottom: 8px;
            font-size: 1.5em;
            text-shadow: 0 0 20px var(--accent2);
        }
        #modal .game-result-icon {
            font-size: 4em;
            margin: 10px 0;
            animation: bounce-in 0.5s 0.2s both;
        }
        @keyframes bounce-in {
            0% {
                transform: scale(0);
            }
            60% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        #modal .result-score {
            font-size: 2.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd740, #ff9100);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #modal .result-detail {
            color: var(--text);
            font-size: 0.9em;
            margin: 8px 0;
            line-height: 1.5;
        }
        #modal .result-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 8px 0;
        }
        #modal .result-tag {
            background: #252545;
            border: 1px solid #3a3a60;
            border-radius: 14px;
            padding: 4px 12px;
            font-size: 0.75em;
            color: #b0b0d0;
        }
        #modal button {
            margin-top: 14px;
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            font-family: inherit;
            transition: all 0.2s;
        }
        #modal .btn-close {
            background: var(--accent);
            color: #000;
        }
        #modal .btn-close:hover {
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
        }
        #modal .btn-retry {
            background: transparent;
            border: 2px solid #555;
            color: #ccc;
            margin-left: 8px;
        }
        #modal .btn-play {
            background: #ffd740;
            color: #000;
            margin-left: 8px;
        }
        #modal .btn-play:hover {
            box-shadow: 0 0 25px rgba(255, 215, 64, 0.6);
        }

        /* History */
        #history-area {
            flex-shrink: 0;
            max-height: 80px;
            overflow-y: auto;
            background: rgba(20, 20, 40, 0.6);
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 0.7em;
            color: var(--dim);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        #history-area .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 4px;
            border-radius: 4px;
        }
        #history-area .history-item .h-name {
            color: #b0b0d0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #history-area .history-item .h-score {
            font-weight: 700;
            color: var(--gold);
            margin-left: 8px;
        }

        /* Play canvas */
        #play-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #play-canvas {
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            touch-action: none;
        }
        #play-hud {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 500px;
            color: #fff;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        #ability-btn {
            background: rgba(0, 229, 255, 0.3);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 8px 18px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-size: 0.9em;
            font-family: inherit;
        }
        #ability-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #play-result {
            position: absolute;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            color: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333355;
            border-radius: 10px;
        }

        /* Mobile tweaks */
        @media (max-width: 500px) {
            .card {
                width: 72px;
                min-height: 58px;
                padding: 6px;
                font-size: 0.7em;
                border-radius: 10px;
            }
            .card .card-icon {
                font-size: 1.5em;
            }
            .card .card-name {
                font-size: 0.7em;
            }
            #game-title {
                font-size: 0.9em;
            }
            #logo-icon {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .stat-badge {
                padding: 4px 10px;
                font-size: 0.7em;
            }
            #forge-btn {
                padding: 12px;
                font-size: 0.85em;
            }
            #ai-message {
                font-size: 0.73em;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="particles-canvas"></canvas>
        <div id="ui-layer">
            <!-- Header -->
            <div id="header">
                <div id="title-area">
                    <div id="logo-icon">🧠</div>
                    <span id="game-title">AI GAME FORGE</span>
                </div>
                <div id="stats">
                    <div class="stat-badge" id="coins-badge"><span class="icon">🪙</span><span id="coins-display">250</span></div>
                    <div class="stat-badge" id="level-badge"><span class="icon">⚡</span>Lv.<span id="level-display">1</span></div>
                </div>
            </div>

            <!-- AI Status -->
            <div id="ai-status-bar">
                <div id="ai-avatar">🤖</div>
                <span id="ai-message">Select 3 cards and I'll forge a game!</span>
                <div id="ai-thinking-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>

            <!-- Main Selection -->
            <div id="main-area">
                <div id="selection-panels">
                    <div>
                        <div class="panel-label">🎮 Genre</div>
                        <div class="card-row" id="genre-row"></div>
                    </div>
                    <div>
                        <div class="panel-label">🌍 Theme</div>
                        <div class="card-row" id="theme-row"></div>
                    </div>
                    <div>
                        <div class="panel-label">⚙️ Mechanic</div>
                        <div class="card-row" id="mechanic-row"></div>
                    </div>
                </div>
                <button id="forge-btn"><span class="btn-shimmer"></span>⚡ FORGE GAME</button>
            </div>

            <!-- History -->
            <div id="history-area"><span style="color:#555;">📋 Recent games will appear here...</span></div>
        </div>
    </div>

    <script>
        (function() {
            // --- Game State ---
            const state = {
                coins: 250,
                level: 1,
                xp: 0,
                xpToNext: 100,
                selectedGenre: null,
                selectedTheme: null,
                selectedMechanic: null,
                history: [],
                unlockedMechanics: 4,
                unlockedThemes: 4,
                unlockedGenres: 5,
                isForging: false,
                isPlaying: false,
            };

            // --- Card Data ---
            const genres = [
                { id: 'rpg', name: 'RPG', icon: '⚔️', baseVal: 70 },
                { id: 'platformer', name: 'Platformer', icon: '🏃', baseVal: 60 },
                { id: 'puzzle', name: 'Puzzle', icon: '🧩', baseVal: 55 },
                { id: 'shooter', name: 'Shooter', icon: '🎯', baseVal: 65 },
                { id: 'strategy', name: 'Strategy', icon: '♟️', baseVal: 72 },
                { id: 'roguelike', name: 'Roguelike', icon: '🗡️', baseVal: 78 },
                { id: 'sim', name: 'Simulation', icon: '🏗️', baseVal: 50 },
                { id: 'horror', name: 'Horror', icon: '👻', baseVal: 68 },
            ];

            const themes = [
                { id: 'fantasy', name: 'Fantasy', icon: '🐉', baseVal: 75 },
                { id: 'scifi', name: 'Sci-Fi', icon: '🚀', baseVal: 80 },
                { id: 'cyberpunk', name: 'Cyberpunk', icon: '🌃', baseVal: 85 },
                { id: 'postapoc', name: 'Post-Apoc', icon: '☢️', baseVal: 70 },
                { id: 'ocean', name: 'Ocean', icon: '🌊', baseVal: 60 },
                { id: 'space', name: 'Space', icon: '🌟', baseVal: 82 },
                { id: 'mythology', name: 'Mythology', icon: '🏛️', baseVal: 73 },
                { id: 'candy', name: 'Candy', icon: '🍬', baseVal: 45 },
            ];

            const mechanics = [
                { id: 'crafting', name: 'Crafting', icon: '🔨', baseVal: 68, ability: 'Craft Shield', cooldown: 8 },
                { id: 'stealth', name: 'Stealth', icon: '🕵️', baseVal: 62, ability: 'Hide', cooldown: 7 },
                { id: 'parkour', name: 'Parkour', icon: '🤸', baseVal: 58, ability: 'Jump', cooldown: 5 },
                { id: 'deckbuild', name: 'Deck-Building', icon: '🃏', baseVal: 76, ability: 'Draw Card', cooldown: 6 },
                { id: 'rhythm', name: 'Rhythm', icon: '🎵', baseVal: 55, ability: 'Dash', cooldown: 5 },
                { id: 'gravity', name: 'Gravity Manip', icon: '🧲', baseVal: 72, ability: 'Reverse', cooldown: 7 },
                { id: 'timewarp', name: 'Time Warp', icon: '⏳', baseVal: 80, ability: 'Slow Time', cooldown: 9 },
                { id: 'fusion', name: 'Fusion', icon: '💥', baseVal: 74, ability: 'Blast', cooldown: 6 },
            ];

            // --- DOM refs ---
            const genreRow = document.getElementById('genre-row');
            const themeRow = document.getElementById('theme-row');
            const mechanicRow = document.getElementById('mechanic-row');
            const forgeBtn = document.getElementById('forge-btn');
            const aiMessage = document.getElementById('ai-message');
            const aiThinkingDots = document.getElementById('ai-thinking-dots');
            const coinsDisplay = document.getElementById('coins-display');
            const levelDisplay = document.getElementById('level-display');
            const historyArea = document.getElementById('history-area');
            const particlesCanvas = document.getElementById('particles-canvas');
            const ctx = particlesCanvas.getContext('2d');

            // --- Audio Engine ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playBeep(freq, dur, type = 'sine', vol = 0.08, rampDown = true) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    if (rampDown) gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + dur);
                } catch (e) {}
            }

            function sfxSelect() { playBeep(600, 0.1, 'sine', 0.06);
                playBeep(900, 0.08, 'sine', 0.04, false); }

            function sfxForge() { playBeep(200, 0.3, 'triangle', 0.1);
                playBeep(350, 0.2, 'triangle', 0.08);
                playBeep(500, 0.15, 'square', 0.06); }

            function sfxSuccess() {
                playBeep(523, 0.12, 'sine', 0.09);
                playBeep(659, 0.12, 'sine', 0.08);
                playBeep(784, 0.15, 'sine', 0.1);
                playBeep(1047, 0.2, 'triangle', 0.12);
            }

            function sfxFail() { playBeep(150, 0.3, 'sawtooth', 0.06);
                playBeep(100, 0.4, 'sawtooth', 0.05); }

            function sfxClick() { playBeep(800, 0.04, 'square', 0.03); }

            // --- Particles ---
            let particles = [];
            const MAX_PARTICLES = 50;

            function spawnParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4 - 2,
                        life: 0.6 + Math.random() * 0.8,
                        maxLife: 0.8 + Math.random() * 0.8,
                        size: 1 + Math.random() * 3,
                        color,
                    });
                }
                if (particles.length > MAX_PARTICLES) particles = particles.slice(-MAX_PARTICLES);
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= dt;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx, w, h) {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    ctx.fillStyle = p.color.replace('1)', `${alpha})`).replace('rgb',
                        'rgba');
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function resizeCanvas() {
                particlesCanvas.width = particlesCanvas.parentElement.clientWidth;
                particlesCanvas.height = particlesCanvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Render Cards ---
            function renderCards() {
                genreRow.innerHTML = '';
                themeRow.innerHTML = '';
                mechanicRow.innerHTML = '';

                genres.forEach((g, i) => {
                    const card = createCard(g, 'genre', i < state.unlockedGenres);
                    genreRow.appendChild(card);
                });
                themes.forEach((t, i) => {
                    const card = createCard(t, 'theme', i < state.unlockedThemes);
                    themeRow.appendChild(card);
                });
                mechanics.forEach((m, i) => {
                    const card = createCard(m, 'mechanic', i < state.unlockedMechanics);
                    mechanicRow.appendChild(card);
                });
            }

            function createCard(data, type, unlocked) {
                const div = document.createElement('div');
                div.className = 'card';
                if (!unlocked) div.classList.add('locked');
                div.innerHTML = `
                    <span class="card-icon">${data.icon}</span>
                    <span class="card-name">${data.name}</span>
                    ${!unlocked ? '<span class="lock-icon">🔒</span>' : ''}
                `;
                if (unlocked) {
                    div.addEventListener('click', (e) => {
                        initAudio();
                        sfxSelect();
                        selectCard(type, data.id, div);
                    });
                    div.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        initAudio();
                        sfxSelect();
                        selectCard(type, data.id, div);
                    });
                }
                if ((type === 'genre' && state.selectedGenre === data.id) ||
                    (type === 'theme' && state.selectedTheme === data.id) ||
                    (type === 'mechanic' && state.selectedMechanic === data.id)) {
                    div.classList.add('selected');
                }
                return div;
            }

            function selectCard(type, id, element) {
                if (state.isForging || state.isPlaying) return;
                const row = element.parentElement;
                row.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));

                if (type === 'genre') {
                    state.selectedGenre = (state.selectedGenre === id) ? null : id;
                } else if (type === 'theme') {
                    state.selectedTheme = (state.selectedTheme === id) ? null : id;
                } else if (type === 'mechanic') {
                    state.selectedMechanic = (state.selectedMechanic === id) ? null : id;
                }

                if ((type === 'genre' && state.selectedGenre === id) ||
                    (type === 'theme' && state.selectedTheme === id) ||
                    (type === 'mechanic' && state.selectedMechanic === id)) {
                    element.classList.add('selected');
                }
                updateAIHint();
                updateForgeButton();
            }

            function updateAIHint() {
                const count = (state.selectedGenre ? 1 : 0) + (state.selectedTheme ? 1 : 0) + (state
                    .selectedMechanic ? 1 : 0);
                if (count === 0) aiMessage.textContent = 'Select 3 cards and I\'ll forge a game!';
                else if (count === 1) aiMessage.textContent = 'Interesting choice... 2 more to go!';
                else if (count === 2) aiMessage.textContent = 'Almost there! One more card...';
                else aiMessage.textContent = 'Ready to forge! Hit the button! ⚡';
            }

            function updateForgeButton() {
                const count = (state.selectedGenre ? 1 : 0) + (state.selectedTheme ? 1 : 0) + (state
                    .selectedMechanic ? 1 : 0);
                forgeBtn.disabled = count < 3 || state.isForging || state.isPlaying;
            }

            // --- Forge Game ---
            function forgeGame() {
                if (state.isForging || state.isPlaying) return;
                const count = (state.selectedGenre ? 1 : 0) + (state.selectedTheme ? 1 : 0) + (state
                    .selectedMechanic ? 1 : 0);
                if (count < 3) return;
                if (state.coins < 30) {
                    showQuickMessage('Not enough coins! Need 30 🪙', '#ff5252');
                    sfxFail();
                    return;
                }

                initAudio();
                state.isForging = true;
                state.coins -= 30;
                updateCoinsDisplay();
                updateForgeButton();

                aiMessage.textContent = '';
                aiThinkingDots.style.display = 'flex';
                forgeBtn.disabled = true;
                forgeBtn.textContent = '⚙️ FORGING...';

                sfxForge();

                const processingTime = 800 + Math.random() * 1200;
                setTimeout(() => {
                    finishForging();
                }, processingTime);

                const btnRect = forgeBtn.getBoundingClientRect();
                const cx = btnRect.left + btnRect.width / 2;
                const cy = btnRect.top + btnRect.height / 2;
                spawnParticles(cx, cy, 15, 'rgb(0,229,255)');
            }

            function finishForging() {
                aiThinkingDots.style.display = 'none';
                state.isForging = false;
                forgeBtn.textContent = '⚡ FORGE GAME';
                updateForgeButton();

                const genreData = genres.find(g => g.id === state.selectedGenre);
                const themeData = themes.find(t => t.id === state.selectedTheme);
                const mechanicData = mechanics.find(m => m.id === state.selectedMechanic);

                const baseScore = genreData.baseVal + themeData.baseVal + mechanicData.baseVal;
                const levelBonus = state.level * 8;
                const creativity = Math.floor(Math.random() * 30) - 10;
                let synergyBonus = 0;
                const comboKey = `${state.selectedGenre}|${state.selectedTheme}|${state.selectedMechanic}`;
                const greatCombos = [
                    'rpg|fantasy|crafting',
                    'shooter|scifi|gravity',
                    'platformer|candy|parkour',
                    'roguelike|cyberpunk|deckbuild',
                    'strategy|mythology|timewarp',
                    'horror|postapoc|stealth',
                    'puzzle|space|fusion',
                    'sim|ocean|rhythm',
                ];
                if (greatCombos.includes(comboKey)) synergyBonus = 35;
                else if (greatCombos.some(c => c.split('|').filter(x => comboKey.includes(x)).length >= 2))
                    synergyBonus = 15;

                const totalScore = Math.max(20, Math.min(300, baseScore + levelBonus + creativity + synergyBonus));
                const rating = totalScore >= 240 ? '🔥 LEGENDARY' :
                    totalScore >= 190 ? '🌟 Excellent' :
                    totalScore >= 150 ? '👍 Great' :
                    totalScore >= 110 ? '👌 Decent' :
                    totalScore >= 70 ? '😐 Okay' : '💤 Meh';

                const nameParts = [
                    themeData.name.split(' ')[0],
                    genreData.name.split(' ')[0],
                    mechanicData.name.split(' ')[0],
                ];
                const gameName = nameParts.join(' ') + ' ' + (['Tales', 'Quest', 'Chronicles', 'Legends', 'Rising',
                    'Odyssey'
                ][Math.floor(Math.random() * 6)]);

                const coinReward = Math.floor(totalScore / 3) + Math.floor(Math.random() * 20);
                state.coins += coinReward;
                const xpGain = Math.floor(totalScore / 2);
                state.xp += xpGain;

                let leveledUp = false;
                while (state.xp >= state.xpToNext) {
                    state.xp -= state.xpToNext;
                    state.level++;
                    state.xpToNext = Math.floor(state.xpToNext * 1.5);
                    leveledUp = true;
                    if (state.level >= 3 && state.unlockedGenres < genres.length) state.unlockedGenres++;
                    if (state.level >= 4 && state.unlockedThemes < themes.length) state.unlockedThemes++;
                    if (state.level >= 5 && state.unlockedMechanics < mechanics.length) state.unlockedMechanics++;
                }

                updateCoinsDisplay();
                updateLevelDisplay();
                renderCards();

                state.history.unshift({ name: gameName, score: totalScore, rating });
                if (state.history.length > 20) state.history.pop();
                updateHistory();

                showResultModal(gameName, totalScore, rating, coinReward, xpGain, leveledUp, genreData, themeData,
                    mechanicData);

                sfxSuccess();
                const w = window.innerWidth;
                const h = window.innerHeight;
                spawnParticles(w / 2, h / 2, 30, 'rgb(255,215,64)');
                if (leveledUp) spawnParticles(w / 2, h / 2, 20, 'rgb(179,71,234)');

                aiMessage.textContent = `"${gameName}" — ${rating}! I'm getting smarter... 🧠`;
            }

            function showQuickMessage(msg, color) {
                aiMessage.textContent = msg;
                aiMessage.style.color = color;
                setTimeout(() => {
                    aiMessage.style.color = '#a0b0d0';
                    updateAIHint();
                }, 1800);
            }

            function showResultModal(name, score, rating, coins, xp, leveledUp, g, t, m) {
                const existing = document.getElementById('modal-overlay');
                if (existing) existing.remove();

                const overlay = document.createElement('div');
                overlay.id = 'modal-overlay';
                overlay.innerHTML = `
                    <div id="modal">
                        <div class="game-result-icon">${g.icon}${t.icon}${m.icon}</div>
                        <h2>${name}</h2>
                        <div class="result-score">${score} pts</div>
                        <div style="font-size:1.1em;color:#fff;font-weight:700;">${rating}</div>
                        <div class="result-tags">
                            <span class="result-tag">${g.name}</span>
                            <span class="result-tag">${t.name}</span>
                            <span class="result-tag">${m.name}</span>
                        </div>
                        <div class="result-detail">
                            +${coins} 🪙 &nbsp;|&nbsp; +${xp} XP
                            ${leveledUp ? '<br><span style="color:#c77dff;">🎉 LEVEL UP! Lv.'+state.level+'</span>' : ''}
                            ${leveledUp && state.unlockedGenres>5 ? '<br><span style="color:#69f0ae;">🔓 New cards unlocked!</span>' : ''}
                        </div>
                        <button class="btn-close" id="modal-close-btn">✨ Continue</button>
                        <button class="btn-play" id="modal-play-btn">▶️ Play</button>
                    </div>
                `;
                document.body.appendChild(overlay);

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) closeModal();
                });
                document.getElementById('modal-close-btn').addEventListener('click', closeModal);
                document.getElementById('modal-play-btn').addEventListener('click', () => {
                    closeModal();
                    startPlayGame(g, t, m);
                });

                function closeModal() {
                    overlay.style.opacity = '0';
                    overlay.style.transition = 'opacity 0.2s';
                    setTimeout(() => overlay.remove(), 200);
                    updateAIHint();
                }
            }

            function updateCoinsDisplay() {
                coinsDisplay.textContent = state.coins;
            }

            function updateLevelDisplay() {
                levelDisplay.textContent = state.level;
            }

            function updateHistory() {
                if (state.history.length === 0) {
                    historyArea.innerHTML = '<span style="color:#555;">📋 Recent games will appear here...</span>';
                    return;
                }
                historyArea.innerHTML = state.history.slice(0, 6).map(h => `
                    <div class="history-item">
                        <span class="h-name">${h.name}</span>
                        <span class="h-score">${h.score}</span>
                    </div>
                `).join('');
            }

            // --- Play Mini-Game ---
            function startPlayGame(genre, theme, mechanic) {
                if (state.isPlaying) return;
                state.isPlaying = true;
                updateForgeButton();
                forgeBtn.disabled = true;

                // Remove existing overlay if any
                const oldOverlay = document.getElementById('play-overlay');
                if (oldOverlay) oldOverlay.remove();

                const overlay = document.createElement('div');
                overlay.id = 'play-overlay';
                overlay.innerHTML = `
                    <div id="play-hud">
                        <span>❤️ <span id="play-lives">3</span></span>
                        <span>⏱️ <span id="play-timer">60</span>s</span>
                        <span>⭐ <span id="play-score">0</span></span>
                    </div>
                    <canvas id="play-canvas" width="400" height="500"></canvas>
                    <button id="ability-btn">⚡ ${mechanic.ability || 'Special'}</button>
                    <div id="play-result">
                        <h3>Game Over!</h3>
                        <p>Score: <span id="final-score">0</span></p>
                        <p>Reward: <span id="reward-coins">0</span> 🪙 + <span id="reward-xp">0</span> XP</p>
                        <button id="play-back-btn">Back to Forge</button>
                    </div>
                `;
                document.body.appendChild(overlay);

                const canvas = document.getElementById('play-canvas');
                const ctx = canvas.getContext('2d');
                const abilityBtn = document.getElementById('ability-btn');
                const playResult = document.getElementById('play-result');
                const backBtn = document.getElementById('play-back-btn');
                const livesSpan = document.getElementById('play-lives');
                const timerSpan = document.getElementById('play-timer');
                const scoreSpan = document.getElementById('play-score');
                const finalScoreSpan = document.getElementById('final-score');
                const rewardCoinsSpan = document.getElementById('reward-coins');
                const rewardXpSpan = document.getElementById('reward-xp');

                // Game variables
                const PLAYER_WIDTH = 30;
                const PLAYER_HEIGHT = 30;
                let playerX = canvas.width / 2 - PLAYER_WIDTH / 2;
                const playerY = canvas.height - 60;
                let lives = 3;
                let score = 0;
                let gameTime = 60; // seconds
                let gameOver = false;
                let obstacles = [];
                let coins = [];
                let lastObstacleSpawn = 0;
                let lastCoinSpawn = 0;
                const obstacleSpeedBase = 120;
                let obstacleSpeed = obstacleSpeedBase;
                let abilityCooldown = 0;
                const abilityMaxCooldown = mechanic.cooldown || 5;
                let abilityActive = false;
                let abilityTimer = 0;
                let slowMotion = false;

                // Input handling
                let keys = {};
                let touchActive = false;
                let touchX = null;

                function handleKeyDown(e) {
                    keys[e.key] = true;
                    if (e.key === ' ' && abilityCooldown <= 0 && !gameOver) {
                        activateAbility();
                        e.preventDefault();
                    }
                }

                function handleKeyUp(e) {
                    keys[e.key] = false;
                }

                function handleTouchStart(e) {
                    e.preventDefault();
                    touchActive = true;
                    const rect = canvas.getBoundingClientRect();
                    touchX = e.touches[0].clientX - rect.left;
                }

                function handleTouchMove(e) {
                    e.preventDefault();
                    if (touchActive) {
                        const rect = canvas.getBoundingClientRect();
                        touchX = e.touches[0].clientX - rect.left;
                    }
                }

                function handleTouchEnd(e) {
                    e.preventDefault();
                    touchActive = false;
                    touchX = null;
                }

                function handleAbilityClick() {
                    if (!gameOver && abilityCooldown <= 0) {
                        activateAbility();
                    }
                }

                function activateAbility() {
                    abilityActive = true;
                    abilityTimer = 1.5; // active duration
                    abilityCooldown = abilityMaxCooldown;
                    if (mechanic.id === 'timewarp') {
                        slowMotion = true;
                        setTimeout(() => { slowMotion = false; }, 2000);
                    }
                    if (mechanic.id === 'fusion') {
                        // destroy all obstacles on screen
                        obstacles = [];
                        spawnParticles(playerX + PLAYER_WIDTH/2, playerY, 20, 'rgb(255,100,0)');
                    }
                }

                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd);
                canvas.addEventListener('touchcancel', handleTouchEnd);
                abilityBtn.addEventListener('click', handleAbilityClick);

                let lastTimestamp = 0;
                let gameLoopId;

                function updatePlay(dt) {
                    if (gameOver) return;

                    // Player movement
                    const moveSpeed = 300;
                    if (keys['ArrowLeft'] || keys['a']) playerX -= moveSpeed * dt;
                    if (keys['ArrowRight'] || keys['d']) playerX += moveSpeed * dt;
                    if (touchActive && touchX !== null) {
                        const targetX = touchX - PLAYER_WIDTH / 2;
                        playerX += (targetX - playerX) * 10 * dt;
                    }
                    playerX = Math.max(0, Math.min(canvas.width - PLAYER_WIDTH, playerX));

                    // Update ability cooldown
                    if (abilityCooldown > 0) {
                        abilityCooldown -= dt;
                        if (abilityCooldown < 0) abilityCooldown = 0;
                        abilityBtn.disabled = abilityCooldown > 0;
                        abilityBtn.textContent = abilityCooldown > 0 ?
                            `⏳ ${Math.ceil(abilityCooldown)}s` :
                            `⚡ ${mechanic.ability || 'Special'}`;
                    }
                    if (abilityActive) {
                        abilityTimer -= dt;
                        if (abilityTimer <= 0) {
                            abilityActive = false;
                        }
                    }

                    // Spawn obstacles
                    const currentSpeed = slowMotion ? obstacleSpeed * 0.4 : obstacleSpeed;
                    const spawnInterval = slowMotion ? 1.0 : 0.6;
                    lastObstacleSpawn += dt;
                    if (lastObstacleSpawn > spawnInterval) {
                        lastObstacleSpawn = 0;
                        const size = 20 + Math.random() * 20;
                        obstacles.push({
                            x: Math.random() * (canvas.width - size),
                            y: -size,
                            size,
                            speed: currentSpeed + Math.random() * 40,
                        });
                    }

                    // Spawn coins
                    lastCoinSpawn += dt;
                    if (lastCoinSpawn > 1.2) {
                        lastCoinSpawn = 0;
                        coins.push({
                            x: Math.random() * (canvas.width - 15),
                            y: -15,
                            size: 14,
                            speed: currentSpeed * 0.9,
                        });
                    }

                    // Move obstacles and check collision
                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        const ob = obstacles[i];
                        ob.y += ob.speed * dt;
                        if (ob.y > canvas.height + ob.size) {
                            obstacles.splice(i, 1);
                            continue;
                        }
                        // Collision with player
                        if (!abilityActive || mechanic.id !== 'stealth') { // stealth makes invulnerable when active
                            const dx = (playerX + PLAYER_WIDTH / 2) - (ob.x + ob.size / 2);
                            const dy = (playerY + PLAYER_HEIGHT / 2) - (ob.y + ob.size / 2);
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < (PLAYER_WIDTH / 2 + ob.size / 2)) {
                                obstacles.splice(i, 1);
                                lives--;
                                livesSpan.textContent = lives;
                                spawnParticles(ob.x + ob.size / 2, ob.y + ob.size / 2, 8, 'rgb(255,50,50)');
                                if (lives <= 0) {
                                    endGame();
                                    return;
                                }
                            }
                        }
                    }

                    // Move coins and check collection
                    for (let i = coins.length - 1; i >= 0; i--) {
                        const c = coins[i];
                        c.y += c.speed * dt;
                        if (c.y > canvas.height + c.size) {
                            coins.splice(i, 1);
                            continue;
                        }
                        const dx = (playerX + PLAYER_WIDTH / 2) - (c.x + c.size / 2);
                        const dy = (playerY + PLAYER_HEIGHT / 2) - (c.y + c.size / 2);
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (PLAYER_WIDTH / 2 + c.size / 2)) {
                            coins.splice(i, 1);
                            score += 20;
                            scoreSpan.textContent = score;
                            spawnParticles(c.x + c.size / 2, c.y + c.size / 2, 4, 'rgb(255,215,0)');
                            playBeep(1000, 0.05, 'sine', 0.04);
                        }
                    }

                    // Update timer
                    gameTime -= dt;
                    if (gameTime <= 0) {
                        gameTime = 0;
                        endGame();
                        return;
                    }
                    timerSpan.textContent = Math.ceil(gameTime);
                }

                function drawPlay() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Background gradient based on theme
                    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    if (theme.id === 'fantasy') { grad.addColorStop(0, '#2a1a4a');
                        grad.addColorStop(1, '#0a0a14'); } else if (theme.id === 'scifi' || theme.id === 'space') { grad
                            .addColorStop(0, '#0a1a3a');
                        grad.addColorStop(1, '#000011'); } else if (theme.id === 'cyberpunk') { grad.addColorStop(0,
                            '#1a0030');
                        grad.addColorStop(1, '#0a0010'); } else { grad.addColorStop(0, '#1a1a2e');
                        grad.addColorStop(1, '#0a0a14'); }
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Draw obstacles (enemies)
                    for (const ob of obstacles) {
                        ctx.fillStyle = '#ff4444';
                        ctx.beginPath();
                        ctx.arc(ob.x + ob.size / 2, ob.y + ob.size / 2, ob.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#aa0000';
                        ctx.font = `${ob.size*0.8}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.fillText(theme.icon || '👾', ob.x + ob.size / 2, ob.y + ob.size / 2 + ob.size * 0.25);
                    }

                    // Draw coins
                    for (const c of coins) {
                        ctx.fillStyle = '#ffd740';
                        ctx.beginPath();
                        ctx.arc(c.x + c.size / 2, c.y + c.size / 2, c.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.font = `${c.size*0.9}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.fillText('🪙', c.x + c.size / 2, c.y + c.size / 2 + c.size * 0.3);
                    }

                    // Draw player
                    ctx.fillStyle = abilityActive ? '#00e5ff' : '#fff';
                    ctx.beginPath();
                    ctx.arc(playerX + PLAYER_WIDTH / 2, playerY + PLAYER_HEIGHT / 2, PLAYER_WIDTH / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.font = '16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(genre.icon || '👤', playerX + PLAYER_WIDTH / 2, playerY + PLAYER_HEIGHT / 2 + 6);
                }

                function gameLoop(timestamp) {
                    if (!lastTimestamp) lastTimestamp = timestamp;
                    let dt = (timestamp - lastTimestamp) / 1000;
                    if (dt > 0.1) dt = 0.1;
                    lastTimestamp = timestamp;

                    if (!gameOver) {
                        updatePlay(dt);
                        drawPlay();
                    }
                    gameLoopId = requestAnimationFrame(gameLoop);
                }

                function endGame() {
                    gameOver = true;
                    const finalScore = score + Math.floor((60 - gameTime) * 10);
                    finalScoreSpan.textContent = finalScore;
                    const coinReward = Math.floor(finalScore / 8) + 5;
                    const xpReward = Math.floor(finalScore / 4);
                    rewardCoinsSpan.textContent = coinReward;
                    rewardXpSpan.textContent = xpReward;
                    playResult.style.display = 'block';

                    state.coins += coinReward;
                    state.xp += xpReward;
                    let leveledUp = false;
                    while (state.xp >= state.xpToNext) {
                        state.xp -= state.xpToNext;
                        state.level++;
                        state.xpToNext = Math.floor(state.xpToNext * 1.5);
                        leveledUp = true;
                        if (state.level >= 3 && state.unlockedGenres < genres.length) state.unlockedGenres++;
                        if (state.level >= 4 && state.unlockedThemes < themes.length) state.unlockedThemes++;
                        if (state.level >= 5 && state.unlockedMechanics < mechanics.length) state.unlockedMechanics++;
                    }
                    updateCoinsDisplay();
                    updateLevelDisplay();
                    renderCards();

                    if (leveledUp) {
                        aiMessage.textContent = '🎉 Level up while playing! New cards unlocked!';
                    }
                }

                function cleanup() {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                    canvas.removeEventListener('touchstart', handleTouchStart);
                    canvas.removeEventListener('touchmove', handleTouchMove);
                    canvas.removeEventListener('touchend', handleTouchEnd);
                    canvas.removeEventListener('touchcancel', handleTouchEnd);
                    abilityBtn.removeEventListener('click', handleAbilityClick);
                    if (gameLoopId) cancelAnimationFrame(gameLoopId);
                    overlay.remove();
                    state.isPlaying = false;
                    updateForgeButton();
                    aiMessage.textContent = 'Select 3 cards and I\'ll forge a game!';
                }

                backBtn.addEventListener('click', cleanup);

                // Start loop
                lastTimestamp = 0;
                gameLoopId = requestAnimationFrame(gameLoop);
            }

            // --- Forge button ---
            forgeBtn.addEventListener('click', () => {
                initAudio();
                sfxClick();
                forgeGame();
            });
            forgeBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                initAudio();
                sfxClick();
                forgeGame();
            });

            // --- Initialize ---
            function init() {
                renderCards();
                updateCoinsDisplay();
                updateLevelDisplay();
                updateForgeButton();
                updateAIHint();
                updateHistory();
            }

            // --- Game Loop ---
            let lastTime = performance.now();

            function mainLoop(time) {
                const dt = Math.min((time - lastTime) / 1000, 0.1);
                lastTime = time;

                updateParticles(dt);

                const w = particlesCanvas.width;
                const h = particlesCanvas.height;
                ctx.clearRect(0, 0, w, h);
                drawParticles(ctx, w, h);

                if (Math.random() < 0.3 && particles.length < MAX_PARTICLES - 5) {
                    const px = Math.random() * w;
                    const py = h + 10;
                    particles.push({
                        x: px,
                        y: py,
                        vx: (Math.random() - 0.5) * 0.6,
                        vy: -0.6 - Math.random() * 1.2,
                        life: 2 + Math.random() * 3,
                        maxLife: 3,
                        size: 1 + Math.random() * 2,
                        color: 'rgb(100,160,255)',
                    });
                }

                requestAnimationFrame(mainLoop);
            }

            init();
            requestAnimationFrame(mainLoop);

            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchend', initAudio, { once: true });

            console.log('🧠 AI Game Forge ready! Select genre, theme, and mechanic cards, then hit FORGE!');
        })();
    </script>
</body>
</html>
