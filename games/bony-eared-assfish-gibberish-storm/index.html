<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bony-Eared Assfish: Gibberish Storm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000a14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.3), 0 0 120px rgba(0, 80, 200, 0.2);
            max-width: 100vw;
            max-height: 100vh;
            cursor: none;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.8s;
        }
        #instructions.visible {
            opacity: 1;
        }
        #instructions h2 {
            font-size: clamp(1rem, 3vw, 1.8rem);
            text-shadow: 0 0 20px #00ccff, 0 0 40px #0088cc;
            margin-bottom: 8px;
        }
        #instructions p {
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: #aaddff;
            text-shadow: 0 0 10px #0066aa;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="instructions" class="visible">
        <h2>🦴👂🐟 Bony-Eared Assfish</h2>
        <p>Dodge the gibberish! Collect your name in <span style="color:#ffd700;">gold</span>!</p>
        <p style="font-size:0.8rem;margin-top:4px;">Arrow Keys / A,D / Drag to move &nbsp;|&nbsp; Survive as long as you can</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const instructionsEl = document.getElementById('instructions');

            // --- Canvas Sizing ---
            function resizeCanvas() {
                const w = Math.min(window.innerWidth - 10, 800);
                const h = Math.min(window.innerHeight - 10, 950);
                canvas.width = w;
                canvas.height = h;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                if (gameState === 'playing') {
                    player.y = canvas.height - 100;
                    player.x = Math.min(Math.max(player.x, 50), canvas.width - 50);
                }
            });

            // --- Audio Engine ---
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playBeep(freq, duration, type = 'sine', vol = 0.08, glideTo = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {}
            }

            function sfxCollect() {
                playBeep(600, 0.15, 'sine', 0.1, 900);
                setTimeout(() => playBeep(900, 0.12, 'sine', 0.08, 1200), 100);
            }

            function sfxHit() {
                playBeep(80, 0.4, 'sawtooth', 0.15, 30);
                playBeep(50, 0.5, 'square', 0.08, 20);
            }

            function sfxSpawn() {
                playBeep(200, 0.08, 'sine', 0.03, 300);
            }

            function sfxBubblePop() {
                playBeep(1000, 0.06, 'sine', 0.04, 1400);
            }

            // --- Game State ---
            let gameState = 'waiting'; // 'waiting' | 'playing' | 'over'
            let score = 0;
            let highScore = 0;
            let survivalTime = 0;
            let difficulty = 1;
            let spawnTimer = 0;
            let spawnInterval = 90; // frames at 60fps
            let shakeAmount = 0;
            let flashAlpha = 0;

            try {
                highScore = parseInt(localStorage.getItem('assfishHighScore')) || 0;
            } catch (e) {
                highScore = 0;
            }

            // --- Player (Bony-Eared Assfish) ---
            const player = {
                x: canvas.width / 2,
                y: canvas.height - 100,
                width: 70,
                height: 44,
                targetX: canvas.width / 2,
                speed: 0.12,
                facingRight: true,
                bobOffset: 0,
                earWiggle: 0,
            };

            function resetPlayer() {
                player.x = canvas.width / 2;
                player.y = canvas.height - 100;
                player.targetX = player.x;
                player.facingRight = true;
                player.bobOffset = 0;
                player.earWiggle = 0;
            }

            function drawAssfish(x, y, facingRight) {
                ctx.save();
                ctx.translate(x, y);
                const dir = facingRight ? 1 : -1;
                ctx.scale(dir, 1);

                const bob = Math.sin(player.bobOffset) * 4;
                const earW = Math.sin(player.earWiggle) * 3;

                // Tail fin (the "ass" part - somewhat prominent)
                ctx.fillStyle = '#ee7755';
                ctx.beginPath();
                ctx.moveTo(-30, 0);
                ctx.quadraticCurveTo(-48, -18 + bob, -50, -28 + bob);
                ctx.quadraticCurveTo(-40, -6, -38, 0);
                ctx.quadraticCurveTo(-40, 6, -50, 28 - bob);
                ctx.quadraticCurveTo(-48, 18 - bob, -30, 0);
                ctx.fill();
                ctx.strokeStyle = '#cc5544';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Main body
                const bodyGrad = ctx.createRadialGradient(0, -2, 5, 0, 0, 28);
                bodyGrad.addColorStop(0, '#ffaa88');
                bodyGrad.addColorStop(0.5, '#ff8866');
                bodyGrad.addColorStop(1, '#dd6644');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.ellipse(0, 2, 32, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#cc5533';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Bone markings (rib-like stripes)
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 2.5;
                for (let i = -18; i <= 18; i += 9) {
                    ctx.beginPath();
                    const bx = i;
                    const topY = -16 + Math.abs(i) * 0.25;
                    const botY = 18 - Math.abs(i) * 0.2;
                    ctx.moveTo(bx, topY);
                    ctx.quadraticCurveTo(bx + 3 * Math.sign(i || 1), 3, bx, botY);
                    ctx.stroke();
                }
                // Spine line
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-26, -3);
                ctx.quadraticCurveTo(0, -6, 26, -2);
                ctx.stroke();

                // Bony ears (prominent ear-like fins on top)
                ctx.fillStyle = '#ff9977';
                ctx.strokeStyle = '#cc5533';
                ctx.lineWidth = 2;
                // Left ear
                ctx.beginPath();
                ctx.moveTo(-6, -18);
                ctx.quadraticCurveTo(-14, -38 + earW, -4, -42 + earW);
                ctx.quadraticCurveTo(2, -32, -2, -18);
                ctx.fill();
                ctx.stroke();
                // Inner ear bone highlight
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-5, -20);
                ctx.quadraticCurveTo(-10, -34 + earW, -4, -38 + earW);
                ctx.stroke();

                // Right ear
                ctx.fillStyle = '#ff9977';
                ctx.strokeStyle = '#cc5533';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(6, -18);
                ctx.quadraticCurveTo(14, -38 - earW, 4, -42 - earW);
                ctx.quadraticCurveTo(-2, -32, 2, -18);
                ctx.fill();
                ctx.stroke();
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(5, -20);
                ctx.quadraticCurveTo(10, -34 - earW, 4, -38 - earW);
                ctx.stroke();

                // Eye
                const eyeX = 14;
                const eyeY = -6;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(eyeX, eyeY, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Pupil
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(eyeX + 2, eyeY - 1, 4.5, 0, Math.PI * 2);
                ctx.fill();
                // Pupil highlight
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(eyeX + 1, eyeY - 3, 1.8, 0, Math.PI * 2);
                ctx.fill();

                // Small mouth
                ctx.strokeStyle = '#993322';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(20, 6, 5, 0.1, Math.PI - 0.1);
                ctx.stroke();

                // Tiny pectoral fin
                ctx.fillStyle = '#ff9977';
                ctx.beginPath();
                ctx.moveTo(5, 14);
                ctx.quadraticCurveTo(-2, 22, 8, 20);
                ctx.quadraticCurveTo(12, 16, 5, 14);
                ctx.fill();
                ctx.strokeStyle = '#cc5533';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.restore();
            }

            // --- Text Blocks ---
            const gibberishChunks = [
                'dhytdzfyufgys',
                'GDfuwgyfgary',
                'fgagwygguhigh',
                'aerugherhgaeug',
                'eauirghauhgehg',
                'aehgaehgiaeuhg',
                'iuaeghyaeuygh',
                'aeghfhghiyri',
                'aeuhgyreagryy',
                'ryaryaagyyagr',
                'gyragayrgygyay',
                'rgyryayaraygyr',
                'gygrygrgryrgg',
                'ygaryaggagygry',
                'ggygygyagryag',
                'ygyraagyrrgrg',
                'arygaraggaygay',
                'gargrgayagyrag',
                'yrgryagryagryg',
                'rgrgragggggay',
                'agyrgggyukbbbb',
                'bbbsdkhxgyudfg',
                'iuzshbgyuarzsy',
                'dyghrsukhrwytd',
                'f6uyrudfygsydh',
                'fweysjdhfryjhf',
                'dgrysdhfbhgrue',
                'fuigghtdryzhgr',
                'zidhgfnhjtzdfg',
                'bysdhgtehgdjbh',
                'uzsrdfhwszudfj',
                'fwesdjfhwewear',
                'edfaessdfISFgy',
                'yrawsGdyhsbzdf',
                'jkhrhsydzghabr',
                'uksyjhguyszdhg',
                'bayszdgeyasudg',
                'hyhSuzidkfjenz',
                'sdjfhhhhEYJHGD',
                'ghjHJDfhuIJHFD',
                'UIEJSDHFLUISED',
                'HFnkrhjzfgnrdz',
                'ksjfziuzrsdfgy',
                'hrsuDhgyrdhgre',
                'uisiyfhyurfhgu',
                'izsyehfUIGIUSH',
                'DFIGEUSYDHYGES',
                'DGHSLIUEDGUPAS',
                'OGJWEUSIydghUO',
                'IEDHGUSHDFEYSI',
                'UGHHSIUDGrehij',
                'zfdhguyergdzfh',
                'gyhgYSgyWGgghu',
                'hguhhuauhhghgr',
                'aggargarhgauag',
                'ghaghgaaggargy',
                'agryagryyurg',
                'rehijzfdhguyer',
                'gdzfhgyhgYSgyW',
                'Ggghuhguhhuauh',
                'hghgraggargarh',
            ];

            const specialText = 'Bony-eared assfish';

            let textBlocks = [];

            class TextBlock {
                constructor(x, y, text, isSpecial = false) {
                    this.x = x;
                    this.y = y;
                    this.text = text;
                    this.isSpecial = isSpecial;
                    this.fontSize = isSpecial ? 26 : 13 + Math.floor(Math.random() * 11);
                    this.width = 0;
                    this.height = this.fontSize + 8;
                    this.speed = isSpecial ? 1.2 + Math.random() * 0.6 : 0.8 + Math.random() * 1.8 + difficulty * 0.25;
                    this.color = isSpecial ? '#ffd700' : this.randomGibberishColor();
                    this.glowColor = isSpecial ? '#ffaa00' : this.color;
                    this.alpha = 1;
                    this.rotation = (Math.random() - 0.5) * 0.15;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = 0.01 + Math.random() * 0.03;
                    this.measured = false;
                }

                randomGibberishColor() {
                    const colors = [
                        '#ff5577', '#ff7755', '#ff44aa', '#cc66ff',
                        '#55ddff', '#55ff88', '#ffcc33', '#ff6644',
                        '#ee55cc', '#44ddcc', '#ff8855', '#aa77ff',
                    ];
                    return colors[Math.floor(Math.random() * colors.length)];
                }

                measure(ctx) {
                    if (!this.measured) {
                        ctx.font = `bold ${this.fontSize}px "Courier New", monospace`;
                        const metrics = ctx.measureText(this.text);
                        this.width = metrics.width + 16;
                        this.measured = true;
                    }
                }

                update() {
                    this.y += this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.4;
                }

                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.shadowColor = this.glowColor;
                    ctx.shadowBlur = this.isSpecial ? 20 : 10;
                    ctx.font = `bold ${this.fontSize}px "Courier New", monospace`;
                    ctx.fillStyle = this.color;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.text, this.x, this.y);
                    // Second pass for extra glow on special
                    if (this.isSpecial) {
                        ctx.shadowBlur = 35;
                        ctx.fillStyle = '#ffffff';
                        ctx.globalAlpha = 0.5;
                        ctx.fillText(this.text, this.x, this.y);
                        ctx.globalAlpha = this.alpha;
                        ctx.shadowBlur = 20;
                        ctx.fillStyle = this.color;
                        ctx.fillText(this.text, this.x, this.y);
                    }
                    ctx.restore();
                }

                getBounds() {
                    return {
                        x: this.x - this.width / 2,
                        y: this.y - this.height / 2,
                        w: this.width,
                        h: this.height,
                    };
                }
            }

            function spawnTextBlock() {
                const isSpecial = Math.random() < 0.04 && gameState === 'playing'; // 4% chance
                const text = isSpecial ? specialText :
                    gibberishChunks[Math.floor(Math.random() * gibberishChunks.length)];
                const block = new TextBlock(
                    30 + Math.random() * (canvas.width - 60),
                    -30 - Math.random() * 60,
                    text,
                    isSpecial
                );
                block.measure(ctx);
                textBlocks.push(block);
                if (isSpecial) sfxSpawn();
            }

            // --- Particles ---
            let particles = [];

            class Particle {
                constructor(x, y, color, size, life) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.size = size;
                    this.life = life;
                    this.maxLife = life;
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 0.5) * 8 - 2;
                    this.gravity = 0.15;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.life--;
                    this.size *= 0.985;
                }

                draw(ctx) {
                    const alpha = this.life / this.maxLife;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                get dead() { return this.life <= 0; }
            }

            function spawnParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, color, 2 + Math.random() * 5, 20 + Math.random() * 30));
                }
            }

            // --- Decorative Bubbles ---
            let bubbles = [];

            function spawnBubble() {
                bubbles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + 10,
                    size: 2 + Math.random() * 8,
                    speed: 0.3 + Math.random() * 1.2,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.005 + Math.random() * 0.02,
                    alpha: 0.2 + Math.random() * 0.4,
                });
            }

            function updateBubbles() {
                for (let b of bubbles) {
                    b.y -= b.speed;
                    b.wobble += b.wobbleSpeed;
                    b.x += Math.sin(b.wobble) * 0.3;
                    if (b.y < -20) {
                        b.y = canvas.height + 10;
                        b.x = Math.random() * canvas.width;
                    }
                }
                // Maintain bubble count
                while (bubbles.length < 25) spawnBubble();
                if (bubbles.length > 35) bubbles.splice(0, bubbles.length - 35);
            }

            function drawBubbles(ctx) {
                for (let b of bubbles) {
                    ctx.save();
                    ctx.globalAlpha = b.alpha;
                    ctx.strokeStyle = '#aaddff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                    ctx.stroke();
                    // Small highlight
                    ctx.fillStyle = '#ffffff';
                    ctx.globalAlpha = b.alpha * 0.6;
                    ctx.beginPath();
                    ctx.arc(b.x - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- Seaweed ---
            function drawSeaweed(ctx, x, baseY, height, phase) {
                ctx.save();
                ctx.strokeStyle = '#1a5c3a';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x, baseY);
                const segments = 8;
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const sx = x + Math.sin(t * 3 + phase + performance.now() * 0.001) * 12 * t;
                    const sy = baseY - height * t;
                    ctx.lineTo(sx, sy);
                }
                ctx.stroke();
                // Lighter highlight
                ctx.strokeStyle = '#2a8c5a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + 2, baseY);
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const sx = x + 2 + Math.sin(t * 3 + phase + performance.now() * 0.001 + 0.3) * 8 * t;
                    const sy = baseY - height * t;
                    ctx.lineTo(sx, sy);
                }
                ctx.stroke();
                ctx.restore();
            }

            // --- Background ---
            function drawBackground(ctx) {
                // Ocean gradient
                const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                bgGrad.addColorStop(0, '#001428');
                bgGrad.addColorStop(0.3, '#002244');
                bgGrad.addColorStop(0.6, '#003355');
                bgGrad.addColorStop(1, '#001a33');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Light rays from above
                ctx.save();
                for (let i = 0; i < 5; i++) {
                    const rx = canvas.width * (0.1 + i * 0.2);
                    const rayGrad = ctx.createLinearGradient(rx, 0, rx, canvas.height);
                    rayGrad.addColorStop(0, 'rgba(100,180,255,0.06)');
                    rayGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = rayGrad;
                    ctx.beginPath();
                    ctx.moveTo(rx - 30, 0);
                    ctx.lineTo(rx + 50, canvas.height);
                    ctx.lineTo(rx - 80, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();

                // Sandy bottom
                const sandGrad = ctx.createLinearGradient(0, canvas.height - 40, 0, canvas.height);
                sandGrad.addColorStop(0, 'rgba(40,30,20,0)');
                sandGrad.addColorStop(0.4, 'rgba(60,45,25,0.5)');
                sandGrad.addColorStop(1, 'rgba(50,35,20,0.8)');
                ctx.fillStyle = sandGrad;
                ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

                // Seaweed
                drawSeaweed(ctx, 60, canvas.height - 35, 80, 0);
                drawSeaweed(ctx, 140, canvas.height - 30, 60, 1.5);
                drawSeaweed(ctx, canvas.width - 70, canvas.height - 35, 90, 2.3);
                drawSeaweed(ctx, canvas.width - 150, canvas.height - 28, 55, 3.8);
                drawSeaweed(ctx, canvas.width / 2 + 30, canvas.height - 32, 70, 5.2);

                // Draw bubbles
                drawBubbles(ctx);
            }

            // --- Collision Detection ---
            function rectsOverlap(a, b) {
                const margin = 4;
                return !(
                    a.x + a.w - margin < b.x + margin ||
                    a.x + margin > b.x + b.w - margin ||
                    a.y + a.h - margin < b.y + margin ||
                    a.y + margin > b.y + b.h - margin
                );
            }

            function getPlayerBounds() {
                return {
                    x: player.x - 28,
                    y: player.y - 18,
                    w: 56,
                    h: 36,
                };
            }

            // --- Game Logic ---
            function startGame() {
                initAudio();
                gameState = 'playing';
                score = 0;
                survivalTime = 0;
                difficulty = 1;
                spawnTimer = 0;
                spawnInterval = 90;
                textBlocks = [];
                particles = [];
                shakeAmount = 0;
                flashAlpha = 0;
                resetPlayer();
                instructionsEl.classList.remove('visible');
            }

            function endGame() {
                gameState = 'over';
                shakeAmount = 20;
                flashAlpha = 0.7;
                sfxHit();
                const pb = getPlayerBounds();
                spawnParticles(player.x, player.y, 50, '#ff6644');
                spawnParticles(player.x, player.y, 30, '#ffffff');
                if (score > highScore) {
                    highScore = Math.floor(score);
                    try {
                        localStorage.setItem('assfishHighScore', highScore);
                    } catch (e) {}
                }
            }

            function restartGame() {
                startGame();
            }

            function update() {
                if (gameState !== 'playing') {
                    // Still update particles and bubbles
                    particles.forEach(p => p.update());
                    particles = particles.filter(p => !p.dead);
                    updateBubbles();
                    if (shakeAmount > 0) shakeAmount *= 0.85;
                    if (shakeAmount < 0.1) shakeAmount = 0;
                    if (flashAlpha > 0) flashAlpha *= 0.9;
                    if (flashAlpha < 0.005) flashAlpha = 0;
                    return;
                }

                survivalTime += 1 / 60;
                score = Math.floor(survivalTime);
                difficulty = 1 + Math.floor(survivalTime / 20);
                spawnInterval = Math.max(25, 90 - difficulty * 6);

                // Update player
                const dx = player.targetX - player.x;
                player.x += dx * player.speed;
                if (Math.abs(dx) > 0.5) {
                    player.facingRight = dx > 0;
                }
                player.x = Math.max(35, Math.min(canvas.width - 35, player.x));
                player.bobOffset += 0.06;
                player.earWiggle += 0.08 + Math.abs(dx) * 0.03;

                // Spawn text blocks
                spawnTimer++;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    spawnTextBlock();
                    // Occasionally spawn extra
                    if (difficulty > 3 && Math.random() < 0.3) spawnTextBlock();
                    if (difficulty > 6 && Math.random() < 0.25) spawnTextBlock();
                }

                // Update text blocks
                for (let block of textBlocks) {
                    block.update();
                }

                // Check collisions
                const playerBounds = getPlayerBounds();
                for (let i = textBlocks.length - 1; i >= 0; i--) {
                    const block = textBlocks[i];
                    const blockBounds = block.getBounds();
                    if (rectsOverlap(playerBounds, blockBounds)) {
                        if (block.isSpecial) {
                            // Collect special!
                            score += 25;
                            sfxCollect();
                            spawnParticles(block.x, block.y, 25, '#ffd700');
                            spawnParticles(block.x, block.y, 15, '#ffffff');
                            textBlocks.splice(i, 1);
                        } else {
                            // Hit by gibberish!
                            endGame();
                            return;
                        }
                    }
                }

                // Remove off-screen text blocks
                textBlocks = textBlocks.filter(b => b.y < canvas.height + 60 && b.y > -100);

                // Update particles
                particles.forEach(p => p.update());
                particles = particles.filter(p => !p.dead);

                // Update bubbles
                updateBubbles();
            }

            function drawHUD(ctx) {
                // Score
                ctx.save();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'left';
                ctx.shadowColor = '#0066cc';
                ctx.shadowBlur = 10;
                ctx.fillText(`Score: ${score}`, 20, 40);
                ctx.shadowBlur = 0;

                // High score
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`Best: ${highScore}`, canvas.width - 20, 35);

                // Difficulty indicator
                if (difficulty > 1) {
                    ctx.fillStyle = '#ff8866';
                    ctx.font = 'bold 12px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(`Depth: ${difficulty}`, canvas.width - 20, 55);
                }
                ctx.restore();
            }

            function drawGameOver(ctx) {
                ctx.save();
                // Darken
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Title
                ctx.fillStyle = '#ff6644';
                ctx.font = 'bold clamp(24px, 5vw, 40px) "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff3300';
                ctx.shadowBlur = 25;
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

                // Score
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0066cc';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
                ctx.fillText(`Score: ${Math.floor(score)}`, canvas.width / 2, canvas.height / 2 - 10);

                // High score
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
                ctx.fillText(`Best: ${highScore}`, canvas.width / 2, canvas.height / 2 + 25);

                if (score >= highScore && score > 0) {
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                    ctx.shadowColor = '#ffaa00';
                    ctx.fillText('🏆 NEW BEST! 🏆', canvas.width / 2, canvas.height / 2 + 55);
                }

                // Restart prompt
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00aaff';
                ctx.fillStyle = '#aaddff';
                ctx.font = 'bold 17px "Segoe UI", Arial, sans-serif';
                const pulse = Math.sin(performance.now() * 0.004) * 0.3 + 0.7;
                ctx.globalAlpha = pulse;
                ctx.fillText('Tap or press SPACE to restart', canvas.width / 2, canvas.height / 2 + 95);
                ctx.globalAlpha = 1;

                ctx.shadowBlur = 0;
                ctx.restore();
            }

            function drawWaitingPrompt(ctx) {
                ctx.save();
                const pulse = Math.sin(performance.now() * 0.003) * 0.3 + 0.7;
                ctx.globalAlpha = pulse;
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#00ccff';
                ctx.shadowBlur = 15;
                ctx.fillText('Tap or press SPACE to dive in!', canvas.width / 2, canvas.height / 2 + 130);
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Screen shake
                let sx = 0,
                    sy = 0;
                if (shakeAmount > 0.05) {
                    sx = (Math.random() - 0.5) * shakeAmount;
                    sy = (Math.random() - 0.5) * shakeAmount;
                }

                ctx.save();
                ctx.translate(sx, sy);

                drawBackground(ctx);

                // Draw particles behind
                for (let p of particles) {
                    if (p.y < player.y - 10 || gameState !== 'playing') p.draw(ctx);
                }

                // Draw text blocks
                for (let block of textBlocks) {
                    block.draw(ctx);
                }

                // Draw player
                if (gameState === 'playing' || gameState === 'waiting') {
                    drawAssfish(player.x, player.y, player.facingRight);
                } else if (gameState === 'over') {
                    // Draw ghostly player
                    ctx.save();
                    ctx.globalAlpha = 0.35;
                    drawAssfish(player.x, player.y + 10, player.facingRight);
                    ctx.restore();
                }

                // Draw remaining particles
                for (let p of particles) {
                    if (p.y >= player.y - 10 || gameState !== 'playing') p.draw(ctx);
                }

                ctx.restore();

                // Flash effect
                if (flashAlpha > 0.005) {
                    ctx.save();
                    ctx.fillStyle = `rgba(255,50,30,${flashAlpha})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                }

                // HUD (no shake)
                if (gameState === 'playing') {
                    drawHUD(ctx);
                }

                // Game over overlay
                if (gameState === 'over') {
                    drawGameOver(ctx);
                }

                // Waiting prompt
                if (gameState === 'waiting') {
                    drawWaitingPrompt(ctx);
                    drawHUD(ctx);
                }
            }

            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- Input Handling ---
            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (gameState === 'waiting') startGame();
                    else if (gameState === 'over') restartGame();
                }
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') {
                    e.preventDefault();
                }
                initAudio();
            });
            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            function handleKeyInput() {
                if (gameState !== 'playing') return;
                const moveSpeed = 6;
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    player.targetX -= moveSpeed;
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    player.targetX += moveSpeed;
                }
                player.targetX = Math.max(35, Math.min(canvas.width - 35, player.targetX));
            }

            // Mouse / Touch
            let isDragging = false;
            canvas.addEventListener('mousedown', (e) => {
                initAudio();
                if (gameState === 'waiting') startGame();
                else if (gameState === 'over') restartGame();
                else if (gameState === 'playing') {
                    isDragging = true;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    player.targetX = (e.clientX - rect.left) * scaleX;
                }
            });
            canvas.addEventListener('mousemove', (e) => {
                if (isDragging && gameState === 'playing') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    player.targetX = (e.clientX - rect.left) * scaleX;
                }
            });
            canvas.addEventListener('mouseup', () => { isDragging = false; });
            canvas.addEventListener('mouseleave', () => { isDragging = false; });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                if (gameState === 'waiting') startGame();
                else if (gameState === 'over') restartGame();
                else if (gameState === 'playing') {
                    isDragging = true;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    player.targetX = (e.touches[0].clientX - rect.left) * scaleX;
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isDragging && gameState === 'playing') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    player.targetX = (e.touches[0].clientX - rect.left) * scaleX;
                }
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                isDragging = false;
            }, { passive: false });
            canvas.addEventListener('touchcancel', () => { isDragging = false; });

            // --- Initialize ---
            function init() {
                resizeCanvas();
                resetPlayer();
                player.targetX = player.x;
                // Pre-populate bubbles
                for (let i = 0; i < 28; i++) {
                    bubbles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: 2 + Math.random() * 8,
                        speed: 0.3 + Math.random() * 1.2,
                        wobble: Math.random() * Math.PI * 2,
                        wobbleSpeed: 0.005 + Math.random() * 0.02,
                        alpha: 0.2 + Math.random() * 0.4,
                    });
                }
                // Draw initial frame
                render();
            }

            init();

            // Keyboard polling in game loop
            const originalUpdate = update;
            update = function() {
                handleKeyInput();
                originalUpdate();
            };

            // Start the game loop
            gameLoop();

            // Handle window resize during gameplay
            window.addEventListener('resize', () => {
                resizeCanvas();
                if (gameState === 'playing') {
                    player.y = canvas.height - 100;
                    player.x = Math.min(Math.max(player.x, 35), canvas.width - 35);
                    player.targetX = player.x;
                }
                if (gameState === 'waiting') {
                    resetPlayer();
                    player.targetX = player.x;
                }
            });

            console.log('🦴👂🐟 Bony-Eared Assfish: Gibberish Storm is ready!');
            console.log('Dodge the falling gibberish. Collect "Bony-eared assfish" in gold for bonus points!');
            console.log('Arrow keys / A,D / drag to move. Tap or Space to start/restart.');
        })();
    </script>
</body>
</html>
